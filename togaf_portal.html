<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOGAF 学习门户 — Standard 10 认证备考</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f4f8;--sb:#1e293b;--sb2:#0f172a;--acc:#3b82f6;--txt:#1e293b;--muted:#64748b;--card:#fff;--border:#e2e8f0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;overflow:hidden}
#sidebar{width:270px;min-width:270px;background:var(--sb2);display:flex;flex-direction:column;overflow:hidden}
#sb-head{padding:20px 16px 12px;border-bottom:1px solid #334155}
#sb-head h1{font-size:15px;font-weight:700;color:#f1f5f9;line-height:1.3}
#sb-head p{font-size:11px;color:#94a3b8;margin-top:4px}
#nav{flex:1;overflow-y:auto;padding:8px 0}
#nav::-webkit-scrollbar{width:4px}
#nav::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-radius:0;transition:background .15s;color:#94a3b8;font-size:13px;border-left:3px solid transparent}
.nav-item:hover{background:#1e293b;color:#e2e8f0}
.nav-item.active{background:#1e3a5f;color:#93c5fd;border-left-color:var(--acc);font-weight:600}
.nav-icon{font-size:16px;width:22px;text-align:center}
.nav-dot{width:6px;height:6px;border-radius:50%;margin-left:auto;display:none}
.nav-item.done .nav-dot{display:block;background:#10b981}
#sb-footer{padding:12px 16px;border-top:1px solid #334155}
#prog-bar{height:4px;background:#334155;border-radius:2px;margin-bottom:6px}
#prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
#prog-txt{font-size:11px;color:#94a3b8}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;min-height:52px}
#topbar h2{font-size:16px;font-weight:600;color:var(--txt);flex:1}
#search-box{padding:6px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px;outline:none;width:200px;background:var(--bg)}
#search-box:focus{border-color:var(--acc)}
#content-area{flex:1;overflow-y:auto;padding:28px 32px}
#content-area::-webkit-scrollbar{width:6px}
#content-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* markdown styles */
#content-area h1{font-size:24px;font-weight:700;margin:0 0 16px;color:#1e3a8a;border-bottom:2px solid #bfdbfe;padding-bottom:8px}
#content-area h2{font-size:19px;font-weight:600;margin:28px 0 12px;color:#1d4ed8;padding-left:10px;border-left:4px solid var(--acc)}
#content-area h3{font-size:16px;font-weight:600;margin:20px 0 8px;color:#2563eb}
#content-area h4{font-size:14px;font-weight:600;margin:16px 0 6px;color:#3b82f6}
#content-area h5,#content-area h6{font-size:13px;font-weight:600;margin:12px 0 4px;color:var(--muted)}
#content-area p{line-height:1.75;margin-bottom:10px;font-size:14px}
#content-area ul,#content-area ol{margin:8px 0 12px 20px;font-size:14px}
#content-area li{line-height:1.75;margin-bottom:3px}
#content-area blockquote{border-left:4px solid #bfdbfe;background:#eff6ff;padding:10px 16px;margin:12px 0;border-radius:0 6px 6px 0;font-size:14px;color:#1e40af}
#content-area hr{border:none;border-top:1px solid var(--border);margin:20px 0}
#content-area strong{color:#1e3a8a}
#content-area code{background:#f1f5f9;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px;color:#be185d}
#content-area pre{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:8px;overflow-x:auto;margin:12px 0;font-size:13px;line-height:1.5}
#content-area pre code{background:none;color:inherit;padding:0;font-size:inherit}
#content-area a{color:var(--acc);text-decoration:none}
#content-area a:hover{text-decoration:underline}
.tbl{overflow-x:auto;margin:12px 0}
.tbl table{border-collapse:collapse;width:100%;font-size:13px}
.tbl th{background:#dbeafe;color:#1e3a8a;padding:8px 12px;border:1px solid #bfdbfe;text-align:left;font-weight:600}
.tbl td{padding:7px 12px;border:1px solid var(--border);vertical-align:top;line-height:1.5}
.tbl tr:nth-child(even) td{background:#f8fafc}
/* quiz styles */
#quiz-wrap{max-width:800px}
#quiz-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.q-filter{padding:6px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;background:var(--card);transition:all .15s}
.q-filter.active,.q-filter:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
#quiz-progress{background:var(--card);border-radius:10px;padding:14px 18px;margin-bottom:20px;border:1px solid var(--border)}
#qprog-bar{height:6px;background:#e2e8f0;border-radius:3px;margin:8px 0 4px}
#qprog-fill{height:100%;background:#10b981;border-radius:3px;transition:width .4s}
.q-card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--border);transition:border-color .2s}
.q-card.correct{border-color:#10b981;background:#f0fdf4}
.q-card.wrong{border-color:#ef4444;background:#fef2f2}
.q-head{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px}
.q-num{font-size:11px;font-weight:700;color:#fff;background:var(--acc);border-radius:4px;padding:2px 7px;white-space:nowrap}
.q-star{color:#f59e0b;font-size:14px}
.q-text{font-size:14px;font-weight:500;line-height:1.6;color:var(--txt);flex:1}
.q-opts{display:grid;gap:8px;margin-bottom:12px}
.q-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;transition:all .15s;background:#fff}
.q-opt:hover:not(.disabled){border-color:var(--acc);background:#eff6ff}
.q-opt.selected{border-color:var(--acc);background:#eff6ff}
.q-opt.correct-opt{border-color:#10b981;background:#f0fdf4;color:#065f46}
.q-opt.wrong-opt{border-color:#ef4444;background:#fef2f2;color:#991b1b}
.opt-key{font-weight:700;color:var(--acc);min-width:16px}
.q-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:7px;font-size:13px;cursor:pointer;border:none;font-weight:500;transition:all .15s}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--txt)}
.btn-outline:hover{border-color:var(--acc);color:var(--acc)}
.q-exp{margin-top:12px;padding:12px 14px;background:#eff6ff;border-radius:8px;font-size:13px;line-height:1.6;color:#1e3a8a;display:none;border-left:3px solid var(--acc)}
.q-exp.show{display:block}
.score-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;background:#dbeafe;color:#1d4ed8}
/* scenario */
.sc-card{background:var(--card);border-radius:12px;padding:24px;margin-bottom:20px;border:1px solid var(--border)}
.sc-bg{background:#f8fafc;border-radius:8px;padding:16px;margin:12px 0 20px;font-size:13px;line-height:1.75;border-left:4px solid var(--acc);white-space:pre-wrap}
.sc-q{font-size:14px;font-weight:600;margin:16px 0 10px;color:var(--txt)}
/* adm diagram */
#adm-diagram{margin:20px 0}
.adm-ring{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0}
.adm-phase{flex:1;min-width:160px;padding:14px;border-radius:10px;border:2px solid;cursor:pointer;transition:transform .15s}
.adm-phase:hover{transform:translateY(-2px)}
.adm-phase h4{font-size:13px;font-weight:700;margin-bottom:4px}
.adm-phase p{font-size:11px;opacity:.85}
.phase-pre{border-color:#10b981;background:#f0fdf4;color:#065f46}
.phase-a{border-color:#3b82f6;background:#eff6ff;color:#1e3a8a}
.phase-b{border-color:#8b5cf6;background:#f5f3ff;color:#4c1d95}
.phase-c{border-color:#f59e0b;background:#fffbeb;color:#78350f}
.phase-d{border-color:#ef4444;background:#fef2f2;color:#7f1d1d}
.phase-e{border-color:#ec4899;background:#fdf2f8;color:#831843}
.phase-f{border-color:#06b6d4;background:#ecfeff;color:#0e7490}
.phase-g{border-color:#84cc16;background:#f7fee7;color:#365314}
.phase-h{border-color:#f97316;background:#fff7ed;color:#7c2d12}
.phase-rm{border-color:#6366f1;background:#eef2ff;color:#312e81}
</style>
</head>

<script>
const MODS={"00": ["学习计划总览", "📋", "#10b981"], "01": ["核心概念速查", "📖", "#3b82f6"], "02": ["ADM 阶段详解", "🔄", "#8b5cf6"], "03": ["架构内容框架", "📦", "#f59e0b"], "04": ["企业连续体", "🔗", "#06b6d4"], "05": ["架构治理", "⚖️", "#ef4444"], "06": ["Level 1 题库", "✏️", "#6366f1"], "07": ["Level 2 案例", "🎯", "#ec4899"], "08": ["佛照实战", "🏭", "#84cc16"]};
const CONTENT={"00": "<h1 id=\"TOGAF-学习与认证计划总览\">TOGAF 学习与认证计划总览</h1>\n\n<blockquote><p>目标：通过 TOGAF Standard 10 Level 1+2 认证，同时将知识直接应用于佛山照明业务诊断咨询管理资讯服务</p></blockquote>\n\n<hr>\n\n<h2 id=\"一-你的考试背景分析\">一、你的考试背景分析</h2>\n\n<h3 id=\"考试版本-TOGAF-Standard-10-2022年发布-\">考试版本：TOGAF Standard 10（2022年发布）</h3>\n<ul>\n<li>主办机构：The Open Group</li>\n<li>考试形式：Level 1（Foundation）+ Level 2（Certified）两场，合并称为 <strong>OG0-193</strong>（Level 1+2 组合考试）</li>\n<li>考试语言：英文（无中文选项，但可带官方术语表）</li>\n<li>考试费用：约 $550 USD（组合考试）</li>\n</ul>\n\n<h3 id=\"你的优势\">你的优势</h3>\n<ul>\n<li>SAP 客户经理背景，熟悉企业架构实施场景</li>\n<li>正在跟进佛照项目：典型的 EA 驱动的 ERP 转型</li>\n<li>已具备业务洞察力，学 TOGAF 是补架构方法论的系统框架</li>\n</ul>\n\n<hr>\n\n<h2 id=\"二-考试结构\">二、考试结构</h2>\n\n<div class=\"tbl\"><table>\n<tr><th>科目</th><th>名称</th><th>题型</th><th>题数</th><th>时间</th><th>及格线</th></tr>\n<tr><td>Level 1</td><td>Foundation</td><td>选择题（单选）</td><td>40题</td><td>60分钟</td><td>55%（22题）</td></tr>\n<tr><td>Level 2</td><td>Certified</td><td>情景分析题（选最佳答案）</td><td>8道大题×4选1</td><td>90分钟</td><td>60%（24分/40分）</td></tr>\n</table></div>\n\n<p><strong>Level 1</strong> 考记忆：考你知不知道TOGAF的定义、术语、ADM各阶段名称</p>\n<p><strong>Level 2</strong> 考应用：给你一个企业架构案例，考你如何做出正确决策</p>\n\n<hr>\n\n\n<div style=\"margin:20px 0 28px;display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n  <div style=\"background:#fff;border-radius:8px;padding:18px;box-shadow:0 2px 12px rgba(30,58,138,.1);border-top:4px solid #1e3a8a\">\n    <div style=\"font-size:13px;font-weight:800;color:#1e3a8a;margin-bottom:10px\">📝 Level 1 · Foundation</div>\n    <table style=\"width:100%;font-size:11px;border-collapse:collapse\">\n      <tr><td style=\"padding:4px 0;color:#64748b\">题型</td><td style=\"padding:4px 0;color:#334155;font-weight:600\">单选题</td></tr>\n      <tr><td style=\"padding:4px 0;color:#64748b\">题数</td><td style=\"padding:4px 0;color:#334155;font-weight:600\">40题</td></tr>\n      <tr><td style=\"padding:4px 0;color:#64748b\">时间</td><td style=\"padding:4px 0;color:#334155;font-weight:600\">60分钟</td></tr>\n      <tr><td style=\"padding:4px 0;color:#64748b\">及格线</td><td style=\"padding:4px 0;color:#334155;font-weight:600\">55%（22题）</td></tr>\n      <tr><td style=\"padding:4px 0;color:#64748b\">考什么</td><td style=\"padding:4px 0;color:#1e40af;font-weight:600\">术语定义、ADM阶段名称、制品类型</td></tr>\n    </table>\n    <div style=\"margin-top:10px;background:#eff6ff;border-radius:5px;padding:7px 10px;font-size:10px;color:#1e40af\">\n      💡 考记忆：知道\"是什么\"就够了\n    </div>\n  </div>\n  <div style=\"background:#fff;border-radius:8px;padding:18px;box-shadow:0 2px 12px rgba(30,58,138,.1);border-top:4px solid #2563eb\">\n    <div style=\"font-size:13px;font-weight:800;color:#1d4ed8;margin-bottom:10px\">🧠 Level 2 · Certified</div>\n    <table style=\"width:100%;font-size:11px;border-collapse:collapse\">\n      <tr><td style=\"padding:4px 0;color:#64748b\">题型</td><td style=\"padding:4px 0;color:#334155;font-weight:600\">情景分析（选最佳答案）</td></tr>\n      <tr><td style=\"padding:4px 0;color:#64748b\">题数</td><td style=\"padding:4px 0;color:#334155;font-weight:600\">8大题×4选1</td></tr>\n      <tr><td style=\"padding:4px 0;color:#64748b\">时间</td><td style=\"padding:4px 0;color:#334155;font-weight:600\">90分钟（可带术语表）</td></tr>\n      <tr><td style=\"padding:4px 0;color:#64748b\">及格线</td><td style=\"padding:4px 0;color:#334155;font-weight:600\">60%（24分/40分）</td></tr>\n      <tr><td style=\"padding:4px 0;color:#64748b\">考什么</td><td style=\"padding:4px 0;color:#1e40af;font-weight:600\">企业架构案例中如何做出正确决策</td></tr>\n    </table>\n    <div style=\"margin-top:10px;background:#eff6ff;border-radius:5px;padding:7px 10px;font-size:10px;color:#1e40af\">\n      💡 考应用：理解\"为什么\"和\"怎么做\"\n    </div>\n  </div>\n</div><h2 id=\"三-12周学习路线图\">三、12周学习路线图</h2>\n\n<pre><code>Week 1-2   【地基】TOGAF核心概念体系\nWeek 3-4   【主干】ADM全生命周期（Phase A-H + 需求管理）\nWeek 5-6   【骨架】四大架构域 + 制品与交付物\nWeek 7-8   【实战】架构内容框架 + 企业连续体\nWeek 9     【整合】架构能力框架 + 治理\nWeek 10    【刷题】Level 1 真题精练（目标：40/40）\nWeek 11    【案例】Level 2 场景分析专项（佛照真实案例演练）\nWeek 12    【冲刺】模拟考试 × 2 + 查漏补缺</code></pre>\n\n<hr>\n\n<h2 id=\"四-学习材料清单-本目录-\">四、学习材料清单（本目录）</h2>\n\n<div class=\"tbl\"><table>\n<tr><th>文件</th><th>内容</th><th>对应考试</th></tr>\n<tr><td><a href=\"01_核心概念速查手册.md\" target=\"_blank\">01_核心概念速查手册.md</a></td><td>术语定义、ADM全图、四大架构域</td><td>Level 1</td></tr>\n<tr><td><a href=\"02_ADM详解_阶段逐一拆解.md\" target=\"_blank\">02_ADM详解_阶段逐一拆解.md</a></td><td>每个Phase的目标/步骤/输入输出/制品</td><td>Level 1+2</td></tr>\n<tr><td><a href=\"03_架构内容框架与制品.md\" target=\"_blank\">03_架构内容框架与制品.md</a></td><td>制品分类、视点与视图、Building Block</td><td>Level 1+2</td></tr>\n<tr><td><a href=\"04_企业连续体与架构库.md\" target=\"_blank\">04_企业连续体与架构库.md</a></td><td>企业连续体、架构库层次、参考模型</td><td>Level 1</td></tr>\n<tr><td><a href=\"05_架构治理与能力框架.md\" target=\"_blank\">05_架构治理与能力框架.md</a></td><td>治理框架、架构委员会、合规机制</td><td>Level 2</td></tr>\n<tr><td><a href=\"06_Level1考题精练100题.md\" target=\"_blank\">06_Level1考题精练100题.md</a></td><td>模拟题+详解（含高频陷阱）</td><td>Level 1</td></tr>\n<tr><td><a href=\"07_Level2案例分析练习.md\" target=\"_blank\">07_Level2案例分析练习.md</a></td><td>6个完整场景题+解题框架</td><td>Level 2</td></tr>\n<tr><td><a href=\"08_佛照项目TOGAF实战应用.md\" target=\"_blank\">08_佛照项目TOGAF实战应用.md</a></td><td>将TOGAF方法论映射到佛照诊断咨询</td><td>实战</td></tr>\n</table></div>\n\n<hr>\n\n<h2 id=\"五-每周学习安排-推荐-\">五、每周学习安排（推荐）</h2>\n\n<h3 id=\"工作日模式-2小时-天-\">工作日模式（2小时/天）</h3>\n<ul>\n<li>早 30分钟：阅读/记忆当周主题</li>\n<li>晚 90分钟：深度学习 + 做题</li>\n</ul>\n\n<h3 id=\"周末模式-4小时-天-\">周末模式（4小时/天）</h3>\n<ul>\n<li>周六：精读+做笔记+对应制品练习</li>\n<li>周日：复习+场景题演练+佛照案例映射</li>\n</ul>\n\n<hr>\n\n<h2 id=\"六-报名流程\">六、报名流程</h2>\n\n<ol>\n<li>访问 <a href=\"https://www.opengroup.org/togaf\" target=\"_blank\">The Open Group 认证入口</a></li>\n<li>注册账号 → 选择 OG0-193 组合考试</li>\n<li>购买考券（官网或 PearsonVUE/Prometric 均可）</li>\n<li>可选择<strong>在家在线考</strong>（Pearson OnVUE）或<strong>考试中心</strong></li>\n<li>推荐备考12周后安排考试</li>\n</ol>\n\n<hr>\n\n<h2 id=\"七-与佛照项目的协同价值\">七、与佛照项目的协同价值</h2>\n\n<p>佛照项目第一期即是&quot;数字化转型规划咨询&quot;，其核心交付物：</p>\n<ul>\n<li>《现状诊断报告》→ TOGAF Phase A（架构愿景）+ Phase B/C/D（现状架构）</li>\n<li>《EA架构蓝图》→ TOGAF 目标架构（Business/Application/Data/Technology）</li>\n<li>《数字化转型路径规划》→ TOGAF Phase F（迁移规划）+ Phase G（实施治理）</li>\n</ul>\n\n<p><strong>学TOGAF = 直接提升你对艾维登交付质量的审视能力 = 商机管控能力</strong></p>\n", "01": "<h1 id=\"TOGAF-Standard-10-核心概念速查手册\">TOGAF Standard 10 核心概念速查手册</h1>\n<blockquote><p>适用对象：TOGAF Foundation（Level 1）考试备考</p>\n<p>版本：基于 TOGAF Standard Version 10（The Open Group，2022）</p>\n<p>更新日期：2026-06-21</p></blockquote>\n\n<hr>\n\n<h2 id=\"目录\">目录</h2>\n\n<ol>\n<li><a href=\"#第一章togaf是什么\" target=\"_blank\">TOGAF是什么</a></li>\n<li><a href=\"#第二章企业架构ea基础\" target=\"_blank\">企业架构（EA）基础</a></li>\n<li><a href=\"#第三章adm概览architecture-development-method\" target=\"_blank\">ADM概览</a></li>\n<li><a href=\"#第四章关键术语对照表\" target=\"_blank\">关键术语对照表</a></li>\n<li><a href=\"#第五章四大架构域详解\" target=\"_blank\">四大架构域详解</a></li>\n<li><a href=\"#第六章togaf制品体系artifacts\" target=\"_blank\">TOGAF制品体系（Artifacts）</a></li>\n<li><a href=\"#第七章架构原则architecture-principles\" target=\"_blank\">架构原则（Architecture Principles）</a></li>\n<li><a href=\"#第八章利益相关者管理\" target=\"_blank\">利益相关者管理</a></li>\n</ol>\n\n<hr>\n\n<h2 id=\"第一章-TOGAF是什么\">第一章：TOGAF是什么</h2>\n\n<h3 id=\"1-1-基本定义\">1.1 基本定义</h3>\n\n<p><strong>TOGAF</strong>（The Open Group Architecture Framework）是由 <strong>The Open Group</strong> 发布和维护的企业架构框架。它提供一套系统化的方法论、工具和词汇，用于开发、管理和治理企业架构。</p>\n\n<p>TOGAF 不是一套严格的标准规范，而是一个<strong>实践指导框架</strong>（Practical Framework），可根据企业实际情况进行裁剪和适配。</p>\n\n<h3 id=\"1-2-发布机构\">1.2 发布机构</h3>\n\n<div class=\"tbl\"><table>\n<tr><th>属性</th><th>内容</th></tr>\n<tr><td>发布机构</td><td>The Open Group（开放集团，国际中立标准组织）</td></tr>\n<tr><td>官网</td><td>www.opengroup.org</td></tr>\n<tr><td>认证体系</td><td>TOGAF Foundation (Level 1) / Practitioner (Level 2)</td></tr>\n<tr><td>首次发布</td><td>1995年（基于美国国防部 TAFIM 框架）</td></tr>\n</table></div>\n\n<h3 id=\"1-3-版本历史\">1.3 版本历史</h3>\n\n<div class=\"tbl\"><table>\n<tr><th>版本</th><th>发布年份</th><th>主要变化</th></tr>\n<tr><td>TOGAF 8</td><td>2003</td><td>引入ADM完整周期</td></tr>\n<tr><td>TOGAF 9</td><td>2009</td><td>增加架构能力框架、内容框架</td></tr>\n<tr><td>TOGAF 9.1</td><td>2011</td><td>错误修正与澄清</td></tr>\n<tr><td>TOGAF 9.2</td><td>2018</td><td>现代化更新，删除过时内容，增加Agile指导</td></tr>\n<tr><td><strong>TOGAF Standard Version 10</strong></td><td><strong>2022</strong></td><td><strong>重大结构重组，模块化设计</strong></td></tr>\n</table></div>\n\n<h3 id=\"1-4-TOGAF-Standard-10-的新变化-相比9-2-\">1.4 TOGAF Standard 10 的新变化（相比9.2）</h3>\n\n<p>TOGAF Standard 10 是迄今最重大的一次架构重组，核心变化如下：</p>\n\n<p><strong>1. 模块化结构（Modular Structure）</strong></p>\n<ul>\n<li>原来的单一文档拆分为多个独立模块（Series）</li>\n<li>核心文档（Core）与指南（Guides）分离</li>\n<li>便于独立更新维护</li>\n</ul>\n\n<p><strong>2. 内容重组</strong></p>\n<ul>\n<li>删除了已过时的参考模型（TRM/III-RM 移至独立指南）</li>\n<li>TOGAF Series Guides 涵盖数字化转型、安全架构、Agile等专题</li>\n<li>架构能力框架（Architecture Capability Framework）独立成册</li>\n</ul>\n\n<p><strong>3. 强调数字化与敏捷</strong></p>\n<ul>\n<li>新增 TOGAF® Agile DevOps Guide</li>\n<li>与 SAFe、Scrum 等敏捷方法的整合指导</li>\n<li>数字化转型场景的架构实践</li>\n</ul>\n\n<p><strong>4. 语言现代化</strong></p>\n<ul>\n<li>更新了部分术语定义</li>\n<li>简化了部分描述，提升可读性</li>\n</ul>\n\n<p><strong>5. 开放生态系统（Open Ecosystem）</strong></p>\n<ul>\n<li>与 ArchiMate®、IT4IT™、TOGAF Series Library 深度集成</li>\n</ul>\n\n<h3 id=\"1-5-适用对象与使用场景\">1.5 适用对象与使用场景</h3>\n\n<p><strong>适用对象：</strong></p>\n<ul>\n<li>企业架构师（Enterprise Architect）</li>\n<li>IT战略规划人员</li>\n<li>CIO/CTO 及技术决策者</li>\n<li>咨询顾问（如SAP架构顾问）</li>\n<li>项目经理和解决方案设计师</li>\n</ul>\n\n<p><strong>典型使用场景：</strong></p>\n<ul>\n<li>大型企业IT战略规划</li>\n<li>ERP系统升级或数字化转型（如 ECC → S/4HANA 迁移）</li>\n<li>集团级架构治理体系建设</li>\n<li>云迁移架构规划</li>\n<li>组织合并/重组后的IT整合</li>\n</ul>\n\n<hr>\n\n<h2 id=\"第二章-企业架构-EA-基础\">第二章：企业架构（EA）基础</h2>\n\n<h3 id=\"2-1-企业架构定义\">2.1 企业架构定义</h3>\n\n<p><strong>Enterprise Architecture（企业架构，EA）</strong> 是对整个企业的结构性描述，定义了企业的组成部分（人员、流程、信息系统、技术基础设施）以及它们之间的关系，并说明这些关系如何支持企业目标的实现。</p>\n\n<p>TOGAF 对&quot;架构&quot;有两层含义：</p>\n<ol>\n<li><strong>架构描述（Architecture Description）</strong>：对系统结构的形式化描述</li>\n<li><strong>架构实践（Architecture Practice）</strong>：开发和使用架构描述的方法和过程</li>\n</ol>\n\n<h3 id=\"2-2-架构的四大域-Four-Architecture-Domains-\">2.2 架构的四大域（Four Architecture Domains）</h3>\n\n<p>这是 TOGAF Level 1 <strong>最高频考点</strong>，必须熟记。</p>\n\n<div class=\"tbl\"><table>\n<tr><th>架构域</th><th>英文名称</th><th>关注重点</th><th>典型问题</th></tr>\n<tr><td>业务架构</td><td>Business Architecture</td><td>业务战略、治理、组织、关键业务流程</td><td>企业如何运营？</td></tr>\n<tr><td>应用架构</td><td>Application Architecture</td><td>应用系统蓝图、各应用间交互关系</td><td>有哪些应用？如何协作？</td></tr>\n<tr><td>数据架构</td><td>Data Architecture</td><td>企业数据资产的结构、管理和治理</td><td>数据在哪？如何管理？</td></tr>\n<tr><td>技术架构</td><td>Technology Architecture</td><td>支撑应用和数据的软硬件基础设施</td><td>跑在什么平台上？</td></tr>\n</table></div>\n\n<blockquote><p><strong>记忆口诀</strong>：BADT（Business → Application → Data → Technology），从业务到技术，从高到低。</p></blockquote>\n\n\n<div style=\"margin:20px 0 28px;background:#fff;border-radius:8px;padding:20px 24px;box-shadow:0 2px 12px rgba(30,58,138,.1)\">\n  <p style=\"font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px\">TOGAF 四大架构域（BDAT）及其关系</p>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n    <div style=\"background:linear-gradient(135deg,#1e3a8a,#1d4ed8);border-radius:8px;padding:18px;color:#fff\">\n      <div style=\"font-size:15px;font-weight:800;margin-bottom:6px\">B · 业务架构</div>\n      <div style=\"font-size:10.5px;color:#bfdbfe;line-height:1.7\">Business Architecture — Phase B<br>价值链 · 组织结构 · 业务流程<br><span style=\"color:#fff;font-weight:600\">佛照：19法人管控 / 销售价格体系 / 集团合并</span></div>\n    </div>\n    <div style=\"background:linear-gradient(135deg,#1d4ed8,#2563eb);border-radius:8px;padding:18px;color:#fff\">\n      <div style=\"font-size:15px;font-weight:800;margin-bottom:6px\">D · 数据架构</div>\n      <div style=\"font-size:10.5px;color:#bfdbfe;line-height:1.7\">Data Architecture — Phase C<br>数据模型 · 主数据治理 · 数据流<br><span style=\"color:#fff;font-weight:600\">佛照：MDG三件套 / 物料/客商/财务主数据</span></div>\n    </div>\n    <div style=\"background:linear-gradient(135deg,#2563eb,#3b82f6);border-radius:8px;padding:18px;color:#fff\">\n      <div style=\"font-size:15px;font-weight:800;margin-bottom:6px\">A · 应用架构</div>\n      <div style=\"font-size:10.5px;color:#bfdbfe;line-height:1.7\">Application Architecture — Phase C<br>应用边界 · 系统集成 · 接口设计<br><span style=\"color:#fff;font-weight:600\">佛照：SAP S/4HANA + 12个外围系统CPI集成</span></div>\n    </div>\n    <div style=\"background:linear-gradient(135deg,#3b82f6,#60a5fa);border-radius:8px;padding:18px;color:#fff\">\n      <div style=\"font-size:15px;font-weight:800;margin-bottom:6px\">T · 技术架构</div>\n      <div style=\"font-size:10.5px;color:#dbeafe;line-height:1.7\">Technology Architecture — Phase D<br>基础设施 · 平台 · 部署模式<br><span style=\"color:#fff;font-weight:600\">佛照：S/4HANA PCE私有云 + SAP BTP</span></div>\n    </div>\n  </div>\n  <div style=\"margin-top:10px;background:#eff6ff;border-radius:6px;padding:8px 14px;font-size:10.5px;color:#1e40af;text-align:center\">B→D→A→T 层层依赖：业务驱动数据需求 → 数据支撑应用设计 → 应用运行于技术平台</div>\n</div><h3 id=\"2-3-三个核心架构文档概念\">2.3 三个核心架构文档概念</h3>\n\n<div class=\"tbl\"><table>\n<tr><th>概念</th><th>英文</th><th>定义</th><th>产生阶段</th></tr>\n<tr><td>架构愿景</td><td>Architecture Vision</td><td>对目标架构高层次的描述，说明为何需要变革</td><td>Phase A</td></tr>\n<tr><td>架构描述</td><td>Architecture Description</td><td>对架构的完整正式描述（基线或目标）</td><td>Phase B-D</td></tr>\n<tr><td>架构路线图</td><td>Architecture Roadmap</td><td>从基线架构到目标架构的变更序列计划</td><td>Phase E-F</td></tr>\n</table></div>\n\n<h3 id=\"2-4-架构师角色类型\">2.4 架构师角色类型</h3>\n\n<div class=\"tbl\"><table>\n<tr><th>角色</th><th>英文</th><th>职责范围</th></tr>\n<tr><td>首席架构师</td><td>Chief Architect / Lead Architect</td><td>负责整体架构方向、架构治理</td></tr>\n<tr><td>企业架构师</td><td>Enterprise Architect</td><td>跨域整体架构设计与协调</td></tr>\n<tr><td>业务架构师</td><td>Business Architect</td><td>业务流程与组织架构设计</td></tr>\n<tr><td>解决方案架构师</td><td>Solution Architect</td><td>特定项目/系统的架构设计</td></tr>\n<tr><td>技术架构师</td><td>Technical Architect</td><td>基础设施与技术平台架构</td></tr>\n<tr><td>数据架构师</td><td>Data Architect</td><td>数据模型、数据治理架构</td></tr>\n<tr><td>安全架构师</td><td>Security Architect</td><td>安全策略与安全架构设计</td></tr>\n</table></div>\n\n<hr>\n\n<h2 id=\"第三章-ADM概览-Architecture-Development-Method-\">第三章：ADM概览（Architecture Development Method）</h2>\n\n<h3 id=\"3-1-ADM全图\">3.1 ADM全图</h3>\n\n<p>ADM 是 TOGAF 的核心，是一个<strong>迭代循环</strong>的企业架构开发方法。共包含 <strong>9个Phase（阶段）+ 1个持续过程</strong>。</p>\n\n<pre><code>                    ┌─────────────────────────────┐\n                    │   Requirements Management    │\n                    │        （需求管理）           │\n                    │  ← 贯穿所有阶段，持续进行 →  │\n                    └─────────────────────────────┘\n                                  ↕\n        ┌─────────────────────────────────────────────────┐\n        │                                                 │\n   H ←──┤  A: Architecture Vision（架构愿景）             │\n   迁移  │  B: Business Architecture（业务架构）           │\n   管理  │  C: Information Systems Architecture           │\n   变更  │     C1: Application / C2: Data                │\n        │  D: Technology Architecture（技术架构）         │\n        │  E: Opportunities &amp; Solutions（机会与解决方案）  │\n        │  F: Migration Planning（迁移规划）               │\n        │  G: Implementation Governance（实施治理）        │──→ H\n        └─────────────────────────────────────────────────┘</code></pre>\n\n<h3 id=\"3-2-每个Phase的一句话定义-考试必背-\">3.2 每个Phase的一句话定义（考试必背）</h3>\n\n<div class=\"tbl\"><table>\n<tr><th>Phase</th><th>名称</th><th>一句话定义</th><th>关键输出</th></tr>\n<tr><td>预备阶段</td><td>Preliminary Phase</td><td>建立架构能力，定制TOGAF，建立架构原则</td><td>架构原则、定制ADM</td></tr>\n<tr><td>A</td><td>Architecture Vision</td><td>定义架构项目范围、利益相关者、愿景，获得批准</td><td>架构愿景声明、Statement of Architecture Work</td></tr>\n<tr><td>B</td><td>Business Architecture</td><td>开发业务架构（基线→目标），进行差距分析</td><td>业务架构文档、差距分析</td></tr>\n<tr><td>C</td><td>Information Systems Architecture</td><td>开发应用架构和数据架构</td><td>应用架构+数据架构文档</td></tr>\n<tr><td>D</td><td>Technology Architecture</td><td>开发技术基础设施架构</td><td>技术架构文档</td></tr>\n<tr><td>E</td><td>Opportunities &amp; Solutions</td><td>识别实施工作包、评估交付物，制定架构路线图初版</td><td>架构路线图、实施和迁移计划（初版）</td></tr>\n<tr><td>F</td><td>Migration Planning</td><td>完善实施和迁移计划，确定优先级</td><td>迁移计划、实施和迁移计划（完整版）</td></tr>\n<tr><td>G</td><td>Implementation Governance</td><td>监督实施项目的架构合规性</td><td>架构合规评估、架构变更请求</td></tr>\n<tr><td>H</td><td>Architecture Change Management</td><td>监控架构变更需求，管理架构生命周期</td><td>变更请求、架构更新</td></tr>\n<tr><td>RM</td><td>Requirements Management</td><td>持续管理所有架构需求（贯穿全程）</td><td>需求库、需求影响评估</td></tr>\n</table></div>\n\n<blockquote><p><strong>关键记忆：</strong> Preliminary（预备）→ A（愿景）→ B（业务）→ C（信息系统）→ D（技术）→ E（机会）→ F（迁移）→ G（治理）→ H（变更管理）→ 回到A</p></blockquote>\n\n<h3 id=\"3-3-ADM循环的迭代性质\">3.3 ADM循环的迭代性质</h3>\n\n<p>ADM 有三个层次的迭代：</p>\n\n<ol>\n<li><strong>阶段内迭代（Within a Phase）</strong>：在单一阶段内反复细化</li>\n<li><strong>阶段间迭代（Between Phases）</strong>：在多个阶段间往返（如B→A重新审视愿景）</li>\n<li><strong>完整循环迭代（Full ADM Cycle）</strong>：一轮ADM完成后，启动下一轮更细化的架构工作</li>\n</ol>\n\n<p><strong>架构层次与迭代：</strong></p>\n<ul>\n<li>战略架构（Strategic Architecture）：高层次，长期，Phase A-E</li>\n<li>分段架构（Segmented Architecture）：特定业务域，中期</li>\n<li>能力架构（Capability Architecture）：特定能力，短期，支撑项目实施</li>\n</ul>\n\n<h3 id=\"3-4-ADM适配-Adaptation-概念\">3.4 ADM适配（Adaptation）概念</h3>\n\n<p>TOGAF 明确支持<strong>对ADM进行裁剪和适配</strong>，适配的常见场景：</p>\n\n<div class=\"tbl\"><table>\n<tr><th>适配场景</th><th>说明</th></tr>\n<tr><td>与敏捷方法整合</td><td>将ADM的Phase映射到Sprint/迭代</td></tr>\n<tr><td>架构范围调整</td><td>仅覆盖部分架构域（如仅做技术架构）</td></tr>\n<tr><td>与其他框架整合</td><td>与 ITIL、COBIT、Zachman 等框架结合使用</td></tr>\n<tr><td>行业特定适配</td><td>如政府架构框架（GEA）、金融行业等</td></tr>\n<tr><td>规模适配</td><td>小型企业简化版ADM</td></tr>\n</table></div>\n\n<hr>\n\n<h2 id=\"第四章-关键术语对照表\">第四章：关键术语对照表</h2>\n\n<blockquote><p>共收录 <strong>42个</strong> 核心术语，覆盖Level 1考试全部必考词汇。</p></blockquote>\n\n<div class=\"tbl\"><table>\n<tr><th>#</th><th>英文术语</th><th>中文释义</th><th>简要定义（一句话）</th></tr>\n<tr><td>1</td><td>ADM (Architecture Development Method)</td><td>架构开发方法</td><td>TOGAF的核心迭代循环过程，描述如何开发企业架构</td></tr>\n<tr><td>2</td><td>Architecture Domain</td><td>架构域</td><td>企业架构的四大分类领域：业务/应用/数据/技术</td></tr>\n<tr><td>3</td><td>Architecture Vision</td><td>架构愿景</td><td>对目标架构高层次的描述，定义变革愿景（Phase A输出）</td></tr>\n<tr><td>4</td><td>Architecture Repository</td><td>架构知识库</td><td>存储所有架构相关资产和信息的中央仓库</td></tr>\n<tr><td>5</td><td>Architecture Building Block (ABB)</td><td>架构构建块</td><td>定义功能需求但不指定实现方式的抽象组件</td></tr>\n<tr><td>6</td><td>Solution Building Block (SBB)</td><td>解决方案构建块</td><td>实现ABB的具体产品、服务或系统组件</td></tr>\n<tr><td>7</td><td>Architecture Roadmap</td><td>架构路线图</td><td>从基线架构到目标架构的变更工作包时序计划</td></tr>\n<tr><td>8</td><td>Stakeholder</td><td>利益相关者</td><td>对架构有关切或被架构影响的个人、团队或组织</td></tr>\n<tr><td>9</td><td>Concern</td><td>关切</td><td>利益相关者认为重要的系统特性或质量属性</td></tr>\n<tr><td>10</td><td>View</td><td>视图</td><td>从特定视点出发对架构的表达（面向特定利益相关者）</td></tr>\n<tr><td>11</td><td>Viewpoint</td><td>视点</td><td>创建和使用视图的约定规范（定义视图的&quot;模板&quot;）</td></tr>\n<tr><td>12</td><td>Architecture Continuum</td><td>架构连续体</td><td>从通用基础架构到组织专属架构的分类体系</td></tr>\n<tr><td>13</td><td>Architecture Landscape</td><td>架构全景</td><td>企业架构在特定时间点的全面快照</td></tr>\n<tr><td>14</td><td>Foundation Architecture</td><td>基础架构</td><td>最通用、最抽象的架构层（如互联网标准）</td></tr>\n<tr><td>15</td><td>Common Systems Architecture</td><td>公共系统架构</td><td>跨行业通用的系统架构模式</td></tr>\n<tr><td>16</td><td>Industry Architecture</td><td>行业架构</td><td>特定行业通用的架构模式（如汽车行业架构）</td></tr>\n<tr><td>17</td><td>Organization-Specific Architecture</td><td>组织专属架构</td><td>针对特定企业的定制化架构</td></tr>\n<tr><td>18</td><td>Architecture Capability</td><td>架构能力</td><td>企业有效开发和使用架构的能力</td></tr>\n<tr><td>19</td><td>Architecture Governance</td><td>架构治理</td><td>对架构开发和使用进行控制的实践与流程</td></tr>\n<tr><td>20</td><td>Architecture Board</td><td>架构委员会</td><td>负责审批架构、监督架构合规的跨职能委员会</td></tr>\n<tr><td>21</td><td>Architecture Compliance</td><td>架构合规</td><td>实施项目符合既定架构标准和原则的程度</td></tr>\n<tr><td>22</td><td>Architecture Contract</td><td>架构合同</td><td>开发伙伴和赞助商之间对架构交付物的共同协议</td></tr>\n<tr><td>23</td><td>Architecture Principles</td><td>架构原则</td><td>指导架构决策的持久性规则和准则</td></tr>\n<tr><td>24</td><td>PESTLE</td><td>宏观环境分析</td><td>政治/经济/社会/技术/法律/环境六维度外部环境分析</td></tr>\n<tr><td>25</td><td>Gap Analysis</td><td>差距分析</td><td>识别基线架构与目标架构之间差异的分析方法</td></tr>\n<tr><td>26</td><td>Migration Planning</td><td>迁移规划</td><td>制定从基线架构迁移到目标架构的详细计划（Phase F）</td></tr>\n<tr><td>27</td><td>Architecture Partition</td><td>架构分区</td><td>将整体架构划分为可管理子集的技术</td></tr>\n<tr><td>28</td><td>Segmented Architecture</td><td>分段架构</td><td>针对特定业务分段/能力的详细架构</td></tr>\n<tr><td>29</td><td>TRM (Technical Reference Model)</td><td>技术参考模型</td><td>TOGAF提供的通用技术服务分类参考模型</td></tr>\n<tr><td>30</td><td>III-RM (Integrated Information Infrastructure Reference Model)</td><td>集成信息基础设施参考模型</td><td>支持无边界信息流的参考模型</td></tr>\n<tr><td>31</td><td>Architecture Description</td><td>架构描述</td><td>对架构的完整正式描述文档</td></tr>\n<tr><td>32</td><td>Work Package</td><td>工作包</td><td>可独立实施的变更单元，包含相关项目和活动</td></tr>\n<tr><td>33</td><td>Baseline Architecture</td><td>基线架构（现状架构）</td><td>企业当前状态的架构描述（As-Is）</td></tr>\n<tr><td>34</td><td>Target Architecture</td><td>目标架构</td><td>企业期望达到的未来状态架构描述（To-Be）</td></tr>\n<tr><td>35</td><td>Transition Architecture</td><td>过渡架构</td><td>从基线到目标之间的中间状态架构</td></tr>\n<tr><td>36</td><td>Capability Architecture</td><td>能力架构</td><td>支撑特定业务能力交付的详细架构</td></tr>\n<tr><td>37</td><td>Solutions Continuum</td><td>解决方案连续体</td><td>从通用产品到企业专属实现的分类体系</td></tr>\n<tr><td>38</td><td>Enterprise Continuum</td><td>企业连续体</td><td>架构连续体与解决方案连续体的统称</td></tr>\n<tr><td>39</td><td>Architecture Definition Document</td><td>架构定义文档</td><td>描述基线和目标架构的核心交付物</td></tr>\n<tr><td>40</td><td>Requirements Impact Assessment</td><td>需求影响评估</td><td>评估新需求对现有架构影响的分析</td></tr>\n<tr><td>41</td><td>Implementation and Migration Plan</td><td>实施与迁移计划</td><td>指导从当前架构迁移到目标架构的行动计划</td></tr>\n<tr><td>42</td><td>Statement of Architecture Work</td><td>架构工作说明书</td><td>定义架构项目范围和方法的正式文件（Phase A批准）</td></tr>\n</table></div>\n\n<hr>\n\n<h2 id=\"第五章-四大架构域详解\">第五章：四大架构域详解</h2>\n\n<h3 id=\"5-1-业务架构-Business-Architecture-\">5.1 业务架构（Business Architecture）</h3>\n\n<p><strong>定义：</strong> 描述企业的业务战略、治理结构、组织设计和关键业务流程，是其他三个架构域的基础和驱动力。</p>\n\n<p><strong>主要关注点：</strong></p>\n<ul>\n<li>业务战略与目标</li>\n<li>组织结构与职责</li>\n<li>业务流程与价值链</li>\n<li>业务能力（Business Capability）</li>\n<li>业务信息需求</li>\n<li>治理模型</li>\n</ul>\n\n<p><strong>典型制品（Artifacts）：</strong></p>\n\n<div class=\"tbl\"><table>\n<tr><th>制品类型</th><th>具体制品</th></tr>\n<tr><td>目录（Catalog）</td><td>业务服务/功能目录、组织/角色目录</td></tr>\n<tr><td>矩阵（Matrix）</td><td>业务交互矩阵、执行者/角色矩阵</td></tr>\n<tr><td>图表（Diagram）</td><td>业务场景图、价值链图、组织架构图、流程流图</td></tr>\n</table></div>\n\n<p><strong>在SAP项目中的对应内容（以佛山照明ECC升级为例）：</strong></p>\n<ul>\n<li>核心业务流程：采购到付款（P2P）、订单到收款（O2C）、计划到生产（P2P）</li>\n<li>组织架构：集团公司 → 工厂 → 成本中心</li>\n<li>当前模块：FICO/SD/MM/PP/QM/WM，业务范围清晰</li>\n</ul>\n\n<h3 id=\"5-2-应用架构-Application-Architecture-\">5.2 应用架构（Application Architecture）</h3>\n\n<p><strong>定义：</strong> 描述企业的各个应用系统（软件组件）蓝图，以及这些应用之间的交互关系，说明哪些应用支撑哪些业务功能。</p>\n\n<p><strong>主要关注点：</strong></p>\n<ul>\n<li>应用系统目录与分类</li>\n<li>应用间接口与集成</li>\n<li>应用与业务功能的映射关系</li>\n<li>应用组合管理（Application Portfolio）</li>\n<li>应用生命周期</li>\n</ul>\n\n<p><strong>典型制品：</strong></p>\n\n<div class=\"tbl\"><table>\n<tr><th>制品类型</th><th>具体制品</th></tr>\n<tr><td>目录（Catalog）</td><td>应用/用户位置目录、应用系统清单</td></tr>\n<tr><td>矩阵（Matrix）</td><td>应用与组织交互矩阵、应用与功能矩阵</td></tr>\n<tr><td>图表（Diagram）</td><td>应用通信图、应用与用户位置图、企业服务总线图</td></tr>\n</table></div>\n\n<p><strong>在SAP项目中的对应内容：</strong></p>\n<ul>\n<li>核心应用：SAP ECC 6.0（目标：S/4HANA 2023）</li>\n<li>集成应用：MES系统、WMS仓储系统、EDI接口</li>\n<li>升级路径：ECC → S/4HANA（Central Finance或Greenfield/Brownfield选型）</li>\n</ul>\n\n<h3 id=\"5-3-数据架构-Data-Architecture-\">5.3 数据架构（Data Architecture）</h3>\n\n<p><strong>定义：</strong> 描述企业的逻辑数据资产结构、数据管理方式和数据治理体系，确保数据作为企业战略资产被有效管理。</p>\n\n<p><strong>主要关注点：</strong></p>\n<ul>\n<li>数据实体与数据模型</li>\n<li>数据所有权与管理职责</li>\n<li>数据质量标准</li>\n<li>主数据管理（MDM）</li>\n<li>数据安全与隐私</li>\n<li>数据迁移策略</li>\n</ul>\n\n<p><strong>典型制品：</strong></p>\n\n<div class=\"tbl\"><table>\n<tr><th>制品类型</th><th>具体制品</th></tr>\n<tr><td>目录（Catalog）</td><td>数据实体/数据组件目录</td></tr>\n<tr><td>矩阵（Matrix）</td><td>数据实体/业务功能矩阵、应用/数据矩阵</td></tr>\n<tr><td>图表（Diagram）</td><td>概念数据图、逻辑数据图、数据传播图</td></tr>\n</table></div>\n\n<p><strong>在SAP项目中的对应内容：</strong></p>\n<ul>\n<li>主数据：物料主数据（Material Master）、客户/供应商主数据</li>\n<li>数据迁移：LSMW/BAPI方式从ECC迁移到S/4HANA</li>\n<li>数据治理：主数据治理平台（MDG）规划</li>\n</ul>\n\n<h3 id=\"5-4-技术架构-Technology-Architecture-\">5.4 技术架构（Technology Architecture）</h3>\n\n<p><strong>定义：</strong> 描述支撑业务、应用和数据的软硬件技术基础设施，包括服务器、网络、操作系统、数据库、中间件等。</p>\n\n<p><strong>主要关注点：</strong></p>\n<ul>\n<li>硬件基础设施（服务器、存储、网络）</li>\n<li>软件基础设施（操作系统、数据库、中间件）</li>\n<li>云计算平台（公有云、私有云、混合云）</li>\n<li>安全基础设施</li>\n<li>高可用与灾备架构</li>\n<li>技术标准与规范</li>\n</ul>\n\n<p><strong>典型制品：</strong></p>\n\n<div class=\"tbl\"><table>\n<tr><th>制品类型</th><th>具体制品</th></tr>\n<tr><td>目录（Catalog）</td><td>技术标准目录、技术组合清单</td></tr>\n<tr><td>矩阵（Matrix）</td><td>应用/技术矩阵</td></tr>\n<tr><td>图表（Diagram）</td><td>环境与位置图、平台分解图、网络计算图、通信工程图</td></tr>\n</table></div>\n\n<p><strong>在SAP项目中的对应内容：</strong></p>\n<ul>\n<li>当前：本地化部署（On-Premise），SAP ECC on HANA 或 传统DB</li>\n<li>目标：SAP RISE with SAP（云部署）或 On-Premise S/4HANA on HANA DB</li>\n<li>基础设施：高可用集群（HA）、灾备（DR）、备份策略</li>\n</ul>\n\n<hr>\n\n<h2 id=\"第六章-TOGAF制品体系-Artifacts-\">第六章：TOGAF制品体系（Artifacts）</h2>\n\n<h3 id=\"6-1-制品三大类型\">6.1 制品三大类型</h3>\n\n<p>TOGAF 架构制品分为三类，这是<strong>高频考点</strong>：</p>\n\n<div class=\"tbl\"><table>\n<tr><th>类型</th><th>英文</th><th>定义</th><th>示例</th></tr>\n<tr><td><strong>目录</strong></td><td>Catalog</td><td>架构相关元素的列表清单</td><td>应用系统清单、技术标准目录</td></tr>\n<tr><td><strong>矩阵</strong></td><td>Matrix</td><td>显示两个或多个模型元素之间关系的表格</td><td>应用与业务功能映射矩阵</td></tr>\n<tr><td><strong>图表</strong></td><td>Diagram</td><td>以图形方式呈现架构的可视化表达</td><td>流程图、组织架构图、网络拓扑图</td></tr>\n</table></div>\n\n<h3 id=\"6-2-各阶段代表性制品\">6.2 各阶段代表性制品</h3>\n\n<div class=\"tbl\"><table>\n<tr><th>ADM Phase</th><th>代表性制品</th></tr>\n<tr><td>Preliminary</td><td>架构原则目录、架构框架文件</td></tr>\n<tr><td>Phase A</td><td>架构愿景文档、Statement of Architecture Work、利益相关者地图</td></tr>\n<tr><td>Phase B</td><td>组织/角色目录、业务流程图、业务场景、价值链图、业务交互矩阵</td></tr>\n<tr><td>Phase C（应用）</td><td>应用组合目录、应用通信图、应用与业务功能矩阵</td></tr>\n<tr><td>Phase C（数据）</td><td>数据实体目录、概念数据模型、数据传播图</td></tr>\n<tr><td>Phase D</td><td>技术标准目录、平台分解图、应用/技术矩阵、网络拓扑图</td></tr>\n<tr><td>Phase E</td><td>差距分析文档、解决方案概念图、架构路线图（初版）</td></tr>\n<tr><td>Phase F</td><td>实施与迁移计划、工作包目录、迁移计划</td></tr>\n<tr><td>Phase G</td><td>架构合规评估报告、变更请求</td></tr>\n<tr><td>Phase H</td><td>架构变更日志、变更影响评估</td></tr>\n</table></div>\n\n<h3 id=\"6-3-三个重要概念的区别-高频考点-\">6.3 三个重要概念的区别（高频考点）</h3>\n\n<p>这是考试常考的辨析题，必须清晰区分：</p>\n\n<div class=\"tbl\"><table>\n<tr><th>概念</th><th>英文</th><th>定义</th><th>关键特征</th><th>示例</th></tr>\n<tr><td><strong>交付物</strong></td><td>Deliverable</td><td>合同规定必须提交的工作成果</td><td>受合同约束，经正式审查批准</td><td>架构愿景文档、迁移计划</td></tr>\n<tr><td><strong>制品</strong></td><td>Artifact</td><td>描述架构某个方面的细粒度文档</td><td>交付物的组成部分</td><td>数据流图、应用清单</td></tr>\n<tr><td><strong>构建块</strong></td><td>Building Block</td><td>可重用的功能组件（ABB或SBB）</td><td>强调可重用性</td><td>认证服务组件、ERP系统</td></tr>\n</table></div>\n\n<p><strong>关系：</strong> 交付物 = 一个或多个制品的集合；制品描述架构的某个视角；构建块是架构中可复用的功能单元。</p>\n\n<p><strong>ABB vs SBB 辨析：</strong></p>\n\n<div class=\"tbl\"><table>\n<tr><th></th><th>ABB（Architecture Building Block）</th><th>SBB（Solution Building Block）</th></tr>\n<tr><td>抽象程度</td><td>高（抽象，不指定实现）</td><td>低（具体，指定实现方式）</td></tr>\n<tr><td>关注点</td><td>定义功能需求（What）</td><td>定义具体实现（How/Which）</td></tr>\n<tr><td>示例</td><td>&quot;消息中间件服务&quot;</td><td>&quot;SAP Integration Suite&quot;</td></tr>\n<tr><td>来源</td><td>架构定义</td><td>产品选型/采购</td></tr>\n</table></div>\n\n<hr>\n\n<h2 id=\"第七章-架构原则-Architecture-Principles-\">第七章：架构原则（Architecture Principles）</h2>\n\n<h3 id=\"7-1-原则的5要素-高频考点-\">7.1 原则的5要素（高频考点）</h3>\n\n<p>TOGAF 规定每条架构原则必须包含以下5个组成部分：</p>\n\n<div class=\"tbl\"><table>\n<tr><th>要素</th><th>英文</th><th>说明</th></tr>\n<tr><td><strong>名称</strong></td><td>Name</td><td>简洁易记的名称，代表原则核心意图</td></tr>\n<tr><td><strong>陈述</strong></td><td>Statement</td><td>清晰、明确的原则内容陈述（一句话）</td></tr>\n<tr><td><strong>理由</strong></td><td>Rationale</td><td>说明为什么需要这条原则，其业务价值</td></tr>\n<tr><td><strong>影响</strong></td><td>Implications</td><td>遵守该原则的代价与影响（资源、能力等）</td></tr>\n<tr><td><strong>度量标准</strong></td><td>Metrics（部分版本未单独列出）</td><td>如何衡量原则的遵守程度</td></tr>\n</table></div>\n\n<blockquote><p>注：TOGAF Standard官方定义为4要素（Name/Statement/Rationale/Implications），但考试中需知晓各要素作用。</p></blockquote>\n\n<h3 id=\"7-2-典型架构原则示例\">7.2 典型架构原则示例</h3>\n\n<p>以下8条为考试常见示例，覆盖各架构域：</p>\n\n<p><strong>原则1：业务驱动（Business-Driven）</strong></p>\n<ul>\n<li><strong>陈述：</strong> 所有IT决策必须基于明确的业务价值和业务需求</li>\n<li><strong>理由：</strong> 确保IT投资与企业战略目标一致</li>\n<li><strong>影响：</strong> 业务与IT需要建立有效的沟通协作机制</li>\n</ul>\n\n<p><strong>原则2：数据是共享资产（Data is a Shared Asset）</strong></p>\n<ul>\n<li><strong>陈述：</strong> 企业数据由整个组织共享，不归属于特定业务单元</li>\n<li><strong>理由：</strong> 消除数据孤岛，提高数据利用率</li>\n<li><strong>影响：</strong> 需要建立统一的数据治理体系和访问控制机制</li>\n</ul>\n\n<p><strong>原则3：技术独立性（Technology Independence）</strong></p>\n<ul>\n<li><strong>陈述：</strong> 应用系统不应依赖特定的硬件或操作系统平台</li>\n<li><strong>理由：</strong> 降低供应商锁定风险，提高可移植性</li>\n<li><strong>影响：</strong> 增加初期开发成本，需要采用标准接口</li>\n</ul>\n\n<p><strong>原则4：易于使用（Ease-of-Use）</strong></p>\n<ul>\n<li><strong>陈述：</strong> 应用系统设计应简单易用，降低用户学习成本</li>\n<li><strong>理由：</strong> 提高用户采纳率，降低培训成本</li>\n<li><strong>影响：</strong> 需要加大UI/UX设计投入</li>\n</ul>\n\n<p><strong>原则5：可重用性（Reuse Before Buy, Buy Before Build）</strong></p>\n<ul>\n<li><strong>陈述：</strong> 优先复用现有架构组件，其次采购成熟产品，最后自主开发</li>\n<li><strong>理由：</strong> 降低成本，加快交付，减少重复劳动</li>\n<li><strong>影响：</strong> 需要建立组件库和架构知识库</li>\n</ul>\n\n<p><strong>原则6：安全性（Security as a Foundational Layer）</strong></p>\n<ul>\n<li><strong>陈述：</strong> 安全架构必须嵌入所有系统设计，而非事后补充</li>\n<li><strong>理由：</strong> 事后修补安全漏洞代价远高于设计阶段内置</li>\n<li><strong>影响：</strong> 增加设计复杂度和初期成本</li>\n</ul>\n\n<p><strong>原则7：互操作性（Interoperability）</strong></p>\n<ul>\n<li><strong>陈述：</strong> 所有系统必须基于开放标准接口，支持与其他系统的互联互通</li>\n<li><strong>理由：</strong> 避免系统孤岛，支持业务流程跨系统协作</li>\n<li><strong>影响：</strong> 需要制定接口标准，开展集成测试</li>\n</ul>\n\n<p><strong>原则8：持续改进（Continuous Improvement）</strong></p>\n<ul>\n<li><strong>陈述：</strong> 架构必须支持渐进式演进，而非大规模一次性替换</li>\n<li><strong>理由：</strong> 降低变革风险，适应快速变化的业务需求</li>\n<li><strong>影响：</strong> 系统设计需考虑向后兼容性和模块化</li>\n</ul>\n\n<h3 id=\"7-3-架构原则的层级关系\">7.3 架构原则的层级关系</h3>\n\n<pre><code>企业原则（Enterprise Principles）\n    ↓ 派生\nIT原则（IT Principles）\n    ↓ 细化\n架构原则（Architecture Principles）\n    ↓ 指导\n设计决策（Design Decisions）</code></pre>\n\n<hr>\n\n<h2 id=\"第八章-利益相关者管理\">第八章：利益相关者管理</h2>\n\n<h3 id=\"8-1-利益相关者分类\">8.1 利益相关者分类</h3>\n\n<p>TOGAF 将利益相关者（Stakeholder）定义为：<strong>对系统架构有利益关系或被架构所影响的个人、团队或组织</strong>。</p>\n\n<p><strong>按组织层级分类：</strong></p>\n\n<div class=\"tbl\"><table>\n<tr><th>类别</th><th>典型角色</th><th>主要关切（Concern）</th></tr>\n<tr><td>高层管理</td><td>CEO、CFO、COO、CIO</td><td>战略对齐、ROI、风险管控、合规</td></tr>\n<tr><td>业务管理</td><td>业务部门负责人、流程负责人</td><td>业务效率、流程优化、功能完整性</td></tr>\n<tr><td>IT管理</td><td>IT总监、项目经理、架构师</td><td>技术可行性、成本、交付周期</td></tr>\n<tr><td>IT运营</td><td>系统管理员、DBA、运维工程师</td><td>系统稳定性、可维护性、性能</td></tr>\n<tr><td>最终用户</td><td>业务操作人员</td><td>易用性、响应速度、功能实用性</td></tr>\n<tr><td>外部相关方</td><td>审计机构、监管机构、合作伙伴</td><td>合规性、接口标准、数据安全</td></tr>\n</table></div>\n\n<p><strong>考试常考的3类利益相关者角色：</strong></p>\n<ul>\n<li><strong>赞助商（Sponsor）</strong>：提供资金和授权，通常是C级高管</li>\n<li><strong>架构委员会（Architecture Board）</strong>：审批架构决策的跨职能委员会</li>\n<li><strong>项目经理（Project Manager）</strong>：负责实施层面的交付</li>\n</ul>\n\n<h3 id=\"8-2-关切-Concern-的定义\">8.2 关切（Concern）的定义</h3>\n\n<p><strong>Concern（关切）</strong> 是利益相关者认为对系统重要的<strong>任何兴趣点</strong>，包括但不限于：</p>\n\n<ul>\n<li>功能性：系统能做什么（What it does）</li>\n<li>性能：响应速度有多快</li>\n<li>安全性：谁可以访问什么</li>\n<li>可用性：系统何时可用</li>\n<li>可维护性：多容易维护</li>\n<li>成本：总拥有成本是多少</li>\n<li>合规性：是否满足法规要求</li>\n<li>互操作性：能否与其他系统集成</li>\n</ul>\n\n<blockquote><p><strong>关键区分：</strong> 关切（Concern）是需求的原始来源；需求（Requirement）是对关切的具体化描述。</p></blockquote>\n\n<h3 id=\"8-3-视点-Viewpoint-vs-视图-View-\">8.3 视点（Viewpoint）vs 视图（View）</h3>\n\n<p>这是<strong>必考辨析题</strong>，需要清晰区分：</p>\n\n<div class=\"tbl\"><table>\n<tr><th>概念</th><th>英文</th><th>定义</th><th>类比</th></tr>\n<tr><td><strong>视点</strong></td><td>Viewpoint</td><td>创建和使用视图的约定、规则和方法，是视图的&quot;模板&quot;或&quot;规范&quot;</td><td>拍照的规则（用什么镜头、角度、参数）</td></tr>\n<tr><td><strong>视图</strong></td><td>View</td><td>从特定视点出发，针对特定利益相关者关切，对架构的具体表达</td><td>按规则实际拍出来的照片</td></tr>\n</table></div>\n\n<p><strong>关系：</strong></p>\n<ul>\n<li>一个视点可以产生多个视图</li>\n<li>视图是视点的实例化（instantiation）</li>\n<li>每个视图对应特定的利益相关者和关切</li>\n</ul>\n\n<p><strong>示例：</strong></p>\n\n<div class=\"tbl\"><table>\n<tr><th>视点名称</th><th>对应利益相关者</th><th>关切</th><th>产生的视图</th></tr>\n<tr><td>业务流程视点</td><td>业务部门负责人</td><td>流程效率</td><td>端到端流程流图</td></tr>\n<tr><td>系统上下文视点</td><td>解决方案架构师</td><td>系统边界与接口</td><td>系统上下文图</td></tr>\n<tr><td>部署视点</td><td>IT运维</td><td>部署环境与配置</td><td>部署架构图</td></tr>\n<tr><td>安全视点</td><td>CIO/安全官</td><td>访问控制与安全</td><td>安全架构图</td></tr>\n</table></div>\n\n<h3 id=\"8-4-利益相关者地图-Stakeholder-Map-\">8.4 利益相关者地图（Stakeholder Map）</h3>\n\n<p>利益相关者地图用于识别和分析利益相关者，通常使用 <strong>权力/兴趣矩阵（Power/Interest Matrix）</strong>：</p>\n\n<pre><code>高权力  │  重点管理          │  密切关注\n        │（高权力/低兴趣）   │（高权力/高兴趣）\n        │  如：CFO           │  如：CIO、业务赞助商\n        ├────────────────────┼────────────────────\n        │  持续监控          │  保持满意\n        │（低权力/低兴趣）   │（低权力/高兴趣）\n低权力  │  如：审计人员      │  如：最终用户\n        └────────────────────┴────────────────────\n              低兴趣                   高兴趣</code></pre>\n\n<p><strong>利益相关者管理四步骤：</strong></p>\n<ol>\n<li><strong>识别（Identify）</strong>：列出所有相关的个人和组织</li>\n<li><strong>分类（Classify）</strong>：按权力/兴趣、关切类型分类</li>\n<li><strong>关切分析（Analyze Concerns）</strong>：明确每类利益相关者的关切</li>\n<li><strong>视图规划（Plan Views）</strong>：确定需要为哪些利益相关者创建哪些视图</li>\n</ol>\n\n<h3 id=\"8-5-架构治理中的利益相关者参与\">8.5 架构治理中的利益相关者参与</h3>\n\n<div class=\"tbl\"><table>\n<tr><th>ADM Phase</th><th>利益相关者主要参与活动</th></tr>\n<tr><td>Preliminary</td><td>确定治理框架，建立架构委员会</td></tr>\n<tr><td>Phase A</td><td>识别利益相关者，定义关切，获取架构工作授权</td></tr>\n<tr><td>Phase B-D</td><td>验证架构满足利益相关者关切，评审架构视图</td></tr>\n<tr><td>Phase E-F</td><td>优先级排序，确认迁移计划</td></tr>\n<tr><td>Phase G</td><td>监督实施合规性</td></tr>\n<tr><td>Phase H</td><td>接受变更请求，评估变更影响</td></tr>\n</table></div>\n\n<hr>\n\n<h2 id=\"附录-Level-1-考试高频考点汇总\">附录：Level 1 考试高频考点汇总</h2>\n\n<h3 id=\"必背清单\">必背清单</h3>\n\n<div class=\"tbl\"><table>\n<tr><th>知识点</th><th>重要程度</th><th>关键记忆点</th></tr>\n<tr><td>四大架构域</td><td>★★★★★</td><td>BADT：Business/Application/Data/Technology</td></tr>\n<tr><td>ADM各Phase名称和顺序</td><td>★★★★★</td><td>Preliminary → A → B → C → D → E → F → G → H</td></tr>\n<tr><td>ABB vs SBB</td><td>★★★★★</td><td>ABB=抽象，SBB=具体实现</td></tr>\n<tr><td>Deliverable vs Artifact vs Building Block</td><td>★★★★★</td><td>交付物&gt;制品，Building Block强调可重用</td></tr>\n<tr><td>Viewpoint vs View</td><td>★★★★★</td><td>Viewpoint=模板，View=实例</td></tr>\n<tr><td>Concern（关切）</td><td>★★★★☆</td><td>利益相关者认为重要的系统特性</td></tr>\n<tr><td>Architecture Continuum层次</td><td>★★★★☆</td><td>Foundation→Common Systems→Industry→Org-Specific</td></tr>\n<tr><td>架构原则5要素</td><td>★★★★☆</td><td>Name/Statement/Rationale/Implications</td></tr>\n<tr><td>Gap Analysis</td><td>★★★★☆</td><td>基线架构 vs 目标架构 = 差距</td></tr>\n<tr><td>Requirements Management</td><td>★★★☆☆</td><td>贯穿所有Phase的持续过程</td></tr>\n</table></div>\n\n<h3 id=\"常见易错点\">常见易错点</h3>\n\n<ol>\n<li><strong>Requirements Management 不是一个Phase</strong>，而是贯穿所有Phase的持续过程</li>\n<li><strong>Phase C 包含两个子Phase</strong>：应用架构（C1）和数据架构（C2）</li>\n<li><strong>TOGAF不规定架构原则的具体内容</strong>，只规定原则的结构（4/5要素）</li>\n<li><strong>ABB在架构层定义，SBB在解决方案层实现</strong>，两者是实现关系</li>\n<li><strong>Architecture Landscape 是快照</strong>，Architecture Repository 是存储库</li>\n<li><strong>Viewpoint先于View存在</strong>，View是Viewpoint的实例化结果</li>\n<li><strong>TOGAF Standard 10</strong> 中TRM/III-RM已移至独立指南，不在核心文档中</li>\n</ol>\n\n<hr>\n\n<p><em>本手册基于 TOGAF Standard Version 10 编写，适用于 TOGAF Foundation（Level 1）认证考试备考。</em></p>\n<p><em>字数：约 5,800 字（含表格内容）</em></p>\n", "02": "<h1 id=\"TOGAF-ADM-详解-阶段逐一拆解\">TOGAF ADM 详解：阶段逐一拆解</h1>\n\n<blockquote><p>适用范围：TOGAF 9.2 Level 1 + Level 2 认证备考</p>\n<p>写作语言：中文（专业术语保留英文）</p>\n<p>最后更新：2026-06-21</p></blockquote>\n\n<hr>\n\n<h2 id=\"目录\">目录</h2>\n\n<ol>\n<li><a href=\"#adm总览\" target=\"_blank\">ADM总览</a></li>\n<li><a href=\"#preliminary-phase架构能力建设\" target=\"_blank\">Preliminary Phase：架构能力建设</a></li>\n<li><a href=\"#phase-a架构愿景\" target=\"_blank\">Phase A：Architecture Vision（架构愿景）</a></li>\n<li><a href=\"#phase-b业务架构\" target=\"_blank\">Phase B：Business Architecture（业务架构）</a></li>\n<li><a href=\"#phase-c信息系统架构\" target=\"_blank\">Phase C：Information Systems Architecture（信息系统架构）</a></li>\n<li><a href=\"#phase-d技术架构\" target=\"_blank\">Phase D：Technology Architecture（技术架构）</a></li>\n<li><a href=\"#phase-e机会与解决方案\" target=\"_blank\">Phase E：Opportunities and Solutions（机会与解决方案）</a></li>\n<li><a href=\"#phase-f迁移规划\" target=\"_blank\">Phase F：Migration Planning（迁移规划）</a></li>\n<li><a href=\"#phase-g实施治理\" target=\"_blank\">Phase G：Implementation Governance（实施治理）</a></li>\n<li><a href=\"#phase-h架构变更管理\" target=\"_blank\">Phase H：Architecture Change Management（架构变更管理）</a></li>\n<li><a href=\"#requirements-management需求管理\" target=\"_blank\">Requirements Management（需求管理）</a></li>\n<li><a href=\"#adm迭代模式\" target=\"_blank\">ADM迭代模式</a></li>\n<li><a href=\"#gap-analysis方法\" target=\"_blank\">Gap Analysis方法</a></li>\n<li><a href=\"#架构路线图architecture-roadmap\" target=\"_blank\">架构路线图（Architecture Roadmap）</a></li>\n</ol>\n\n<hr>\n\n<h2 id=\"ADM总览\">ADM总览</h2>\n\n<p>TOGAF ADM（Architecture Development Method）是TOGAF框架的核心，是一套经过验证的、可重复使用的企业架构开发方法。ADM描述了如何建立企业特定的架构框架、如何填充内容，以及如何使用已建立的架构满足业务需求。</p>\n\n<h3 id=\"ADM循环结构\">ADM循环结构</h3>\n\n<p>ADM以循环方式运作，分为以下几个层次：</p>\n\n<pre><code>Preliminary Phase（前期准备）\n        ↓\nPhase A → Phase B → Phase C → Phase D（架构定义阶段）\n        ↓\nPhase E → Phase F（过渡规划阶段）\n        ↓\nPhase G → Phase H（治理与管理阶段）\n        ↑_________________________↑\n         需求管理（贯穿所有阶段）</code></pre>\n\n<p><strong>ADM的三个核心迭代维度：</strong></p>\n<ul>\n<li><strong>Architecture Iteration（架构迭代）</strong>：在A→D阶段内精化架构定义</li>\n<li><strong>Transition Planning Iteration（过渡规划迭代）</strong>：在E→F阶段优化实施路径</li>\n<li><strong>Architecture Governance Iteration（治理迭代）</strong>：在G→H阶段管理变更</li>\n</ul>\n\n<p><strong>关键原则：</strong></p>\n<p>ADM并非严格线性流程，可根据企业规模、成熟度和需求进行裁剪（Tailoring）。每个Phase结束时都需要通过Architecture Review确认是否进入下一阶段。</p>\n\n<hr>\n\n\n<div style=\"margin:20px 0 28px;background:#fff;border-radius:8px;padding:22px 24px;box-shadow:0 2px 12px rgba(30,58,138,.1)\">\n  <p style=\"font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px\">TOGAF ADM 循环图（Architecture Development Method）</p>\n  <svg viewBox=\"0 0 460 460\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:460px;display:block;margin:0 auto\">\n    <!-- 外圆 -->\n    <circle cx=\"230\" cy=\"230\" r=\"200\" fill=\"#eff6ff\" stroke=\"#bfdbfe\" stroke-width=\"2\"/>\n    <!-- 中心圆：需求管理 -->\n    <circle cx=\"230\" cy=\"230\" r=\"58\" fill=\"#1e3a8a\"/>\n    <text x=\"230\" y=\"224\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#fff\" font-family=\"Arial\" font-weight=\"700\">需求管理</text>\n    <text x=\"230\" y=\"238\" text-anchor=\"middle\" font-size=\"9\" fill=\"#bfdbfe\" font-family=\"Arial\">Requirements</text>\n    <text x=\"230\" y=\"250\" text-anchor=\"middle\" font-size=\"9\" fill=\"#bfdbfe\" font-family=\"Arial\">Management</text>\n\n    <!-- 8个ADM阶段扇形 + 标签 -->\n    <!-- Preliminary -->\n    <path d=\"M230,230 L230,32 A198,198 0 0,1 370,110 Z\" fill=\"#1d4ed8\" opacity=\".85\"/>\n    <text x=\"318\" y=\"90\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-family=\"Arial\" font-weight=\"700\" transform=\"rotate(22,318,90)\">Prelim</text>\n    <text x=\"325\" y=\"103\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#bfdbfe\" font-family=\"Arial\" transform=\"rotate(22,325,103)\">架构能力建设</text>\n\n    <!-- Phase A -->\n    <path d=\"M230,230 L370,110 A198,198 0 0,1 428,230 Z\" fill=\"#2563eb\" opacity=\".85\"/>\n    <text x=\"393\" y=\"178\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-family=\"Arial\" font-weight=\"700\" transform=\"rotate(67,393,178)\">Phase A</text>\n    <text x=\"405\" y=\"193\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#bfdbfe\" font-family=\"Arial\" transform=\"rotate(67,405,193)\">架构愿景</text>\n\n    <!-- Phase B -->\n    <path d=\"M230,230 L428,230 A198,198 0 0,1 370,350 Z\" fill=\"#3b82f6\" opacity=\".85\"/>\n    <text x=\"393\" y=\"287\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-family=\"Arial\" font-weight=\"700\" transform=\"rotate(113,393,287)\">Phase B</text>\n    <text x=\"400\" y=\"302\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#bfdbfe\" font-family=\"Arial\" transform=\"rotate(113,400,302)\">业务架构</text>\n\n    <!-- Phase C -->\n    <path d=\"M230,230 L370,350 A198,198 0 0,1 230,428 Z\" fill=\"#60a5fa\" opacity=\".85\"/>\n    <text x=\"316\" y=\"388\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-family=\"Arial\" font-weight=\"700\" transform=\"rotate(158,316,388)\">Phase C</text>\n    <text x=\"310\" y=\"402\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#1e3a8a\" font-family=\"Arial\" transform=\"rotate(158,310,402)\">信息系统架构</text>\n\n    <!-- Phase D -->\n    <path d=\"M230,230 L230,428 A198,198 0 0,1 90,350 Z\" fill=\"#93c5fd\" opacity=\".9\"/>\n    <text x=\"150\" y=\"395\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#1e3a8a\" font-family=\"Arial\" font-weight=\"700\" transform=\"rotate(-158,150,395)\">Phase D</text>\n    <text x=\"148\" y=\"408\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#1e40af\" font-family=\"Arial\" transform=\"rotate(-158,148,408)\">技术架构</text>\n\n    <!-- Phase E -->\n    <path d=\"M230,230 L90,350 A198,198 0 0,1 32,230 Z\" fill=\"#60a5fa\" opacity=\".85\"/>\n    <text x=\"67\" y=\"292\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-family=\"Arial\" font-weight=\"700\" transform=\"rotate(-113,67,292)\">Phase E</text>\n    <text x=\"62\" y=\"307\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#bfdbfe\" font-family=\"Arial\" transform=\"rotate(-113,62,307)\">机会与解决方案</text>\n\n    <!-- Phase F -->\n    <path d=\"M230,230 L32,230 A198,198 0 0,1 90,110 Z\" fill=\"#3b82f6\" opacity=\".85\"/>\n    <text x=\"67\" y=\"170\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-family=\"Arial\" font-weight=\"700\" transform=\"rotate(-67,67,170)\">Phase F</text>\n    <text x=\"60\" y=\"185\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#bfdbfe\" font-family=\"Arial\" transform=\"rotate(-67,60,185)\">迁移规划</text>\n\n    <!-- Phase G -->\n    <path d=\"M230,230 L90,110 A198,198 0 0,1 230,32 Z\" fill=\"#2563eb\" opacity=\".85\"/>\n    <text x=\"148\" y=\"87\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#fff\" font-family=\"Arial\" font-weight=\"700\" transform=\"rotate(-22,148,87)\">Phase G</text>\n    <text x=\"142\" y=\"100\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"#bfdbfe\" font-family=\"Arial\" transform=\"rotate(-22,142,100)\">实施治理</text>\n\n    <!-- Phase H 标注在外圈 -->\n    <text x=\"230\" y=\"14\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"#1e3a8a\" font-family=\"Arial\" font-weight=\"700\">Phase H · 架构变更管理</text>\n\n    <!-- 循环箭头（外圈虚线）-->\n    <circle cx=\"230\" cy=\"230\" r=\"218\" fill=\"none\" stroke=\"#93c5fd\" stroke-width=\"2\" stroke-dasharray=\"8,6\"/>\n    <!-- 顺时针箭头提示 -->\n    <text x=\"440\" y=\"235\" text-anchor=\"middle\" font-size=\"18\" fill=\"#3b82f6\">↻</text>\n  </svg>\n  <p style=\"font-size:11px;color:#64748b;text-align:center;margin-top:8px\">ADM是迭代循环，不是线性流程 · 各Phase可根据项目需要裁剪和适配</p>\n</div>\n<div style=\"margin:20px 0 28px;background:#fff;border-radius:8px;padding:20px 24px;box-shadow:0 2px 12px rgba(30,58,138,.1)\">\n  <p style=\"font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px\">ADM 各阶段核心任务速查</p>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px\">\n    <div style=\"border-left:4px solid #1e3a8a;background:#eff6ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n      <div style=\"font-size:11px;font-weight:800;color:#1e3a8a\">Preliminary</div>\n      <div style=\"font-size:9.5px;color:#475569;margin-top:3px;line-height:1.6\">建立架构能力<br>定义原则与范围<br>设立架构委员会</div>\n    </div>\n    <div style=\"border-left:4px solid #1d4ed8;background:#eff6ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n      <div style=\"font-size:11px;font-weight:800;color:#1d4ed8\">Phase A · 愿景</div>\n      <div style=\"font-size:9.5px;color:#475569;margin-top:3px;line-height:1.6\">确定范围与约束<br>识别利益相关者<br>创建架构愿景</div>\n    </div>\n    <div style=\"border-left:4px solid #2563eb;background:#eff6ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n      <div style=\"font-size:11px;font-weight:800;color:#2563eb\">Phase B · 业务</div>\n      <div style=\"font-size:9.5px;color:#475569;margin-top:3px;line-height:1.6\">业务架构基线→目标<br>Gap分析<br>定义业务流程与组织</div>\n    </div>\n    <div style=\"border-left:4px solid #3b82f6;background:#eff6ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n      <div style=\"font-size:11px;font-weight:800;color:#3b82f6\">Phase C · 信息系统</div>\n      <div style=\"font-size:9.5px;color:#475569;margin-top:3px;line-height:1.6\">数据架构+应用架构<br>系统边界与集成<br>MDG/SAP模块蓝图</div>\n    </div>\n    <div style=\"border-left:4px solid #60a5fa;background:#eff6ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n      <div style=\"font-size:11px;font-weight:800;color:#2563eb\">Phase D · 技术</div>\n      <div style=\"font-size:9.5px;color:#475569;margin-top:3px;line-height:1.6\">技术架构蓝图<br>平台与基础设施<br>S/4HANA PCE + BTP</div>\n    </div>\n    <div style=\"border-left:4px solid #93c5fd;background:#eff6ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n      <div style=\"font-size:11px;font-weight:800;color:#2563eb\">Phase E · 机会</div>\n      <div style=\"font-size:9.5px;color:#475569;margin-top:3px;line-height:1.6\">识别实施项目<br>能力评估<br>制定过渡架构</div>\n    </div>\n    <div style=\"border-left:4px solid #3b82f6;background:#eff6ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n      <div style=\"font-size:11px;font-weight:800;color:#2563eb\">Phase F · 迁移</div>\n      <div style=\"font-size:9.5px;color:#475569;margin-top:3px;line-height:1.6\">优先级排序<br>制定迁移计划<br>实施路线图</div>\n    </div>\n    <div style=\"border-left:4px solid #2563eb;background:#eff6ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n      <div style=\"font-size:11px;font-weight:800;color:#1d4ed8\">Phase G · 实施治理</div>\n      <div style=\"font-size:9.5px;color:#475569;margin-top:3px;line-height:1.6\">监督实施合规<br>架构决策支持<br>实施建议书</div>\n    </div>\n    <div style=\"border-left:4px solid #1d4ed8;background:#eff6ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n      <div style=\"font-size:11px;font-weight:800;color:#1e3a8a\">Phase H · 变更管理</div>\n      <div style=\"font-size:9.5px;color:#475569;margin-top:3px;line-height:1.6\">监控架构变更驱动<br>评估变更请求<br>启动新ADM循环</div>\n    </div>\n  </div>\n</div><h2 id=\"Preliminary-Phase-架构能力建设\">Preliminary Phase：架构能力建设</h2>\n\n<p><strong>核心目标</strong>：在启动任何架构项目之前，建立企业的架构能力（Architecture Capability），定义如何以及在哪里开展TOGAF的架构工作。</p>\n\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>TOGAF框架及其他架构框架参考资料</li>\n<li>董事会策略、商业原则、业务目标</li>\n<li>主要业务驱动因素</li>\n<li>治理和法律框架</li>\n<li>现有组织模型（Organization Model for Enterprise Architecture）</li>\n<li>现有架构框架（如果已有）</li>\n<li>现有IT策略、IT原则、业务原则</li>\n</ul>\n\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>确定组织范围（Scope the Organization）</strong>：明确哪些组织单元将参与或受到架构影响</li>\n<li><strong>确认治理框架（Confirm Governance Framework）</strong>：识别现有治理框架，确认架构治理如何嵌入其中</li>\n<li><strong>定义并建立架构团队（Define and Establish Architecture Team）</strong>：确定架构团队的角色、职责和技能要求</li>\n<li><strong>确定架构原则（Identify Architecture Principles）</strong>：制定指导架构决策的核心原则</li>\n<li><strong>定制TOGAF（Tailor TOGAF）</strong>：根据企业需求裁剪ADM流程和制品</li>\n<li><strong>实施架构工具（Implement Architecture Tools）</strong>：选择并部署支持架构工作的工具和技术</li>\n<li><strong>建立Architecture Board（设立架构委员会）</strong>：明确其职权范围（Terms of Reference）和运作机制</li>\n<li><strong>定义Architecture Repository结构</strong>：建立存储架构制品的仓库结构</li>\n</ol>\n\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li>组织级企业架构能力（Organizational Model for Enterprise Architecture）</li>\n<li>定制化的架构框架（Tailored Architecture Framework），含定制的ADM流程</li>\n<li>架构原则（Architecture Principles），含应用指导</li>\n<li>Architecture Repository（初始结构）</li>\n<li>架构治理框架（Architecture Governance Framework）</li>\n<li>架构委员会章程（Architecture Board Charter）</li>\n</ul>\n\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Architecture Principles文档</strong>：记录原则名称、声明、理由和影响</li>\n<li><strong>Architecture Board Terms of Reference</strong>：定义委员会权力边界</li>\n<li><strong>Tailored ADM Process</strong>：记录裁剪决定及原因</li>\n</ul>\n\n<p><strong>Architecture Principles的四要素（Level 2高频考点）</strong>：</p>\n<div class=\"tbl\"><table>\n<tr><th>要素</th><th>说明</th><th>示例</th></tr>\n<tr><td>Name（名称）</td><td>简短、易记</td><td>&quot;数据即资产&quot;</td></tr>\n<tr><td>Statement（声明）</td><td>一句话说明原则内容</td><td>&quot;数据是企业战略资产，须妥善管理&quot;</td></tr>\n<tr><td>Rationale（理由）</td><td>为什么要有这个原则</td><td>&quot;确保数据一致性支撑决策&quot;</td></tr>\n<tr><td>Implications（影响）</td><td>遵循此原则意味着什么</td><td>&quot;需要统一数据治理策略&quot;</td></tr>\n</table></div>\n\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>题型：给出一家公司的情况，问应该优先执行Preliminary Phase的哪个活动</li>\n<li>常考：Architecture Principles的四个组成部分；Architecture Board的职责边界（审批架构 vs. 执行架构）；裁剪TOGAF的合法场景</li>\n<li>陷阱：Preliminary Phase不是Phase A，不产生Architecture Vision；Architecture Board是审批机构，不是执行机构</li>\n</ul>\n\n<p><strong>佛照项目映射</strong>：</p>\n<p>佛照（佛山照明）当前处于SAP ECC 6.0架构，在启动S/4HANA升级咨询前，对应Preliminary Phase的工作包括：确定项目的架构治理机制（由集团CIO还是IT部门主导）、识别佛照集团的业务原则（如&quot;国际化扩张&quot;、&quot;制造效率优先&quot;）、明确哪些子公司或业务单元纳入本次升级范围，以及确定如何与现有SAP实施方法论（如SAP Activate）相融合。</p>\n\n<hr>\n\n<h2 id=\"Phase-A-架构愿景\">Phase A：架构愿景</h2>\n\n<p><strong>（Architecture Vision）</strong></p>\n\n<p><strong>核心目标</strong>：建立项目范围、约束和期望，获取架构工作授权，并创建高层次的架构愿景来响应业务需求。</p>\n\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>架构工作请求（Architecture Work Request / Request for Architecture Work）</li>\n<li>业务原则、目标和驱动因素</li>\n<li>组织模型（来自Preliminary Phase）</li>\n<li>定制化架构框架（来自Preliminary Phase）</li>\n<li>Architecture Repository中的现有架构内容</li>\n<li>架构原则</li>\n</ul>\n\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>建立架构项目（Establish the Architecture Project）</strong>：确认项目范围、目标、约束</li>\n<li><strong>识别利益相关者（Identify Stakeholders）</strong>：建立Stakeholder Map，识别关键利益相关者及其关切</li>\n<li><strong>确认并细化业务目标和业务驱动因素（Confirm Business Goals）</strong></li>\n<li><strong>评估能力差距（Assess Capability）</strong>：与目标业务能力做初步对比</li>\n<li><strong>明确范围（Define Scope）</strong>：定义架构的广度（Breadth）、深度（Depth）、时间维度（Time Period）和架构域（Architecture Domains）</li>\n<li><strong>确认并优先排列架构原则</strong>：验证Preliminary Phase定义的原则是否适用</li>\n<li><strong>开发架构愿景（Develop Architecture Vision）</strong>：创建高层次的As-Is和To-Be概念图</li>\n<li><strong>定义约束（Define Constraints）</strong>：技术约束、时间约束、预算约束、政策约束</li>\n<li><strong>确定建立架构定义文档（Statement of Architecture Work）</strong>并获得授权</li>\n</ol>\n\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>Statement of Architecture Work（架构工作说明书）</strong>：最重要的输出，是架构工作的合同</li>\n<li><strong>架构愿景文档（Architecture Vision Document）</strong></li>\n<li><strong>精化后的业务原则、目标和驱动因素</strong></li>\n<li><strong>利益相关者图谱（Stakeholder Map）</strong> 及通信计划</li>\n<li><strong>初始架构定义文档（Architecture Definition Document）</strong> 的框架</li>\n<li><strong>初始架构需求规格（Architecture Requirements Specification）</strong> 的框架</li>\n</ul>\n\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Statement of Architecture Work</strong>：包括范围、方法、时间计划、资源需求、风险</li>\n<li><strong>Architecture Vision</strong>：通常是一页纸的高层次概念图，展示目标状态</li>\n<li><strong>Value Chain Diagram（价值链图）</strong>：展示业务高层结构</li>\n<li><strong>Solution Concept Diagram（解决方案概念图）</strong>：高层次技术愿景</li>\n</ul>\n\n<p><strong>RACI与Stakeholder分析（Level 2重点）</strong>：</p>\n<p>TOGAF使用<strong>RACI矩阵</strong>（Responsible, Accountable, Consulted, Informed）描述利益相关者角色。Phase A要识别：</p>\n<ul>\n<li>架构赞助人（Architecture Sponsor）：通常是CIO或CEO</li>\n<li>架构委员会成员（Architecture Board Members）</li>\n<li>受影响的业务单元负责人</li>\n</ul>\n\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Statement of Architecture Work的作用：<strong>授权架构工作开始</strong>，相当于项目章程</li>\n<li>Architecture Vision ≠ Architecture Definition Document：前者是高层次愿景，后者是详细架构描述</li>\n<li>Scope定义的四个维度：广度（哪些组织）、深度（哪些细节层次）、时间跨度（多少年）、架构域（B/IS/T的哪些）</li>\n<li>常见陷阱：Phase A就要做详细的业务流程分析（错误！详细分析在Phase B）</li>\n</ul>\n\n<p><strong>佛照项目映射</strong>：</p>\n<p>对应佛照S/4HANA项目的项目启动（Kick-off）阶段。实际工作包括：与佛照集团管理层确认升级范围（仅财务+采购，还是全模块？是否包括海外子公司？）、识别关键利益相关者（CFO关注财务合规、IT总监关注技术稳定性、业务VP关注流程改变）、输出项目章程等价文件。Architecture Vision对应&quot;升级到S/4HANA后，佛照将获得实时财务分析、简化系统架构、支撑国际化运营&quot;的一页纸愿景。</p>\n\n<hr>\n\n<h2 id=\"Phase-B-业务架构\">Phase B：业务架构</h2>\n\n<p><strong>（Business Architecture）</strong></p>\n\n<p><strong>核心目标</strong>：建立基线（As-Is）和目标（To-Be）业务架构，识别差距，支撑架构愿景中定义的业务战略目标。</p>\n\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>架构参考资料（来自Architecture Repository）</li>\n<li>Statement of Architecture Work（Phase A输出）</li>\n<li>架构原则、业务原则、目标和驱动因素</li>\n<li>Architecture Vision（Phase A输出）</li>\n<li>草稿版Architecture Definition Document</li>\n<li>草稿版Architecture Requirements Specification</li>\n<li>业务能力、组织结构、业务服务等现有文档</li>\n</ul>\n\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>选择参考模型和视点（Select Reference Models and Viewpoints）</strong>：确定使用哪些业务架构框架（如价值链、业务能力模型）</li>\n<li><strong>开发基线业务架构（Develop Baseline Business Architecture）</strong>：描述当前As-Is业务状态</li>\n<li><strong>开发目标业务架构（Develop Target Business Architecture）</strong>：描述To-Be业务状态</li>\n<li><strong>执行差距分析（Perform Gap Analysis）</strong>：识别基线与目标之间的差异</li>\n<li><strong>定义候选路线图组件（Define Candidate Roadmap Components）</strong>：初步识别需要的变更</li>\n<li><strong>解决影响（Resolve Impacts）</strong>：评估变更对其他架构域的影响</li>\n<li><strong>正式审查（Conduct Formal Stakeholder Review）</strong>：获取利益相关者对业务架构的确认</li>\n<li><strong>完成业务架构（Finalize Business Architecture）</strong></li>\n<li><strong>更新Architecture Definition Document和Requirements Specification</strong></li>\n</ol>\n\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>业务架构组件（Business Architecture Components）</strong>，含入架构定义文档 - 基线业务架构（Baseline Business Architecture） - 目标业务架构（Target Business Architecture）</li>\n<li><strong>更新的差距分析结果（Gap Analysis Results）</strong></li>\n<li><strong>更新的业务需求（Updated Business Requirements）</strong></li>\n<li><strong>更新的架构路线图组件（Architecture Roadmap Components）</strong></li>\n</ul>\n\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Business Capability Map（业务能力图）</strong>：展示组织具备的能力，不涉及组织结构</li>\n<li><strong>Value Stream Map（价值流图）</strong>：端到端业务价值创造路径</li>\n<li><strong>Organization Map（组织图）</strong>：组织结构与角色</li>\n<li><strong>Business Process Diagrams（业务流程图）</strong>：使用BPMN或类似符号</li>\n<li><strong>Business Interaction Matrix（业务交互矩阵）</strong>：组织单元与业务功能的关系</li>\n</ul>\n\n<p><strong>As-Is vs To-Be对比分析（核心方法）</strong>：</p>\n\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>As-Is（当前状态）</th><th>To-Be（目标状态）</th></tr>\n<tr><td>业务能力</td><td>现有能力清单</td><td>需要新增/增强的能力</td></tr>\n<tr><td>业务流程</td><td>当前流程文档</td><td>优化后的流程设计</td></tr>\n<tr><td>组织结构</td><td>现有组织架构</td><td>调整后的组织架构</td></tr>\n<tr><td>业务服务</td><td>当前提供的服务</td><td>目标服务组合</td></tr>\n</table></div>\n\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase B的主要输出是<strong>业务架构部分的Architecture Definition Document</strong>，不是一份独立文档</li>\n<li>差距分析（Gap Analysis）在Phase B、C、D中每个都要做，不是只在某一个Phase做</li>\n<li>Business Capability ≠ Business Function ≠ Business Process： - Capability（能力）：组织能做什么，与组织结构无关 - Function（功能）：组织做什么，按功能分类 - Process（流程）：组织怎么做，是有序的活动序列</li>\n<li>考试常见陷阱：将组织结构图（Org Chart）当成Business Architecture的全部</li>\n</ul>\n\n<p><strong>佛照项目映射</strong>：</p>\n<p>对应佛照业务诊断阶段（Business Blueprint / Fit-Gap Analysis）。实际工作包括：梳理佛照当前ECC 6.0支撑的业务流程（财务记账、采购订单、生产工单），识别S/4HANA目标状态下的业务能力增强点（如Universal Journal实时财务、简化库存管理）。差距分析会揭示：佛照当前自定义开发（Z程序）哪些在S/4HANA中有标准替代，哪些需要重写。</p>\n\n<hr>\n\n<h2 id=\"Phase-C-信息系统架构\">Phase C：信息系统架构</h2>\n\n<p><strong>（Information Systems Architecture）</strong></p>\n\n<p><strong>核心目标</strong>：建立目标信息系统架构，涵盖数据架构（Data Architecture）和应用架构（Application Architecture）两个子域，支撑目标业务架构。</p>\n\n<blockquote><p><strong>重要说明（Level 2高频考点）</strong>：Phase C包含两个子域，TOGAF标准建议先做<strong>Data Architecture</strong>，再做<strong>Application Architecture</strong>，因为数据是比应用更稳定的资产。但实际项目中可并行执行。</p></blockquote>\n\n<hr>\n\n<h3 id=\"Phase-C-1-Data-Architecture-数据架构-\">Phase C-1：Data Architecture（数据架构）</h3>\n\n<p><strong>核心目标</strong>：定义组织在目标状态下的数据结构、数据管理方式和数据资产，支撑业务架构目标。</p>\n\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>Phase B完成的业务架构</li>\n<li>Architecture Definition Document（业务架构部分已完成）</li>\n<li>数据原则（Data Principles）</li>\n<li>现有数据架构文档</li>\n<li>Architecture Repository中的数据参考模型</li>\n</ul>\n\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li>选择数据架构的参考模型和视点</li>\n<li>开发基线数据架构（Baseline Data Architecture）</li>\n<li>开发目标数据架构（Target Data Architecture）</li>\n<li>执行数据架构差距分析</li>\n<li>定义候选路线图组件（数据相关）</li>\n<li>解决对其他架构域的影响</li>\n<li>获取利益相关者审查确认</li>\n</ol>\n\n<p><strong>输出（Data Architecture部分）</strong>：</p>\n<ul>\n<li>基线和目标数据架构描述</li>\n<li>数据实体/数据组件目录（Data Entity/Data Component Catalog）</li>\n<li>数据实体与业务功能矩阵（Data Entity/Business Function Matrix）</li>\n<li>概念数据模型（Conceptual Data Diagram）</li>\n<li>逻辑数据模型（Logical Data Diagram）</li>\n<li>数据差距分析</li>\n</ul>\n\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Data Entity Catalog</strong>：所有数据实体的清单</li>\n<li><strong>Data Component Catalog</strong>：物理数据存储的清单</li>\n<li><strong>Class Hierarchy Diagram</strong>：数据实体的继承关系</li>\n<li><strong>Data Migration Diagram</strong>：数据迁移路径图</li>\n</ul>\n\n<hr>\n\n<h3 id=\"Phase-C-2-Application-Architecture-应用架构-\">Phase C-2：Application Architecture（应用架构）</h3>\n\n<p><strong>核心目标</strong>：定义组织在目标状态下的应用系统组合，及其与业务流程和数据的关系。</p>\n\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li>选择应用架构的参考模型和视点</li>\n<li>开发基线应用架构（Baseline Application Architecture）</li>\n<li>开发目标应用架构（Target Application Architecture）</li>\n<li>执行应用架构差距分析</li>\n<li>定义候选路线图组件（应用相关）</li>\n<li>解决对数据架构和技术架构的影响</li>\n<li>获取利益相关者审查确认</li>\n</ol>\n\n<p><strong>输出（Application Architecture部分）</strong>：</p>\n<ul>\n<li>基线和目标应用架构描述</li>\n<li>应用组合目录（Application Portfolio Catalog）</li>\n<li>接口目录（Interface Catalog）</li>\n<li>应用/功能矩阵（Application/Function Matrix）</li>\n<li>应用/组织矩阵（Application/Organization Matrix）</li>\n<li>应用交互图（Application Communication Diagram）</li>\n<li>应用迁移图（Application Migration Diagram）</li>\n</ul>\n\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Application Portfolio Catalog</strong>：所有应用系统清单，含业务价值评级</li>\n<li><strong>Interface Catalog</strong>：系统间接口的完整清单</li>\n<li><strong>Application Communication Diagram</strong>：展示应用间的数据流和依赖关系</li>\n</ul>\n\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li><strong>先Data后Application的逻辑</strong>：数据架构回答&quot;企业有哪些数据资产&quot;，应用架构回答&quot;哪些系统管理这些数据&quot;，逻辑上数据先于应用</li>\n<li>Phase C的两个子域都要做Gap Analysis，Gap Analysis是贯穿B/C/D的核心方法</li>\n<li>应用架构关注<strong>逻辑应用组件（Logical Application Components）</strong>，技术实现留给Phase D</li>\n<li>考题常见：给出一个矩阵或图表，判断它属于Phase C的哪个子域</li>\n</ul>\n\n<p><strong>佛照项目映射</strong>：</p>\n<ul>\n<li><strong>数据架构</strong>：梳理佛照ECC 6.0中的主数据（物料主数据、供应商主数据、客户主数据）质量现状，定义迁移到S/4HANA后的数据标准和治理规范；评估财务数据从CO/FI分离结构迁移到Universal Journal的数据模型变化</li>\n<li><strong>应用架构</strong>：识别佛照当前应用组合（SAP ECC + 周边系统：MES、WMS、EDI接口），定义S/4HANA目标应用组合，规划SAP BTP上的集成层替代现有点对点接口</li>\n</ul>\n\n<hr>\n\n<h2 id=\"Phase-D-技术架构\">Phase D：技术架构</h2>\n\n<p><strong>（Technology Architecture）</strong></p>\n\n<p><strong>核心目标</strong>：将逻辑应用组件和数据组件映射到技术组件，定义实现目标架构所需的技术基础设施。</p>\n\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>架构原则（含技术原则）</li>\n<li>Phase B和C完成的架构定义文档</li>\n<li>技术参考模型（Technology Reference Model, TRM）</li>\n<li>集成信息基础设施参考模型（III-RM）</li>\n<li>Architecture Repository中的现有技术架构</li>\n</ul>\n\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>选择技术架构参考模型和视点</strong>：识别适用的技术标准和参考模型（TRM、III-RM）</li>\n<li><strong>开发基线技术架构（Develop Baseline Technology Architecture）</strong>：描述当前技术基础设施</li>\n<li><strong>开发目标技术架构（Develop Target Technology Architecture）</strong>：定义目标技术状态</li>\n<li><strong>执行差距分析（Perform Gap Analysis）</strong>：识别技术层面的差距</li>\n<li><strong>定义候选路线图组件（Define Candidate Roadmap Components）</strong></li>\n<li><strong>解决对信息系统架构的影响（Resolve Impacts）</strong></li>\n<li><strong>正式审查（Conduct Formal Stakeholder Review）</strong></li>\n<li><strong>完成技术架构并更新Architecture Definition Document</strong></li>\n</ol>\n\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li>技术架构部分的Architecture Definition Document - 基线技术架构（Baseline Technology Architecture） - 目标技术架构（Target Technology Architecture）</li>\n<li>技术差距分析结果</li>\n<li>更新的架构路线图组件</li>\n<li>技术标准目录（Technology Standards Catalog）</li>\n<li>技术组合目录（Technology Portfolio Catalog）</li>\n</ul>\n\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Technology Standards Catalog</strong>：企业批准使用的技术标准列表</li>\n<li><strong>Technology Portfolio Catalog</strong>：当前使用的技术产品清单</li>\n<li><strong>System/Technology Matrix</strong>：应用系统与技术组件的映射关系</li>\n<li><strong>Environments and Locations Diagram</strong>：物理部署拓扑图</li>\n<li><strong>Platform Decomposition Diagram</strong>：平台架构分解图</li>\n<li><strong>Network Computing/Hardware Diagram</strong>：网络和硬件架构图</li>\n</ul>\n\n<p><strong>TRM（Technology Reference Model）的应用</strong>：</p>\n<p>TOGAF TRM提供了通用的技术架构参考，分为两层：</p>\n<ul>\n<li><strong>Application Platform</strong>（应用平台层）：提供技术服务（如数据管理服务、安全服务、通信服务）</li>\n<li><strong>Communications Infrastructure</strong>（通信基础设施层）：网络和通信基础</li>\n</ul>\n\n<p>企业可以基于TRM定制自己的技术参考架构。</p>\n\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase D是<strong>四个架构域</strong>（B、C-Data、C-App、D）中的最后一个，完成后Architecture Definition Document才完整</li>\n<li>TRM vs III-RM区别：TRM是通用技术参考；III-RM（Integrated Information Infrastructure Reference Model）专注于无缝信息流动，更关注中间件和集成</li>\n<li>常见陷阱：将具体产品选型（如选IBM还是Dell服务器）放在Phase D；实际上Phase D应在逻辑层面，不应绑定具体厂商</li>\n<li>Gap Analysis的输出要为Phase E的路线图规划提供输入</li>\n</ul>\n\n<p><strong>佛照项目映射</strong>：</p>\n<p>梳理佛照当前技术架构：ECC 6.0运行在本地数据中心（On-Premise），数据库为Oracle/DB2/SAP HANA。目标技术架构：S/4HANA on SAP HANA数据库，评估云部署（RISE with SAP）vs 本地部署的技术可行性；确定SAP BTP作为集成层的技术规格；评估现有网络基础设施对HANA内存数据库的支撑能力。</p>\n\n<hr>\n\n<h2 id=\"Phase-E-机会与解决方案\">Phase E：机会与解决方案</h2>\n\n<p><strong>（Opportunities and Solutions）</strong></p>\n\n<p><strong>核心目标</strong>：在已完成的目标架构基础上，识别实施的主要工作包（Work Packages），定义过渡架构（Transition Architecture），形成初步实施和迁移策略。</p>\n\n<blockquote><p>Phase E是架构定义（A-D）向实施规划（F-G）的关键桥梁。</p></blockquote>\n\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>已完成的四域Architecture Definition Document（来自Phase B/C/D）</li>\n<li>所有差距分析结果（来自Phase B/C/D）</li>\n<li>架构路线图草案</li>\n<li>已批准的Statement of Architecture Work</li>\n<li>Architecture Principles</li>\n<li>重用评估结果（Reuse Assessment）</li>\n</ul>\n\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>确定关键业务变革（Determine Key Business Change Attributes）</strong>：识别哪些变革对业务影响最大</li>\n<li><strong>确定业务约束（Determine Business Constraints）</strong>：包括预算、时间、组织变革能力</li>\n<li><strong>审查并合并差距分析（Review and Consolidate Gap Analysis）</strong>：整合B/C/D三域的差距</li>\n<li><strong>审查现有能力（Review Consolidated Requirements）</strong>：识别可重用的现有系统和能力</li>\n<li><strong>开发高层次路线图（Develop High-Level Roadmap）</strong>：初步排序变革活动</li>\n<li><strong>识别过渡架构（Identify Transition Architectures）</strong>：确定需要几个过渡阶段</li>\n<li><strong>定义工作包（Define Work Packages）</strong>：将架构变更分解为可执行的工作包</li>\n<li><strong>确认实施路径（Confirm Architecture Roadmap）</strong>：获取利益相关者认可</li>\n</ol>\n\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>Architecture Roadmap（架构路线图）</strong>：高层次版本</li>\n<li><strong>过渡架构（Transition Architecture）</strong>：每个过渡阶段的架构快照</li>\n<li><strong>工作包（Work Packages）</strong>：具体实施任务分组</li>\n<li><strong>实施因素评估矩阵（Implementation Factor Assessment and Deduction Matrix）</strong></li>\n<li><strong>合并差距/解决方案矩阵（Consolidated Gaps, Solutions, and Dependencies Matrix）</strong></li>\n</ul>\n\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Project Context Diagram</strong>：展示项目间依赖关系</li>\n<li><strong>Benefits Diagram（收益图）</strong>：量化架构变更的业务价值</li>\n<li><strong>Transition Architecture State Evolution Diagram</strong>：过渡架构演进图</li>\n</ul>\n\n<p><strong>工作包（Work Package）的定义要素</strong>：</p>\n<p>每个Work Package需包含：</p>\n<ul>\n<li>工作包名称和描述</li>\n<li>架构相关性（与哪些架构变更相关）</li>\n<li>依赖关系（前置条件和后置影响）</li>\n<li>资源需求（人力、资金、技术）</li>\n<li>业务价值评估</li>\n<li>优先级排序建议</li>\n</ul>\n\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase E是<strong>第一个产生Architecture Roadmap</strong>的阶段（之前的B/C/D只产生路线图组件）</li>\n<li>过渡架构（Transition Architecture）的数量没有固定限制，由业务需求和变革能力决定</li>\n<li>Work Package ≠ Project：一个Work Package可以跨越多个项目，也可以是一个项目的一部分</li>\n<li>关键输入：来自B/C/D的<strong>Gap Analysis Results</strong>；关键输出：<strong>Architecture Roadmap + Transition Architectures</strong></li>\n</ul>\n\n<p><strong>佛照项目映射</strong>：</p>\n<p>整合Phase B/C/D的分析结果，输出佛照S/4HANA升级的路线图。可能的过渡架构：</p>\n<ul>\n<li>过渡架构1：ECC + SAP BTP集成层（短期，12个月内）</li>\n<li>过渡架构2：S/4HANA 核心财务上线 + ECC并行运行（18个月）</li>\n<li>目标架构：全面S/4HANA + 云集成（36个月）</li>\n</ul>\n<p>工作包示例：主数据清洗工作包、ABAP自定义代码评估工作包、用户培训工作包等。</p>\n\n<hr>\n\n<h2 id=\"Phase-F-迁移规划\">Phase F：迁移规划</h2>\n\n<p><strong>（Migration Planning）</strong></p>\n\n<p><strong>核心目标</strong>：将高层次的过渡架构和工作包转化为详细的、可执行的实施与迁移计划，包括优先级排序、成本效益分析和资源规划。</p>\n\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>Phase E产生的Architecture Roadmap</li>\n<li>过渡架构（Transition Architectures）</li>\n<li>工作包（Work Packages）</li>\n<li>能力评估（Capability Assessments）</li>\n<li>已批准的业务战略和计划</li>\n<li>现有项目组合信息（Project Portfolio）</li>\n</ul>\n\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>确认管理框架与实施（Confirm Management Framework Interactions）</strong>：与项目组合管理、项目管理办公室对齐</li>\n<li><strong>为每个工作包分配业务价值（Assign Business Value to Work Packages）</strong>：使用定量或定性方法评估价值</li>\n<li><strong>评估依赖关系、成本和风险（Estimate Resource Requirements）</strong>：识别工作包之间的技术依赖和组织依赖</li>\n<li><strong>优先级排序（Prioritize Migration Projects）</strong>：基于价值、风险、依赖和资源进行排序</li>\n<li><strong>确认架构路线图与过渡架构（Confirm Architecture Roadmap）</strong>：精化并最终确认</li>\n<li><strong>完成实施与迁移计划（Complete the Implementation and Migration Plan）</strong></li>\n<li><strong>审查并签署（Review and Sign-off）</strong>：获取治理层批准</li>\n</ol>\n\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>实施与迁移计划（Implementation and Migration Plan）</strong>：详细的项目计划</li>\n<li><strong>精化后的Architecture Roadmap（Refined Architecture Roadmap）</strong></li>\n<li><strong>过渡架构的架构定义（Transition Architecture Architecture Definition）</strong></li>\n<li><strong>重新使用评估（Reuse Assessment）</strong>：识别现有资产的重用机会</li>\n<li><strong>更新后的Architecture Requirements Specification</strong></li>\n</ul>\n\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Implementation and Migration Plan</strong>：里程碑、资源、预算、风险登记册</li>\n<li><strong>Project Portfolio（项目组合）</strong>：所有实施项目的完整清单</li>\n<li><strong>Capability Assessment Matrix</strong>：能力就绪度评估矩阵</li>\n</ul>\n\n<p><strong>优先级排序方法（Level 2重点）</strong>：</p>\n<p>Phase F使用多维度优先级矩阵，典型评估维度包括：</p>\n<ul>\n<li><strong>Business Value（业务价值）</strong>：对战略目标的贡献程度</li>\n<li><strong>Technical Risk（技术风险）</strong>：实施复杂度和技术成熟度</li>\n<li><strong>Financial Cost（财务成本）</strong>：实施所需投资</li>\n<li><strong>Dependencies（依赖关系）</strong>：是否是其他工作包的先决条件</li>\n<li><strong>Quick Win Potential（快速见效潜力）</strong>：能否在短期内产生可见效果</li>\n</ul>\n\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase F与Phase E的区别：Phase E是<strong>高层次</strong>路线图和工作包定义；Phase F是<strong>详细的</strong>实施计划和优先级排序</li>\n<li>Phase F要<strong>正式纳入企业项目组合管理体系</strong>，架构项目不能孤立于项目管理体系之外</li>\n<li>成本效益分析（Cost-Benefit Analysis）在Phase F进行，不在Phase E</li>\n<li>常见考题：某工作包完成后才能开始另一个工作包，这是Phase F处理的<strong>依赖关系管理</strong>问题</li>\n</ul>\n\n<p><strong>佛照项目映射</strong>：</p>\n<p>输出佛照S/4HANA升级的详细实施计划。包括：各工作包的人力估算（SAP顾问工时+内部IT工时）；关键里程碑（主数据清洗完成节点、UAT节点、Go-Live节点）；风险登记册（如ABAP代码量大导致的测试风险）；以及与佛照年度IT预算的对齐（确保实施成本在批准预算范围内）。</p>\n\n<hr>\n\n<h2 id=\"Phase-G-实施治理\">Phase G：实施治理</h2>\n\n<p><strong>（Implementation Governance）</strong></p>\n\n<p><strong>核心目标</strong>：确保实施项目符合已批准的架构，通过架构合规审查（Architecture Compliance Review）保证目标架构的完整性。</p>\n\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>实施与迁移计划（Phase F）</li>\n<li>架构定义文档（Architecture Definition Document）</li>\n<li>架构合规要求（Architecture Compliance Requirements）</li>\n<li>架构合同（Architecture Contract）</li>\n<li>架构框架和架构原则</li>\n<li>实施过程中的变更请求（Change Requests）</li>\n</ul>\n\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>确认与架构的范围和优先级（Confirm Scope and Priorities）</strong>：与实施团队对齐</li>\n<li><strong>识别部署资源和技能（Identify Deployment Resources）</strong>：确认实施团队能力</li>\n<li><strong>指导技术开发（Guide Development of Solutions Deployment）</strong>：架构师深度参与实施</li>\n<li><strong>执行企业架构合规审查（Perform Enterprise Architecture Compliance Reviews）</strong>：正式审查实施符合度</li>\n<li><strong>实施业务和IT运营（Implement Business and IT Operations）</strong>：监控实施进展</li>\n<li><strong>执行架构合规（Perform Post-Implementation Review）</strong>：实施完成后的合规验证</li>\n</ol>\n\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>架构合规报告（Architecture Compliance Assessment）</strong></li>\n<li><strong>架构合同（Architecture Contract）</strong>：架构师与实施团队之间的约定</li>\n<li><strong>已实施、经测试和部署的解决方案</strong></li>\n<li><strong>变更请求处理记录</strong></li>\n<li><strong>Architecture Compliance Exceptions（架构合规例外记录）</strong></li>\n</ul>\n\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Architecture Contract</strong>：正式记录架构师与开发团队之间对目标架构的承诺</li>\n<li><strong>Compliance Assessment Report</strong>：架构合规审查的正式报告</li>\n<li><strong>Architecture Compliance Exception</strong>：当实施偏离目标架构时的正式记录和处置</li>\n</ul>\n\n<p><strong>架构合规等级（Level 2考点）</strong>：</p>\n<p>TOGAF定义了合规性的四个等级：</p>\n<div class=\"tbl\"><table>\n<tr><th>等级</th><th>说明</th></tr>\n<tr><td><strong>Conformant（符合）</strong></td><td>所有规定要求都得到满足</td></tr>\n<tr><td><strong>Compliant（合规）</strong></td><td>满足所有必须要求，可能有推荐项未满足</td></tr>\n<tr><td><strong>Non-Conformant（不符合）</strong></td><td>关键要求未满足，需要变更请求</td></tr>\n<tr><td><strong>Irrelevant（不相关）</strong></td><td>该标准对此实施项目不适用</td></tr>\n</table></div>\n\n<p><strong>Architecture Contract的作用</strong>：</p>\n<p>Architecture Contract是Phase G最重要的制品，它：</p>\n<ul>\n<li>定义项目交付成果对架构的承诺</li>\n<li>规定架构原则的遵循要求</li>\n<li>建立架构师的监督权利</li>\n<li>为架构合规审查提供基准</li>\n</ul>\n\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase G中架构师的角色是<strong>监督者（Overseer）</str
