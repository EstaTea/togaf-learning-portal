</p>\n<p>具体来说：</p>\n<ul>\n<li>ADM 的每个 Phase 对应特定的制品输出</li>\n<li>ADM 的阶段转换点（Phase Exit）要求产出特定的交付物（Deliverable），这些交付物需要经过架构治理审批</li>\n<li>Architecture Repository（架构库）存储历史制品，为 ADM 各阶段提供输入参考</li>\n<li>内容框架中的 Building Block（构建块）来自 Enterprise Continuum（企业连续体），在 ADM Phase E 进行选择和确认</li>\n</ul>\n<p>简言之：ADM 是&quot;做事的路径&quot;，内容框架是&quot;做完的清单&quot;，两者共同保证企业架构工作的严谨性和完整性。</p>\n<hr>"}, "L4_2": {"type": "reading", "title": "📖 制品三类型：目录/矩阵/图表", "html": "<h2 id=\"第二章-制品三类型详解-Artifacts-\">第二章：制品三类型详解（Artifacts）</h2>\n<p>TOGAF 将架构制品（Artifact）分为三大类型：目录（Catalog）、矩阵（Matrix）、图表（Diagram）。三类制品从不同维度描述架构的不同方面，互为补充。</p>\n<div class=\"tbl\"><table>\n<tr><th>制品类型</th><th>英文</th><th>定义</th><th>主要用途</th><th>典型示例（5个以上）</th></tr>\n<tr><td><strong>目录</strong></td><td>Catalog</td><td>以列表形式对架构中的元素进行清点和记录的制品，是架构的&quot;资产清单&quot;</td><td>建立全面的架构组件库存；支持管理和治理决策；识别冗余和缺口</td><td>① 应用组合目录（Application Portfolio Catalog）② 数据实体/数据组件目录（Data Entity/Data Component Catalog）③ 技术标准目录（Technology Standards Catalog）④ 业务服务目录（Business Service/Function Catalog）⑤ 组织/参与者目录（Organization/Actor Catalog）⑥ 角色目录（Role Catalog）⑦ 业务能力目录（Business Capability Catalog）</td></tr>\n<tr><td><strong>矩阵</strong></td><td>Matrix</td><td>显示两个或多个架构元素之间关系的制品，以网格形式展示交叉映射</td><td>揭示架构元素之间的关联、依赖、覆盖和缺口；支持影响分析</td><td>① 业务交互矩阵（Business Interaction Matrix）② 参与者/角色矩阵（Actor/Role Matrix）③ 应用/组织矩阵（Application/Organization Matrix）④ 应用/功能矩阵（Application/Function Matrix）⑤ 应用/数据矩阵（Application/Data Matrix）⑥ 数据/应用矩阵（Data/Application Matrix，即 CRUD 矩阵）</td></tr>\n<tr><td><strong>图表</strong></td><td>Diagram</td><td>以图形化方式表达架构概念、结构、流程和关系的制品</td><td>直观呈现架构的结构和动态行为；便于沟通和理解；记录架构决策</td><td>① 业务流程图（Business Process/Event/Control/Product Diagram）② 组织结构图（Organization Decomposition Diagram）③ 应用通信图（Application Communication Diagram）④ 技术架构图（Environments and Locations Diagram）⑤ 数据流图（Data Flow Diagram）⑥ 解决方案概念图（Solution Concept Diagram）⑦ 用例图（Use-Case Diagram）</td></tr>\n</table></div>\n<p><strong>三类制品的互补关系</strong>：目录是基础清单，矩阵揭示关系，图表展示全貌。一个完整的架构工作通常需要三类制品协同使用。例如，先建立应用组合目录（列出所有应用），再通过应用/数据矩阵（展示哪些应用使用哪些数据），最后通过应用通信图（展示应用间的集成关系）。</p>\n<hr>"}, "L4_3": {"type": "reading", "title": "📖 ABB vs SBB & 交付物辨析", "html": "<h2 id=\"第三章-制品-vs-交付物-vs-构建块-区别辨析\">第三章：制品 vs 交付物 vs 构建块 区别辨析</h2>\n<h3 id=\"三者定义对比\">三者定义对比</h3>\n<div class=\"tbl\"><table>\n<tr><th>概念</th><th>英文</th><th>定义</th><th>是否合同产物</th><th>生命周期</th></tr>\n<tr><td><strong>制品</strong></td><td>Artifact</td><td>描述架构某一方面的工作产品，是最细粒度的输出单元</td><td>否</td><td>可以是内部工作文件，也可以包含在交付物中</td></tr>\n<tr><td><strong>交付物</strong></td><td>Deliverable</td><td>经过合同约定、正式评审和批准的工作成果；通常包含一个或多个制品</td><td><strong>是</strong></td><td>在 ADM 阶段完成时正式交付，成为架构库的输入</td></tr>\n<tr><td><strong>构建块</strong></td><td>Building Block</td><td>代表业务、IT 或架构能力的可复用组件，可以组合实现解决方案</td><td>否</td><td>存在于架构库，可跨项目复用</td></tr>\n</table></div>\n<p><strong>关键区别</strong>：制品是&quot;产出物的内容单元&quot;，交付物是&quot;制品的正式容器&quot;，构建块是&quot;架构的可复用积木&quot;。一个交付物可以打包多个制品；一个构建块可以在多个制品中被引用。</p>\n<h3 id=\"ABB-vs-SBB-详细辨析\">ABB vs SBB 详细辨析</h3>\n<p>构建块分为两种：Architecture Building Block（ABB，架构构建块）和 Solution Building Block（SBB，解决方案构建块）。</p>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>ABB（架构构建块）</th><th>SBB（解决方案构建块）</th></tr>\n<tr><td><strong>抽象层次</strong></td><td>抽象层：描述&quot;需要什么能力&quot;</td><td>具体层：描述&quot;用什么来实现&quot;</td></tr>\n<tr><td><strong>描述方式</strong></td><td>功能性描述，与技术无关</td><td>产品/技术特定的描述</td></tr>\n<tr><td><strong>来源</strong></td><td>Architecture Continuum</td><td>Solutions Continuum</td></tr>\n<tr><td><strong>关注点</strong></td><td>架构需求和标准</td><td>实现选择和产品</td></tr>\n<tr><td><strong>在哪个阶段确定</strong></td><td>Phase B/C/D</td><td>Phase E（Opportunities &amp; Solutions）</td></tr>\n<tr><td><strong>具体例子</strong></td><td>&quot;需要一个关系型数据库管理能力（RDBMS）&quot;</td><td>&quot;使用 SAP HANA 2.0 SP06 作为数据库&quot;</td></tr>\n<tr><td><strong>具体例子2</strong></td><td>&quot;需要企业集成平台（EIP）&quot;</td><td>&quot;使用 SAP Integration Suite（BTP）&quot;</td></tr>\n<tr><td><strong>具体例子3</strong></td><td>&quot;需要单点登录（SSO）能力&quot;</td><td>&quot;使用 Microsoft Azure AD 实现 SSO&quot;</td></tr>\n</table></div>\n<p><strong>ABB → SBB 的映射过程</strong>：在 ADM Phase E 中，架构师将已识别的 ABB 与市场上的解决方案组件进行匹配，选择合适的 SBB。这一映射过程需要考虑组织的技术标准、供应商策略、成本和风险等因素。</p>\n<h3 id=\"正式交付物清单-按-Phase-分类-\">正式交付物清单（按 Phase 分类）</h3>\n<p>TOGAF 规定了每个 Phase 必须正式交付的 Deliverable：</p>\n<div class=\"tbl\"><table>\n<tr><th>Phase</th><th>主要正式交付物</th></tr>\n<tr><td><strong>Preliminary</strong></td><td>Architecture Principles（架构原则）；Architecture Framework 定制说明</td></tr>\n<tr><td><strong>Phase A</strong></td><td>Architecture Vision；Statement of Architecture Work（架构工作说明书）；已更新的 Architecture Principles</td></tr>\n<tr><td><strong>Phase B</strong></td><td>Business Architecture Document（业务架构文档）；已更新的 Architecture Vision</td></tr>\n<tr><td><strong>Phase C</strong></td><td>Information Systems Architecture Document（信息系统架构文档）</td></tr>\n<tr><td><strong>Phase D</strong></td><td>Technology Architecture Document（技术架构文档）</td></tr>\n<tr><td><strong>Phase E</strong></td><td>Architecture Roadmap（架构路线图）；Transition Architecture（过渡架构）；Solutions Architecture（解决方案架构）</td></tr>\n<tr><td><strong>Phase F</strong></td><td>Implementation and Migration Plan（实施迁移计划）；Architecture Contract（架构合同）</td></tr>\n<tr><td><strong>Phase G</strong></td><td>Implementation Governance Model（实施治理模型）；Architecture Compliance Reports</td></tr>\n<tr><td><strong>Phase H</strong></td><td>Architecture Updates；Change Requests</td></tr>\n<tr><td><strong>Requirements Management</strong></td><td>Requirements Impact Assessment（需求影响评估）</td></tr>\n</table></div>\n<hr>"}, "L4_4": {"type": "reading", "title": "📖 各 Phase 核心制品清单", "html": "<h2 id=\"第四章-各-Phase-核心制品清单\">第四章：各 Phase 核心制品清单</h2>\n<h3 id=\"Phase-A-架构愿景-的制品\">Phase A（架构愿景）的制品</h3>\n<p>Phase A 的核心目标是获得项目批准，并建立架构工作的范围和愿景。</p>\n<ul>\n<li><strong>解决方案概念图（Solution Concept Diagram）</strong>：高层次展示目标解决方案，用于沟通和对齐干系人</li>\n<li><strong>业务能力评估（Business Capability Assessment）</strong>：评估现有业务能力与目标的差距</li>\n<li><strong>价值链图（Value Chain Diagram）</strong>：展示企业主要业务活动和价值创造路径</li>\n<li><strong>干系人地图（Stakeholder Map）</strong>：识别所有相关干系人及其关注点</li>\n<li><strong>架构原则（Architecture Principles）</strong>：指导后续架构决策的原则集合</li>\n</ul>\n<h3 id=\"Phase-B-业务架构-的制品\">Phase B（业务架构）的制品</h3>\n<p>Phase B 聚焦业务层面的架构描述，制品最为丰富：</p>\n<ul>\n<li><strong>业务流程图（Business Process/Event/Control/Product Diagram）</strong>：描述端到端业务流程，包含触发事件、控制条件和产出物</li>\n<li><strong>组织结构图（Organization Decomposition Diagram）</strong>：展示企业组织层级和单元划分</li>\n<li><strong>业务能力矩阵（Business Capability Matrix）</strong>：按业务域列出能力清单，标注成熟度</li>\n<li><strong>参与者/角色矩阵（Actor/Role Matrix）</strong>：映射组织参与者与其承担角色的对应关系</li>\n<li><strong>业务服务/功能目录（Business Service/Function Catalog）</strong>：枚举所有业务功能和服务</li>\n<li><strong>业务交互矩阵（Business Interaction Matrix）</strong>：展示不同业务单元之间的交互关系</li>\n<li><strong>用例图（Use-Case Diagram）</strong>：从业务参与者视角描述核心业务场景</li>\n<li><strong>组织/参与者目录（Organization/Actor Catalog）</strong>：记录所有组织单元和业务参与者</li>\n<li><strong>业务足迹图（Business Footprint Diagram）</strong>：将驱动因素、目标、组织单元与业务功能关联</li>\n</ul>\n<h3 id=\"Phase-C-数据架构的制品\">Phase C 数据架构的制品</h3>\n<ul>\n<li><strong>数据实体/数据组件目录（Data Entity/Data Component Catalog）</strong>：枚举所有数据实体</li>\n<li><strong>数据实体/业务功能矩阵（Data Entity/Business Function Matrix）</strong>：映射数据与业务功能的 CRUD 关系</li>\n<li><strong>系统/数据矩阵（Application/Data Matrix）</strong>：展示哪些应用管理哪些数据</li>\n<li><strong>概念数据图（Conceptual Data Diagram）</strong>：高层次展示主要数据实体及其关系</li>\n<li><strong>逻辑数据图（Logical Data Diagram）</strong>：详细展示数据实体、属性和关系</li>\n<li><strong>数据流图（Data Flow Diagram）</strong>：描述数据在系统之间的流动路径</li>\n<li><strong>数据主数据目录（Data Dissemination Diagram）</strong>：展示数据分发和主数据管理结构</li>\n</ul>\n<h3 id=\"Phase-C-应用架构的制品\">Phase C 应用架构的制品</h3>\n<ul>\n<li><strong>应用组合目录（Application Portfolio Catalog）</strong>：枚举所有在用和计划的应用</li>\n<li><strong>接口目录（Interface Catalog）</strong>：记录系统间所有接口</li>\n<li><strong>应用通信图（Application Communication Diagram）</strong>：展示应用间的通信关系和集成模式</li>\n<li><strong>应用/组织矩阵（Application/Organization Matrix）</strong>：映射应用归属和使用者</li>\n<li><strong>应用/功能矩阵（Application/Function Matrix）</strong>：展示哪些应用支撑哪些业务功能</li>\n<li><strong>应用/数据矩阵（Application/Data Matrix）</strong>：显示应用与数据的 CRUD 关系</li>\n<li><strong>企业手册图（Enterprise Manageability Diagram）</strong>：展示系统管理架构</li>\n<li><strong>处理流程图（Process Flow Diagram）</strong>：从应用视角描述业务处理流程</li>\n<li><strong>用例图（Application Use-Case Diagram）</strong>：描述应用支撑的用户场景</li>\n</ul>\n<h3 id=\"Phase-D-技术架构-的制品\">Phase D（技术架构）的制品</h3>\n<ul>\n<li><strong>技术标准目录（Technology Standards Catalog）</strong>：记录技术标准、版本和生命周期状态</li>\n<li><strong>技术组合目录（Technology Portfolio Catalog）</strong>：枚举所有技术平台和基础设施组件</li>\n<li><strong>系统/技术矩阵（Application/Technology Matrix）</strong>：映射应用与所依赖的技术平台</li>\n<li><strong>环境与位置图（Environments and Locations Diagram）</strong>：展示硬件、网络和地理位置</li>\n<li><strong>平台分解图（Platform Decomposition Diagram）</strong>：分层展示技术平台组件</li>\n<li><strong>处理图（Processing Diagram）</strong>：展示数据处理和计算的技术实现方式</li>\n<li><strong>网络计算硬件图（Networked Computing/Hardware Diagram）</strong>：展示物理硬件拓扑</li>\n</ul>\n<h3 id=\"Phase-E-机遇与解决方案-的制品\">Phase E（机遇与解决方案）的制品</h3>\n<ul>\n<li><strong>架构路线图（Architecture Roadmap）</strong>：展示从现状到目标的演进步骤和时间表</li>\n<li><strong>过渡架构（Transition Architecture）</strong>：描述从当前到目标架构的中间状态</li>\n<li><strong>工作包（Work Packages）</strong>：将架构变更分解为可执行的项目包</li>\n<li><strong>实施因素评估矩阵（Implementation Factor Assessment and Deduction Matrix）</strong>：评估实施约束、风险和假设</li>\n<li><strong>整合需求清单（Consolidated Gaps, Solutions, and Dependencies Matrix）</strong>：汇总架构差距、解决方案和依赖关系</li>\n</ul>\n<hr>"}, "L4_5": {"type": "reading", "title": "📖 企业连续体四层次", "html": "<h2 id=\"第一章-Enterprise-Continuum-企业连续体-\">第一章：Enterprise Continuum（企业连续体）</h2>\n<h3 id=\"定义和目的\">定义和目的</h3>\n<p>Enterprise Continuum（企业连续体）是 TOGAF 中一个至关重要的概念，用于描述<strong>从通用到特定、从抽象到具体</strong>的架构和解决方案资产分类体系。</p>\n<p><strong>定义</strong>：企业连续体是一种分类方法，用于组织和索引所有与架构相关的资产（包括架构描述和解决方案组件），这些资产可以在企业架构工作中被复用。</p>\n<p><strong>目的</strong>：</p>\n<ol>\n<li>提供一种标准的资产分类框架，便于架构师理解和利用已有成果</li>\n<li>支持在不同抽象层次上定义和复用架构组件</li>\n<li>指导架构师从通用行业参考模型出发，逐步裁剪到组织特定的架构</li>\n<li>与 Architecture Repository（架构库）紧密结合，为架构库中的内容提供分类维度</li>\n</ol>\n<p>企业连续体由两个互补的连续体组成：</p>\n<ul>\n<li><strong>Architecture Continuum（架构连续体）</strong>：从抽象的基础架构到具体的组织特定架构</li>\n<li><strong>Solutions Continuum（解决方案连续体）</strong>：从通用技术组件到组织特定的解决方案</li>\n</ul>\n<h3 id=\"Architecture-Continuum-架构连续体-四层次详解\">Architecture Continuum（架构连续体）四层次详解</h3>\n<p>架构连续体描述<strong>&quot;应该做什么&quot;</strong>，从通用到特定分为四个层次：</p>\n<h4 id=\"层次一-Foundation-Architecture-基础架构-\">层次一：Foundation Architecture（基础架构）</h4>\n<p><strong>定义</strong>：最通用、最抽象的架构层次，提供适用于任何类型企业的通用标准、原则和构建块。</p>\n<p><strong>特征</strong>：</p>\n<ul>\n<li>技术无关、行业无关</li>\n<li>代表最高层次的抽象和复用性</li>\n<li>由架构框架厂商（如 The Open Group）定义和维护</li>\n<li>适用范围最广，但与具体业务关联度最低</li>\n</ul>\n<p><strong>典型内容</strong>：</p>\n<ul>\n<li>通用业务能力（Communication、Storage、Processing 等）</li>\n<li>通用技术服务类别</li>\n<li>通用架构原则</li>\n</ul>\n<p><strong>TOGAF 参考模型</strong>：</p>\n<ul>\n<li><strong>TRM（Technical Reference Model，技术参考模型）</strong>：定义了通用技术服务的分类框架</li>\n<li><strong>III-RM（Integrated Information Infrastructure Reference Model，集成信息基础设施参考模型）</strong>：提供无边界信息流的架构模式</li>\n</ul>\n<h4 id=\"层次二-Common-Systems-Architecture-公共系统架构-\">层次二：Common Systems Architecture（公共系统架构）</h4>\n<p><strong>定义</strong>：描述适用于多个行业领域的公共系统模式和解决方案，是在基础架构之上的专业化。</p>\n<p><strong>特征</strong>：</p>\n<ul>\n<li>跨行业通用，但比基础架构更具体</li>\n<li>由行业组织或标准机构定义</li>\n<li>例如通用的安全架构模式、通用的集成架构模式</li>\n</ul>\n<p><strong>典型内容</strong>：</p>\n<ul>\n<li>通用安全架构（防火墙/DMZ/身份认证框架）</li>\n<li>通用数据交换标准（SOAP/REST/EDI）</li>\n<li>通用应用框架（MVC/微服务架构模式）</li>\n<li>通用云架构模式（IaaS/PaaS/SaaS 参考架构）</li>\n</ul>\n<p><strong>例子</strong>：OASIS SOA 参考模型、NIST 云计算参考架构</p>\n<h4 id=\"层次三-Industry-Architecture-行业架构-\">层次三：Industry Architecture（行业架构）</h4>\n<p><strong>定义</strong>：针对特定行业领域（如金融、零售、制造、电信）定义的架构标准和参考模型。</p>\n<p><strong>特征</strong>：</p>\n<ul>\n<li>行业特定，但可跨组织复用</li>\n<li>由行业联盟、标准机构或大型软件厂商定义</li>\n<li>包含行业特有的业务能力、数据模型和流程标准</li>\n</ul>\n<p><strong>典型内容</strong>：</p>\n<ul>\n<li>制造行业：MESA（制造企业解决方案协会）参考架构</li>\n<li>金融行业：BIAN（Banking Industry Architecture Network）参考架构</li>\n<li>零售行业：ARTS（Association for Retail Technology Standards）数据模型</li>\n<li>电信行业：TM Forum eTOM 业务流程框架</li>\n</ul>\n<p><strong>例子（汽车行业）</strong>：</p>\n<ul>\n<li>VDA（德国汽车工业协会）数据标准</li>\n<li>AUTOSAR 车载软件架构标准</li>\n<li>OEM 供应链协同架构（基于 EDIFACT/ALE 的 EDI 标准）</li>\n</ul>\n<h4 id=\"层次四-Organization-Specific-Architecture-组织特定架构-\">层次四：Organization-Specific Architecture（组织特定架构）</h4>\n<p><strong>定义</strong>：针对特定企业量身定制的架构，在行业架构基础上融入了企业特有的业务需求、约束和决策。</p>\n<p><strong>特征</strong>：</p>\n<ul>\n<li>企业特有，不可直接复用于其他组织</li>\n<li>是实际架构项目的最终产出</li>\n<li>综合了前三层的要素，并加入了企业特有的元素</li>\n</ul>\n<p><strong>典型内容</strong>：</p>\n<ul>\n<li>企业特定的应用组合架构</li>\n<li>企业特定的数据模型（如华辉的物料主数据模型）</li>\n<li>企业特定的集成架构（如华辉 ECC 与 MES 的集成模式）</li>\n<li>企业特定的技术标准（如规定使用 SAP HANA 作为数据库平台）</li>\n</ul>\n<h3 id=\"Solutions-Continuum-解决方案连续体-四层次对应\">Solutions Continuum（解决方案连续体）四层次对应</h3>\n<p>解决方案连续体是架构连续体的&quot;实现对应&quot;，描述<strong>&quot;用什么来实现&quot;</strong>：</p>\n<div class=\"tbl\"><table>\n<tr><th>架构连续体层次</th><th>对应解决方案连续体层次</th><th>说明</th></tr>\n<tr><td>Foundation Architecture</td><td>Foundation Solutions</td><td>通用技术产品（操作系统/数据库/网络组件）；如 Linux OS、TCP/IP 协议栈</td></tr>\n<tr><td>Common Systems Architecture</td><td>Common Systems Solutions</td><td>通用系统产品和平台；如通用身份认证产品（Okta）、通用 ESB（MuleSoft）</td></tr>\n<tr><td>Industry Architecture</td><td>Industry Solutions</td><td>行业特定软件包；如 SAP S/4HANA for Automotive、Oracle Retail Cloud</td></tr>\n<tr><td>Organization-Specific Architecture</td><td>Organization-Specific Solutions</td><td>企业定制实施；如华辉定制的 S/4HANA 系统（含所有配置和开发）</td></tr>\n</table></div>\n<h3 id=\"两个连续体的关系图\">两个连续体的关系图</h3>\n<pre><code>Enterprise Continuum\n├── Architecture Continuum（左=通用，右=特定）\n│   ┌──────────────┬──────────────────┬──────────────────┬─────────────────────┐\n│   │ Foundation   │ Common Systems   │ Industry         │ Organization-       │\n│   │ Architecture │ Architecture     │ Architecture     │ Specific            │\n│   │              │                  │                  │ Architecture        │\n│   │ TRM / III-RM │ SOA/Cloud模式    │ 行业参考框架     │ 企业定制架构        │\n│   └──────────────┴──────────────────┴──────────────────┴─────────────────────┘\n│                  ◄─────────────── 从通用到特定 ───────────────►\n│                  ◄─────────────── 复用性递减 ─────────────────►\n│                  ◄─────────────── 针对性递增 ─────────────────►\n│\n└── Solutions Continuum（与架构连续体一一对应）\n    ┌──────────────┬──────────────────┬──────────────────┬─────────────────────┐\n    │ Foundation   │ Common Systems   │ Industry         │ Organization-       │\n    │ Solutions    │ Solutions        │ Solutions        │ Specific Solutions  │\n    │              │                  │                  │                     │\n    │ Linux/Oracle │ MuleSoft/Okta    │ SAP S/4HANA      │ 华辉S/4HANA实施     │\n    └──────────────┴──────────────────┴──────────────────┴─────────────────────┘\n\n两个连续体的关系：\nArchitecture Continuum 描述&quot;要什么&quot; → 指导 Solutions Continuum 选择&quot;用什么&quot;\nSolutions Continuum 中的选择反馈 → 丰富 Architecture Continuum 的经验</code></pre>\n<hr>"}, "L4_6": {"type": "reading", "title": "📖 TRM / III-RM 参考模型", "html": "<h2 id=\"第二章-Foundation-Architecture-基础架构-\">第二章：Foundation Architecture（基础架构）</h2>\n<h3 id=\"TRM-Technical-Reference-Model-技术参考模型-详解\">TRM（Technical Reference Model，技术参考模型）详解</h3>\n<p>TRM 是 TOGAF 提供的最重要的基础架构参考模型，位于 Architecture Continuum 的最左端（最通用层）。</p>\n<h4 id=\"TRM-的结构-两部分-Taxonomy-Graphic-\">TRM 的结构（两部分：Taxonomy + Graphic）</h4>\n<p>TRM 由两个相互关联的部分构成：</p>\n<p><strong>第一部分：Taxonomy（分类法）</strong></p>\n<ul>\n<li>是 TRM 的核心，定义了所有技术服务的完整分类体系</li>\n<li>将技术能力组织成层次化的服务分类</li>\n<li>每个服务类别都有明确的定义和边界</li>\n</ul>\n<p><strong>第二部分：Graphic（图形表示）</strong></p>\n<ul>\n<li>以可视化方式展示 TRM 的结构</li>\n<li>经典的 TRM 图形展示了应用平台（Application Platform）位于中心， 基础设施（Infrastructure）在下方，应用软件（Business Applications）在上方， 通信基础设施（Communications Infrastructure）连接各部分</li>\n<li>图形帮助架构师直观理解各技术服务类别之间的关系</li>\n</ul>\n<h4 id=\"TRM-技术服务类别-8-类以上-\">TRM 技术服务类别（8 类以上）</h4>\n<p>TRM Taxonomy 将技术服务分为以下主要类别：</p>\n<div class=\"tbl\"><table>\n<tr><th>#</th><th>服务类别（英文）</th><th>中文名称</th><th>说明</th></tr>\n<tr><td>1</td><td><strong>Data Interchange Services</strong></td><td>数据交换服务</td><td>支持数据格式转换、数据共享（如 EDI、XML、API）</td></tr>\n<tr><td>2</td><td><strong>Data Management Services</strong></td><td>数据管理服务</td><td>数据库管理、数据访问、事务处理（如 RDBMS、OLAP）</td></tr>\n<tr><td>3</td><td><strong>Graphics and Imaging Services</strong></td><td>图形与图像服务</td><td>图形渲染、图像处理、可视化</td></tr>\n<tr><td>4</td><td><strong>Middleware Services</strong></td><td>中间件服务</td><td>应用间通信、消息队列、事务协调（如 MQ、ESB）</td></tr>\n<tr><td>5</td><td><strong>Networking Services</strong></td><td>网络服务</td><td>网络通信协议、目录服务（如 TCP/IP、DNS、LDAP）</td></tr>\n<tr><td>6</td><td><strong>Operating System Services</strong></td><td>操作系统服务</td><td>进程管理、内存管理、文件系统、设备驱动</td></tr>\n<tr><td>7</td><td><strong>Software Engineering Services</strong></td><td>软件工程服务</td><td>开发工具、运行时环境、配置管理</td></tr>\n<tr><td>8</td><td><strong>Transaction Processing Services</strong></td><td>事务处理服务</td><td>分布式事务、ACID 保障（如 TP Monitor）</td></tr>\n<tr><td>9</td><td><strong>User Interface Services</strong></td><td>用户界面服务</td><td>GUI 框架、浏览器、无障碍访问</td></tr>\n<tr><td>10</td><td><strong>Security Services</strong></td><td>安全服务</td><td>身份认证、授权、加密、审计</td></tr>\n<tr><td>11</td><td><strong>System and Network Management Services</strong></td><td>系统与网络管理服务</td><td>监控、配置管理、故障管理、性能管理</td></tr>\n</table></div>\n<p><strong>使用方式</strong>：在 Phase D（技术架构）中，架构师参照 TRM 的分类体系来识别目标架构需要哪些技术服务，确保没有遗漏关键技术能力。</p>\n<h3 id=\"III-RM-Integrated-Information-Infrastructure-Reference-Model-\">III-RM（Integrated Information Infrastructure Reference Model）</h3>\n<h4 id=\"III-RM-的目的\">III-RM 的目的</h4>\n<p>III-RM 的全称是&quot;集成信息基础设施参考模型&quot;，其核心目的是支持<strong>无边界信息流（Boundaryless Information Flow）</strong>。</p>\n<p>无边界信息流是 The Open Group 的愿景，描述&quot;任何人，在任何时间，在任何地点，都能够获取所需要的、以可用格式呈现的信息&quot;。III-RM 提供了实现这一愿景的技术架构参考。</p>\n<p><strong>III-RM 关注的核心问题</strong>：</p>\n<ul>\n<li>如何实现跨系统、跨组织的信息互操作</li>\n<li>如何支持业务应用之间的无缝集成</li>\n<li>如何管理企业信息基础设施的复杂性</li>\n</ul>\n<h4 id=\"III-RM-与-TRM-的关系\">III-RM 与 TRM 的关系</h4>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>TRM</th><th>III-RM</th></tr>\n<tr><td><strong>关注层次</strong></td><td>技术平台和基础服务</td><td>信息基础设施和应用集成</td></tr>\n<tr><td><strong>核心关注</strong></td><td>技术服务分类</td><td>信息流和应用互操作</td></tr>\n<tr><td><strong>层次位置</strong></td><td>Foundation Architecture（基础层）</td><td>Common Systems Architecture（公共系统层）</td></tr>\n<tr><td><strong>与连续体的关系</strong></td><td>适用于整个架构连续体的技术维度</td><td>专注于信息和集成维度</td></tr>\n<tr><td><strong>互补方式</strong></td><td>TRM 提供技术服务基础</td><td>III-RM 在 TRM 基础上描述信息集成架构</td></tr>\n</table></div>\n<p><strong>简言之</strong>：TRM 是&quot;技术能力的完整目录&quot;，III-RM 是&quot;信息集成的参考蓝图&quot;，两者共同构成 TOGAF Foundation Architecture 的核心内容。</p>\n<hr>"}, "L4_7": {"type": "reading", "title": "📖 Architecture Repository 六组成", "html": "<h2 id=\"第三章-Architecture-Repository-架构库-\">第三章：Architecture Repository（架构库）</h2>\n<h3 id=\"架构库的定义和作用\">架构库的定义和作用</h3>\n<p>Architecture Repository（架构库）是 TOGAF 架构能力体系的核心存储机制。</p>\n<p><strong>定义</strong>：架构库是一个结构化的知识库（存储库），用于存储和管理所有与架构工作相关的资产，包括架构描述、制品、标准、参考模型和治理信息。</p>\n<p><strong>作用</strong>：</p>\n<ol>\n<li><strong>存储</strong>：集中保存所有历史和现行架构成果</li>\n<li><strong>复用</strong>：支持后续架构项目检索和复用已有成果</li>\n<li><strong>治理</strong>：记录架构决策、合规性评估和变更历史</li>\n<li><strong>参考</strong>：为 ADM 各阶段提供输入参考</li>\n<li><strong>标准管理</strong>：维护组织的技术标准和规范</li>\n</ol>\n<h3 id=\"六大组成部分详解\">六大组成部分详解</h3>\n<p>TOGAF 明确定义了架构库的六个组成部分：</p>\n<h4 id=\"1-Architecture-Metamodel-架构元模型-\">1. Architecture Metamodel（架构元模型）</h4>\n<p><strong>定义</strong>：定义架构框架中使用的所有概念、实体及其关系的正式模型。</p>\n<p><strong>内容</strong>：</p>\n<ul>\n<li>组织采用的架构方法论（如 TOGAF、Zachman）</li>\n<li>各架构视角的元素定义</li>\n<li>元素之间关系的定义规则</li>\n<li>用于生成和验证制品的规则</li>\n</ul>\n<p><strong>用途</strong>：确保架构工作中使用的概念和术语一致，支持架构工具的配置（如 ArchiMate 建模工具的元模型配置）。</p>\n<h4 id=\"2-Architecture-Capability-架构能力-\">2. Architecture Capability（架构能力）</h4>\n<p><strong>定义</strong>：描述组织执行架构工作所需的能力、角色、技能和标准的集合。</p>\n<p><strong>内容</strong>：</p>\n<ul>\n<li>架构治理框架和流程</li>\n<li>架构角色和职责描述（如企业架构师/领域架构师/解决方案架构师的职责）</li>\n<li>架构技能框架</li>\n<li>架构工作方式和方法论定制</li>\n<li>架构工具和技术标准</li>\n</ul>\n<p><strong>用途</strong>：定义组织的架构能力基线，指导架构团队建设。</p>\n<h4 id=\"3-Architecture-Landscape-架构全景-\">3. Architecture Landscape（架构全景）</h4>\n<p><strong>定义</strong>：描述企业现有架构的全貌，反映在某一时间点上企业架构的&quot;快照&quot;。</p>\n<p><strong>内容</strong>：包含三个层次级别（详见第四章）：</p>\n<ul>\n<li><strong>Strategic Architecture（战略架构）</strong>：高层次的战略方向和能力定位</li>\n<li><strong>Segment Architecture（段架构）</strong>：特定业务域或项目的中层架构</li>\n<li><strong>Capability Architecture（能力架构）</strong>：特定能力的详细架构设计</li>\n</ul>\n<p><strong>用途</strong>：提供企业架构的完整现状，支持影响分析、差距分析和变更管理。</p>\n<h4 id=\"4-Standards-Information-Base-标准信息库-\">4. Standards Information Base（标准信息库）</h4>\n<p><strong>定义</strong>：存储组织认可和批准的技术标准、规范和产品的数据库。</p>\n<p><strong>内容</strong>：</p>\n<ul>\n<li>技术标准（版本、供应商、生命周期状态）</li>\n<li>组织内部规范（编码标准、设计原则）</li>\n<li>合规要求（法规、行业标准）</li>\n<li>禁止使用的技术清单（Deprecated Technologies）</li>\n</ul>\n<p><strong>用途</strong>：在 Phase D（技术架构）中，架构师参照标准信息库确保技术选型符合组织标准；在架构合规性评估中，用于检查项目是否符合技术标准。</p>\n<p><strong>举例（华辉项目）</strong>：</p>\n<ul>\n<li>批准的数据库：SAP HANA（认证版本列表）</li>\n<li>批准的操作系统：SUSE Linux Enterprise Server for SAP Applications</li>\n<li>批准的集成方式：SAP Integration Suite（BTP）</li>\n<li>即将退役的技术：SAP ECC 6.0（2027 年主流维护到期）</li>\n</ul>\n<h4 id=\"5-Reference-Library-参考库-\">5. Reference Library（参考库）</h4>\n<p><strong>定义</strong>：存储外部参考架构、行业标准、供应商白皮书和最佳实践资料的库。</p>\n<p><strong>内容</strong>：</p>\n<ul>\n<li>TOGAF 参考模型（TRM、III-RM）</li>\n<li>行业参考架构（如 SAP Best Practice for Automotive）</li>\n<li>供应商参考架构（如 SAP BTP 参考架构、AWS 架构最佳实践）</li>\n<li>以往类似项目的架构成果</li>\n<li>学术研究和行业报告</li>\n</ul>\n<p><strong>用途</strong>：在 ADM Preliminary Phase 和 Phase A 中，架构师参考外部最佳实践来制定本次架构工作的方向；避免&quot;重复造轮子&quot;。</p>\n<h4 id=\"6-Governance-Log-治理日志-\">6. Governance Log（治理日志）</h4>\n<p><strong>定义</strong>：记录所有架构治理活动的日志，包括决策、例外、合规性评估和变更请求。</p>\n<p><strong>内容</strong>：</p>\n<ul>\n<li>架构委员会会议记录和决策</li>\n<li>架构合规性评估报告（Architecture Compliance Assessments）</li>\n<li>已批准的架构例外（Dispensations）</li>\n<li>变更请求（Change Requests）及处理结果</li>\n<li>Architecture Contract（架构合同）的执行记录</li>\n</ul>\n<p><strong>用途</strong>：提供架构工作的完整审计跟踪；支持架构治理的透明度；为未来架构决策提供历史依据。</p>\n<h3 id=\"架构库在-ADM-中的使用方式\">架构库在 ADM 中的使用方式</h3>\n<p>架构库在 ADM 的每个阶段都扮演着输入和输出的双重角色：</p>\n<div class=\"tbl\"><table>\n<tr><th>ADM 阶段</th><th>从架构库读取（输入）</th><th>写入架构库（输出）</th></tr>\n<tr><td><strong>Preliminary</strong></td><td>Architecture Metamodel（参考已有框架）</td><td>定制化的 Architecture Metamodel</td></tr>\n<tr><td><strong>Phase A</strong></td><td>Architecture Landscape（了解现状）；Reference Library（参考最佳实践）</td><td>Architecture Vision；更新的 Architecture Landscape</td></tr>\n<tr><td><strong>Phase B/C/D</strong></td><td>Standards Information Base（技术标准参考）；Architecture Landscape（现状基线）</td><td>各领域架构文档；更新的制品</td></tr>\n<tr><td><strong>Phase E</strong></td><td>Architecture Landscape（识别现有 SBB）；Reference Library（参考解决方案）</td><td>Architecture Roadmap；Transition Architecture</td></tr>\n<tr><td><strong>Phase F</strong></td><td>Architecture Landscape（确认实施范围）</td><td>Implementation and Migration Plan</td></tr>\n<tr><td><strong>Phase G</strong></td><td>Governance Log（合规基准）；Standards Information Base（验证标准）</td><td>合规评估报告；更新的 Governance Log</td></tr>\n<tr><td><strong>Phase H</strong></td><td>Governance Log（历史变更记录）</td><td>变更请求；更新的 Architecture Landscape</td></tr>\n</table></div>\n<hr>"}, "L4_q": {"type": "quiz", "title": "✏️ 随堂测验 — 制品与连续体 14题", "questions": [{"num": "Q34", "star": true, "q": "TOGAF 中，Artifact（制品）、Deliverable（交付物）、Building Block（构建块）的核心区别是什么？", "opts": {"A": "三者没有区别，只是翻译不同", "B": "Artifact 是架构工作产品；Deliverable 是正式提交审查/签字的文档；Building Block 是可重用的架构组件", "C": "Deliverable 是内部使用的，Artifact 是外部提交的", "D": "Building Block 只用于技术架构"}, "ans": "B", "exp": "三者区别是高频考点：Artifact（制品）是架构开发过程中产生的具体工作产品，如图表、目录、矩阵，可以是非正式的；Deliverable（交付物）是正式的、需要经过审批签字的文件，如 Architecture Vision 文档、Architecture Definition Document；Building Block（构建块）是可重用的架构组件，分为 ABB（Architecture Building Block，抽象）和 SBB（Solution Building Block，具体实现）。", "topic": "t3"}, {"num": "Q35", "star": true, "q": "TOGAF 的制品（Artifacts）分为哪三类？", "opts": {"A": "Policies / Procedures / Guidelines", "B": "Catalogs / Matrices / Diagrams", "C": "Models / Views / Viewpoints", "D": "Input / Output / Deliverable"}, "ans": "B", "exp": "TOGAF 制品三类型：Catalogs（目录，如应用目录、数据实体目录）、Matrices（矩阵，如应用/数据矩阵、业务交互矩阵）、Diagrams（图表，如业务流程图、应用通信图、技术架构图）。这三类制品覆盖了从\"列举\"到\"关系\"到\"可视化\"的不同需求。", "topic": "t3"}, {"num": "Q36", "star": false, "q": "ABB（Architecture Building Block）和 SBB（Solution Building Block）的核心区别是什么？", "opts": {"A": "ABB 用于技术架构，SBB 用于业务架构", "B": "ABB 是抽象的架构规格（描述需要什么），SBB 是具体的实现方案（描述如何实现）", "C": "ABB 在目标架构中使用，SBB 在当前架构中使用", "D": "两者完全相同，只是叫法不同"}, "ans": "B", "exp": "ABB（Architecture Building Block）是抽象的、技术无关的描述，定义架构\"应该能做什么\"（功能和接口规格）；SBB（Solution Building Block）是具体的实现，描述\"用什么来实现\"（具体产品、系统、服务）。例如：ABB = \"邮件服务\"，SBB = \"Microsoft Exchange Server 2019\"。", "topic": "t3"}, {"num": "Q37", "star": true, "q": "以下哪个是 Deliverable（交付物）而非 Artifact（制品）？", "opts": {"A": "Business Capability Map（业务能力图）", "B": "Application Communication Diagram（应用通信图）", "C": "Architecture Vision Document（架构愿景文档）", "D": "Data Entity/Data Component Catalog（数据实体目录）"}, "ans": "C", "exp": "Architecture Vision Document 是正式的交付物，需要经过审批和签字，是 Phase A 的核心输出，对外提交给赞助方。其余三个选项（业务能力图、应用通信图、数据实体目录）都是制品（Artifacts），是架构开发过程中的工作产品，不一定需要正式签字。", "topic": "t3"}, {"num": "Q38", "star": false, "q": "Architecture Repository（架构库）中存储哪些类型的内容？", "opts": {"A": "只存储已完成的架构文档", "B": "架构元模型、参考库、标准信息库、治理日志、架构景观、解决方案库", "C": "只存储 Building Blocks", "D": "只存储历史架构版本"}, "ans": "B", "exp": "TOGAF 定义 Architecture Repository 包含六类内容：① Architecture Metamodel（架构元模型）② Architecture Capability（架构能力）③ Architecture Landscape（架构景观，含当前/过渡/目标架构）④ Standards Information Base（标准信息库）⑤ Reference Library（参考库）⑥ Governance Log（治理日志）。", "topic": "t3"}, {"num": "Q39", "star": false, "q": "View（视图）和 Viewpoint（视点）的关系是什么？", "opts": {"A": "两者完全相同，都是利益相关者看到的内容", "B": "Viewpoint 是模板（定义如何描述），View 是基于 Viewpoint 针对特定系统生成的实例", "C": "View 是模板，Viewpoint 是实例", "D": "Viewpoint 只用于技术架构，View 用于所有架构域"}, "ans": "B", "exp": "Viewpoint（视点）是一种模板或规则，定义了特定关注点应该如何被描述（包含哪些元素、使用什么符号）；View（视图）是将这个模板应用到具体系统后生成的实际描述。比喻：Viewpoint = 相机型号和拍摄规则；View = 用这台相机拍出来的具体照片。", "topic": "t3"}, {"num": "Q40", "star": false, "q": "Architecture Landscape（架构景观）包含哪三个级别？", "opts": {"A": "Strategic / Tactical / Operational", "B": "Strategic / Segment / Capability", "C": "Foundation / Industry / Enterprise", "D": "Current / Transition / Target"}, "ans": "B", "exp": "Architecture Landscape 有三个级别：① Strategic Architecture（战略架构，整个企业的高层次视图）② Segment Architecture（段架构，业务线/部门级别的详细视图）③ Capability Architecture（能力架构，特定能力的专项架构）。这与 Architecture Continuum 的四层次不同，请注意区分。", "topic": "t3"}, {"num": "Q41", "star": false, "q": "下列哪项不属于 Architecture Content Framework 的范畴？", "opts": {"A": "制品（Artifacts）的分类", "B": "架构交付物（Deliverables）的定义", "C": "建筑构建块（Building Blocks）的描述", "D": "架构师的薪资标准"}, "ans": "D", "exp": "Architecture Content Framework 定义了架构工作产品的结构和分类，包括：制品（Artifacts，分为目录/矩阵/图表）、交付物（Deliverables）、构建块（Building Blocks，包括 ABB 和 SBB）。它是 TOGAF 关于\"架构产出物应该是什么\"的规范框架。薪资标准显然不在其范畴内。", "topic": "t3"}, {"num": "Q42", "star": true, "q": "Enterprise Continuum（企业连续体）从左到右的四个层次顺序是什么？", "opts": {"A": "Organization-Specific → Industry → Common Systems → Foundation", "B": "Foundation → Common Systems → Industry → Organization-Specific", "C": "Generic → Specific → Industry → Enterprise", "D": "Tactical → Strategic → Operational → Governance"}, "ans": "B", "exp": "Enterprise Continuum 从左到右，越来越具体（Generic → Specific）：Foundation Architecture（基础架构，最通用，如 TOGAF TRM）→ Common Systems Architecture（通用系统架构，跨行业通用，如安全架构模式）→ Industry Architecture（行业架构，如制造业参考架构）→ Organization-Specific Architecture（组织专有架构，最具体）。方向：从抽象到具体，从通用到专有。", "topic": "t4"}, {"num": "Q43", "star": false, "q": "TOGAF 中，TRM（Technical Reference Model）的主要用途是什么？", "opts": {"A": "定义业务流程的标准模板", "B": "提供技术服务和技术标准的通用分类框架，作为技术架构开发的参考", "C": "管理架构项目的时间线", "D": "定义应用系统之间的集成标准"}, "ans": "B", "exp": "TRM 是 TOGAF Foundation Architecture 的核心组成部分，提供了一个技术服务的分类体系（如数据管理服务、通信服务、安全服务等），帮助组织：标准化技术选型、与行业标准对齐、为 Phase D 提供参考基础。", "topic": "t4"}, {"num": "Q44", "star": false, "q": "III-RM（Integrated Information Infrastructure Reference Model）主要关注什么？", "opts": {"A": "网络基础设施", "B": "在企业范围内实现无缝信息流的应用程序间互操作性", "C": "数据库管理系统", "D": "安全架构"}, "ans": "B", "exp": "III-RM 是 TOGAF Foundation Architecture 的另一个参考模型，专门关注企业信息基础设施的集成，特别是应用程序之间如何实现信息互操作（Interoperability）。它提供了一个参考架构，帮助设计\"所有应用都能互通\"的信息基础设施。", "topic": "t4"}, {"num": "Q45", "star": false, "q": "Architecture Repository 中的 Standards Information Base（标准信息库）存储什么？", "opts": {"A": "架构原则", "B": "组织认可和批准使用的技术标准、产品和规范清单", "C": "历史架构决策记录", "D": "架构师的工作日志"}, "ans": "B", "exp": "Standards Information Base 是 Architecture Repository 的一个组成部分，存储组织批准使用的技术标准，包括：开放标准（ISO、IEEE等）、供应商标准（SAP ABAP、Java EE等）、内部制定的技术规范。Phase D 开发技术架构时参考这个库选择符合标准的技术组件。", "topic": "t4"}, {"num": "Q46", "star": false, "q": "Enterprise Continuum 中的 Architecture Continuum 和 Solutions Continuum 有什么关系？", "opts": {"A": "两者完全相同", "B": "Architecture Continuum 描述架构（抽象），Solutions Continuum 描述实现（具体），两者平行且相互对应", "C": "Solutions Continuum 包含 Architecture Continuum", "D": "Architecture Continuum 在 Solutions Continuum 之后发展"}, "ans": "B", "exp": "Enterprise Continuum = Architecture Continuum + Solutions Continuum。两者平行对应：Architecture Continuum 从基础架构到组织专有架构（抽象层）；Solutions Continuum 从通用产品/服务到组织特定解决方案（具体实现层）。ABB 属于 Architecture Continuum，SBB 属于 Solutions Continuum。", "topic": "t4"}, {"num": "Q47", "star": false, "q": "以下哪项最能描述 Architecture Governance（架构治理）的核心功能？", "opts": {"A": "替代项目管理功能", "B": "确保架构活动符合组织战略，管理架构完整性，处理架构偏差", "C": "负责技术基础设施的运营维护", "D": "只在 Phase G 中发挥作用"}, "ans": "B", "exp": "架构治理是一套持续的管理机制，核心功能：确保架构与战略对齐、维护架构的完整性和质量、审查架构合规性、处理变更请求和豁免申请。它不仅在 Phase G，而是贯穿整个 ADM 的治理保障机制。", "topic": "t4"}]}, "L5_1": {"type": "reading", "title": "📖 架构治理概述与三层次", "html": "<h2 id=\"第一章-Architecture-Governance-架构治理-概述\">第一章：Architecture Governance（架构治理）概述</h2>\n<h3 id=\"什么是架构治理\">什么是架构治理</h3>\n<p>Architecture Governance（架构治理）是一套实践、规程和框架，用于确保企业架构在整个组织中得到有效实施、监控和控制。TOGAF 将架构治理定义为：<strong>对架构的运用和实施进行监管、管理和控制的方法与实践</strong>。它不是一个一次性的活动，而是贯穿企业架构全生命周期的持续过程。</p>\n<p>架构治理与企业整体的 Corporate Governance（公司治理）体系紧密关联，是企业治理在 IT 和技术领域的具体延伸。没有有效的架构治理，企业架构将沦为&quot;纸上谈兵&quot;——架构文档被束之高阁，实施团队按自己理解随意偏离，最终造成技术碎片化、系统孤岛和巨额技术债务。</p>\n<h3 id=\"架构治理的目标\">架构治理的目标</h3>\n<p>架构治理服务于三个核心目标：</p>\n<p><strong>1. 确保架构与战略对齐（Strategic Alignment）</strong></p>\n<p>架构决策必须与企业的业务战略、使命和价值主张保持一致。当业务战略发生变化时，架构治理机制负责触发相应的架构变更评审，防止&quot;战略漂移&quot;（Strategy Drift）。</p>\n<p><strong>2. 维护完整性（Maintain Integrity）</strong></p>\n<p>确保架构各组件之间的内在一致性，防止局部优化破坏整体架构的完整性。这包括业务架构、数据架构、应用架构和技术架构（BDAT）四个层次之间的横向一致，以及当前态（Baseline）与目标态（Target）之间的纵向衔接。</p>\n<p><strong>3. 控制质量（Quality Control）</strong></p>\n<p>通过合规审查（Compliance Review）、设计评审（Design Review）等机制，确保实施项目符合既定的架构标准、原则和规范，从源头控制技术质量。</p>\n<h3 id=\"架构治理的三个层次\">架构治理的三个层次</h3>\n<p>TOGAF 将企业治理划分为相互嵌套的三个层次：</p>\n<div class=\"tbl\"><table>\n<tr><th>层次</th><th>英文名称</th><th>关注范围</th></tr>\n<tr><td>第一层</td><td>Corporate Governance（公司治理）</td><td>董事会/股东层面，关注企业整体运营合规、财务透明和战略方向</td></tr>\n<tr><td>第二层</td><td>Technology Governance（技术治理）</td><td>技术标准、技术选型和技术演进的政策管理</td></tr>\n<tr><td>第三层</td><td>IT Governance（IT 治理）</td><td>IT 资产、IT 项目、IT 风险和 IT 服务的管理，COBIT 是常见框架</td></tr>\n</table></div>\n<p>架构治理（Architecture Governance）横跨后两个层次，为技术治理和 IT 治理提供架构视角的输入和约束。</p>\n<h3 id=\"TOGAF-架构治理的核心机制\">TOGAF 架构治理的核心机制</h3>\n<p>TOGAF 提出四项核心治理机制：</p>\n<ul>\n<li><strong>Architecture Board（架构委员会）</strong>：核心决策机构，负责跨项目的架构一致性裁决</li>\n<li><strong>Architecture Contract（架构合同）</strong>：确保架构意图在实施阶段得到履行的正式协议</li>\n<li><strong>Architecture Compliance（架构合规）</strong>：系统性评估项目是否符合既定架构要求</li>\n<li><strong>Architecture Principles（架构原则）</strong>：为所有架构决策提供基础性、持久性的指导准则</li>\n</ul>\n<hr>"}, "L5_2": {"type": "reading", "title": "📖 Architecture Board 职责", "html": "<h2 id=\"第二章-Architecture-Board-架构委员会-\">第二章：Architecture Board（架构委员会）</h2>\n<h3 id=\"定义和职责\">定义和职责</h3>\n<p>Architecture Board（架构委员会）是企业架构治理的<strong>核心执行机构</strong>，代表利益相关者的利益，对企业架构的实施和演进行使监管权力。它是架构治理从&quot;概念&quot;落地为&quot;实践&quot;的关键组织载体。</p>\n<p><strong>Architecture Board 的八项核心职责：</strong></p>\n<ol>\n<li><strong>提供并维护架构原则</strong>（Provide and Maintain Architecture Principles） 制定和发布企业级架构原则，并定期回顾原则的时效性和适用性，确保原则与业务战略保持同步。</li>\n</ol>\n<ol>\n<li><strong>架构合规审查授权</strong>（Authorize Architecture Compliance Reviews） 审批需要开展合规审查的项目范围，指派审查小组，并最终裁决合规结论。</li>\n</ol>\n<ol>\n<li><strong>解决架构冲突</strong>（Resolve Architecture Conflicts） 当项目团队之间、业务部门之间或不同架构标准之间出现冲突时，Architecture Board 作为最终仲裁机构介入裁决。</li>\n</ol>\n<ol>\n<li><strong>批准架构例外和豁免</strong>（Approve Architecture Dispensations） 对于无法完全满足架构要求的项目，Architecture Board 审查豁免申请，决定是否授予 Architecture Dispensation。</li>\n</ol>\n<ol>\n<li><strong>管理架构合同</strong>（Manage Architecture Contracts） 批准并监督架构团队与赞助方、实施团队之间签订的架构合同，确保合同条款的执行。</li>\n</ol>\n<ol>\n<li><strong>审批目标架构变更</strong>（Approve Changes to Target Architecture） 当业务需求或外部环境触发目标架构调整时，Architecture Board 负责评估变更影响并授权变更实施。</li>\n</ol>\n<ol>\n<li><strong>监控架构实施进展</strong>（Monitor Architecture Implementation Progress） 定期接收项目实施的架构合规报告，追踪与目标架构的偏差趋势，必要时启动纠偏措施。</li>\n</ol>\n<ol>\n<li><strong>维护架构资产库</strong>（Maintain Architecture Repository） 监督 Architecture Repository 的内容质量，确保架构成果物（Artifacts）、参考模型（Reference Models）和标准的及时更新和有效管理。</li>\n</ol>\n<h3 id=\"Architecture-Board-的成员构成\">Architecture Board 的成员构成</h3>\n<p>Architecture Board 应代表组织各类利益相关者，典型构成如下：</p>\n<p><strong>业务代表（Business Representatives）</strong></p>\n<ul>\n<li>业务单元负责人或其授权代表</li>\n<li>业务战略规划部门代表</li>\n<li>负责提供业务需求视角，防止架构&quot;技术自嗨&quot;</li>\n</ul>\n<p><strong>IT 代表（IT Representatives）</strong></p>\n<ul>\n<li>首席架构师（Chief Architect）或企业架构师（Enterprise Architect）</li>\n<li>应用架构师、数据架构师、基础设施架构师</li>\n<li>IT 项目管理办公室（PMO）代表</li>\n<li>信息安全负责人（CISO）或代表</li>\n</ul>\n<p><strong>外部顾问（External Advisors）</strong>——可选但推荐</p>\n<ul>\n<li>独立架构顾问，提供外部视角和行业最佳实践</li>\n<li>主要技术供应商的架构专家（需注意利益冲突管理）</li>\n<li>行业监管机构代表（适用于金融、医疗等受监管行业）</li>\n</ul>\n<blockquote><p><strong>设计原则</strong>：成员数量不宜过多（通常 7-12 人），业务代表比例建议不低于 30%，避免 Architecture Board 沦为纯技术委员会。</p></blockquote>\n<h3 id=\"Architecture-Board-的权限范围\">Architecture Board 的权限范围</h3>\n<p>Architecture Board 的权限边界需要在章程（Charter）中明确定义，通常包括：</p>\n<ul>\n<li><strong>批准权</strong>：架构原则、参考架构、技术标准清单（Technology Standards Catalog）、架构合同、架构豁免</li>\n<li><strong>裁决权</strong>：架构冲突、架构合规结论的最终裁定</li>\n<li><strong>否决权</strong>：对严重不合规项目的立项或上线实施暂停令</li>\n<li><strong>建议权</strong>：向 IT 预算委员会、战略委员会提供架构可行性建议</li>\n</ul>\n<p>Architecture Board <strong>不</strong>负责的事项：项目的日常管理、具体技术选型的实施细节、供应商合同谈判。</p>\n<h3 id=\"运作模式\">运作模式</h3>\n<p><strong>会议频率：</strong></p>\n<ul>\n<li>常规月度会议（Monthly Regular Meeting）：处理合规审查结论、合同审批等常规事项</li>\n<li>季度战略会议（Quarterly Strategy Review）：回顾架构原则时效性、评估目标架构进展</li>\n<li>紧急特别会议（Ad-hoc Emergency Meeting）：处理重大架构冲突或紧急豁免申请</li>\n</ul>\n<p><strong>决策机制：</strong></p>\n<ul>\n<li>优先以共识（Consensus）达成决议</li>\n<li>无法共识时采用多数投票，须记录少数意见</li>\n<li>重大变更（如修改核心架构原则）可要求 2/3 多数或一票否决权保护</li>\n</ul>\n<p><strong>记录要求：</strong></p>\n<ul>\n<li>所有决议必须形成正式会议纪要并归档</li>\n<li>合规审查结论、豁免批准须记录决策理由</li>\n<li>决议记录纳入 Architecture Repository 的 Governance Log</li>\n</ul>\n<h3 id=\"Architecture-Board-vs-Steering-Committee-的区别\">Architecture Board vs Steering Committee 的区别</h3>\n<p>这是考试中的常见混淆点：</p>\n<div class=\"tbl\"><table>\n<tr><th>对比维度</th><th>Architecture Board</th><th>Steering Committee（指导委员会）</th></tr>\n<tr><td>关注焦点</td><td>架构标准、合规、完整性</td><td>项目优先级、资源分配、里程碑达成</td></tr>\n<tr><td>决策类型</td><td>架构是否合规、是否豁免</td><td>项目是否继续、资源是否增加</td></tr>\n<tr><td>成员来源</td><td>架构师为主，业务代表辅助</td><td>业务高管为主，IT 支持</td></tr>\n<tr><td>时间视野</td><td>长期（架构演进方向）</td><td>中期（项目交付周期）</td></tr>\n<tr><td>TOGAF 定位</td><td>治理执行机构</td><td>项目监督机构</td></tr>\n</table></div>\n<p><strong>记忆口诀</strong>：Architecture Board 管&quot;做得对不对&quot;，Steering Committee 管&quot;做不做得到&quot;。</p>\n<hr>"}, "L5_3": {"type": "reading", "title": "📖 Architecture Compliance 四级别", "html": "<h2 id=\"第三章-Architecture-Compliance-架构合规-\">第三章：Architecture Compliance（架构合规）</h2>\n<h3 id=\"合规的目的\">合规的目的</h3>\n<p>Architecture Compliance（架构合规）的根本目的是确保<strong>实施项目忠实执行了已批准的架构意图</strong>。它是架构从设计到交付的质量守门机制，防止以下风险：</p>\n<ul>\n<li>开发团队&quot;创造性地&quot;偏离架构设计</li>\n<li>技术债务在项目层面悄然积累</li>\n<li>架构原则形同虚设、失去权威性</li>\n</ul>\n<p>合规评审（Compliance Review）应当是建设性的而非惩罚性的，目标是<strong>早期发现偏差并提供纠偏路径</strong>，而非单纯给项目贴&quot;不合格&quot;标签。</p>\n<h3 id=\"四个合规级别详解\">四个合规级别详解</h3>\n<p>TOGAF 定义了四个合规级别，是 Level 2 考试的必考知识点：</p>\n<h4 id=\"1-Conformant-完全一致-\">1. Conformant（完全一致）</h4>\n<p><strong>定义</strong>：项目完全满足架构合同和架构规范中规定的所有要求。</p>\n<p><strong>特征：</strong></p>\n<ul>\n<li>所有强制性（Mandatory）架构要求均已满足</li>\n<li>技术选型在批准的技术标准清单之内</li>\n<li>数据模型、接口规范符合企业标准</li>\n<li>无任何已知偏差</li>\n</ul>\n<p><strong>处理方式：</strong> 直接出具合规证明（Compliance Certificate），项目可正常推进。无需额外行动。</p>\n<hr>\n<h4 id=\"2-Compliant-基本合规-有轻微偏差-\">2. Compliant（基本合规，有轻微偏差）</h4>\n<p><strong>定义</strong>：项目满足所有强制性架构要求，但在推荐性（Recommended）或指南性（Guideline）要求上存在轻微偏差，且偏差有合理解释。</p>\n<p><strong>特征：</strong></p>\n<ul>\n<li>核心架构原则未被违反</li>\n<li>偏差属于技术细节层面，不影响系统互操作性或整体架构完整性</li>\n<li>项目团队已知晓偏差并提供了文档说明</li>\n</ul>\n<p><strong>处理方式：</strong> 出具附条件的合规证明，要求项目团队记录偏差、制定后续改进计划。Architecture Board 备案但无需正式审议。</p>\n<hr>\n<h4 id=\"3-Non-Conformant-不合规-\">3. Non-Conformant（不合规）</h4>\n<p><strong>定义</strong>：项目违反了一项或多项强制性架构要求，或存在重大架构偏差，可能危及企业架构的完整性。</p>\n<p><strong>特征：</strong></p>\n<ul>\n<li>违反强制性架构原则（如安全要求、数据主权要求）</li>\n<li>引入未经批准的技术组件（如采用黑名单中的技术）</li>\n<li>数据流或接口设计破坏了既定的集成架构</li>\n<li>偏差已影响到其他依赖该项目的系统</li>\n</ul>\n<p><strong>处理方式：</strong></p>\n<ol>\n<li>立即通知项目 Sponsor 和 Architecture Board</li>\n<li>项目进入<strong>暂停（Hold）</strong>状态，直到问题解决</li>\n<li>项目团队须制定整改方案（Remediation Plan）</li>\n<li>Architecture Board 审议整改方案后决定：批准整改、要求申请豁免（Dispensation）或否决项目继续</li>\n</ol>\n<hr>\n<h4 id=\"4-Irrelevant-不相关-\">4. Irrelevant（不相关）</h4>\n<p><strong>定义</strong>：特定架构要求对该项目不适用，或项目范围与架构约束之间不存在关联性。</p>\n<p><strong>特征：</strong></p>\n<ul>\n<li>项目属于独立封闭系统，与企业架构没有集成接触点</li>\n<li>架构要求是针对特定业务场景制定的，而项目不属于该场景</li>\n<li>临时性/实验性项目，生命周期短于架构治理周期</li>\n</ul>\n<p><strong>处理方式：</strong> 在合规报告中记录&quot;不相关&quot;判定及理由，无需进一步行动。但需定期复查，防止项目范围扩展后改变其关联性。</p>\n<h3 id=\"Architecture-Compliance-Review-流程-6步-\">Architecture Compliance Review 流程（6步）</h3>\n<pre><code>Step 1：触发合规审查\n         ↓\n         通常在 ADM Phase G（实施治理）中，或项目达到重要里程碑时触发\n         由 Architecture Board 或 PMO 授权启动\n\nStep 2：收集项目文档\n         ↓\n         获取项目设计文档、技术规格书、数据模型、集成方案\n         对照已批准的架构合同（Architecture Contract）核查范围\n\nStep 3：初步桌面审查（Desktop Review）\n         ↓\n         架构师团队独立分析文档\n         标记疑似偏差点，准备澄清问题清单\n\nStep 4：召开合规审查会议（Compliance Review Meeting）\n         ↓\n         项目团队演示设计方案\n         架构审查团队逐项核对合规清单\n         记录所有偏差及项目团队解释\n\nStep 5：出具合规评估报告（Compliance Assessment Report）\n         ↓\n         评定合规级别（Conformant/Compliant/Non-Conformant/Irrelevant）\n         对每项偏差出具处理建议\n         提交 Architecture Board 审批\n\nStep 6：跟踪整改与关闭\n         ↓\n         Non-Conformant 项目的整改计划执行跟踪\n         合规证明存档至 Architecture Repository\n         更新 Governance Log</code></pre>\n<h3 id=\"Architecture-Dispensation-架构豁免-\">Architecture Dispensation（架构豁免）</h3>\n<p><strong>定义：</strong> Architecture Dispensation（架构豁免）是 Architecture Board 正式授权某项目在特定条件下偏离既定架构要求的书面许可。豁免不是&quot;默许违规&quot;，而是<strong>有时限、有条件、有代价的正式例外管理</strong>。</p>\n<p><strong>适用场景：</strong></p>\n<ul>\n<li>业务紧急性压倒架构纯粹性（如监管截止日期无法延迟）</li>\n<li>引入战略性技术组件，尚未纳入架构标准但已明确未来纳入路线图</li>\n<li>遗留系统改造成本极高，短期内完全合规不现实</li>\n<li>并购整合场景，被收购公司的系统需要过渡期</li>\n</ul>\n<p><strong>审批流程：</strong></p>\n<ol>\n<li><strong>申请</strong>：项目团队提交豁免申请，说明偏差内容、业务理由、影响范围、持续时间和风险缓解措施</li>\n<li><strong>初审</strong>：企业架构师团队评估技术影响，出具初审意见</li>\n<li><strong>Architecture Board 审议</strong>：召开专项审议或在例会中讨论，权衡业务价值与架构风险</li>\n<li><strong>批准与条件设定</strong>：若批准，明确豁免有效期（通常不超过 12-18 个月）、附加条件（如制定迁移计划）和复查时间点</li>\n<li><strong>归档</strong>：豁免决定及理由存档至 Architecture Repository，列入架构技术债务台账</li>\n<li><strong>到期复查</strong>：豁免到期前 90 天自动触发复查，决定延期或要求完成整改</li>\n</ol>\n<blockquote><p><strong>考试警示</strong>：豁免（Dispensation）不等于豁免后合规级别变为 Conformant，项目仍然是 Non-Conformant，只是获得了合法的例外授权。</p></blockquote>\n<hr>"}, "L5_4": {"type": "reading", "title": "📖 Architecture Contract", "html": "<h2 id=\"第四章-Architecture-Contract-架构合同-\">第四章：Architecture Contract（架构合同）</h2>\n<h3 id=\"定义和目的\">定义和目的</h3>\n<p>Architecture Contract（架构合同）是架构团队与其合作方之间签订的<strong>关于架构可交付成果、质量标准和行为准则的正式书面协议</strong>。</p>\n<p>其核心目的是将&quot;架构愿景&quot;转化为可执行、可监督的承诺，确保：</p>\n<ul>\n<li>项目 Sponsor 理解并承认架构对项目的约束</li>\n<li>实施团队清楚知晓必须遵守的架构规范</li>\n<li>架构偏差在被发现时有明确的处理依据</li>\n</ul>\n<h3 id=\"两种类型的架构合同\">两种类型的架构合同</h3>\n<h4 id=\"类型一-架构团队与赞助方-Sponsor-之间的合同\">类型一：架构团队与赞助方（Sponsor）之间的合同</h4>\n<p>这类合同在 <strong>Phase A（架构愿景）</strong> 阶段签订，确立本次架构工作的范围、交付物和成功标准。</p>\n<p><strong>典型内容：</strong></p>\n<ul>\n<li>架构工作的范围和边界（Scope and Boundaries）</li>\n<li>架构可交付成果清单及完成时间表</li>\n<li>架构工作的资源需求（人力、工具、时间）</li>\n<li>架构愿景（Architecture Vision）的核心原则</li>\n<li>Sponsor 的角色和责任（如提供业务需求、参与评审）</li>\n<li>架构成果的验收标准</li>\n</ul>\n<h4 id=\"类型二-架构团队与实施团队之间的合同\">类型二：架构团队与实施团队之间的合同</h4>\n<p>这类合同在 <strong>Phase G（实施治理）</strong> 阶段签订（或在实施项目启动时），确保实施忠实执行已批准的架构。</p>\n<p><strong>典型内容：</strong></p>\n<ul>\n<li>项目必须遵守的架构原则和技术标准</li>\n<li>数据模型、接口规范、安全要求等技术规格</li>\n<li>合规审查的时间节点和触发条件</li>\n<li>架构例外处理流程（如何申请豁免）</li>\n<li>架构变更控制程序（变更需要重新审批）</li>\n<li>架构成果物的访问权限和使用规范</li>\n</ul>\n<h3 id=\"架构合同的核心内容-七项-\">架构合同的核心内容（七项）</h3>\n<ol>\n<li><strong>范围说明（Scope Statement）</strong>：明确合同覆盖的系统边界、业务流程和地理范围</li>\n<li><strong>架构原则遵从声明（Principle Adherence Declaration）</strong>：项目团队声明已理解并承诺遵守相关架构原则</li>\n<li><strong>技术标准清单引用（Technology Standards Reference）</strong>：明确引用适用的企业技术标准</li>\n<li><strong>质量要求（Quality Requirements）</strong>：性能基线、安全等级、可用性目标等量化要求</li>\n<li><strong>合规检查点（Compliance Checkpoints）</strong>：规定在哪些里程碑需要接受架构合规审查</li>\n<li><strong>变更控制条款（Change Control Clause）</strong>：架构变更的申请、评审和批准流程</li>\n<li><strong>争议解决机制（Dispute Resolution Mechanism）</strong>：当架构解读产生分歧时的升级路径</li>\n</ol>\n<h3 id=\"架构合同在-ADM-中的位置\">架构合同在 ADM 中的位置</h3>\n<pre><code>Phase A（架构愿景）\n  └── 签订：架构团队 ↔ Sponsor 的合同\n  └── 明确本次 ADM 循环的工作范围和产出\n\nPhase B/C/D（业务/信息系统/技术架构）\n  └── 合同内容持续细化，纳入各层次的具体技术标准\n\nPhase G（实施治理）\n  └── 签订：架构团队 ↔ 实施团队的合同\n  └── 将架构规范转化为项目团队的约束条件\n  └── 建立合规审查触发机制</code></pre>\n<p><strong>考点提示</strong>：架构合同是 Phase G 最重要的治理工具，但其根基在 Phase A 即已建立。</p>\n<hr>"}, "L5_5": {"type": "reading", "title": "📖 架构能力成熟度模型", "html": "<h2 id=\"第五章-Architecture-Capability-Framework-架构能力框架-\">第五章：Architecture Capability Framework（架构能力框架）</h2>\n<h3 id=\"架构能力的定义\">架构能力的定义</h3>\n<p>Architecture Capability（架构能力）是指企业<strong>系统性、持续性地开展有效企业架构工作的综合能力</strong>。它不仅仅是&quot;有架构师&quot;，而是涵盖人员（People）、流程（Process）、工具（Tools）和信息（Information）四个维度的有机整体。</p>\n<p>TOGAF 的 Architecture Capability Framework 提供了建立和维持架构能力所需的参考结构，是企业架构&quot;从无到有&quot;、&quot;从弱到强&quot;的路线图。</p>\n<h3 id=\"架构能力成熟度模型-Architecture-Maturity-Model-\">架构能力成熟度模型（Architecture Maturity Model）</h3>\n<p>架构成熟度模型帮助组织客观评估当前的架构能力水平，并制定提升路径：</p>\n<div class=\"tbl\"><table>\n<tr><th>级别</th><th>名称</th><th>特征描述</th></tr>\n<tr><td><strong>0级</strong></td><td>None（无）</td><td>企业没有正式的架构实践，架构工作完全缺失或仅在个人层面存在</td></tr>\n<tr><td><strong>1级</strong></td><td>Initial / Ad Hoc（初始/临时）</td><td>架构活动存在但高度依赖个人英雄主义，无标准流程，结果不可重复，架构文档零散且不一致</td></tr>\n<tr><td><strong>2级</strong></td><td>Defined / Repeatable（定义/可重复）</td><td>基本架构流程已定义，存在架构文档模板，核心项目可以重复执行架构评审，但各业务单元间不一致</td></tr>\n<tr><td><strong>3级</strong></td><td>Standardized / Managed（标准化/管理）</td><td>企业级架构标准、原则和流程已建立，Architecture Board 运作正常，架构合规检查系统性执行，指标可量化</td></tr>\n<tr><td><strong>4级</strong></td><td>Quantitatively Managed / Optimized（量化/优化）</td><td>架构治理成效可量化测量（如合规率、技术债务减少量），数据驱动决策，主动识别和管理架构风险</td></tr>\n<tr><td><strong>5级</strong></td><td>Continuous Improvement（持续改进）</td><td>架构能力成为竞争优势，架构实践持续自我优化，与业务战略深度融合，架构团队主动引领业务创新</td></tr>\n</table></div>\n<p><strong>中国企业典型现状</strong>：大多数中国大型企业处于 1-2 级，部分数字化领先企业（金融、电信、互联网）已达到 3 级，极少数跨国企业中国区可能达到 4 级。</p>\n<h3 id=\"建立架构能力所需的核心要素\">建立架构能力所需的核心要素</h3>\n<h4 id=\"人员-People-\">人员（People）</h4>\n<ul>\n<li><strong>角色定义</strong>：企业架构师（Enterprise Architect）、领域架构师（Domain Architect，如数据架构师、安全架构师）、架构分析师（Architecture Analyst）</li>\n<li><strong>技能要求</strong>：技术深度 + 业务理解 + 沟通能力（架构师最难得的是翻译能力：把业务语言翻译成技术语言，反之亦然）</li>\n<li><strong>职业发展路径</strong>：从项目架构师 → 解决方案架构师 → 企业架构师 → 首席架构师</li>\n<li><strong>培训体系</strong>：TOGAF 认证、行业专项认证（SABSA 安全架构、Zachman、ArchiMate）</li>\n</ul>\n<h4 id=\"流程-Process-\">流程（Process）</h4>\n<ul>\n<li><strong>ADM 流程定制</strong>：基于标准 TOGAF ADM 定制适合本企业的架构开发流程</li>\n<li><strong>治理流程</strong>：合规审查流程、豁免审批流程、架构变更控制流程</li>\n<li><strong>参与流程</strong>：架构师如何嵌入项目立项、需求分析、设计评审等项目节点</li>\n<li><strong>知识管理流程</strong>：架构成果物的创建、审批、发布和版本管理</li>\n</ul>\n<h4 id=\"工具-Tools-\">工具（Tools）</h4>\n<ul>\n<li><strong>架构建模工具</strong>：ArchiMate（推荐，TOGAF 官方建模语言）、Sparx EA、BiZZdesign、LeanIX</li>\n<li><strong>协作平台</strong>：架构文档的统一存储和访问（Confluence、SharePoint）</li>\n<li><strong>可视化工具</strong>：架构图的标准化绘制（Visio、Lucidchart、draw.io）</li>\n<li><strong>治理工具</strong>：合规检查单管理、Architecture Repository 系统</li>\n</ul>\n<h4 id=\"信息-Information-\">信息（Information）</h4>\n<ul>\n<li><strong>Architecture Repository</strong>：统一的架构知识库，包括： - Architecture Landscape（当前态架构全景） - Standards Information Base（技术标准库） - Reference Library（参考架构和最佳实践） - Governance Log（治理决策记录）</li>\n<li><strong>度量指标体系</strong>：合规率、架构偏差数量、技术标准覆盖率等关键指标</li>\n</ul>\n<hr>"}, "L5_6": {"type": "reading", "title": "📖 12条架构原则完整版", "html": "<h2 id=\"第六章-Architecture-Principles-架构原则-深度解析\">第六章：Architecture Principles（架构原则）深度解析</h2>\n<h3 id=\"原则的-5-要素\">原则的 5 要素</h3>\n<p>TOGAF 规定，一条完整的架构原则必须包含以下五个要素，<strong>缺少任何一项都是不完整的原则</strong>：</p>\n<div class=\"tbl\"><table>\n<tr><th>要素</th><th>英文</th><th>说明</th></tr>\n<tr><td><strong>名称</strong></td><td>Name</td><td>简短、易记、能直接传达原则精髓的标题，通常 3-6 个词</td></tr>\n<tr><td><strong>陈述</strong></td><td>Statement</td><td>用简洁、无歧义的语言表述原则的核心主张，通常 1-2 句话</td></tr>\n<tr><td><strong>理由</strong></td><td>Rationale</td><td>解释为什么这条原则重要，与业务价值的关联，以及不遵守的后果</td></tr>\n<tr><td><strong>含义</strong></td><td>Implications</td><td>这条原则对业务、IT 和架构工作意味着什么，需要做什么、不能做什么（这是最难写好的部分）</td></tr>\n<tr><td><strong>度量</strong></td><td>Metrics</td><td>如何判断这条原则是否被遵守（有些框架将此列为可选项，但加入可显著提升原则的可执行性）</td></tr>\n</table></div>\n<h3 id=\"制定好原则的标准\">制定好原则的标准</h3>\n<p>一条优质的架构原则应满足以下标准：</p>\n<ul>\n<li><strong>可理解性</strong>（Understandable）：业务人员和技术人员都能理解，无需专业解码</li>\n<li><strong>健壮性</strong>（Robust）：能够应对边界情况，不因特殊场景而失效</li>\n<li><strong>完整性</strong>（Complete）：包含所有 5 个要素，无遗漏</li>\n<li><strong>一致性</strong>（Consistent）：与其他原则不产生矛盾，如有张力应明确优先级</li>\n<li><strong>稳定性</strong>（Stable）：足够持久，不随每个项目而频繁变化，但也非一成不变</li>\n</ul>\n<h3 id=\"12-条示范架构原则-完整版-\">12 条示范架构原则（完整版）</h3>\n<hr>\n<h4 id=\"原则-1-Primacy-of-Principles-原则优先-\">原则 1：Primacy of Principles（原则优先）</h4>\n<p><strong>Statement（陈述）：</strong></p>\n<p>当架构原则与具体项目需求、商业压力或个人偏好发生冲突时，架构原则具有最高优先级。任何对原则的偏离都必须经过正式的例外审批程序。</p>\n<p><strong>Rationale（理由）：</strong></p>\n<p>如果允许随意偏离架构原则，则原则将失去约束力，架构治理体系将形同虚设。统一遵守原则是实现架构一致性的前提，也是长期降低 IT 复杂度的基础。</p>\n<p><strong>Implications（含义）：</strong></p>\n<ul>\n<li>所有架构决策须对照原则进行审查</li>\n<li>项目团队无权单方面决定偏离原则</li>\n<li>Architecture Board 是唯一有权批准例外的机构</li>\n<li>需建立高效的例外审批流程，避免原则成为业务创新的阻碍</li>\n</ul>\n<hr>\n<h4 id=\"原则-2-Maximize-Benefit-to-the-Enterprise-企业效益最大化-\">原则 2：Maximize Benefit to the Enterprise（企业效益最大化）</h4>\n<p><strong>Statement：</strong></p>\n<p>架构决策应优先服务于企业整体利益，而非局部业务单元或个别项目的利益。当局部利益与整体利益冲突时，整体利益优先。</p>\n<p><strong>Rationale：</strong></p>\n<p>IT 投资必须产生最大化的整体业务价值。局部最优往往导致全局次优——各自为政的系统建设造成数据孤岛、集成复杂度飙升，最终损害企业整体竞争力。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>项目立项时须评估对企业整体架构的影响</li>\n<li>共享服务（Shared Services）优先于重复建设</li>\n<li>架构评审委员会须有业务代表参与，而非纯技术决策</li>\n<li>需要透明的成本分摊机制，使共享服务的受益方公平分担建设成本</li>\n</ul>\n<hr>\n<h4 id=\"原则-3-Information-Management-is-Everybody-s-Business-信息管理是所有人的事-\">原则 3：Information Management is Everybody&#x27;s Business（信息管理是所有人的事）</h4>\n<p><strong>Statement：</strong></p>\n<p>信息管理不仅仅是 IT 部门的职责，每位员工都是企业信息的生产者、使用者和守护者，对信息的质量和合理使用负有责任。</p>\n<p><strong>Rationale：</strong></p>\n<p>信息是企业的核心战略资产。只有当全体员工都重视信息质量，才能从根本上解决&quot;垃圾进垃圾出&quot;（GIGO）问题，实现数据驱动的企业决策。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>每个业务流程都需要明确的数据责任人（Data Owner）</li>\n<li>信息管理培训须覆盖非技术人员</li>\n<li>绩效考核体系应纳入数据质量相关指标</li>\n<li>IT 部门角色从&quot;数据保管者&quot;转向&quot;信息平台提供者&quot;</li>\n</ul>\n<hr>\n<h4 id=\"原则-4-Business-Continuity-业务连续性-\">原则 4：Business Continuity（业务连续性）</h4>\n<p><strong>Statement：</strong></p>\n<p>企业运营不能因 IT 系统故障而中断。所有关键业务系统的设计必须确保在预定的故障场景下能够持续提供业务服务。</p>\n<p><strong>Rationale：</strong></p>\n<p>业务中断的代价远超 IT 高可用建设的投入。对于依赖 IT 系统的现代企业，IT 连续性即业务连续性。监管要求（如金融行业 RTO/RPO 要求）也对此明确规定。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>所有关键系统须完成业务影响分析（BIA），明确 RTO 和 RPO 目标</li>\n<li>关键系统须制定灾难恢复计划（DRP）并定期演练</li>\n<li>架构设计须消除单点故障（SPOF）</li>\n<li>业务连续性成本须纳入系统建设预算，而非事后补救</li>\n</ul>\n<hr>\n<h4 id=\"原则-5-Common-Use-Applications-通用应用-\">原则 5：Common Use Applications（通用应用）</h4>\n<p><strong>Statement：</strong></p>\n<p>优先采用满足多个业务需求的通用应用系统，而非为每个业务单元单独建设专用系统。</p>\n<p><strong>Rationale：</strong></p>\n<p>减少系统数量可降低维护成本、培训成本和集成复杂度。通用应用还促进跨部门的流程标准化和数据一致性。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>新系统申请须证明现有系统无法满足需求（&quot;新建理由&quot;原则）</li>\n<li>共享应用的功能增强须经过多方需求平衡</li>\n<li>需要建立共享应用的治理机制，防止单一部门主导架构方向</li>\n<li>在特殊业务需求与通用系统之间寻找平衡，避免过度定制破坏通用性</li>\n</ul>\n<hr>\n<h4 id=\"原则-6-Service-Orientation-服务化-\">原则 6：Service Orientation（服务化）</h4>\n<p><strong>Statement：</strong></p>\n<p>IT 功能应以服务的形式提供，服务具有明确定义的接口、独立的生命周期，并通过标准协议供消费者调用，而非通过紧耦合的点对点集成。</p>\n<p><strong>Rationale：</strong></p>\n<p>服务化架构（SOA/微服务）使 IT 能力可复用、可组合，显著提升业务敏捷性。松耦合设计减少了变更的连锁影响，降低了维护成本。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>新建系统须按服务化架构设计，对外提供标准 API</li>\n<li>遗留系统改造须优先考虑服务化包装（Service Wrapper）</li>\n<li>须建立 API 治理规范（版本管理、安全、限流等）</li>\n<li>服务目录（Service Catalog）须及时维护，防止服务重复建设</li>\n</ul>\n<hr>\n<h4 id=\"原则-7-Compliance-with-Law-法律合规-\">原则 7：Compliance with Law（法律合规）</h4>\n<p><strong>Statement：</strong></p>\n<p>所有 IT 系统的设计和运营必须符合所适用的法律法规要求，包括但不限于数据隐私法、网络安全法、财务合规要求和行业监管规定。</p>\n<p><strong>Rationale：</strong></p>\n<p>违法合规的代价包括监管处罚、声誉损失和业务中断，远超合规建设的投入。更重要的是，这是企业公民的基本责任。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>架构评审须包含法律合规检查清单</li>\n<li>涉及个人数据处理的系统须完成隐私影响评估（PIA）</li>\n<li>须建立法规变化的监控机制，及时将新法规转化为架构约束</li>\n<li>外包和云服务选型须考虑数据主权和跨境传输合规</li>\n</ul>\n<hr>\n<h4 id=\"原则-8-IT-Responsibility-IT-责任-\">原则 8：IT Responsibility（IT 责任）</h4>\n<p><strong>Statement：</strong></p>\n<p>IT 部门对企业信息系统的质量、安全和有效性承担直接责任，同时也有责任确保业务部门有效利用 IT 能力实现业务目标。</p>\n<p><strong>Rationale：</strong></p>\n<p>明确责任归属是有效治理的前提。IT 部门不能以&quot;业务没说清楚需求&quot;为由推卸对系统质量的责任，同样，IT 部门也有责任主动帮助业务部门理解 IT 能力边界。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>IT 部门须建立服务质量（SLA）承诺机制</li>\n<li>IT 组织结构须明确每个系统的负责人（System Owner）</li>\n<li>IT 投资须有清晰的业务价值测量方法</li>\n<li>须建立 IT 与业务的联合问责机制</li>\n</ul>\n<hr>\n<h4 id=\"原则-9-Protection-of-Intellectual-Property-知识产权保护-\">原则 9：Protection of Intellectual Property（知识产权保护）</h4>\n<p><strong>Statement：</strong></p>\n<p>企业必须保护其 IT 系统、软件代码、数据资产和业务流程中蕴含的知识产权，同时确保合法使用第三方知识产权。</p>\n<p><strong>Rationale：</strong></p>\n<p>知识产权是企业竞争优势的重要来源。违规使用第三方知识产权（如软件盗版、代码剽窃）将导致严重的法律和声誉风险。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>须建立软件资产管理（SAM）制度，确保许可证合规</li>\n<li>自研系统的代码须有明确的知识产权归属声明</li>\n<li>开源软件使用须遵守相应许可证要求（特别是 GPL/LGPL）</li>\n<li>外包开发合同须明确知识产权归属条款</li>\n</ul>\n<hr>\n<h4 id=\"原则-10-Data-is-an-Asset-数据是资产-\">原则 10：Data is an Asset（数据是资产）</h4>\n<p><strong>Statement：</strong></p>\n<p>数据是企业的战略资产，像管理财务资产一样，须对数据进行系统化的识别、估值、管理、保护和利用。</p>\n<p><strong>Rationale：</strong></p>\n<p>数字经济时代，数据已成为核心生产要素。将数据视为&quot;副产品&quot;而非&quot;资产&quot;，将导致数据价值被大量浪费，同时数据治理缺失带来的质量和安全风险将逐渐显现。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>须建立企业数据目录（Data Catalog），盘点数据资产</li>\n<li>每类关键数据须指定数据资产负责人（Data Asset Owner）</li>\n<li>数据质量须有量化的评估指标和改进机制</li>\n<li>数据的全生命周期管理（从创建到归档/销毁）须有明确规程</li>\n</ul>\n<hr>\n<h4 id=\"原则-11-Data-is-Shared-数据共享-\">原则 11：Data is Shared（数据共享）</h4>\n<p><strong>Statement：</strong></p>\n<p>企业数据不属于任何单一业务单元，须在授权范围内在组织内共享使用，消除数据孤岛，实现&quot;一份数据、全企业共用&quot;。</p>\n<p><strong>Rationale：</strong></p>\n<p>数据孤岛是造成信息不一致、决策误判和运营低效的根本原因之一。数据共享是实现统一客户视图、统一财务视图等关键能力的基础。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>须建立企业级数据共享平台（Data Platform）</li>\n<li>数据共享须建立在数据治理框架之上（分类、授权、审计）</li>\n<li>业务系统设计须避免&quot;数据私有化&quot;架构模式</li>\n<li>主数据管理（MDM）须得到全面推行，确保唯一数据源</li>\n</ul>\n<hr>\n<h4 id=\"原则-12-Data-Accessibility-数据可访问-\">原则 12：Data Accessibility（数据可访问）</h4>\n<p><strong>Statement：</strong></p>\n<p>授权用户须能够方便、及时地访问所需数据，系统设计不应在满足安全合规前提下制造不必要的数据访问障碍。</p>\n<p><strong>Rationale：</strong></p>\n<p>数据只有被访问和使用才能产生价值。过度的访问限制、复杂的申请流程或低效的数据服务，都会压制数据资产的价值实现。</p>\n<p><strong>Implications：</strong></p>\n<ul>\n<li>数据访问控制须基于角色（RBAC），而非繁琐的审批流程</li>\n<li>关键业务数据的访问响应时间须有 SLA 保障</li>\n<li>自助数据服务（Self-Service Analytics）是数据可访问原则的重要实现手段</li>\n<li>数据可访问性与数据安全性之间的平衡须在架构层面明确设计</li>\n</ul>\n<hr>"}, "L5_7": {"type": "reading", "title": "📖 PESTLE 与 Level 2 考点", "html": "<h2 id=\"第七章-PESTLE-分析在架构治理中的应用\">第七章：PESTLE 分析在架构治理中的应用</h2>\n<h3 id=\"PESTLE-框架概述\">PESTLE 框架概述</h3>\n<p>PESTLE 是分析外部环境变化对企业架构产生影响的结构化工具，六个维度分别代表：</p>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>英文全称</th><th>关注内容</th></tr>\n<tr><td><strong>P</strong></td><td>Political（政治）</td><td>政府政策、地缘政治、贸易限制、政治稳定性</td></tr>\n<tr><td><strong>E</strong></td><td>Economic（经济）</td><td>经济周期、汇率、通胀、融资成本、市场竞争格局</td></tr>\n<tr><td><strong>S</strong></td><td>Social（社会）</td><td>人口结构、消费行为变化、劳动力市场、文化趋势</td></tr>\n<tr><td><strong>T</strong></td><td>Technology（技术）</td><td>技术创新、数字化转型、技术过时风险、新兴技术</td></tr>\n<tr><td><strong>L</strong></td><td>Legal（法律）</td><td>法规变化、合规要求、知识产权法、劳动法</td></tr>\n<tr><td><strong>E</strong></td><td>Environmental（环境）</td><td>碳排放政策、ESG 要求、绿色 IT、供应链可持续性</td></tr>\n</table></div>\n<h3 id=\"PESTLE-如何驱动架构变更-Phase-H-\">PESTLE 如何驱动架构变更（Phase H）</h3>\n<p>在 TOGAF ADM 的 <strong>Phase H（架构变更管理）</strong> 中，PESTLE 分析是识别外部变更驱动因素的核心工具。</p>\n<p>Phase H 的核心问题是：&quot;<strong>哪些外部变化要求我们修订目标架构？</strong>&quot;</p>\n<p>PESTLE 驱动架构变更的路径：</p>\n<pre><code>外部 PESTLE 变化\n    ↓\n识别变化对业务战略的影响\n    ↓\n评估业务战略变化对架构的影响\n    ↓\n确定是小变更（Architecture Update）还是大变更（New ADM Cycle）\n    ↓\n向 Architecture Board 提交变更申请\n    ↓\n批准后启动相应的 ADM 阶段</code></pre>\n<p><strong>变更触发规则：</strong></p>\n<ul>\n<li><strong>小变更</strong>（如新增一个合规报表）：直接在 Phase G/H 处理</li>\n<li><strong>中等变更</strong>（如新增数据隐私合规要求影响多个系统）：触发从 Phase B 开始的新 ADM 迭代</li>\n<li><strong>重大变更</strong>（如核心业务模式变革、重大并购）：触发完整的新 ADM 循环，从 Phase A 重新开始</li>\n</ul>\n<h3 id=\"华辉项目的-PESTLE-分析示例\">华辉项目的 PESTLE 分析示例</h3>\n<p>华辉照明（FSL）当前使用 SAP ECC 6.0，面临 2027 年 ECC 主流维护到期的压力。以下是影响其 S/4HANA 升级架构决策的 PESTLE 分析：</p>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>关键变化</th><th>对架构的影响</th></tr>\n<tr><td><strong>P - 政治</strong></td><td>中国数据本地化政策（《数据安全法》《个人信息保护法》）；中美贸易摩擦下的技术自主化压力</td><td>云部署须选择中国区数据中心（华为云/阿里云）；技术栈需评估国产化替代路径</td></tr>\n<tr><td><strong>E - 经济</strong></td><td>照明行业竞争加剧，成本压力增大；企业数字化投资须证明 ROI</td><td>S/4HANA 升级须有清晰的 TCO 分析；优先选择能快速见效的功能模块（如 FICO 实时结账）</td></tr>\n<tr><td><strong>S - 社会</strong></td><td>90/95 后员工对移动化、自助式 IT 工具的期待提升</td><td>S/4HANA Fiori 界面成为用户接受度的关键因素；移动端审批流程须作为架构需求</td></tr>\n<tr><td><strong>T - 技术</strong></td><td>SAP ECC 6.0 进入维护末期（2027年主流维护截止）；AI/ML 能力已内嵌 S/4HANA</td><td>升级时间窗口明确，架构规划须在 2026-2027 年前完成；AI 功能（预测性维护、智能财务）可纳入目标架构</td></tr>\n<tr><td><strong>L - 法律</strong></td><td>新《公司法》对内控合规要求提升；税务数字化（金税四期）加速落地</td><td>S/4HANA 的合规性功能（GRC、税务合规）成为升级的重要驱动力</td></tr>\n<tr><td><strong>E - 环境</strong></td><td>ESG 报告要求逐步强制化；碳排放核算纳入供应链管理</td><td>目标架构须规划 ESG 数据采集和报告能力；S/4HANA Sustainability 模块可作为路线图选项</td></tr>\n</table></div>\n<p><strong>架构结论</strong>：华辉 S/4HANA 升级项目的目标架构需要将法律合规（L）和技术过时（T）作为最优先驱动因素，政治因素（P）决定了部署模式须选择私有云或公有云中国区方案，经济因素（E）要求严格的分阶段实施策略以控制风险和成本。</p>\n<hr>"}, "L5_q": {"type": "quiz", "title": "✏️ 随堂测验 — 治理与原则 13题", "questions": [{"num": "Q48", "star": true, "q": "Architecture Board（架构委员会）的主要职责是什么？", "opts": {"A": "负责编写架构文档", "B": "提供跨整个组织的架构合规监督，审查并批准架构工作，解决架构冲突", "C": "执行技术实施工作", "D": "管理 IT 基础设施的日常运营"}, "ans": "B", "exp": "Architecture Board 是架构治理的核心机构，职责包括：批准架构文档、确保架构合规、解决架构争议、管理架构原则、审查架构豁免请求。Architecture Board 通常由来自业务和 IT 的高层代表组成，具有正式授权。", "topic": "t5"}, {"num": "Q49", "star": true, "q": "Architecture Compliance（架构合规）的四个级别是什么？", "opts": {"A": "Excellent / Good / Fair / Poor", "B": "Conformant / Compliant / Non-Conformant / Irrelevant", "C": "Approved / Pending / Rejected / Waived", "D": "Full / Partial / Minimal / None"}, "ans": "B", "exp": "TOGAF 定义四个合规级别：Conformant（一致，完全符合架构要求）、Compliant（合规，实质性符合，有轻微偏差）、Non-Conformant（不合规，存在重大偏差，需要豁免或修正）、Irrelevant（不相关，该架构要求对此项目不适用）。这是 Level 1+2 双考点。", "topic": "t5"}, {"num": "Q50", "star": false, "q": "Architecture Contract（架构合同）的主要目的是什么？", "opts": {"A": "与外部供应商签订的采购合同", "B": "架构团队与开发/实施团队之间的正式协议，定义架构服务水平和合规要求", "C": "架构师的薪酬合同", "D": "技术许可协议"}, "ans": "B", "exp": "Architecture Contract 是架构团队与利益相关者（如开发团队、业务部门）之间的正式书面协议，内容包括：将要交付的架构工作产品、架构质量标准、合规要求、验收标准。它确保各方对架构目标和约束条件的共同理解和承诺。", "topic": "t5"}, {"num": "Q51", "star": false, "q": "架构原则（Architecture Principle）的 5 个组成要素是什么？", "opts": {"A": "Goal / Objective / Policy / Standard / Guideline", "B": "Name / Statement / Rationale / Implications / Metrics", "C": "Title / Description / Owner / Date / Version", "D": "Requirement / Constraint / Assumption / Risk / Issue"}, "ans": "B", "exp": "TOGAF 定义架构原则的 5 要素：Name（名称，简短易记）、Statement（声明，一句话表述原则内容）、Rationale（依据，说明为什么需要这条原则，即业务理由）、Implications（影响，说明遵循此原则的代价和要求）、Metrics（度量，如何衡量是否遵循了此原则）。其中 Rationale 是\"为什么\"，是高频考点。", "topic": "t5"}, {"num": "Q52", "star": false, "q": "在 Preliminary Phase 中，Architecture Principles 的主要来源是什么？", "opts": {"A": "随机制定，根据架构师个人经验", "B": "从组织业务原则、IT 战略、以及 TOGAF 原则示例中衍生", "C": "仅从行业标准中采用", "D": "由 Architecture Board 独立制定，无需参考现有文件"}, "ans": "B", "exp": "架构原则来源多元：业务原则（Business Principles，来自公司战略和业务规则）、TOGAF 参考原则（TOGAF 提供了一套示范原则供参考）、IT 战略文件、以及现有政策法规。制定原则是 Preliminary Phase 的核心工作之一，需要各层级利益相关者的输入。", "topic": "t5"}, {"num": "Q53", "star": false, "q": "Capability Architecture（能力架构）关注什么？", "opts": {"A": "整个企业的战略方向", "B": "业务线或部门级别的架构", "C": "特定业务能力（如采购能力、制造能力）的详细架构设计", "D": "技术基础设施的详细规格"}, "ans": "C", "exp": "Architecture Landscape 的三个级别：Strategic（战略，企业全局）、Segment（段，业务线/部门）、Capability（能力，具体业务能力的专项架构）。Capability Architecture 是最细粒度的，专注于支撑特定业务能力（如\"供应链能力\"或\"客户服务能力\"）所需的架构。", "topic": "t5"}, {"num": "Q54", "star": true, "q": "Stakeholder（利益相关者）在 TOGAF 中的定义是什么？", "opts": {"A": "项目的资金提供者", "B": "对系统有兴趣或关切的个人、团队或组织，包括项目内部和外部", "C": "只包括 C 级高管", "D": "只包括 IT 部门人员"}, "ans": "B", "exp": "TOGAF 对利益相关者的定义非常宽泛，涵盖：内部（管理层、业务用户、IT团队）和外部（客户、监管机构、供应商）对架构有利益关系的任何方。利益相关者分析是 Phase A 的关键活动，识别\"谁关心什么\"是构建架构愿景的基础。", "topic": "t6"}, {"num": "Q55", "star": true, "q": "Concern（关切）在 TOGAF 中是指什么？", "opts": {"A": "项目的风险清单", "B": "利益相关者关于系统某方面的兴趣、期望或担忧", "C": "合规性问题", "D": "预算超支问题"}, "ans": "B", "exp": "Concern 是特定利益相关者对系统的某个方面所持有的兴趣、期望或担忧。架构工作的核心价值之一就是识别并\"回应\"各利益相关者的 Concern。例如：CFO 的 Concern 是\"系统是否能降低财务报告成本\"；CIO 的 Concern 是\"新系统是否能与现有基础设施集成\"。", "topic": "t6"}, {"num": "Q56", "star": false, "q": "View（视图）在 TOGAF 中的定义是什么？", "opts": {"A": "系统的完整技术文档", "B": "从特定 Viewpoint 出发，对某个系统或部分系统的描述", "C": "利益相关者的个人意见", "D": "架构图表的集合"}, "ans": "B", "exp": "View 是根据特定 Viewpoint 规则，对系统特定方面的正式描述。View 专门用于回应特定利益相关者的 Concern。一个系统可以有多个 View（如业务视图、技术视图、安全视图），每个 View 针对不同受众的关切。", "topic": "t6"}, {"num": "Q57", "star": false, "q": "利益相关者管理矩阵（Power/Interest Grid）中，\"高权力/低兴趣\"的利益相关者应如何管理？", "opts": {"A": "密切沟通，频繁更新", "B": "保持满意（Keep Satisfied），定期简报但无需深度参与", "C": "最小程度关注", "D": "让其主导所有架构决策"}, "ans": "B", "exp": "Power/Interest Grid 四象限策略：高权力+低兴趣 → Keep Satisfied（满足他们，以防他们有负面反应）；高权力+高兴趣 → Manage Closely（密切管理）；低权力+高兴趣 → Keep Informed（保持告知）；低权力+低兴趣 → Monitor（最小关注）。", "topic": "t6"}, {"num": "Q58", "star": false, "q": "利益相关者矩阵（Stakeholder Map）的主要用途是什么？", "opts": {"A": "决定架构团队的人员招募", "B": "识别并记录所有利益相关者、其权力/兴趣级别、关切，以指导架构沟通策略", "C": "记录技术债务", "D": "管理项目预算分配"}, "ans": "B", "exp": "Stakeholder Map 是 Phase A 的关键工具，用于：系统性识别所有受影响方、评估其权力和关注度、了解其关切（Concern）、制定差异化的沟通和参与策略。它确保架构工作不会忽视关键利益相关者，从而提高架构的接受度。", "topic": "t6"}, {"num": "Q59", "star": false, "q": "当不同利益相关者的 Concern 相互冲突时，架构师应如何处理？", "opts": {"A": "优先满足最高层级管理者的 Concern，忽略其他", "B": "通过透明沟通、权衡分析，寻求经过正式治理机制批准的折中方案", "C": "采用投票机制决定", "D": "将冲突搁置，先完成其他工作"}, "ans": "B", "exp": "TOGAF 强调架构治理的重要性：冲突不应被忽视或简单专制解决。正确方式是：识别并记录冲突、分析各方 Concern 的优先级、提出折中方案、通过 Architecture Board 等正式治理机制做出裁决并记录决策依据。", "topic": "t6"}, {"num": "Q60", "star": true, "q": "Gap Analysis（差距分析）在 TOGAF ADM 中的主要目的是什么？", "opts": {"A": "确定项目预算缺口", "B": "识别当前架构（Baseline）和目标架构（Target）之间的差异，为迁移计划提供输入", "C": "评估团队技能水平", "D": "比较不同供应商产品"}, "ans": "B", "exp": "Gap Analysis 是 TOGAF 中将 Baseline（当前状态）与 Target（目标状态）进行比较的分析工具，产出四类差异：新增（Add，目标有但当前没有）、保留（Retain，当前有且目标也要保留）、去除（Eliminate，当前有但目标要去掉）、迁移（Migrate，当前有但需要改造才能满足目标）。这个结果直接驱动 Phase E 的工作包定义。", "topic": "t7"}]}, "L6_1": {"type": "quiz", "title": "🎯 基础概念 8题", "questions": [{"num": "Q1", "star": true, "q": "TOGAF 是由哪个组织发布和维护的？", "opts": {"A": "ISO（国际标准化组织）", "B": "The Open Group", "C": "ITIL Foundation", "D": "Gartner"}, "ans": "B", "exp": "TOGAF 由 The Open Group 发布，这是一个技术中立的行业联盟。The Open Group 同时负责 TOGAF 认证考试。ISO 是国际标准化组织（发布如 ISO 42010），ITIL 是服务管理框架，Gartner 是调研机构，均非 TOGAF 发布方。", "topic": "t1"}, {"num": "Q2", "star": true, "q": "TOGAF 的全称是什么？", "opts": {"A": "Technical Open Group Architecture Framework", "B": "The Open Group Architecture Framework", "C": "Technology Operations Governance and Architecture Framework", "D": "Total Organizational Goals and Architecture Framework"}, "ans": "B", "exp": "TOGAF = The Open Group Architecture Framework，这是考试必背的全称。选项A、C、D均为干扰项，请注意\"The\"是组织名称的一部分，不是冠词。", "topic": "t1"}, {"num": "Q3", "star": false, "q": "TOGAF Standard 10 相比 9.2 版本的最主要变化是什么？", "opts": {"A": "删除了 ADM，改用敏捷方法", "B": "将内容重组为 TOGAF Fundamental Content 和 TOGAF Series Guides", "C": "增加了 Phase I 和 Phase J 两个新阶段", "D": "将四大架构域减少为三大域"}, "ans": "B", "exp": "TOGAF 10 的核心变化是将内容重构为两大部分：TOGAF Fundamental Content（基础内容，包括ADM核心概念）和 TOGAF Series Guides（系列指南，包括安全架构、Agile适配等专题）。ADM 在 10 中依然完整保留，架构域仍为四大域。", "topic": "t1"}, {"num": "Q4", "star": true, "q": "企业架构（Enterprise Architecture）的主要目的是什么？", "opts": {"A": "专门管理 IT 基础设施的部署", "B": "帮助企业实现业务目标与 IT 能力的对齐", "C": "仅关注应用软件的开发流程", "D": "替代项目管理框架（如 PRINCE2）"}, "ans": "B", "exp": "EA 的核心价值是将业务战略与 IT 能力对齐（Business-IT Alignment）。EA 不仅限于 IT，也不替代 PM 方法论。TOGAF 明确指出 EA 需要业务架构、应用架构、数据架构、技术架构四域协同，目标是支撑业务目标实现。", "topic": "t1"}, {"num": "Q5", "star": false, "q": "TOGAF ADM 中，哪个说法最准确地描述了架构开发的性质？", "opts": {"A": "ADM 是线性的、一次性的过程，从 Phase A 执行到 Phase H 即完成", "B": "ADM 是迭代的、循环的方法，可以在阶段间和循环间反复进行", "C": "ADM 只能按照规定顺序执行，不允许跳过阶段", "D": "ADM 在每个项目中只能执行一次"}, "ans": "B", "exp": "ADM 的核心特性是迭代性（Iterative）和循环性（Cyclic）。TOGAF 明确说明 ADM 可以在阶段内、阶段间、以及整个 ADM 循环层面进行迭代。架构可以分层次（战略/段/能力/项目）进行，每层触发新的ADM循环。", "topic": "t1"}, {"num": "Q6", "star": true, "q": "下列哪四个域构成了 TOGAF 的企业架构描述？", "opts": {"A": "Strategy / Operations / Technology / Security", "B": "Business / Application / Data / Technology", "C": "People / Process / Technology / Governance", "D": "Finance / Marketing / IT / Operations"}, "ans": "B", "exp": "TOGAF 的四大架构域（BADT）：Business Architecture（业务架构）、Application Architecture（应用架构）、Data Architecture（数据架构）、Technology Architecture（技术架构）。记忆口诀：BDAT 或 BADT。注意 Application 和 Data 同属 Information Systems Architecture（信息系统架构）域。", "topic": "t1"}, {"num": "Q7", "star": false, "q": "TOGAF 适合以下哪类组织使用？", "opts": {"A": "只适用于大型跨国企业", "B": "只适用于 IT 公司", "C": "可被任何规模和行业的组织使用，但需要针对自身情况适配", "D": "只适用于政府机构和公共部门"}, "ans": "C", "exp": "TOGAF 是通用的企业架构框架，设计上就考虑了可适配性（Adaptability）。Preliminary Phase 的核心工作之一就是\"定制 ADM 以适应组织需要\"。小到 SME，大到跨国集团均可使用，但需要根据规模和行业特点进行合理裁剪。", "topic": "t1"}, {"num": "Q8", "star": false, "q": "TOGAF 的哪个组成部分提供了一个通用的技术标准参考模型？", "opts": {"A": "Architecture Vision", "B": "Architecture Repository", "C": "Technical Reference Model（TRM）", "D": "Architecture Roadmap"}, "ans": "C", "exp": "TRM（Technical Reference Model，技术参考模型）是 TOGAF Foundation Architecture 的一部分，提供了一个通用的技术标准分类体系，帮助组织选择符合标准的技术组件。另一个基础参考模型是 III-RM（Integrated Information Infrastructure Reference Model）。", "topic": "t1"}]}, "L6_2": {"type": "quiz", "title": "🎯 ADM各阶段 25题", "questions": [{"num": "Q9", "star": true, "q": "TOGAF ADM 中，Preliminary Phase 的主要目的是什么？", "opts": {"A": "定义目标架构的愿景", "B": "建立架构能力（Architecture Capability），定制 ADM，制定架构原则", "C": "执行差距分析（Gap Analysis）", "D": "创建实施和迁移计划"}, "ans": "B", "exp": "Preliminary Phase 是在正式启动 ADM 之前的准备阶段。其核心工作是：建立架构团队和治理框架（Architecture Board）、定制 ADM 以适应组织、制定架构原则。Preliminary 不属于 A-H 任何一个字母阶段，它是所有 Phase 的\"地基\"。", "topic": "t2"}, {"num": "Q10", "star": true, "q": "在 ADM 的 Phase A（Architecture Vision）中，第一步通常是什么？", "opts": {"A": "开始开发目标架构", "B": "确认和扩充架构原则，建立架构项目", "C": "执行差距分析", "D": "制定迁移计划"}, "ans": "B", "exp": "Phase A 的第一步是\"确认架构项目的启动\"，包括：确认请求（Request for Architecture Work）的范围和约束、确认利益相关者、明确架构愿景的范围。差距分析在 Phase B/C/D 执行，迁移计划在 Phase F。", "topic": "t2"}, {"num": "Q11", "star": true, "q": "Architecture Vision（架构愿景文档）是哪个 Phase 的关键输出？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase F"}, "ans": "B", "exp": "Architecture Vision 是 Phase A 的核心交付物，包括：项目范围定义、利益相关者关切、高层架构描述、约束条件。它为后续所有 Phase 提供方向，是整个 ADM 循环的起点文件。", "topic": "t2"}, {"num": "Q12", "star": false, "q": "在 Phase B（Business Architecture）中，架构师需要开发什么？", "opts": {"A": "应用组合图", "B": "业务架构的当前状态（Baseline）和目标状态（Target）", "C": "技术组件清单", "D": "数据迁移方案"}, "ans": "B", "exp": "Phase B 关注业务架构，核心工作是：描述 Baseline Business Architecture（当前状态）和 Target Business Architecture（目标状态），并执行 Gap Analysis。业务架构包含：业务功能、业务流程、组织结构、业务角色和业务服务。", "topic": "t2"}, {"num": "Q13", "star": true, "q": "Phase C（信息系统架构）包含哪两个子域，且正确的开发顺序是什么？", "opts": {"A": "Application Architecture，然后 Data Architecture", "B": "Data Architecture，然后 Application Architecture", "C": "两个子域同时并行开发", "D": "Phase C 只包含 Application Architecture，Data Architecture 属于 Phase B"}, "ans": "B", "exp": "Phase C 包含 Data Architecture 和 Application Architecture 两个子域，TOGAF 推荐先开发 Data Architecture，再开发 Application Architecture。原因：应用程序是数据的载体和处理器，数据架构确定后才能明确应用需要处理什么数据，从而定义应用功能边界。这是 Level 1 高频陷阱题。", "topic": "t2"}, {"num": "Q14", "star": false, "q": "Phase D（Technology Architecture）的主要工作是什么？", "opts": {"A": "定义组织的业务流程", "B": "将逻辑应用组件映射到具体技术组件，定义技术标准", "C": "分析差距并制定过渡架构", "D": "管理架构变更请求"}, "ans": "B", "exp": "Phase D 是将前几个 Phase 定义的逻辑架构落地到技术层面的阶段。主要工作包括：识别技术平台候选方案、应用 TRM（技术参考模型）、定义技术标准和规范。Phase E 才是差距分析和过渡架构，Phase H 是变更管理。", "topic": "t2"}, {"num": "Q15", "star": true, "q": "Phase E（Opportunities and Solutions）的核心目标是什么？", "opts": {"A": "批准最终的目标架构", "B": "从目标架构推导出实施方案，定义工作包（Work Package）和过渡架构", "C": "完成技术架构的详细设计", "D": "监控已实施架构的合规性"}, "ans": "B", "exp": "Phase E 是从\"架构\"到\"实施\"的桥梁。在这里，架构师综合前面 Phase B/C/D 的差距分析结果，确定具体的工作包（Work Package）、定义过渡架构（Transition Architecture）、并评估初步的实施路径。", "topic": "t2"}, {"num": "Q16", "star": false, "q": "在 TOGAF ADM 中，Phase F（Migration Planning）主要关注什么？", "opts": {"A": "定义目标技术架构", "B": "制定详细的实施和迁移计划，对工作包进行优先级排序", "C": "建立架构治理委员会", "D": "识别新的业务机会"}, "ans": "B", "exp": "Phase F 将 Phase E 识别的工作包细化为具体的实施和迁移计划。关键工作：成本效益分析、风险评估、优先级排序、资源规划。Phase F 的产物是可执行的迁移计划。", "topic": "t2"}, {"num": "Q17", "star": true, "q": "Phase G（Implementation Governance）的主要职责是什么？", "opts": {"A": "开发应用架构", "B": "监督项目实施确保与架构规格一致，处理架构合规请求", "C": "制定架构路线图", "D": "执行差距分析"}, "ans": "B", "exp": "Phase G 是架构实施阶段的治理监督。架构团队在这个阶段：监督实施项目是否符合批准的架构、处理架构偏差（Architecture Dispensation）请求、进行架构合规评审（Architecture Compliance Review）。", "topic": "t2"}, {"num": "Q18", "star": false, "q": "下列哪项陈述最准确地描述了 Phase H（Architecture Change Management）的目的？", "opts": {"A": "创建新的目标架构", "B": "维护架构的生命力，管理对已批准架构的变更，确定何时需要启动新的 ADM 循环", "C": "开发迁移计划", "D": "执行技术架构审查"}, "ans": "B", "exp": "Phase H 是架构正式上线后的持续管理阶段。架构就像一个活的文档，需要响应外部环境变化（技术进步、业务战略调整、法规变化）。Phase H 负责评估这些变化、判断变更影响级别，并在必要时触发新一轮 ADM 循环。", "topic": "t2"}, {"num": "Q19", "star": true, "q": "关于\"需求管理\"（Requirements Management），下列哪项说法正确？", "opts": {"A": "需求管理是 ADM 中位于 Phase A 和 Phase B 之间的独立阶段", "B": "需求管理是一个持续进行的过程，贯穿所有 ADM Phase，不是独立的阶段", "C": "需求管理只在 Phase A 和 Phase F 中执行", "D": "需求管理由 Phase H 负责统一管理"}, "ans": "B", "exp": "这是 Level 1 高频陷阱！需求管理（Requirements Management）位于 ADM 图的中心圆圈，表示它持续贯穿所有 Phase，而不是一个独立的阶段（它没有字母编号）。它的职能是：存储需求、评估变更对当前 Phase 的影响、将需求传递给相关 Phase。", "topic": "t2"}, {"num": "Q20", "star": false, "q": "以下哪个是 Phase A 的关键输入？", "opts": {"A": "Baseline Business Architecture", "B": "Request for Architecture Work（架构工作请求）", "C": "Migration Plan", "D": "Technology Architecture"}, "ans": "B", "exp": "Request for Architecture Work 是触发整个 ADM 循环的关键文件，它由赞助组织（通常是管理层）发出，定义了架构项目的范围、约束和资源授权。它是 Phase A 的主要输入之一。Baseline Business Architecture 是 Phase B 的输入，Migration Plan 是 Phase F 的输出。", "topic": "t2"}, {"num": "Q21", "star": false, "q": "在 Phase B 中，\"业务架构\"的主要描述对象是什么？", "opts": {"A": "应用程序和数据库", "B": "服务器和网络设备", "C": "业务功能、业务流程、组织结构、业务角色", "D": "数据迁移方案"}, "ans": "C", "exp": "业务架构（Business Architecture）描述的是业务层面的能力和结构，包括：业务功能（Business Function）、业务流程（Business Process）、组织结构（Organization）、业务角色（Business Role）、业务服务（Business Service）。这与应用、数据、技术架构明确区分。", "topic": "t2"}, {"num": "Q22", "star": true, "q": "Statement of Architecture Work（架构工作说明书）是哪个阶段的关键交付物？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase G"}, "ans": "B", "exp": "Statement of Architecture Work 是 Phase A 的核心输出，它是正式的项目授权文件，定义了本次架构项目的范围、方法、资源、时间表，相当于架构团队的工作授权书。不要与 Architecture Vision 文档混淆：Architecture Vision 描述目标方向，Statement of Architecture Work 是工作授权。", "topic": "t2"}, {"num": "Q23", "star": false, "q": "在 Phase E 中，Work Package（工作包）包含哪些核心要素？", "opts": {"A": "只包含时间和成本", "B": "项目名称、项目描述、所包含的变更、所影响的 Building Block、依赖关系", "C": "只包含技术实施细节", "D": "业务需求文档"}, "ans": "B", "exp": "Work Package 是 Phase E 定义的可实施单元，包含：工作包名称和描述、所实现的目标架构要素、涉及的 Building Blocks、与其他工作包的依赖关系、优先级。多个工作包按依赖排序后形成 Architecture Roadmap。", "topic": "t2"}, {"num": "Q24", "star": false, "q": "Phase G 中，\"Architecture Dispensation\"（架构特许/豁免）是指什么？", "opts": {"A": "完全批准的架构变更", "B": "对特定项目或情况，暂时允许偏离已批准架构的正式授权", "C": "取消整个架构项目", "D": "新增架构原则"}, "ans": "B", "exp": "在实施过程中，有时项目因为现实约束（时间/成本/技术）无法完全符合批准的架构。Architecture Dispensation 是 Architecture Board 给予的正式豁免，允许特定范围内的偏差，但需要记录理由并设定恢复期限。", "topic": "t2"}, {"num": "Q25", "star": true, "q": "Phase H 中，变更的\"类型\"分类主要目的是什么？", "opts": {"A": "确定谁负责实施变更", "B": "判断变更的影响级别，以确定是否需要启动新的完整 ADM 循环", "C": "计算变更的成本", "D": "为变更撰写技术文档"}, "ans": "B", "exp": "TOGAF 将架构变更分为三类：类型1（简化/精化，不影响架构方向）→ 直接更新架构文档；类型2（增量/演进）→ 触发新的 ADM 循环（简化版）；类型3（重新定义/颠覆性变化）→ 触发全面的新 ADM 循环。判断变更类型是 Phase H 的核心工作。", "topic": "t2"}, {"num": "Q26", "star": false, "q": "下列哪项不是 Preliminary Phase 的典型输出？", "opts": {"A": "定制后的 ADM（Tailored ADM）", "B": "架构原则（Architecture Principles）", "C": "目标业务架构（Target Business Architecture）", "D": "架构治理框架（Architecture Governance Framework）"}, "ans": "C", "exp": "目标业务架构是 Phase B 的输出，不是 Preliminary Phase 的产物。Preliminary Phase 的输出包括：定制 ADM、架构原则、架构治理框架、架构工具设置、Architecture Repository 初始化。", "topic": "t2"}, {"num": "Q27", "star": false, "q": "在 ADM 循环中，哪个 Phase 最终产生\"架构定义文档\"（Architecture Definition Document）？", "opts": {"A": "Phase A", "B": "Preliminary Phase", "C": "Phase B/C/D 综合产生", "D": "Phase G"}, "ans": "C", "exp": "Architecture Definition Document（架构定义文档）是 Phase B、C、D 的综合交付物，包含业务架构、信息系统架构（数据+应用）、技术架构的当前状态和目标状态描述，以及差距分析结果。这个文档在 Phase E 作为关键输入使用。", "topic": "t2"}, {"num": "Q28", "star": false, "q": "Phase F 中，确定工作包优先级时应考虑哪些因素？", "opts": {"A": "只考虑成本高低", "B": "依赖关系、业务价值、风险、资源可用性、战略合规性等多维度因素", "C": "只考虑技术难度", "D": "只考虑领导层偏好"}, "ans": "B", "exp": "Phase F 的优先级排序是多维度的，TOGAF 建议考虑：工作包之间的依赖关系（先决条件）、对业务价值的贡献度、实施风险、资源可用性、与战略目标的对齐度。单一维度排序会导致高价值项目被低价值但低成本项目推后。", "topic": "t2"}, {"num": "Q29", "star": false, "q": "Architecture Roadmap（架构路线图）和 Migration Plan（迁移计划）有什么核心区别？", "opts": {"A": "两者完全相同，只是不同 Phase 的叫法", "B": "Architecture Roadmap 是高层次的时间线（展示从当前到目标的演进路径），Migration Plan 是可执行的详细实施计划", "C": "Migration Plan 是架构层级的，Architecture Roadmap 是项目层级的", "D": "Architecture Roadmap 只用于技术架构"}, "ans": "B", "exp": "Architecture Roadmap 在 Phase E 形成，展示工作包的高层次时间线，是战略性的；Migration Plan 在 Phase F 形成，包含详细的实施步骤、资源分配、时间节点，是可执行的。Roadmap 是蓝图，Migration Plan 是施工图。", "topic": "t2"}, {"num": "Q30", "star": false, "q": "完整的 ADM 循环包括多少个带字母编号的 Phase（不含 Preliminary 和需求管理）？", "opts": {"A": "6个", "B": "7个", "C": "8个", "D": "9个"}, "ans": "C", "exp": "ADM 有 8 个字母 Phase：A（Architecture Vision）、B（Business Architecture）、C（Information Systems Architecture）、D（Technology Architecture）、E（Opportunities & Solutions）、F（Migration Planning）、G（Implementation Governance）、H（Architecture Change Management）。加上 Preliminary Phase 和持续的 Requirements Management，共 10 个组成部分。", "topic": "t2"}, {"num": "Q31", "star": false, "q": "在 Phase A 中，完成利益相关者分析的主要目的是什么？", "opts": {"A": "确定项目预算", "B": "识别各方关切（Concern），确保目标架构能够回应所有关键利益相关者的关切", "C": "分配项目团队成员", "D": "确定技术平台选型"}, "ans": "B", "exp": "利益相关者分析是 Phase A 的关键活动，目的是：识别谁受到架构影响（利益相关者）、他们各自的关切（Concern）是什么、如何用架构视图（View）回应这些关切。这是构建 Architecture Vision 文档的基础。", "topic": "t2"}, {"num": "Q32", "star": false, "q": "关于 Phase C 中数据架构和应用架构的关系，以下哪个说法正确？", "opts": {"A": "两者完全独立，可以并行开发", "B": "数据架构的逻辑数据组件映射到应用架构的逻辑应用组件", "C": "应用架构决定数据架构", "D": "两者都由技术架构（Phase D）决定"}, "ans": "B", "exp": "在 Phase C 中，数据架构定义了需要管理的数据实体和关系（逻辑数据模型），这些数据组件随后在应用架构中被映射到负责处理/管理它们的应用组件上。应用程序\"服务于\"数据，而不是反过来，这就是为什么数据架构先于应用架构。", "topic": "t2"}, {"num": "Q33", "star": false, "q": "以下哪个活动属于 Phase B 但不属于 Phase D？", "opts": {"A": "差距分析（Gap Analysis）", "B": "利益相关者视图开发", "C": "业务流程建模", "D": "目标架构定义"}, "ans": "C", "exp": "业务流程建模（Business Process Modeling）是业务架构（Phase B）特有的活动，关注人、组织、流程的协作方式。Phase D（技术架构）关注的是技术平台和技术服务，不涉及业务流程。差距分析和目标架构定义在所有 Phase 中都有。", "topic": "t2"}]}, "L6_3": {"type": "quiz", "title": "🎯 制品与交付物 8题", "questions": [{"num": "Q34", "star": true, "q": "TOGAF 中，Artifact（制品）、Deliverable（交付物）、Building Block（构建块）的核心区别是什么？", "opts": {"A": "三者没有区别，只是翻译不同", "B": "Artifact 是架构工作产品；Deliverable 是正式提交审查/签字的文档；Building Block 是可重用的架构组件", "C": "Deliverable 是内部使用的，Artifact 是外部提交的", "D": "Building Block 只用于技术架构"}, "ans": "B", "exp": "三者区别是高频考点：Artifact（制品）是架构开发过程中产生的具体工作产品，如图表、目录、矩阵，可以是非正式的；Deliverable（交付物）是正式的、需要经过审批签字的文件，如 Architecture Vision 文档、Architecture Definition Document；Building Block（构建块）是可重用的架构组件，分为 ABB（Architecture Building Block，抽象）和 SBB（Solution Building Block，具体实现）。", "topic": "t3"}, {"num": "Q35", "star": true, "q": "TOGAF 的制品（Artifacts）分为哪三类？", "opts": {"A": "Policies / Procedures / Guidelines", "B": "Catalogs / Matrices / Diagrams", "C": "Models / Views / Viewpoints", "D": "Input / Output / Deliverable"}, "ans": "B", "exp": "TOGAF 制品三类型：Catalogs（目录，如应用目录、数据实体目录）、Matrices（矩阵，如应用/数据矩阵、业务交互矩阵）、Diagrams（图表，如业务流程图、应用通信图、技术架构图）。这三类制品覆盖了从\"列举\"到\"关系\"到\"可视化\"的不同需求。", "topic": "t3"}, {"num": "Q36", "star": false, "q": "ABB（Architecture Building Block）和 SBB（Solution Building Block）的核心区别是什么？", "opts": {"A": "ABB 用于技术架构，SBB 用于业务架构", "B": "ABB 是抽象的架构规格（描述需要什么），SBB 是具体的实现方案（描述如何实现）", "C": "ABB 在目标架构中使用，SBB 在当前架构中使用", "D": "两者完全相同，只是叫法不同"}, "ans": "B", "exp": "ABB（Architecture Building Block）是抽象的、技术无关的描述，定义架构\"应该能做什么\"（功能和接口规格）；SBB（Solution Building Block）是具体的实现，描述\"用什么来实现\"（具体产品、系统、服务）。例如：ABB = \"邮件服务\"，SBB = \"Microsoft Exchange Server 2019\"。", "topic": "t3"}, {"num": "Q37", "star": true, "q": "以下哪个是 Deliverable（交付物）而非 Artifact（制品）？", "opts": {"A": "Business Capability Map（业务能力图）", "B": "Application Communication Diagram（应用通信图）", "C": "Architecture Vision Document（架构愿景文档）", "D": "Data Entity/Data Component Catalog（数据实体目录）"}, "ans": "C", "exp": "Architecture Vision Document 是正式的交付物，需要经过审批和签字，是 Phase A 的核心输出，对外提交给赞助方。其余三个选项（业务能力图、应用通信图、数据实体目录）都是制品（Artifacts），是架构开发过程中的工作产品，不一定需要正式签字。", "topic": "t3"}, {"num": "Q38", "star": false, "q": "Architecture Repository（架构库）中存储哪些类型的内容？", "opts": {"A": "只存储已完成的架构文档", "B": "架构元模型、参考库、标准信息库、治理日志、架构景观、解决方案库", "C": "只存储 Building Blocks", "D": "只存储历史架构版本"}, "ans": "B", "exp": "TOGAF 定义 Architecture Repository 包含六类内容：① Architecture Metamodel（架构元模型）② Architecture Capability（架构能力）③ Architecture Landscape（架构景观，含当前/过渡/目标架构）④ Standards Information Base（标准信息库）⑤ Reference Library（参考库）⑥ Governance Log（治理日志）。", "topic": "t3"}, {"num": "Q39", "star": false, "q": "View（视图）和 Viewpoint（视点）的关系是什么？", "opts": {"A": "两者完全相同，都是利益相关者看到的内容", "B": "Viewpoint 是模板（定义如何描述），View 是基于 Viewpoint 针对特定系统生成的实例", "C": "View 是模板，Viewpoint 是实例", "D": "Viewpoint 只用于技术架构，View 用于所有架构域"}, "ans": "B", "exp": "Viewpoint（视点）是一种模板或规则，定义了特定关注点应该如何被描述（包含哪些元素、使用什么符号）；View（视图）是将这个模板应用到具体系统后生成的实际描述。比喻：Viewpoint = 相机型号和拍摄规则；View = 用这台相机拍出来的具体照片。", "topic": "t3"}, {"num": "Q40", "star": false, "q": "Architecture Landscape（架构景观）包含哪三个级别？", "opts": {"A": "Strategic / Tactical / Operational", "B": "Strategic / Segment / Capability", "C": "Foundation / Industry / Enterprise", "D": "Current / Transition / Target"}, "ans": "B", "exp": "Architecture Landscape 有三个级别：① Strategic Architecture（战略架构，整个企业的高层次视图）② Segment Architecture（段架构，业务线/部门级别的详细视图）③ Capability Architecture（能力架构，特定能力的专项架构）。这与 Architecture Continuum 的四层次不同，请注意区分。", "topic": "t3"}, {"num": "Q41", "star": false, "q": "下列哪项不属于 Architecture Content Framework 的范畴？", "opts": {"A": "制品（Artifacts）的分类", "B": "架构交付物（Deliverables）的定义", "C": "建筑构建块（Building Blocks）的描述", "D": "架构师的薪资标准"}, "ans": "D", "exp": "Architecture Content Framework 定义了架构工作产品的结构和分类，包括：制品（Artifacts，分为目录/矩阵/图表）、交付物（Deliverables）、构建块（Building Blocks，包括 ABB 和 SBB）。它是 TOGAF 关于\"架构产出物应该是什么\"的规范框架。薪资标准显然不在其范畴内。", "topic": "t3"}]}, "L6_4": {"type": "quiz", "title": "🎯 连续体与参考模型 6题", "questions": [{"num": "Q42", "star": true, "q": "Enterprise Continuum（企业连续体）从左到右的四个层次顺序是什么？", "opts": {"A": "Organization-Specific → Industry → Common Systems → Foundation", "B": "Foundation → Common Systems → Industry → Organization-Specific", "C": "Generic → Specific → Industry → Enterprise", "D": "Tactical → Strategic → Operational → Governance"}, "ans": "B", "exp": "Enterprise Continuum 从左到右，越来越具体（Generic → Specific）：Foundation Architecture（基础架构，最通用，如 TOGAF TRM）→ Common Systems Architecture（通用系统架构，跨行业通用，如安全架构模式）→ Industry Architecture（行业架构，如制造业参考架构）→ Organization-Specific Architecture（组织专有架构，最具体）。方向：从抽象到具体，从通用到专有。", "topic": "t4"}, {"num": "Q43", "star": false, "q": "TOGAF 中，TRM（Technical Reference Model）的主要用途是什么？", "opts": {"A": "定义业务流程的标准模板", "B": "提供技术服务和技术标准的通用分类框架，作为技术架构开发的参考", "C": "管理架构项目的时间线", "D": "定义应用系统之间的集成标准"}, "ans": "B", "exp": "TRM 是 TOGAF Foundation Architecture 的核心组成部分，提供了一个技术服务的分类体系（如数据管理服务、通信服务、安全服务等），帮助组织：标准化技术选型、与行业标准对齐、为 Phase D 提供参考基础。", "topic": "t4"}, {"num": "Q44", "star": false, "q": "III-RM（Integrated Information Infrastructure Reference Model）主要关注什么？", "opts": {"A": "网络基础设施", "B": "在企业范围内实现无缝信息流的应用程序间互操作性", "C": "数据库管理系统", "D": "安全架构"}, "ans": "B", "exp": "III-RM 是 TOGAF Foundation Architecture 的另一个参考模型，专门关注企业信息基础设施的集成，特别是应用程序之间如何实现信息互操作（Interoperability）。它提供了一个参考架构，帮助设计\"所有应用都能互通\"的信息基础设施。", "topic": "t4"}, {"num": "Q45", "star": false, "q": "Architecture Repository 中的 Standards Information Base（标准信息库）存储什么？", "opts": {"A": "架构原则", "B": "组织认可和批准使用的技术标准、产品和规范清单", "C": "历史架构决策记录", "D": "架构师的工作日志"}, "ans": "B", "exp": "Standards Information Base 是 Architecture Repository 的一个组成部分，存储组织批准使用的技术标准，包括：开放标准（ISO、IEEE等）、供应商标准（SAP ABAP、Java EE等）、内部制定的技术规范。Phase D 开发技术架构时参考这个库选择符合标准的技术组件。", "topic": "t4"}, {"num": "Q46", "star": false, "q": "Enterprise Continuum 中的 Architecture Continuum 和 Solutions Continuum 有什么关系？", "opts": {"A": "两者完全相同", "B": "Architecture Continuum 描述架构（抽象），Solutions Continuum 描述实现（具体），两者平行且相互对应", "C": "Solutions Continuum 包含 Architecture Continuum", "D": "Architecture Continuum 在 Solutions Continuum 之后发展"}, "ans": "B", "exp": "Enterprise Continuum = Architecture Continuum + Solutions Continuum。两者平行对应：Architecture Continuum 从基础架构到组织专有架构（抽象层）；Solutions Continuum 从通用产品/服务到组织特定解决方案（具体实现层）。ABB 属于 Architecture Continuum，SBB 属于 Solutions Continuum。", "topic": "t4"}, {"num": "Q47", "star": false, "q": "以下哪项最能描述 Architecture Governance（架构治理）的核心功能？", "opts": {"A": "替代项目管理功能", "B": "确保架构活动符合组织战略，管理架构完整性，处理架构偏差", "C": "负责技术基础设施的运营维护", "D": "只在 Phase G 中发挥作用"}, "ans": "B", "exp": "架构治理是一套持续的管理机制，核心功能：确保架构与战略对齐、维护架构的完整性和质量、审查架构合规性、处理变更请求和豁免申请。它不仅在 Phase G，而是贯穿整个 ADM 的治理保障机制。", "topic": "t4"}]}, "L6_5": {"type": "quiz", "title": "🎯 治理与能力 6题", "questions": [{"num": "Q48", "star": true, "q": "Architecture Board（架构委员会）的主要职责是什么？", "opts": {"A": "负责编写架构文档", "B": "提供跨整个组织的架构合规监督，审查并批准架构工作，解决架构冲突", "C": "执行技术实施工作", "D": "管理 IT 基础设施的日常运营"}, "ans": "B", "exp": "Architecture Board 是架构治理的核心机构，职责包括：批准架构文档、确保架构合规、解决架构争议、管理架构原则、审查架构豁免请求。Architecture Board 通常由来自业务和 IT 的高层代表组成，具有正式授权。", "topic": "t5"}, {"num": "Q49", "star": true, "q": "Architecture Compliance（架构合规）的四个级别是什么？", "opts": {"A": "Excellent / Good / Fair / Poor", "B": "Conformant / Compliant / Non-Conformant / Irrelevant", "C": "Approved / Pending / Rejected / Waived", "D": "Full / Partial / Minimal / None"}, "ans": "B", "exp": "TOGAF 定义四个合规级别：Conformant（一致，完全符合架构要求）、Compliant（合规，实质性符合，有轻微偏差）、Non-Conformant（不合规，存在重大偏差，需要豁免或修正）、Irrelevant（不相关，该架构要求对此项目不适用）。这是 Level 1+2 双考点。", "topic": "t5"}, {"num": "Q50", "star": false, "q": "Architecture Contract（架构合同）的主要目的是什么？", "opts": {"A": "与外部供应商签订的采购合同", "B": "架构团队与开发/实施团队之间的正式协议，定义架构服务水
