<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOGAF Standard 10 — 认证课程</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1c1d1f;--sidebar-w:300px;
  --acc:#1971c2;--acc-light:#e7f0fb;--acc-dark:#1560a4;
  --green:#1e7e34;--green-bg:#d4edda;
  --gold:#e8a100;--gold-bg:#fff8e1;
  --red:#c0392b;--red-bg:#fdecea;
  --border:#d1d7dc;--muted:#6b7280;--txt:#1c1d1f;
  --bg:#f7f9fa;--card:#fff;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* top header */
#hdr{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
#hdr-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px}
#hdr-logo span{color:#1971c2}
#hdr-title{flex:1;font-size:14px;color:#d1d7dc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-prog{display:flex;align-items:center;gap:8px;font-size:12px;color:#9ca3af}
#hdr-pbar{width:120px;height:4px;background:#374151;border-radius:2px}
#hdr-pfill{height:100%;background:#1971c2;border-radius:2px;transition:width .4s}
#search-wrap{position:relative}
#search-inp{padding:6px 12px 6px 30px;border:1px solid #374151;border-radius:4px;background:#374151;color:#fff;font-size:12px;outline:none;width:180px}
#search-inp::placeholder{color:#9ca3af}
#search-inp:focus{border-color:#1971c2;background:#1e293b}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:13px;pointer-events:none}

/* layout */
#body{flex:1;display:flex;overflow:hidden}

/* sidebar */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border)}

.week-block{}
.week-hdr{padding:12px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;border-bottom:1px solid var(--border);user-select:none;background:var(--card)}
.week-hdr:hover{background:#f0f4f8}
.week-hdr.open{background:#eaf2fb}
.week-badge{width:28px;height:28px;border-radius:50%;background:#e0e7ff;color:#3730a3;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.week-hdr.open .week-badge{background:#1971c2;color:#fff}
.week-info{flex:1;min-width:0}
.week-info h3{font-size:12px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-info p{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.week-chevron{font-size:10px;color:var(--muted);transition:transform .2s}
.week-hdr.open .week-chevron{transform:rotate(90deg)}
.week-prog{font-size:10px;color:var(--green);font-weight:600;white-space:nowrap}

.week-lessons{display:none;border-bottom:2px solid var(--border)}
.week-hdr.open + .week-lessons{display:block}

.lesson-item{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 20px;cursor:pointer;border-bottom:1px solid #f3f4f6;transition:background .12s}
.lesson-item:hover{background:#f0f4f8}
.lesson-item.active{background:var(--acc-light);border-left:3px solid var(--acc)}
.lesson-item.done .l-check{color:var(--green)}
.l-check{width:16px;height:16px;border:1.5px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent}
.lesson-item.done .l-check{background:var(--green);border-color:var(--green);color:#fff}
.l-title{flex:1;font-size:12px;color:var(--txt);line-height:1.4}
.lesson-item.active .l-title{color:var(--acc);font-weight:600}
.l-type{font-size:10px;padding:1px 6px;border-radius:10px;white-space:nowrap}
.type-reading{background:#e0f2fe;color:#0369a1}
.type-quiz{background:#fef3c7;color:#92400e}
.type-practice{background:#f3e8ff;color:#6d28d9}

/* main content */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* lesson header bar */
#lesson-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#lesson-bar-title{flex:1;font-size:15px;font-weight:600;color:var(--txt)}
#btn-prev,#btn-next{padding:7px 16px;border-radius:5px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:500;color:var(--txt)}
#btn-prev:hover,#btn-next:hover{background:#f0f4f8}
#btn-complete{padding:7px 18px;border-radius:5px;border:none;background:var(--acc);color:#fff;cursor:pointer;font-size:12px;font-weight:600}
#btn-complete:hover{background:var(--acc-dark)}
#btn-complete.done{background:var(--green)}

/* content pane */
#content{flex:1;overflow-y:auto;padding:32px 48px 48px;max-width:900px;width:100%}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* week overview card */
.week-overview{background:linear-gradient(135deg,#1971c2,#1560a4);color:#fff;border-radius:12px;padding:28px 32px;margin-bottom:28px}
.week-overview .wk-num{font-size:12px;opacity:.8;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.week-overview h1{font-size:24px;font-weight:700;margin-bottom:8px}
.week-overview p{font-size:14px;opacity:.9;line-height:1.6}
.week-overview .wk-meta{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.week-overview .wk-tag{background:rgba(255,255,255,.18);padding:4px 12px;border-radius:20px;font-size:12px}

/* lesson list cards (overview) */
.lesson-cards{display:grid;gap:10px}
.lesson-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
.lesson-card:hover{border-color:var(--acc);box-shadow:0 2px 8px rgba(25,113,194,.12)}
.lesson-card.done{border-color:var(--green);background:#f0fdf4}
.lc-icon{width:40px;height:40px;border-radius:8px;background:var(--acc-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.lesson-card.done .lc-icon{background:var(--green-bg)}
.lc-info h4{font-size:13px;font-weight:600;color:var(--txt)}
.lc-info p{font-size:11px;color:var(--muted);margin-top:2px}
.lc-status{margin-left:auto;font-size:12px;color:var(--green);font-weight:600}

/* reading content */
.reading-wrap{}
.reading-wrap h1{font-size:22px;font-weight:700;margin:0 0 20px;color:#1c1d1f;border-bottom:2px solid var(--acc-light);padding-bottom:10px}
.reading-wrap h2{font-size:17px;font-weight:700;margin:28px 0 12px;color:var(--acc-dark);padding:8px 14px;background:var(--acc-light);border-radius:6px;border-left:4px solid var(--acc)}
.reading-wrap h3{font-size:15px;font-weight:600;margin:20px 0 8px;color:#1c1d1f;border-bottom:1px solid #e5e7eb;padding-bottom:5px}
.reading-wrap h4{font-size:13px;font-weight:600;margin:14px 0 6px;color:#374151}
.reading-wrap h5,.reading-wrap h6{font-size:13px;font-weight:600;margin:10px 0 4px;color:var(--muted)}
.reading-wrap p{font-size:14px;line-height:1.8;margin-bottom:12px;color:#374151}
.reading-wrap ul,.reading-wrap ol{margin:8px 0 14px 22px;font-size:14px}
.reading-wrap li{line-height:1.8;margin-bottom:4px}
.reading-wrap blockquote{border-left:4px solid var(--acc);background:var(--acc-light);padding:12px 18px;margin:14px 0;border-radius:0 8px 8px 0;font-size:14px;color:#1e3a8a}
.reading-wrap hr{border:none;border-top:1px solid var(--border);margin:22px 0}
.reading-wrap strong{color:#1c1d1f}
.reading-wrap code{background:#f1f5f9;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px;color:#be185d}
.reading-wrap pre{background:#1e293b;color:#e2e8f0;padding:18px;border-radius:8px;overflow-x:auto;margin:14px 0;font-size:13px;line-height:1.5}
.reading-wrap pre code{background:none;color:inherit;padding:0}
.reading-wrap a{color:var(--acc)}
.tbl{overflow-x:auto;margin:12px 0;border-radius:8px;border:1px solid var(--border)}
.tbl table{border-collapse:collapse;width:100%;font-size:13px}
.tbl th{background:#dbeafe;color:#1e3a8a;padding:9px 13px;border-bottom:2px solid #bfdbfe;text-align:left;font-weight:600}
.tbl td{padding:8px 13px;border-bottom:1px solid #f1f5f9;vertical-align:top;line-height:1.55}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:#fafbfc}

/* quiz */
.quiz-wrap{max-width:780px}
.quiz-hdr{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:20px}
.quiz-hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.quiz-hdr h3{font-size:15px;font-weight:700}
.quiz-stats{display:flex;gap:16px;font-size:13px}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-val{font-size:20px;font-weight:700}
.stat-val.green{color:var(--green)}
.stat-val.red{color:var(--red)}
.stat-val.blue{color:var(--acc)}
.stat-lbl{font-size:10px;color:var(--muted)}
.qpbar{height:5px;background:#e5e7eb;border-radius:3px;margin:10px 0 6px}
.qpfill{height:100%;background:var(--green);border-radius:3px;transition:width .4s}
.quiz-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.q-filter{padding:5px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;background:var(--card);font-weight:500}
.q-filter:hover,.q-filter.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-reset{padding:5px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;background:var(--card)}

.q-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:border-color .2s}
.q-card.ok{border-color:var(--green);background:#f0fdf4}
.q-card.err{border-color:var(--red);background:var(--red-bg)}
.q-card.revealed{border-color:var(--gold);background:var(--gold-bg)}
.q-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px}
.q-num{font-size:11px;font-weight:700;color:#fff;background:var(--acc);border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0}
.q-star{color:var(--gold);flex-shrink:0}
.q-text{font-size:14px;font-weight:500;line-height:1.65;flex:1}
.q-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.q-opt{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:13px;line-height:1.55;background:#fff;transition:all .15s}
.q-opt:hover:not(.locked){border-color:var(--acc);background:var(--acc-light)}
.q-opt.sel{border-color:var(--acc);background:var(--acc-light)}
.q-opt.cor{border-color:var(--green);background:var(--green-bg);color:#155724}
.q-opt.wrg{border-color:var(--red);background:var(--red-bg);color:#721c24}
.q-opt.locked{cursor:default}
.opt-k{font-weight:700;color:var(--acc);min-width:18px;flex-shrink:0}
.q-opt.cor .opt-k{color:var(--green)}
.q-opt.wrg .opt-k{color:var(--red)}
.q-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-exp{padding:5px 14px;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:12px;background:var(--card)}
.btn-exp:hover{background:#f0f4f8}
.btn-show{padding:5px 14px;border:none;border-radius:5px;cursor:pointer;font-size:12px;background:var(--acc);color:#fff}
.q-explanation{margin-top:12px;padding:12px 16px;background:#eff6ff;border-radius:8px;font-size:13px;line-height:1.65;color:#1e3a8a;display:none;border-left:3px solid var(--acc)}
.q-explanation.show{display:block}
.q-result-icon{font-size:16px;margin-left:auto;flex-shrink:0}

/* search results */
.search-results h2{font-size:18px;font-weight:700;margin-bottom:16px}
.search-hit{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;cursor:pointer}
.search-hit:hover{border-color:var(--acc)}
.search-hit h4{font-size:14px;font-weight:600;color:var(--acc)}
.search-hit p{font-size:12px;color:var(--muted);margin-top:3px}
mark{background:#fef08a;color:inherit;border-radius:2px;padding:0 2px}

/* no content */
.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state .big{font-size:48px;margin-bottom:16px}
.empty-state p{font-size:14px}
</style>
</head>
<body>
<div id="hdr">
  <div id="hdr-logo">TOGAF<span>学院</span></div>
  <div id="hdr-title">TOGAF Standard 10 Level 1+2 认证备考 · 8周课程</div>
  <div id="hdr-prog">
    <div id="hdr-pbar"><div id="hdr-pfill" style="width:0%"></div></div>
    <span id="hdr-prog-txt">0/83</span>
  </div>
  <div id="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-inp" type="text" placeholder="搜索课程内容...">
  </div>
</div>
<div id="body">
  <div id="sidebar"></div>
  <div id="main">
    <div id="lesson-bar">
      <h2 id="lesson-bar-title">请从左侧选择课时</h2>
      <button id="btn-prev">← 上一课时</button>
      <button id="btn-next">下一课时 →</button>
      <button id="btn-complete" class="btn primary" style="display:none">标记完成</button>
    </div>
    <div id="content">
      <div class="empty-state"><div class="big">🎓</div><p>请从左侧导航选择学习内容</p></div>
    </div>
  </div>
</div>

", "📖 需求管理 & 案例总结 & 与华锐对比"]]}, {"id": "w10", "num": 10, "title": "真实案例 — 华辉照明SAP升级", "subtitle": "基于175条调研需求·18场访谈·7份管理层问卷的完整TOGAF实战案例", "lessons": [["LA_1", "reading", "📖 项目背景：华辉现状 & 五大核心痛点"], ["LA_2", "reading", "📖 Preliminary — 12条架构原则 & Architecture Board"], ["LA_3", "reading", "📖 Phase A — 利益相关者矩阵 & 架构愿景"], ["LA_4", "reading", "📖 Phase B — 业务能力图·五大流程诊断·Gap分析"], ["LA_5", "reading", "📖 Phase C — 数据架构（主数据问题·CRUD矩阵）"], ["LA_6", "reading", "📖 Phase C — 应用架构（18套系统·CPI接口清单）"], ["LA_7", "reading", "📖 Phase D — 技术架构（PCE四大范式转变）"], ["LA_8", "reading", "📖 Phase E — 10个工作包 & 三个过渡架构"], ["LA_9", "reading", "📖 Phase F — 付款里程碑·迁移计划·ROI测算"], ["LA_10", "reading", "📖 Phase G — 架构合规检查·Dispensation案例"], ["LA_11", "reading", "📖 Phase H — PESTLE监控·三类变更·二期商机"], ["LA_12", "reading", "📖 需求管理·量化成果·付款节点与架构质量对应"]]}];
const LESSONS = {"L1_1": {"type": "reading", "title": "📖 TOGAF 简介与版本历史", "html": "<h2 id=\"第一章-TOGAF是什么\">第一章：TOGAF是什么</h2>\n<h3 id=\"1-1-基本定义\">1.1 基本定义</h3>\n<p><strong>TOGAF</strong>（The Open Group Architecture Framework）是由 <strong>The Open Group</strong> 发布和维护的企业架构框架。它提供一套系统化的方法论、工具和词汇，用于开发、管理和治理企业架构。</p>\n<p>TOGAF 不是一套严格的标准规范，而是一个<strong>实践指导框架</strong>（Practical Framework），可根据企业实际情况进行裁剪和适配。</p>\n<h3 id=\"1-2-发布机构\">1.2 发布机构</h3>\n<div class=\"tbl\"><table>\n<tr><th>属性</th><th>内容</th></tr>\n<tr><td>发布机构</td><td>The Open Group（开放集团，国际中立标准组织）</td></tr>\n<tr><td>官网</td><td>www.opengroup.org</td></tr>\n<tr><td>认证体系</td><td>TOGAF Foundation (Level 1) / Practitioner (Level 2)</td></tr>\n<tr><td>首次发布</td><td>1995年（基于美国国防部 TAFIM 框架）</td></tr>\n</table></div>\n<h3 id=\"1-3-版本历史\">1.3 版本历史</h3>\n<div class=\"tbl\"><table>\n<tr><th>版本</th><th>发布年份</th><th>主要变化</th></tr>\n<tr><td>TOGAF 8</td><td>2003</td><td>引入ADM完整周期</td></tr>\n<tr><td>TOGAF 9</td><td>2009</td><td>增加架构能力框架、内容框架</td></tr>\n<tr><td>TOGAF 9.1</td><td>2011</td><td>错误修正与澄清</td></tr>\n<tr><td>TOGAF 9.2</td><td>2018</td><td>现代化更新，删除过时内容，增加Agile指导</td></tr>\n<tr><td><strong>TOGAF Standard Version 10</strong></td><td><strong>2022</strong></td><td><strong>重大结构重组，模块化设计</strong></td></tr>\n</table></div>\n<h3 id=\"1-4-TOGAF-Standard-10-的新变化-相比9-2-\">1.4 TOGAF Standard 10 的新变化（相比9.2）</h3>\n<p>TOGAF Standard 10 是迄今最重大的一次架构重组，核心变化如下：</p>\n<p><strong>1. 模块化结构（Modular Structure）</strong></p>\n<ul>\n<li>原来的单一文档拆分为多个独立模块（Series）</li>\n<li>核心文档（Core）与指南（Guides）分离</li>\n<li>便于独立更新维护</li>\n</ul>\n<p><strong>2. 内容重组</strong></p>\n<ul>\n<li>删除了已过时的参考模型（TRM/III-RM 移至独立指南）</li>\n<li>TOGAF Series Guides 涵盖数字化转型、安全架构、Agile等专题</li>\n<li>架构能力框架（Architecture Capability Framework）独立成册</li>\n</ul>\n<p><strong>3. 强调数字化与敏捷</strong></p>\n<ul>\n<li>新增 TOGAF® Agile DevOps Guide</li>\n<li>与 SAFe、Scrum 等敏捷方法的整合指导</li>\n<li>数字化转型场景的架构实践</li>\n</ul>\n<p><strong>4. 语言现代化</strong></p>\n<ul>\n<li>更新了部分术语定义</li>\n<li>简化了部分描述，提升可读性</li>\n</ul>\n<p><strong>5. 开放生态系统（Open Ecosystem）</strong></p>\n<ul>\n<li>与 ArchiMate®、IT4IT™、TOGAF Series Library 深度集成</li>\n</ul>\n<h3 id=\"1-5-适用对象与使用场景\">1.5 适用对象与使用场景</h3>\n<p><strong>适用对象：</strong></p>\n<ul>\n<li>企业架构师（Enterprise Architect）</li>\n<li>IT战略规划人员</li>\n<li>CIO/CTO 及技术决策者</li>\n<li>咨询顾问（如SAP架构顾问）</li>\n<li>项目经理和解决方案设计师</li>\n</ul>\n<p><strong>典型使用场景：</strong></p>\n<ul>\n<li>大型企业IT战略规划</li>\n<li>ERP系统升级或数字化转型（如 ECC → S/4HANA 迁移）</li>\n<li>集团级架构治理体系建设</li>\n<li>云迁移架构规划</li>\n<li>组织合并/重组后的IT整合</li>\n</ul>\n<hr>"}, "L1_2": {"type": "reading", "title": "📖 企业架构四大域 (BADT)", "html": "<h2 id=\"第二章-企业架构-EA-基础\">第二章：企业架构（EA）基础</h2>\n<h3 id=\"2-1-企业架构定义\">2.1 企业架构定义</h3>\n<p><strong>Enterprise Architecture（企业架构，EA）</strong> 是对整个企业的结构性描述，定义了企业的组成部分（人员、流程、信息系统、技术基础设施）以及它们之间的关系，并说明这些关系如何支持企业目标的实现。</p>\n<p>TOGAF 对&quot;架构&quot;有两层含义：</p>\n<ol>\n<li><strong>架构描述（Architecture Description）</strong>：对系统结构的形式化描述</li>\n<li><strong>架构实践（Architecture Practice）</strong>：开发和使用架构描述的方法和过程</li>\n</ol>\n<h3 id=\"2-2-架构的四大域-Four-Architecture-Domains-\">2.2 架构的四大域（Four Architecture Domains）</h3>\n<p>这是 TOGAF Level 1 <strong>最高频考点</strong>，必须熟记。</p>\n<div class=\"tbl\"><table>\n<tr><th>架构域</th><th>英文名称</th><th>关注重点</th><th>典型问题</th></tr>\n<tr><td>业务架构</td><td>Business Architecture</td><td>业务战略、治理、组织、关键业务流程</td><td>企业如何运营？</td></tr>\n<tr><td>应用架构</td><td>Application Architecture</td><td>应用系统蓝图、各应用间交互关系</td><td>有哪些应用？如何协作？</td></tr>\n<tr><td>数据架构</td><td>Data Architecture</td><td>企业数据资产的结构、管理和治理</td><td>数据在哪？如何管理？</td></tr>\n<tr><td>技术架构</td><td>Technology Architecture</td><td>支撑应用和数据的软硬件基础设施</td><td>跑在什么平台上？</td></tr>\n</table></div>\n<blockquote><p><strong>记忆口诀</strong>：BADT（Business → Application → Data → Technology），从业务到技术，从高到低。</p></blockquote>\n<h3 id=\"2-3-三个核心架构文档概念\">2.3 三个核心架构文档概念</h3>\n<div class=\"tbl\"><table>\n<tr><th>概念</th><th>英文</th><th>定义</th><th>产生阶段</th></tr>\n<tr><td>架构愿景</td><td>Architecture Vision</td><td>对目标架构高层次的描述，说明为何需要变革</td><td>Phase A</td></tr>\n<tr><td>架构描述</td><td>Architecture Description</td><td>对架构的完整正式描述（基线或目标）</td><td>Phase B-D</td></tr>\n<tr><td>架构路线图</td><td>Architecture Roadmap</td><td>从基线架构到目标架构的变更序列计划</td><td>Phase E-F</td></tr>\n</table></div>\n<h3 id=\"2-4-架构师角色类型\">2.4 架构师角色类型</h3>\n<div class=\"tbl\"><table>\n<tr><th>角色</th><th>英文</th><th>职责范围</th></tr>\n<tr><td>首席架构师</td><td>Chief Architect / Lead Architect</td><td>负责整体架构方向、架构治理</td></tr>\n<tr><td>企业架构师</td><td>Enterprise Architect</td><td>跨域整体架构设计与协调</td></tr>\n<tr><td>业务架构师</td><td>Business Architect</td><td>业务流程与组织架构设计</td></tr>\n<tr><td>解决方案架构师</td><td>Solution Architect</td><td>特定项目/系统的架构设计</td></tr>\n<tr><td>技术架构师</td><td>Technical Architect</td><td>基础设施与技术平台架构</td></tr>\n<tr><td>数据架构师</td><td>Data Architect</td><td>数据模型、数据治理架构</td></tr>\n<tr><td>安全架构师</td><td>Security Architect</td><td>安全策略与安全架构设计</td></tr>\n</table></div>\n<hr>"}, "L1_3": {"type": "reading", "title": "📖 关键术语对照表（42个）", "html": "<h2 id=\"第四章-关键术语对照表\">第四章：关键术语对照表</h2>\n<blockquote><p>共收录 <strong>42个</strong> 核心术语，覆盖Level 1考试全部必考词汇。</p></blockquote>\n<div class=\"tbl\"><table>\n<tr><th>#</th><th>英文术语</th><th>中文释义</th><th>简要定义（一句话）</th></tr>\n<tr><td>1</td><td>ADM (Architecture Development Method)</td><td>架构开发方法</td><td>TOGAF的核心迭代循环过程，描述如何开发企业架构</td></tr>\n<tr><td>2</td><td>Architecture Domain</td><td>架构域</td><td>企业架构的四大分类领域：业务/应用/数据/技术</td></tr>\n<tr><td>3</td><td>Architecture Vision</td><td>架构愿景</td><td>对目标架构高层次的描述，定义变革愿景（Phase A输出）</td></tr>\n<tr><td>4</td><td>Architecture Repository</td><td>架构知识库</td><td>存储所有架构相关资产和信息的中央仓库</td></tr>\n<tr><td>5</td><td>Architecture Building Block (ABB)</td><td>架构构建块</td><td>定义功能需求但不指定实现方式的抽象组件</td></tr>\n<tr><td>6</td><td>Solution Building Block (SBB)</td><td>解决方案构建块</td><td>实现ABB的具体产品、服务或系统组件</td></tr>\n<tr><td>7</td><td>Architecture Roadmap</td><td>架构路线图</td><td>从基线架构到目标架构的变更工作包时序计划</td></tr>\n<tr><td>8</td><td>Stakeholder</td><td>利益相关者</td><td>对架构有关切或被架构影响的个人、团队或组织</td></tr>\n<tr><td>9</td><td>Concern</td><td>关切</td><td>利益相关者认为重要的系统特性或质量属性</td></tr>\n<tr><td>10</td><td>View</td><td>视图</td><td>从特定视点出发对架构的表达（面向特定利益相关者）</td></tr>\n<tr><td>11</td><td>Viewpoint</td><td>视点</td><td>创建和使用视图的约定规范（定义视图的&quot;模板&quot;）</td></tr>\n<tr><td>12</td><td>Architecture Continuum</td><td>架构连续体</td><td>从通用基础架构到组织专属架构的分类体系</td></tr>\n<tr><td>13</td><td>Architecture Landscape</td><td>架构全景</td><td>企业架构在特定时间点的全面快照</td></tr>\n<tr><td>14</td><td>Foundation Architecture</td><td>基础架构</td><td>最通用、最抽象的架构层（如互联网标准）</td></tr>\n<tr><td>15</td><td>Common Systems Architecture</td><td>公共系统架构</td><td>跨行业通用的系统架构模式</td></tr>\n<tr><td>16</td><td>Industry Architecture</td><td>行业架构</td><td>特定行业通用的架构模式（如汽车行业架构）</td></tr>\n<tr><td>17</td><td>Organization-Specific Architecture</td><td>组织专属架构</td><td>针对特定企业的定制化架构</td></tr>\n<tr><td>18</td><td>Architecture Capability</td><td>架构能力</td><td>企业有效开发和使用架构的能力</td></tr>\n<tr><td>19</td><td>Architecture Governance</td><td>架构治理</td><td>对架构开发和使用进行控制的实践与流程</td></tr>\n<tr><td>20</td><td>Architecture Board</td><td>架构委员会</td><td>负责审批架构、监督架构合规的跨职能委员会</td></tr>\n<tr><td>21</td><td>Architecture Compliance</td><td>架构合规</td><td>实施项目符合既定架构标准和原则的程度</td></tr>\n<tr><td>22</td><td>Architecture Contract</td><td>架构合同</td><td>开发伙伴和赞助商之间对架构交付物的共同协议</td></tr>\n<tr><td>23</td><td>Architecture Principles</td><td>架构原则</td><td>指导架构决策的持久性规则和准则</td></tr>\n<tr><td>24</td><td>PESTLE</td><td>宏观环境分析</td><td>政治/经济/社会/技术/法律/环境六维度外部环境分析</td></tr>\n<tr><td>25</td><td>Gap Analysis</td><td>差距分析</td><td>识别基线架构与目标架构之间差异的分析方法</td></tr>\n<tr><td>26</td><td>Migration Planning</td><td>迁移规划</td><td>制定从基线架构迁移到目标架构的详细计划（Phase F）</td></tr>\n<tr><td>27</td><td>Architecture Partition</td><td>架构分区</td><td>将整体架构划分为可管理子集的技术</td></tr>\n<tr><td>28</td><td>Segmented Architecture</td><td>分段架构</td><td>针对特定业务分段/能力的详细架构</td></tr>\n<tr><td>29</td><td>TRM (Technical Reference Model)</td><td>技术参考模型</td><td>TOGAF提供的通用技术服务分类参考模型</td></tr>\n<tr><td>30</td><td>III-RM (Integrated Information Infrastructure Reference Model)</td><td>集成信息基础设施参考模型</td><td>支持无边界信息流的参考模型</td></tr>\n<tr><td>31</td><td>Architecture Description</td><td>架构描述</td><td>对架构的完整正式描述文档</td></tr>\n<tr><td>32</td><td>Work Package</td><td>工作包</td><td>可独立实施的变更单元，包含相关项目和活动</td></tr>\n<tr><td>33</td><td>Baseline Architecture</td><td>基线架构（现状架构）</td><td>企业当前状态的架构描述（As-Is）</td></tr>\n<tr><td>34</td><td>Target Architecture</td><td>目标架构</td><td>企业期望达到的未来状态架构描述（To-Be）</td></tr>\n<tr><td>35</td><td>Transition Architecture</td><td>过渡架构</td><td>从基线到目标之间的中间状态架构</td></tr>\n<tr><td>36</td><td>Capability Architecture</td><td>能力架构</td><td>支撑特定业务能力交付的详细架构</td></tr>\n<tr><td>37</td><td>Solutions Continuum</td><td>解决方案连续体</td><td>从通用产品到企业专属实现的分类体系</td></tr>\n<tr><td>38</td><td>Enterprise Continuum</td><td>企业连续体</td><td>架构连续体与解决方案连续体的统称</td></tr>\n<tr><td>39</td><td>Architecture Definition Document</td><td>架构定义文档</td><td>描述基线和目标架构的核心交付物</td></tr>\n<tr><td>40</td><td>Requirements Impact Assessment</td><td>需求影响评估</td><td>评估新需求对现有架构影响的分析</td></tr>\n<tr><td>41</td><td>Implementation and Migration Plan</td><td>实施与迁移计划</td><td>指导从当前架构迁移到目标架构的行动计划</td></tr>\n<tr><td>42</td><td>Statement of Architecture Work</td><td>架构工作说明书</td><td>定义架构项目范围和方法的正式文件（Phase A批准）</td></tr>\n</table></div>\n<hr>"}, "L1_4": {"type": "reading", "title": "📖 ADM 概览与迭代循环", "html": "<h2 id=\"第三章-ADM概览-Architecture-Development-Method-\">第三章：ADM概览（Architecture Development Method）</h2>\n<h3 id=\"3-1-ADM全图\">3.1 ADM全图</h3>\n<p>ADM 是 TOGAF 的核心，是一个<strong>迭代循环</strong>的企业架构开发方法。共包含 <strong>9个Phase（阶段）+ 1个持续过程</strong>。</p>\n<pre><code>                    ┌─────────────────────────────┐\n                    │   Requirements Management    │\n                    │        （需求管理）           │\n                    │  ← 贯穿所有阶段，持续进行 →  │\n                    └─────────────────────────────┘\n                                  ↕\n        ┌─────────────────────────────────────────────────┐\n        │                                                 │\n   H ←──┤  A: Architecture Vision（架构愿景）             │\n   迁移  │  B: Business Architecture（业务架构）           │\n   管理  │  C: Information Systems Architecture           │\n   变更  │     C1: Application / C2: Data                │\n        │  D: Technology Architecture（技术架构）         │\n        │  E: Opportunities &amp; Solutions（机会与解决方案）  │\n        │  F: Migration Planning（迁移规划）               │\n        │  G: Implementation Governance（实施治理）        │──→ H\n        └─────────────────────────────────────────────────┘</code></pre>\n<h3 id=\"3-2-每个Phase的一句话定义-考试必背-\">3.2 每个Phase的一句话定义（考试必背）</h3>\n<div class=\"tbl\"><table>\n<tr><th>Phase</th><th>名称</th><th>一句话定义</th><th>关键输出</th></tr>\n<tr><td>预备阶段</td><td>Preliminary Phase</td><td>建立架构能力，定制TOGAF，建立架构原则</td><td>架构原则、定制ADM</td></tr>\n<tr><td>A</td><td>Architecture Vision</td><td>定义架构项目范围、利益相关者、愿景，获得批准</td><td>架构愿景声明、Statement of Architecture Work</td></tr>\n<tr><td>B</td><td>Business Architecture</td><td>开发业务架构（基线→目标），进行差距分析</td><td>业务架构文档、差距分析</td></tr>\n<tr><td>C</td><td>Information Systems Architecture</td><td>开发应用架构和数据架构</td><td>应用架构+数据架构文档</td></tr>\n<tr><td>D</td><td>Technology Architecture</td><td>开发技术基础设施架构</td><td>技术架构文档</td></tr>\n<tr><td>E</td><td>Opportunities &amp; Solutions</td><td>识别实施工作包、评估交付物，制定架构路线图初版</td><td>架构路线图、实施和迁移计划（初版）</td></tr>\n<tr><td>F</td><td>Migration Planning</td><td>完善实施和迁移计划，确定优先级</td><td>迁移计划、实施和迁移计划（完整版）</td></tr>\n<tr><td>G</td><td>Implementation Governance</td><td>监督实施项目的架构合规性</td><td>架构合规评估、架构变更请求</td></tr>\n<tr><td>H</td><td>Architecture Change Management</td><td>监控架构变更需求，管理架构生命周期</td><td>变更请求、架构更新</td></tr>\n<tr><td>RM</td><td>Requirements Management</td><td>持续管理所有架构需求（贯穿全程）</td><td>需求库、需求影响评估</td></tr>\n</table></div>\n<blockquote><p><strong>关键记忆：</strong> Preliminary（预备）→ A（愿景）→ B（业务）→ C（信息系统）→ D（技术）→ E（机会）→ F（迁移）→ G（治理）→ H（变更管理）→ 回到A</p></blockquote>\n<h3 id=\"3-3-ADM循环的迭代性质\">3.3 ADM循环的迭代性质</h3>\n<p>ADM 有三个层次的迭代：</p>\n<ol>\n<li><strong>阶段内迭代（Within a Phase）</strong>：在单一阶段内反复细化</li>\n<li><strong>阶段间迭代（Between Phases）</strong>：在多个阶段间往返（如B→A重新审视愿景）</li>\n<li><strong>完整循环迭代（Full ADM Cycle）</strong>：一轮ADM完成后，启动下一轮更细化的架构工作</li>\n</ol>\n<p><strong>架构层次与迭代：</strong></p>\n<ul>\n<li>战略架构（Strategic Architecture）：高层次，长期，Phase A-E</li>\n<li>分段架构（Segmented Architecture）：特定业务域，中期</li>\n<li>能力架构（Capability Architecture）：特定能力，短期，支撑项目实施</li>\n</ul>\n<h3 id=\"3-4-ADM适配-Adaptation-概念\">3.4 ADM适配（Adaptation）概念</h3>\n<p>TOGAF 明确支持<strong>对ADM进行裁剪和适配</strong>，适配的常见场景：</p>\n<div class=\"tbl\"><table>\n<tr><th>适配场景</th><th>说明</th></tr>\n<tr><td>与敏捷方法整合</td><td>将ADM的Phase映射到Sprint/迭代</td></tr>\n<tr><td>架构范围调整</td><td>仅覆盖部分架构域（如仅做技术架构）</td></tr>\n<tr><td>与其他框架整合</td><td>与 ITIL、COBIT、Zachman 等框架结合使用</td></tr>\n<tr><td>行业特定适配</td><td>如政府架构框架（GEA）、金融行业等</td></tr>\n<tr><td>规模适配</td><td>小型企业简化版ADM</td></tr>\n</table></div>\n<hr>"}, "L1_5": {"type": "reading", "title": "📖 架构原则与制品体系", "html": "<h2 id=\"第六章-TOGAF制品体系-Artifacts-\">第六章：TOGAF制品体系（Artifacts）</h2>\n<h3 id=\"6-1-制品三大类型\">6.1 制品三大类型</h3>\n<p>TOGAF 架构制品分为三类，这是<strong>高频考点</strong>：</p>\n<div class=\"tbl\"><table>\n<tr><th>类型</th><th>英文</th><th>定义</th><th>示例</th></tr>\n<tr><td><strong>目录</strong></td><td>Catalog</td><td>架构相关元素的列表清单</td><td>应用系统清单、技术标准目录</td></tr>\n<tr><td><strong>矩阵</strong></td><td>Matrix</td><td>显示两个或多个模型元素之间关系的表格</td><td>应用与业务功能映射矩阵</td></tr>\n<tr><td><strong>图表</strong></td><td>Diagram</td><td>以图形方式呈现架构的可视化表达</td><td>流程图、组织架构图、网络拓扑图</td></tr>\n</table></div>\n<h3 id=\"6-2-各阶段代表性制品\">6.2 各阶段代表性制品</h3>\n<div class=\"tbl\"><table>\n<tr><th>ADM Phase</th><th>代表性制品</th></tr>\n<tr><td>Preliminary</td><td>架构原则目录、架构框架文件</td></tr>\n<tr><td>Phase A</td><td>架构愿景文档、Statement of Architecture Work、利益相关者地图</td></tr>\n<tr><td>Phase B</td><td>组织/角色目录、业务流程图、业务场景、价值链图、业务交互矩阵</td></tr>\n<tr><td>Phase C（应用）</td><td>应用组合目录、应用通信图、应用与业务功能矩阵</td></tr>\n<tr><td>Phase C（数据）</td><td>数据实体目录、概念数据模型、数据传播图</td></tr>\n<tr><td>Phase D</td><td>技术标准目录、平台分解图、应用/技术矩阵、网络拓扑图</td></tr>\n<tr><td>Phase E</td><td>差距分析文档、解决方案概念图、架构路线图（初版）</td></tr>\n<tr><td>Phase F</td><td>实施与迁移计划、工作包目录、迁移计划</td></tr>\n<tr><td>Phase G</td><td>架构合规评估报告、变更请求</td></tr>\n<tr><td>Phase H</td><td>架构变更日志、变更影响评估</td></tr>\n</table></div>\n<h3 id=\"6-3-三个重要概念的区别-高频考点-\">6.3 三个重要概念的区别（高频考点）</h3>\n<p>这是考试常考的辨析题，必须清晰区分：</p>\n<div class=\"tbl\"><table>\n<tr><th>概念</th><th>英文</th><th>定义</th><th>关键特征</th><th>示例</th></tr>\n<tr><td><strong>交付物</strong></td><td>Deliverable</td><td>合同规定必须提交的工作成果</td><td>受合同约束，经正式审查批准</td><td>架构愿景文档、迁移计划</td></tr>\n<tr><td><strong>制品</strong></td><td>Artifact</td><td>描述架构某个方面的细粒度文档</td><td>交付物的组成部分</td><td>数据流图、应用清单</td></tr>\n<tr><td><strong>构建块</strong></td><td>Building Block</td><td>可重用的功能组件（ABB或SBB）</td><td>强调可重用性</td><td>认证服务组件、ERP系统</td></tr>\n</table></div>\n<p><strong>关系：</strong> 交付物 = 一个或多个制品的集合；制品描述架构的某个视角；构建块是架构中可复用的功能单元。</p>\n<p><strong>ABB vs SBB 辨析：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th></th><th>ABB（Architecture Building Block）</th><th>SBB（Solution Building Block）</th></tr>\n<tr><td>抽象程度</td><td>高（抽象，不指定实现）</td><td>低（具体，指定实现方式）</td></tr>\n<tr><td>关注点</td><td>定义功能需求（What）</td><td>定义具体实现（How/Which）</td></tr>\n<tr><td>示例</td><td>&quot;消息中间件服务&quot;</td><td>&quot;SAP Integration Suite&quot;</td></tr>\n<tr><td>来源</td><td>架构定义</td><td>产品选型/采购</td></tr>\n</table></div>\n<hr>"}, "L1_6": {"type": "reading", "title": "📖 利益相关者管理", "html": "<h2 id=\"第八章-利益相关者管理\">第八章：利益相关者管理</h2>\n<h3 id=\"8-1-利益相关者分类\">8.1 利益相关者分类</h3>\n<p>TOGAF 将利益相关者（Stakeholder）定义为：<strong>对系统架构有利益关系或被架构所影响的个人、团队或组织</strong>。</p>\n<p><strong>按组织层级分类：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>类别</th><th>典型角色</th><th>主要关切（Concern）</th></tr>\n<tr><td>高层管理</td><td>CEO、CFO、COO、CIO</td><td>战略对齐、ROI、风险管控、合规</td></tr>\n<tr><td>业务管理</td><td>业务部门负责人、流程负责人</td><td>业务效率、流程优化、功能完整性</td></tr>\n<tr><td>IT管理</td><td>IT总监、项目经理、架构师</td><td>技术可行性、成本、交付周期</td></tr>\n<tr><td>IT运营</td><td>系统管理员、DBA、运维工程师</td><td>系统稳定性、可维护性、性能</td></tr>\n<tr><td>最终用户</td><td>业务操作人员</td><td>易用性、响应速度、功能实用性</td></tr>\n<tr><td>外部相关方</td><td>审计机构、监管机构、合作伙伴</td><td>合规性、接口标准、数据安全</td></tr>\n</table></div>\n<p><strong>考试常考的3类利益相关者角色：</strong></p>\n<ul>\n<li><strong>赞助商（Sponsor）</strong>：提供资金和授权，通常是C级高管</li>\n<li><strong>架构委员会（Architecture Board）</strong>：审批架构决策的跨职能委员会</li>\n<li><strong>项目经理（Project Manager）</strong>：负责实施层面的交付</li>\n</ul>\n<h3 id=\"8-2-关切-Concern-的定义\">8.2 关切（Concern）的定义</h3>\n<p><strong>Concern（关切）</strong> 是利益相关者认为对系统重要的<strong>任何兴趣点</strong>，包括但不限于：</p>\n<ul>\n<li>功能性：系统能做什么（What it does）</li>\n<li>性能：响应速度有多快</li>\n<li>安全性：谁可以访问什么</li>\n<li>可用性：系统何时可用</li>\n<li>可维护性：多容易维护</li>\n<li>成本：总拥有成本是多少</li>\n<li>合规性：是否满足法规要求</li>\n<li>互操作性：能否与其他系统集成</li>\n</ul>\n<blockquote><p><strong>关键区分：</strong> 关切（Concern）是需求的原始来源；需求（Requirement）是对关切的具体化描述。</p></blockquote>\n<h3 id=\"8-3-视点-Viewpoint-vs-视图-View-\">8.3 视点（Viewpoint）vs 视图（View）</h3>\n<p>这是<strong>必考辨析题</strong>，需要清晰区分：</p>\n<div class=\"tbl\"><table>\n<tr><th>概念</th><th>英文</th><th>定义</th><th>类比</th></tr>\n<tr><td><strong>视点</strong></td><td>Viewpoint</td><td>创建和使用视图的约定、规则和方法，是视图的&quot;模板&quot;或&quot;规范&quot;</td><td>拍照的规则（用什么镜头、角度、参数）</td></tr>\n<tr><td><strong>视图</strong></td><td>View</td><td>从特定视点出发，针对特定利益相关者关切，对架构的具体表达</td><td>按规则实际拍出来的照片</td></tr>\n</table></div>\n<p><strong>关系：</strong></p>\n<ul>\n<li>一个视点可以产生多个视图</li>\n<li>视图是视点的实例化（instantiation）</li>\n<li>每个视图对应特定的利益相关者和关切</li>\n</ul>\n<p><strong>示例：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>视点名称</th><th>对应利益相关者</th><th>关切</th><th>产生的视图</th></tr>\n<tr><td>业务流程视点</td><td>业务部门负责人</td><td>流程效率</td><td>端到端流程流图</td></tr>\n<tr><td>系统上下文视点</td><td>解决方案架构师</td><td>系统边界与接口</td><td>系统上下文图</td></tr>\n<tr><td>部署视点</td><td>IT运维</td><td>部署环境与配置</td><td>部署架构图</td></tr>\n<tr><td>安全视点</td><td>CIO/安全官</td><td>访问控制与安全</td><td>安全架构图</td></tr>\n</table></div>\n<h3 id=\"8-4-利益相关者地图-Stakeholder-Map-\">8.4 利益相关者地图（Stakeholder Map）</h3>\n<p>利益相关者地图用于识别和分析利益相关者，通常使用 <strong>权力/兴趣矩阵（Power/Interest Matrix）</strong>：</p>\n<pre><code>高权力  │  重点管理          │  密切关注\n        │（高权力/低兴趣）   │（高权力/高兴趣）\n        │  如：CFO           │  如：CIO、业务赞助商\n        ├────────────────────┼────────────────────\n        │  持续监控          │  保持满意\n        │（低权力/低兴趣）   │（低权力/高兴趣）\n低权力  │  如：审计人员      │  如：最终用户\n        └────────────────────┴────────────────────\n              低兴趣                   高兴趣</code></pre>\n<p><strong>利益相关者管理四步骤：</strong></p>\n<ol>\n<li><strong>识别（Identify）</strong>：列出所有相关的个人和组织</li>\n<li><strong>分类（Classify）</strong>：按权力/兴趣、关切类型分类</li>\n<li><strong>关切分析（Analyze Concerns）</strong>：明确每类利益相关者的关切</li>\n<li><strong>视图规划（Plan Views）</strong>：确定需要为哪些利益相关者创建哪些视图</li>\n</ol>\n<h3 id=\"8-5-架构治理中的利益相关者参与\">8.5 架构治理中的利益相关者参与</h3>\n<div class=\"tbl\"><table>\n<tr><th>ADM Phase</th><th>利益相关者主要参与活动</th></tr>\n<tr><td>Preliminary</td><td>确定治理框架，建立架构委员会</td></tr>\n<tr><td>Phase A</td><td>识别利益相关者，定义关切，获取架构工作授权</td></tr>\n<tr><td>Phase B-D</td><td>验证架构满足利益相关者关切，评审架构视图</td></tr>\n<tr><td>Phase E-F</td><td>优先级排序，确认迁移计划</td></tr>\n<tr><td>Phase G</td><td>监督实施合规性</td></tr>\n<tr><td>Phase H</td><td>接受变更请求，评估变更影响</td></tr>\n</table></div>\n<hr>"}, "L1_q": {"type": "quiz", "title": "✏️ 随堂测验 — 基础概念 8题", "questions": [{"num": "Q1", "star": true, "q": "TOGAF 是由哪个组织发布和维护的？", "opts": {"A": "ISO（国际标准化组织）", "B": "The Open Group", "C": "ITIL Foundation", "D": "Gartner"}, "ans": "B", "exp": "TOGAF 由 The Open Group 发布，这是一个技术中立的行业联盟。The Open Group 同时负责 TOGAF 认证考试。ISO 是国际标准化组织（发布如 ISO 42010），ITIL 是服务管理框架，Gartner 是调研机构，均非 TOGAF 发布方。", "topic": "t1"}, {"num": "Q2", "star": true, "q": "TOGAF 的全称是什么？", "opts": {"A": "Technical Open Group Architecture Framework", "B": "The Open Group Architecture Framework", "C": "Technology Operations Governance and Architecture Framework", "D": "Total Organizational Goals and Architecture Framework"}, "ans": "B", "exp": "TOGAF = The Open Group Architecture Framework，这是考试必背的全称。选项A、C、D均为干扰项，请注意\"The\"是组织名称的一部分，不是冠词。", "topic": "t1"}, {"num": "Q3", "star": false, "q": "TOGAF Standard 10 相比 9.2 版本的最主要变化是什么？", "opts": {"A": "删除了 ADM，改用敏捷方法", "B": "将内容重组为 TOGAF Fundamental Content 和 TOGAF Series Guides", "C": "增加了 Phase I 和 Phase J 两个新阶段", "D": "将四大架构域减少为三大域"}, "ans": "B", "exp": "TOGAF 10 的核心变化是将内容重构为两大部分：TOGAF Fundamental Content（基础内容，包括ADM核心概念）和 TOGAF Series Guides（系列指南，包括安全架构、Agile适配等专题）。ADM 在 10 中依然完整保留，架构域仍为四大域。", "topic": "t1"}, {"num": "Q4", "star": true, "q": "企业架构（Enterprise Architecture）的主要目的是什么？", "opts": {"A": "专门管理 IT 基础设施的部署", "B": "帮助企业实现业务目标与 IT 能力的对齐", "C": "仅关注应用软件的开发流程", "D": "替代项目管理框架（如 PRINCE2）"}, "ans": "B", "exp": "EA 的核心价值是将业务战略与 IT 能力对齐（Business-IT Alignment）。EA 不仅限于 IT，也不替代 PM 方法论。TOGAF 明确指出 EA 需要业务架构、应用架构、数据架构、技术架构四域协同，目标是支撑业务目标实现。", "topic": "t1"}, {"num": "Q5", "star": false, "q": "TOGAF ADM 中，哪个说法最准确地描述了架构开发的性质？", "opts": {"A": "ADM 是线性的、一次性的过程，从 Phase A 执行到 Phase H 即完成", "B": "ADM 是迭代的、循环的方法，可以在阶段间和循环间反复进行", "C": "ADM 只能按照规定顺序执行，不允许跳过阶段", "D": "ADM 在每个项目中只能执行一次"}, "ans": "B", "exp": "ADM 的核心特性是迭代性（Iterative）和循环性（Cyclic）。TOGAF 明确说明 ADM 可以在阶段内、阶段间、以及整个 ADM 循环层面进行迭代。架构可以分层次（战略/段/能力/项目）进行，每层触发新的ADM循环。", "topic": "t1"}, {"num": "Q6", "star": true, "q": "下列哪四个域构成了 TOGAF 的企业架构描述？", "opts": {"A": "Strategy / Operations / Technology / Security", "B": "Business / Application / Data / Technology", "C": "People / Process / Technology / Governance", "D": "Finance / Marketing / IT / Operations"}, "ans": "B", "exp": "TOGAF 的四大架构域（BADT）：Business Architecture（业务架构）、Application Architecture（应用架构）、Data Architecture（数据架构）、Technology Architecture（技术架构）。记忆口诀：BDAT 或 BADT。注意 Application 和 Data 同属 Information Systems Architecture（信息系统架构）域。", "topic": "t1"}, {"num": "Q7", "star": false, "q": "TOGAF 适合以下哪类组织使用？", "opts": {"A": "只适用于大型跨国企业", "B": "只适用于 IT 公司", "C": "可被任何规模和行业的组织使用，但需要针对自身情况适配", "D": "只适用于政府机构和公共部门"}, "ans": "C", "exp": "TOGAF 是通用的企业架构框架，设计上就考虑了可适配性（Adaptability）。Preliminary Phase 的核心工作之一就是\"定制 ADM 以适应组织需要\"。小到 SME，大到跨国集团均可使用，但需要根据规模和行业特点进行合理裁剪。", "topic": "t1"}, {"num": "Q8", "star": false, "q": "TOGAF 的哪个组成部分提供了一个通用的技术标准参考模型？", "opts": {"A": "Architecture Vision", "B": "Architecture Repository", "C": "Technical Reference Model（TRM）", "D": "Architecture Roadmap"}, "ans": "C", "exp": "TRM（Technical Reference Model，技术参考模型）是 TOGAF Foundation Architecture 的一部分，提供了一个通用的技术标准分类体系，帮助组织选择符合标准的技术组件。另一个基础参考模型是 III-RM（Integrated Information Infrastructure Reference Model）。", "topic": "t1"}]}, "L2_1": {"type": "reading", "title": "📖 Preliminary Phase — 架构能力建设", "html": "<h2 id=\"Preliminary-Phase-架构能力建设\">Preliminary Phase：架构能力建设</h2>\n<p><strong>核心目标</strong>：在启动任何架构项目之前，建立企业的架构能力（Architecture Capability），定义如何以及在哪里开展TOGAF的架构工作。</p>\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>TOGAF框架及其他架构框架参考资料</li>\n<li>董事会策略、商业原则、业务目标</li>\n<li>主要业务驱动因素</li>\n<li>治理和法律框架</li>\n<li>现有组织模型（Organization Model for Enterprise Architecture）</li>\n<li>现有架构框架（如果已有）</li>\n<li>现有IT策略、IT原则、业务原则</li>\n</ul>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>确定组织范围（Scope the Organization）</strong>：明确哪些组织单元将参与或受到架构影响</li>\n<li><strong>确认治理框架（Confirm Governance Framework）</strong>：识别现有治理框架，确认架构治理如何嵌入其中</li>\n<li><strong>定义并建立架构团队（Define and Establish Architecture Team）</strong>：确定架构团队的角色、职责和技能要求</li>\n<li><strong>确定架构原则（Identify Architecture Principles）</strong>：制定指导架构决策的核心原则</li>\n<li><strong>定制TOGAF（Tailor TOGAF）</strong>：根据企业需求裁剪ADM流程和制品</li>\n<li><strong>实施架构工具（Implement Architecture Tools）</strong>：选择并部署支持架构工作的工具和技术</li>\n<li><strong>建立Architecture Board（设立架构委员会）</strong>：明确其职权范围（Terms of Reference）和运作机制</li>\n<li><strong>定义Architecture Repository结构</strong>：建立存储架构制品的仓库结构</li>\n</ol>\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li>组织级企业架构能力（Organizational Model for Enterprise Architecture）</li>\n<li>定制化的架构框架（Tailored Architecture Framework），含定制的ADM流程</li>\n<li>架构原则（Architecture Principles），含应用指导</li>\n<li>Architecture Repository（初始结构）</li>\n<li>架构治理框架（Architecture Governance Framework）</li>\n<li>架构委员会章程（Architecture Board Charter）</li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Architecture Principles文档</strong>：记录原则名称、声明、理由和影响</li>\n<li><strong>Architecture Board Terms of Reference</strong>：定义委员会权力边界</li>\n<li><strong>Tailored ADM Process</strong>：记录裁剪决定及原因</li>\n</ul>\n<p><strong>Architecture Principles的四要素（Level 2高频考点）</strong>：</p>\n<div class=\"tbl\"><table>\n<tr><th>要素</th><th>说明</th><th>示例</th></tr>\n<tr><td>Name（名称）</td><td>简短、易记</td><td>&quot;数据即资产&quot;</td></tr>\n<tr><td>Statement（声明）</td><td>一句话说明原则内容</td><td>&quot;数据是企业战略资产，须妥善管理&quot;</td></tr>\n<tr><td>Rationale（理由）</td><td>为什么要有这个原则</td><td>&quot;确保数据一致性支撑决策&quot;</td></tr>\n<tr><td>Implications（影响）</td><td>遵循此原则意味着什么</td><td>&quot;需要统一数据治理策略&quot;</td></tr>\n</table></div>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>题型：给出一家公司的情况，问应该优先执行Preliminary Phase的哪个活动</li>\n<li>常考：Architecture Principles的四个组成部分；Architecture Board的职责边界（审批架构 vs. 执行架构）；裁剪TOGAF的合法场景</li>\n<li>陷阱：Preliminary Phase不是Phase A，不产生Architecture Vision；Architecture Board是审批机构，不是执行机构</li>\n</ul>\n<p><strong>华辉项目映射</strong>：</p>\n<p>华辉（华辉照明）当前处于SAP ECC 6.0架构，在启动S/4HANA升级咨询前，对应Preliminary Phase的工作包括：确定项目的架构治理机制（由集团CIO还是IT部门主导）、识别华辉集团的业务原则（如&quot;国际化扩张&quot;、&quot;制造效率优先&quot;）、明确哪些子公司或业务单元纳入本次升级范围，以及确定如何与现有SAP实施方法论（如SAP Activate）相融合。</p>\n<hr>"}, "L2_2": {"type": "reading", "title": "📖 Phase A — 架构愿景", "html": "<h2 id=\"Phase-A-架构愿景\">Phase A：架构愿景</h2>\n<p><strong>（Architecture Vision）</strong></p>\n<p><strong>核心目标</strong>：建立项目范围、约束和期望，获取架构工作授权，并创建高层次的架构愿景来响应业务需求。</p>\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>架构工作请求（Architecture Work Request / Request for Architecture Work）</li>\n<li>业务原则、目标和驱动因素</li>\n<li>组织模型（来自Preliminary Phase）</li>\n<li>定制化架构框架（来自Preliminary Phase）</li>\n<li>Architecture Repository中的现有架构内容</li>\n<li>架构原则</li>\n</ul>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>建立架构项目（Establish the Architecture Project）</strong>：确认项目范围、目标、约束</li>\n<li><strong>识别利益相关者（Identify Stakeholders）</strong>：建立Stakeholder Map，识别关键利益相关者及其关切</li>\n<li><strong>确认并细化业务目标和业务驱动因素（Confirm Business Goals）</strong></li>\n<li><strong>评估能力差距（Assess Capability）</strong>：与目标业务能力做初步对比</li>\n<li><strong>明确范围（Define Scope）</strong>：定义架构的广度（Breadth）、深度（Depth）、时间维度（Time Period）和架构域（Architecture Domains）</li>\n<li><strong>确认并优先排列架构原则</strong>：验证Preliminary Phase定义的原则是否适用</li>\n<li><strong>开发架构愿景（Develop Architecture Vision）</strong>：创建高层次的As-Is和To-Be概念图</li>\n<li><strong>定义约束（Define Constraints）</strong>：技术约束、时间约束、预算约束、政策约束</li>\n<li><strong>确定建立架构定义文档（Statement of Architecture Work）</strong>并获得授权</li>\n</ol>\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>Statement of Architecture Work（架构工作说明书）</strong>：最重要的输出，是架构工作的合同</li>\n<li><strong>架构愿景文档（Architecture Vision Document）</strong></li>\n<li><strong>精化后的业务原则、目标和驱动因素</strong></li>\n<li><strong>利益相关者图谱（Stakeholder Map）</strong> 及通信计划</li>\n<li><strong>初始架构定义文档（Architecture Definition Document）</strong> 的框架</li>\n<li><strong>初始架构需求规格（Architecture Requirements Specification）</strong> 的框架</li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Statement of Architecture Work</strong>：包括范围、方法、时间计划、资源需求、风险</li>\n<li><strong>Architecture Vision</strong>：通常是一页纸的高层次概念图，展示目标状态</li>\n<li><strong>Value Chain Diagram（价值链图）</strong>：展示业务高层结构</li>\n<li><strong>Solution Concept Diagram（解决方案概念图）</strong>：高层次技术愿景</li>\n</ul>\n<p><strong>RACI与Stakeholder分析（Level 2重点）</strong>：</p>\n<p>TOGAF使用<strong>RACI矩阵</strong>（Responsible, Accountable, Consulted, Informed）描述利益相关者角色。Phase A要识别：</p>\n<ul>\n<li>架构赞助人（Architecture Sponsor）：通常是CIO或CEO</li>\n<li>架构委员会成员（Architecture Board Members）</li>\n<li>受影响的业务单元负责人</li>\n</ul>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Statement of Architecture Work的作用：<strong>授权架构工作开始</strong>，相当于项目章程</li>\n<li>Architecture Vision ≠ Architecture Definition Document：前者是高层次愿景，后者是详细架构描述</li>\n<li>Scope定义的四个维度：广度（哪些组织）、深度（哪些细节层次）、时间跨度（多少年）、架构域（B/IS/T的哪些）</li>\n<li>常见陷阱：Phase A就要做详细的业务流程分析（错误！详细分析在Phase B）</li>\n</ul>\n<p><strong>华辉项目映射</strong>：</p>\n<p>对应华辉S/4HANA项目的项目启动（Kick-off）阶段。实际工作包括：与华辉集团管理层确认升级范围（仅财务+采购，还是全模块？是否包括海外子公司？）、识别关键利益相关者（CFO关注财务合规、IT总监关注技术稳定性、业务VP关注流程改变）、输出项目章程等价文件。Architecture Vision对应&quot;升级到S/4HANA后，华辉将获得实时财务分析、简化系统架构、支撑国际化运营&quot;的一页纸愿景。</p>\n<hr>"}, "L2_3": {"type": "reading", "title": "📖 Phase B — 业务架构", "html": "<h2 id=\"Phase-B-业务架构\">Phase B：业务架构</h2>\n<p><strong>（Business Architecture）</strong></p>\n<p><strong>核心目标</strong>：建立基线（As-Is）和目标（To-Be）业务架构，识别差距，支撑架构愿景中定义的业务战略目标。</p>\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>架构参考资料（来自Architecture Repository）</li>\n<li>Statement of Architecture Work（Phase A输出）</li>\n<li>架构原则、业务原则、目标和驱动因素</li>\n<li>Architecture Vision（Phase A输出）</li>\n<li>草稿版Architecture Definition Document</li>\n<li>草稿版Architecture Requirements Specification</li>\n<li>业务能力、组织结构、业务服务等现有文档</li>\n</ul>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>选择参考模型和视点（Select Reference Models and Viewpoints）</strong>：确定使用哪些业务架构框架（如价值链、业务能力模型）</li>\n<li><strong>开发基线业务架构（Develop Baseline Business Architecture）</strong>：描述当前As-Is业务状态</li>\n<li><strong>开发目标业务架构（Develop Target Business Architecture）</strong>：描述To-Be业务状态</li>\n<li><strong>执行差距分析（Perform Gap Analysis）</strong>：识别基线与目标之间的差异</li>\n<li><strong>定义候选路线图组件（Define Candidate Roadmap Components）</strong>：初步识别需要的变更</li>\n<li><strong>解决影响（Resolve Impacts）</strong>：评估变更对其他架构域的影响</li>\n<li><strong>正式审查（Conduct Formal Stakeholder Review）</strong>：获取利益相关者对业务架构的确认</li>\n<li><strong>完成业务架构（Finalize Business Architecture）</strong></li>\n<li><strong>更新Architecture Definition Document和Requirements Specification</strong></li>\n</ol>\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>业务架构组件（Business Architecture Components）</strong>，含入架构定义文档 - 基线业务架构（Baseline Business Architecture） - 目标业务架构（Target Business Architecture）</li>\n<li><strong>更新的差距分析结果（Gap Analysis Results）</strong></li>\n<li><strong>更新的业务需求（Updated Business Requirements）</strong></li>\n<li><strong>更新的架构路线图组件（Architecture Roadmap Components）</strong></li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Business Capability Map（业务能力图）</strong>：展示组织具备的能力，不涉及组织结构</li>\n<li><strong>Value Stream Map（价值流图）</strong>：端到端业务价值创造路径</li>\n<li><strong>Organization Map（组织图）</strong>：组织结构与角色</li>\n<li><strong>Business Process Diagrams（业务流程图）</strong>：使用BPMN或类似符号</li>\n<li><strong>Business Interaction Matrix（业务交互矩阵）</strong>：组织单元与业务功能的关系</li>\n</ul>\n<p><strong>As-Is vs To-Be对比分析（核心方法）</strong>：</p>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>As-Is（当前状态）</th><th>To-Be（目标状态）</th></tr>\n<tr><td>业务能力</td><td>现有能力清单</td><td>需要新增/增强的能力</td></tr>\n<tr><td>业务流程</td><td>当前流程文档</td><td>优化后的流程设计</td></tr>\n<tr><td>组织结构</td><td>现有组织架构</td><td>调整后的组织架构</td></tr>\n<tr><td>业务服务</td><td>当前提供的服务</td><td>目标服务组合</td></tr>\n</table></div>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase B的主要输出是<strong>业务架构部分的Architecture Definition Document</strong>，不是一份独立文档</li>\n<li>差距分析（Gap Analysis）在Phase B、C、D中每个都要做，不是只在某一个Phase做</li>\n<li>Business Capability ≠ Business Function ≠ Business Process： - Capability（能力）：组织能做什么，与组织结构无关 - Function（功能）：组织做什么，按功能分类 - Process（流程）：组织怎么做，是有序的活动序列</li>\n<li>考试常见陷阱：将组织结构图（Org Chart）当成Business Architecture的全部</li>\n</ul>\n<p><strong>华辉项目映射</strong>：</p>\n<p>对应华辉业务诊断阶段（Business Blueprint / Fit-Gap Analysis）。实际工作包括：梳理华辉当前ECC 6.0支撑的业务流程（财务记账、采购订单、生产工单），识别S/4HANA目标状态下的业务能力增强点（如Universal Journal实时财务、简化库存管理）。差距分析会揭示：华辉当前自定义开发（Z程序）哪些在S/4HANA中有标准替代，哪些需要重写。</p>\n<hr>"}, "L2_4": {"type": "reading", "title": "📖 Phase C — 信息系统架构", "html": "<h2 id=\"Phase-C-信息系统架构\">Phase C：信息系统架构</h2>\n<p><strong>（Information Systems Architecture）</strong></p>\n<p><strong>核心目标</strong>：建立目标信息系统架构，涵盖数据架构（Data Architecture）和应用架构（Application Architecture）两个子域，支撑目标业务架构。</p>\n<blockquote><p><strong>重要说明（Level 2高频考点）</strong>：Phase C包含两个子域，TOGAF标准建议先做<strong>Data Architecture</strong>，再做<strong>Application Architecture</strong>，因为数据是比应用更稳定的资产。但实际项目中可并行执行。</p></blockquote>\n<hr>\n<h3 id=\"Phase-C-1-Data-Architecture-数据架构-\">Phase C-1：Data Architecture（数据架构）</h3>\n<p><strong>核心目标</strong>：定义组织在目标状态下的数据结构、数据管理方式和数据资产，支撑业务架构目标。</p>\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>Phase B完成的业务架构</li>\n<li>Architecture Definition Document（业务架构部分已完成）</li>\n<li>数据原则（Data Principles）</li>\n<li>现有数据架构文档</li>\n<li>Architecture Repository中的数据参考模型</li>\n</ul>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li>选择数据架构的参考模型和视点</li>\n<li>开发基线数据架构（Baseline Data Architecture）</li>\n<li>开发目标数据架构（Target Data Architecture）</li>\n<li>执行数据架构差距分析</li>\n<li>定义候选路线图组件（数据相关）</li>\n<li>解决对其他架构域的影响</li>\n<li>获取利益相关者审查确认</li>\n</ol>\n<p><strong>输出（Data Architecture部分）</strong>：</p>\n<ul>\n<li>基线和目标数据架构描述</li>\n<li>数据实体/数据组件目录（Data Entity/Data Component Catalog）</li>\n<li>数据实体与业务功能矩阵（Data Entity/Business Function Matrix）</li>\n<li>概念数据模型（Conceptual Data Diagram）</li>\n<li>逻辑数据模型（Logical Data Diagram）</li>\n<li>数据差距分析</li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Data Entity Catalog</strong>：所有数据实体的清单</li>\n<li><strong>Data Component Catalog</strong>：物理数据存储的清单</li>\n<li><strong>Class Hierarchy Diagram</strong>：数据实体的继承关系</li>\n<li><strong>Data Migration Diagram</strong>：数据迁移路径图</li>\n</ul>\n<hr>\n<h3 id=\"Phase-C-2-Application-Architecture-应用架构-\">Phase C-2：Application Architecture（应用架构）</h3>\n<p><strong>核心目标</strong>：定义组织在目标状态下的应用系统组合，及其与业务流程和数据的关系。</p>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li>选择应用架构的参考模型和视点</li>\n<li>开发基线应用架构（Baseline Application Architecture）</li>\n<li>开发目标应用架构（Target Application Architecture）</li>\n<li>执行应用架构差距分析</li>\n<li>定义候选路线图组件（应用相关）</li>\n<li>解决对数据架构和技术架构的影响</li>\n<li>获取利益相关者审查确认</li>\n</ol>\n<p><strong>输出（Application Architecture部分）</strong>：</p>\n<ul>\n<li>基线和目标应用架构描述</li>\n<li>应用组合目录（Application Portfolio Catalog）</li>\n<li>接口目录（Interface Catalog）</li>\n<li>应用/功能矩阵（Application/Function Matrix）</li>\n<li>应用/组织矩阵（Application/Organization Matrix）</li>\n<li>应用交互图（Application Communication Diagram）</li>\n<li>应用迁移图（Application Migration Diagram）</li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Application Portfolio Catalog</strong>：所有应用系统清单，含业务价值评级</li>\n<li><strong>Interface Catalog</strong>：系统间接口的完整清单</li>\n<li><strong>Application Communication Diagram</strong>：展示应用间的数据流和依赖关系</li>\n</ul>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li><strong>先Data后Application的逻辑</strong>：数据架构回答&quot;企业有哪些数据资产&quot;，应用架构回答&quot;哪些系统管理这些数据&quot;，逻辑上数据先于应用</li>\n<li>Phase C的两个子域都要做Gap Analysis，Gap Analysis是贯穿B/C/D的核心方法</li>\n<li>应用架构关注<strong>逻辑应用组件（Logical Application Components）</strong>，技术实现留给Phase D</li>\n<li>考题常见：给出一个矩阵或图表，判断它属于Phase C的哪个子域</li>\n</ul>\n<p><strong>华辉项目映射</strong>：</p>\n<ul>\n<li><strong>数据架构</strong>：梳理华辉ECC 6.0中的主数据（物料主数据、供应商主数据、客户主数据）质量现状，定义迁移到S/4HANA后的数据标准和治理规范；评估财务数据从CO/FI分离结构迁移到Universal Journal的数据模型变化</li>\n<li><strong>应用架构</strong>：识别华辉当前应用组合（SAP ECC + 周边系统：MES、WMS、EDI接口），定义S/4HANA目标应用组合，规划SAP BTP上的集成层替代现有点对点接口</li>\n</ul>\n<hr>"}, "L2_5": {"type": "reading", "title": "📖 Phase D — 技术架构", "html": "<h2 id=\"Phase-D-技术架构\">Phase D：技术架构</h2>\n<p><strong>（Technology Architecture）</strong></p>\n<p><strong>核心目标</strong>：将逻辑应用组件和数据组件映射到技术组件，定义实现目标架构所需的技术基础设施。</p>\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>架构原则（含技术原则）</li>\n<li>Phase B和C完成的架构定义文档</li>\n<li>技术参考模型（Technology Reference Model, TRM）</li>\n<li>集成信息基础设施参考模型（III-RM）</li>\n<li>Architecture Repository中的现有技术架构</li>\n</ul>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>选择技术架构参考模型和视点</strong>：识别适用的技术标准和参考模型（TRM、III-RM）</li>\n<li><strong>开发基线技术架构（Develop Baseline Technology Architecture）</strong>：描述当前技术基础设施</li>\n<li><strong>开发目标技术架构（Develop Target Technology Architecture）</strong>：定义目标技术状态</li>\n<li><strong>执行差距分析（Perform Gap Analysis）</strong>：识别技术层面的差距</li>\n<li><strong>定义候选路线图组件（Define Candidate Roadmap Components）</strong></li>\n<li><strong>解决对信息系统架构的影响（Resolve Impacts）</strong></li>\n<li><strong>正式审查（Conduct Formal Stakeholder Review）</strong></li>\n<li><strong>完成技术架构并更新Architecture Definition Document</strong></li>\n</ol>\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li>技术架构部分的Architecture Definition Document - 基线技术架构（Baseline Technology Architecture） - 目标技术架构（Target Technology Architecture）</li>\n<li>技术差距分析结果</li>\n<li>更新的架构路线图组件</li>\n<li>技术标准目录（Technology Standards Catalog）</li>\n<li>技术组合目录（Technology Portfolio Catalog）</li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Technology Standards Catalog</strong>：企业批准使用的技术标准列表</li>\n<li><strong>Technology Portfolio Catalog</strong>：当前使用的技术产品清单</li>\n<li><strong>System/Technology Matrix</strong>：应用系统与技术组件的映射关系</li>\n<li><strong>Environments and Locations Diagram</strong>：物理部署拓扑图</li>\n<li><strong>Platform Decomposition Diagram</strong>：平台架构分解图</li>\n<li><strong>Network Computing/Hardware Diagram</strong>：网络和硬件架构图</li>\n</ul>\n<p><strong>TRM（Technology Reference Model）的应用</strong>：</p>\n<p>TOGAF TRM提供了通用的技术架构参考，分为两层：</p>\n<ul>\n<li><strong>Application Platform</strong>（应用平台层）：提供技术服务（如数据管理服务、安全服务、通信服务）</li>\n<li><strong>Communications Infrastructure</strong>（通信基础设施层）：网络和通信基础</li>\n</ul>\n<p>企业可以基于TRM定制自己的技术参考架构。</p>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase D是<strong>四个架构域</strong>（B、C-Data、C-App、D）中的最后一个，完成后Architecture Definition Document才完整</li>\n<li>TRM vs III-RM区别：TRM是通用技术参考；III-RM（Integrated Information Infrastructure Reference Model）专注于无缝信息流动，更关注中间件和集成</li>\n<li>常见陷阱：将具体产品选型（如选IBM还是Dell服务器）放在Phase D；实际上Phase D应在逻辑层面，不应绑定具体厂商</li>\n<li>Gap Analysis的输出要为Phase E的路线图规划提供输入</li>\n</ul>\n<p><strong>华辉项目映射</strong>：</p>\n<p>梳理华辉当前技术架构：ECC 6.0运行在本地数据中心（On-Premise），数据库为Oracle/DB2/SAP HANA。目标技术架构：S/4HANA on SAP HANA数据库，评估云部署（RISE with SAP）vs 本地部署的技术可行性；确定SAP BTP作为集成层的技术规格；评估现有网络基础设施对HANA内存数据库的支撑能力。</p>\n<hr>"}, "L2_q": {"type": "quiz", "title": "✏️ 随堂测验 — ADM阶段 15题", "questions": [{"num": "Q9", "star": true, "q": "TOGAF ADM 中，Preliminary Phase 的主要目的是什么？", "opts": {"A": "定义目标架构的愿景", "B": "建立架构能力（Architecture Capability），定制 ADM，制定架构原则", "C": "执行差距分析（Gap Analysis）", "D": "创建实施和迁移计划"}, "ans": "B", "exp": "Preliminary Phase 是在正式启动 ADM 之前的准备阶段。其核心工作是：建立架构团队和治理框架（Architecture Board）、定制 ADM 以适应组织、制定架构原则。Preliminary 不属于 A-H 任何一个字母阶段，它是所有 Phase 的\"地基\"。", "topic": "t2"}, {"num": "Q10", "star": true, "q": "在 ADM 的 Phase A（Architecture Vision）中，第一步通常是什么？", "opts": {"A": "开始开发目标架构", "B": "确认和扩充架构原则，建立架构项目", "C": "执行差距分析", "D": "制定迁移计划"}, "ans": "B", "exp": "Phase A 的第一步是\"确认架构项目的启动\"，包括：确认请求（Request for Architecture Work）的范围和约束、确认利益相关者、明确架构愿景的范围。差距分析在 Phase B/C/D 执行，迁移计划在 Phase F。", "topic": "t2"}, {"num": "Q11", "star": true, "q": "Architecture Vision（架构愿景文档）是哪个 Phase 的关键输出？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase F"}, "ans": "B", "exp": "Architecture Vision 是 Phase A 的核心交付物，包括：项目范围定义、利益相关者关切、高层架构描述、约束条件。它为后续所有 Phase 提供方向，是整个 ADM 循环的起点文件。", "topic": "t2"}, {"num": "Q12", "star": false, "q": "在 Phase B（Business Architecture）中，架构师需要开发什么？", "opts": {"A": "应用组合图", "B": "业务架构的当前状态（Baseline）和目标状态（Target）", "C": "技术组件清单", "D": "数据迁移方案"}, "ans": "B", "exp": "Phase B 关注业务架构，核心工作是：描述 Baseline Business Architecture（当前状态）和 Target Business Architecture（目标状态），并执行 Gap Analysis。业务架构包含：业务功能、业务流程、组织结构、业务角色和业务服务。", "topic": "t2"}, {"num": "Q13", "star": true, "q": "Phase C（信息系统架构）包含哪两个子域，且正确的开发顺序是什么？", "opts": {"A": "Application Architecture，然后 Data Architecture", "B": "Data Architecture，然后 Application Architecture", "C": "两个子域同时并行开发", "D": "Phase C 只包含 Application Architecture，Data Architecture 属于 Phase B"}, "ans": "B", "exp": "Phase C 包含 Data Architecture 和 Application Architecture 两个子域，TOGAF 推荐先开发 Data Architecture，再开发 Application Architecture。原因：应用程序是数据的载体和处理器，数据架构确定后才能明确应用需要处理什么数据，从而定义应用功能边界。这是 Level 1 高频陷阱题。", "topic": "t2"}, {"num": "Q14", "star": false, "q": "Phase D（Technology Architecture）的主要工作是什么？", "opts": {"A": "定义组织的业务流程", "B": "将逻辑应用组件映射到具体技术组件，定义技术标准", "C": "分析差距并制定过渡架构", "D": "管理架构变更请求"}, "ans": "B", "exp": "Phase D 是将前几个 Phase 定义的逻辑架构落地到技术层面的阶段。主要工作包括：识别技术平台候选方案、应用 TRM（技术参考模型）、定义技术标准和规范。Phase E 才是差距分析和过渡架构，Phase H 是变更管理。", "topic": "t2"}, {"num": "Q15", "star": true, "q": "Phase E（Opportunities and Solutions）的核心目标是什么？", "opts": {"A": "批准最终的目标架构", "B": "从目标架构推导出实施方案，定义工作包（Work Package）和过渡架构", "C": "完成技术架构的详细设计", "D": "监控已实施架构的合规性"}, "ans": "B", "exp": "Phase E 是从\"架构\"到\"实施\"的桥梁。在这里，架构师综合前面 Phase B/C/D 的差距分析结果，确定具体的工作包（Work Package）、定义过渡架构（Transition Architecture）、并评估初步的实施路径。", "topic": "t2"}, {"num": "Q16", "star": false, "q": "在 TOGAF ADM 中，Phase F（Migration Planning）主要关注什么？", "opts": {"A": "定义目标技术架构", "B": "制定详细的实施和迁移计划，对工作包进行优先级排序", "C": "建立架构治理委员会", "D": "识别新的业务机会"}, "ans": "B", "exp": "Phase F 将 Phase E 识别的工作包细化为具体的实施和迁移计划。关键工作：成本效益分析、风险评估、优先级排序、资源规划。Phase F 的产物是可执行的迁移计划。", "topic": "t2"}, {"num": "Q17", "star": true, "q": "Phase G（Implementation Governance）的主要职责是什么？", "opts": {"A": "开发应用架构", "B": "监督项目实施确保与架构规格一致，处理架构合规请求", "C": "制定架构路线图", "D": "执行差距分析"}, "ans": "B", "exp": "Phase G 是架构实施阶段的治理监督。架构团队在这个阶段：监督实施项目是否符合批准的架构、处理架构偏差（Architecture Dispensation）请求、进行架构合规评审（Architecture Compliance Review）。", "topic": "t2"}, {"num": "Q18", "star": false, "q": "下列哪项陈述最准确地描述了 Phase H（Architecture Change Management）的目的？", "opts": {"A": "创建新的目标架构", "B": "维护架构的生命力，管理对已批准架构的变更，确定何时需要启动新的 ADM 循环", "C": "开发迁移计划", "D": "执行技术架构审查"}, "ans": "B", "exp": "Phase H 是架构正式上线后的持续管理阶段。架构就像一个活的文档，需要响应外部环境变化（技术进步、业务战略调整、法规变化）。Phase H 负责评估这些变化、判断变更影响级别，并在必要时触发新一轮 ADM 循环。", "topic": "t2"}, {"num": "Q19", "star": true, "q": "关于\"需求管理\"（Requirements Management），下列哪项说法正确？", "opts": {"A": "需求管理是 ADM 中位于 Phase A 和 Phase B 之间的独立阶段", "B": "需求管理是一个持续进行的过程，贯穿所有 ADM Phase，不是独立的阶段", "C": "需求管理只在 Phase A 和 Phase F 中执行", "D": "需求管理由 Phase H 负责统一管理"}, "ans": "B", "exp": "这是 Level 1 高频陷阱！需求管理（Requirements Management）位于 ADM 图的中心圆圈，表示它持续贯穿所有 Phase，而不是一个独立的阶段（它没有字母编号）。它的职能是：存储需求、评估变更对当前 Phase 的影响、将需求传递给相关 Phase。", "topic": "t2"}, {"num": "Q20", "star": false, "q": "以下哪个是 Phase A 的关键输入？", "opts": {"A": "Baseline Business Architecture", "B": "Request for Architecture Work（架构工作请求）", "C": "Migration Plan", "D": "Technology Architecture"}, "ans": "B", "exp": "Request for Architecture Work 是触发整个 ADM 循环的关键文件，它由赞助组织（通常是管理层）发出，定义了架构项目的范围、约束和资源授权。它是 Phase A 的主要输入之一。Baseline Business Architecture 是 Phase B 的输入，Migration Plan 是 Phase F 的输出。", "topic": "t2"}, {"num": "Q21", "star": false, "q": "在 Phase B 中，\"业务架构\"的主要描述对象是什么？", "opts": {"A": "应用程序和数据库", "B": "服务器和网络设备", "C": "业务功能、业务流程、组织结构、业务角色", "D": "数据迁移方案"}, "ans": "C", "exp": "业务架构（Business Architecture）描述的是业务层面的能力和结构，包括：业务功能（Business Function）、业务流程（Business Process）、组织结构（Organization）、业务角色（Business Role）、业务服务（Business Service）。这与应用、数据、技术架构明确区分。", "topic": "t2"}, {"num": "Q22", "star": true, "q": "Statement of Architecture Work（架构工作说明书）是哪个阶段的关键交付物？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase G"}, "ans": "B", "exp": "Statement of Architecture Work 是 Phase A 的核心输出，它是正式的项目授权文件，定义了本次架构项目的范围、方法、资源、时间表，相当于架构团队的工作授权书。不要与 Architecture Vision 文档混淆：Architecture Vision 描述目标方向，Statement of Architecture Work 是工作授权。", "topic": "t2"}, {"num": "Q23", "star": false, "q": "在 Phase E 中，Work Package（工作包）包含哪些核心要素？", "opts": {"A": "只包含时间和成本", "B": "项目名称、项目描述、所包含的变更、所影响的 Building Block、依赖关系", "C": "只包含技术实施细节", "D": "业务需求文档"}, "ans": "B", "exp": "Work Package 是 Phase E 定义的可实施单元，包含：工作包名称和描述、所实现的目标架构要素、涉及的 Building Blocks、与其他工作包的依赖关系、优先级。多个工作包按依赖排序后形成 Architecture Roadmap。", "topic": "t2"}]}, "L3_1": {"type": "reading", "title": "📖 Phase E — 机会与解决方案", "html": "<h2 id=\"Phase-E-机会与解决方案\">Phase E：机会与解决方案</h2>\n<p><strong>（Opportunities and Solutions）</strong></p>\n<p><strong>核心目标</strong>：在已完成的目标架构基础上，识别实施的主要工作包（Work Packages），定义过渡架构（Transition Architecture），形成初步实施和迁移策略。</p>\n<blockquote><p>Phase E是架构定义（A-D）向实施规划（F-G）的关键桥梁。</p></blockquote>\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>已完成的四域Architecture Definition Document（来自Phase B/C/D）</li>\n<li>所有差距分析结果（来自Phase B/C/D）</li>\n<li>架构路线图草案</li>\n<li>已批准的Statement of Architecture Work</li>\n<li>Architecture Principles</li>\n<li>重用评估结果（Reuse Assessment）</li>\n</ul>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>确定关键业务变革（Determine Key Business Change Attributes）</strong>：识别哪些变革对业务影响最大</li>\n<li><strong>确定业务约束（Determine Business Constraints）</strong>：包括预算、时间、组织变革能力</li>\n<li><strong>审查并合并差距分析（Review and Consolidate Gap Analysis）</strong>：整合B/C/D三域的差距</li>\n<li><strong>审查现有能力（Review Consolidated Requirements）</strong>：识别可重用的现有系统和能力</li>\n<li><strong>开发高层次路线图（Develop High-Level Roadmap）</strong>：初步排序变革活动</li>\n<li><strong>识别过渡架构（Identify Transition Architectures）</strong>：确定需要几个过渡阶段</li>\n<li><strong>定义工作包（Define Work Packages）</strong>：将架构变更分解为可执行的工作包</li>\n<li><strong>确认实施路径（Confirm Architecture Roadmap）</strong>：获取利益相关者认可</li>\n</ol>\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>Architecture Roadmap（架构路线图）</strong>：高层次版本</li>\n<li><strong>过渡架构（Transition Architecture）</strong>：每个过渡阶段的架构快照</li>\n<li><strong>工作包（Work Packages）</strong>：具体实施任务分组</li>\n<li><strong>实施因素评估矩阵（Implementation Factor Assessment and Deduction Matrix）</strong></li>\n<li><strong>合并差距/解决方案矩阵（Consolidated Gaps, Solutions, and Dependencies Matrix）</strong></li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Project Context Diagram</strong>：展示项目间依赖关系</li>\n<li><strong>Benefits Diagram（收益图）</strong>：量化架构变更的业务价值</li>\n<li><strong>Transition Architecture State Evolution Diagram</strong>：过渡架构演进图</li>\n</ul>\n<p><strong>工作包（Work Package）的定义要素</strong>：</p>\n<p>每个Work Package需包含：</p>\n<ul>\n<li>工作包名称和描述</li>\n<li>架构相关性（与哪些架构变更相关）</li>\n<li>依赖关系（前置条件和后置影响）</li>\n<li>资源需求（人力、资金、技术）</li>\n<li>业务价值评估</li>\n<li>优先级排序建议</li>\n</ul>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase E是<strong>第一个产生Architecture Roadmap</strong>的阶段（之前的B/C/D只产生路线图组件）</li>\n<li>过渡架构（Transition Architecture）的数量没有固定限制，由业务需求和变革能力决定</li>\n<li>Work Package ≠ Project：一个Work Package可以跨越多个项目，也可以是一个项目的一部分</li>\n<li>关键输入：来自B/C/D的<strong>Gap Analysis Results</strong>；关键输出：<strong>Architecture Roadmap + Transition Architectures</strong></li>\n</ul>\n<p><strong>华辉项目映射</strong>：</p>\n<p>整合Phase B/C/D的分析结果，输出华辉S/4HANA升级的路线图。可能的过渡架构：</p>\n<ul>\n<li>过渡架构1：ECC + SAP BTP集成层（短期，12个月内）</li>\n<li>过渡架构2：S/4HANA 核心财务上线 + ECC并行运行（18个月）</li>\n<li>目标架构：全面S/4HANA + 云集成（36个月）</li>\n</ul>\n<p>工作包示例：主数据清洗工作包、ABAP自定义代码评估工作包、用户培训工作包等。</p>\n<hr>"}, "L3_2": {"type": "reading", "title": "📖 Phase F — 迁移规划", "html": "<h2 id=\"Phase-F-迁移规划\">Phase F：迁移规划</h2>\n<p><strong>（Migration Planning）</strong></p>\n<p><strong>核心目标</strong>：将高层次的过渡架构和工作包转化为详细的、可执行的实施与迁移计划，包括优先级排序、成本效益分析和资源规划。</p>\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>Phase E产生的Architecture Roadmap</li>\n<li>过渡架构（Transition Architectures）</li>\n<li>工作包（Work Packages）</li>\n<li>能力评估（Capability Assessments）</li>\n<li>已批准的业务战略和计划</li>\n<li>现有项目组合信息（Project Portfolio）</li>\n</ul>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>确认管理框架与实施（Confirm Management Framework Interactions）</strong>：与项目组合管理、项目管理办公室对齐</li>\n<li><strong>为每个工作包分配业务价值（Assign Business Value to Work Packages）</strong>：使用定量或定性方法评估价值</li>\n<li><strong>评估依赖关系、成本和风险（Estimate Resource Requirements）</strong>：识别工作包之间的技术依赖和组织依赖</li>\n<li><strong>优先级排序（Prioritize Migration Projects）</strong>：基于价值、风险、依赖和资源进行排序</li>\n<li><strong>确认架构路线图与过渡架构（Confirm Architecture Roadmap）</strong>：精化并最终确认</li>\n<li><strong>完成实施与迁移计划（Complete the Implementation and Migration Plan）</strong></li>\n<li><strong>审查并签署（Review and Sign-off）</strong>：获取治理层批准</li>\n</ol>\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>实施与迁移计划（Implementation and Migration Plan）</strong>：详细的项目计划</li>\n<li><strong>精化后的Architecture Roadmap（Refined Architecture Roadmap）</strong></li>\n<li><strong>过渡架构的架构定义（Transition Architecture Architecture Definition）</strong></li>\n<li><strong>重新使用评估（Reuse Assessment）</strong>：识别现有资产的重用机会</li>\n<li><strong>更新后的Architecture Requirements Specification</strong></li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Implementation and Migration Plan</strong>：里程碑、资源、预算、风险登记册</li>\n<li><strong>Project Portfolio（项目组合）</strong>：所有实施项目的完整清单</li>\n<li><strong>Capability Assessment Matrix</strong>：能力就绪度评估矩阵</li>\n</ul>\n<p><strong>优先级排序方法（Level 2重点）</strong>：</p>\n<p>Phase F使用多维度优先级矩阵，典型评估维度包括：</p>\n<ul>\n<li><strong>Business Value（业务价值）</strong>：对战略目标的贡献程度</li>\n<li><strong>Technical Risk（技术风险）</strong>：实施复杂度和技术成熟度</li>\n<li><strong>Financial Cost（财务成本）</strong>：实施所需投资</li>\n<li><strong>Dependencies（依赖关系）</strong>：是否是其他工作包的先决条件</li>\n<li><strong>Quick Win Potential（快速见效潜力）</strong>：能否在短期内产生可见效果</li>\n</ul>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase F与Phase E的区别：Phase E是<strong>高层次</strong>路线图和工作包定义；Phase F是<strong>详细的</strong>实施计划和优先级排序</li>\n<li>Phase F要<strong>正式纳入企业项目组合管理体系</strong>，架构项目不能孤立于项目管理体系之外</li>\n<li>成本效益分析（Cost-Benefit Analysis）在Phase F进行，不在Phase E</li>\n<li>常见考题：某工作包完成后才能开始另一个工作包，这是Phase F处理的<strong>依赖关系管理</strong>问题</li>\n</ul>\n<p><strong>华辉项目映射</strong>：</p>\n<p>输出华辉S/4HANA升级的详细实施计划。包括：各工作包的人力估算（SAP顾问工时+内部IT工时）；关键里程碑（主数据清洗完成节点、UAT节点、Go-Live节点）；风险登记册（如ABAP代码量大导致的测试风险）；以及与华辉年度IT预算的对齐（确保实施成本在批准预算范围内）。</p>\n<hr>"}, "L3_3": {"type": "reading", "title": "📖 Phase G — 实施治理", "html": "<h2 id=\"Phase-G-实施治理\">Phase G：实施治理</h2>\n<p><strong>（Implementation Governance）</strong></p>\n<p><strong>核心目标</strong>：确保实施项目符合已批准的架构，通过架构合规审查（Architecture Compliance Review）保证目标架构的完整性。</p>\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>实施与迁移计划（Phase F）</li>\n<li>架构定义文档（Architecture Definition Document）</li>\n<li>架构合规要求（Architecture Compliance Requirements）</li>\n<li>架构合同（Architecture Contract）</li>\n<li>架构框架和架构原则</li>\n<li>实施过程中的变更请求（Change Requests）</li>\n</ul>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>确认与架构的范围和优先级（Confirm Scope and Priorities）</strong>：与实施团队对齐</li>\n<li><strong>识别部署资源和技能（Identify Deployment Resources）</strong>：确认实施团队能力</li>\n<li><strong>指导技术开发（Guide Development of Solutions Deployment）</strong>：架构师深度参与实施</li>\n<li><strong>执行企业架构合规审查（Perform Enterprise Architecture Compliance Reviews）</strong>：正式审查实施符合度</li>\n<li><strong>实施业务和IT运营（Implement Business and IT Operations）</strong>：监控实施进展</li>\n<li><strong>执行架构合规（Perform Post-Implementation Review）</strong>：实施完成后的合规验证</li>\n</ol>\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>架构合规报告（Architecture Compliance Assessment）</strong></li>\n<li><strong>架构合同（Architecture Contract）</strong>：架构师与实施团队之间的约定</li>\n<li><strong>已实施、经测试和部署的解决方案</strong></li>\n<li><strong>变更请求处理记录</strong></li>\n<li><strong>Architecture Compliance Exceptions（架构合规例外记录）</strong></li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Architecture Contract</strong>：正式记录架构师与开发团队之间对目标架构的承诺</li>\n<li><strong>Compliance Assessment Report</strong>：架构合规审查的正式报告</li>\n<li><strong>Architecture Compliance Exception</strong>：当实施偏离目标架构时的正式记录和处置</li>\n</ul>\n<p><strong>架构合规等级（Level 2考点）</strong>：</p>\n<p>TOGAF定义了合规性的四个等级：</p>\n<div class=\"tbl\"><table>\n<tr><th>等级</th><th>说明</th></tr>\n<tr><td><strong>Conformant（符合）</strong></td><td>所有规定要求都得到满足</td></tr>\n<tr><td><strong>Compliant（合规）</strong></td><td>满足所有必须要求，可能有推荐项未满足</td></tr>\n<tr><td><strong>Non-Conformant（不符合）</strong></td><td>关键要求未满足，需要变更请求</td></tr>\n<tr><td><strong>Irrelevant（不相关）</strong></td><td>该标准对此实施项目不适用</td></tr>\n</table></div>\n<p><strong>Architecture Contract的作用</strong>：</p>\n<p>Architecture Contract是Phase G最重要的制品，它：</p>\n<ul>\n<li>定义项目交付成果对架构的承诺</li>\n<li>规定架构原则的遵循要求</li>\n<li>建立架构师的监督权利</li>\n<li>为架构合规审查提供基准</li>\n</ul>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase G中架构师的角色是<strong>监督者（Overseer）</strong>，不是项目经理</li>\n<li>Architecture Contract是<strong>双向约定</strong>：架构师承诺提供支持，实施团队承诺遵循架构</li>\n<li>合规审查（Compliance Review）不同于项目进度审查，专注于架构一致性</li>\n<li>变更请求（Change Request）在Phase G提出，在Phase H处理（影响大的）或在Phase G内部处理（影响小的）</li>\n</ul>\n<p><strong>华辉项目映射</strong>：</p>\n<p>S/4HANA实施阶段（Realize阶段），SAP Solution Architect参与华辉项目的蓝图审查（Blueprint Review）和解决方案架构评审，确保ABAP自定义开发不违反S/4HANA架构原则（如禁止直接操作ACDOCA表），以及接口设计遵循SAP BTP集成最佳实践。</p>\n<hr>"}, "L3_4": {"type": "reading", "title": "📖 Phase H — 架构变更管理", "html": "<h2 id=\"Phase-H-架构变更管理\">Phase H：架构变更管理</h2>\n<p><strong>（Architecture Change Management）</strong></p>\n<p><strong>核心目标</strong>：建立架构变更管理流程，监控架构相关技术和业务变化，管理架构的生命周期，决定何时触发新的ADM循环。</p>\n<p><strong>输入（Inputs）</strong>：</p>\n<ul>\n<li>架构基线（来自Architecture Repository）</li>\n<li>架构合规报告</li>\n<li>变更请求（Change Requests）</li>\n<li>新的技术或业务发展信息</li>\n<li>性能测量报告</li>\n<li>已实施解决方案的反馈</li>\n</ul>\n<p><strong>步骤（Steps）</strong>：</p>\n<ol>\n<li><strong>建立变更管理流程（Establish Value Realization Process）</strong>：确认架构价值实现情况</li>\n<li><strong>部署监控工具（Deploy Monitoring Tools）</strong>：建立持续监控机制</li>\n<li><strong>管理风险（Manage Risks）</strong>：持续评估架构相关风险</li>\n<li><strong>提供分析以支持治理框架（Provide Analysis for Governance Framework）</strong></li>\n<li><strong>开发变更需求以满足性能目标（Develop Change Requirements）</strong></li>\n<li><strong>管理治理流程（Manage Governance Process）</strong>：确保变更经过适当审批</li>\n<li><strong>活化新ADM循环（Activate the Process to Implement Change）</strong>：决定触发新循环的时机</li>\n</ol>\n<p><strong>输出/交付物（Outputs）</strong>：</p>\n<ul>\n<li><strong>架构更新（Architecture Updates）</strong>：对现有架构的修订</li>\n<li><strong>变更请求（Change Requests for Architecture）</strong></li>\n<li><strong>更新的Architecture Roadmap</strong></li>\n<li><strong>更新的Architecture Definition Document</strong></li>\n<li><strong>新的Statement of Architecture Work（触发新ADM循环时）</strong></li>\n</ul>\n<p><strong>关键制品（Key Artifacts）</strong>：</p>\n<ul>\n<li><strong>Architecture Change Request</strong>：正式的架构变更申请</li>\n<li><strong>Architecture Compliance Report（Updated）</strong>：更新后的合规报告</li>\n<li><strong>Capability Assessment（Updated）</strong></li>\n</ul>\n<p><strong>变更驱动因素分类（Level 2核心考点）</strong>：</p>\n<p>TOGAF将架构变更需求分为三类：</p>\n<div class=\"tbl\"><table>\n<tr><th>类型</th><th>触发来源</th><th>驱动因素示例</th><th>典型响应</th></tr>\n<tr><td><strong>类型1 - 简单变更（Simplification Change）</strong></td><td>技术变化</td><td>技术升级、版本更新</td><td>在H阶段内处理，无需新ADM循环</td></tr>\n<tr><td><strong>类型2 - 增量变更（Incremental Change）</strong></td><td>业务变化</td><td>业务流程优化、组织重组</td><td>可能触发新ADM循环，从Phase A开始</td></tr>\n<tr><td><strong>类型3 - 重大变更（Major Change）</strong></td><td>战略变化</td><td>并购重组、颠覆性技术</td><td>必须触发新完整ADM循环</td></tr>\n</table></div>\n<blockquote><p>注：不同版本TOGAF对变更类型的叫法略有差异，Level 2考试关注的是<strong>触发新ADM循环的判断标准</strong>。</p></blockquote>\n<p><strong>触发新ADM循环的判断标准</strong>：</p>\n<ul>\n<li>变更影响到架构愿景（Architecture Vision）层面</li>\n<li>变更超出当前架构的范围</li>\n<li>利益相关者发生重大变化</li>\n<li>业务战略方向发生根本性改变</li>\n<li>技术平台需要颠覆性替换</li>\n</ul>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Phase H ≠ 变更控制委员会（CCB）：H是架构层面的变更管理，不是项目层面的配置管理</li>\n<li>小的技术更新（如安全补丁）不需要触发新ADM循环</li>\n<li>Phase H要决定的核心问题：<strong>这个变更是否需要新的ADM循环？从哪个Phase开始？</strong></li>\n<li>Architecture Repository在Phase H持续更新，保持架构资产的时效性</li>\n</ul>\n<p><strong>华辉项目映射</strong>：</p>\n<p>华辉S/4HANA上线后进入运维阶段，Phase H对应的工作包括：监控S/4HANA系统性能与架构目标的偏差；管理SAP年度升级（Enhancement Package）的架构影响评估；当华辉提出新的业务需求（如新增越南工厂）时，评估是否需要启动新的ADM循环还是在现有架构框架内处理。</p>\n<hr>"}, "L3_5": {"type": "reading", "title": "📖 需求管理 & ADM 迭代模式", "html": "<h2 id=\"Requirements-Management-需求管理\">Requirements Management：需求管理</h2>\n<p><strong>核心目标</strong>：在整个ADM过程中持续管理架构需求，确保所有需求被识别、记录、维护，并确保其变更对架构的影响得到评估和处理。</p>\n<blockquote><p>Requirements Management是ADM的<strong>中心环节</strong>，不是一个有先后顺序的Phase，而是<strong>贯穿所有Phase</strong>的持续活动。</p></blockquote>\n<p><strong>需求管理与各Phase的交互方式</strong>：</p>\n<div class=\"tbl\"><table>\n<tr><th>Phase</th><th>需求管理交互</th></tr>\n<tr><td>Preliminary</td><td>识别架构工作的初始需求集合</td></tr>\n<tr><td>Phase A</td><td>验证利益相关者需求，建立需求基线</td></tr>\n<tr><td>Phase B</td><td>精化业务需求，识别业务驱动的架构需求</td></tr>\n<tr><td>Phase C</td><td>将业务需求转化为数据和应用需求</td></tr>\n<tr><td>Phase D</td><td>将信息系统需求转化为技术需求</td></tr>\n<tr><td>Phase E</td><td>验证所有需求在路线图中得到响应</td></tr>\n<tr><td>Phase F</td><td>确认需求在实施计划中有对应工作包</td></tr>\n<tr><td>Phase G</td><td>验证实施结果满足架构需求</td></tr>\n<tr><td>Phase H</td><td>管理新需求，评估对现有架构的影响</td></tr>\n</table></div>\n<p><strong>需求变更影响评估流程</strong>：</p>\n<ol>\n<li><strong>识别变更（Identify Change）</strong>：新需求出现或现有需求发生变化</li>\n<li><strong>评估影响（Assess Impact）</strong>：确定变更影响哪些架构域和哪些Phase</li>\n<li><strong>记录变更（Record Change）</strong>：更新Architecture Requirements Specification</li>\n<li><strong>通知相关Phase（Notify Relevant Phases）</strong>：将影响传递到相关Phase</li>\n<li><strong>更新架构（Update Architecture）</strong>：相关Phase根据需求变更更新架构制品</li>\n<li><strong>获取批准（Seek Approval）</strong>：重大需求变更需要Architecture Board批准</li>\n</ol>\n<p><strong>需求管理的关键制品</strong>：</p>\n<ul>\n<li><strong>Architecture Requirements Specification（架构需求规格）</strong>：所有架构需求的正式记录</li>\n<li><strong>Requirements Impact Assessment（需求影响评估）</strong>：变更影响分析报告</li>\n</ul>\n<p><strong>Level 2考点</strong>：</p>\n<ul>\n<li>Requirements Management<strong>不是Phase A的一部分</strong>，也不是单独一个Phase，是独立的中心机制</li>\n<li>需求变更可能导致任何Phase的<strong>回溯（Iteration back）</strong></li>\n<li>Architecture Requirements Specification ≠ Business Requirements Document：前者聚焦架构相关需求，包含业务、数据、应用、技术各域的需求</li>\n<li>常见陷阱：认为需求只在Phase A收集；实际上需求在所有Phase都可能被发现和变更</li>\n</ul>\n<hr>"}, "L3_6": {"type": "reading", "title": "📖 Gap Analysis & 架构路线图", "html": "<h2 id=\"Gap-Analysis方法\">Gap Analysis方法</h2>\n<p>Gap Analysis（差距分析）是TOGAF ADM中最重要的分析技术之一，在Phase B、C（数据和应用）、D中都需要执行。</p>\n<h3 id=\"Gap-Analysis的基本定义\">Gap Analysis的基本定义</h3>\n<p>Gap Analysis = 对比<strong>基线架构（Baseline Architecture / As-Is）</strong> 与<strong>目标架构（Target Architecture / To-Be）</strong>，识别其中的差距（Gaps）。</p>\n<h3 id=\"四象限分析法\">四象限分析法</h3>\n<p>TOGAF Gap Analysis使用一个矩阵来系统化地识别变更需求：</p>\n<pre><code>┌─────────────────┬──────────────────┬────────────────────┐\n│                 │  目标架构中存在   │  目标架构中不存在   │\n├─────────────────┼──────────────────┼────────────────────┤\n│ 基线架构中存在  │   保留（Retain） │   退役（Retire）   │\n├─────────────────┼──────────────────┼────────────────────┤\n│ 基线架构中不存在│   新增（Add）    │   无需关注          │\n└─────────────────┴──────────────────┴────────────────────┘</code></pre>\n<p>四个象限的含义：</p>\n<div class=\"tbl\"><table>\n<tr><th>象限</th><th>含义</th><th>行动</th><th>示例</th></tr>\n<tr><td><strong>保留（Retain/Carry Forward）</strong></td><td>基线有、目标也要有</td><td>评估是否需要升级或优化</td><td>现有ERP核心功能继续使用</td></tr>\n<tr><td><strong>退役（Retire）</strong></td><td>基线有、目标不要</td><td>制定退役计划，管理数据迁移</td><td>废弃的遗留系统</td></tr>\n<tr><td><strong>新增（Add/Create）</strong></td><td>基线没有、目标要有</td><td>规划开发或采购</td><td>新增数据分析平台</td></tr>\n<tr><td><strong>迁移（Replace/Consolidate）</strong></td><td>扩展形式，有些文献将基线有但目标换新归入此类</td><td>新旧系统并行运行后切换</td><td>从ECC迁移到S/4HANA</td></tr>\n</table></div>\n<h3 id=\"Gap-Analysis的执行步骤\">Gap Analysis的执行步骤</h3>\n<ol>\n<li><strong>建立分析矩阵</strong>：横轴为目标架构能力/功能，纵轴为基线架构能力/功能</li>\n<li><strong>填充现状</strong>：标记每个基线元素在目标架构中的状态</li>\n<li><strong>识别Gaps</strong>：标出目标架构中需要但基线中缺失的能力</li>\n<li><strong>评估Gaps</strong>：评估每个Gap的业务影响、实施难度和成本</li>\n<li><strong>形成建议</strong>：为每个Gap提出解决方案（新建、购买、迁移、退役）</li>\n<li><strong>输入路线图</strong>：将Gap及其解决方案作为输入传递给Phase E</li>\n</ol>\n<h3 id=\"跨域Gap的处理\">跨域Gap的处理</h3>\n<p>当某个Gap跨越多个架构域时（如一个业务能力的缺失同时影响应用架构和技术架构），需要在各相关Phase中都标注并追踪。Phase E的<strong>合并差距矩阵（Consolidated Gaps Matrix）</strong> 是处理跨域Gap的核心工具。</p>\n<h3 id=\"Level-2考点\">Level 2考点</h3>\n<ul>\n<li>Gap Analysis在Phase B/C/D<strong>每个</strong>都要独立执行</li>\n<li>&quot;迁移（Migrate）&quot;有时被视为第五个选项，与&quot;新增&quot;和&quot;保留&quot;并列</li>\n<li>Gap Analysis的输出直接驱动Phase E的工作包定义</li>\n<li>考题常见：给出一个Gap Analysis矩阵，判断每个元素属于哪个象限，以及对应的处理方式</li>\n</ul>\n<hr>"}, "L3_q": {"type": "quiz", "title": "✏️ 随堂测验 — ADM阶段 10题", "questions": [{"num": "Q24", "star": false, "q": "Phase G 中，\"Architecture Dispensation\"（架构特许/豁免）是指什么？", "opts": {"A": "完全批准的架构变更", "B": "对特定项目或情况，暂时允许偏离已批准架构的正式授权", "C": "取消整个架构项目", "D": "新增架构原则"}, "ans": "B", "exp": "在实施过程中，有时项目因为现实约束（时间/成本/技术）无法完全符合批准的架构。Architecture Dispensation 是 Architecture Board 给予的正式豁免，允许特定范围内的偏差，但需要记录理由并设定恢复期限。", "topic": "t2"}, {"num": "Q25", "star": true, "q": "Phase H 中，变更的\"类型\"分类主要目的是什么？", "opts": {"A": "确定谁负责实施变更", "B": "判断变更的影响级别，以确定是否需要启动新的完整 ADM 循环", "C": "计算变更的成本", "D": "为变更撰写技术文档"}, "ans": "B", "exp": "TOGAF 将架构变更分为三类：类型1（简化/精化，不影响架构方向）→ 直接更新架构文档；类型2（增量/演进）→ 触发新的 ADM 循环（简化版）；类型3（重新定义/颠覆性变化）→ 触发全面的新 ADM 循环。判断变更类型是 Phase H 的核心工作。", "topic": "t2"}, {"num": "Q26", "star": false, "q": "下列哪项不是 Preliminary Phase 的典型输出？", "opts": {"A": "定制后的 ADM（Tailored ADM）", "B": "架构原则（Architecture Principles）", "C": "目标业务架构（Target Business Architecture）", "D": "架构治理框架（Architecture Governance Framework）"}, "ans": "C", "exp": "目标业务架构是 Phase B 的输出，不是 Preliminary Phase 的产物。Preliminary Phase 的输出包括：定制 ADM、架构原则、架构治理框架、架构工具设置、Architecture Repository 初始化。", "topic": "t2"}, {"num": "Q27", "star": false, "q": "在 ADM 循环中，哪个 Phase 最终产生\"架构定义文档\"（Architecture Definition Document）？", "opts": {"A": "Phase A", "B": "Preliminary Phase", "C": "Phase B/C/D 综合产生", "D": "Phase G"}, "ans": "C", "exp": "Architecture Definition Document（架构定义文档）是 Phase B、C、D 的综合交付物，包含业务架构、信息系统架构（数据+应用）、技术架构的当前状态和目标状态描述，以及差距分析结果。这个文档在 Phase E 作为关键输入使用。", "topic": "t2"}, {"num": "Q28", "star": false, "q": "Phase F 中，确定工作包优先级时应考虑哪些因素？", "opts": {"A": "只考虑成本高低", "B": "依赖关系、业务价值、风险、资源可用性、战略合规性等多维度因素", "C": "只考虑技术难度", "D": "只考虑领导层偏好"}, "ans": "B", "exp": "Phase F 的优先级排序是多维度的，TOGAF 建议考虑：工作包之间的依赖关系（先决条件）、对业务价值的贡献度、实施风险、资源可用性、与战略目标的对齐度。单一维度排序会导致高价值项目被低价值但低成本项目推后。", "topic": "t2"}, {"num": "Q29", "star": false, "q": "Architecture Roadmap（架构路线图）和 Migration Plan（迁移计划）有什么核心区别？", "opts": {"A": "两者完全相同，只是不同 Phase 的叫法", "B": "Architecture Roadmap 是高层次的时间线（展示从当前到目标的演进路径），Migration Plan 是可执行的详细实施计划", "C": "Migration Plan 是架构层级的，Architecture Roadmap 是项目层级的", "D": "Architecture Roadmap 只用于技术架构"}, "ans": "B", "exp": "Architecture Roadmap 在 Phase E 形成，展示工作包的高层次时间线，是战略性的；Migration Plan 在 Phase F 形成，包含详细的实施步骤、资源分配、时间节点，是可执行的。Roadmap 是蓝图，Migration Plan 是施工图。", "topic": "t2"}, {"num": "Q30", "star": false, "q": "完整的 ADM 循环包括多少个带字母编号的 Phase（不含 Preliminary 和需求管理）？", "opts": {"A": "6个", "B": "7个", "C": "8个", "D": "9个"}, "ans": "C", "exp": "ADM 有 8 个字母 Phase：A（Architecture Vision）、B（Business Architecture）、C（Information Systems Architecture）、D（Technology Architecture）、E（Opportunities & Solutions）、F（Migration Planning）、G（Implementation Governance）、H（Architecture Change Management）。加上 Preliminary Phase 和持续的 Requirements Management，共 10 个组成部分。", "topic": "t2"}, {"num": "Q31", "star": false, "q": "在 Phase A 中，完成利益相关者分析的主要目的是什么？", "opts": {"A": "确定项目预算", "B": "识别各方关切（Concern），确保目标架构能够回应所有关键利益相关者的关切", "C": "分配项目团队成员", "D": "确定技术平台选型"}, "ans": "B", "exp": "利益相关者分析是 Phase A 的关键活动，目的是：识别谁受到架构影响（利益相关者）、他们各自的关切（Concern）是什么、如何用架构视图（View）回应这些关切。这是构建 Architecture Vision 文档的基础。", "topic": "t2"}, {"num": "Q32", "star": false, "q": "关于 Phase C 中数据架构和应用架构的关系，以下哪个说法正确？", "opts": {"A": "两者完全独立，可以并行开发", "B": "数据架构的逻辑数据组件映射到应用架构的逻辑应用组件", "C": "应用架构决定数据架构", "D": "两者都由技术架构（Phase D）决定"}, "ans": "B", "exp": "在 Phase C 中，数据架构定义了需要管理的数据实体和关系（逻辑数据模型），这些数据组件随后在应用架构中被映射到负责处理/管理它们的应用组件上。应用程序\"服务于\"数据，而不是反过来，这就是为什么数据架构先于应用架构。", "topic": "t2"}, {"num": "Q33", "star": false, "q": "以下哪个活动属于 Phase B 但不属于 Phase D？", "opts": {"A": "差距分析（Gap Analysis）", "B": "利益相关者视图开发", "C": "业务流程建模", "D": "目标架构定义"}, "ans": "C", "exp": "业务流程建模（Business Process Modeling）是业务架构（Phase B）特有的活动，关注人、组织、流程的协作方式。Phase D（技术架构）关注的是技术平台和技术服务，不涉及业务流程。差距分析和目标架构定义在所有 Phase 中都有。", "topic": "t2"}]}, "L4_1": {"type": "reading", "title": "📖 架构内容框架概述", "html": "<h2 id=\"第一章-架构内容框架概述\">第一章：架构内容框架概述</h2>\n<h3 id=\"什么是架构内容框架-Architecture-Content-Framework-\">什么是架构内容框架（Architecture Content Framework）</h3>\n<p>架构内容框架（Architecture Content Framework，ACF）是 TOGAF 9 引入的一个结构化模型，用于定义架构工作的&quot;输出物&quot;体系。它回答了一个核心问题：<strong>在企业架构工作中，应该产出哪些东西，这些东西的分类和关系是什么？</strong></p>\n<p>架构内容框架将所有架构工作成果划分为三大类型：制品（Artifact）、交付物（Deliverable）、构建块（Building Block）。三类输出物共同构成一个完整的、有层次的内容体系。</p>\n<p>从定义上看：</p>\n<ul>\n<li><strong>制品（Artifact）</strong> 是架构工作产生的最细粒度的工作产品，是描述架构某一方面的具体文档或图表</li>\n<li><strong>交付物（Deliverable）</strong> 是合同中规定的、经过正式评审和签署的工作成果，通常由多个制品组成</li>\n<li><strong>构建块（Building Block）</strong> 是代表某种业务或技术能力的组件，是架构的&quot;积木块&quot;</li>\n</ul>\n<h3 id=\"为什么需要架构内容框架\">为什么需要架构内容框架</h3>\n<p>没有内容框架，企业架构工作就会缺乏标准化，不同的架构师、不同的项目产出物各不相同，难以比较、复用和管理。架构内容框架解决了以下几个核心问题：</p>\n<ol>\n<li><strong>一致性问题</strong>：确保不同阶段、不同团队产出物的格式和分类一致</li>\n<li><strong>完整性问题</strong>：通过制品清单检查架构工作是否遗漏了关键内容</li>\n<li><strong>可追溯性问题</strong>：明确哪些制品是正式交付物，哪些是中间工作产品</li>\n<li><strong>复用性问题</strong>：通过构建块体系，将已有的架构成果结构化存储，供后续项目复用</li>\n</ol>\n<h3 id=\"内容框架与-ADM-的关系\">内容框架与 ADM 的关系</h3>\n<p>架构内容框架与 ADM（Architecture Development Method）的关系是<strong>相辅相成</strong>的。ADM 定义了架构工作的<strong>过程</strong>（怎么做），而内容框架定义了架构工作的<strong>成果</strong>（做出什么）。
