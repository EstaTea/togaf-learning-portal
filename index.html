div>\n<p><strong>审批权限矩阵：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>决策类型</th><th>CAE</th><th>IT总监</th><th>供应链VP</th><th>CFO</th><th>Board</th><th>董事长</th></tr>\n<tr><td>技术选型（标准目录内）</td><td>批准</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>\n<tr><td>技术选型（目录外）</td><td>提议</td><td>联签</td><td>—</td><td>—</td><td>批准</td><td>—</td></tr>\n<tr><td>架构偏差（轻微）</td><td>批准</td><td>—</td><td>—</td><td>—</td><td>备案</td><td>—</td></tr>\n<tr><td>架构豁免（重大）</td><td>提议</td><td>—</td><td>—</td><td>—</td><td>批准</td><td>—</td></tr>\n<tr><td>范围变更（预算&lt;200万）</td><td>提议</td><td>—</td><td>—</td><td>批准</td><td>—</td><td>—</td></tr>\n<tr><td>范围变更（预算&gt;200万）</td><td>提议</td><td>—</td><td>—</td><td>—</td><td>—</td><td>批准</td></tr>\n</table></div>\n<h2 id=\"G-2-架构合规检查清单-Architecture-Compliance-Checklist-\">G.2 架构合规检查清单（Architecture Compliance Checklist）</h2>\n<div class=\"tbl\"><table>\n<tr><th>检查项</th><th>检查对象</th><th>合规级别</th><th>检查时间点</th><th>偏差处理</th></tr>\n<tr><td>CPI接口规范遵从</td><td>所有系统集成接口</td><td>Conformant</td><td>每个接口上线前</td><td>Non-Conformant → 申请Dispensation</td></tr>\n<tr><td>主数据写入点控制</td><td>MDG + 各业务系统</td><td>Conformant</td><td>MDG上线后每季度</td><td>超过1个写入点即触发整改</td></tr>\n<tr><td>S/4HANA自定义代码</td><td>ABAP开发列表</td><td>Compliant</td><td>每个Sprint回顾</td><td>ABAP数量超基线20% → Board审议</td></tr>\n<tr><td>数据加密标准</td><td>所有含客户数据的系统</td><td>Conformant</td><td>系统上线前安全评审</td><td>Non-Conformant → 禁止上线</td></tr>\n<tr><td>碳排放数据模型</td><td>WP6系统</td><td>Conformant</td><td>CBAM合规截止前3个月</td><td>Non-Conformant → 启动紧急修复</td></tr>\n<tr><td>技术组件（在标准目录内）</td><td>所有新引入技术</td><td>Compliant</td><td>采购申请阶段</td><td>目录外技术 → 补充申请</td></tr>\n<tr><td>泰国数据主权合规</td><td>泰国工厂数据流</td><td>Conformant</td><td>泰国工厂上线前</td><td>任何违规 → 立即停止，法务介入</td></tr>\n<tr><td>移动端支持要求</td><td>一线操作系统</td><td>Compliant</td><td>UAT阶段</td><td>严重不友好 → 延迟上线，重新设计</td></tr>\n<tr><td>灾备架构（RTO/RPO）</td><td>S/4HANA + MES</td><td>Conformant</td><td>SIT阶段</td><td>达不到99.9% → 架构整改</td></tr>\n<tr><td>Group Reporting合并</td><td>S/4HANA Group Reporting</td><td>Conformant</td><td>上线后第一个月结</td><td>报表不准确 → 紧急修复</td></tr>\n</table></div>\n<h2 id=\"G-3-偏差处理-Architecture-Dispensation-真实案例\">G.3 偏差处理（Architecture Dispensation）真实案例</h2>\n<h3 id=\"案例1-MES供应商要求使用专有接口\">案例1：MES供应商要求使用专有接口</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>申请方</td><td>WP3统一MES实施团队</td></tr>\n<tr><td>偏差描述</td><td>某MES供应商（西门子Opcenter）的标准接口为OPC-UA，无法直接接入SAP CPI，需要额外适配层</td></tr>\n<tr><td>违反原则</td><td>IS-02（接口标准化：所有集成通过CPI）</td></tr>\n<tr><td>Board评估</td><td>工业设备OPC-UA协议为国际标准，非私有协议；CPI有OPC-UA连接器；实质符合架构意图</td></tr>\n<tr><td>决议</td><td>批准Dispensation，条件：使用SAP官方OPC-UA连接器（非自研），并在架构文档中补充说明</td></tr>\n<tr><td>记录结果</td><td>合规级别更新为Compliant（而非Non-Conformant），更新技术标准目录</td></tr>\n</table></div>\n<h3 id=\"案例2-某工厂要求保留Oracle数据库\">案例2：某工厂要求保留Oracle数据库</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>申请方</td><td>武汉工厂IT负责人</td></tr>\n<tr><td>偏差描述</td><td>武汉工厂历史MES数据（8年）存储在Oracle 11g，迁移成本高且有历史追溯需求</td></tr>\n<tr><td>违反原则</td><td>TP-01（新系统优先SAP HANA）</td></tr>\n<tr><td>Board评估</td><td>Oracle 11g已过EOS，安全风险高；历史数据可归档而非迁移</td></tr>\n<tr><td>决议</td><td>拒绝Dispensation，要求：历史数据归档到数据湖（低成本）；Oracle系统在WP3完成时退役</td></tr>\n<tr><td>后续行动</td><td>增加WP1子任务：武汉工厂历史数据归档</td></tr>\n</table></div>\n<h2 id=\"G-4-Phase-G-交付物清单\">G.4 Phase G 交付物清单</h2>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>状态</th></tr>\n<tr><td>Architecture Compliance Reports（月度，共18期）</td><td>持续进行</td></tr>\n<tr><td>Architecture Contracts（类型1和类型2各1份）</td><td>已签署</td></tr>\n<tr><td>Dispensation Log（豁免申请记录）</td><td>持续更新</td></tr>\n<tr><td>Architecture Change Requests（变更请求记录）</td><td>持续更新</td></tr>\n<tr><td>Implementation Governance Model</td><td>已批准</td></tr>\n</table></div>\n<hr>\n<h1 id=\"Phase-H-架构变更管理-Architecture-Change-Management-\">Phase H — 架构变更管理（Architecture Change Management）</h1>\n<h2 id=\"H-1-PESTLE-外部变化监控\">H.1 PESTLE 外部变化监控</h2>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>具体变化</th><th>对华锐架构的影响</th><th>变更类型</th><th>紧迫程度</th></tr>\n<tr><td>Political（政治）</td><td>中国工业数字化新规：制造业数据不得出境（草案）</td><td>泰国/墨西哥工厂数据同步架构需重新评估</td><td>类型3</td><td>高</td></tr>\n<tr><td>Economic（经济）</td><td>比亚迪要求供应商2027年前完成IATF数字化认证</td><td>质量管理系统（QM）需增加数字化报告能力</td><td>类型2</td><td>高</td></tr>\n<tr><td>Social（社会）</td><td>95后工人比例上升，要求移动化操作</td><td>MES移动端功能需提前加速</td><td>类型2</td><td>中</td></tr>\n<tr><td>Technology（技术）</td><td>AI辅助生产排程（竞争对手已上线）</td><td>需要在WP5数据分析平台上增加AI预测排产模块</td><td>类型2</td><td>中</td></tr>\n<tr><td>Legal（法律）</td><td>欧盟CBAM正式落地，要求精确到零件级碳核算</td><td>碳排放数据模型需从工厂级细化到零件级</td><td>类型3</td><td>极高</td></tr>\n<tr><td>Environmental（环境）</td><td>ESG报告要求：2027年起A股上市公司强制披露碳数据</td><td>Group Reporting需增加ESG报告模块</td><td>类型2</td><td>高</td></tr>\n</table></div>\n<h2 id=\"H-2-三类变更请求处理\">H.2 三类变更请求处理</h2>\n<h3 id=\"变更类型说明\">变更类型说明</h3>\n<div class=\"tbl\"><table>\n<tr><th>变更类型</th><th>定义</th><th>处理路径</th></tr>\n<tr><td>类型1 — 简化变更（Simplification）</td><td>不影响架构方向的版本更新、小补丁</td><td>CAE快速审批，无需Board</td></tr>\n<tr><td>类型2 — 增量变更（Incremental）</td><td>在现有框架内增加新能力，不改变总体架构方向</td><td>简化ADM循环（部分Phase重跑）</td></tr>\n<tr><td>类型3 — 重新定义变更（Re-architecting）</td><td>需要重新审视多个架构域，触发完整新ADM循环</td><td>完整ADM循环，Board + 高管联合审批</td></tr>\n</table></div>\n<h3 id=\"案例-类型1-S-4HANA-Group-Reporting补丁\">案例：类型1 — S/4HANA Group Reporting补丁</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>上线后发现SAP S/4HANA 2023版本的Group Reporting有bug，供应商发布了补丁包（SP03）</td></tr>\n<tr><td>分类</td><td>类型1，版本小更新，不影响架构方向</td></tr>\n<tr><td>处理流程</td><td>CAE审批 → IT总监执行 → 下一个维护窗口打补丁 → 更新架构文档版本号</td></tr>\n<tr><td>用时</td><td>2天内完成审批</td></tr>\n<tr><td>架构影响</td><td>无（仅版本号变更）</td></tr>\n</table></div>\n<h3 id=\"案例-类型2-比亚迪EDI直连需求\">案例：类型2 — 比亚迪EDI直连需求</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>比亚迪要求华锐2027年7月前开通EDI直连（850/856/810报文），当前通过邮件+电话处理</td></tr>\n<tr><td>分类</td><td>类型2，在现有应用架构框架内增加新集成能力</td></tr>\n<tr><td>处理流程</td><td>启动简化ADM循环（Phase C应用架构 + Phase D技术架构）→ CPI增加EDI模块 → Architecture Board审批</td></tr>\n<tr><td>用时</td><td>4周完成架构评估，12周完成实施</td></tr>\n<tr><td>架构影响</td><td>新增1个SBB（CPI EDI连接器），更新应用通信图</td></tr>\n</table></div>\n<h3 id=\"案例-类型3-CBAM零件级碳核算\">案例：类型3 — CBAM零件级碳核算</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>欧盟CBAM要求2026年底前提交精确到零件级的碳足迹报告，当前WP6只设计到工厂级</td></tr>\n<tr><td>分类</td><td>类型3，需要重新审视数据架构 + 应用架构 + 技术架构</td></tr>\n<tr><td>处理流程</td><td>触发完整新ADM循环（范围限定在&quot;碳合规能力架构&quot;）→ 重新走完Phase A→E → Architecture Board + CFO + 合规顾问联合审批</td></tr>\n<tr><td>用时</td><td>8周架构设计，16周实施</td></tr>\n<tr><td>架构影响</td><td>数据架构新增8个数据实体；应用架构新增2个应用组件；额外成本估算1,200万</td></tr>\n</table></div>\n<h2 id=\"H-3-架构维护计划\">H.3 架构维护计划</h2>\n<p><strong>季度架构健康检查：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>检查项</th><th>频率</th><th>负责人</th></tr>\n<tr><td>Architecture Repository一致性检查（文档vs实际）</td><td>每季度</td><td>CAE</td></tr>\n<tr><td>技术标准目录更新（新技术评估、退役技术清理）</td><td>每季度</td><td>IT总监</td></tr>\n<tr><td>工作包进度与架构偏差统计</td><td>每月</td><td>CAE</td></tr>\n<tr><td>利益相关者满意度调查</td><td>每半年</td><td>CAE</td></tr>\n<tr><td>外部环境变化（PESTLE）扫描</td><td>每季度</td><td>CAE + 合规顾问</td></tr>\n</table></div>\n<h2 id=\"H-4-Phase-H-交付物清单\">H.4 Phase H 交付物清单</h2>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>状态</th></tr>\n<tr><td>Architecture Change Request Log</td><td>持续更新</td></tr>\n<tr><td>Architecture Updates（响应变更的架构文档更新）</td><td>持续更新</td></tr>\n<tr><td>PESTLE Analysis Report（季度更新）</td><td>持续更新</td></tr>\n<tr><td>Requirements Impact Assessment（针对类型2/3变更）</td><td>按需生成</td></tr>\n</table></div>\n<hr>\n<h1 id=\"需求管理-Requirements-Management-\">需求管理（Requirements Management）</h1>\n<blockquote><p>Requirements Management 在TOGAF ADM中是贯穿所有Phase的中心流程，并非单独的Phase。它确保需求被记录、追溯、并在架构演进中持续管理。</p></blockquote>\n<h2 id=\"RM-1-需求目录-Requirements-Catalog-\">RM.1 需求目录（Requirements Catalog）</h2>\n<div class=\"tbl\"><table>\n<tr><th>需求编号</th><th>需求描述</th><th>来源</th><th>类型</th><th>关联Phase</th><th>优先级</th><th>状态</th></tr>\n<tr><td>REQ-001</td><td>集团合并报表从T+15缩短至T+3</td><td>CFO黄晓峰</td><td>业务</td><td>Phase B、C、G</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-002</td><td>碳排放数据支持CBAM格式导出</td><td>合规顾问</td><td>合规</td><td>Phase C数据、D</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-003</td><td>库存周转率从7.2提升至≥9.5次/年</td><td>供应链VP</td><td>业务</td><td>Phase B、C应用</td><td>高</td><td>实施中</td></tr>\n<tr><td>REQ-004</td><td>物料主数据单一写入点（MDG）</td><td>数据架构师</td><td>数据</td><td>Phase C数据</td><td>最高</td><td>MDG上线</td></tr>\n<tr><td>REQ-005</td><td>MES系统统一为单一平台（8工厂）</td><td>生产总监</td><td>业务</td><td>Phase C应用、D</td><td>高</td><td>实施中</td></tr>\n<tr><td>REQ-006</td><td>所有系统集成通过CPI，禁止数据库直连</td><td>IT总监</td><td>技术</td><td>Phase D</td><td>高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-007</td><td>泰国工厂数据不出境（本地存储+加密）</td><td>泰国GM</td><td>合规</td><td>Phase D</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-008</td><td>一线工人操作必须支持移动端</td><td>工人代表</td><td>可用性</td><td>Phase C应用</td><td>中</td><td>规划中</td></tr>\n<tr><td>REQ-009</td><td>S/4HANA自定义代码不超过现有Z程序的20%</td><td>CAE</td><td>技术</td><td>Phase C应用</td><td>高</td><td>监控中</td></tr>\n<tr><td>REQ-010</td><td>生产排程精度提升，停线率降低50%</td><td>生产总监</td><td>业务</td><td>Phase B、C应用</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-011</td><td>系统可用性≥99.9%（8.7小时/年停机预算）</td><td>IT总监</td><td>技术</td><td>Phase D</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-012</td><td>比亚迪EDI直连（850/856/810报文）</td><td>客户关系</td><td>业务</td><td>Phase C应用（H阶段新增）</td><td>高</td><td>新需求（H阶段）</td></tr>\n<tr><td>REQ-013</td><td>AI辅助生产排程</td><td>生产总监</td><td>业务</td><td>Phase E → 新循环</td><td>中</td><td>评估中</td></tr>\n<tr><td>REQ-014</td><td>IATF 16949数字化认证支持</td><td>质量总监</td><td>合规</td><td>Phase B、C应用</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-015</td><td>集团统一采购询价平台（降低采购成本）</td><td>CFO</td><td>业务</td><td>Phase C应用</td><td>中</td><td>规划中（下一循环）</td></tr>\n</table></div>\n<h2 id=\"RM-2-需求可追溯性矩阵-Requirements-Traceability-Matrix-\">RM.2 需求可追溯性矩阵（Requirements Traceability Matrix）</h2>\n<div class=\"tbl\"><table>\n<tr><th>需求编号</th><th>Phase A</th><th>Phase B</th><th>Phase C-Data</th><th>Phase C-App</th><th>Phase D</th><th>Phase E 工作包</th></tr>\n<tr><td>REQ-001</td><td>Architecture Vision</td><td>财务管控能力</td><td>财务数据模型</td><td>Group Reporting</td><td>HANA实时分析</td><td>WP2</td></tr>\n<tr><td>REQ-002</td><td>合规约束记录</td><td>碳业务流程</td><td>碳数据模型</td><td>碳排放系统</td><td>IoT传感器</td><td>WP6</td></tr>\n<tr><td>REQ-003</td><td>战略目标</td><td>供应链能力</td><td>库存数据</td><td>S/4HANA MM + MES</td><td>EWM仓储</td><td>WP2 + WP3</td></tr>\n<tr><td>REQ-004</td><td>数据原则</td><td>—</td><td>MDG数据模型</td><td>MDG系统</td><td>HANA DB</td><td>WP1</td></tr>\n<tr><td>REQ-005</td><td>范围定义</td><td>制造执行能力</td><td>生产数据</td><td>统一MES</td><td>工厂网络</td><td>WP3</td></tr>\n<tr><td>REQ-006</td><td>架构原则IS-02</td><td>—</td><td>—</td><td>接口规范</td><td>CPI平台</td><td>WP4</td></tr>\n<tr><td>REQ-011</td><td>架构原则TP-03</td><td>—</td><td>—</td><td>—</td><td>PCE + 灾备</td><td>WP2</td></tr>\n<tr><td>REQ-012</td><td>—</td><td>—</td><td>—</td><td>EDI集成（H阶段新增）</td><td>CPI EDI模块</td><td>WP4（增补）</td></tr>\n</table></div>\n<h2 id=\"RM-3-需求生命周期管理\">RM.3 需求生命周期管理</h2>\n<div class=\"tbl\"><table>\n<tr><th>阶段</th><th>需求管理活动</th><th>负责人</th></tr>\n<tr><td>Phase A</td><td>识别高层需求，记入Architecture Vision</td><td>CAE + 业务发起方</td></tr>\n<tr><td>Phase B-D</td><td>将业务需求细化为架构需求（功能性/非功能性）</td><td>各域架构师</td></tr>\n<tr><td>Phase E</td><td>需求分配到工作包，确认可实现性</td><td>CAE + PM</td></tr>\n<tr><td>Phase F</td><td>需求与迁移计划对齐，确认验收标准</td><td>CAE + PMO</td></tr>\n<tr><td>Phase G</td><td>监控需求实现状态，处理偏差</td><td>CAE + 实施团队</td></tr>\n<tr><td>Phase H</td><td>识别新需求，评估对现有架构的影响，决策是否触发新ADM循环</td><td>CAE + 利益相关者</td></tr>\n</table></div>\n<hr>\n<h1 id=\"案例总结\">案例总结</h1>\n<h2 id=\"项目架构成果汇总\">项目架构成果汇总</h2>\n<div class=\"tbl\"><table>\n<tr><th>ADM Phase</th><th>主要交付物</th><th>关键架构图/矩阵</th><th>状态</th></tr>\n<tr><td>Preliminary</td><td>原则目录（11条）、Board章程、定制ADM</td><td>—</td><td>完成</td></tr>\n<tr><td>Phase A</td><td>Architecture Vision、Statement of Work、利益相关者图</td><td>价值链图、解决方案概念图</td><td>完成</td></tr>\n<tr><td>Phase B</td><td>业务架构文档（AS-IS + TO-BE）</td><td>业务能力图、组织图、交互矩阵</td><td>完成</td></tr>\n<tr><td>Phase C</td><td>信息系统架构文档（数据 + 应用）</td><td>CRUD矩阵、数据分发图、应用通信图</td><td>完成</td></tr>\n<tr><td>Phase D</td><td>技术架构文档</td><td>平台分解图、环境与位置图、技术标准目录</td><td>完成</td></tr>\n<tr><td>Phase E</td><td>架构路线图、工作包清单、过渡架构</td><td>路线图甘特图、差距解决方案矩阵</td><td>完成</td></tr>\n<tr><td>Phase F</td><td>实施与迁移计划</td><td>增量表、过渡状态演变表、价值评估矩阵</td><td>完成</td></tr>\n<tr><td>Phase G</td><td>合规报告（月度）、偏差处理记录</td><td>合规检查矩阵、Dispensation Log</td><td>进行中</td></tr>\n<tr><td>Phase H</td><td>变更日志、PESTLE报告</td><td>需求影响矩阵、变更分类决策树</td><td>持续维护</td></tr>\n<tr><td>RM</td><td>需求目录（15条）、可追溯性矩阵</td><td>Traceability Matrix</td><td>持续维护</td></tr>\n</table></div>\n<h2 id=\"预期收益-18个月后-\">预期收益（18个月后）</h2>\n<div class=\"tbl\"><table>\n<tr><th>指标</th><th>AS-IS</th><th>TO-BE</th><th>改善幅度</th></tr>\n<tr><td>月结报告时间</td><td>T+15</td><td>T+3</td><td>改善80%</td></tr>\n<tr><td>库存周转率</td><td>7.2次/年</td><td>10次/年</td><td>提升39%</td></tr>\n<tr><td>停线频率</td><td>月均3.2次</td><td>月均0.8次</td><td>减少75%</td></tr>\n<tr><td>独立MES系统</td><td>6套</td><td>1套</td><td>减少83%</td></tr>\n<tr><td>集成接口类型</td><td>37个点对点</td><td>0个点对点，全CPI</td><td>清零</td></tr>\n<tr><td>CBAM碳报告</td><td>无法导出</td><td>实时可查，自动导出</td><td>从0到1</td></tr>\n<tr><td>IT总体运维成本</td><td>基线</td><td>—</td><td>预计降低35%</td></tr>\n</table></div>\n<h2 id=\"与华辉照明项目横向对比\">与华辉照明项目横向对比</h2>\n<div class=\"tbl\"><table>\n<tr><th>对比维度</th><th>华锐汽车案例</th><th>华辉照明项目</th><th>对SAP AE的启示</th></tr>\n<tr><td>行业</td><td>汽车零部件（Tier 1制造商）</td><td>照明制造+销售</td><td>制造业EA痛点高度相似</td></tr>\n<tr><td>项目规模</td><td>8,500万，18个月</td><td>950万（含咨询+实施），18个月</td><td>华辉预算更紧，需更精准排优先级</td></tr>\n<tr><td>法人/工厂数</td><td>8个生产基地</td><td>19家法人</td><td>华辉法人更多，治理复杂度更高</td></tr>\n<tr><td>核心痛点</td><td>数据孤岛（6套MES）</td><td>内部交易+主数据混乱</td><td>MDG都是第一优先级工作包</td></tr>\n<tr><td>海外合规</td><td>CBAM碳排放（泰国+墨西哥）</td><td>CBAM（德国+泰国）</td><td>两个项目都面临相同的CBAM挑战</td></tr>\n<tr><td>S/4HANA路径</td><td>Brownfield分阶段（已有ECC 11年）</td><td>Greenfield全新实施</td><td>路径不同，华辉风险更高（数据迁移量更大）</td></tr>\n<tr><td>架构治理</td><td>内部CAE主导</td><td>远景数字SI主导 + SAP AE监督</td><td>SAP AE需掌握TOGAF治理语言才能有效监督</td></tr>\n</table></div>\n<hr>\n<p><em>文件：09c_案例_Phase_FGRM.md | 关联文件：09a_案例_背景与PhaseA.md、09b_案例_Phase_BCDE.md</em></p>"}, "L9_10": {"type": "reading", "title": "📖 Phase G — 实施治理 & 偏差处理案例", "html": "<h2 id=\"G-1-Architecture-Board-治理机制\">G.1 Architecture Board 治理机制</h2>\n<p><strong>会议安排：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>会议类型</th><th>频率/触发条件</th><th>主要议题</th></tr>\n<tr><td>月度常规会议</td><td>每月第三个星期二</td><td>审查月度合规报告、处理待审变更请求</td></tr>\n<tr><td>里程碑特别会议</td><td>每个Phase E工作包完成前</td><td>正式架构合规评审</td></tr>\n<tr><td>紧急会议</td><td>重大偏差触发，48小时内召开</td><td>重大架构偏差处理</td></tr>\n</table></div>\n<p><strong>审批权限矩阵：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>决策类型</th><th>CAE</th><th>IT总监</th><th>供应链VP</th><th>CFO</th><th>Board</th><th>董事长</th></tr>\n<tr><td>技术选型（标准目录内）</td><td>批准</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>\n<tr><td>技术选型（目录外）</td><td>提议</td><td>联签</td><td>—</td><td>—</td><td>批准</td><td>—</td></tr>\n<tr><td>架构偏差（轻微）</td><td>批准</td><td>—</td><td>—</td><td>—</td><td>备案</td><td>—</td></tr>\n<tr><td>架构豁免（重大）</td><td>提议</td><td>—</td><td>—</td><td>—</td><td>批准</td><td>—</td></tr>\n<tr><td>范围变更（预算&lt;200万）</td><td>提议</td><td>—</td><td>—</td><td>批准</td><td>—</td><td>—</td></tr>\n<tr><td>范围变更（预算&gt;200万）</td><td>提议</td><td>—</td><td>—</td><td>—</td><td>—</td><td>批准</td></tr>\n</table></div>\n<h2 id=\"G-2-架构合规检查清单-Architecture-Compliance-Checklist-\">G.2 架构合规检查清单（Architecture Compliance Checklist）</h2>\n<div class=\"tbl\"><table>\n<tr><th>检查项</th><th>检查对象</th><th>合规级别</th><th>检查时间点</th><th>偏差处理</th></tr>\n<tr><td>CPI接口规范遵从</td><td>所有系统集成接口</td><td>Conformant</td><td>每个接口上线前</td><td>Non-Conformant → 申请Dispensation</td></tr>\n<tr><td>主数据写入点控制</td><td>MDG + 各业务系统</td><td>Conformant</td><td>MDG上线后每季度</td><td>超过1个写入点即触发整改</td></tr>\n<tr><td>S/4HANA自定义代码</td><td>ABAP开发列表</td><td>Compliant</td><td>每个Sprint回顾</td><td>ABAP数量超基线20% → Board审议</td></tr>\n<tr><td>数据加密标准</td><td>所有含客户数据的系统</td><td>Conformant</td><td>系统上线前安全评审</td><td>Non-Conformant → 禁止上线</td></tr>\n<tr><td>碳排放数据模型</td><td>WP6系统</td><td>Conformant</td><td>CBAM合规截止前3个月</td><td>Non-Conformant → 启动紧急修复</td></tr>\n<tr><td>技术组件（在标准目录内）</td><td>所有新引入技术</td><td>Compliant</td><td>采购申请阶段</td><td>目录外技术 → 补充申请</td></tr>\n<tr><td>泰国数据主权合规</td><td>泰国工厂数据流</td><td>Conformant</td><td>泰国工厂上线前</td><td>任何违规 → 立即停止，法务介入</td></tr>\n<tr><td>移动端支持要求</td><td>一线操作系统</td><td>Compliant</td><td>UAT阶段</td><td>严重不友好 → 延迟上线，重新设计</td></tr>\n<tr><td>灾备架构（RTO/RPO）</td><td>S/4HANA + MES</td><td>Conformant</td><td>SIT阶段</td><td>达不到99.9% → 架构整改</td></tr>\n<tr><td>Group Reporting合并</td><td>S/4HANA Group Reporting</td><td>Conformant</td><td>上线后第一个月结</td><td>报表不准确 → 紧急修复</td></tr>\n</table></div>\n<h2 id=\"G-3-偏差处理-Architecture-Dispensation-真实案例\">G.3 偏差处理（Architecture Dispensation）真实案例</h2>\n<h3 id=\"案例1-MES供应商要求使用专有接口\">案例1：MES供应商要求使用专有接口</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>申请方</td><td>WP3统一MES实施团队</td></tr>\n<tr><td>偏差描述</td><td>某MES供应商（西门子Opcenter）的标准接口为OPC-UA，无法直接接入SAP CPI，需要额外适配层</td></tr>\n<tr><td>违反原则</td><td>IS-02（接口标准化：所有集成通过CPI）</td></tr>\n<tr><td>Board评估</td><td>工业设备OPC-UA协议为国际标准，非私有协议；CPI有OPC-UA连接器；实质符合架构意图</td></tr>\n<tr><td>决议</td><td>批准Dispensation，条件：使用SAP官方OPC-UA连接器（非自研），并在架构文档中补充说明</td></tr>\n<tr><td>记录结果</td><td>合规级别更新为Compliant（而非Non-Conformant），更新技术标准目录</td></tr>\n</table></div>\n<h3 id=\"案例2-某工厂要求保留Oracle数据库\">案例2：某工厂要求保留Oracle数据库</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>申请方</td><td>武汉工厂IT负责人</td></tr>\n<tr><td>偏差描述</td><td>武汉工厂历史MES数据（8年）存储在Oracle 11g，迁移成本高且有历史追溯需求</td></tr>\n<tr><td>违反原则</td><td>TP-01（新系统优先SAP HANA）</td></tr>\n<tr><td>Board评估</td><td>Oracle 11g已过EOS，安全风险高；历史数据可归档而非迁移</td></tr>\n<tr><td>决议</td><td>拒绝Dispensation，要求：历史数据归档到数据湖（低成本）；Oracle系统在WP3完成时退役</td></tr>\n<tr><td>后续行动</td><td>增加WP1子任务：武汉工厂历史数据归档</td></tr>\n</table></div>\n<h2 id=\"G-4-Phase-G-交付物清单\">G.4 Phase G 交付物清单</h2>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>状态</th></tr>\n<tr><td>Architecture Compliance Reports（月度，共18期）</td><td>持续进行</td></tr>\n<tr><td>Architecture Contracts（类型1和类型2各1份）</td><td>已签署</td></tr>\n<tr><td>Dispensation Log（豁免申请记录）</td><td>持续更新</td></tr>\n<tr><td>Architecture Change Requests（变更请求记录）</td><td>持续更新</td></tr>\n<tr><td>Implementation Governance Model</td><td>已批准</td></tr>\n</table></div>\n<hr>\n<h1 id=\"Phase-H-架构变更管理-Architecture-Change-Management-\">Phase H — 架构变更管理（Architecture Change Management）</h1>\n<h2 id=\"H-1-PESTLE-外部变化监控\">H.1 PESTLE 外部变化监控</h2>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>具体变化</th><th>对华锐架构的影响</th><th>变更类型</th><th>紧迫程度</th></tr>\n<tr><td>Political（政治）</td><td>中国工业数字化新规：制造业数据不得出境（草案）</td><td>泰国/墨西哥工厂数据同步架构需重新评估</td><td>类型3</td><td>高</td></tr>\n<tr><td>Economic（经济）</td><td>比亚迪要求供应商2027年前完成IATF数字化认证</td><td>质量管理系统（QM）需增加数字化报告能力</td><td>类型2</td><td>高</td></tr>\n<tr><td>Social（社会）</td><td>95后工人比例上升，要求移动化操作</td><td>MES移动端功能需提前加速</td><td>类型2</td><td>中</td></tr>\n<tr><td>Technology（技术）</td><td>AI辅助生产排程（竞争对手已上线）</td><td>需要在WP5数据分析平台上增加AI预测排产模块</td><td>类型2</td><td>中</td></tr>\n<tr><td>Legal（法律）</td><td>欧盟CBAM正式落地，要求精确到零件级碳核算</td><td>碳排放数据模型需从工厂级细化到零件级</td><td>类型3</td><td>极高</td></tr>\n<tr><td>Environmental（环境）</td><td>ESG报告要求：2027年起A股上市公司强制披露碳数据</td><td>Group Reporting需增加ESG报告模块</td><td>类型2</td><td>高</td></tr>\n</table></div>\n<h2 id=\"H-2-三类变更请求处理\">H.2 三类变更请求处理</h2>\n<h3 id=\"变更类型说明\">变更类型说明</h3>\n<div class=\"tbl\"><table>\n<tr><th>变更类型</th><th>定义</th><th>处理路径</th></tr>\n<tr><td>类型1 — 简化变更（Simplification）</td><td>不影响架构方向的版本更新、小补丁</td><td>CAE快速审批，无需Board</td></tr>\n<tr><td>类型2 — 增量变更（Incremental）</td><td>在现有框架内增加新能力，不改变总体架构方向</td><td>简化ADM循环（部分Phase重跑）</td></tr>\n<tr><td>类型3 — 重新定义变更（Re-architecting）</td><td>需要重新审视多个架构域，触发完整新ADM循环</td><td>完整ADM循环，Board + 高管联合审批</td></tr>\n</table></div>\n<h3 id=\"案例-类型1-S-4HANA-Group-Reporting补丁\">案例：类型1 — S/4HANA Group Reporting补丁</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>上线后发现SAP S/4HANA 2023版本的Group Reporting有bug，供应商发布了补丁包（SP03）</td></tr>\n<tr><td>分类</td><td>类型1，版本小更新，不影响架构方向</td></tr>\n<tr><td>处理流程</td><td>CAE审批 → IT总监执行 → 下一个维护窗口打补丁 → 更新架构文档版本号</td></tr>\n<tr><td>用时</td><td>2天内完成审批</td></tr>\n<tr><td>架构影响</td><td>无（仅版本号变更）</td></tr>\n</table></div>\n<h3 id=\"案例-类型2-比亚迪EDI直连需求\">案例：类型2 — 比亚迪EDI直连需求</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>比亚迪要求华锐2027年7月前开通EDI直连（850/856/810报文），当前通过邮件+电话处理</td></tr>\n<tr><td>分类</td><td>类型2，在现有应用架构框架内增加新集成能力</td></tr>\n<tr><td>处理流程</td><td>启动简化ADM循环（Phase C应用架构 + Phase D技术架构）→ CPI增加EDI模块 → Architecture Board审批</td></tr>\n<tr><td>用时</td><td>4周完成架构评估，12周完成实施</td></tr>\n<tr><td>架构影响</td><td>新增1个SBB（CPI EDI连接器），更新应用通信图</td></tr>\n</table></div>\n<h3 id=\"案例-类型3-CBAM零件级碳核算\">案例：类型3 — CBAM零件级碳核算</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>欧盟CBAM要求2026年底前提交精确到零件级的碳足迹报告，当前WP6只设计到工厂级</td></tr>\n<tr><td>分类</td><td>类型3，需要重新审视数据架构 + 应用架构 + 技术架构</td></tr>\n<tr><td>处理流程</td><td>触发完整新ADM循环（范围限定在&quot;碳合规能力架构&quot;）→ 重新走完Phase A→E → Architecture Board + CFO + 合规顾问联合审批</td></tr>\n<tr><td>用时</td><td>8周架构设计，16周实施</td></tr>\n<tr><td>架构影响</td><td>数据架构新增8个数据实体；应用架构新增2个应用组件；额外成本估算1,200万</td></tr>\n</table></div>\n<h2 id=\"H-3-架构维护计划\">H.3 架构维护计划</h2>\n<p><strong>季度架构健康检查：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>检查项</th><th>频率</th><th>负责人</th></tr>\n<tr><td>Architecture Repository一致性检查（文档vs实际）</td><td>每季度</td><td>CAE</td></tr>\n<tr><td>技术标准目录更新（新技术评估、退役技术清理）</td><td>每季度</td><td>IT总监</td></tr>\n<tr><td>工作包进度与架构偏差统计</td><td>每月</td><td>CAE</td></tr>\n<tr><td>利益相关者满意度调查</td><td>每半年</td><td>CAE</td></tr>\n<tr><td>外部环境变化（PESTLE）扫描</td><td>每季度</td><td>CAE + 合规顾问</td></tr>\n</table></div>\n<h2 id=\"H-4-Phase-H-交付物清单\">H.4 Phase H 交付物清单</h2>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>状态</th></tr>\n<tr><td>Architecture Change Request Log</td><td>持续更新</td></tr>\n<tr><td>Architecture Updates（响应变更的架构文档更新）</td><td>持续更新</td></tr>\n<tr><td>PESTLE Analysis Report（季度更新）</td><td>持续更新</td></tr>\n<tr><td>Requirements Impact Assessment（针对类型2/3变更）</td><td>按需生成</td></tr>\n</table></div>\n<hr>\n<h1 id=\"需求管理-Requirements-Management-\">需求管理（Requirements Management）</h1>\n<blockquote><p>Requirements Management 在TOGAF ADM中是贯穿所有Phase的中心流程，并非单独的Phase。它确保需求被记录、追溯、并在架构演进中持续管理。</p></blockquote>\n<h2 id=\"RM-1-需求目录-Requirements-Catalog-\">RM.1 需求目录（Requirements Catalog）</h2>\n<div class=\"tbl\"><table>\n<tr><th>需求编号</th><th>需求描述</th><th>来源</th><th>类型</th><th>关联Phase</th><th>优先级</th><th>状态</th></tr>\n<tr><td>REQ-001</td><td>集团合并报表从T+15缩短至T+3</td><td>CFO黄晓峰</td><td>业务</td><td>Phase B、C、G</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-002</td><td>碳排放数据支持CBAM格式导出</td><td>合规顾问</td><td>合规</td><td>Phase C数据、D</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-003</td><td>库存周转率从7.2提升至≥9.5次/年</td><td>供应链VP</td><td>业务</td><td>Phase B、C应用</td><td>高</td><td>实施中</td></tr>\n<tr><td>REQ-004</td><td>物料主数据单一写入点（MDG）</td><td>数据架构师</td><td>数据</td><td>Phase C数据</td><td>最高</td><td>MDG上线</td></tr>\n<tr><td>REQ-005</td><td>MES系统统一为单一平台（8工厂）</td><td>生产总监</td><td>业务</td><td>Phase C应用、D</td><td>高</td><td>实施中</td></tr>\n<tr><td>REQ-006</td><td>所有系统集成通过CPI，禁止数据库直连</td><td>IT总监</td><td>技术</td><td>Phase D</td><td>高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-007</td><td>泰国工厂数据不出境（本地存储+加密）</td><td>泰国GM</td><td>合规</td><td>Phase D</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-008</td><td>一线工人操作必须支持移动端</td><td>工人代表</td><td>可用性</td><td>Phase C应用</td><td>中</td><td>规划中</td></tr>\n<tr><td>REQ-009</td><td>S/4HANA自定义代码不超过现有Z程序的20%</td><td>CAE</td><td>技术</td><td>Phase C应用</td><td>高</td><td>监控中</td></tr>\n<tr><td>REQ-010</td><td>生产排程精度提升，停线率降低50%</td><td>生产总监</td><td>业务</td><td>Phase B、C应用</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-011</td><td>系统可用性≥99.9%（8.7小时/年停机预算）</td><td>IT总监</td><td>技术</td><td>Phase D</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-012</td><td>比亚迪EDI直连（850/856/810报文）</td><td>客户关系</td><td>业务</td><td>Phase C应用（H阶段新增）</td><td>高</td><td>新需求（H阶段）</td></tr>\n<tr><td>REQ-013</td><td>AI辅助生产排程</td><td>生产总监</td><td>业务</td><td>Phase E → 新循环</td><td>中</td><td>评估中</td></tr>\n<tr><td>REQ-014</td><td>IATF 16949数字化认证支持</td><td>质量总监</td><td>合规</td><td>Phase B、C应用</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-015</td><td>集团统一采购询价平台（降低采购成本）</td><td>CFO</td><td>业务</td><td>Phase C应用</td><td>中</td><td>规划中（下一循环）</td></tr>\n</table></div>\n<h2 id=\"RM-2-需求可追溯性矩阵-Requirements-Traceability-Matrix-\">RM.2 需求可追溯性矩阵（Requirements Traceability Matrix）</h2>\n<div class=\"tbl\"><table>\n<tr><th>需求编号</th><th>Phase A</th><th>Phase B</th><th>Phase C-Data</th><th>Phase C-App</th><th>Phase D</th><th>Phase E 工作包</th></tr>\n<tr><td>REQ-001</td><td>Architecture Vision</td><td>财务管控能力</td><td>财务数据模型</td><td>Group Reporting</td><td>HANA实时分析</td><td>WP2</td></tr>\n<tr><td>REQ-002</td><td>合规约束记录</td><td>碳业务流程</td><td>碳数据模型</td><td>碳排放系统</td><td>IoT传感器</td><td>WP6</td></tr>\n<tr><td>REQ-003</td><td>战略目标</td><td>供应链能力</td><td>库存数据</td><td>S/4HANA MM + MES</td><td>EWM仓储</td><td>WP2 + WP3</td></tr>\n<tr><td>REQ-004</td><td>数据原则</td><td>—</td><td>MDG数据模型</td><td>MDG系统</td><td>HANA DB</td><td>WP1</td></tr>\n<tr><td>REQ-005</td><td>范围定义</td><td>制造执行能力</td><td>生产数据</td><td>统一MES</td><td>工厂网络</td><td>WP3</td></tr>\n<tr><td>REQ-006</td><td>架构原则IS-02</td><td>—</td><td>—</td><td>接口规范</td><td>CPI平台</td><td>WP4</td></tr>\n<tr><td>REQ-011</td><td>架构原则TP-03</td><td>—</td><td>—</td><td>—</td><td>PCE + 灾备</td><td>WP2</td></tr>\n<tr><td>REQ-012</td><td>—</td><td>—</td><td>—</td><td>EDI集成（H阶段新增）</td><td>CPI EDI模块</td><td>WP4（增补）</td></tr>\n</table></div>\n<h2 id=\"RM-3-需求生命周期管理\">RM.3 需求生命周期管理</h2>\n<div class=\"tbl\"><table>\n<tr><th>阶段</th><th>需求管理活动</th><th>负责人</th></tr>\n<tr><td>Phase A</td><td>识别高层需求，记入Architecture Vision</td><td>CAE + 业务发起方</td></tr>\n<tr><td>Phase B-D</td><td>将业务需求细化为架构需求（功能性/非功能性）</td><td>各域架构师</td></tr>\n<tr><td>Phase E</td><td>需求分配到工作包，确认可实现性</td><td>CAE + PM</td></tr>\n<tr><td>Phase F</td><td>需求与迁移计划对齐，确认验收标准</td><td>CAE + PMO</td></tr>\n<tr><td>Phase G</td><td>监控需求实现状态，处理偏差</td><td>CAE + 实施团队</td></tr>\n<tr><td>Phase H</td><td>识别新需求，评估对现有架构的影响，决策是否触发新ADM循环</td><td>CAE + 利益相关者</td></tr>\n</table></div>\n<hr>\n<h1 id=\"案例总结\">案例总结</h1>\n<h2 id=\"项目架构成果汇总\">项目架构成果汇总</h2>\n<div class=\"tbl\"><table>\n<tr><th>ADM Phase</th><th>主要交付物</th><th>关键架构图/矩阵</th><th>状态</th></tr>\n<tr><td>Preliminary</td><td>原则目录（11条）、Board章程、定制ADM</td><td>—</td><td>完成</td></tr>\n<tr><td>Phase A</td><td>Architecture Vision、Statement of Work、利益相关者图</td><td>价值链图、解决方案概念图</td><td>完成</td></tr>\n<tr><td>Phase B</td><td>业务架构文档（AS-IS + TO-BE）</td><td>业务能力图、组织图、交互矩阵</td><td>完成</td></tr>\n<tr><td>Phase C</td><td>信息系统架构文档（数据 + 应用）</td><td>CRUD矩阵、数据分发图、应用通信图</td><td>完成</td></tr>\n<tr><td>Phase D</td><td>技术架构文档</td><td>平台分解图、环境与位置图、技术标准目录</td><td>完成</td></tr>\n<tr><td>Phase E</td><td>架构路线图、工作包清单、过渡架构</td><td>路线图甘特图、差距解决方案矩阵</td><td>完成</td></tr>\n<tr><td>Phase F</td><td>实施与迁移计划</td><td>增量表、过渡状态演变表、价值评估矩阵</td><td>完成</td></tr>\n<tr><td>Phase G</td><td>合规报告（月度）、偏差处理记录</td><td>合规检查矩阵、Dispensation Log</td><td>进行中</td></tr>\n<tr><td>Phase H</td><td>变更日志、PESTLE报告</td><td>需求影响矩阵、变更分类决策树</td><td>持续维护</td></tr>\n<tr><td>RM</td><td>需求目录（15条）、可追溯性矩阵</td><td>Traceability Matrix</td><td>持续维护</td></tr>\n</table></div>\n<h2 id=\"预期收益-18个月后-\">预期收益（18个月后）</h2>\n<div class=\"tbl\"><table>\n<tr><th>指标</th><th>AS-IS</th><th>TO-BE</th><th>改善幅度</th></tr>\n<tr><td>月结报告时间</td><td>T+15</td><td>T+3</td><td>改善80%</td></tr>\n<tr><td>库存周转率</td><td>7.2次/年</td><td>10次/年</td><td>提升39%</td></tr>\n<tr><td>停线频率</td><td>月均3.2次</td><td>月均0.8次</td><td>减少75%</td></tr>\n<tr><td>独立MES系统</td><td>6套</td><td>1套</td><td>减少83%</td></tr>\n<tr><td>集成接口类型</td><td>37个点对点</td><td>0个点对点，全CPI</td><td>清零</td></tr>\n<tr><td>CBAM碳报告</td><td>无法导出</td><td>实时可查，自动导出</td><td>从0到1</td></tr>\n<tr><td>IT总体运维成本</td><td>基线</td><td>—</td><td>预计降低35%</td></tr>\n</table></div>\n<h2 id=\"与华辉照明项目横向对比\">与华辉照明项目横向对比</h2>\n<div class=\"tbl\"><table>\n<tr><th>对比维度</th><th>华锐汽车案例</th><th>华辉照明项目</th><th>对SAP AE的启示</th></tr>\n<tr><td>行业</td><td>汽车零部件（Tier 1制造商）</td><td>照明制造+销售</td><td>制造业EA痛点高度相似</td></tr>\n<tr><td>项目规模</td><td>8,500万，18个月</td><td>950万（含咨询+实施），18个月</td><td>华辉预算更紧，需更精准排优先级</td></tr>\n<tr><td>法人/工厂数</td><td>8个生产基地</td><td>19家法人</td><td>华辉法人更多，治理复杂度更高</td></tr>\n<tr><td>核心痛点</td><td>数据孤岛（6套MES）</td><td>内部交易+主数据混乱</td><td>MDG都是第一优先级工作包</td></tr>\n<tr><td>海外合规</td><td>CBAM碳排放（泰国+墨西哥）</td><td>CBAM（德国+泰国）</td><td>两个项目都面临相同的CBAM挑战</td></tr>\n<tr><td>S/4HANA路径</td><td>Brownfield分阶段（已有ECC 11年）</td><td>Greenfield全新实施</td><td>路径不同，华辉风险更高（数据迁移量更大）</td></tr>\n<tr><td>架构治理</td><td>内部CAE主导</td><td>远景数字SI主导 + SAP AE监督</td><td>SAP AE需掌握TOGAF治理语言才能有效监督</td></tr>\n</table></div>\n<hr>\n<p><em>文件：09c_案例_Phase_FGRM.md | 关联文件：09a_案例_背景与PhaseA.md、09b_案例_Phase_BCDE.md</em></p>"}, "L9_11": {"type": "reading", "title": "📖 Phase H — 架构变更管理 & PESTLE", "html": "<h2 id=\"H-1-PESTLE-外部变化监控\">H.1 PESTLE 外部变化监控</h2>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>具体变化</th><th>对华锐架构的影响</th><th>变更类型</th><th>紧迫程度</th></tr>\n<tr><td>Political（政治）</td><td>中国工业数字化新规：制造业数据不得出境（草案）</td><td>泰国/墨西哥工厂数据同步架构需重新评估</td><td>类型3</td><td>高</td></tr>\n<tr><td>Economic（经济）</td><td>比亚迪要求供应商2027年前完成IATF数字化认证</td><td>质量管理系统（QM）需增加数字化报告能力</td><td>类型2</td><td>高</td></tr>\n<tr><td>Social（社会）</td><td>95后工人比例上升，要求移动化操作</td><td>MES移动端功能需提前加速</td><td>类型2</td><td>中</td></tr>\n<tr><td>Technology（技术）</td><td>AI辅助生产排程（竞争对手已上线）</td><td>需要在WP5数据分析平台上增加AI预测排产模块</td><td>类型2</td><td>中</td></tr>\n<tr><td>Legal（法律）</td><td>欧盟CBAM正式落地，要求精确到零件级碳核算</td><td>碳排放数据模型需从工厂级细化到零件级</td><td>类型3</td><td>极高</td></tr>\n<tr><td>Environmental（环境）</td><td>ESG报告要求：2027年起A股上市公司强制披露碳数据</td><td>Group Reporting需增加ESG报告模块</td><td>类型2</td><td>高</td></tr>\n</table></div>\n<h2 id=\"H-2-三类变更请求处理\">H.2 三类变更请求处理</h2>\n<h3 id=\"变更类型说明\">变更类型说明</h3>\n<div class=\"tbl\"><table>\n<tr><th>变更类型</th><th>定义</th><th>处理路径</th></tr>\n<tr><td>类型1 — 简化变更（Simplification）</td><td>不影响架构方向的版本更新、小补丁</td><td>CAE快速审批，无需Board</td></tr>\n<tr><td>类型2 — 增量变更（Incremental）</td><td>在现有框架内增加新能力，不改变总体架构方向</td><td>简化ADM循环（部分Phase重跑）</td></tr>\n<tr><td>类型3 — 重新定义变更（Re-architecting）</td><td>需要重新审视多个架构域，触发完整新ADM循环</td><td>完整ADM循环，Board + 高管联合审批</td></tr>\n</table></div>\n<h3 id=\"案例-类型1-S-4HANA-Group-Reporting补丁\">案例：类型1 — S/4HANA Group Reporting补丁</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>上线后发现SAP S/4HANA 2023版本的Group Reporting有bug，供应商发布了补丁包（SP03）</td></tr>\n<tr><td>分类</td><td>类型1，版本小更新，不影响架构方向</td></tr>\n<tr><td>处理流程</td><td>CAE审批 → IT总监执行 → 下一个维护窗口打补丁 → 更新架构文档版本号</td></tr>\n<tr><td>用时</td><td>2天内完成审批</td></tr>\n<tr><td>架构影响</td><td>无（仅版本号变更）</td></tr>\n</table></div>\n<h3 id=\"案例-类型2-比亚迪EDI直连需求\">案例：类型2 — 比亚迪EDI直连需求</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>比亚迪要求华锐2027年7月前开通EDI直连（850/856/810报文），当前通过邮件+电话处理</td></tr>\n<tr><td>分类</td><td>类型2，在现有应用架构框架内增加新集成能力</td></tr>\n<tr><td>处理流程</td><td>启动简化ADM循环（Phase C应用架构 + Phase D技术架构）→ CPI增加EDI模块 → Architecture Board审批</td></tr>\n<tr><td>用时</td><td>4周完成架构评估，12周完成实施</td></tr>\n<tr><td>架构影响</td><td>新增1个SBB（CPI EDI连接器），更新应用通信图</td></tr>\n</table></div>\n<h3 id=\"案例-类型3-CBAM零件级碳核算\">案例：类型3 — CBAM零件级碳核算</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>欧盟CBAM要求2026年底前提交精确到零件级的碳足迹报告，当前WP6只设计到工厂级</td></tr>\n<tr><td>分类</td><td>类型3，需要重新审视数据架构 + 应用架构 + 技术架构</td></tr>\n<tr><td>处理流程</td><td>触发完整新ADM循环（范围限定在&quot;碳合规能力架构&quot;）→ 重新走完Phase A→E → Architecture Board + CFO + 合规顾问联合审批</td></tr>\n<tr><td>用时</td><td>8周架构设计，16周实施</td></tr>\n<tr><td>架构影响</td><td>数据架构新增8个数据实体；应用架构新增2个应用组件；额外成本估算1,200万</td></tr>\n</table></div>\n<h2 id=\"H-3-架构维护计划\">H.3 架构维护计划</h2>\n<p><strong>季度架构健康检查：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>检查项</th><th>频率</th><th>负责人</th></tr>\n<tr><td>Architecture Repository一致性检查（文档vs实际）</td><td>每季度</td><td>CAE</td></tr>\n<tr><td>技术标准目录更新（新技术评估、退役技术清理）</td><td>每季度</td><td>IT总监</td></tr>\n<tr><td>工作包进度与架构偏差统计</td><td>每月</td><td>CAE</td></tr>\n<tr><td>利益相关者满意度调查</td><td>每半年</td><td>CAE</td></tr>\n<tr><td>外部环境变化（PESTLE）扫描</td><td>每季度</td><td>CAE + 合规顾问</td></tr>\n</table></div>\n<h2 id=\"H-4-Phase-H-交付物清单\">H.4 Phase H 交付物清单</h2>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>状态</th></tr>\n<tr><td>Architecture Change Request Log</td><td>持续更新</td></tr>\n<tr><td>Architecture Updates（响应变更的架构文档更新）</td><td>持续更新</td></tr>\n<tr><td>PESTLE Analysis Report（季度更新）</td><td>持续更新</td></tr>\n<tr><td>Requirements Impact Assessment（针对类型2/3变更）</td><td>按需生成</td></tr>\n</table></div>\n<hr>\n<h1 id=\"需求管理-Requirements-Management-\">需求管理（Requirements Management）</h1>\n<blockquote><p>Requirements Management 在TOGAF ADM中是贯穿所有Phase的中心流程，并非单独的Phase。它确保需求被记录、追溯、并在架构演进中持续管理。</p></blockquote>\n<h2 id=\"RM-1-需求目录-Requirements-Catalog-\">RM.1 需求目录（Requirements Catalog）</h2>\n<div class=\"tbl\"><table>\n<tr><th>需求编号</th><th>需求描述</th><th>来源</th><th>类型</th><th>关联Phase</th><th>优先级</th><th>状态</th></tr>\n<tr><td>REQ-001</td><td>集团合并报表从T+15缩短至T+3</td><td>CFO黄晓峰</td><td>业务</td><td>Phase B、C、G</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-002</td><td>碳排放数据支持CBAM格式导出</td><td>合规顾问</td><td>合规</td><td>Phase C数据、D</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-003</td><td>库存周转率从7.2提升至≥9.5次/年</td><td>供应链VP</td><td>业务</td><td>Phase B、C应用</td><td>高</td><td>实施中</td></tr>\n<tr><td>REQ-004</td><td>物料主数据单一写入点（MDG）</td><td>数据架构师</td><td>数据</td><td>Phase C数据</td><td>最高</td><td>MDG上线</td></tr>\n<tr><td>REQ-005</td><td>MES系统统一为单一平台（8工厂）</td><td>生产总监</td><td>业务</td><td>Phase C应用、D</td><td>高</td><td>实施中</td></tr>\n<tr><td>REQ-006</td><td>所有系统集成通过CPI，禁止数据库直连</td><td>IT总监</td><td>技术</td><td>Phase D</td><td>高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-007</td><td>泰国工厂数据不出境（本地存储+加密）</td><td>泰国GM</td><td>合规</td><td>Phase D</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-008</td><td>一线工人操作必须支持移动端</td><td>工人代表</td><td>可用性</td><td>Phase C应用</td><td>中</td><td>规划中</td></tr>\n<tr><td>REQ-009</td><td>S/4HANA自定义代码不超过现有Z程序的20%</td><td>CAE</td><td>技术</td><td>Phase C应用</td><td>高</td><td>监控中</td></tr>\n<tr><td>REQ-010</td><td>生产排程精度提升，停线率降低50%</td><td>生产总监</td><td>业务</td><td>Phase B、C应用</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-011</td><td>系统可用性≥99.9%（8.7小时/年停机预算）</td><td>IT总监</td><td>技术</td><td>Phase D</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-012</td><td>比亚迪EDI直连（850/856/810报文）</td><td>客户关系</td><td>业务</td><td>Phase C应用（H阶段新增）</td><td>高</td><td>新需求（H阶段）</td></tr>\n<tr><td>REQ-013</td><td>AI辅助生产排程</td><td>生产总监</td><td>业务</td><td>Phase E → 新循环</td><td>中</td><td>评估中</td></tr>\n<tr><td>REQ-014</td><td>IATF 16949数字化认证支持</td><td>质量总监</td><td>合规</td><td>Phase B、C应用</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-015</td><td>集团统一采购询价平台（降低采购成本）</td><td>CFO</td><td>业务</td><td>Phase C应用</td><td>中</td><td>规划中（下一循环）</td></tr>\n</table></div>\n<h2 id=\"RM-2-需求可追溯性矩阵-Requirements-Traceability-Matrix-\">RM.2 需求可追溯性矩阵（Requirements Traceability Matrix）</h2>\n<div class=\"tbl\"><table>\n<tr><th>需求编号</th><th>Phase A</th><th>Phase B</th><th>Phase C-Data</th><th>Phase C-App</th><th>Phase D</th><th>Phase E 工作包</th></tr>\n<tr><td>REQ-001</td><td>Architecture Vision</td><td>财务管控能力</td><td>财务数据模型</td><td>Group Reporting</td><td>HANA实时分析</td><td>WP2</td></tr>\n<tr><td>REQ-002</td><td>合规约束记录</td><td>碳业务流程</td><td>碳数据模型</td><td>碳排放系统</td><td>IoT传感器</td><td>WP6</td></tr>\n<tr><td>REQ-003</td><td>战略目标</td><td>供应链能力</td><td>库存数据</td><td>S/4HANA MM + MES</td><td>EWM仓储</td><td>WP2 + WP3</td></tr>\n<tr><td>REQ-004</td><td>数据原则</td><td>—</td><td>MDG数据模型</td><td>MDG系统</td><td>HANA DB</td><td>WP1</td></tr>\n<tr><td>REQ-005</td><td>范围定义</td><td>制造执行能力</td><td>生产数据</td><td>统一MES</td><td>工厂网络</td><td>WP3</td></tr>\n<tr><td>REQ-006</td><td>架构原则IS-02</td><td>—</td><td>—</td><td>接口规范</td><td>CPI平台</td><td>WP4</td></tr>\n<tr><td>REQ-011</td><td>架构原则TP-03</td><td>—</td><td>—</td><td>—</td><td>PCE + 灾备</td><td>WP2</td></tr>\n<tr><td>REQ-012</td><td>—</td><td>—</td><td>—</td><td>EDI集成（H阶段新增）</td><td>CPI EDI模块</td><td>WP4（增补）</td></tr>\n</table></div>\n<h2 id=\"RM-3-需求生命周期管理\">RM.3 需求生命周期管理</h2>\n<div class=\"tbl\"><table>\n<tr><th>阶段</th><th>需求管理活动</th><th>负责人</th></tr>\n<tr><td>Phase A</td><td>识别高层需求，记入Architecture Vision</td><td>CAE + 业务发起方</td></tr>\n<tr><td>Phase B-D</td><td>将业务需求细化为架构需求（功能性/非功能性）</td><td>各域架构师</td></tr>\n<tr><td>Phase E</td><td>需求分配到工作包，确认可实现性</td><td>CAE + PM</td></tr>\n<tr><td>Phase F</td><td>需求与迁移计划对齐，确认验收标准</td><td>CAE + PMO</td></tr>\n<tr><td>Phase G</td><td>监控需求实现状态，处理偏差</td><td>CAE + 实施团队</td></tr>\n<tr><td>Phase H</td><td>识别新需求，评估对现有架构的影响，决策是否触发新ADM循环</td><td>CAE + 利益相关者</td></tr>\n</table></div>\n<hr>\n<h1 id=\"案例总结\">案例总结</h1>\n<h2 id=\"项目架构成果汇总\">项目架构成果汇总</h2>\n<div class=\"tbl\"><table>\n<tr><th>ADM Phase</th><th>主要交付物</th><th>关键架构图/矩阵</th><th>状态</th></tr>\n<tr><td>Preliminary</td><td>原则目录（11条）、Board章程、定制ADM</td><td>—</td><td>完成</td></tr>\n<tr><td>Phase A</td><td>Architecture Vision、Statement of Work、利益相关者图</td><td>价值链图、解决方案概念图</td><td>完成</td></tr>\n<tr><td>Phase B</td><td>业务架构文档（AS-IS + TO-BE）</td><td>业务能力图、组织图、交互矩阵</td><td>完成</td></tr>\n<tr><td>Phase C</td><td>信息系统架构文档（数据 + 应用）</td><td>CRUD矩阵、数据分发图、应用通信图</td><td>完成</td></tr>\n<tr><td>Phase D</td><td>技术架构文档</td><td>平台分解图、环境与位置图、技术标准目录</td><td>完成</td></tr>\n<tr><td>Phase E</td><td>架构路线图、工作包清单、过渡架构</td><td>路线图甘特图、差距解决方案矩阵</td><td>完成</td></tr>\n<tr><td>Phase F</td><td>实施与迁移计划</td><td>增量表、过渡状态演变表、价值评估矩阵</td><td>完成</td></tr>\n<tr><td>Phase G</td><td>合规报告（月度）、偏差处理记录</td><td>合规检查矩阵、Dispensation Log</td><td>进行中</td></tr>\n<tr><td>Phase H</td><td>变更日志、PESTLE报告</td><td>需求影响矩阵、变更分类决策树</td><td>持续维护</td></tr>\n<tr><td>RM</td><td>需求目录（15条）、可追溯性矩阵</td><td>Traceability Matrix</td><td>持续维护</td></tr>\n</table></div>\n<h2 id=\"预期收益-18个月后-\">预期收益（18个月后）</h2>\n<div class=\"tbl\"><table>\n<tr><th>指标</th><th>AS-IS</th><th>TO-BE</th><th>改善幅度</th></tr>\n<tr><td>月结报告时间</td><td>T+15</td><td>T+3</td><td>改善80%</td></tr>\n<tr><td>库存周转率</td><td>7.2次/年</td><td>10次/年</td><td>提升39%</td></tr>\n<tr><td>停线频率</td><td>月均3.2次</td><td>月均0.8次</td><td>减少75%</td></tr>\n<tr><td>独立MES系统</td><td>6套</td><td>1套</td><td>减少83%</td></tr>\n<tr><td>集成接口类型</td><td>37个点对点</td><td>0个点对点，全CPI</td><td>清零</td></tr>\n<tr><td>CBAM碳报告</td><td>无法导出</td><td>实时可查，自动导出</td><td>从0到1</td></tr>\n<tr><td>IT总体运维成本</td><td>基线</td><td>—</td><td>预计降低35%</td></tr>\n</table></div>\n<h2 id=\"与华辉照明项目横向对比\">与华辉照明项目横向对比</h2>\n<div class=\"tbl\"><table>\n<tr><th>对比维度</th><th>华锐汽车案例</th><th>华辉照明项目</th><th>对SAP AE的启示</th></tr>\n<tr><td>行业</td><td>汽车零部件（Tier 1制造商）</td><td>照明制造+销售</td><td>制造业EA痛点高度相似</td></tr>\n<tr><td>项目规模</td><td>8,500万，18个月</td><td>950万（含咨询+实施），18个月</td><td>华辉预算更紧，需更精准排优先级</td></tr>\n<tr><td>法人/工厂数</td><td>8个生产基地</td><td>19家法人</td><td>华辉法人更多，治理复杂度更高</td></tr>\n<tr><td>核心痛点</td><td>数据孤岛（6套MES）</td><td>内部交易+主数据混乱</td><td>MDG都是第一优先级工作包</td></tr>\n<tr><td>海外合规</td><td>CBAM碳排放（泰国+墨西哥）</td><td>CBAM（德国+泰国）</td><td>两个项目都面临相同的CBAM挑战</td></tr>\n<tr><td>S/4HANA路径</td><td>Brownfield分阶段（已有ECC 11年）</td><td>Greenfield全新实施</td><td>路径不同，华辉风险更高（数据迁移量更大）</td></tr>\n<tr><td>架构治理</td><td>内部CAE主导</td><td>远景数字SI主导 + SAP AE监督</td><td>SAP AE需掌握TOGAF治理语言才能有效监督</td></tr>\n</table></div>\n<hr>\n<p><em>文件：09c_案例_Phase_FGRM.md | 关联文件：09a_案例_背景与PhaseA.md、09b_案例_Phase_BCDE.md</em></p>"}, "L9_12": {"type": "reading", "title": "📖 需求管理 & 案例总结 & 与华锐对比", "html": "<h2 id=\"RM-1-需求目录-Requirements-Catalog-\">RM.1 需求目录（Requirements Catalog）</h2>\n<div class=\"tbl\"><table>\n<tr><th>需求编号</th><th>需求描述</th><th>来源</th><th>类型</th><th>关联Phase</th><th>优先级</th><th>状态</th></tr>\n<tr><td>REQ-001</td><td>集团合并报表从T+15缩短至T+3</td><td>CFO黄晓峰</td><td>业务</td><td>Phase B、C、G</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-002</td><td>碳排放数据支持CBAM格式导出</td><td>合规顾问</td><td>合规</td><td>Phase C数据、D</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-003</td><td>库存周转率从7.2提升至≥9.5次/年</td><td>供应链VP</td><td>业务</td><td>Phase B、C应用</td><td>高</td><td>实施中</td></tr>\n<tr><td>REQ-004</td><td>物料主数据单一写入点（MDG）</td><td>数据架构师</td><td>数据</td><td>Phase C数据</td><td>最高</td><td>MDG上线</td></tr>\n<tr><td>REQ-005</td><td>MES系统统一为单一平台（8工厂）</td><td>生产总监</td><td>业务</td><td>Phase C应用、D</td><td>高</td><td>实施中</td></tr>\n<tr><td>REQ-006</td><td>所有系统集成通过CPI，禁止数据库直连</td><td>IT总监</td><td>技术</td><td>Phase D</td><td>高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-007</td><td>泰国工厂数据不出境（本地存储+加密）</td><td>泰国GM</td><td>合规</td><td>Phase D</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-008</td><td>一线工人操作必须支持移动端</td><td>工人代表</td><td>可用性</td><td>Phase C应用</td><td>中</td><td>规划中</td></tr>\n<tr><td>REQ-009</td><td>S/4HANA自定义代码不超过现有Z程序的20%</td><td>CAE</td><td>技术</td><td>Phase C应用</td><td>高</td><td>监控中</td></tr>\n<tr><td>REQ-010</td><td>生产排程精度提升，停线率降低50%</td><td>生产总监</td><td>业务</td><td>Phase B、C应用</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-011</td><td>系统可用性≥99.9%（8.7小时/年停机预算）</td><td>IT总监</td><td>技术</td><td>Phase D</td><td>最高</td><td>架构设计完成</td></tr>\n<tr><td>REQ-012</td><td>比亚迪EDI直连（850/856/810报文）</td><td>客户关系</td><td>业务</td><td>Phase C应用（H阶段新增）</td><td>高</td><td>新需求（H阶段）</td></tr>\n<tr><td>REQ-013</td><td>AI辅助生产排程</td><td>生产总监</td><td>业务</td><td>Phase E → 新循环</td><td>中</td><td>评估中</td></tr>\n<tr><td>REQ-014</td><td>IATF 16949数字化认证支持</td><td>质量总监</td><td>合规</td><td>Phase B、C应用</td><td>高</td><td>规划中</td></tr>\n<tr><td>REQ-015</td><td>集团统一采购询价平台（降低采购成本）</td><td>CFO</td><td>业务</td><td>Phase C应用</td><td>中</td><td>规划中（下一循环）</td></tr>\n</table></div>"}, "LA_1": {"type": "reading", "title": "📖 项目背景：华辉现状 & 五大核心痛点", "html": "<h2 id=\"第一章-项目背景与战略挑战\">第一章：项目背景与战略挑战</h2>\n<h3 id=\"1-1-公司概况\">1.1 公司概况</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>公司名称</td><td>华辉电器照明股份有限公司（FSL）</td></tr>\n<tr><td>股票代码</td><td>A股 （代码脱敏）（1993年深交所上市，照明行业第一家上市企业）</td></tr>\n<tr><td>行业定位</td><td>照明行业 Tier 1，中华老字号品牌</td></tr>\n<tr><td>2025年营收</td><td>约88亿元</td></tr>\n<tr><td>扣非净利率</td><td><strong>0.95%</strong>（行业底部；欧普照明13.2%）</td></tr>\n<tr><td>综合毛利率</td><td>17.6%（欧普39.1%，差距21.5pp）</td></tr>\n<tr><td>员工规模</td><td>约12,000人</td></tr>\n<tr><td>法人数量</td><td><strong>19家</strong>（含泰国FZ40、德国FZ33境外实体）</td></tr>\n<tr><td>ERP现状</td><td>SAP ECC 6.0，<strong>2008年上线，已运行17年</strong></td></tr>\n<tr><td>上线模块</td><td>FICO · SD · MM · PP · QM · WM</td></tr>\n<tr><td>未启用模块</td><td>信用管理 · 标准成本估算 · MRP（形同虚设）</td></tr>\n<tr><td>项目预算</td><td><strong>约千万元级</strong>（含税6%，全包价）</td></tr>\n<tr><td>项目工期</td><td><strong>240日历天</strong>（2026年5月29日启动，目标2027年Q1上线）</td></tr>\n<tr><td>实施商（SI）</td><td>远景数字科技（实施商），中国COO吴志远</td></tr>\n</table></div>\n<h3 id=\"1-2-与行业标杆对比-触发本次EA项目的核心数据-\">1.2 与行业标杆对比（触发本次EA项目的核心数据）</h3>\n<div class=\"tbl\"><table>\n<tr><th>指标</th><th>华辉照明</th><th>欧普照明</th><th>阳光照明</th><th>Signify（全球）</th><th>华辉差距</th></tr>\n<tr><td>营业利润率</td><td>2.2%</td><td>10.8%</td><td>7.1%</td><td>8.9%</td><td><strong>-8.6pp</strong> vs 欧普</td></tr>\n<tr><td>综合毛利率</td><td>17.6%</td><td>39.1%</td><td>32.7%</td><td>40.1%</td><td><strong>-21.5pp</strong> vs 欧普</td></tr>\n<tr><td>应收周转天数</td><td><strong>147天</strong></td><td>37天</td><td>94天</td><td>51天</td><td><strong>欧普的4倍</strong></td></tr>\n<tr><td>库存周转天数</td><td><strong>99.6天</strong></td><td>44.6天</td><td>154天</td><td>97天</td><td><strong>欧普的2.2倍</strong></td></tr>\n<tr><td>数字化成熟度</td><td>L1.5/5</td><td>L3-4/5</td><td>L2/5</td><td>L5/5</td><td><strong>差距极大</strong></td></tr>\n<tr><td>ERP系统</td><td>ECC 6.0（2008年）</td><td>S/4HANA已升级</td><td>S/4HANA</td><td>现代化</td><td><strong>行业唯一ECC</strong></td></tr>\n<tr><td>月结关账</td><td>约7-8天</td><td>约3天</td><td>—</td><td>—</td><td>目标缩短至≤3天</td></tr>\n<tr><td>销售预测准确率</td><td><strong>30-40%</strong></td><td>~70%</td><td>—</td><td>—</td><td>差距30pp+</td></tr>\n</table></div>\n<h3 id=\"1-3-五大核心痛点-基于175条调研需求-2026年访谈确认-\">1.3 五大核心痛点（基于175条调研需求，2026年访谈确认）</h3>\n<div class=\"tbl\"><table>\n<tr><th>#</th><th>痛点名称</th><th>具体表现</th><th>量化影响</th><th>严重程度</th></tr>\n<tr><td>P1</td><td><strong>主数据治理缺失</strong></td><td>物料主数据6.2万条（仅2024年），一物多码，7个写入点，无MDG平台，各部门各自创建</td><td>MRP无法运行，成本分析失真，质量追溯断链</td><td>🔴 严重</td></tr>\n<tr><td>P2</td><td><strong>MRP形同虚设</strong></td><td>销售预测准确率30-40%，BOM维护不及时（EBOM→MBOM手工转换），3.7万条BOM结构（2024年）</td><td>库存积压与缺货并存，停线风险，年度经营损失难以量化</td><td>🔴 严重</td></tr>\n<tr><td>P3</td><td><strong>成本核算粗放</strong></td><td>标准成本通过OA线下手工估算，物料账运行7-8小时，关订单2-3小时，无法产品线盈利分析</td><td>无法识别亏损产品线，成本决策依赖直觉，净利率长期处于行业底部</td><td>🔴 严重</td></tr>\n<tr><td>P4</td><td><strong>信用管控空白</strong></td><td>信用管理功能<strong>未启用</strong>，台账式管理，应收账款周转147天（欧普37天）</td><td>潜在坏账风险高，营销口径与财务口径不统一，现金流恶化（2025年经营现金流同比-50%）</td><td>🟡 重要</td></tr>\n<tr><td>P5</td><td><strong>系统集成断裂</strong></td><td>18套外围系统，37个点对点接口，WMS/MES数据不实时，SRM接口尾差，CRM系统未集成SAP</td><td>跨系统数据不一致，业务决策依赖手工数据，集团合并报表须系统外手工抵消</td><td>🟡 重要</td></tr>\n</table></div>\n<h3 id=\"1-4-项目范围定义\">1.4 项目范围定义</h3>\n<p><strong>19家法人清单（部分）：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>法人代码</th><th>名称</th><th>类型</th><th>特殊要求</th></tr>\n<tr><td>FZ40</td><td>华辉照明（泰国）光电科技</td><td>境外制造</td><td>泰铢本位币·增值税7%·e-Tax Invoice</td></tr>\n<tr><td>FZ33</td><td>德国销售公司</td><td>境外销售</td><td>欧元·欧盟CBAM碳报告·VAT</td></tr>\n<tr><td>FZ22</td><td>华辉智达</td><td>国内子公司</td><td>需集成</td></tr>\n<tr><td>FZ29</td><td>华辉海南</td><td>国内子公司</td><td>需集成</td></tr>\n<tr><td>FZ36</td><td>华辉茂名</td><td>国内子公司</td><td>需集成</td></tr>\n<tr><td>海辉</td><td>浙江海辉（船舶照明）</td><td>国内子公司</td><td>现用<strong>用友U8</strong>，项目型制造，需迁移</td></tr>\n<tr><td>航辉</td><td>航辉助航科技（航空照明）</td><td>国内子公司</td><td>项目型制造，30%定制化</td></tr>\n<tr><td>北区</td><td>北区分公司</td><td>国内生产基地</td><td>已D9专程调研</td></tr>\n<tr><td>总部</td><td>华辉电器照明总部</td><td>母公司</td><td>主系统</td></tr>\n</table></div>\n<p><strong>S/4HANA实施模块范围：</strong> FICO · SD · MM · PP · QM · EWM（WM升级）· Group Reporting · MDG · CPI · DRC</p>\n<p><strong>不替换系统（CPI集成）：</strong> PLM · OA · MES · WMS · SRM · CRM · OMS（电商OMS平台/电商OMS平台B）· 财务共享 · 电商 · 合同管理 · 防伪防串</p>\n<hr>"}, "LA_2": {"type": "reading", "title": "📖 Preliminary — 12条架构原则 & Architecture Board", "html": "<h2 id=\"第二章-Preliminary-Phase-架构能力建设\">第二章：Preliminary Phase — 架构能力建设</h2>\n<h3 id=\"2-1-架构团队构成\">2.1 架构团队构成</h3>\n<div class=\"tbl\"><table>\n<tr><th>角色</th><th>人员</th><th>单位</th><th>职责</th></tr>\n<tr><td>赞助人（Sponsor）</td><td>张建国</td><td>华辉董事长</td><td>最终决策·董事会汇报</td></tr>\n<tr><td>业务决策者</td><td>李明远</td><td>华辉总经理</td><td>经营目标确认·资源保障</td></tr>\n<tr><td>财务架构决策</td><td>王雪梅</td><td>副总经理兼财务负责人</td><td>Group Reporting·合并报表·成本核算设计</td></tr>\n<tr><td>项目主持人</td><td>陈大华</td><td>副总经理（甲方项目主持）</td><td>进度推进·变革管理·里程碑决策</td></tr>\n<tr><td>甲方项目经理</td><td>刘建平</td><td>数智化部</td><td>日常协调·技术对接·资料授权</td></tr>\n<tr><td>乙方PM</td><td>吴志远</td><td>远景数字中国COO</td><td>实施交付·团队管理·客户沟通</td></tr>\n<tr><td>架构质量监督</td><td>SAP AE</td><td>SAP SE</td><td>架构合规·商机管控·品牌维护</td></tr>\n<tr><td>纪委/内控代表</td><td>周国强</td><td>党委委员·纪委书记</td><td>权限设计·审计追踪·内控合规</td></tr>\n</table></div>\n<h3 id=\"2-2-架构委员会-Architecture-Board-\">2.2 架构委员会（Architecture Board）</h3>\n<div class=\"tbl\"><table>\n<tr><th>成员</th><th>角色</th><th>权限</th></tr>\n<tr><td>张建国</td><td>赞助人（最终批准）</td><td>范围/预算重大变更·项目终止</td></tr>\n<tr><td>李明远</td><td>业务最高决策</td><td>业务架构方向·优先级裁决</td></tr>\n<tr><td>王雪梅</td><td>财务架构决策</td><td>财务模块设计·Group Reporting·成本方案</td></tr>\n<tr><td>陈大华</td><td>项目推进主导</td><td>里程碑批准·资源协调·日常架构决策</td></tr>\n<tr><td>吴志远</td><td>实施执行方</td><td>实施方案提交·偏差申请</td></tr>\n<tr><td>刘建平</td><td>技术执行</td><td>技术选型建议·基础设施决策</td></tr>\n<tr><td>SAP AE</td><td>质量监督（无表决权）</td><td>架构评审·合规审查·商机论证</td></tr>\n</table></div>\n<p><strong>Board会议机制：</strong> 月度例会（每月第三周周四）+ 里程碑特别会议 + 紧急会议（48小时内）</p>\n<h3 id=\"2-3-架构原则目录-Architecture-Principles-Catalog-\">2.3 架构原则目录（Architecture Principles Catalog）</h3>\n<blockquote><p>基于华辉具体情况制定，针对性解决17年ECC积累的结构性问题</p></blockquote>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>原则名称</th><th>类别</th><th>Statement（陈述）</th><th>Rationale（理由）</th><th>Implications（影响）</th></tr>\n<tr><td>BP-01</td><td>业务驱动数字化</td><td>业务原则</td><td>所有S/4HANA配置决策必须有可量化的业务价值依据</td><td>约千万元级是华辉近年最大IT投资，必须与净利率提升直接挂钩</td><td>需求方需提供业务影响评估；IT需求与业务KPI绑定</td></tr>\n<tr><td>BP-02</td><td>集团管控优于法人自治</td><td>业务原则</td><td>集团统一政策（科目表/主数据标准/审批流程）优先于各法人本地习惯</td><td>19家法人各自为政是合并报表手工操作的根本原因</td><td>各子公司业务流程需向集团标准对齐，本地例外须Board批准</td></tr>\n<tr><td>BP-03</td><td>全球合规内嵌设计</td><td>业务原则</td><td>泰国、德国的本地税务合规能力必须在架构设计阶段内嵌，不得事后补丁</td><td>DRC泰国版本在PCE上的部署有前置条件，事后改造成本是设计阶段5倍</td><td>泰国/德国法人设计必须与本地合规顾问确认后方可冻结蓝图</td></tr>\n<tr><td>BP-04</td><td>财务透明化是最高优先级</td><td>业务原则</td><td>架构设计必须支撑管理层在月初T+3获得集团完整P&amp;L</td><td>扣非净利率0.95%，管理层无法识别亏损产品线，决策失据</td><td>Group Reporting和利润中心必须是第一批上线的核心模块</td></tr>\n<tr><td>IS-01</td><td>数据权威单一来源</td><td>信息系统原则</td><td>每个主数据实体有且只有一个权威系统（MDG），其他系统只读</td><td>物料主数据6.2万条、7个写入点是MRP失效和成本失真的根源</td><td>需重设所有业务系统的主数据写入权限，实施周期内需专项数据清洗</td></tr>\n<tr><td>IS-02</td><td>PLM-ERP-MES自动贯通</td><td>信息系统原则</td><td>EBOM到MBOM的转换必须通过系统自动接口，禁止手工录入</td><td>手工转换BOM是计划失效和新产品延迟的直接原因，3.7万条BOM靠手工维护</td><td>PLM与S/4HANA的CPI接口设计是蓝图冻结的前提条件</td></tr>\n<tr><td>IS-03</td><td>接口标准化（禁止点对点）</td><td>信息系统原则</td><td>所有外围系统集成必须通过SAP CPI，禁止直接数据库连接或文件传输</td><td>37个点对点接口是当前数据不实时的根本原因，也是技术债的主要来源</td><td>现有37个接口需在CPI上重建，估计工期影响：每个接口2-4周</td></tr>\n<tr><td>IS-04</td><td>标准功能优先，定制需授权</td><td>信息系统原则</td><td>优先使用S/4HANA标准功能；自定义开发（ABAP/Z程序）须Board书面批准</td><td>ECC 17年积累大量Z程序，是技术债的主要来源，也是Greenfield最大风险</td><td>Z程序总量须通过SAP Custom Code扫描确认，迁移清单须在蓝图前确定</td></tr>\n<tr><td>IS-05</td><td>数据质量是上线前置条件</td><td>信息系统原则</td><td>主数据清洗准确率须达到100%（静态数据），财务期初账账相符才能上线</td><td>脏数据上线到S/4HANA将导致MRP继续失效，验收硬性门槛来自合同要求</td><td>数据清洗需3轮迭代，须在蓝图阶段启动，不能留到上线前</td></tr>\n<tr><td>TP-01</td><td>PCE云优先</td><td>技术原则</td><td>目标架构采用SAP S/4HANA PCE（私有云），不再续建On-premise基础设施</td><td>PCE是合同约定的部署方式，也是规避17年技术债的最优路径</td><td>IT团队从&quot;硬件运维&quot;转型为&quot;业务配置管理&quot;，需要专项能力建设</td></tr>\n<tr><td>TP-02</td><td>高可用99.9%设计</td><td>技术原则</td><td>核心生产系统（S/4HANA + MES关键接口）可用性目标99.9%</td><td>任何单点故障将影响19家法人的业务运营，财务关账无法容忍系统中断</td><td>需要灾备架构设计和详细的切换回滚方案</td></tr>\n<tr><td>TP-03</td><td>安全等级保护合规</td><td>技术原则</td><td>系统安全须满足信息安全等级保护要求，覆盖物理/网络/系统/应用/管理五层</td><td>合同验收硬性要求；上市公司信息安全合规监管要求</td><td>需要第三方安全评估，权限矩阵设计须与纪委/内审对齐</td></tr>\n</table></div>\n<h3 id=\"2-4-ADM-定制-针对华辉18周咨询-8个月实施-\">2.4 ADM 定制（针对华辉18周咨询+8个月实施）</h3>\n<div class=\"tbl\"><table>\n<tr><th>定制项</th><th>标准 TOGAF ADM</th><th>华辉定制版</th><th>原因</th></tr>\n<tr><td>项目结构</td><td>单一 ADM 循环</td><td><strong>双阶段结构</strong>：第一期18周（咨询/Preliminary→F）+ 第二期8个月（实施/Phase G）</td><td>合同结构决定，咨询期产出路线图，实施期落地</td></tr>\n<tr><td>Phase C 顺序</td><td>先 Data 后 Application</td><td>维持标准顺序（先数据后应用）</td><td>主数据治理是最紧迫问题，优先完成</td></tr>\n<tr><td>Phase G 粒度</td><td>项目级监督</td><td>增加<strong>付款里程碑驱动</strong>的架构评审节点</td><td>合同付款与架构质量门控绑定，4个付款批次对应4个质量检查点</td></tr>\n<tr><td>需求管理工具</td><td>文档化</td><td>使用 175 条调研需求作为需求基线，按优先级P1/P2/P3管理</td><td>已有175条真实需求，直接作为RM输入</td></tr>\n<tr><td>泰国/德国处理</td><td>统一处理</td><td>作为独立的架构<strong>约束（Constraint）</strong>单独跟踪</td><td>境外合规需专项验证，不能并入通用流程</td></tr>\n</table></div>\n<h3 id=\"2-5-Preliminary-Phase-交付物清单\">2.5 Preliminary Phase 交付物清单</h3>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>描述</th><th>责任方</th><th>状态</th></tr>\n<tr><td>Architecture Principles Catalog</td><td>12条架构原则（含5要素）</td><td>吴志远/SAP AE</td><td>✅ 已批准</td></tr>\n<tr><td>Architecture Board Charter</td><td>委员会章程、会议机制、权限矩阵</td><td>陈大华主导</td><td>✅ 已批准</td></tr>\n<tr><td>项目章程（Project Charter）</td><td>范围/目标/里程碑/资源计划</td><td>远景数字</td><td>✅ 已签署</td></tr>\n<tr><td>Tailored ADM 说明</td><td>双阶段ADM定制说明</td><td>SAP AE</td><td>✅ 已批准</td></tr>\n<tr><td>干系人通讯录与组织架构</td><td>19家法人关键联系人清单</td><td>刘建平</td><td>✅ 已提供</td></tr>\n<tr><td>数据访问授权书</td><td>财务/BOM/主数据/Z程序代码访问权限</td><td>陈大华签署</td><td>✅ 已签署</td></tr>\n<tr><td>SAP Custom Code 扫描计划</td><td>Z程序扫描工具部署方案</td><td>数智化部BASIS</td><td>🔄 进行中</td></tr>\n</table></div>\n<hr>"}, "LA_3": {"type": "reading", "title": "📖 Phase A — 利益相关者矩阵 & 架构愿景", "html": "<h2 id=\"第三章-Phase-A-架构愿景-Architecture-Vision-\">第三章：Phase A — 架构愿景（Architecture Vision）</h2>\n<h3 id=\"3-1-利益相关者分析矩阵\">3.1 利益相关者分析矩阵</h3>\n<div class=\"tbl\"><table>\n<tr><th>干系人</th><th>角色</th><th>权力</th><th>兴趣</th><th>主要关切（来自访谈问卷）</th><th>参与策略</th></tr>\n<tr><td><strong>张建国</strong></td><td>董事长·赞助人</td><td>H</td><td>M</td><td>项目ROI·净利率改善·董事会汇报·投资回收期</td><td>Keep Satisfied：月度1页纸摘要，里程碑专题汇报</td></tr>\n<tr><td><strong>李明远</strong></td><td>总经理·业务主导</td><td>H</td><td>H</td><td>分业务线毛利率透明·DSO实时监控·部门配合保障（问卷A2/A3/C1）</td><td>Manage Closely：双周进度会·关键决策参与</td></tr>\n<tr><td><strong>王雪梅</strong></td><td>财务负责人</td><td>H</td><td>H</td><td>合并报表效率（19法人）·成本核算精细化·Group Reporting（问卷A1/D1）</td><td>Manage Closely：财务模块所有设计决策参与</td></tr>\n<tr><td><strong>陈大华</strong></td><td>项目主持人</td><td>H</td><td>H</td><td>项目推进机制·变革管理·关键用户配合·上线时间窗口（问卷A1/B1/D1）</td><td>Manage Closely：周例会·里程碑批准</td></tr>\n<tr><td><strong>刘建平</strong></td><td>数智化部/甲方PM</td><td>M</td><td>H</td><td>PCE运维能力建设·系统稳定性·Z程序扫描（问卷C2）</td><td>Keep Informed：技术方案所有阶段参与</td></tr>\n<tr><td><strong>周国强</strong></td><td>纪委书记</td><td>M</td><td>M</td><td>权限职责分离·审计追踪·采购合规（问卷A1/A3/B1）</td><td>Keep Informed：权限矩阵设计参与</td></tr>\n<tr><td><strong>吴志远</strong></td><td>远景数字PM</td><td>L</td><td>H</td><td>项目按时交付·范围控制·人员稳定性（合同5%违约金条款）</td><td>Keep Informed：架构评审执行</td></tr>\n<tr><td><strong>赵明辉</strong></td><td>副总经理（业务）</td><td>M</td><td>H</td><td>分管业务KPI数据来源·跨部门协同断点（问卷A1/B1）</td><td>Keep Informed：业务流程工作坊</td></tr>\n<tr><td><strong>孙志强</strong></td><td>总经理特助</td><td>M</td><td>M</td><td>高管决策数据支撑·跨部门信息流转效率（问卷A1/B1）</td><td>Monitor：管理报表需求收集</td></tr>\n<tr><td><strong>北区分公司（李建军）</strong></td><td>分公司负责人</td><td>L</td><td>H</td><td>分公司与总部系统差异·本地IT能力（专程D9调研）</td><td>Keep Informed：分公司专项访谈</td></tr>\n</table></div>\n<h3 id=\"3-2-架构愿景声明\">3.2 架构愿景声明</h3>\n<blockquote><p><strong>&quot;以SAP S/4HANA PCE为数字核心，构建&#x27;541智慧华辉&#x27;，覆盖19家法人，实现月结T+3、库存周转≤75天、应收周转≤90天，支撑华辉从0.95%净利率向行业均值迈进。&quot;</strong></p></blockquote>\n<p><strong>高层目标架构概念图：</strong></p>\n<pre><code>┌─────────────────────────────────────────────────────────────────┐\n│                 华辉数字化转型目标架构（TO-BE，2027年Q1）           │\n├─────────────────────────────────────────────────────────────────┤\n│ 决策层  │ 管理驾驶舱（SAC，二期）：L1董事会KPI / L2事业部P&amp;L / L3实时运营 │\n├─────────────────────────────────────────────────────────────────┤\n│ 应用层  │ SAP S/4HANA PCE（19家法人统一实例）                          │\n│         │ FICO·SD·MM·PP·QM·EWM·Group Reporting·MDG·DRC            │\n├─────────────────────────────────────────────────────────────────┤\n│ 集成层  │ SAP CPI（统一集成总线，替代37个点对点接口）                   │\n├─────────────────────────────────────────────────────────────────┤\n│ 外围层  │ PLM │ MES │ WMS │ CRM │ OMS │ OA │ 财务共享 │ 司库      │\n│         │ 泰国DRC │ 德国DRC │ 控股集团共享                           │\n├─────────────────────────────────────────────────────────────────┤\n│ 基础层  │ SAP PCE私有云（SAP托管）+ 本地网络 + VPN（泰国/德国）        │\n└─────────────────────────────────────────────────────────────────┘</code></pre>\n<h3 id=\"3-3-价值链图-Value-Chain-Diagram-\">3.3 价值链图（Value Chain Diagram）</h3>\n<pre><code>主要活动（Primary Activities）\n─────────────────────────────────────────────────────────────────────\n研发设计        采购管理        生产制造        销售渠道        财务结算\nPLM→MBOM        MM·SRM          PP·MES·QM       SD·OMS·CRM      FICO·Group\n⚠BOM手工转换   ⚠SRM接口尾差    ⚠MRP失效        ⚠信用未启用     ⚠月结7-8天\n→PLM-CPI→ERP   →CPI优化        →MDG+MRP Live   →信用管理       →月结T+3\n\n─────────────────────────────────────────────────────────────────────\n支持活动（Support Activities）\n─────────────────────────────────────────────────────────────────────\n集团财务管控（Group Reporting·19法人合并）        ⚠手工抵消  →自动化\n主数据治理（MDG·物料/客户/供应商/财务科目）        ⚠多头维护  →单一写入\nIT基础设施（SAP PCE + CPI集成平台）               ⚠On-premise →PCE云化\n海外合规（DRC·泰国+德国·CBAM）                    ⚠系统空白   →DRC全覆盖\n数字化组织（数智化部能力建设）                     ⚠运维导向  →数字化转型\n─────────────────────────────────────────────────────────────────────</code></pre>\n<h3 id=\"3-4-Statement-of-Architecture-Work-架构工作说明书-摘要\">3.4 Statement of Architecture Work（架构工作说明书）摘要</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>项目名称</td><td>华辉照明业务诊断咨询及SAP系统升级实施</td></tr>\n<tr><td>批准日期</td><td>2026年5月29日（合同签订日）</td></tr>\n<tr><td>批准人</td><td>张建国（董事长）</td></tr>\n<tr><td>架构工作范围</td><td>全四域（业务/应用/数据/技术架构），19家法人</td></tr>\n<tr><td>时间范围</td><td>2026年5月29日 — 2027年3月（240日历天）</td></tr>\n</table></div>\n<p><strong>约束条件（Constraints）：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>约束</th><th>来源</th></tr>\n<tr><td>C-01</td><td>项目总预算不超过约千万元级</td><td>合同硬性约束</td></tr>\n<tr><td>C-02</td><td>SAP ECC主流维护2027年结束，必须在此前完成迁移</td><td>SAP政策</td></tr>\n<tr><td>C-03</td><td>生产系统切换窗口仅限春节停产期（2027年1月下旬）</td><td>生产运营要求</td></tr>\n<tr><td>C-04</td><td>泰国数据必须符合当地数据主权要求</td><td>泰国法规</td></tr>\n<tr><td>C-05</td><td>实际实施人员必须与投标文件完全一致（违约金5%）</td><td>招标文件强制要求</td></tr>\n<tr><td>C-06</td><td>上线前必须完成3年免费维保期承诺</td><td>合同验收条款</td></tr>\n<tr><td>C-07</td><td>控股集团共享/司库系统边界须在蓝图前明确</td><td>股东关系特殊性</td></tr>\n</table></div>\n<h3 id=\"3-5-Phase-A-交付物清单\">3.5 Phase A 交付物清单</h3>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>对应★指标</th><th>状态</th></tr>\n<tr><td>Architecture Vision Document</td><td>—</td><td>✅ 已批准</td></tr>\n<tr><td>Statement of Architecture Work</td><td>—</td><td>✅ 已批准</td></tr>\n<tr><td>利益相关者图谱（10人矩阵）</td><td>—</td><td>✅ 已完成</td></tr>\n<tr><td>价值链图（L1-L2业务流程）</td><td>★3业务架构报告前置</td><td>✅ 已完成</td></tr>\n<tr><td>解决方案概念图（TOB架构草图）</td><td>★6数字化路线图前置</td><td>✅ 已完成</td></tr>\n<tr><td>初始架构需求规格框架</td><td>★1痛点清单对接</td><td>🔄 进行中</td></tr>\n</table></div>\n<hr>"}, "LA_4": {"type": "reading", "title": "📖 Phase B — 业务能力图·五大流程诊断·Gap分析", "html": "<h2 id=\"第四章-Phase-B-业务架构-Business-Architecture-\">第四章：Phase B — 业务架构（Business Architecture）</h2>\n<h3 id=\"4-1-业务能力地图-三级-含成熟度评分-\">4.1 业务能力地图（三级，含成熟度评分）</h3>\n<div class=\"tbl\"><table>\n<tr><th>一级能力</th><th>二级能力</th><th>三级能力示例</th><th>当前成熟度</th><th>目标成熟度</th></tr>\n<tr><td><strong>1. 研发设计</strong></td><td>1.1 产品设计</td><td>BOM创建·设计变更</td><td>L2</td><td>L4</td></tr>\n<tr><td></td><td>1.2 BOM管理</td><td>EBOM→MBOM转换·版本管理</td><td><strong>L1</strong>（手工）</td><td>L4</td></tr>\n<tr><td></td><td>1.3 技术成本核算</td><td>研发费用归集·试产成本分离</td><td>L1</td><td>L3</td></tr>\n<tr><td><strong>2. 采购管理</strong></td><td>2.1 需求计划</td><td>MRP驱动采购建议</td><td><strong>L1</strong>（MRP失效）</td><td>L4</td></tr>\n<tr><td></td><td>2.2 供应商管理</td><td>供应商评级·VMI·JIT</td><td>L2</td><td>L3</td></tr>\n<tr><td></td><td>2.3 采购执行</td><td>PO创建·SRM·电子件匹配</td><td>L2</td><td>L4</td></tr>\n<tr><td><strong>3. 生产制造</strong></td><td>3.1 生产计划</td><td>MPS·MRP·产能规划</td><td><strong>L1</strong></td><td>L4</td></tr>\n<tr><td></td><td>3.2 制造执行</td><td>工单下达·MES反馈·批次管理</td><td>L2</td><td>L4</td></tr>\n<tr><td></td><td>3.3 成本核算</td><td>标准成本·实际成本·差异分析</td><td><strong>L1</strong>（手工估算）</td><td>L4</td></tr>\n<tr><td><strong>4. 销售管理</strong></td><td>4.1 订单管理</td><td>ATP·信用检查·定价</td><td>L2（信用未启用）</td><td>L4</td></tr>\n<tr><td></td><td>4.2 渠道管理</td><td>经销商库存·CRM集成</td><td><strong>L1</strong></td><td>L3</td></tr>\n<tr><td></td><td>4.3 海外销售</td><td>多币种·合规·GTS</td><td><strong>L1</strong></td><td>L3</td></tr>\n<tr><td><strong>5. 财务管控</strong></td><td>5.1 会计核算</td><td>凭证处理·月结关账</td><td>L2（7-8天月结）</td><td>L4</td></tr>\n<tr><td></td><td>5.2 集团合并</td><td>19法人合并报表·内部交易消除</td><td><strong>L1</strong>（手工）</td><td>L4</td></tr>\n<tr><td></td><td>5.3 管理会计</td><td>利润中心P&amp;L·成本分析</td><td><strong>L1</strong>（未启用）</td><td>L4</td></tr>\n<tr><td><strong>6. 质量管理</strong></td><td>6.1 来料检验</td><td>IQC·供应商合格率</td><td>L2</td><td>L3</td></tr>\n<tr><td></td><td>6.2 过程质量</td><td>IPQC·批次追溯</td><td>L2（批次未覆盖）</td><td>L4</td></tr>\n<tr><td></td><td>6.3 质量成本</td><td>缺陷成本统计·质量KPI</td><td><strong>L1</strong>（无标准）</td><td>L3</td></tr>\n<tr><td><strong>7. 供应链协同</strong></td><td>7.1 库存管理</td><td>多地点·多批次·EWM</td><td>L2（WM基础）</td><td>L4</td></tr>\n<tr><td></td><td>7.2 产销协调</td><td>S&amp;OP·需求计划</td><td><strong>L1</strong></td><td>L3</td></tr>\n<tr><td></td><td>7.3 物流管理</td><td>仓储作业·配送跟踪</td><td>L2</td><td>L3</td></tr>\n<tr><td><strong>8. 主数据治理</strong></td><td>8.1 物料主数据</td><td>编码规范·视图完整·分类特性</td><td><strong>L1</strong></td><td>L4</td></tr>\n<tr><td></td><td>8.2 客商主数据</td><td>客户/供应商统一编码·信用额度</td><td>L1</td><td>L4</td></tr>\n<tr><td></td><td>8.3 财务主数据</td><td>统一科目表·利润中心层级</td><td>L1</td><td>L4</td></tr>\n<tr><td><strong>9. 海外运营</strong></td><td>9.1 泰国合规</td><td>泰铢本位币·增值税7%·e-Tax</td><td><strong>L0</strong>（系统不支持）</td><td>L4</td></tr>\n<tr><td></td><td>9.2 德国合规</td><td>欧元·欧盟VAT·CBAM</td><td>L1</td><td>L3</td></tr>\n<tr><td></td><td>9.3 集团外汇</td><td>多币种折算·汇率管理</td><td>L1</td><td>L3</td></tr>\n</table></div>\n<h3 id=\"4-2-组织架构图-ASCII-\">4.2 组织架构图（ASCII）</h3>\n<pre><code>华辉电器照明股份有限公司（A股上市）\n            │\n    ┌───────┼───────────────────────────────┐\n集团职能中心  │                              事业部群\n            │\n集团财务部   集团研究院    数智化部     家用事业部   车灯事业部\n（虎/高部长）（许志远院长）（刘建平）    （郑建华）   （李传勤）\n                                      商用事业部   国际事业部\n                                      供应链中心   电商事业部\n                                      质量客服中心\n\n生产基地：佛山总部 / 北区分公司（李建军）\n分子公司：航辉航空照明 / 海辉（用友U8） / 浙江 / 广东（FZ22/29/36等）\n境外法人：泰国FZ40（北榄府，泰铢本位币）/ 德国FZ33（欧元）</code></pre>\n<h3 id=\"4-3-核心业务流程-AS-IS-诊断-五大流程-\">4.3 核心业务流程 AS-IS 诊断（五大流程）</h3>\n<div class=\"tbl\"><table>\n<tr><th>流程</th><th>当前断点</th><th>量化影响</th><th>根因</th></tr>\n<tr><td><strong>OTC 订单到收款</strong></td><td>①信用管理未启用 ②OA审批定价7-8天 ③WMS库存不准 ④应收手工对账 ⑤CRM系统未集成</td><td>应收周转147天（欧普37天），销售预测准确率30-40%</td><td>SD信用管理功能未配置；CRM与SAP无接口</td></tr>\n<tr><td><strong>PTP 采购到付款</strong></td><td>①SRM接口尾差导致无法清账 ②电子件无法最低价自动匹配 ③有色金属价格无法实时联动 ④供应商财务视图维护2-3天滞后</td><td>采购异常结算频繁，关账效率低</td><td>SRM-SAP接口技术问题；主数据不一致</td></tr>\n<tr><td><strong>MTP 制造到产品</strong></td><td>①MRP基本无法运行 ②EBOM→MBOM手工转换 ③物料账运行7-8小时 ④关订单2-3小时 ⑤车灯约20%收货无PO</td><td>库存周转99.6天（欧普44.6天），月结关账占用大量人力</td><td>主数据质量差（6.2万物料，多头维护）；BOM维护不及时</td></tr>\n<tr><td><strong>RTC 研发到量产</strong></td><td>①PLM与ERP断层（2025年新上线PLM，尚无接口）②BOM变更不及时拉通定价/成本 ③研发费用核算粗放</td><td>新产品上市延迟，研发加计抵扣存在认定风险</td><td>PLM-ERP接口设计缺失</td></tr>\n<tr><td><strong>FTC 财务到关账</strong></td><td>①月结7-8天（物料账+关订单）②19法人合并报表手工抵消 ③标准成本系统外OA估算 ④利润中心未启用 ⑤子公司（海辉用友U8）不统一</td><td>管理层月初无法获得完整P&amp;L，决策滞后</td><td>系统性能老化；合并工具缺失；主数据不统一</td></tr>\n</table></div>\n<h3 id=\"4-4-业务架构差距分析-Gap-Analysis-\">4.4 业务架构差距分析（Gap Analysis）</h3>\n<div class=\"tbl\"><table>\n<tr><th>业务能力</th><th>AS-IS（当前）</th><th>TO-BE（目标）</th><th>差距类型</th><th>优先级</th><th>对应工作包</th></tr>\n<tr><td>集团合并报表</td><td>Excel手工，19法人逐一抵消</td><td>Group Reporting自动合并，T+3</td><td><strong>新增</strong></td><td>P1</td><td>WP3 FICO/GR</td></tr>\n<tr><td>物料主数据治理</td><td>7个写入点，无MDG，一物多码</td><td>MDG单一写入点，主数据委员会</td><td><strong>新增</strong></td><td>P1</td><td>WP1 MDG</td></tr>\n<tr><td>MRP计划运行</td><td>基本无法运行（BOM/主数据质量）</td><td>MRP Live正常运行，预测准确≥65%</td><td><strong>迁移（增强）</strong></td><td>P1</td><td>WP5 MM/PP</td></tr>\n<tr><td>信用管理</td><td>功能未启用，台账式管理</td><td>SAP标准信用管理，按客户/渠道管控</td><td><strong>新增</strong></td><td>P1</td><td>WP4 SD</td></tr>\n<tr><td>泰国本位币合规</td><td>ECC不支持泰铢/泰国税制</td><td>S/4HANA泰国版本+DRC泰国模块</td><td><strong>新增</strong></td><td>P1</td><td>WP9 海外</td></tr>\n<tr><td>利润中心P&amp;L</td><td>利润中心未启用，无事业部管理报告</td><td>利润中心层级设计，事业部P&amp;L实时可见</td><td><strong>新增</strong></td><td>P1</td><td>WP3 FICO</td></tr>\n<tr><td>BOM自动贯通</td><td>EBOM→MBOM手工转换，无接口</td><td>PLM→CPI→S/4HANA自动传递MBOM</td><td><strong>新增</strong></td><td>P1</td><td>WP7 CPI</td></tr>\n<tr><td>仓储管理（WM→EWM）</td><td>WM基础仓储，无高级功能</td><td>EWM：批次/序列号/先进先出/移动设备</td><td><strong>迁移（升级）</strong></td><td>P2</td><td>WP6 QM/EWM</td></tr>\n<tr><td>成本核算精细化</td><td>标准成本手工OA估算，月末差异分析</td><td>SAP成本估算+Material Ledger实际成本</td><td><strong>迁移（增强）</strong></td><td>P2</td><td>WP3 FICO</td></tr>\n<tr><td>采购集成</td><td>SRM接口尾差，电子件匹配手工</td><td>CPI重建SRM接口，消除尾差</td><td><strong>迁移（修复）</strong></td><td>P2</td><td>WP7 CPI</td></tr>\n<tr><td>德国CBAM合规</td><td>无碳排放追踪能力</td><td>DRC德国版本+碳足迹数据架构（二期）</td><td><strong>新增</strong></td><td>P2</td><td>WP8/二期</td></tr>\n<tr><td>经销商管理</td><td>月度人工盘库上报，无实时可见性</td><td>经销商门户+SAP电商集成</td><td><strong>新增</strong></td><td>P3</td><td>WP4 SD</td></tr>\n<tr><td>海辉/航辉项目型制造</td><td>无按项目收入/成本管理</td><td>S/4HANA Project System（PS）或行业方案</td><td><strong>新增</strong></td><td>P2</td><td>WP3/特殊</td></tr>\n<tr><td>现有FICO/SD/MM/PP/QM</td><td>ECC 6.0，多年Z程序积累</td><td>Greenfield重建，Z程序评估后精简</td><td><strong>迁移（重建）</strong></td><td>P1</td><td>WP2/3/4/5/6</td></tr>\n<tr><td>质量追溯链路</td><td>批次管理未全面覆盖，多处数据分散</td><td>SAP QM+批次管理+MES集成</td><td><strong>迁移（增强）</strong></td><td>P2</td><td>WP6 QM</td></tr>\n</table></div>\n<h3 id=\"4-5-SWOT分析-基于诊断报告数据-\">4.5 SWOT分析（基于诊断报告数据）</h3>\n<div class=\"tbl\"><table>\n<tr><th>优势（S）</th><th>劣势（W）</th></tr>\n<tr><td>ECC运行17年，核心流程FICO/SD/MM/PP/QM/WM已覆盖</td><td>主数据质量极差（6.2万物料7个写入点，MRP失效）</td></tr>\n<tr><td>照明行业最大企业之一（87.97亿），具备投资能力</td><td>净利率0.95%，远低于欧普13.2%，压力大</td></tr>\n<tr><td>PLM/财务共享2025年已新上线，有数字化基础</td><td>17年Z程序积累，技术债高，迁移工作量大</td></tr>\n<tr><td>车灯事业部增长（+5.63%），新能源汽车机会</td><td>18套外围系统，37个点对点接口，集成混乱</td></tr>\n<tr><td>董事会支持（最大IT投资），项目启动顺利</td><td>数字化成熟度L1.5，组织能力薄弱</td></tr>\n</table></div>\n<div class=\"tbl\"><table>\n<tr><th>机会（O）</th><th>威胁（T）</th></tr>\n<tr><td>SAP S/4HANA Greenfield：彻底甩掉17年技术债</td><td>ECC 2027年主流维护结束，升级窗口紧迫</td></tr>\n<tr><td>Group Reporting：19法人统一管控，月结T+3</td><td>行业同行（欧普/阳光/立达信）已完成S/4HANA升级</td></tr>\n<tr><td>MDG：消灭主数据问题，MRP正常运行，库存改善</td><td>泰国法人现已无法合规运营（本位币/税制缺失）</td></tr>\n<tr><td>泰国/德国合规：支撑国际化扩张战略</td><td>欧盟CBAM 2026年落地，德国法人碳报告风险</td></tr>\n<tr><td>二期扩展：GTS/IBP/SAC/SuccessFactors商机</td><td>远景数字团队关键人员稳定性（违约金条款）</td></tr>\n</table></div>\n<h3 id=\"4-6-Phase-B-交付物清单\">4.6 Phase B 交付物清单</h3>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>对应招标★指标</th><th>状态</th></tr>\n<tr><td>业务架构现状报告（含痛点清单）</td><td><strong>★1 痛点清单</strong></td><td>✅ 诊断报告 已完成</td></tr>\n<tr><td>流程地图 L1-L3（五大端到端流程）</td><td>★3 业务架构报告</td><td>🔄 进行中（调研阶段）</td></tr>\n<tr><td>19法人管控模型设计</td><td>★3</td><td>🔄 设计中</td></tr>\n<tr><td>业务能力地图（AS-IS+TO-BE）</td><td>★3</td><td>🔄 设计中</td></tr>\n<tr><td>差距分析报告（业务域）</td><td>★6 路线图前置</td><td>🔄 设计中</td></tr>\n<tr><td>SWOT分析</td><td>★1</td><td>✅ 完成</td></tr>\n<tr><td>行业标杆对比（四家企业）</td><td>★1</td><td>✅ 完成</td></tr>\n<tr><td>数字化成熟度评估</td><td>★1</td><td>✅ L1.5/5.0</td></tr>\n</table></div>\n<hr>\n<p><em>文档版本：v1.0 | 更新日期：2026年6月 | 基于175条调研需求和18场次访谈数据</em></p>"}, "LA_5": {"type": "reading", "title": "📖 Phase C — 数据架构（主数据问题·CRUD矩阵）", "html": "<h3 id=\"C-1-数据架构-Data-Architecture-\">C.1 数据架构（Data Architecture）</h3>\n<h4 id=\"C-1-1-主数据问题清单-已量化-基于175条调研需求-\">C.1.1 主数据问题清单（已量化，基于175条调研需求）</h4>\n<div class=\"tbl\"><table>\n<tr><th>主数据类型</th><th>当前规模</th><th>写入点数</th><th>核心问题</th><th>业务影响</th><th>严重程度</th></tr>\n<tr><td><strong>物料主数据</strong></td><td><strong>6.2万条</strong>（仅2024年）</td><td><strong>7个</strong></td><td>多部门各自创建（研究院/事业部/分子公司）；编码规则不统一；分类特性未启用；3C认证状态冲突；替代关系未维护</td><td>MRP无法运行；成本分析失真；质量追溯断链</td><td>🔴 严重</td></tr>\n<tr><td><strong>BOM结构</strong></td><td><strong>3.7万条</strong>（2024年）</td><td>多部门</td><td>EBOM→MBOM手工转换；BOM变更未及时拉通定价/成本；齐套检查依赖手工；无版本管理</td><td>MRP失效；计划准确率30-40%；定价滞后</td><td>🔴 严重</td></tr>\n<tr><td><strong>客户主数据</strong></td><td>未单独统计</td><td>多法人</td><td>一客多码（编码规则不规范）；客户分类/分级不完整；信用额度未系统维护</td><td>信用管控缺失；应收周转147天；销售分析失真</td><td>🟡 重要</td></tr>\n<tr><td><strong>供应商主数据</strong></td><td>未单独统计</td><td>多法人</td><td>SRM-ERP接口尾差导致结算异常；财务视图维护滞后2-3天；供应商标签管理缺失</td><td>采购清账异常；紧急采购延迟</td><td>🟡 重要</td></tr>\n<tr><td><strong>财务主数据（GL科目）</strong></td><td>19法人各自维护</td><td>19法人</td><td>各子公司科目体系差异大；利润中心<strong>未启用</strong>；标准成本系统外估算</td><td>合并报表手工；管理分析失真；无法支撑事业部P&amp;L</td><td>🔴 严重</td></tr>\n<tr><td><strong>成本中心/利润中心</strong></td><td>成本中心已配置，利润中心未启用</td><td>1（ECC）</td><td>利润中心层级未设计；无法按事业部分析盈利；考核指标全依赖Excel</td><td>无法识别亏损产品线；净利率长期底部</td><td>🔴 严重</td></tr>\n</table></div>\n<h4 id=\"C-1-2-核心数据实体目录-Data-Entity-Catalog-\">C.1.2 核心数据实体目录（Data Entity Catalog）</h4>\n<div class=\"tbl\"><table>\n<tr><th>数据实体</th><th>英文</th><th>当前系统</th><th>写入点数量</th><th>目标写入点</th><th>迁移策略</th></tr>\n<tr><td>物料主数据</td><td>Material Master</td><td>ECC + 各部门</td><td>7</td><td><strong>1（MDG）</strong></td><td>清洗→迁移至MDG</td></tr>\n<tr><td>BOM结构</td><td>Bill of Materials</td><td>PLM(EBOM) + ECC(MBOM)</td><td>2（手工复制）</td><td>1（自动接口）</td><td>PLM→CPI→S/4HANA</td></tr>\n<tr><td>工艺路线</td><td>Routing</td><td>ECC</td><td>1</td><td>1（S/4HANA）</td><td>直接迁移</td></tr>\n<tr><td>客户主数据</td><td>Customer Master</td><td>ECC + CRM系统</td><td>多个</td><td><strong>1（MDG）</strong></td><td>去重合并→MDG</td></tr>\n<tr><td>供应商主数据</td><td>Vendor/Supplier Master</td><td>ECC + SRM</td><td>2</td><td><strong>1（MDG）</strong></td><td>清洗→MDG</td></tr>\n<tr><td>会计科目表</td><td>Chart of Accounts</td><td>19法人各自</td><td>19</td><td><strong>1（集团科目表）</strong></td><td>统一映射</td></tr>\n<tr><td>成本中心</td><td>Cost Center</td><td>ECC</td><td>1</td><td>1（S/4HANA）</td><td>重新设计层级</td></tr>\n<tr><td>利润中心</td><td>Profit Center</td><td><strong>未启用</strong></td><td>0</td><td>1（S/4HANA）</td><td><strong>全新设计</strong></td></tr>\n<tr><td>销售订单</td><td>Sales Order</td><td>ECC(SD)</td><td>1</td><td>1（S/4HANA）</td><td>2024年新增不迁移，余额迁移</td></tr>\n<tr><td>采购订单</td><td>Purchase Order</td><td>ECC(MM) + SRM</td><td>2</td><td>1（S/4HANA）</td><td>在途订单处理方案</td></tr>\n<tr><td>库存批次</td><td>Batch/Lot</td><td>ECC</td><td>1</td><td>1（S/4HANA+EWM）</td><td>批次追溯链路重建</td></tr>\n<tr><td>工单</td><td>Production Order</td><td>ECC(PP)</td><td>1</td><td>1（S/4HANA）</td><td>在制工单截断处理</td></tr>\n<tr><td>固定资产</td><td>Fixed Asset</td><td>ECC(FI-AA)</td><td>1</td><td>1（S/4HANA）</td><td>全量迁移</td></tr>\n<tr><td>供应商发票</td><td>Vendor Invoice</td><td>ECC + SRM</td><td>2</td><td>1（S/4HANA）</td><td>余额迁移</td></tr>\n<tr><td>客户发票/DRC</td><td>Customer Invoice</td><td>ECC + 手工</td><td>1</td><td>1（S/4HANA+DRC）</td><td>DRC国内已上线，扩展泰国/德国</td></tr>\n<tr><td>项目结构（PS）</td><td>Project Structure</td><td>无（航辉/海辉手工）</td><td>0</td><td>1（S/4HANA PS）</td><td><strong>全新设计</strong></td></tr>\n<tr><td>员工主数据</td><td>Employee Master</td><td>人事管理系统（独立）</td><td>1</td><td>1（人事管理系统，保留）</td><td>CPI接口同步</td></tr>\n<tr><td>资产折旧参数</td><td>Asset Valuation</td><td>ECC(FI-AA)</td><td>1</td><td>1（S/4HANA）</td><td>直接迁移</td></tr>\n</table></div>\n<h4 id=\"C-1-3-CRUD矩阵-数据实体-应用系统-\">C.1.3 CRUD矩阵（数据实体 × 应用系统）</h4>\n<div class=\"tbl\"><table>\n<tr><th>数据实体</th><th>S/4HANA</th><th>MDG</th><th>PLM</th><th>MES</th><th>WMS</th><th>CRM(勤策)</th><th>Group Reporting</th></tr>\n<tr><td>物料主数据</td><td>R</td><td><strong>C/U/D</strong></td><td>C（EBOM）</td><td>R</td><td>R</td><td>—</td><td>R</td></tr>\n<tr><td>BOM（MBOM）</td><td>R/U</td><td>—</td><td><strong>C/U（EBOM→自动转）</strong></td><td>R</td><td>—</td><td>—</td><td>—</td></tr>\n<tr><td>客户主数据</td><td>R</td><td><strong>C/U/D</strong></td><td>—</td><td>—</td><td>—</td><td>C/U（联系信息）</td><td>R</td></tr>\n<tr><td>供应商主数据</td><td>R</td><td><strong>C/U/D</strong></td><td>—</td><td>—</td><td>—</td><td>—</td><td>R</td></tr>\n<tr><td>GL科目/集团科目</td><td>R</td><td><strong>C/U/D</strong></td><td>—</td><td>—</td><td>—</td><td>—</td><td>R</td></tr>\n<tr><td>销售订单</td><td><strong>C/R/U/D</strong></td><td>—</td><td>—</td><td>—</td><td>R（出库）</td><td>C（商机→订单）</td><td>R</td></tr>\n<tr><td>采购订单</td><td><strong>C/R/U/D</strong></td><td>—</td><td>—</td><td>—</td><td>R（收货）</td><td>—</td><td>R</td></tr>\n<tr><td>工单</td><td><strong>C/R/U/D</strong></td><td>—</td><td>R（工艺路线）</td><td><strong>R/U（反馈）</strong></td><td>—</td><td>—</td><td>R</td></tr>\n<tr><td>库存批次</td><td><strong>C/R/U/D</strong></td><td>—</td><td>—</td><td>R/U</td><td><strong>C/R/U</strong>（实物）</td><td>—</td><td>—</td></tr>\n<tr><td>利润中心</td><td>R</td><td><strong>C/U/D</strong></td><td>—</td><td>—</td><td>—</td><td>—</td><td><strong>R（合并）</strong></td></tr>\n<tr><td>成本中心</td><td>R</td><td><strong>C/U/D</strong></td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>\n<tr><td>资产主数据</td><td><strong>C/R/U/D</strong></td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>R</td></tr>\n</table></div>\n<p><strong>关键发现：</strong></p>\n<ul>\n<li>MDG 是主数据的唯一创建/修改入口（C/U/D），S/4HANA 只读（R）</li>\n<li>PLM 创建 EBOM，通过 CPI 自动转为 S/4HANA 的 MBOM（消除手工转换）</li>\n<li>MES 向 S/4HANA 工单反馈实际产量（U），当前此接口缺失</li>\n</ul>\n<h4 id=\"C-1-4-数据分发图-Data-Dissemination-Diagram-\">C.1.4 数据分发图（Data Dissemination Diagram）</h4>\n<pre><code>数据流向示意（目标架构，箭头=通过CPI传输）\n\nMDG（主数据权威源）\n    │ 物料/客户/供应商/科目\n    ▼\nS/4HANA PCE（核心业务系统）\n    ├── FICO ──► Group Reporting（19法人合并报表，T+3）\n    ├── SD   ◄── CRM勤策（客户/商机数据同步）\n    ├── MM   ◄── SRM（采购申请/PO同步，消除尾差）\n    ├── PP   ──► MES（工单下达）  MES──►PP（产量反馈）\n    ├── WM/EWM◄──► WMS（出入库实时同步，消除延迟）\n    └── DRC  ──► 国税系统（中国增值税电子发票）\n                 泰国税务系统（增值税7%，e-Tax Invoice）\n                 德国税务系统（VAT，欧盟合规）\n\nPLM（设计BOM/EBOM）──CPI──► S/4HANA（MBOM自动同步，替代手工转换）\n\nS/4HANA ──► SAC/BW（二期分析层，管理驾驶舱）\n         ──► OMS电商OMS平台（订单履行状态）\n         ──► OA（审批结果同步，替代手工维护SAP）\n         ──► 财务共享（凭证/付款数据）\n         ──► 控股集团（上报数据接口）</code></pre>\n<h4 id=\"C-1-5-数据架构差距分析\">C.1.5 数据架构差距分析</h4>\n<div class=\"tbl\"><table>\n<tr><th>数据资产</th><th>AS-IS</th><th>TO-BE</th><th>差距类型</th><th>对应工作包</th></tr>\n<tr><td>物料主数据</td><td>7个写入点，无治理规则</td><td>MDG单一写入点，编码标准化</td><td><strong>新增（MDG）</strong></td><td>WP1</td></tr>\n<tr><td>BOM结构</td><td>EBOM→MBOM手工转换</td><td>PLM-CPI-S/4HANA自动贯通</td><td><strong>新增（接口）</strong></td><td>WP7</td></tr>\n<tr><td>客户主数据</td><td>一客多码，信用额度未维护</td><td>MDG统一客户主数据+信用管理</td><td><strong>迁移+新增</strong></td><td>WP1/WP4</td></tr>\n<tr><td>GL科目表</td><td>19法人各自维护，差异大</td><td>集团统一科目表（Group CoA）</td><td><strong>迁移（统一）</strong></td><td>WP3</td></tr>\n<tr><td>利润中心</td><td><strong>未启用</strong></td><td>事业部级利润中心层级</td><td><strong>全新建立</strong></td><td>WP3</td></tr>\n<tr><td>成本中心</td><td>已配置，但粒度不足</td><td>重新设计，支撑产品线成本分析</td><td><strong>迁移（重设计）</strong></td><td>WP3</td></tr>\n<tr><td>泰国业务数据</td><td>不支持泰铢本位币</td><td>泰铢本位币+泰国标准科目</td><td><strong>新增</strong></td><td>WP9</td></tr>\n<tr><td>合并消除规则</td><td>Excel手工</td><td>Group Reporting自动消除</td><td><strong>新增</strong></td><td>WP3</td></tr>\n<tr><td>库存批次</td><td>部分覆盖，追溯断链</td><td>全面批次管理+EWM</td><td><strong>迁移（扩展）</strong></td><td>WP6</td></tr>\n<tr><td>历史交易数据</td><td>ECC 17年积累</td><td>余额迁移，历史数据归档</td><td><strong>迁移（归档）</strong></td><td>WP2</td></tr>\n</table></div>\n<hr>"}, "LA_6": {"type": "reading", "title": "📖 Phase C — 应用架构（18套系统·CPI接口清单）", "html": "<h3 id=\"C-2-应用架构-Application-Architecture-\">C.2 应用架构（Application Architecture）</h3>\n<h4 id=\"C-2-1-基线应用组合-Application-Portfolio-共18套系统-\">C.2.1 基线应用组合（Application Portfolio，共18套系统）</h4>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>应用名称</th><th>类别</th><th>使用范围</th><th>当前集成状态</th><th>技术状态</th><th>处置建议</th></tr>\n<tr><td>A01</td><td>SAP ECC 6.0</td><td>核心ERP</td><td>全集团</td><td>—</td><td><strong>老化/待退役</strong></td><td>替换→S/4HANA</td></tr>\n<tr><td>A02</td><td>PLM系统</td><td>产品研发</td><td>集团研究院</td><td><strong>未与SAP集成</strong>（2025年新上线）</td><td>新·稳定</td><td><strong>保留+CPI集成（EBOM→MBOM）</strong></td></tr>\n<tr><td>A03</td><td>财务共享平台</td><td>财务</td><td>集团财务</td><td>部分集成</td><td>新·稳定（2025上线）</td><td>保留+CPI优化</td></tr>\n<tr><td>A04</td><td>CRM系统</td><td>销售</td><td>销售事业部</td><td><strong>未集成SAP</strong></td><td>稳定</td><td>保留+CPI集成（客户数据同步）</td></tr>\n<tr><td>A05</td><td>MES（车灯/线路板）</td><td>制造执行</td><td>车灯/线路板产线</td><td>部分集成，接口不实时</td><td>稳定</td><td>保留+CPI集成（工单反馈）</td></tr>\n<tr><td>A06</td><td>WMS（电子仓/网店仓）</td><td>仓储</td><td>仓库</td><td>部分集成，<strong>有延迟</strong></td><td>稳定</td><td>保留+CPI优化（实时同步）</td></tr>\n<tr><td>A07</td><td>SRM供应商管理</td><td>采购</td><td>采购中心</td><td>已集成，<strong>接口尾差</strong></td><td>稳定</td><td>保留+CPI重建（消除尾差）</td></tr>\n<tr><td>A08</td><td>电商OMS平台/电商OMS平台B（OMS）</td><td>电商订单</td><td>电商事业部</td><td>部分集成</td><td>稳定</td><td>保留+CPI集成</td></tr>\n<tr><td>A09</td><td>OA综合办公</td><td>协同</td><td>全公司</td><td>独立，部分审批结果手工</td><td>稳定</td><td>保留+CPI集成（审批结果→SAP）</td></tr>\n<tr><td>A10</td><td>人事管理系统系统</td><td>HR</td><td>全集团</td><td>独立</td><td>稳定</td><td>保留（二期SuccessFactors规划）</td></tr>\n<tr><td>A11</td><td>合同管理系统</td><td>采购/销售</td><td>相关部门</td><td>独立</td><td>稳定</td><td>保留，CPI接口评估</td></tr>\n<tr><td>A12</td><td>费控系统</td><td>财务</td><td>全公司</td><td>独立</td><td>稳定</td><td>保留，CPI接口评估</td></tr>\n<tr><td>A13</td><td>司库系统</td><td>财务</td><td>集团财务</td><td>在建</td><td>新建中</td><td>保留+CPI集成（在建协同）</td></tr>\n<tr><td>A14</td><td>控股集团共享系统</td><td>集团管控</td><td>集团总部</td><td>外部接口</td><td>外部</td><td>保留，接口规范化</td></tr>\n<tr><td>A15</td><td>用友U8（海辉）</td><td>ERP</td><td>海辉公司</td><td><strong>未集成</strong></td><td>老化</td><td><strong>迁移至S/4HANA</strong>（项目型PS模块）</td></tr>\n<tr><td>A16</td><td>SAP ECC（泰国FZ40）</td><td>ERP</td><td>泰国法人</td><td>独立实例</td><td><strong>不支持泰铢</strong></td><td><strong>升级至PCE统一实例+本地化</strong></td></tr>\n<tr><td>A17</td><td>帆软BI/SmartBI</td><td>报表分析</td><td>管理层</td><td>ECC直连</td><td>稳定</td><td>评估是否替换为SAC（二期）</td></tr>\n<tr><td>A18</td><td>经销商商城</td><td>渠道</td><td>经销商</td><td>独立</td><td>稳定</td><td>保留+CPI集成（库存/订单）</td></tr>\n</table></div>\n<h4 id=\"C-2-2-目标应用架构-五层-\">C.2.2 目标应用架构（五层）</h4>\n<pre><code>【表现层 - 用户交互】\nSAP Fiori LaunchPad（统一Web/移动端入口）\n供应商门户（Supplier Portal）| 经销商商城接口\n\n【核心业务层 - 替换ECC】\n┌─────────────────────────────────────────────────────────────┐\n│                 SAP S/4HANA PCE（单一实例，19法人）            │\n│  FICO │ SD（含信用管理）│ MM │ PP │ QM │ EWM（替代WM）         │\n│  Group Reporting（19法人合并）│ MDG（主数据治理）              │\n│  DRC（中国增值税·泰国·德国）│ SAP Activate项目管理           │\n└─────────────────────────────────────────────────────────────┘\n\n【集成层 - 替代37个点对点接口】\nSAP CPI（Cloud Platform Integration，统一集成总线）\nAPI Gateway | 消息队列 | 错误监控\n\n【外围专业层 - 保留集成】\nPLM │ MES │ WMS │ SRM │ CRM勤策 │ OMS电商OMS平台/电商OMS平台B\nOA │ 财务共享 │ 司库 │ 合同管理 │ 费控 │ 控股集团\n\n【数据分析层 - 二期引入】\nSAP SAC（Analytics Cloud）管理驾驶舱\nSAP BW/4HANA Embedded（复杂分析）</code></pre>\n<h4 id=\"C-2-3-CPI-集成接口清单-12个外围系统-主要接口-\">C.2.3 CPI 集成接口清单（12个外围系统 × 主要接口）</h4>\n<div class=\"tbl\"><table>\n<tr><th>接口编号</th><th>来源系统</th><th>目标系统</th><th>主要数据</th><th>当前问题</th><th>目标频率</th><th>优先级</th></tr>\n<tr><td>INT-01</td><td>PLM</td><td>S/4HANA</td><td>EBOM→MBOM自动转换</td><td><strong>手工转换，无接口</strong></td><td>实时（BOM变更触发）</td><td>P1</td></tr>\n<tr><td>INT-02</td><td>MES</td><td>S/4HANA</td><td>工单产量反馈·良品/废品·实际工时</td><td>接口不实时</td><td>每15分钟</td><td>P1</td></tr>\n<tr><td>INT-03</td><td>WMS</td><td>S/4HANA</td><td>出入库实时库存同步</td><td><strong>有延迟</strong>（影响ATP）</td><td>实时</td><td>P1</td></tr>\n<tr><td>INT-04</td><td>SRM</td><td>S/4HANA</td><td>PO同步·付款·供应商评分</td><td><strong>接口尾差，无法清账</strong></td><td>实时</td><td>P1</td></tr>\n<tr><td>INT-05</td><td>CRM勤策</td><td>S/4HANA</td><td>客户主数据·商机→销售订单</td><td><strong>未集成</strong></td><td>每日同步</td><td>P2</td></tr>\n<tr><td>INT-06</td><td>OMS电商OMS平台</td><td>S/4HANA</td><td>电商订单·发货确认·退货</td><td>部分集成</td><td>实时</td><td>P2</td></tr>\n<tr><td>INT-07</td><td>OA</td><td>S/4HANA</td><td>审批结果（定价/采购）→SAP自动更新</td><td><strong>手工维护，7-8天延迟</strong></td><td>实时（审批完成触发）</td><td>P2</td></tr>\n<tr><td>INT-08</td><td>财务共享</td><td>S/4HANA</td><td>付款指令·银行对账·代发工资</td><td>部分集成</td><td>每日</td><td>P2</td></tr>\n<tr><td>INT-09</td><td>司库</td><td>S/4HANA</td><td>现金池·内部借贷·外汇敞口</td><td>在建，接口待设计</td><td>实时</td><td>P2</td></tr>\n<tr><td>INT-10</td><td>控股集团</td><td>S/4HANA</td><td>集团合并数据上报</td><td>手工上报</td><td>月度</td><td>P3</td></tr>\n<tr><td>INT-11</td><td>经销商商城</td><td>S/4HANA</td><td>经销商库存·订单·结算</td><td>独立，无接口</td><td>每日</td><td>P3</td></tr>\n<tr><td>INT-12</td><td>人事管理系统</td><td>S/4HANA</td><td>人员成本归集·岗位信息</td><td>独立</td><td>每月</td><td>P3</td></tr>\n</table></div>\n<h4 id=\"C-2-4-应用架构差距分析\">C.2.4 应用架构差距分析</h4>\n<div class=\"tbl\"><table>\n<tr><th>当前应用</th><th>处置方式</th><th>目标状态</th><th>理由</th></tr>\n<tr><td>SAP ECC 6.0</td><td><strong>替换</strong></td><td>S/4HANA PCE</td><td>17年技术债，维护期2027年结束，Greenfield清零</td></tr>\n<tr><td>PLM系统</td><td><strong>保留+新增CPI集成</strong></td><td>PLM+INT-01接口</td><td>2025年新上线，消除EBOM→MBOM手工转换</td></tr>\n<tr><td>财务共享</td><td><strong>保留+优化集成</strong></td><td>财务共享+INT-08</td><td>2025年新上线，完善付款/对账接口</td></tr>\n<tr><td>CRM系统</td><td><strong>保留+新增CPI集成</strong></td><td>CRM+INT-05</td><td>销售管理能力保留，实现客户数据同步</td></tr>\n<tr><td>MES（车灯/线路板）</td><td><strong>保留+新增CPI集成</strong></td><td>MES+INT-02</td><td>专业MES能力保留，实现工单反馈实时化</td></tr>\n<tr><td>WMS</td><td><strong>保留+优化CPI集成</strong></td><td>WMS+INT-03</td><td>修复延迟问题，实现实时库存同步</td></tr>\n<tr><td>SRM</td><td><strong>保留+重建CPI集成</strong></td><td>SRM+INT-04</td><td>消除接口尾差，接口重新设计</td></tr>\n<tr><td>电商OMS平台/电商OMS平台BOMS</td><td><strong>保留+优化集成</strong></td><td>OMS+INT-06</td><td>电商运营能力保留</td></tr>\n<tr><td>OA</td><td><strong>保留+新增CPI集成</strong></td><td>OA+INT-07</td><td>审批结果自动写回SAP，消除手工维护</td></tr>\n<tr><td>用友U8（海辉）</td><td><strong>迁移至S/4HANA</strong></td><td>S/4HANA PS模块</td><td>海辉特殊业务用PS（项目系统）模块承接</td></tr>\n<tr><td>泰国ECC（FZ40）</td><td><strong>升级至PCE统一实例</strong></td><td>S/4HANA PCE（含本地化）</td><td>解决泰铢本位币/税制问题，纳入19法人统一管理</td></tr>\n<tr><td>帆软BI</td><td><strong>评估替换（二期）</strong></td><td>SAC（规划）</td><td>S/4HANA稳定后二期引入SAC替代</td></tr>\n<tr><td>人事管理系统</td><td><strong>保留</strong></td><td>人事管理系统+INT-12</td><td>二期SuccessFactors规划</td></tr>\n<tr><td>合同管理/费控</td><td><strong>保留+轻量集成</strong></td><td>保留+CPI接口</td><td>暂不替换，接口集成</td></tr>\n</table></div>\n<hr>"}, "LA_
