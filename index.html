平和合规要求", "C": "架构师的薪酬合同", "D": "技术许可协议"}, "ans": "B", "exp": "Architecture Contract 是架构团队与利益相关者（如开发团队、业务部门）之间的正式书面协议，内容包括：将要交付的架构工作产品、架构质量标准、合规要求、验收标准。它确保各方对架构目标和约束条件的共同理解和承诺。", "topic": "t5"}, {"num": "Q51", "star": false, "q": "架构原则（Architecture Principle）的 5 个组成要素是什么？", "opts": {"A": "Goal / Objective / Policy / Standard / Guideline", "B": "Name / Statement / Rationale / Implications / Metrics", "C": "Title / Description / Owner / Date / Version", "D": "Requirement / Constraint / Assumption / Risk / Issue"}, "ans": "B", "exp": "TOGAF 定义架构原则的 5 要素：Name（名称，简短易记）、Statement（声明，一句话表述原则内容）、Rationale（依据，说明为什么需要这条原则，即业务理由）、Implications（影响，说明遵循此原则的代价和要求）、Metrics（度量，如何衡量是否遵循了此原则）。其中 Rationale 是\"为什么\"，是高频考点。", "topic": "t5"}, {"num": "Q52", "star": false, "q": "在 Preliminary Phase 中，Architecture Principles 的主要来源是什么？", "opts": {"A": "随机制定，根据架构师个人经验", "B": "从组织业务原则、IT 战略、以及 TOGAF 原则示例中衍生", "C": "仅从行业标准中采用", "D": "由 Architecture Board 独立制定，无需参考现有文件"}, "ans": "B", "exp": "架构原则来源多元：业务原则（Business Principles，来自公司战略和业务规则）、TOGAF 参考原则（TOGAF 提供了一套示范原则供参考）、IT 战略文件、以及现有政策法规。制定原则是 Preliminary Phase 的核心工作之一，需要各层级利益相关者的输入。", "topic": "t5"}, {"num": "Q53", "star": false, "q": "Capability Architecture（能力架构）关注什么？", "opts": {"A": "整个企业的战略方向", "B": "业务线或部门级别的架构", "C": "特定业务能力（如采购能力、制造能力）的详细架构设计", "D": "技术基础设施的详细规格"}, "ans": "C", "exp": "Architecture Landscape 的三个级别：Strategic（战略，企业全局）、Segment（段，业务线/部门）、Capability（能力，具体业务能力的专项架构）。Capability Architecture 是最细粒度的，专注于支撑特定业务能力（如\"供应链能力\"或\"客户服务能力\"）所需的架构。", "topic": "t5"}]}, "L6_6": {"type": "quiz", "title": "🎯 利益相关者 6题", "questions": [{"num": "Q54", "star": true, "q": "Stakeholder（利益相关者）在 TOGAF 中的定义是什么？", "opts": {"A": "项目的资金提供者", "B": "对系统有兴趣或关切的个人、团队或组织，包括项目内部和外部", "C": "只包括 C 级高管", "D": "只包括 IT 部门人员"}, "ans": "B", "exp": "TOGAF 对利益相关者的定义非常宽泛，涵盖：内部（管理层、业务用户、IT团队）和外部（客户、监管机构、供应商）对架构有利益关系的任何方。利益相关者分析是 Phase A 的关键活动，识别\"谁关心什么\"是构建架构愿景的基础。", "topic": "t6"}, {"num": "Q55", "star": true, "q": "Concern（关切）在 TOGAF 中是指什么？", "opts": {"A": "项目的风险清单", "B": "利益相关者关于系统某方面的兴趣、期望或担忧", "C": "合规性问题", "D": "预算超支问题"}, "ans": "B", "exp": "Concern 是特定利益相关者对系统的某个方面所持有的兴趣、期望或担忧。架构工作的核心价值之一就是识别并\"回应\"各利益相关者的 Concern。例如：CFO 的 Concern 是\"系统是否能降低财务报告成本\"；CIO 的 Concern 是\"新系统是否能与现有基础设施集成\"。", "topic": "t6"}, {"num": "Q56", "star": false, "q": "View（视图）在 TOGAF 中的定义是什么？", "opts": {"A": "系统的完整技术文档", "B": "从特定 Viewpoint 出发，对某个系统或部分系统的描述", "C": "利益相关者的个人意见", "D": "架构图表的集合"}, "ans": "B", "exp": "View 是根据特定 Viewpoint 规则，对系统特定方面的正式描述。View 专门用于回应特定利益相关者的 Concern。一个系统可以有多个 View（如业务视图、技术视图、安全视图），每个 View 针对不同受众的关切。", "topic": "t6"}, {"num": "Q57", "star": false, "q": "利益相关者管理矩阵（Power/Interest Grid）中，\"高权力/低兴趣\"的利益相关者应如何管理？", "opts": {"A": "密切沟通，频繁更新", "B": "保持满意（Keep Satisfied），定期简报但无需深度参与", "C": "最小程度关注", "D": "让其主导所有架构决策"}, "ans": "B", "exp": "Power/Interest Grid 四象限策略：高权力+低兴趣 → Keep Satisfied（满足他们，以防他们有负面反应）；高权力+高兴趣 → Manage Closely（密切管理）；低权力+高兴趣 → Keep Informed（保持告知）；低权力+低兴趣 → Monitor（最小关注）。", "topic": "t6"}, {"num": "Q58", "star": false, "q": "利益相关者矩阵（Stakeholder Map）的主要用途是什么？", "opts": {"A": "决定架构团队的人员招募", "B": "识别并记录所有利益相关者、其权力/兴趣级别、关切，以指导架构沟通策略", "C": "记录技术债务", "D": "管理项目预算分配"}, "ans": "B", "exp": "Stakeholder Map 是 Phase A 的关键工具，用于：系统性识别所有受影响方、评估其权力和关注度、了解其关切（Concern）、制定差异化的沟通和参与策略。它确保架构工作不会忽视关键利益相关者，从而提高架构的接受度。", "topic": "t6"}, {"num": "Q59", "star": false, "q": "当不同利益相关者的 Concern 相互冲突时，架构师应如何处理？", "opts": {"A": "优先满足最高层级管理者的 Concern，忽略其他", "B": "通过透明沟通、权衡分析，寻求经过正式治理机制批准的折中方案", "C": "采用投票机制决定", "D": "将冲突搁置，先完成其他工作"}, "ans": "B", "exp": "TOGAF 强调架构治理的重要性：冲突不应被忽视或简单专制解决。正确方式是：识别并记录冲突、分析各方 Concern 的优先级、提出折中方案、通过 Architecture Board 等正式治理机制做出裁决并记录决策依据。", "topic": "t6"}]}, "L6_7": {"type": "quiz", "title": "🎯 差距分析 5题", "questions": [{"num": "Q60", "star": true, "q": "Gap Analysis（差距分析）在 TOGAF ADM 中的主要目的是什么？", "opts": {"A": "确定项目预算缺口", "B": "识别当前架构（Baseline）和目标架构（Target）之间的差异，为迁移计划提供输入", "C": "评估团队技能水平", "D": "比较不同供应商产品"}, "ans": "B", "exp": "Gap Analysis 是 TOGAF 中将 Baseline（当前状态）与 Target（目标状态）进行比较的分析工具，产出四类差异：新增（Add，目标有但当前没有）、保留（Retain，当前有且目标也要保留）、去除（Eliminate，当前有但目标要去掉）、迁移（Migrate，当前有但需要改造才能满足目标）。这个结果直接驱动 Phase E 的工作包定义。", "topic": "t7"}]}, "L6_8": {"type": "quiz", "title": "🎯 全部60题模拟考", "questions": [{"num": "Q1", "star": true, "q": "TOGAF 是由哪个组织发布和维护的？", "opts": {"A": "ISO（国际标准化组织）", "B": "The Open Group", "C": "ITIL Foundation", "D": "Gartner"}, "ans": "B", "exp": "TOGAF 由 The Open Group 发布，这是一个技术中立的行业联盟。The Open Group 同时负责 TOGAF 认证考试。ISO 是国际标准化组织（发布如 ISO 42010），ITIL 是服务管理框架，Gartner 是调研机构，均非 TOGAF 发布方。", "topic": "t1"}, {"num": "Q2", "star": true, "q": "TOGAF 的全称是什么？", "opts": {"A": "Technical Open Group Architecture Framework", "B": "The Open Group Architecture Framework", "C": "Technology Operations Governance and Architecture Framework", "D": "Total Organizational Goals and Architecture Framework"}, "ans": "B", "exp": "TOGAF = The Open Group Architecture Framework，这是考试必背的全称。选项A、C、D均为干扰项，请注意\"The\"是组织名称的一部分，不是冠词。", "topic": "t1"}, {"num": "Q3", "star": false, "q": "TOGAF Standard 10 相比 9.2 版本的最主要变化是什么？", "opts": {"A": "删除了 ADM，改用敏捷方法", "B": "将内容重组为 TOGAF Fundamental Content 和 TOGAF Series Guides", "C": "增加了 Phase I 和 Phase J 两个新阶段", "D": "将四大架构域减少为三大域"}, "ans": "B", "exp": "TOGAF 10 的核心变化是将内容重构为两大部分：TOGAF Fundamental Content（基础内容，包括ADM核心概念）和 TOGAF Series Guides（系列指南，包括安全架构、Agile适配等专题）。ADM 在 10 中依然完整保留，架构域仍为四大域。", "topic": "t1"}, {"num": "Q4", "star": true, "q": "企业架构（Enterprise Architecture）的主要目的是什么？", "opts": {"A": "专门管理 IT 基础设施的部署", "B": "帮助企业实现业务目标与 IT 能力的对齐", "C": "仅关注应用软件的开发流程", "D": "替代项目管理框架（如 PRINCE2）"}, "ans": "B", "exp": "EA 的核心价值是将业务战略与 IT 能力对齐（Business-IT Alignment）。EA 不仅限于 IT，也不替代 PM 方法论。TOGAF 明确指出 EA 需要业务架构、应用架构、数据架构、技术架构四域协同，目标是支撑业务目标实现。", "topic": "t1"}, {"num": "Q5", "star": false, "q": "TOGAF ADM 中，哪个说法最准确地描述了架构开发的性质？", "opts": {"A": "ADM 是线性的、一次性的过程，从 Phase A 执行到 Phase H 即完成", "B": "ADM 是迭代的、循环的方法，可以在阶段间和循环间反复进行", "C": "ADM 只能按照规定顺序执行，不允许跳过阶段", "D": "ADM 在每个项目中只能执行一次"}, "ans": "B", "exp": "ADM 的核心特性是迭代性（Iterative）和循环性（Cyclic）。TOGAF 明确说明 ADM 可以在阶段内、阶段间、以及整个 ADM 循环层面进行迭代。架构可以分层次（战略/段/能力/项目）进行，每层触发新的ADM循环。", "topic": "t1"}, {"num": "Q6", "star": true, "q": "下列哪四个域构成了 TOGAF 的企业架构描述？", "opts": {"A": "Strategy / Operations / Technology / Security", "B": "Business / Application / Data / Technology", "C": "People / Process / Technology / Governance", "D": "Finance / Marketing / IT / Operations"}, "ans": "B", "exp": "TOGAF 的四大架构域（BADT）：Business Architecture（业务架构）、Application Architecture（应用架构）、Data Architecture（数据架构）、Technology Architecture（技术架构）。记忆口诀：BDAT 或 BADT。注意 Application 和 Data 同属 Information Systems Architecture（信息系统架构）域。", "topic": "t1"}, {"num": "Q7", "star": false, "q": "TOGAF 适合以下哪类组织使用？", "opts": {"A": "只适用于大型跨国企业", "B": "只适用于 IT 公司", "C": "可被任何规模和行业的组织使用，但需要针对自身情况适配", "D": "只适用于政府机构和公共部门"}, "ans": "C", "exp": "TOGAF 是通用的企业架构框架，设计上就考虑了可适配性（Adaptability）。Preliminary Phase 的核心工作之一就是\"定制 ADM 以适应组织需要\"。小到 SME，大到跨国集团均可使用，但需要根据规模和行业特点进行合理裁剪。", "topic": "t1"}, {"num": "Q8", "star": false, "q": "TOGAF 的哪个组成部分提供了一个通用的技术标准参考模型？", "opts": {"A": "Architecture Vision", "B": "Architecture Repository", "C": "Technical Reference Model（TRM）", "D": "Architecture Roadmap"}, "ans": "C", "exp": "TRM（Technical Reference Model，技术参考模型）是 TOGAF Foundation Architecture 的一部分，提供了一个通用的技术标准分类体系，帮助组织选择符合标准的技术组件。另一个基础参考模型是 III-RM（Integrated Information Infrastructure Reference Model）。", "topic": "t1"}, {"num": "Q9", "star": true, "q": "TOGAF ADM 中，Preliminary Phase 的主要目的是什么？", "opts": {"A": "定义目标架构的愿景", "B": "建立架构能力（Architecture Capability），定制 ADM，制定架构原则", "C": "执行差距分析（Gap Analysis）", "D": "创建实施和迁移计划"}, "ans": "B", "exp": "Preliminary Phase 是在正式启动 ADM 之前的准备阶段。其核心工作是：建立架构团队和治理框架（Architecture Board）、定制 ADM 以适应组织、制定架构原则。Preliminary 不属于 A-H 任何一个字母阶段，它是所有 Phase 的\"地基\"。", "topic": "t2"}, {"num": "Q10", "star": true, "q": "在 ADM 的 Phase A（Architecture Vision）中，第一步通常是什么？", "opts": {"A": "开始开发目标架构", "B": "确认和扩充架构原则，建立架构项目", "C": "执行差距分析", "D": "制定迁移计划"}, "ans": "B", "exp": "Phase A 的第一步是\"确认架构项目的启动\"，包括：确认请求（Request for Architecture Work）的范围和约束、确认利益相关者、明确架构愿景的范围。差距分析在 Phase B/C/D 执行，迁移计划在 Phase F。", "topic": "t2"}, {"num": "Q11", "star": true, "q": "Architecture Vision（架构愿景文档）是哪个 Phase 的关键输出？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase F"}, "ans": "B", "exp": "Architecture Vision 是 Phase A 的核心交付物，包括：项目范围定义、利益相关者关切、高层架构描述、约束条件。它为后续所有 Phase 提供方向，是整个 ADM 循环的起点文件。", "topic": "t2"}, {"num": "Q12", "star": false, "q": "在 Phase B（Business Architecture）中，架构师需要开发什么？", "opts": {"A": "应用组合图", "B": "业务架构的当前状态（Baseline）和目标状态（Target）", "C": "技术组件清单", "D": "数据迁移方案"}, "ans": "B", "exp": "Phase B 关注业务架构，核心工作是：描述 Baseline Business Architecture（当前状态）和 Target Business Architecture（目标状态），并执行 Gap Analysis。业务架构包含：业务功能、业务流程、组织结构、业务角色和业务服务。", "topic": "t2"}, {"num": "Q13", "star": true, "q": "Phase C（信息系统架构）包含哪两个子域，且正确的开发顺序是什么？", "opts": {"A": "Application Architecture，然后 Data Architecture", "B": "Data Architecture，然后 Application Architecture", "C": "两个子域同时并行开发", "D": "Phase C 只包含 Application Architecture，Data Architecture 属于 Phase B"}, "ans": "B", "exp": "Phase C 包含 Data Architecture 和 Application Architecture 两个子域，TOGAF 推荐先开发 Data Architecture，再开发 Application Architecture。原因：应用程序是数据的载体和处理器，数据架构确定后才能明确应用需要处理什么数据，从而定义应用功能边界。这是 Level 1 高频陷阱题。", "topic": "t2"}, {"num": "Q14", "star": false, "q": "Phase D（Technology Architecture）的主要工作是什么？", "opts": {"A": "定义组织的业务流程", "B": "将逻辑应用组件映射到具体技术组件，定义技术标准", "C": "分析差距并制定过渡架构", "D": "管理架构变更请求"}, "ans": "B", "exp": "Phase D 是将前几个 Phase 定义的逻辑架构落地到技术层面的阶段。主要工作包括：识别技术平台候选方案、应用 TRM（技术参考模型）、定义技术标准和规范。Phase E 才是差距分析和过渡架构，Phase H 是变更管理。", "topic": "t2"}, {"num": "Q15", "star": true, "q": "Phase E（Opportunities and Solutions）的核心目标是什么？", "opts": {"A": "批准最终的目标架构", "B": "从目标架构推导出实施方案，定义工作包（Work Package）和过渡架构", "C": "完成技术架构的详细设计", "D": "监控已实施架构的合规性"}, "ans": "B", "exp": "Phase E 是从\"架构\"到\"实施\"的桥梁。在这里，架构师综合前面 Phase B/C/D 的差距分析结果，确定具体的工作包（Work Package）、定义过渡架构（Transition Architecture）、并评估初步的实施路径。", "topic": "t2"}, {"num": "Q16", "star": false, "q": "在 TOGAF ADM 中，Phase F（Migration Planning）主要关注什么？", "opts": {"A": "定义目标技术架构", "B": "制定详细的实施和迁移计划，对工作包进行优先级排序", "C": "建立架构治理委员会", "D": "识别新的业务机会"}, "ans": "B", "exp": "Phase F 将 Phase E 识别的工作包细化为具体的实施和迁移计划。关键工作：成本效益分析、风险评估、优先级排序、资源规划。Phase F 的产物是可执行的迁移计划。", "topic": "t2"}, {"num": "Q17", "star": true, "q": "Phase G（Implementation Governance）的主要职责是什么？", "opts": {"A": "开发应用架构", "B": "监督项目实施确保与架构规格一致，处理架构合规请求", "C": "制定架构路线图", "D": "执行差距分析"}, "ans": "B", "exp": "Phase G 是架构实施阶段的治理监督。架构团队在这个阶段：监督实施项目是否符合批准的架构、处理架构偏差（Architecture Dispensation）请求、进行架构合规评审（Architecture Compliance Review）。", "topic": "t2"}, {"num": "Q18", "star": false, "q": "下列哪项陈述最准确地描述了 Phase H（Architecture Change Management）的目的？", "opts": {"A": "创建新的目标架构", "B": "维护架构的生命力，管理对已批准架构的变更，确定何时需要启动新的 ADM 循环", "C": "开发迁移计划", "D": "执行技术架构审查"}, "ans": "B", "exp": "Phase H 是架构正式上线后的持续管理阶段。架构就像一个活的文档，需要响应外部环境变化（技术进步、业务战略调整、法规变化）。Phase H 负责评估这些变化、判断变更影响级别，并在必要时触发新一轮 ADM 循环。", "topic": "t2"}, {"num": "Q19", "star": true, "q": "关于\"需求管理\"（Requirements Management），下列哪项说法正确？", "opts": {"A": "需求管理是 ADM 中位于 Phase A 和 Phase B 之间的独立阶段", "B": "需求管理是一个持续进行的过程，贯穿所有 ADM Phase，不是独立的阶段", "C": "需求管理只在 Phase A 和 Phase F 中执行", "D": "需求管理由 Phase H 负责统一管理"}, "ans": "B", "exp": "这是 Level 1 高频陷阱！需求管理（Requirements Management）位于 ADM 图的中心圆圈，表示它持续贯穿所有 Phase，而不是一个独立的阶段（它没有字母编号）。它的职能是：存储需求、评估变更对当前 Phase 的影响、将需求传递给相关 Phase。", "topic": "t2"}, {"num": "Q20", "star": false, "q": "以下哪个是 Phase A 的关键输入？", "opts": {"A": "Baseline Business Architecture", "B": "Request for Architecture Work（架构工作请求）", "C": "Migration Plan", "D": "Technology Architecture"}, "ans": "B", "exp": "Request for Architecture Work 是触发整个 ADM 循环的关键文件，它由赞助组织（通常是管理层）发出，定义了架构项目的范围、约束和资源授权。它是 Phase A 的主要输入之一。Baseline Business Architecture 是 Phase B 的输入，Migration Plan 是 Phase F 的输出。", "topic": "t2"}, {"num": "Q21", "star": false, "q": "在 Phase B 中，\"业务架构\"的主要描述对象是什么？", "opts": {"A": "应用程序和数据库", "B": "服务器和网络设备", "C": "业务功能、业务流程、组织结构、业务角色", "D": "数据迁移方案"}, "ans": "C", "exp": "业务架构（Business Architecture）描述的是业务层面的能力和结构，包括：业务功能（Business Function）、业务流程（Business Process）、组织结构（Organization）、业务角色（Business Role）、业务服务（Business Service）。这与应用、数据、技术架构明确区分。", "topic": "t2"}, {"num": "Q22", "star": true, "q": "Statement of Architecture Work（架构工作说明书）是哪个阶段的关键交付物？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase G"}, "ans": "B", "exp": "Statement of Architecture Work 是 Phase A 的核心输出，它是正式的项目授权文件，定义了本次架构项目的范围、方法、资源、时间表，相当于架构团队的工作授权书。不要与 Architecture Vision 文档混淆：Architecture Vision 描述目标方向，Statement of Architecture Work 是工作授权。", "topic": "t2"}, {"num": "Q23", "star": false, "q": "在 Phase E 中，Work Package（工作包）包含哪些核心要素？", "opts": {"A": "只包含时间和成本", "B": "项目名称、项目描述、所包含的变更、所影响的 Building Block、依赖关系", "C": "只包含技术实施细节", "D": "业务需求文档"}, "ans": "B", "exp": "Work Package 是 Phase E 定义的可实施单元，包含：工作包名称和描述、所实现的目标架构要素、涉及的 Building Blocks、与其他工作包的依赖关系、优先级。多个工作包按依赖排序后形成 Architecture Roadmap。", "topic": "t2"}, {"num": "Q24", "star": false, "q": "Phase G 中，\"Architecture Dispensation\"（架构特许/豁免）是指什么？", "opts": {"A": "完全批准的架构变更", "B": "对特定项目或情况，暂时允许偏离已批准架构的正式授权", "C": "取消整个架构项目", "D": "新增架构原则"}, "ans": "B", "exp": "在实施过程中，有时项目因为现实约束（时间/成本/技术）无法完全符合批准的架构。Architecture Dispensation 是 Architecture Board 给予的正式豁免，允许特定范围内的偏差，但需要记录理由并设定恢复期限。", "topic": "t2"}, {"num": "Q25", "star": true, "q": "Phase H 中，变更的\"类型\"分类主要目的是什么？", "opts": {"A": "确定谁负责实施变更", "B": "判断变更的影响级别，以确定是否需要启动新的完整 ADM 循环", "C": "计算变更的成本", "D": "为变更撰写技术文档"}, "ans": "B", "exp": "TOGAF 将架构变更分为三类：类型1（简化/精化，不影响架构方向）→ 直接更新架构文档；类型2（增量/演进）→ 触发新的 ADM 循环（简化版）；类型3（重新定义/颠覆性变化）→ 触发全面的新 ADM 循环。判断变更类型是 Phase H 的核心工作。", "topic": "t2"}, {"num": "Q26", "star": false, "q": "下列哪项不是 Preliminary Phase 的典型输出？", "opts": {"A": "定制后的 ADM（Tailored ADM）", "B": "架构原则（Architecture Principles）", "C": "目标业务架构（Target Business Architecture）", "D": "架构治理框架（Architecture Governance Framework）"}, "ans": "C", "exp": "目标业务架构是 Phase B 的输出，不是 Preliminary Phase 的产物。Preliminary Phase 的输出包括：定制 ADM、架构原则、架构治理框架、架构工具设置、Architecture Repository 初始化。", "topic": "t2"}, {"num": "Q27", "star": false, "q": "在 ADM 循环中，哪个 Phase 最终产生\"架构定义文档\"（Architecture Definition Document）？", "opts": {"A": "Phase A", "B": "Preliminary Phase", "C": "Phase B/C/D 综合产生", "D": "Phase G"}, "ans": "C", "exp": "Architecture Definition Document（架构定义文档）是 Phase B、C、D 的综合交付物，包含业务架构、信息系统架构（数据+应用）、技术架构的当前状态和目标状态描述，以及差距分析结果。这个文档在 Phase E 作为关键输入使用。", "topic": "t2"}, {"num": "Q28", "star": false, "q": "Phase F 中，确定工作包优先级时应考虑哪些因素？", "opts": {"A": "只考虑成本高低", "B": "依赖关系、业务价值、风险、资源可用性、战略合规性等多维度因素", "C": "只考虑技术难度", "D": "只考虑领导层偏好"}, "ans": "B", "exp": "Phase F 的优先级排序是多维度的，TOGAF 建议考虑：工作包之间的依赖关系（先决条件）、对业务价值的贡献度、实施风险、资源可用性、与战略目标的对齐度。单一维度排序会导致高价值项目被低价值但低成本项目推后。", "topic": "t2"}, {"num": "Q29", "star": false, "q": "Architecture Roadmap（架构路线图）和 Migration Plan（迁移计划）有什么核心区别？", "opts": {"A": "两者完全相同，只是不同 Phase 的叫法", "B": "Architecture Roadmap 是高层次的时间线（展示从当前到目标的演进路径），Migration Plan 是可执行的详细实施计划", "C": "Migration Plan 是架构层级的，Architecture Roadmap 是项目层级的", "D": "Architecture Roadmap 只用于技术架构"}, "ans": "B", "exp": "Architecture Roadmap 在 Phase E 形成，展示工作包的高层次时间线，是战略性的；Migration Plan 在 Phase F 形成，包含详细的实施步骤、资源分配、时间节点，是可执行的。Roadmap 是蓝图，Migration Plan 是施工图。", "topic": "t2"}, {"num": "Q30", "star": false, "q": "完整的 ADM 循环包括多少个带字母编号的 Phase（不含 Preliminary 和需求管理）？", "opts": {"A": "6个", "B": "7个", "C": "8个", "D": "9个"}, "ans": "C", "exp": "ADM 有 8 个字母 Phase：A（Architecture Vision）、B（Business Architecture）、C（Information Systems Architecture）、D（Technology Architecture）、E（Opportunities & Solutions）、F（Migration Planning）、G（Implementation Governance）、H（Architecture Change Management）。加上 Preliminary Phase 和持续的 Requirements Management，共 10 个组成部分。", "topic": "t2"}, {"num": "Q31", "star": false, "q": "在 Phase A 中，完成利益相关者分析的主要目的是什么？", "opts": {"A": "确定项目预算", "B": "识别各方关切（Concern），确保目标架构能够回应所有关键利益相关者的关切", "C": "分配项目团队成员", "D": "确定技术平台选型"}, "ans": "B", "exp": "利益相关者分析是 Phase A 的关键活动，目的是：识别谁受到架构影响（利益相关者）、他们各自的关切（Concern）是什么、如何用架构视图（View）回应这些关切。这是构建 Architecture Vision 文档的基础。", "topic": "t2"}, {"num": "Q32", "star": false, "q": "关于 Phase C 中数据架构和应用架构的关系，以下哪个说法正确？", "opts": {"A": "两者完全独立，可以并行开发", "B": "数据架构的逻辑数据组件映射到应用架构的逻辑应用组件", "C": "应用架构决定数据架构", "D": "两者都由技术架构（Phase D）决定"}, "ans": "B", "exp": "在 Phase C 中，数据架构定义了需要管理的数据实体和关系（逻辑数据模型），这些数据组件随后在应用架构中被映射到负责处理/管理它们的应用组件上。应用程序\"服务于\"数据，而不是反过来，这就是为什么数据架构先于应用架构。", "topic": "t2"}, {"num": "Q33", "star": false, "q": "以下哪个活动属于 Phase B 但不属于 Phase D？", "opts": {"A": "差距分析（Gap Analysis）", "B": "利益相关者视图开发", "C": "业务流程建模", "D": "目标架构定义"}, "ans": "C", "exp": "业务流程建模（Business Process Modeling）是业务架构（Phase B）特有的活动，关注人、组织、流程的协作方式。Phase D（技术架构）关注的是技术平台和技术服务，不涉及业务流程。差距分析和目标架构定义在所有 Phase 中都有。", "topic": "t2"}, {"num": "Q34", "star": true, "q": "TOGAF 中，Artifact（制品）、Deliverable（交付物）、Building Block（构建块）的核心区别是什么？", "opts": {"A": "三者没有区别，只是翻译不同", "B": "Artifact 是架构工作产品；Deliverable 是正式提交审查/签字的文档；Building Block 是可重用的架构组件", "C": "Deliverable 是内部使用的，Artifact 是外部提交的", "D": "Building Block 只用于技术架构"}, "ans": "B", "exp": "三者区别是高频考点：Artifact（制品）是架构开发过程中产生的具体工作产品，如图表、目录、矩阵，可以是非正式的；Deliverable（交付物）是正式的、需要经过审批签字的文件，如 Architecture Vision 文档、Architecture Definition Document；Building Block（构建块）是可重用的架构组件，分为 ABB（Architecture Building Block，抽象）和 SBB（Solution Building Block，具体实现）。", "topic": "t3"}, {"num": "Q35", "star": true, "q": "TOGAF 的制品（Artifacts）分为哪三类？", "opts": {"A": "Policies / Procedures / Guidelines", "B": "Catalogs / Matrices / Diagrams", "C": "Models / Views / Viewpoints", "D": "Input / Output / Deliverable"}, "ans": "B", "exp": "TOGAF 制品三类型：Catalogs（目录，如应用目录、数据实体目录）、Matrices（矩阵，如应用/数据矩阵、业务交互矩阵）、Diagrams（图表，如业务流程图、应用通信图、技术架构图）。这三类制品覆盖了从\"列举\"到\"关系\"到\"可视化\"的不同需求。", "topic": "t3"}, {"num": "Q36", "star": false, "q": "ABB（Architecture Building Block）和 SBB（Solution Building Block）的核心区别是什么？", "opts": {"A": "ABB 用于技术架构，SBB 用于业务架构", "B": "ABB 是抽象的架构规格（描述需要什么），SBB 是具体的实现方案（描述如何实现）", "C": "ABB 在目标架构中使用，SBB 在当前架构中使用", "D": "两者完全相同，只是叫法不同"}, "ans": "B", "exp": "ABB（Architecture Building Block）是抽象的、技术无关的描述，定义架构\"应该能做什么\"（功能和接口规格）；SBB（Solution Building Block）是具体的实现，描述\"用什么来实现\"（具体产品、系统、服务）。例如：ABB = \"邮件服务\"，SBB = \"Microsoft Exchange Server 2019\"。", "topic": "t3"}, {"num": "Q37", "star": true, "q": "以下哪个是 Deliverable（交付物）而非 Artifact（制品）？", "opts": {"A": "Business Capability Map（业务能力图）", "B": "Application Communication Diagram（应用通信图）", "C": "Architecture Vision Document（架构愿景文档）", "D": "Data Entity/Data Component Catalog（数据实体目录）"}, "ans": "C", "exp": "Architecture Vision Document 是正式的交付物，需要经过审批和签字，是 Phase A 的核心输出，对外提交给赞助方。其余三个选项（业务能力图、应用通信图、数据实体目录）都是制品（Artifacts），是架构开发过程中的工作产品，不一定需要正式签字。", "topic": "t3"}, {"num": "Q38", "star": false, "q": "Architecture Repository（架构库）中存储哪些类型的内容？", "opts": {"A": "只存储已完成的架构文档", "B": "架构元模型、参考库、标准信息库、治理日志、架构景观、解决方案库", "C": "只存储 Building Blocks", "D": "只存储历史架构版本"}, "ans": "B", "exp": "TOGAF 定义 Architecture Repository 包含六类内容：① Architecture Metamodel（架构元模型）② Architecture Capability（架构能力）③ Architecture Landscape（架构景观，含当前/过渡/目标架构）④ Standards Information Base（标准信息库）⑤ Reference Library（参考库）⑥ Governance Log（治理日志）。", "topic": "t3"}, {"num": "Q39", "star": false, "q": "View（视图）和 Viewpoint（视点）的关系是什么？", "opts": {"A": "两者完全相同，都是利益相关者看到的内容", "B": "Viewpoint 是模板（定义如何描述），View 是基于 Viewpoint 针对特定系统生成的实例", "C": "View 是模板，Viewpoint 是实例", "D": "Viewpoint 只用于技术架构，View 用于所有架构域"}, "ans": "B", "exp": "Viewpoint（视点）是一种模板或规则，定义了特定关注点应该如何被描述（包含哪些元素、使用什么符号）；View（视图）是将这个模板应用到具体系统后生成的实际描述。比喻：Viewpoint = 相机型号和拍摄规则；View = 用这台相机拍出来的具体照片。", "topic": "t3"}, {"num": "Q40", "star": false, "q": "Architecture Landscape（架构景观）包含哪三个级别？", "opts": {"A": "Strategic / Tactical / Operational", "B": "Strategic / Segment / Capability", "C": "Foundation / Industry / Enterprise", "D": "Current / Transition / Target"}, "ans": "B", "exp": "Architecture Landscape 有三个级别：① Strategic Architecture（战略架构，整个企业的高层次视图）② Segment Architecture（段架构，业务线/部门级别的详细视图）③ Capability Architecture（能力架构，特定能力的专项架构）。这与 Architecture Continuum 的四层次不同，请注意区分。", "topic": "t3"}, {"num": "Q41", "star": false, "q": "下列哪项不属于 Architecture Content Framework 的范畴？", "opts": {"A": "制品（Artifacts）的分类", "B": "架构交付物（Deliverables）的定义", "C": "建筑构建块（Building Blocks）的描述", "D": "架构师的薪资标准"}, "ans": "D", "exp": "Architecture Content Framework 定义了架构工作产品的结构和分类，包括：制品（Artifacts，分为目录/矩阵/图表）、交付物（Deliverables）、构建块（Building Blocks，包括 ABB 和 SBB）。它是 TOGAF 关于\"架构产出物应该是什么\"的规范框架。薪资标准显然不在其范畴内。", "topic": "t3"}, {"num": "Q42", "star": true, "q": "Enterprise Continuum（企业连续体）从左到右的四个层次顺序是什么？", "opts": {"A": "Organization-Specific → Industry → Common Systems → Foundation", "B": "Foundation → Common Systems → Industry → Organization-Specific", "C": "Generic → Specific → Industry → Enterprise", "D": "Tactical → Strategic → Operational → Governance"}, "ans": "B", "exp": "Enterprise Continuum 从左到右，越来越具体（Generic → Specific）：Foundation Architecture（基础架构，最通用，如 TOGAF TRM）→ Common Systems Architecture（通用系统架构，跨行业通用，如安全架构模式）→ Industry Architecture（行业架构，如制造业参考架构）→ Organization-Specific Architecture（组织专有架构，最具体）。方向：从抽象到具体，从通用到专有。", "topic": "t4"}, {"num": "Q43", "star": false, "q": "TOGAF 中，TRM（Technical Reference Model）的主要用途是什么？", "opts": {"A": "定义业务流程的标准模板", "B": "提供技术服务和技术标准的通用分类框架，作为技术架构开发的参考", "C": "管理架构项目的时间线", "D": "定义应用系统之间的集成标准"}, "ans": "B", "exp": "TRM 是 TOGAF Foundation Architecture 的核心组成部分，提供了一个技术服务的分类体系（如数据管理服务、通信服务、安全服务等），帮助组织：标准化技术选型、与行业标准对齐、为 Phase D 提供参考基础。", "topic": "t4"}, {"num": "Q44", "star": false, "q": "III-RM（Integrated Information Infrastructure Reference Model）主要关注什么？", "opts": {"A": "网络基础设施", "B": "在企业范围内实现无缝信息流的应用程序间互操作性", "C": "数据库管理系统", "D": "安全架构"}, "ans": "B", "exp": "III-RM 是 TOGAF Foundation Architecture 的另一个参考模型，专门关注企业信息基础设施的集成，特别是应用程序之间如何实现信息互操作（Interoperability）。它提供了一个参考架构，帮助设计\"所有应用都能互通\"的信息基础设施。", "topic": "t4"}, {"num": "Q45", "star": false, "q": "Architecture Repository 中的 Standards Information Base（标准信息库）存储什么？", "opts": {"A": "架构原则", "B": "组织认可和批准使用的技术标准、产品和规范清单", "C": "历史架构决策记录", "D": "架构师的工作日志"}, "ans": "B", "exp": "Standards Information Base 是 Architecture Repository 的一个组成部分，存储组织批准使用的技术标准，包括：开放标准（ISO、IEEE等）、供应商标准（SAP ABAP、Java EE等）、内部制定的技术规范。Phase D 开发技术架构时参考这个库选择符合标准的技术组件。", "topic": "t4"}, {"num": "Q46", "star": false, "q": "Enterprise Continuum 中的 Architecture Continuum 和 Solutions Continuum 有什么关系？", "opts": {"A": "两者完全相同", "B": "Architecture Continuum 描述架构（抽象），Solutions Continuum 描述实现（具体），两者平行且相互对应", "C": "Solutions Continuum 包含 Architecture Continuum", "D": "Architecture Continuum 在 Solutions Continuum 之后发展"}, "ans": "B", "exp": "Enterprise Continuum = Architecture Continuum + Solutions Continuum。两者平行对应：Architecture Continuum 从基础架构到组织专有架构（抽象层）；Solutions Continuum 从通用产品/服务到组织特定解决方案（具体实现层）。ABB 属于 Architecture Continuum，SBB 属于 Solutions Continuum。", "topic": "t4"}, {"num": "Q47", "star": false, "q": "以下哪项最能描述 Architecture Governance（架构治理）的核心功能？", "opts": {"A": "替代项目管理功能", "B": "确保架构活动符合组织战略，管理架构完整性，处理架构偏差", "C": "负责技术基础设施的运营维护", "D": "只在 Phase G 中发挥作用"}, "ans": "B", "exp": "架构治理是一套持续的管理机制，核心功能：确保架构与战略对齐、维护架构的完整性和质量、审查架构合规性、处理变更请求和豁免申请。它不仅在 Phase G，而是贯穿整个 ADM 的治理保障机制。", "topic": "t4"}, {"num": "Q48", "star": true, "q": "Architecture Board（架构委员会）的主要职责是什么？", "opts": {"A": "负责编写架构文档", "B": "提供跨整个组织的架构合规监督，审查并批准架构工作，解决架构冲突", "C": "执行技术实施工作", "D": "管理 IT 基础设施的日常运营"}, "ans": "B", "exp": "Architecture Board 是架构治理的核心机构，职责包括：批准架构文档、确保架构合规、解决架构争议、管理架构原则、审查架构豁免请求。Architecture Board 通常由来自业务和 IT 的高层代表组成，具有正式授权。", "topic": "t5"}, {"num": "Q49", "star": true, "q": "Architecture Compliance（架构合规）的四个级别是什么？", "opts": {"A": "Excellent / Good / Fair / Poor", "B": "Conformant / Compliant / Non-Conformant / Irrelevant", "C": "Approved / Pending / Rejected / Waived", "D": "Full / Partial / Minimal / None"}, "ans": "B", "exp": "TOGAF 定义四个合规级别：Conformant（一致，完全符合架构要求）、Compliant（合规，实质性符合，有轻微偏差）、Non-Conformant（不合规，存在重大偏差，需要豁免或修正）、Irrelevant（不相关，该架构要求对此项目不适用）。这是 Level 1+2 双考点。", "topic": "t5"}, {"num": "Q50", "star": false, "q": "Architecture Contract（架构合同）的主要目的是什么？", "opts": {"A": "与外部供应商签订的采购合同", "B": "架构团队与开发/实施团队之间的正式协议，定义架构服务水平和合规要求", "C": "架构师的薪酬合同", "D": "技术许可协议"}, "ans": "B", "exp": "Architecture Contract 是架构团队与利益相关者（如开发团队、业务部门）之间的正式书面协议，内容包括：将要交付的架构工作产品、架构质量标准、合规要求、验收标准。它确保各方对架构目标和约束条件的共同理解和承诺。", "topic": "t5"}, {"num": "Q51", "star": false, "q": "架构原则（Architecture Principle）的 5 个组成要素是什么？", "opts": {"A": "Goal / Objective / Policy / Standard / Guideline", "B": "Name / Statement / Rationale / Implications / Metrics", "C": "Title / Description / Owner / Date / Version", "D": "Requirement / Constraint / Assumption / Risk / Issue"}, "ans": "B", "exp": "TOGAF 定义架构原则的 5 要素：Name（名称，简短易记）、Statement（声明，一句话表述原则内容）、Rationale（依据，说明为什么需要这条原则，即业务理由）、Implications（影响，说明遵循此原则的代价和要求）、Metrics（度量，如何衡量是否遵循了此原则）。其中 Rationale 是\"为什么\"，是高频考点。", "topic": "t5"}, {"num": "Q52", "star": false, "q": "在 Preliminary Phase 中，Architecture Principles 的主要来源是什么？", "opts": {"A": "随机制定，根据架构师个人经验", "B": "从组织业务原则、IT 战略、以及 TOGAF 原则示例中衍生", "C": "仅从行业标准中采用", "D": "由 Architecture Board 独立制定，无需参考现有文件"}, "ans": "B", "exp": "架构原则来源多元：业务原则（Business Principles，来自公司战略和业务规则）、TOGAF 参考原则（TOGAF 提供了一套示范原则供参考）、IT 战略文件、以及现有政策法规。制定原则是 Preliminary Phase 的核心工作之一，需要各层级利益相关者的输入。", "topic": "t5"}, {"num": "Q53", "star": false, "q": "Capability Architecture（能力架构）关注什么？", "opts": {"A": "整个企业的战略方向", "B": "业务线或部门级别的架构", "C": "特定业务能力（如采购能力、制造能力）的详细架构设计", "D": "技术基础设施的详细规格"}, "ans": "C", "exp": "Architecture Landscape 的三个级别：Strategic（战略，企业全局）、Segment（段，业务线/部门）、Capability（能力，具体业务能力的专项架构）。Capability Architecture 是最细粒度的，专注于支撑特定业务能力（如\"供应链能力\"或\"客户服务能力\"）所需的架构。", "topic": "t5"}, {"num": "Q54", "star": true, "q": "Stakeholder（利益相关者）在 TOGAF 中的定义是什么？", "opts": {"A": "项目的资金提供者", "B": "对系统有兴趣或关切的个人、团队或组织，包括项目内部和外部", "C": "只包括 C 级高管", "D": "只包括 IT 部门人员"}, "ans": "B", "exp": "TOGAF 对利益相关者的定义非常宽泛，涵盖：内部（管理层、业务用户、IT团队）和外部（客户、监管机构、供应商）对架构有利益关系的任何方。利益相关者分析是 Phase A 的关键活动，识别\"谁关心什么\"是构建架构愿景的基础。", "topic": "t6"}, {"num": "Q55", "star": true, "q": "Concern（关切）在 TOGAF 中是指什么？", "opts": {"A": "项目的风险清单", "B": "利益相关者关于系统某方面的兴趣、期望或担忧", "C": "合规性问题", "D": "预算超支问题"}, "ans": "B", "exp": "Concern 是特定利益相关者对系统的某个方面所持有的兴趣、期望或担忧。架构工作的核心价值之一就是识别并\"回应\"各利益相关者的 Concern。例如：CFO 的 Concern 是\"系统是否能降低财务报告成本\"；CIO 的 Concern 是\"新系统是否能与现有基础设施集成\"。", "topic": "t6"}, {"num": "Q56", "star": false, "q": "View（视图）在 TOGAF 中的定义是什么？", "opts": {"A": "系统的完整技术文档", "B": "从特定 Viewpoint 出发，对某个系统或部分系统的描述", "C": "利益相关者的个人意见", "D": "架构图表的集合"}, "ans": "B", "exp": "View 是根据特定 Viewpoint 规则，对系统特定方面的正式描述。View 专门用于回应特定利益相关者的 Concern。一个系统可以有多个 View（如业务视图、技术视图、安全视图），每个 View 针对不同受众的关切。", "topic": "t6"}, {"num": "Q57", "star": false, "q": "利益相关者管理矩阵（Power/Interest Grid）中，\"高权力/低兴趣\"的利益相关者应如何管理？", "opts": {"A": "密切沟通，频繁更新", "B": "保持满意（Keep Satisfied），定期简报但无需深度参与", "C": "最小程度关注", "D": "让其主导所有架构决策"}, "ans": "B", "exp": "Power/Interest Grid 四象限策略：高权力+低兴趣 → Keep Satisfied（满足他们，以防他们有负面反应）；高权力+高兴趣 → Manage Closely（密切管理）；低权力+高兴趣 → Keep Informed（保持告知）；低权力+低兴趣 → Monitor（最小关注）。", "topic": "t6"}, {"num": "Q58", "star": false, "q": "利益相关者矩阵（Stakeholder Map）的主要用途是什么？", "opts": {"A": "决定架构团队的人员招募", "B": "识别并记录所有利益相关者、其权力/兴趣级别、关切，以指导架构沟通策略", "C": "记录技术债务", "D": "管理项目预算分配"}, "ans": "B", "exp": "Stakeholder Map 是 Phase A 的关键工具，用于：系统性识别所有受影响方、评估其权力和关注度、了解其关切（Concern）、制定差异化的沟通和参与策略。它确保架构工作不会忽视关键利益相关者，从而提高架构的接受度。", "topic": "t6"}, {"num": "Q59", "star": false, "q": "当不同利益相关者的 Concern 相互冲突时，架构师应如何处理？", "opts": {"A": "优先满足最高层级管理者的 Concern，忽略其他", "B": "通过透明沟通、权衡分析，寻求经过正式治理机制批准的折中方案", "C": "采用投票机制决定", "D": "将冲突搁置，先完成其他工作"}, "ans": "B", "exp": "TOGAF 强调架构治理的重要性：冲突不应被忽视或简单专制解决。正确方式是：识别并记录冲突、分析各方 Concern 的优先级、提出折中方案、通过 Architecture Board 等正式治理机制做出裁决并记录决策依据。", "topic": "t6"}, {"num": "Q60", "star": true, "q": "Gap Analysis（差距分析）在 TOGAF ADM 中的主要目的是什么？", "opts": {"A": "确定项目预算缺口", "B": "识别当前架构（Baseline）和目标架构（Target）之间的差异，为迁移计划提供输入", "C": "评估团队技能水平", "D": "比较不同供应商产品"}, "ans": "B", "exp": "Gap Analysis 是 TOGAF 中将 Baseline（当前状态）与 Target（目标状态）进行比较的分析工具，产出四类差异：新增（Add，目标有但当前没有）、保留（Retain，当前有且目标也要保留）、去除（Eliminate，当前有但目标要去掉）、迁移（Migrate，当前有但需要改造才能满足目标）。这个结果直接驱动 Phase E 的工作包定义。", "topic": "t7"}]}, "L7_1": {"type": "reading", "title": "📖 Level 2 解题方法论", "html": "<h2 id=\"第一章-Level-2-解题方法论\">第一章：Level 2 解题方法论</h2>\n<h3 id=\"考试逻辑\">考试逻辑</h3>\n<p>Level 2 考试给你一个公司背景（约 500-800 字），然后提 8 个场景问题，每题 4 个选项选 1 个最佳答案。</p>\n<p><strong>关键原则：选&quot;最 TOGAF&quot;的答案</strong></p>\n<p>常见陷阱：</p>\n<ul>\n<li>选项 A/B/C/D 看起来都是合理的做法，但有的选项&quot;不够完整&quot;或&quot;跳过了 TOGAF 步骤&quot;</li>\n<li>正确答案往往是&quot;先做 X，然后做 Y&quot;的完整步骤，而错误选项只做了 Y（跳过了 X）</li>\n<li>有些选项技术上没错，但不是 TOGAF 推荐的方式</li>\n</ul>\n<h3 id=\"解题三步法\">解题三步法</h3>\n<ol>\n<li><strong>锁定 Phase</strong>：这道题发生在 ADM 哪个阶段？该阶段的&quot;正确做法&quot;是什么？</li>\n<li><strong>排除&quot;跳步&quot;选项</strong>：跳过重要 TOGAF 前置步骤的选项通常是错的</li>\n<li><strong>选择&quot;治理优先&quot;</strong>：TOGAF 强调架构治理，涉及变更、偏差、冲突时，走正式治理渠道的答案往往是对的</li>\n</ol>\n<hr>\n<h2 id=\"第二章-场景一-制造企业数字化转型启动\">第二章：场景一 — 制造企业数字化转型启动</h2>\n<h3 id=\"背景描述\">背景描述</h3>\n<p><strong>公司：</strong> 星辉照明集团（化名）</p>\n<ul>\n<li>中国 A 股上市制造企业，营收约 85 亿元，照明行业</li>\n<li>旗下 16 家子公司（含泰国工厂、德国销售公司）</li>\n<li>现用 SAP ECC 6.0（已运行 9 年），PLM/MES/CRM 等系统各自独立</li>\n<li>扣非净利率仅 0.9%，远低于行业标杆欧普照明（13%）</li>\n</ul>\n<p><strong>背景：</strong></p>\n<p>董事会批准了&quot;数字化转型三年规划&quot;，任命副总经理李明为数字化转型主管（Sponsor）。集团 CIO 决定引入 TOGAF 方法论，并任命了集团首席架构师（CAE：Chief Architecture Executive）王工。</p>\n<p>目前情况：</p>\n<ul>\n<li>架构团队刚成立，尚无 Architecture Governance 机制</li>\n<li>各子公司有独立 IT 预算，不受集团统一管控</li>\n<li>董事会要求 6 个月内出具数字化转型路线图</li>\n</ul>\n<hr>\n<p><strong>Q1</strong>：王工（CAE）被任命后，根据 TOGAF，他的<strong>第一步工作</strong>应该是什么？</p>\n<p>A. 立即启动 Phase A，与董事会召开架构愿景工作坊，定义数字化转型目标架构</p>\n<p>B. 开始 Preliminary Phase，建立架构能力框架，定制 ADM，制定架构原则，建立 Architecture Board</p>\n<p>C. 先完成现有系统（ECC）的详细评估，再决定是否需要 TOGAF</p>\n<p>D. 直接进入 Phase E，制定实施路线图，满足董事会 6 个月的时间要求</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：这是一道典型的&quot;Preliminary Phase vs Phase A 的先后顺序&quot;题。TOGAF 明确：在启动任何 ADM Phase 之前，必须先完成 Preliminary Phase，建立架构能力（Architecture Capability）。没有架构原则、没有 Architecture Board、没有定制 ADM，就直接跳进 Phase A 是错误的。选项 A 跳过了 Preliminary；选项 C 的&quot;先评估再决定&quot;不符合 TOGAF 逻辑；选项 D 跳过了绝大部分前置工作，是最差的选择。</p>\n<hr>\n<p><strong>Q2</strong>：在 Preliminary Phase 中，王工需要制定架构原则。以下哪个选项最准确描述了制定架构原则的正确方式？</p>\n<p>A. 王工参考 TOGAF 示范原则清单，直接采用标准原则，无需修改，这样最省时间</p>\n<p>B. 王工独立起草所有原则，不征求其他部门意见，以确保架构独立性</p>\n<p>C. 王工综合公司业务原则、IT 战略、以及来自业务和 IT 高层的输入，制定符合本公司情况的架构原则，并经过 Architecture Board（或同等机构）批准</p>\n<p>D. 架构原则应等到 Phase B（业务架构）完成后再制定，因为那时才有足够的业务信息</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：TOGAF 对架构原则的制定有明确要求：原则应综合多方来源（公司业务原则、IT战略、行业最佳实践）制定，并经过正式批准。仅采用标准示例原则（选项A）无法反映公司特殊情况；架构师独立决定（选项B）违反了利益相关者参与原则；等到 Phase B 才制定原则（选项D）颠倒了顺序——原则应该先于架构开发存在，因为它们是架构决策的基础。</p>\n<hr>\n<p><strong>Q3</strong>：由于各子公司有独立 IT 预算，不受集团管控，这在 TOGAF 框架下属于什么类型的挑战？应如何处理？</p>\n<p>A. 这是技术架构问题，在 Phase D 处理</p>\n<p>B. 这是 Architecture Governance 挑战，应在 Preliminary Phase 建立覆盖子公司的架构治理权限和机制</p>\n<p>C. 这是预算管理问题，不在 TOGAF 范畴内，交给 CFO 处理</p>\n<p>D. 等各子公司自然整合后再建立治理机制</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：子公司 IT 自治是典型的架构治理（Architecture Governance）挑战。TOGAF 的 Preliminary Phase 需要确立架构的管辖范围（Architecture Scope），包括明确架构治理如何覆盖子公司。如果 Preliminary Phase 不解决这个问题，后续所有架构工作都可能被子公司&quot;另起炉灶&quot;所破坏。这不是单纯的技术或财务问题，是治理问题。</p>\n<hr>\n<h2 id=\"第三章-场景二-ERP-升级架构评估\">第三章：场景二 — ERP 升级架构评估</h2>\n<h3 id=\"背景描述-接场景一-\">背景描述（接场景一）</h3>\n<p><strong>情况更新：</strong></p>\n<p>Preliminary Phase 已完成。Architecture Board 由 CIO、副总经理李明、4 位业务 VP 组成。王工启动了 Phase A，召开了利益相关者工作坊。</p>\n<p>主要关切汇总：</p>\n<ul>\n<li>CFO 张总：财务系统能否支持海外子公司合并报表？ → 关切：Financial Consolidation</li>\n<li>供应链VP 陈总：能否实现跨子公司的协同计划？ → 关切：Integrated Planning</li>\n<li>IT 总监：系统升级过程中如何保证业务连续性？ → 关切：Migration Risk</li>\n<li>德国子公司 GM：需符合欧盟数据法规（GDPR）→ 关切：Compliance</li>\n</ul>\n<hr>\n<p><strong>Q4</strong>：王工在整理利益相关者关切后，下一步应该做什么？</p>\n<p>A. 直接开始 Phase B 业务架构，将关切记录备案</p>\n<p>B. 针对每个关切，定义对应的 Viewpoint（视点），说明将用哪种 View（视图）来回应该关切，并将这些纳入架构愿景文档</p>\n<p>C. 将关切提交给 Architecture Board 投票，由多数通过的关切才纳入架构工作</p>\n<p>D. 只关注 CFO 和供应链 VP 的关切，因为他们的权力最高</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：识别利益相关者关切（Concern）之后，TOGAF 要求架构师定义对应的 Viewpoint，明确将如何创建 View 来回应各方关切。这是 Phase A 的关键步骤，架构愿景文档必须包含&quot;如何回应各方关切&quot;的说明。选项A跳过了这个关键步骤；选项C的&quot;投票机制&quot;不符合 TOGAF；选项D忽视了重要利益相关者（IT总监和德国GM的关切同样关键）。</p>\n<hr>\n<p><strong>Q5</strong>：在 Phase B 开发业务架构时，王工应如何处理&quot;16 家子公司业务模式不统一&quot;的问题？</p>\n<p>A. 强制统一所有子公司的业务流程，以简化系统实施</p>\n<p>B. 先描述现有 Baseline Business Architecture（包含各子公司的差异），再基于战略目标定义 Target Business Architecture，差距分析中明确哪些差异需要标准化、哪些允许差异化</p>\n<p>C. 只描述集团总部的业务架构，子公司业务架构等下一个 ADM 循环再做</p>\n<p>D. 直接在 Phase D 处理，因为这本质上是系统配置问题</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：Phase B 的核心工作是开发 Baseline 和 Target 两个版本的业务架构。业务架构不能只描述理想状态，必须先真实记录现状（包括子公司差异）。差距分析（Gap Analysis）会识别哪些差异是需要消除的（标准化），哪些是有业务理由保留的（差异化），这个判断必须有业务依据，不能由架构师单方面决定。</p>\n<hr>\n<h2 id=\"第四章-场景三-架构治理与合规审查\">第四章：场景三 — 架构治理与合规审查</h2>\n<h3 id=\"背景描述-接场景二-\">背景描述（接场景二）</h3>\n<p>目标架构已完成（Phase B/C/D），Architecture Board 已批准。现在进入实施阶段（Phase G）。</p>\n<p><strong>事件：</strong></p>\n<p>ERP 实施商（艾达咨询）在 Phase G 提交了一份架构合规申请（Architecture Compliance Review Request），申请内容显示：</p>\n<ul>\n<li>受时间压力，他们计划跳过 MDG（Master Data Governance）模块实施，直接上线 S/4HANA 核心财务</li>\n<li>理由：MDG 实施周期长，会影响项目交期</li>\n<li>但批准的目标架构中，MDG 是数据治理的核心基础组件</li>\n</ul>\n<hr>\n<p><strong>Q6</strong> ⭐：Architecture Board 应如何处理艾达咨询的这个合规申请？</p>\n<p>A. 因为是外部供应商的决定，Architecture Board 无权干涉，应尊重实施方的专业判断</p>\n<p>B. 直接拒绝，强制要求按照批准的目标架构实施 MDG</p>\n<p>C. 评估 MDG 跳过对整体目标架构的影响，如果影响重大，可以：要求修改方案、或颁发有条件的 Architecture Dispensation（豁免），设定明确的补充实施时间表和条件</p>\n<p>D. 将这个决定交给 CFO，因为这涉及预算和时间权衡</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：Architecture Board 的核心职能之一是处理架构合规申请，包括偏差（Deviation）和豁免（Dispensation）请求。正确做法不是简单&quot;批准&quot;或&quot;拒绝&quot;，而是：评估偏差的影响、确定这是否可以接受的过渡状态、如果批准偏差，必须附加条件（如&quot;MDG 必须在上线后 6 个月内补充实施&quot;）并记录。选项A错误——Board 有架构治理权；选项B可能过于刚性，脱离实际；选项D将架构决策权转移出架构治理范畴，不正确。</p>\n<hr>\n<p><strong>Q7</strong>：在 Phase G 中，如果艾达咨询提交的系统设计文档与批准的应用架构存在轻微偏差（如集成接口技术选型从 SOAP 改为 REST），Architecture Board 应如何处置？</p>\n<p>A. 视为重大架构违规，拒绝批准，要求恢复原设计</p>\n<p>B. 评估偏差影响：如果功能等价且不影响架构原则，记录为 Compliant（合规但有轻微偏差），并更新架构文档</p>\n<p>C. 不需要任何审查，实施方有权自主决定技术细节</p>\n<p>D. 将决定权交给 CIO 个人判断</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：SOAP 到 REST 是技术实现细节的调整，只要功能等价、不违反架构原则（如&quot;所有内外部接口使用标准协议&quot;），属于合理的技术演进。Architecture Board 应将其标记为 Compliant（而非 Conformant，因为存在偏差）并更新架构文档，以保持架构文档与实际实施的同步。这体现了 TOGAF 架构治理的实用主义——不是僵化执行文字，而是维护架构意图的完整性。</p>\n<hr>\n<h2 id=\"第五章-场景四-架构变更管理\">第五章：场景四 — 架构变更管理</h2>\n<h3 id=\"背景描述\">背景描述</h3>\n<p>S/4HANA 已上线 4 个月（Phase H 阶段）。以下两个变更请求同时到达 Architecture Board：</p>\n<p><strong>变更请求 1：</strong> 德国子公司新增了一个在线 B2B 销售渠道，需要与 S/4HANA SD 模块集成。集成架构尚未在目标架构中定义。</p>\n<p><strong>变更请求 2：</strong> 中国政府发布新政策，要求制造企业在 2026 年底前实施碳排放追踪系统，涉及供应链全链路数据采集，需要大规模架构改造。</p>\n<hr>\n<p><strong>Q8</strong> ⭐：对于变更请求 1（德国 B2B 渠道集成），应归类为哪种变更类型，如何处理？</p>\n<p>A. 类型 3（颠覆性变更）→ 启动全面新 ADM 循环</p>\n<p>B. 类型 1（简化/精化变更）→ 直接更新架构文档，无需新 ADM 循环</p>\n<p>C. 类型 2（增量/演进变更）→ 启动简化版 ADM 循环（聚焦 Phase C 应用架构和 Phase D 技术架构），新增集成方案</p>\n<p>D. 无需处理，实施商自行决定即可</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：变更请求 1 是典型的类型 2（增量变更）：它在现有架构框架内增加新功能（新集成），不改变整体架构方向，但也不是简单的文档更新（类型1）。正确处理：启动简化版 ADM 循环，重点评估 Phase C（应用架构中增加新集成组件）和 Phase D（技术架构中确认技术实现），更新架构文档，并通过 Architecture Board 批准。</p>\n<hr>\n<p><strong>Q9</strong>：对于变更请求 2（碳排放追踪合规要求），应归类为哪种变更类型，如何处理？</p>\n<p>A. 类型 1（简化变更）→ 直接更新架构文档</p>\n<p>B. 类型 2（增量变更）→ 启动简化版 ADM 循环</p>\n<p>C. 类型 3（颠覆性/重新定义变更）→ 触发全面新 ADM 循环，重新审视业务架构、数据架构、技术架构</p>\n<p>D. 由监管合规部门自行处理，不需要架构团队参与</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：碳排放追踪是重大的监管驱动变更：影响供应链全链路、需要采集新的业务数据、可能需要新的技术平台。这是类型 3 变更——它可能改变业务架构（新业务流程）、数据架构（新数据实体和流向）、技术架构（新传感器/IoT/分析平台）。这类变更需要完整的新 ADM 循环，从 Phase A 重新定义架构愿景开始。</p>\n<hr>\n<h2 id=\"第六章-华辉项目改编终极场景\">第六章：华辉项目改编终极场景</h2>\n<h3 id=\"背景描述-400字-\">背景描述（400字）</h3>\n<p><strong>公司：</strong> 华明电气集团（华明，以下代称，参照实际案例改编）</p>\n<p>华明电气集团是中国 A 股上市照明制造企业（股票代码 HXXX），2025 年营业收入 87.9 亿元，综合毛利率 17.6%，扣非净利率仅 0.95%，远低于行业竞争对手光亮照明（净利率 13.2%）。集团旗下 19 家法人（含泰国工厂 TH40、德国销售公司 DE33）。</p>\n<p>现有信息化系统：SAP ECC 6.0（已运行 12 年，模块：FICO/SD/MM/PP/QM/WM）、PLM、财务共享平台（2025 年新上线）、MES、SRM 等独立系统。</p>\n<p>2026 年 5 月，董事会批准了&quot;数字化转型与 SAP 升级项目&quot;，分两期：</p>\n<ul>\n<li><strong>第一期（18周）</strong>：业务诊断咨询 + 数字化转型 EA 蓝图</li>\n<li><strong>第二期（8个月）</strong>：SAP S/4HANA PCE Greenfield 全新实施</li>\n</ul>\n<p>第一期已启动，集团首席架构师魏工（CAE）刚完成了 Preliminary Phase，Architecture Board 已成立（由集团副总经理、CIO、各业务线 VP 组成），正式进入 Phase A。</p>\n<p><strong>已识别的主要业务痛点：</strong></p>\n<ul>\n<li>内部关联交易税务核算复杂，合并报表效率低</li>\n<li>19 家法人财务数据不统一，集团管控薄弱</li>\n<li>销售价格体系混乱，SD 主数据质量差</li>\n<li>BOM / 物料主数据不规范，影响 PP 计划准确性</li>\n<li>海外法人（泰国、德国）面临外汇管理和合规挑战</li>\n</ul>\n<hr>\n<p><strong>S1</strong>：在 Phase A 中，魏工需要准备 Architecture Vision 文档。以下哪项内容<strong>必须</strong>包含在 Architecture Vision 文档中？</p>\n<p>A. S/4HANA 的详细技术配置方案</p>\n<p>B. 数据迁移方案</p>\n<p>C. 高层架构愿景描述、利益相关者关切、项目范围与约束、架构工作说明书（Statement of Architecture Work）</p>\n<p>D. 每个模块的详细业务蓝图</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：Architecture Vision 文档是 Phase A 的核心输出，包含：高层架构描述（只是愿景，不是详细设计）、已识别的利益相关者及其关切、项目范围和约束（边界条件）、Statement of Architecture Work（工作授权）。技术配置方案（选A）是 Phase D 的工作；数据迁移方案（选B）是 Phase F；模块蓝图（选D）是 Phase B/C 的工作。</p>\n<hr>\n<p><strong>S2</strong>：魏工在利益相关者分析中发现，集团副总经理（高权力/高兴趣）、泰国工厂总经理（中权力/高兴趣）、财务共享平台供应商（低权力/高兴趣）的关切不同。针对泰国工厂总经理，最合适的参与策略是什么？</p>\n<p>A. 与集团副总经理完全相同——密切管理，深度参与所有架构决策</p>\n<p>B. Keep Informed（保持告知）——定期更新进展，确保泰国工厂的特殊需求（外汇、当地合规）被记录和纳入架构</p>\n<p>C. Monitor（最小关注）——泰国工厂是子公司，不需要特别关注</p>\n<p>D. 直接让泰国工厂 GM 主导泰国相关架构决策，集团不干预</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：泰国工厂 GM（中权力/高兴趣）的正确策略是 Keep Informed（保持告知）。他有重要的本地知识（泰国劳工法、税法、外汇管制），但不应像集团副总经理那样深度参与每个架构决策。架构师需要定期与他同步，确保泰国特殊需求被记录为约束条件（Architecture Constraints）并纳入架构工作。</p>\n<hr>\n<p><strong>S3</strong>：在 Phase B 业务架构阶段，魏工分析了&quot;19 家法人财务数据不统一&quot;的问题。从 TOGAF 视角，这个问题的根本架构原因是什么？应如何处理？</p>\n<p>A. 这是 IT 系统问题，等 S/4HANA 上线后自动解决</p>\n<p>B. 这是业务架构层面的&quot;组织结构和流程不统一&quot;问题，需要在 Baseline Business Architecture 中记录现状，在 Target Business Architecture 中定义统一的财务管控模型，差距分析后在 Phase E 定义相应工作包</p>\n<p>C. 这是数据架构问题，在 Phase C 的 Data Architecture 阶段处理</p>\n<p>D. 这只是主数据质量问题，MDG 模块上线后解决</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：财务数据不统一的根本原因是业务架构层面的——没有统一的集团财务管控模式（Business Architecture），导致各法人按自己方式运作，数据自然不统一。TOGAF 要求先解决业务层的问题（Phase B），再在 Phase C 解决数据架构（统一数据模型）和 Phase D 的技术实现（MDG）。跳过业务架构直接&quot;用系统解决&quot;（选A/C/D）是典型的&quot;用技术解决业务问题&quot;的反模式。</p>\n<hr>\n<p><strong>S4</strong>：在 Phase C 开发信息系统架构时，魏工应先开发数据架构还是应用架构？理由是什么？</p>\n<p>A. 先开发应用架构，因为 S/4HANA 的模块范围已经确定了</p>\n<p>B. 先开发数据架构，因为应用程序是数据的处理器，数据架构确定后才能明确每个应用组件需要处理什么数据</p>\n<p>C. 两者同时并行开发，以节省时间</p>\n<p>D. 顺序不重要，随便选一个开始</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：TOGAF 明确规定 Phase C 的顺序：先 Data Architecture，后 Application Architecture。原因：数据架构定义了企业需要管理的核心数据实体和关系（如客户主数据、物料主数据、财务凭证）；应用架构定义了各应用组件如何处理这些数据。没有清晰的数据架构，就无法合理划分应用边界。S/4HANA 模块范围确定（选A）是实施约束，但不改变架构开发顺序。</p>\n<hr>\n<p><strong>S5</strong>：Phase E 阶段，魏工识别出以下工作包候选：① MDG 主数据治理 ② Group Reporting 集团合并报表 ③ S/4HANA FICO ④ S/4HANA EWM ⑤ 泰国/德国法人扩展 ⑥ GTS 全球贸易服务。对这些工作包进行优先级排序时，TOGAF 推荐考虑哪些因素？</p>\n<p>A. 只根据实施成本从低到高排序</p>\n<p>B. 只根据管理层偏好排序</p>\n<p>C. 综合考虑：工作包间的依赖关系、对战略目标的贡献度（业务价值）、实施风险、资源可用性，制定多维度优先级</p>\n<p>D. 按照 SAP 标准实施顺序，不做调整</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：Phase F（迁移规划）的优先级排序是多维度的。对于华明的工作包，依赖关系分析就很关键：MDG 是其他模块的基础（先做 MDG 才能保证主数据质量），应优先；FICO 是核心，先于报表；GTS 可以后置；泰国/德国扩展依赖国内稳定后进行。纯成本排序（选A）或管理层偏好（选B）会导致不合理的实施顺序，可能造成返工。</p>\n<hr>\n<p><strong>S6</strong>：S/4HANA 上线 3 个月后（Phase H），华明接到通知：欧盟要求所有在德国运营的企业在 2027 年前实现 CBAM（碳边境调节机制）合规报告，这需要从供应链系统（MES/采购）采集碳足迹数据并集成到 GTS 模块。这属于哪种变更类型？应如何处理？</p>\n<p>A. 类型 1（简化变更）→ 由 IT 团队直接处理，无需 Architecture Board 介入</p>\n<p>B. 类型 2（增量变更）→ 启动简化 ADM 循环，重点关注 Phase C/D，扩展集成架构</p>\n<p>C. 类型 3（重新定义变更）→ 触发完整新 ADM 循环，因为这涉及新的监管驱动的业务架构变化、新数据架构（碳数据模型）、新技术集成</p>\n<p>D. 不处理，让德国子公司自行解决</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：CBAM 合规是典型的重大监管变化，影响广泛：① 业务架构层面：需要新的碳核算业务流程（Phase B 重做）② 数据架构层面：需要新的碳足迹数据模型（Phase C 重做）③ 技术架构层面：MES-GTS 集成、新数据采集终端（Phase D 重做）。这是类型 3 变更，不能用局部修补处理，需要触发新的完整 ADM 循环（可以范围限定在&quot;碳合规能力架构&quot;维度内）。</p>\n<hr>\n<p><strong>S7</strong>：在整个项目过程中，魏工多次遇到业务部门提出的需求变更。根据 TOGAF，需求管理（Requirements Management）应如何处置这些变更？</p>\n<p>A. 所有需求变更在 Phase A 集中收集，之后不再接受变更</p>\n<p>B. 需求变更只能在 Phase F 处理，因为那是迁移规划阶段</p>\n<p>C. 需求管理是持续的过程，贯穿所有 Phase：新需求进入需求库，评估对当前 Phase 的影响，决定是在当前循环中处理还是推迟到下一循环</p>\n<p>D. 所有需求变更直接提交给 Architecture Board 批准即可，无需进一步分析</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：这是 Level 2 考试中关于需求管理的核心考点。需求管理是位于 ADM 中心的持续过程，不是某个特定 Phase 的工作。当新需求到来时，需求管理流程：① 将需求存储到需求库 ② 评估对当前正在进行的 Phase 的影响 ③ 如果影响当前 Phase，按变更控制流程处理；如果是未来 Phase 的需求，暂存等待 ④ Architecture Board 处理的是架构批准，不是需求收集。</p>\n<hr>\n<p><strong>S8（综合题）</strong>：项目即将进入 Phase G（实施治理），实施商提出了一个偏离批准目标架构的方案：使用定制开发（Custom ABAP）替代 Group Reporting 标准功能，理由是定制开发更快实现华明特定的集团合并报表格式。作为 CAE，魏工应如何通过 TOGAF 架构治理机制处理这个问题？</p>\n<p>A. 接受实施商的方案，因为他们是 SAP 专家，技术判断应受尊重</p>\n<p>B. 拒绝任何偏离，要求 100% 使用标准 Group Reporting 功能</p>\n<p>C. 通过架构合规评审流程：① 评估定制开发对架构原则的违背程度（如&quot;优先使用标准功能&quot;原则）② 分析长期影响（维护成本、升级风险）③ 提交 Architecture Board 审议 ④ 如批准，颁发 Architecture Dispensation，记录条件和风险</p>\n<p>D. 将决定交给 CFO，因为这涉及成本权衡</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：这道题考察 Phase G 的架构治理实操。正确的 TOGAF 处理流程：① Phase G 的核心是确保实施符合架构意图，架构师不能绕过治理流程；② Architecture Compliance Review 是正式机制；③ 完全拒绝（选B）可能脱离业务实际；④ 将决定移出架构治理范畴（选A/D）违反了 TOGAF 原则。如果有充分业务理由允许偏差，颁发 Dispensation 并记录风险是正确做法——这体现了 TOGAF 架构治理的务实性：不是僵化执行文字，而是通过正式机制管控风险。</p>\n<hr>\n<h2 id=\"第七章-解题框架总结\">第七章：解题框架总结</h2>\n<h3 id=\"选题黄金三问\">选题黄金三问</h3>\n<ol>\n<li><strong>这道题发生在 ADM 哪个 Phase？</strong> 定位 Phase 是最重要的第一步</li>\n<li><strong>选项中有没有&quot;跳步&quot;？</strong> 跳过 TOGAF 前置步骤的答案几乎肯定是错的</li>\n<li><strong>有没有涉及治理/变更？</strong> 需要 Architecture Board 正式处理的，一定要走治理流程</li>\n</ol>\n<h3 id=\"常见错误选项模式\">常见错误选项模式</h3>\n<div class=\"tbl\"><table>\n<tr><th>模式</th><th>特征</th><th>为什么错</th></tr>\n<tr><td>&quot;直接做&quot;</td><td>跳过分析/评估直接执行</td><td>TOGAF 强调先分析、后决策</td></tr>\n<tr><td>&quot;技术决定一切&quot;</td><td>用技术方案解决业务/架构问题</td><td>TOGAF 自顶向下，业务驱动技术</td></tr>\n<tr><td>&quot;绕过治理&quot;</td><td>让个人判断替代 Board 决策</td><td>TOGAF 治理优先，需要正式机制</td></tr>\n<tr><td>&quot;一刀切&quot;</td><td>要么全批，要么全拒</td><td>TOGAF 鼓励有条件的豁免（Dispensation）</td></tr>\n<tr><td>&quot;单阶段完成&quot;</td><td>认为某个问题只在一个 Phase 解决</td><td>大多数问题需要多个 Phase 的协同</td></tr>\n</table></div>\n<h3 id=\"时间管理\">时间管理</h3>\n<ul>\n<li>先读背景（2分钟），记录：公司类型 / 当前 ADM Phase / 主要挑战</li>\n<li>每题：先锁定 Phase（30秒）→ 排除明显错误选项（30秒）→ 选最&quot;完整+治理&quot;的答案（1分钟）</li>\n<li>90分钟 ÷ 8题 = 约11分钟/题，不要在单题上超过15分钟</li>\n</ul>"}, "L7_2": {"type": "reading", "title": "📖 场景一 — 制造企业数字化启动", "html": "<h2 id=\"第二章-场景一-制造企业数字化转型启动\">第二章：场景一 — 制造企业数字化转型启动</h2>\n<h3 id=\"背景描述\">背景描述</h3>\n<p><strong>公司：</strong> 星辉照明集团（化名）</p>\n<ul>\n<li>中国 A 股上市制造企业，营收约 85 亿元，照明行业</li>\n<li>旗下 16 家子公司（含泰国工厂、德国销售公司）</li>\n<li>现用 SAP ECC 6.0（已运行 9 年），PLM/MES/CRM 等系统各自独立</li>\n<li>扣非净利率仅 0.9%，远低于行业标杆欧普照明（13%）</li>\n</ul>\n<p><strong>背景：</strong></p>\n<p>董事会批准了&quot;数字化转型三年规划&quot;，任命副总经理李明为数字化转型主管（Sponsor）。集团 CIO 决定引入 TOGAF 方法论，并任命了集团首席架构师（CAE：Chief Architecture Executive）王工。</p>\n<p>目前情况：</p>\n<ul>\n<li>架构团队刚成立，尚无 Architecture Governance 机制</li>\n<li>各子公司有独立 IT 预算，不受集团统一管控</li>\n<li>董事会要求 6 个月内出具数字化转型路线图</li>\n</ul>\n<hr>\n<p><strong>Q1</strong>：王工（CAE）被任命后，根据 TOGAF，他的<strong>第一步工作</strong>应该是什么？</p>\n<p>A. 立即启动 Phase A，与董事会召开架构愿景工作坊，定义数字化转型目标架构</p>\n<p>B. 开始 Preliminary Phase，建立架构能力框架，定制 ADM，制定架构原则，建立 Architecture Board</p>\n<p>C. 先完成现有系统（ECC）的详细评估，再决定是否需要 TOGAF</p>\n<p>D. 直接进入 Phase E，制定实施路线图，满足董事会 6 个月的时间要求</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：这是一道典型的&quot;Preliminary Phase vs Phase A 的先后顺序&quot;题。TOGAF 明确：在启动任何 ADM Phase 之前，必须先完成 Preliminary Phase，建立架构能力（Architecture Capability）。没有架构原则、没有 Architecture Board、没有定制 ADM，就直接跳进 Phase A 是错误的。选项 A 跳过了 Preliminary；选项 C 的&quot;先评估再决定&quot;不符合 TOGAF 逻辑；选项 D 跳过了绝大部分前置工作，是最差的选择。</p>\n<hr>\n<p><strong>Q2</strong>：在 Preliminary Phase 中，王工需要制定架构原则。以下哪个选项最准确描述了制定架构原则的正确方式？</p>\n<p>A. 王工参考 TOGAF 示范原则清单，直接采用标准原则，无需修改，这样最省时间</p>\n<p>B. 王工独立起草所有原则，不征求其他部门意见，以确保架构独立性</p>\n<p>C. 王工综合公司业务原则、IT 战略、以及来自业务和 IT 高层的输入，制定符合本公司情况的架构原则，并经过 Architecture Board（或同等机构）批准</p>\n<p>D. 架构原则应等到 Phase B（业务架构）完成后再制定，因为那时才有足够的业务信息</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：TOGAF 对架构原则的制定有明确要求：原则应综合多方来源（公司业务原则、IT战略、行业最佳实践）制定，并经过正式批准。仅采用标准示例原则（选项A）无法反映公司特殊情况；架构师独立决定（选项B）违反了利益相关者参与原则；等到 Phase B 才制定原则（选项D）颠倒了顺序——原则应该先于架构开发存在，因为它们是架构决策的基础。</p>\n<hr>\n<p><strong>Q3</strong>：由于各子公司有独立 IT 预算，不受集团管控，这在 TOGAF 框架下属于什么类型的挑战？应如何处理？</p>\n<p>A. 这是技术架构问题，在 Phase D 处理</p>\n<p>B. 这是 Architecture Governance 挑战，应在 Preliminary Phase 建立覆盖子公司的架构治理权限和机制</p>\n<p>C. 这是预算管理问题，不在 TOGAF 范畴内，交给 CFO 处理</p>\n<p>D. 等各子公司自然整合后再建立治理机制</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：子公司 IT 自治是典型的架构治理（Architecture Governance）挑战。TOGAF 的 Preliminary Phase 需要确立架构的管辖范围（Architecture Scope），包括明确架构治理如何覆盖子公司。如果 Preliminary Phase 不解决这个问题，后续所有架构工作都可能被子公司&quot;另起炉灶&quot;所破坏。这不是单纯的技术或财务问题，是治理问题。</p>\n<hr>"}, "L7_3": {"type": "reading", "title": "📖 场景二 — ERP 升级架构评估", "html": "<h2 id=\"第三章-场景二-ERP-升级架构评估\">第三章：场景二 — ERP 升级架构评估</h2>\n<h3 id=\"背景描述-接场景一-\">背景描述（接场景一）</h3>\n<p><strong>情况更新：</strong></p>\n<p>Preliminary Phase 已完成。Architecture Board 由 CIO、副总经理李明、4 位业务 VP 组成。王工启动了 Phase A，召开了利益相关者工作坊。</p>\n<p>主要关切汇总：</p>\n<ul>\n<li>CFO 张总：财务系统能否支持海外子公司合并报表？ → 关切：Financial Consolidation</li>\n<li>供应链VP 陈总：能否实现跨子公司的协同计划？ → 关切：Integrated Planning</li>\n<li>IT 总监：系统升级过程中如何保证业务连续性？ → 关切：Migration Risk</li>\n<li>德国子公司 GM：需符合欧盟数据法规（GDPR）→ 关切：Compliance</li>\n</ul>\n<hr>\n<p><strong>Q4</strong>：王工在整理利益相关者关切后，下一步应该做什么？</p>\n<p>A. 直接开始 Phase B 业务架构，将关切记录备案</p>\n<p>B. 针对每个关切，定义对应的 Viewpoint（视点），说明将用哪种 View（视图）来回应该关切，并将这些纳入架构愿景文档</p>\n<p>C. 将关切提交给 Architecture Board 投票，由多数通过的关切才纳入架构工作</p>\n<p>D. 只关注 CFO 和供应链 VP 的关切，因为他们的权力最高</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：识别利益相关者关切（Concern）之后，TOGAF 要求架构师定义对应的 Viewpoint，明确将如何创建 View 来回应各方关切。这是 Phase A 的关键步骤，架构愿景文档必须包含&quot;如何回应各方关切&quot;的说明。选项A跳过了这个关键步骤；选项C的&quot;投票机制&quot;不符合 TOGAF；选项D忽视了重要利益相关者（IT总监和德国GM的关切同样关键）。</p>\n<hr>\n<p><strong>Q5</strong>：在 Phase B 开发业务架构时，王工应如何处理&quot;16 家子公司业务模式不统一&quot;的问题？</p>\n<p>A. 强制统一所有子公司的业务流程，以简化系统实施</p>\n<p>B. 先描述现有 Baseline Business Architecture（包含各子公司的差异），再基于战略目标定义 Target Business Architecture，差距分析中明确哪些差异需要标准化、哪些允许差异化</p>\n<p>C. 只描述集团总部的业务架构，子公司业务架构等下一个 ADM 循环再做</p>\n<p>D. 直接在 Phase D 处理，因为这本质上是系统配置问题</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：Phase B 的核心工作是开发 Baseline 和 Target 两个版本的业务架构。业务架构不能只描述理想状态，必须先真实记录现状（包括子公司差异）。差距分析（Gap Analysis）会识别哪些差异是需要消除的（标准化），哪些是有业务理由保留的（差异化），这个判断必须有业务依据，不能由架构师单方面决定。</p>\n<hr>"}, "L7_4": {"type": "reading", "title": "📖 场景三 — 架构治理与合规审查", "html": "<h2 id=\"第四章-场景三-架构治理与合规审查\">第四章：场景三 — 架构治理与合规审查</h2>\n<h3 id=\"背景描述-接场景二-\">背景描述（接场景二）</h3>\n<p>目标架构已完成（Phase B/C/D），Architecture Board 已批准。现在进入实施阶段（Phase G）。</p>\n<p><strong>事件：</strong></p>\n<p>ERP 实施商（艾达咨询）在 Phase G 提交了一份架构合规申请（Architecture Compliance Review Request），申请内容显示：</p>\n<ul>\n<li>受时间压力，他们计划跳过 MDG（Master Data Governance）模块实施，直接上线 S/4HANA 核心财务</li>\n<li>理由：MDG 实施周期长，会影响项目交期</li>\n<li>但批准的目标架构中，MDG 是数据治理的核心基础组件</li>\n</ul>\n<hr>\n<p><strong>Q6</strong> ⭐：Architecture Board 应如何处理艾达咨询的这个合规申请？</p>\n<p>A. 因为是外部供应商的决定，Architecture Board 无权干涉，应尊重实施方的专业判断</p>\n<p>B. 直接拒绝，强制要求按照批准的目标架构实施 MDG</p>\n<p>C. 评估 MDG 跳过对整体目标架构的影响，如果影响重大，可以：要求修改方案、或颁发有条件的 Architecture Dispensation（豁免），设定明确的补充实施时间表和条件</p>\n<p>D. 将这个决定交给 CFO，因为这涉及预算和时间权衡</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：Architecture Board 的核心职能之一是处理架构合规申请，包括偏差（Deviation）和豁免（Dispensation）请求。正确做法不是简单&quot;批准&quot;或&quot;拒绝&quot;，而是：评估偏差的影响、确定这是否可以接受的过渡状态、如果批准偏差，必须附加条件（如&quot;MDG 必须在上线后 6 个月内补充实施&quot;）并记录。选项A错误——Board 有架构治理权；选项B可能过于刚性，脱离实际；选项D将架构决策权转移出架构治理范畴，不正确。</p>\n<hr>\n<p><strong>Q7</strong>：在 Phase G 中，如果艾达咨询提交的系统设计文档与批准的应用架构存在轻微偏差（如集成接口技术选型从 SOAP 改为 REST），Architecture Board 应如何处置？</p>\n<p>A. 视为重大架构违规，拒绝批准，要求恢复原设计</p>\n<p>B. 评估偏差影响：如果功能等价且不影响架构原则，记录为 Compliant（合规但有轻微偏差），并更新架构文档</p>\n<p>C. 不需要任何审查，实施方有权自主决定技术细节</p>\n<p>D. 将决定权交给 CIO 个人判断</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：SOAP 到 REST 是技术实现细节的调整，只要功能等价、不违反架构原则（如&quot;所有内外部接口使用标准协议&quot;），属于合理的技术演进。Architecture Board 应将其标记为 Compliant（而非 Conformant，因为存在偏差）并更新架构文档，以保持架构文档与实际实施的同步。这体现了 TOGAF 架构治理的实用主义——不是僵化执行文字，而是维护架构意图的完整性。</p>\n<hr>"}, "L7_5": {"type": "reading", "title": "📖 场景四/五 — 变更与利益相关者", "html": "<h2 id=\"第五章-场景四-架构变更管理\">第五章：场景四 — 架构变更管理</h2>\n<h3 id=\"背景描述\">背景描述</h3>\n<p>S/4HANA 已上线 4 个月（Phase H 阶段）。以下两个变更请求同时到达 Architecture Board：</p>\n<p><strong>变更请求 1：</strong> 德国子公司新增了一个在线 B2B 销售渠道，需要与 S/4HANA SD 模块集成。集成架构尚未在目标架构中定义。</p>\n<p><strong>变更请求 2：</strong> 中国政府发布新政策，要求制造企业在 2026 年底前实施碳排放追踪系统，涉及供应链全链路数据采集，需要大规模架构改造。</p>\n<hr>\n<p><strong>Q8</strong> ⭐：对于变更请求 1（德国 B2B 渠道集成），应归类为哪种变更类型，如何处理？</p>\n<p>A. 类型 3（颠覆性变更）→ 启动全面新 ADM 循环</p>\n<p>B. 类型 1（简化/精化变更）→ 直接更新架构文档，无需新 ADM 循环</p>\n<p>C. 类型 2（增量/演进变更）→ 启动简化版 ADM 循环（聚焦 Phase C 应用架构和 Phase D 技术架构），新增集成方案</p>\n<p>D. 无需处理，实施商自行决定即可</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：变更请求 1 是典型的类型 2（增量变更）：它在现有架构框架内增加新功能（新集成），不改变整体架构方向，但也不是简单的文档更新（类型1）。正确处理：启动简化版 ADM 循环，重点评估 Phase C（应用架构中增加新集成组件）和 Phase D（技术架构中确认技术实现），更新架构文档，并通过 Architecture Board 批准。</p>\n<hr>\n<p><strong>Q9</strong>：对于变更请求 2（碳排放追踪合规要求），应归类为哪种变更类型，如何处理？</p>\n<p>A. 类型 1（简化变更）→ 直接更新架构文档</p>\n<p>B. 类型 2（增量变更）→ 启动简化版 ADM 循环</p>\n<p>C. 类型 3（颠覆性/重新定义变更）→ 触发全面新 ADM 循环，重新审视业务架构、数据架构、技术架构</p>\n<p>D. 由监管合规部门自行处理，不需要架构团队参与</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：碳排放追踪是重大的监管驱动变更：影响供应链全链路、需要采集新的业务数据、可能需要新的技术平台。这是类型 3 变更——它可能改变业务架构（新业务流程）、数据架构（新数据实体和流向）、技术架构（新传感器/IoT/分析平台）。这类变更需要完整的新 ADM 循环，从 Phase A 重新定义架构愿景开始。</p>\n<hr>\n<h2 id=\"第六章-华辉项目改编终极场景\">第六章：华辉项目改编终极场景</h2>\n<h3 id=\"背景描述-400字-\">背景描述（400字）</h3>\n<p><strong>公司：</strong> 华明电气集团（华明，以下代称，参照实际案例改编）</p>\n<p>华明电气集团是中国 A 股上市照明制造企业（股票代码 HXXX），2025 年营业收入 87.9 亿元，综合毛利率 17.6%，扣非净利率仅 0.95%，远低于行业竞争对手光亮照明（净利率 13.2%）。集团旗下 19 家法人（含泰国工厂 TH40、德国销售公司 DE33）。</p>\n<p>现有信息化系统：SAP ECC 6.0（已运行 12 年，模块：FICO/SD/MM/PP/QM/WM）、PLM、财务共享平台（2025 年新上线）、MES、SRM 等独立系统。</p>\n<p>2026 年 5 月，董事会批准了&quot;数字化转型与 SAP 升级项目&quot;，分两期：</p>\n<ul>\n<li><strong>第一期（18周）</strong>：业务诊断咨询 + 数字化转型 EA 蓝图</li>\n<li><strong>第二期（8个月）</strong>：SAP S/4HANA PCE Greenfield 全新实施</li>\n</ul>\n<p>第一期已启动，集团首席架构师魏工（CAE）刚完成了 Preliminary Phase，Architecture Board 已成立（由集团副总经理、CIO、各业务线 VP 组成），正式进入 Phase A。</p>\n<p><strong>已识别的主要业务痛点：</strong></p>\n<ul>\n<li>内部关联交易税务核算复杂，合并报表效率低</li>\n<li>19 家法人财务数据不统一，集团管控薄弱</li>\n<li>销售价格体系混乱，SD 主数据质量差</li>\n<li>BOM / 物料主数据不规范，影响 PP 计划准确性</li>\n<li>海外法人（泰国、德国）面临外汇管理和合规挑战</li>\n</ul>\n<hr>\n<p><strong>S1</strong>：在 Phase A 中，魏工需要准备 Architecture Vision 文档。以下哪项内容<strong>必须</strong>包含在 Architecture Vision 文档中？</p>\n<p>A. S/4HANA 的详细技术配置方案</p>\n<p>B. 数据迁移方案</p>\n<p>C. 高层架构愿景描述、利益相关者关切、项目范围与约束、架构工作说明书（Statement of Architecture Work）</p>\n<p>D. 每个模块的详细业务蓝图</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：Architecture Vision 文档是 Phase A 的核心输出，包含：高层架构描述（只是愿景，不是详细设计）、已识别的利益相关者及其关切、项目范围和约束（边界条件）、Statement of Architecture Work（工作授权）。技术配置方案（选A）是 Phase D 的工作；数据迁移方案（选B）是 Phase F；模块蓝图（选D）是 Phase B/C 的工作。</p>\n<hr>\n<p><strong>S2</strong>：魏工在利益相关者分析中发现，集团副总经理（高权力/高兴趣）、泰国工厂总经理（中权力/高兴趣）、财务共享平台供应商（低权力/高兴趣）的关切不同。针对泰国工厂总经理，最合适的参与策略是什么？</p>\n<p>A. 与集团副总经理完全相同——密切管理，深度参与所有架构决策</p>\n<p>B. Keep Informed（保持告知）——定期更新进展，确保泰国工厂的特殊需求（外汇、当地合规）被记录和纳入架构</p>\n<p>C. Monitor（最小关注）——泰国工厂是子公司，不需要特别关注</p>\n<p>D. 直接让泰国工厂 GM 主导泰国相关架构决策，集团不干预</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：泰国工厂 GM（中权力/高兴趣）的正确策略是 Keep Informed（保持告知）。他有重要的本地知识（泰国劳工法、税法、外汇管制），但不应像集团副总经理那样深度参与每个架构决策。架构师需要定期与他同步，确保泰国特殊需求被记录为约束条件（Architecture Constraints）并纳入架构工作。</p>\n<hr>\n<p><strong>S3</strong>：在 Phase B 业务架构阶段，魏工分析了&quot;19 家法人财务数据不统一&quot;的问题。从 TOGAF 视角，这个问题的根本架构原因是什么？应如何处理？</p>\n<p>A. 这是 IT 系统问题，等 S/4HANA 上线后自动解决</p>\n<p>B. 这是业务架构层面的&quot;组织结构和流程不统一&quot;问题，需要在 Baseline Business Architecture 中记录现状，在 Target Business Architecture 中定义统一的财务管控模型，差距分析后在 Phase E 定义相应工作包</p>\n<p>C. 这是数据架构问题，在 Phase C 的 Data Architecture 阶段处理</p>\n<p>D. 这只是主数据质量问题，MDG 模块上线后解决</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：财务数据不统一的根本原因是业务架构层面的——没有统一的集团财务管控模式（Business Architecture），导致各法人按自己方式运作，数据自然不统一。TOGAF 要求先解决业务层的问题（Phase B），再在 Phase C 解决数据架构（统一数据模型）和 Phase D 的技术实现（MDG）。跳过业务架构直接&quot;用系统解决&quot;（选A/C/D）是典型的&quot;用技术解决业务问题&quot;的反模式。</p>\n<hr>\n<p><strong>S4</strong>：在 Phase C 开发信息系统架构时，魏工应先开发数据架构还是应用架构？理由是什么？</p>\n<p>A. 先开发应用架构，因为 S/4HANA 的模块范围已经确定了</p>\n<p>B. 先开发数据架构，因为应用程序是数据的处理器，数据架构确定后才能明确每个应用组件需要处理什么数据</p>\n<p>C. 两者同时并行开发，以节省时间</p>\n<p>D. 顺序不重要，随便选一个开始</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：TOGAF 明确规定 Phase C 的顺序：先 Data Architecture，后 Application Architecture。原因：数据架构定义了企业需要管理的核心数据实体和关系（如客户主数据、物料主数据、财务凭证）；应用架构定义了各应用组件如何处理这些数据。没有清晰的数据架构，就无法合理划分应用边界。S/4HANA 模块范围确定（选A）是实施约束，但不改变架构开发顺序。</p>\n<hr>\n<p><strong>S5</strong>：Phase E 阶段，魏工识别出以下工作包候选：① MDG 主数据治理 ② Group Reporting 集团合并报表 ③ S/4HANA FICO ④ S/4HANA EWM ⑤ 泰国/德国法人扩展 ⑥ GTS 全球贸易服务。对这些工作包进行优先级排序时，TOGAF 推荐考虑哪些因素？</p>\n<p>A. 只根据实施成本从低到高排序</p>\n<p>B. 只根据管理层偏好排序</p>\n<p>C. 综合考虑：工作包间的依赖关系、对战略目标的贡献度（业务价值）、实施风险、资源可用性，制定多维度优先级</p>\n<p>D. 按照 SAP 标准实施顺序，不做调整</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：Phase F（迁移规划）的优先级排序是多维度的。对于华明的工作包，依赖关系分析就很关键：MDG 是其他模块的基础（先做 MDG 才能保证主数据质量），应优先；FICO 是核心，先于报表；GTS 可以后置；泰国/德国扩展依赖国内稳定后进行。纯成本排序（选A）或管理层偏好（选B）会导致不合理的实施顺序，可能造成返工。</p>\n<hr>\n<p><strong>S6</strong>：S/4HANA 上线 3 个月后（Phase H），华明接到通知：欧盟要求所有在德国运营的企业在 2027 年前实现 CBAM（碳边境调节机制）合规报告，这需要从供应链系统（MES/采购）采集碳足迹数据并集成到 GTS 模块。这属于哪种变更类型？应如何处理？</p>\n<p>A. 类型 1（简化变更）→ 由 IT 团队直接处理，无需 Architecture Board 介入</p>\n<p>B. 类型 2（增量变更）→ 启动简化 ADM 循环，重点关注 Phase C/D，扩展集成架构</p>\n<p>C. 类型 3（重新定义变更）→ 触发完整新 ADM 循环，因为这涉及新的监管驱动的业务架构变化、新数据架构（碳数据模型）、新技术集成</p>\n<p>D. 不处理，让德国子公司自行解决</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：CBAM 合规是典型的重大监管变化，影响广泛：① 业务架构层面：需要新的碳核算业务流程（Phase B 重做）② 数据架构层面：需要新的碳足迹数据模型（Phase C 重做）③ 技术架构层面：MES-GTS 集成、新数据采集终端（Phase D 重做）。这是类型 3 变更，不能用局部修补处理，需要触发新的完整 ADM 循环（可以范围限定在&quot;碳合规能力架构&quot;维度内）。</p>\n<hr>\n<p><strong>S7</strong>：在整个项目过程中，魏工多次遇到业务部门提出的需求变更。根据 TOGAF，需求管理（Requirements Management）应如何处置这些变更？</p>\n<p>A. 所有需求变更在 Phase A 集中收集，之后不再接受变更</p>\n<p>B. 需求变更只能在 Phase F 处理，因为那是迁移规划阶段</p>\n<p>C. 需求管理是持续的过程，贯穿所有 Phase：新需求进入需求库，评估对当前 Phase 的影响，决定是在当前循环中处理还是推迟到下一循环</p>\n<p>D. 所有需求变更直接提交给 Architecture Board 批准即可，无需进一步分析</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：这是 Level 2 考试中关于需求管理的核心考点。需求管理是位于 ADM 中心的持续过程，不是某个特定 Phase 的工作。当新需求到来时，需求管理流程：① 将需求存储到需求库 ② 评估对当前正在进行的 Phase 的影响 ③ 如果影响当前 Phase，按变更控制流程处理；如果是未来 Phase 的需求，暂存等待 ④ Architecture Board 处理的是架构批准，不是需求收集。</p>\n<hr>\n<p><strong>S8（综合题）</strong>：项目即将进入 Phase G（实施治理），实施商提出了一个偏离批准目标架构的方案：使用定制开发（Custom ABAP）替代 Group Reporting 标准功能，理由是定制开发更快实现华明特定的集团合并报表格式。作为 CAE，魏工应如何通过 TOGAF 架构治理机制处理这个问题？</p>\n<p>A. 接受实施商的方案，因为他们是 SAP 专家，技术判断应受尊重</p>\n<p>B. 拒绝任何偏离，要求 100% 使用标准 Group Reporting 功能</p>\n<p>C. 通过架构合规评审流程：① 评估定制开发对架构原则的违背程度（如&quot;优先使用标准功能&quot;原则）② 分析长期影响（维护成本、升级风险）③ 提交 Architecture Board 审议 ④ 如批准，颁发 Architecture Dispensation，记录条件和风险</p>\n<p>D. 将决定交给 CFO，因为这涉及成本权衡</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：这道题考察 Phase G 的架构治理实操。正确的 TOGAF 处理流程：① Phase G 的核心是确保实施符合架构意图，架构师不能绕过治理流程；② Architecture Compliance Review 是正式机制；③ 完全拒绝（选B）可能脱离业务实际；④ 将决定移出架构治理范畴（选A/D）违反了 TOGAF 原则。如果有充分业务理由允许偏差，颁发 Dispensation 并记录风险是正确做法——这体现了 TOGAF 架构治理的务实性：不是僵化执行文字，而是通过正式机制管控风险。</p>\n<hr>\n<h2 id=\"第七章-解题框架总结\">第七章：解题框架总结</h2>\n<h3 id=\"选题黄金三问\">选题黄金三问</h3>\n<ol>\n<li><strong>这道题发生在 ADM 哪个 Phase？</strong> 定位 Phase 是最重要的第一步</li>\n<li><strong>选项中有没有&quot;跳步&quot;？</strong> 跳过 TOGAF 前置步骤的答案几乎肯定是错的</li>\n<li><strong>有没有涉及治理/变更？</strong> 需要 Architecture Board 正式处理的，一定要走治理流程</li>\n</ol>\n<h3 id=\"常见错误选项模式\">常见错误选项模式</h3>\n<div class=\"tbl\"><table>\n<tr><th>模式</th><th>特征</th><th>为什么错</th></tr>\n<tr><td>&quot;直接做&quot;</td><td>跳过分析/评估直接执行</td><td>TOGAF 强调先分析、后决策</td></tr>\n<tr><td>&quot;技术决定一切&quot;</td><td>用技术方案解决业务/架构问题</td><td>TOGAF 自顶向下，业务驱动技术</td></tr>\n<tr><td>&quot;绕过治理&quot;</td><td>让个人判断替代 Board 决策</td><td>TOGAF 治理优先，需要正式机制</td></tr>\n<tr><td>&quot;一刀切&quot;</td><td>要么全批，要么全拒</td><td>TOGAF 鼓励有条件的豁免（Dispensation）</td></tr>\n<tr><td>&quot;单阶段完成&quot;</td><td>认为某个问题只在一个 Phase 解决</td><td>大多数问题需要多个 Phase 的协同</td></tr>\n</table></div>\n<h3 id=\"时间管理\">时间管理</h3>\n<ul>\n<li>先读背景（2分钟），记录：公司类型 / 当前 ADM Phase / 主要挑战</li>\n<li>每题：先锁定 Phase（30秒）→ 排除明显错误选项（30秒）→ 选最&quot;完整+治理&quot;的答案（1分钟）</li>\n<li>90分钟 ÷ 8题 = 约11分钟/题，不要在单题上超过15分钟</li>\n</ul>"}, "L7_6": {"type": "reading", "title": "📖 华辉终极场景 S1-S8（综合练习）", "html": "<h2 id=\"第六章-华辉项目改编终极场景\">第六章：华辉项目改编终极场景</h2>\n<h3 id=\"背景描述-400字-\">背景描述（400字）</h3>\n<p><strong>公司：</strong> 华明电气集团（华明，以下代称，参照实际案例改编）</p>\n<p>华明电气集团是中国 A 股上市照明制造企业（股票代码 HXXX），2025 年营业收入 87.9 亿元，综合毛利率 17.6%，扣非净利率仅 0.95%，远低于行业竞争对手光亮照明（净利率 13.2%）。集团旗下 19 家法人（含泰国工厂 TH40、德国销售公司 DE33）。</p>\n<p>现有信息化系统：SAP ECC 6.0（已运行 12 年，模块：FICO/SD/MM/PP/QM/WM）、PLM、财务共享平台（2025 年新上线）、MES、SRM 等独立系统。</p>\n<p>2026 年 5 月，董事会批准了&quot;数字化转型与 SAP 升级项目&quot;，分两期：</p>\n<ul>\n<li><strong>第一期（18周）</strong>：业务诊断咨询 + 数字化转型 EA 蓝图</li>\n<li><strong>第二期（8个月）</strong>：SAP S/4HANA PCE Greenfield 全新实施</li>\n</ul>\n<p>第一期已启动，集团首席架构师魏工（CAE）刚完成了 Preliminary Phase，Architecture Board 已成立（由集团副总经理、CIO、各业务线 VP 组成），正式进入 Phase A。</p>\n<p><strong>已识别的主要业务痛点：</strong></p>\n<ul>\n<li>内部关联交易税务核算复杂，合并报表效率低</li>\n<li>19 家法人财务数据不统一，集团管控薄弱</li>\n<li>销售价格体系混乱，SD 主数据质量差</li>\n<li>BOM / 物料主数据不规范，影响 PP 计划准确性</li>\n<li>海外法人（泰国、德国）面临外汇管理和合规挑战</li>\n</ul>\n<hr>\n<p><strong>S1</strong>：在 Phase A 中，魏工需要准备 Architecture Vision 文档。以下哪项内容<strong>必须</strong>包含在 Architecture Vision 文档中？</p>\n<p>A. S/4HANA 的详细技术配置方案</p>\n<p>B. 数据迁移方案</p>\n<p>C. 高层架构愿景描述、利益相关者关切、项目范围与约束、架构工作说明书（Statement of Architecture Work）</p>\n<p>D. 每个模块的详细业务蓝图</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：Architecture Vision 文档是 Phase A 的核心输出，包含：高层架构描述（只是愿景，不是详细设计）、已识别的利益相关者及其关切、项目范围和约束（边界条件）、Statement of Architecture Work（工作授权）。技术配置方案（选A）是 Phase D 的工作；数据迁移方案（选B）是 Phase F；模块蓝图（选D）是 Phase B/C 的工作。</p>\n<hr>\n<p><strong>S2</strong>：魏工在利益相关者分析中发现，集团副总经理（高权力/高兴趣）、泰国工厂总经理（中权力/高兴趣）、财务共享平台供应商（低权力/高兴趣）的关切不同。针对泰国工厂总经理，最合适的参与策略是什么？</p>\n<p>A. 与集团副总经理完全相同——密切管理，深度参与所有架构决策</p>\n<p>B. Keep Informed（保持告知）——定期更新进展，确保泰国工厂的特殊需求（外汇、当地合规）被记录和纳入架构</p>\n<p>C. Monitor（最小关注）——泰国工厂是子公司，不需要特别关注</p>\n<p>D. 直接让泰国工厂 GM 主导泰国相关架构决策，集团不干预</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：泰国工厂 GM（中权力/高兴趣）的正确策略是 Keep Informed（保持告知）。他有重要的本地知识（泰国劳工法、税法、外汇管制），但不应像集团副总经理那样深度参与每个架构决策。架构师需要定期与他同步，确保泰国特殊需求被记录为约束条件（Architecture Constraints）并纳入架构工作。</p>\n<hr>\n<p><strong>S3</strong>：在 Phase B 业务架构阶段，魏工分析了&quot;19 家法人财务数据不统一&quot;的问题。从 TOGAF 视角，这个问题的根本架构原因是什么？应如何处理？</p>\n<p>A. 这是 IT 系统问题，等 S/4HANA 上线后自动解决</p>\n<p>B. 这是业务架构层面的&quot;组织结构和流程不统一&quot;问题，需要在 Baseline Business Architecture 中记录现状，在 Target Business Architecture 中定义统一的财务管控模型，差距分析后在 Phase E 定义相应工作包</p>\n<p>C. 这是数据架构问题，在 Phase C 的 Data Architecture 阶段处理</p>\n<p>D. 这只是主数据质量问题，MDG 模块上线后解决</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：财务数据不统一的根本原因是业务架构层面的——没有统一的集团财务管控模式（Business Architecture），导致各法人按自己方式运作，数据自然不统一。TOGAF 要求先解决业务层的问题（Phase B），再在 Phase C 解决数据架构（统一数据模型）和 Phase D 的技术实现（MDG）。跳过业务架构直接&quot;用系统解决&quot;（选A/C/D）是典型的&quot;用技术解决业务问题&quot;的反模式。</p>\n<hr>\n<p><strong>S4</strong>：在 Phase C 开发信息系统架构时，魏工应先开发数据架构还是应用架构？理由是什么？</p>\n<p>A. 先开发应用架构，因为 S/4HANA 的模块范围已经确定了</p>\n<p>B. 先开发数据架构，因为应用程序是数据的处理器，数据架构确定后才能明确每个应用组件需要处理什么数据</p>\n<p>C. 两者同时并行开发，以节省时间</p>\n<p>D. 顺序不重要，随便选一个开始</p>\n<p><strong>答案</strong>：B</p>\n<p><strong>解析</strong>：TOGAF 明确规定 Phase C 的顺序：先 Data Architecture，后 Application Architecture。原因：数据架构定义了企业需要管理的核心数据实体和关系（如客户主数据、物料主数据、财务凭证）；应用架构定义了各应用组件如何处理这些数据。没有清晰的数据架构，就无法合理划分应用边界。S/4HANA 模块范围确定（选A）是实施约束，但不改变架构开发顺序。</p>\n<hr>\n<p><strong>S5</strong>：Phase E 阶段，魏工识别出以下工作包候选：① MDG 主数据治理 ② Group Reporting 集团合并报表 ③ S/4HANA FICO ④ S/4HANA EWM ⑤ 泰国/德国法人扩展 ⑥ GTS 全球贸易服务。对这些工作包进行优先级排序时，TOGAF 推荐考虑哪些因素？</p>\n<p>A. 只根据实施成本从低到高排序</p>\n<p>B. 只根据管理层偏好排序</p>\n<p>C. 综合考虑：工作包间的依赖关系、对战略目标的贡献度（业务价值）、实施风险、资源可用性，制定多维度优先级</p>\n<p>D. 按照 SAP 标准实施顺序，不做调整</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：Phase F（迁移规划）的优先级排序是多维度的。对于华明的工作包，依赖关系分析就很关键：MDG 是其他模块的基础（先做 MDG 才能保证主数据质量），应优先；FICO 是核心，先于报表；GTS 可以后置；泰国/德国扩展依赖国内稳定后进行。纯成本排序（选A）或管理层偏好（选B）会导致不合理的实施顺序，可能造成返工。</p>\n<hr>\n<p><strong>S6</strong>：S/4HANA 上线 3 个月后（Phase H），华明接到通知：欧盟要求所有在德国运营的企业在 2027 年前实现 CBAM（碳边境调节机制）合规报告，这需要从供应链系统（MES/采购）采集碳足迹数据并集成到 GTS 模块。这属于哪种变更类型？应如何处理？</p>\n<p>A. 类型 1（简化变更）→ 由 IT 团队直接处理，无需 Architecture Board 介入</p>\n<p>B. 类型 2（增量变更）→ 启动简化 ADM 循环，重点关注 Phase C/D，扩展集成架构</p>\n<p>C. 类型 3（重新定义变更）→ 触发完整新 ADM 循环，因为这涉及新的监管驱动的业务架构变化、新数据架构（碳数据模型）、新技术集成</p>\n<p>D. 不处理，让德国子公司自行解决</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：CBAM 合规是典型的重大监管变化，影响广泛：① 业务架构层面：需要新的碳核算业务流程（Phase B 重做）② 数据架构层面：需要新的碳足迹数据模型（Phase C 重做）③ 技术架构层面：MES-GTS 集成、新数据采集终端（Phase D 重做）。这是类型 3 变更，不能用局部修补处理，需要触发新的完整 ADM 循环（可以范围限定在&quot;碳合规能力架构&quot;维度内）。</p>\n<hr>\n<p><strong>S7</strong>：在整个项目过程中，魏工多次遇到业务部门提出的需求变更。根据 TOGAF，需求管理（Requirements Management）应如何处置这些变更？</p>\n<p>A. 所有需求变更在 Phase A 集中收集，之后不再接受变更</p>\n<p>B. 需求变更只能在 Phase F 处理，因为那是迁移规划阶段</p>\n<p>C. 需求管理是持续的过程，贯穿所有 Phase：新需求进入需求库，评估对当前 Phase 的影响，决定是在当前循环中处理还是推迟到下一循环</p>\n<p>D. 所有需求变更直接提交给 Architecture Board 批准即可，无需进一步分析</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：这是 Level 2 考试中关于需求管理的核心考点。需求管理是位于 ADM 中心的持续过程，不是某个特定 Phase 的工作。当新需求到来时，需求管理流程：① 将需求存储到需求库 ② 评估对当前正在进行的 Phase 的影响 ③ 如果影响当前 Phase，按变更控制流程处理；如果是未来 Phase 的需求，暂存等待 ④ Architecture Board 处理的是架构批准，不是需求收集。</p>\n<hr>\n<p><strong>S8（综合题）</strong>：项目即将进入 Phase G（实施治理），实施商提出了一个偏离批准目标架构的方案：使用定制开发（Custom ABAP）替代 Group Reporting 标准功能，理由是定制开发更快实现华明特定的集团合并报表格式。作为 CAE，魏工应如何通过 TOGAF 架构治理机制处理这个问题？</p>\n<p>A. 接受实施商的方案，因为他们是 SAP 专家，技术判断应受尊重</p>\n<p>B. 拒绝任何偏离，要求 100% 使用标准 Group Reporting 功能</p>\n<p>C. 通过架构合规评审流程：① 评估定制开发对架构原则的违背程度（如&quot;优先使用标准功能&quot;原则）② 分析长期影响（维护成本、升级风险）③ 提交 Architecture Board 审议 ④ 如批准，颁发 Architecture Dispensation，记录条件和风险</p>\n<p>D. 将决定交给 CFO，因为这涉及成本权衡</p>\n<p><strong>答案</strong>：C</p>\n<p><strong>解析</strong>：这道题考察 Phase G 的架构治理实操。正确的 TOGAF 处理流程：① Phase G 的核心是确保实施符合架构意图，架构师不能绕过治理流程；② Architecture Compliance Review 是正式机制；③ 完全拒绝（选B）可能脱离业务实际；④ 将决定移出架构治理范畴（选A/D）违反了 TOGAF 原则。如果有充分业务理由允许偏差，颁发 Dispensation 并记录风险是正确做法——这体现了 TOGAF 架构治理的务实性：不是僵化执行文字，而是通过正式机制管控风险。</p>\n<hr>"}, "L7_7": {"type": "reading", "title": "📖 解题框架总结", "html": "<h2 id=\"第七章-解题框架总结\">第七章：解题框架总结</h2>\n<h3 id=\"选题黄金三问\">选题黄金三问</h3>\n<ol>\n<li><strong>这道题发生在 ADM 哪个 Phase？</strong> 定位 Phase 是最重要的第一步</li>\n<li><strong>选项中有没有&quot;跳步&quot;？</strong> 跳过 TOGAF 前置步骤的答案几乎肯定是错的</li>\n<li><strong>有没有涉及治理/变更？</strong> 需要 Architecture Board 正式处理的，一定要走治理流程</li>\n</ol>\n<h3 id=\"常见错误选项模式\">常见错误选项模式</h3>\n<div class=\"tbl\"><table>\n<tr><th>模式</th><th>特征</th><th>为什么错</th></tr>\n<tr><td>&quot;直接做&quot;</td><td>跳过分析/评估直接执行</td><td>TOGAF 强调先分析、后决策</td></tr>\n<tr><td>&quot;技术决定一切&quot;</td><td>用技术方案解决业务/架构问题</td><td>TOGAF 自顶向下，业务驱动技术</td></tr>\n<tr><td>&quot;绕过治理&quot;</td><td>让个人判断替代 Board 决策</td><td>TOGAF 治理优先，需要正式机制</td></tr>\n<tr><td>&quot;一刀切&quot;</td><td>要么全批，要么全拒</td><td>TOGAF 鼓励有条件的豁免（Dispensation）</td></tr>\n<tr><td>&quot;单阶段完成&quot;</td><td>认为某个问题只在一个 Phase 解决</td><td>大多数问题需要多个 Phase 的协同</td></tr>\n</table></div>\n<h3 id=\"时间管理\">时间管理</h3>\n<ul>\n<li>先读背景（2分钟），记录：公司类型 / 当前 ADM Phase / 主要挑战</li>\n<li>每题：先锁定 Phase（30秒）→ 排除明显错误选项（30秒）→ 选最&quot;完整+治理&quot;的答案（1分钟）</li>\n<li>90分钟 ÷ 8题 = 约11分钟/题，不要在单题上超过15分钟</li>\n</ul>"}, "L8_1": {"type": "reading", "title": "📖 为什么华辉需要 TOGAF", "html": "<h2 id=\"第一章-为什么华辉项目需要TOGAF\">第一章：为什么华辉项目需要TOGAF</h2>\n<h3 id=\"1-1-第一期咨询的本质就是企业架构咨询\">1.1 第一期咨询的本质就是企业架构咨询</h3>\n<p>很多人把华辉第一期18周的&quot;业务诊断咨询及数字化转型规划&quot;理解为一个需求调研项目，这是一个危险的认知偏差。实际上，这18周要回答的核心问题是：<strong>华辉照明的数字化转型，从哪里来、现在在哪里、将要去哪里、怎么走过去</strong>——这正是企业架构（Enterprise Architecture）方法论要解决的问题。</p>\n<p>TOGAF（The Open Group Architecture Framework）的核心工具ADM（Architecture Development Method）提供了一套完整的从现状诊断到目标架构规划、再到实施路线图的闭环方法。华辉第一期的所有工作——流程诊断、系统现状调研、痛点分析、蓝图设计——都可以精确地映射到TOGAF ADM各阶段。</p>\n<h3 id=\"1-2-TOGAF给你作为AE的框架性语言\">1.2 TOGAF给你作为AE的框架性语言</h3>\n<p>作为SAP Account Executive，你在华辉项目中的核心价值不是写PPT，而是<strong>监督远景数字的交付质量、发掘第二期商机、维护SAP的品牌信誉</strong>。要做好这三件事，你需要一套能与远景数字的PM（吴志远）和华辉数智化部门平等对话的框架语言。</p>\n<p>TOGAF给你提供的不是技术细节，而是<strong>架构视角的质量门控语言</strong>：</p>\n<ul>\n<li>&quot;这份现状评估覆盖了业务架构、应用架构、数据架构、技术架构四个域了吗？&quot;</li>\n<li>&quot;差距分析的四象限（保留/去除/新增/迁移）有没有落地成具体的实施序列？&quot;</li>\n<li>&quot;过渡架构的设计有没有考虑19家法人的集团管控差异？&quot;</li>\n<li>&quot;架构路线图和项目计划书的里程碑是否一一对应？&quot;</li>\n</ul>\n<p>这些问题不需要你懂ABAP代码，但能让SI团队清楚地意识到：<strong>你不是一个只会签合同的AE，你是能看穿交付质量的架构客户经理</strong>。</p>\n<h3 id=\"1-3-没有架构方法论会导致什么问题\">1.3 没有架构方法论会导致什么问题</h3>\n<p>华辉的业务现实极为复杂：87.97亿营收、19家法人（含泰国、德国境外实体）、净利率仅0.95%（行业最低，欧普为13.2%）、ECC 6.0上已跑FICO/SD/MM/PP/QM/WM六大模块。在这种复杂度下，如果咨询项目缺乏架构方法论框架，通常会出现三类系统性问题：</p>\n<p><strong>问题一：需求漂移（Scope Creep）</strong>。没有架构边界的咨询会不断被业务部门的零散需求牵着走，18周结束时交付的是一堆调研报告，而不是可落地的蓝图。</p>\n<p><strong>问题二：孤岛设计（Silo Design）</strong>。FICO顾问设计了一套科目方案，SD顾问设计了一套客户主数据方案，两者互不兼容。在没有架构顶层设计约束的情况下，模块顾问天然倾向于在自己的领域做最优化，而不是为整体最优化。</p>\n<p><strong>问题三：忽视非功能性需求</strong>。华辉PCE（Private Cloud Edition）部署模式带来了与On-premise完全不同的运维模式、升级节奏和集成约束。如果没有技术架构视角的评估，实施团队可能直到上线前才发现CPI集成接口的带宽瓶颈或DRC合规数据的跨境传输问题。</p>\n<p>TOGAF的价值，是在项目开始之前就把这些问题变成已知风险，并在架构阶段加以管控。</p>\n<hr>"}, "L8_2": {"type": "reading", "title": "📖 TOGAF 阶段 × 华辉项目映射表", "html": "<h2 id=\"第二章-TOGAF阶段与华辉项目完整映射表\">第二章：TOGAF阶段与华辉项目完整映射表</h2>\n<blockquote><p>ADM各阶段映射说明：Preliminary + Phase A 对应第一期前期，Phase B-D 对应18周咨询主体，Phase E-F 对应第一期末+第二期启动，Phase G-H 对应第二期8个月实施及上线后运维。</p></blockquote>\n<div class=\"tbl\"><table>\n<tr><th>TOGAF Phase</th><th>阶段名称</th><th>华辉对应工作内容</th><th>主要交付物</th><th>负责方</th><th>预计时间节点</th></tr>\n<tr><td><strong>Preliminary</strong></td><td>准备阶段</td><td>确认架构能力、治理模型、利益相关者识别、工作坊计划制定</td><td>项目章程、架构原则清单、干系人清单</td><td>远景数字 + SAP AE</td><td>2026年5月（启动前两周）</td></tr>\n<tr><td><strong>Phase A</strong></td><td>架构愿景</td><td>华辉高层战略解码（国际化+降本+合规）、S/4HANA PCE升级范围界定、ROI框架初步建立</td><td>架构愿景文档、Statement of Architecture Work</td><td>远景数字 PM + 华辉CIO/数智化部</td><td>2026年5月29日～6月中旬</td></tr>\n<tr><td><strong>Phase B</strong></td><td>业务架构</td><td>19法人组织架构梳理、端到端价值链诊断（研发→采购→生产→销售→财务）、核心业务痛点访谈、流程AS-IS建模</td><td>业务架构现状报告、流程地图（L1-L3）、痛点清单</td><td>远景数字业务顾问</td><td>2026年6月～7月</td></tr>\n<tr><td><strong>Phase C - Application</strong></td><td>应用架构</td><td>ECC 6.0模块覆盖度评估、外围系统清单（MES/WMS/电商/报表工具）、集成现状梳理、应用版图（Landscape）绘制</td><td>应用架构现状图、集成矩阵、应用退役/保留决策清单</td><td>远景数字技术顾问</td><td>2026年7月</td></tr>\n<tr><td><strong>Phase C - Data</strong></td><td>数据架构</td><td>主数据质量诊断（客户/供应商/物料/会计科目）、数据治理现状评估、MDG引入必要性分析、跨法人数据标准化方案</td><td>数据架构现状报告、主数据问题清单、MDG实施建议</td><td>远景数字数据顾问</td><td>2026年7月～8月</td></tr>\n<tr><td><strong>Phase D</strong></td><td>技术架构</td><td>ECC技术债评估（硬件/OS/DB）、PCE部署架构方案、网络/安全/集成平台（CPI）技术规格、DRC合规技术要求</td><td>技术架构蓝图、PCE部署方案、CPI集成架构图</td><td>远景数字技术架构师 + SAP PCE团队</td><td>2026年8月</td></tr>\n<tr><td><strong>Phase E</strong></td><td>机会与解决方案</td><td>差距分析（Gap Analysis）、初步解决方案方向（Greenfield vs 其他路径确认）、工作包拆解、初步项目计划</td><td>Gap分析报告、解决方案概要、工作包清单</td><td>远景数字 + SAP AE</td><td>2026年8月末～9月初</td></tr>\n<tr><td><strong>Phase F</strong></td><td>迁移规划</td><td>详细实施路线图、数据迁移策略（历史数据/主数据）、变更管理计划、切换方案（Big Bang vs 分阶段）</td><td>实施路线图、数据迁移计划、变更管理计划</td><td>远景数字 PM + 华辉项目团队</td><td>2026年9月（第一期交付冲刺）</td></tr>\n<tr><td><strong>Phase G</strong></td><td>实施治理</td><td>第二期8个月SAP实施全过程架构合规管控、里程碑架构评审、设计偏差跟踪、SAP CoE能力建设</td><td>架构合规报告（每月）、设计偏差登记册</td><td>SAP AE监督 + 远景数字执行</td><td>2026年10月～2027年6月</td></tr>\n<tr><td><strong>Phase H</strong></td><td>架构变更管理</td><td>上线后持续优化、S/4HANA季度更新管理、二期新模块（GTS/IBP/SAC）架构评估、PCE升级节奏管控</td><td>架构变更请求（ACR）、能力扩展路线图</td><td>SAP AE主导 + 华辉数智化部</td><td>2027年6月起持续</td></tr>\n<tr><td><strong>ADM Requirements Management</strong></td><td>需求管理（贯穿全程）</td><td>需求变更管控、需求优先级管理、业务需求与架构设计的双向追溯</td><td>需求追溯矩阵、变更影响评估</td><td>远景数字 PM</td><td>贯穿第一期和第二期</td></tr>\n</table></div>\n<hr>"}, "L8_3": {"type": "reading", "title": "📖 四大架构域诊断框架", "html": "<h2 id=\"第三章-四大架构域诊断框架\">第三章：四大架构域诊断框架</h2>\n<h3 id=\"3-1-业务架构-19法人管控-价值链与痛点根因\">3.1 业务架构：19法人管控、价值链与痛点根因</h3>\n<p><strong>业务架构的核心问题是：华辉的业务是如何运作的，以及这种运作方式为什么导致了净利率只有0.95%。</strong></p>\n<p><strong>组织架构与法人管控</strong></p>\n<p>19家法人的集团架构是华辉业务架构的最大复杂性来源。其中泰国和德国的境外法人带来了多币种、跨境合规（DRC）和集团合并报表（Group Reporting）三大特殊需求。业务架构诊断必须首先厘清：哪些法人是独立核算主体，哪些是委托制造或销售代理关系，集团总部对子公司的财务管控模式是集权型还是分权型。不同的管控模式直接决定了S/4HANA的组织结构配置方案（公司代码/利润中心/成本中心的层级关系）。</p>\n<p><strong>端到端价值链诊断</strong></p>\n<p>华辉的主营业务是LED照明产品的研发、生产和销售。价值链分析应覆盖五个核心环节：</p>\n<ol>\n<li><strong>研发端</strong>：新产品开发周期、PLM系统与SAP ECC的集成现状、研发成本归集方式</li>\n<li><strong>采购端</strong>：原材料（LED芯片、驱动电源、铝材）的采购策略，供应商集中度风险，VMI/JIT模式的应用现状</li>\n<li><strong>生产端</strong>：工厂分布（佛山本地+国内外工厂），MES系统与ECC的接口，生产成本核算精细度</li>\n<li><strong>销售端</strong>：工程渠道/零售渠道/海外渠道的差异化管理，客户信用管理，应收账款周转率</li>\n<li><strong>财务端</strong>：集团合并报表的编制效率（目前依赖Excel，Group Reporting将取代），成本中心费用分摊逻辑</li>\n</ol>\n<p><strong>净利率0.95%的架构级根因分析</strong></p>\n<p>与欧普照明13.2%净利率的对比，揭示了华辉在业务架构层面的三个结构性问题：第一，<strong>产品组合差异</strong>——华辉工程项目占比高，工程项目的账期长、合同条款复杂，导致资金占用成本高；第二，<strong>成本可视性不足</strong>——ECC的成本中心方案粒度不够，无法精确核算每条产品线的贡献毛利，导致决策层无法识别亏损产品线；第三，<strong>运营效率差距</strong>——19家法人的管理成本（财务人员、报表工作量、内控合规成本）被摊薄到利润中。</p>\n<p>业务架构的目标状态，是通过S/4HANA的利润中心会计（PCA）和集团报表（Group Reporting）实现经营单元级别的P&amp;L透明化，为管理层提供精准的价值链成本视图。</p>\n<h3 id=\"3-2-应用架构-ECC外围系统现状与整合问题\">3.2 应用架构：ECC外围系统现状与整合问题</h3>\n<p><strong>应用架构的核心问题是：华辉现在用了哪些IT系统，它们之间是如何（没有）协同工作的。</strong></p>\n<p><strong>ECC 6.0核心系统现状</strong></p>\n<p>华辉ECC已上线FICO/SD/MM/PP/QM/WM六大模块，这意味着核心业务流程已有SAP覆盖，Greenfield实施不是从零开始，而是需要对现有配置和数据进行系统性评估。需要特别关注：</p>\n<ul>\n<li><strong>FICO模块</strong>：科目表设计、成本中心/利润中心层级、内部订单使用范围、资产会计折旧参数</li>\n<li><strong>SD模块</strong>：销售组织/分销渠道/产品组的设置是否覆盖所有法人，定价条件类型的复杂度</li>\n<li><strong>MM模块</strong>：采购组织设置、物料主数据质量（重复物料问题是Greenfield实施的通常问题）</li>\n<li><strong>PP模块</strong>：工厂参数配置、计划策略、MRP运行参数</li>\n<li><strong>WM模块</strong>：WM迁移到EWM的复杂度评估（EWM是新增模块，需要重新设计仓储流程）</li>\n</ul>\n<p><strong>外围系统清单与集成现状</strong></p>\n<p>应用架构诊断必须绘制一张完整的IT系统版图（Application Landscape），典型外围系统包括：MES（制造执行）、WMS（如果WM已由第三方WMS替代）、SRM/电子采购、电商平台（B2B/B2C）、BI/报表工具（可能是SAP BW、帆软或其他）、HR/考勤系统、OA/协同平台。</p>\n<p><strong>应用整合的核心问题</strong></p>\n<p>ECC时代的集成通常是点对点接口（Point-to-Point），19家法人可能各自有不同的接口方案。S/4HANA上线后，CPI（Cloud Platform Integration）将成为统一的集成中枢，这意味着所有现有接口都需要重新评估：哪些可以通过标准API替代，哪些需要在CPI上重新开发，哪些外围系统的改造成本过高需要考虑替换。</p>\n<p>应用架构的目标状态，是以S/4HANA PCE为核心，CPI为集成总线，构建一个清晰的双层架构：核心业务系统（S/4HANA）+ 轻量级外围专业系统（MES/WMS/BI）。</p>\n<h3 id=\"3-3-数据架构-主数据问题与MDG的战略作用\">3.3 数据架构：主数据问题与MDG的战略作用</h3>\n<p><strong>数据架构的核心问题是：华辉的数据质量是否支撑S/4HANA上线后的管理报表需求。</strong></p>\n<p><strong>主数据问题的典型现象</strong></p>\n<p>在19家法人、多年运行的ECC环境中，主数据问题几乎是必然存在的。典型问题包括：</p>\n<ul>\n<li><strong>客户主数据</strong>：同一集团客户在不同法人下可能有多条记录，客户分类（工程客户/零售客户/海外客户）的标准不统一，信用限额设置缺乏集中管理</li>\n<li><strong>供应商主数据</strong>：集团共同供应商在各法人下分别维护，无法实现集中支付和集中谈判优势的体现</li>\n<li><strong>物料主数据</strong>：是ECC主数据问题的重灾区。LED产品SKU众多（不同功率/色温/规格），物料编码规则不统一，同类物料可能有多条重复记录，MRP参数（安全库存/采购提前期）长期未更新</li>\n<li><strong>会计科目</strong>：各法人的科目表是否已统一是集团合并报表的前提条件，MDG将在S/4HANA中扮演主数据治理的核心角色</li>\n</ul>\n<p><strong>MDG（Master Data Governance）的战略定位</strong></p>\n<p>MDG不仅仅是一个&quot;主数据清洗工具&quot;，它是华辉在S/4HANA实施中建立长期数据治理能力的基础设施。MDG的三个核心价值：</p>\n<ol>\n<li><strong>数据标准化</strong>：定义集团统一的物料编码规则、客户分类标准、供应商评级标准，并通过工作流强制执行</li>\n<li><strong>数据生命周期管理</strong>：从主数据的创建申请、审批、激活、变更到冻结/删除，全程有审计痕迹</li>\n<li><strong>支撑Group Reporting</strong>：集团合并报表的质量直接取决于各法人主数据的一致性，MDG是Group Reporting可靠运行的前提</li>\n</ol>\n<p><strong>数据迁移架构</strong></p>\n<p>Greenfield实施的数据迁移策略是数据架构中最高风险的环节。关键决策点包括：历史数据切断点的确定（通常以财年末为界）、历史凭证是否迁移（通常只迁余额）、工单/在途库存的处理方案、以及数据迁移工具的选型（LTMC/LTMOM是SAP标准工具，远景数字可能有自研工具）。</p>\n<h3 id=\"3-4-技术架构-ECC技术债与PCE云部署的范式转变\">3.4 技术架构：ECC技术债与PCE云部署的范式转变</h3>\n<p><strong>技术架构的核心问题是：现有技术基础设施是否支撑S/4HANA PCE的部署，以及PCE模式带来了哪些新的运维范式。</strong></p>\n<p><strong>ECC的技术债评估</strong></p>\n<p>华辉ECC 6.0（假设为EHP 7或更早版本）经过多年运行，通常积累了以下技术债：</p>\n<ul>\n<li><strong>定制化代码（Z程序）</strong>：每个Z报表、Z增强、Z接口都是S/4HANA迁移时需要评估的风险点。ABAP定制代码的简化（Code Simplification）是Greenfield实施减少技术债的核心优势</li>\n<li><strong>数据库大小</strong>：随着数据积累，ECC数据库可能达到数TB量级，HANA内存数据库的许可和性能规划需要基于精确的数据量评估</li>\n<li><strong>基础设施老化</strong>：服务器硬件、操作系统（AIX/HPUX/Windows）和数据库（Oracle/MSSQL）版本，是否还在厂商支持范围内</li>\n</ul>\n<p><strong>PCE（Private Cloud Edition）的架构含义</strong></p>\n<p>PCE不同于On-premise，也不同于Rise with SAP的Public Cloud，它代表了一种新的部署和运维范式：</p>\n<ul>\n<li><strong>基础设施责任转移</strong>：基础设施（服务器/存储/网络/OS）由SAP或合作伙伴托管，华辉IT团队从&quot;运维基础设施&quot;转型为&quot;管理业务配置&quot;</li>\n<li><strong>升级节奏变化</strong>：PCE遵循SAP的季度更新计划（Enhancement Packages），华辉不再能自主决定是否升级，IT团队需要建立持续适配升级的能力</li>\n<li><strong>CPI集成的必要性</strong>：PCE环境下，与外围系统的集成推荐通过CPI（云集成平台）而不是直接数据库连接，这是对现有集成架构的根本性改变</li>\n<li><strong>DRC（Document and Reporting Compliance）</strong>：针对中国电子发票（增值税发票/数字人民币）和德国/泰国的本地合规要求，PCE环境下DRC的部署和维护方式与On-premise不同</li>\n</ul>\n<p>技术架构的目标状态，是建立一个&quot;SAP托管基础设施 + 客户管理业务配置 + CPI标准化集成&quot;的三层技术架构，同时为华辉IT团队制定PCE运维能力提升计划。</p>\n<hr>"}, "L8_4": {"type": "reading", "title": "📖 Gap Analysis & 架构路线图", "html": "<h2 id=\"第四章-差距分析-Gap-Analysis-实操\">第四章：差距分析（Gap Analysis）实操</h2>\n<p>差距分析是TOGAF Phase E的核心工具，回答的问题是：&quot;从AS-IS到TO-BE，哪些东西要保留、哪些要淘汰、哪些要新建、哪些要迁移？&quot;以下针对华辉四个架构域给出具体分析框架。</p>\n<h3 id=\"四象限差距分析矩阵\">四象限差距分析矩阵</h3>\n<p><strong>象限定义：</strong></p>\n<ul>\n<li><strong>保留（Retain）</strong>：现有能力满足目标架构需求，无需改变</li>\n<li><strong>去除（Retire）</strong>：现有能力在目标架构中不再需要，计划淘汰</li>\n<li><strong>新增（Add）</strong>：目标架构需要但现在完全没有的能力</li>\n<li><strong>迁移（Migrate）</strong>：现有能力需要技术升级或配置重构后保留</li>\n</ul>\n<h3 id=\"业务架构域差距分析\">业务架构域差距分析</h3>\n<div class=\"tbl\"><table>\n<tr><th>类别</th><th>具体内容</th><th>说明</th></tr>\n<tr><td><strong>保留</strong></td><td>现有销售组织/采购组织的基本架构</td><td>业务逻辑成熟，在S/4HANA中对应配置</td></tr>\n<tr><td><strong>保留</strong></td><td>工厂/存储地点的物理组织对应关系</td><td>与实物运营绑定，不宜变动</td></tr>\n<tr><td><strong>去除</strong></td><td>基于Excel的集团合并报表流程</td><td>由Group Reporting完全替代</td></tr>\n<tr><td><strong>去除</strong></td><td>各法人独立维护、互不共享的客户/供应商主数据流程</td><td>由MDG的集中主数据治理替代</td></tr>\n<tr><td><strong>新增</strong></td><td>利润中心驱动的产品线P&amp;L管理能力</td><td>ECC时代不存在，S/4HANA通用日记账实现</td></tr>\n<tr><td><strong>新增</strong></td><td>集团内部交易（Intercompany）自动对账与消除流程</td><td>Group Reporting标准功能，ECC时代手工处理</td></tr>\n<tr><td><strong>迁移</strong></td><td>现有采购审批流程</td><td>从纸质/OA审批迁移到SAP工作流</td></tr>\n<tr><td><strong>迁移</strong></td><td>生产成本核算方案</td><td>从标准成本（Standard Cost）评估是否升级为实际成本（Actual Costing/Material Ledger）</td></tr>\n</table></div>\n<h3 id=\"应用架构域差距分析\">应用架构域差距分析</h3>\n<div class=\"tbl\"><table>\n<tr><th>类别</th><th>具体内容</th><th>说明</th></tr>\n<tr><td><strong>保留</strong></td><td>MES系统（如已满足生产现场需求）</td><td>通过CPI与S/4HANA集成，不替换</td></tr>\n<tr><td><strong>保留</strong></td><td>HR/考勤系统（短期内）</td><td>二期SuccessFactors商机的前提是评估保留期限</td></tr>\n<tr><td><strong>去除</strong></td><td>ECC上的所有Z定制报表（中长期）</td><td>由SAC（SAP Analytics Cloud）标准报表替代</td></tr>\n<tr><td><strong>去除</strong></td><td>点对点直连的系统集成接口</td><td>全部迁移至CPI管控</td></tr>\n<tr><td><strong>新增</strong></td><td>CPI集成平台</td><td>全新引入，是PCE架构的必要组件</td></tr>\n<tr><td><strong>新增</strong></td><td>EWM高级仓储管理</td><td>替代现有WM模块，支持更复杂的仓储逻辑</td></tr>\n<tr><td><strong>新增</strong></td><td>DRC合规管理模块</td><td>中国增值税电子发票+境外合规，ECC时代无标准解决方案</td></tr>\n<tr><td><strong>迁移</strong></td><td>ECC FICO/SD/MM/PP/QM模块</td><td>Greenfield重新配置，保留业务逻辑，重建技术实现</td></tr>\n</table></div>\n<h3 id=\"数据架构域差距分析\">数据架构域差距分析</h3>\n<div class=\"tbl\"><table>\n<tr><th>类别</th><th>具体内容</th><th>说明</th></tr>\n<tr><td><strong>保留</strong></td><td>核心主数据（清洗后）：客户/供应商/物料/GL科目</td><td>清洗是前提，迁移后在MDG中治理</td></tr>\n<tr><td><strong>去除</strong></td><td>重复/废弃物料编码</td><td>数据清洗阶段处理，估计有10-30%冗余数据</td></tr>\n<tr><td><strong>去除</strong></td><td>各法人不一致的科目表</td><td>统一为集团标准科目表（Group Chart of Accounts）</td></tr>\n<tr><td><strong>新增</strong></td><td>MDG主数据治理平台</td><td>全新引入，建立数据标准和审批流程</td></tr>\n<tr><td><strong>新增</strong></td><td>数据质量仪表板</td><td>监控关键主数据质量指标（重复率/完整度/一致性）</td></tr>\n<tr><td><strong>迁移</strong></td><td>历史交易数据（近2年）</td><td>以余额形式迁移，部分明细数据归档查询</td></tr>\n</table></div>\n<h3 id=\"技术架构域差距分析\">技术架构域差距分析</h3>\n<div class=\"tbl\"><table>\n<tr><th>类别</th><th>具体内容</th><th>说明</th></tr>\n<tr><td><strong>保留</strong></td><td>企业内部网络基础设施</td><td>PCE仍需本地网络连接SAP数据中心</td></tr>\n<tr><td><strong>去除</strong></td><td>ECC的Oracle/MSSQL数据库许可</td><td>迁移至HANA后不再需要</td></tr>\n<tr><td><strong>去除</strong></td><td>服务器硬件（On-premise基础设施）</td><td>PCE托管后交还或退役</td></tr>\n<tr><td><strong>新增</strong></td><td>HANA内存数据库（PCE托管）</td><td>核心技术架构变化</td></tr>\n<tr><td><strong>新增</strong></td><td>BTP（Business Technology Platform）基础订阅</td><td>CPI/MDG/SAC等云服务的基础平台</td></tr>\n<tr><td><strong>新增</strong></td><td>SAP Activate项目方法论工具链（Focused Build/Solution Manager替代品）</td><td>项目管理和测试管理工具</td></tr>\n<tr><td><strong>迁移</strong></td><td>所有Z程序ABAP代码</td><td>需逐一评估兼容性，不兼容部分重写或放弃</td></tr>\n</table></div>\n<hr>"}, "L8_5": {"type": "reading", "title": "📖 利益相关者管理（华辉版）", "html": "<h2 id=\"第六章-利益相关者管理\">第六章：利益相关者管理</h2>\n<p>TOGAF的利益相关者管理框架（Stakeholder Management）要求识别每个关键干系人的<strong>关注点（Concern）</strong>和所需的<strong>架构视点（Viewpoint）</strong>。</p>\n<h3 id=\"关键干系人分析矩阵\">关键干系人分析矩阵</h3>\n<div class=\"tbl\"><table>\n<tr><th>干系人</th><th>角色</th><th>核心关注点（Concern）</th><th>架构视点（Viewpoint）</th><th>参与策略</th></tr>\n<tr><td><strong>陈大华</strong>（假设为华辉董事长/总裁级）</td><td>最终决策者</td><td>项目ROI、净利率改善路径、投资回报周期、股东价值</td><td>业务架构愿景视图、架构路线图摘要、三年财务影响预测</td><td>月度汇报（1页纸摘要）、里程碑节点专题汇报</td></tr>\n<tr><td><strong>李明远</strong>（假设为CFO/数智化负责人）</td><td>项目发起人</td><td>集团合并报表质量、成本可视性、合规（DRC）、预算执行</td><td>数据架构视图（Group Reporting设计）、应用架构（DRC集成）、技术架构（PCE成本）</td><td>双周进度会、关键设计决策参与</td></tr>\n<tr><td><strong>吴志远</strong>（远景数字 PM）</td><td>实施负责方</td><td>项目按时交付、范围控制、资源协调、客户满意度</td><td>实施路线图、工作包分解、风险登记册</td><td>周例会、里程碑评审、变更管控</td></tr>\n<tr><td><strong>华辉数智化部（IT部门）</strong></td><td>内部执行团队</td><td>ECC现有系统知识传承、PCE运维能力建设、人员培训、系统稳定性</td><td>技术架构视图、集成架构（CPI）、运维模式变化说明</td><td>全程深度参与（作为关键知识载体）、CoE建设计划</td></tr>\n<tr><td><strong>各业务部门负责人</strong>（财务/销售/采购/生产）</td><td>业务流程所有者</td><td>流程变化对业务操作的影响、系统易用性、切换期风险</td><td>业务架构视图（流程地图）、应用架构（操作界面变化）</td><td>流程工作坊、UAT测试参与、变更管理培训</td></tr>\n<tr><td><strong>SAP Account Executive（你）</strong></td><td>账户管理与质量监督</td><td>交付质量、客户满意度、二期商机、SAP品牌维护</td><td>所有架构域的质量视图、差距分析完整性、路线图可行性</td><td>架构评审主持、月度QBR、二期商机架构论证</td></tr>\n</table></div>\n<h3 id=\"重点干系人管理策略\">重点干系人管理策略</h3>\n<p><strong>对陈大华（高层决策者）</strong>：关键是建立&quot;净利率改善&quot;与&quot;S/4HANA能力&quot;的直接因果链。不要用IT术语，要用业务语言：例如&quot;Group Reporting将月结从T+10压缩至T+3，使管理层在月初第3天就能看到上月全集团的利润报表，而不是等到月底才能发现问题&quot;。</p>\n<p><strong>对李明远（项目发起人）</strong>：关键是让他看到&quot;架构设计的严谨性决定了实施成功率&quot;。每次架构评审都应该有量化输出：主数据问题已识别XX条、Z程序高风险代码XX个、数据迁移工作量预估XX人天。模糊的诊断报告是第二期实施风险的前兆。</p>\n<p><strong>对吴志远（远景数字 PM）</strong>：关键是建立合作而非对立的关系。AE的架构监督不是找茬，而是帮助远景数字提早发现风险，避免实施阶段的返工。建议每月举行一次&quot;架构质量复盘会&quot;，聚焦：本月架构决策是否记录在案、是否有未决设计偏差、数据迁移里程碑是否按计划推进。</p>\n<hr>"}, "L8_6": {"type": "reading", "title": "📖 SAP AE 架构治理职责 & 二期商机", "html": "<h2 id=\"第七章-SAP-AE的架构治理职责\">第七章：SAP AE的架构治理职责</h2>\n<h3 id=\"7-1-如何用TOGAF架构合规审查远景数字的交付物\">7.1 如何用TOGAF架构合规审查远景数字的交付物</h3>\n<p>架构合规审查（Architecture Compliance Review）是TOGAF Phase G的核心工具。作为AE，你不需要审查每一行配置，但需要对以下关键交付物建立质量检查清单：</p>\n<p><strong>第一期交付物检查清单（18周咨询阶段）：</strong></p>\n<ul>\n<li>[ ] <strong>架构愿景文档</strong>：是否包含明确的目标架构原则（如&quot;集团数据标准优先于法人本地习惯&quot;）？是否获得陈大华/李明远级别的书面批准？</li>\n<li>[ ] <strong>业务架构报告</strong>：流程地图是否覆盖19家法人的差异场景？净利率改善的业务架构根因分析是否有数据支撑？</li>\n<li>[ ] <strong>应用架构报告</strong>：外围系统清单是否完整（是否有系统被遗漏）？集成矩阵是否包含接口技术规格（调用频率/数据量/实时性要求）？</li>\n<li>[ ] <strong>数据架构报告</strong>：主数据问题是否已量化（不能只说&quot;主数据质量差&quot;，要说&quot;物料主数据重复率约X%，影响模块：MM/PP/SD&quot;）？MDG实施范围是否明确？</li>\n<li>[ ] <strong>技术架构报告</strong>：Z程序评估结果是否以&quot;高/中/低迁移风险&quot;分类？PCE部署方案是否包含网络延迟测试要求？</li>\n<li>[ ] <strong>Gap分析报告</strong>：四象限是否覆盖所有四个架构域？保留/去除/新增/迁移的决策依据是否记录在案？</li>\n<li>[ ] <strong>实施路线图</strong>：是否包含具体的里程碑日期和可验证的交付物？数据迁移计划是否独立成节？</li>\n</ul>\n<h3 id=\"7-2-二期商机的架构级论证\">7.2 二期商机的架构级论证</h3>\n<p>第一期咨询结束时，是发掘二期商机的最佳窗口期。此时架构蓝图已确立，你可以用架构级语言论证以下扩展模块的必要性：</p>\n<p><strong>GTS（Global Trade Services）——针对泰国/德国境外法人</strong></p>\n<ul>\n<li>架构论证切入点：在目标架构中，DRC处理了中国本地合规，但泰国的关税申报、德国的欧盟贸易合规需要GTS的支持。如果不引入GTS，境外法人的合规风险将形成集团层面的财务暴露。</li>\n</ul>\n<p><strong>IBP（Integrated Business Planning）——针对供应链计划</strong></p>\n<ul>\n<li>架构论证切入点：S/4HANA的MRP是基于历史需求的计划，IBP是基于统计预测+约束优化的计划。对于LED照明行业（原材料价格波动大、季节性需求明显），IBP能将库存周转率提升15-25%。</li>\n</ul>\n<p><strong>SAC（SAP Analytics Cloud）——针对管理层报表需求</strong></p>\n<ul>\n<li>架构论证切入点：Group Reporting提供集团合规视角的合并报表，但管理层需要的是多维度的经营分析（产品线盈利性/区域销售趋势/费用预算执行）。SAC是S/4HANA目标架构中的标准管理报表工具。</li>\n</ul>\n<p><strong>SuccessFactors——针对HR数字化</strong></p>\n<ul>\n<li>架构论证切入点：19家法人的人力资源管理（绩效/薪酬/招聘）目前在应用架构版图中是明显的盲区。SuccessFactors与S/4HANA的HR集成是SAP推荐的目标架构，可以在二期路线图中作为规划项呈现。</li>\n</ul>\n<h3 id=\"7-3-关键里程碑架构评审检查清单\">7.3 关键里程碑架构评审检查清单</h3>\n<div class=\"tbl\"><table>\n<tr><th>里程碑</th><th>时间节点（参考）</th><th>AE架构评审重点</th></tr>\n<tr><td>架构愿景批准</td><td>2026年6月末</td><td>目标架构原则是否获得高层签字确认</td></tr>\n<tr><td>蓝图设计完成（Blueprint Sign-off）</td><td>2026年10月末</td><td>四域差距分析完整性、Z程序风险量化、数据迁移策略确认</td></tr>\n<tr><td>实现阶段启动（Realization Kickoff）</td><td>2026年11月</td><td>技术架构规格是否通过PCE团队审核、CPI集成架构是否已批准</td></tr>\n<tr><td>集成测试完成（SIT Complete）</td><td>2027年3-4月</td><td>关键业务流程的端到端测试覆盖度、Group Reporting合并场景验证</t
