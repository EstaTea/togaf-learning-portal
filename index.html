7": {"type": "reading", "title": "📖 Phase D — 技术架构（PCE四大范式转变）", "html": "<h3 id=\"D-1-基线技术架构\">D.1 基线技术架构</h3>\n<h4 id=\"D-1-1-技术组合目录\">D.1.1 技术组合目录</h4>\n<div class=\"tbl\"><table>\n<tr><th>技术层</th><th>当前技术组件</th><th>版本/规格</th><th>技术状态</th><th>处置建议</th></tr>\n<tr><td>核心应用</td><td>SAP ECC 6.0（EHP7）</td><td>2008年上线</td><td><strong>老化/高风险</strong></td><td>替换→S/4HANA</td></tr>\n<tr><td>数据库</td><td>Oracle Database / MSSQL</td><td>旧版本</td><td><strong>即将EOS</strong></td><td>替换→SAP HANA（PCE托管）</td></tr>\n<tr><td>操作系统</td><td>Windows Server / Linux</td><td>旧版本</td><td><strong>部分EOS</strong></td><td>随PCE迁移退役</td></tr>\n<tr><td>应用服务器</td><td>HP/IBM企业级服务器</td><td>本地部署</td><td><strong>即将退役</strong></td><td>PCE迁移后归还/退役</td></tr>\n<tr><td>网络基础设施</td><td>企业内网 + VPN（泰国/德国）</td><td>自建</td><td>稳定，需评估</td><td><strong>保留+优化带宽</strong>（PCE专线）</td></tr>\n<tr><td>集成中间件</td><td>点对点接口（37个）</td><td>自研/文件/DB连接</td><td><strong>技术债高</strong></td><td><strong>全部替换→CPI</strong></td></tr>\n<tr><td>安全设备</td><td>防火墙/IDS/IPS</td><td>本地</td><td>需升级</td><td>更新+等保合规</td></tr>\n<tr><td>备份系统</td><td>本地磁带/磁盘备份</td><td>自建</td><td>稳定</td><td>PCE迁移后由SAP托管</td></tr>\n</table></div>\n<h4 id=\"D-1-2-技术债务清单-7条-\">D.1.2 技术债务清单（7条）</h4>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>技术债务</th><th>量化影响</th><th>严重程度</th><th>处置方案</th></tr>\n<tr><td>TD-01</td><td><strong>ECC 6.0主流维护2027年结束</strong></td><td>安全漏洞无补丁，系统崩溃风险</td><td>🔴</td><td>Greenfield迁移至PCE</td></tr>\n<tr><td>TD-02</td><td><strong>物料账运行7-8小时</strong></td><td>月结关账效率极低，占用大量IT资源</td><td>🔴</td><td>S/4HANA HANA内存计算，秒级完成</td></tr>\n<tr><td>TD-03</td><td><strong>Z程序大量积累</strong>（17年）</td><td>迁移工作量未知，需Custom Code扫描确认</td><td>🔴</td><td>Greenfield精简Z程序，不兼容则重写/放弃</td></tr>\n<tr><td>TD-04</td><td><strong>Oracle/MSSQL数据库即将EOS</strong></td><td>安全漏洞，性能瓶颈</td><td>🟡</td><td>PCE迁移后替换为SAP HANA</td></tr>\n<tr><td>TD-05</td><td><strong>37个点对点接口</strong></td><td>无法维护，数据不实时，任何系统升级影响多个接口</td><td>🔴</td><td>全部迁移至CPI</td></tr>\n<tr><td>TD-06</td><td><strong>On-premise机房硬件老化</strong></td><td>能耗高，扩展性差，运维成本上升</td><td>🟡</td><td>PCE迁移后机房退役</td></tr>\n<tr><td>TD-07</td><td><strong>IT团队技能老化</strong>（ABAP 4/6版本）</td><td>无法支撑ABAP新版本开发，Cloud Native能力缺失</td><td>🟡</td><td>专项培训计划（Fiori/CPI/ABAP Cloud）</td></tr>\n</table></div>"}, "LA_8": {"type": "reading", "title": "📖 Phase E — 10个工作包 & 三个过渡架构", "html": "<h3 id=\"E-1-综合差距-解决方案-依赖关系矩阵\">E.1 综合差距-解决方案-依赖关系矩阵</h3>\n<div class=\"tbl\"><table>\n<tr><th>差距编号</th><th>架构域</th><th>差距描述（华辉具体痛点）</th><th>解决方案</th><th>依赖</th><th>优先级</th></tr>\n<tr><td>GAP-B01</td><td>业务</td><td>MRP形同虚设（预测准确率30-40%）</td><td>S/4HANA PP + MRP Live + 销售预测培训</td><td>GAP-D01（主数据清洗）</td><td>P1</td></tr>\n<tr><td>GAP-B02</td><td>业务</td><td>利润中心未启用，无事业部P&amp;L</td><td>S/4HANA FI利润中心层级设计</td><td>GAP-D02（科目表统一）</td><td>P1</td></tr>\n<tr><td>GAP-B03</td><td>业务</td><td>信用管理未启用，应收周转147天</td><td>S/4HANA SD信用管理（按客户/渠道配置）</td><td>无</td><td>P1</td></tr>\n<tr><td>GAP-B04</td><td>业务</td><td>集团合并报表手工（19法人）</td><td>Group Reporting（含内部交易自动消除）</td><td>GAP-D02</td><td>P1</td></tr>\n<tr><td>GAP-B05</td><td>业务</td><td>泰国FZ40无法合规运营</td><td>S/4HANA泰国本地化 + DRC泰国版</td><td>无</td><td>P1（最紧迫）</td></tr>\n<tr><td>GAP-B06</td><td>业务</td><td>成本核算粗放（标准成本手工估算）</td><td>S/4HANA Material Ledger + 成本估算</td><td>GAP-D01</td><td>P2</td></tr>\n<tr><td>GAP-B07</td><td>业务</td><td>仓储管理基础（WM→EWM）</td><td>EWM高级仓储（批次/序列号/移动设备）</td><td>无</td><td>P2</td></tr>\n<tr><td>GAP-D01</td><td>数据</td><td>物料主数据7个写入点，质量极差</td><td>MDG主数据治理平台上线 + 数据清洗3轮</td><td>无（最先启动）</td><td>P1</td></tr>\n<tr><td>GAP-D02</td><td>数据</td><td>各法人科目表不统一，利润中心未启用</td><td>MDG财务主数据 + 集团统一科目表设计</td><td>GAP-D01</td><td>P1</td></tr>\n<tr><td>GAP-D03</td><td>数据</td><td>BOM手工转换，无PLM-ERP接口</td><td>CPI INT-01（PLM→S/4HANA MBOM自动同步）</td><td>GAP-D01</td><td>P1</td></tr>\n<tr><td>GAP-A01</td><td>应用</td><td>37个点对点接口，数据不实时</td><td>SAP CPI统一集成平台（12外围系统）</td><td>无</td><td>P1</td></tr>\n<tr><td>GAP-A02</td><td>应用</td><td>WMS库存不实时（影响ATP和月结）</td><td>CPI INT-03重建WMS接口（实时）</td><td>GAP-A01</td><td>P1</td></tr>\n<tr><td>GAP-A03</td><td>应用</td><td>SRM接口尾差，无法清账</td><td>CPI INT-04重建SRM接口，消除尾差</td><td>GAP-A01</td><td>P1</td></tr>\n<tr><td>GAP-A04</td><td>应用</td><td>CRM系统未集成SAP（客户数据孤岛）</td><td>CPI INT-05新建CRM-SAP接口</td><td>GAP-A01</td><td>P2</td></tr>\n<tr><td>GAP-T01</td><td>技术</td><td>ECC 2027年维护结束，Z程序积累</td><td>Greenfield迁移至S/4HANA PCE，精简Z程序</td><td>无</td><td>P1</td></tr>\n<tr><td>GAP-T02</td><td>技术</td><td>Oracle数据库即将EOS</td><td>SAP HANA（PCE自动提供）</td><td>GAP-T01</td><td>P1</td></tr>\n<tr><td>GAP-T03</td><td>技术</td><td>德国FZ33 CBAM碳报告能力缺失</td><td>DRC德国版本 + 碳数据架构（二期详细设计）</td><td>GAP-B05</td><td>P2</td></tr>\n</table></div>"}, "LA_9": {"type": "reading", "title": "📖 Phase F — 付款里程碑·迁移计划·ROI测算", "html": "<h3 id=\"F-1-实施因素目录-Implementation-Factor-Catalog-\">F.1 实施因素目录（Implementation Factor Catalog）</h3>\n<blockquote><p>基于合同条款、项目章程、访谈问卷识别的华辉特有风险</p></blockquote>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>因素类型</th><th>描述</th><th>影响工作包</th><th>严重程度</th><th>应对措施</th></tr>\n<tr><td>IF-01</td><td><strong>风险</strong></td><td>Z程序积累17年，迁移工作量待Custom Code扫描确认（可能超出预算）</td><td>WP2/全部</td><td>🔴</td><td>扫描工具必须在蓝图前部署，高风险Z程序放弃或重写</td></tr>\n<tr><td>IF-02</td><td><strong>风险</strong></td><td>主数据质量极差（6.2万物料），清洗工期可能超出18周</td><td>WP1</td><td>🔴</td><td>三轮清洗并行推进，第1轮与业务调研同步启动</td></tr>\n<tr><td>IF-03</td><td><strong>约束</strong></td><td>生产系统切换只能在春节停产期（2027年1月下旬约10天）</td><td>WP2/所有</td><td>🔴</td><td>确认2027年春节日期（1月28日），反推所有里程碑</td></tr>\n<tr><td>IF-04</td><td><strong>风险</strong></td><td>泰国FZ40本地化（泰铢·税制），SAP PCE泰国版本成熟度需验证</td><td>WP9</td><td>🟡</td><td>第一期架构阶段邀请SAP泰国合规专家参与评审</td></tr>\n<tr><td>IF-05</td><td><strong>风险</strong></td><td>海辉公司（用友U8）数据迁移复杂，船舶照明项目型业务特殊</td><td>WP3/WP9</td><td>🟡</td><td>海辉单独立项（PS模块），数据迁移方案独立设计</td></tr>\n<tr><td>IF-06</td><td><strong>约束</strong></td><td>控股集团（控股方）共享/司库系统边界未清晰，可能影响FICO设计</td><td>WP3</td><td>🟡</td><td>蓝图前召开控股方专题会，书面确认接口边界</td></tr>\n<tr><td>IF-07</td><td><strong>依赖</strong></td><td>关键用户须投入20-30%工时（陈大华问卷C1），业务繁忙存在风险</td><td>全部</td><td>🟡</td><td>总经理李明远书面承诺配合机制，纳入项目章程</td></tr>\n<tr><td>IF-08</td><td><strong>约束</strong></td><td>远景数字团队人员必须与投标文件完全一致（违约5%=约5%违约金）</td><td>全部</td><td>🟡</td><td>AE监控顾问稳定性，关键人员离职立即启动违约追责</td></tr>\n<tr><td>IF-09</td><td><strong>风险</strong></td><td>北区分公司与总部流程差异大，IT能力薄弱（已D9专程调研）</td><td>全部</td><td>🟡</td><td>北区设专属联络人，UAT必须在北区现场进行</td></tr>\n<tr><td>IF-10</td><td><strong>约束</strong></td><td>项目预算约千万元级上限，Z程序超出评估可能导致预算超支</td><td>WP2/全部</td><td>🔴</td><td>建立架构变更费用审批机制，超过50万需Board批准</td></tr>\n<tr><td>IF-11</td><td><strong>风险</strong></td><td>PLM（2025新上线）与CPI接口尚未设计，EBOM→MBOM贯通依赖PLM厂商配合</td><td>WP7</td><td>🟡</td><td>第一期阶段签署PLM接口合作协议，第三方厂商纳入项目</td></tr>\n<tr><td>IF-12</td><td><strong>假设</strong></td><td>S/4HANA 2023版本满足华辉所有业务需求（无需降级到旧版本）</td><td>WP2</td><td>🟡</td><td>蓝图阶段对特殊功能（项目型制造）进行POC验证</td></tr>\n<tr><td>IF-13</td><td><strong>风险</strong></td><td>19法人科目表统一工程量大，各子公司可能抵制变更</td><td>WP3</td><td>🟡</td><td>王雪梅主导科目统一工作坊，纳入变革管理计划</td></tr>\n<tr><td>IF-14</td><td><strong>约束</strong></td><td>德国FZ33 CBAM碳报告截止2026年底，时间窗口在实施期内</td><td>WP8/WP9</td><td>🔴</td><td>WP8/WP9并行推进，CBAM需求优先进入WP8范围</td></tr>\n<tr><td>IF-15</td><td><strong>依赖</strong></td><td>数据迁移静态数据准确率100%是合同验收硬性门槛</td><td>WP1/全部</td><td>🔴</td><td>数据迁移设专职质量负责人，三轮迭代验证</td></tr>\n</table></div>"}, "LA_10": {"type": "reading", "title": "📖 Phase G — 架构合规检查·Dispensation案例", "html": "<h3 id=\"G-1-架构委员会治理机制\">G.1 架构委员会治理机制</h3>\n<p><strong>会议安排：</strong></p>\n<ul>\n<li>月度常规会议（每月第三周周四，2小时）</li>\n<li>里程碑特别会议：蓝图冻结前/SIT开始前/Go-Live前/付款节点前</li>\n<li>紧急会议：重大偏差或关键顾问离职时，48小时内召开</li>\n</ul>\n<p><strong>审批权限矩阵：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>决策类型</th><th>刘建平（甲方PM）</th><th>陈大华（项目主持）</th><th>王雪梅（财务）</th><th>李明远（总经理）</th><th>Board全体</th></tr>\n<tr><td>技术配置（标准范围内）</td><td>✅</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>\n<tr><td>架构偏差（轻微/Compliant）</td><td>提议</td><td>✅</td><td>—</td><td>—</td><td>备案</td></tr>\n<tr><td>架构豁免（Dispensation）</td><td>提议</td><td>—</td><td>—</td><td>—</td><td>✅</td></tr>\n<tr><td>范围变更（&lt;50万元）</td><td>提议</td><td>✅</td><td>✅联签</td><td>—</td><td>—</td></tr>\n<tr><td>范围变更（&gt;50万元）</td><td>提议</td><td>—</td><td>—</td><td>✅</td><td>—</td></tr>\n<tr><td>顾问人员变更（违约条款）</td><td>提议</td><td>—</td><td>—</td><td>—</td><td>✅</td></tr>\n</table></div>\n<h3 id=\"G-2-架构合规检查清单-Architecture-Compliance-Checklist-\">G.2 架构合规检查清单（Architecture Compliance Checklist）</h3>\n<blockquote><p>AE 在每个里程碑使用，确保远景数字交付物符合目标架构</p></blockquote>\n<div class=\"tbl\"><table>\n<tr><th>检查项</th><th>检查对象</th><th>期望合规级别</th><th>检查时间点</th><th>偏差处理</th></tr>\n<tr><td>MDG 为物料主数据唯一写入点</td><td>MDG配置+所有系统权限</td><td>Conformant</td><td>MDG上线验收</td><td>Non-Conformant→立即整改</td></tr>\n<tr><td>S/4HANA Z程序数量不超过约定上限</td><td>ABAP开发清单</td><td>Compliant</td><td>每个Sprint</td><td>超限→Board审议，评估废弃</td></tr>\n<tr><td>所有外围系统集成通过 CPI</td><td>接口清单</td><td>Conformant</td><td>SIT阶段</td><td>点对点发现→申请Dispensation或整改</td></tr>\n<tr><td>泰国本位币+税制通过SAP本地化认证</td><td>FZ40系统配置</td><td>Conformant</td><td>泰国UAT</td><td>Non-Conformant→SAP泰国专家紧急支援</td></tr>\n<tr><td>Group Reporting月结≤3天（第一个月结）</td><td>月结关账时间</td><td>Conformant</td><td>Go-Live后第一月结</td><td>超时→根因分析，限期整改</td></tr>\n<tr><td>DRC 电子发票通过国税系统验证</td><td>DRC配置</td><td>Conformant</td><td>UAT阶段</td><td>Non-Conformant→禁止上线</td></tr>\n<tr><td>19家法人统一使用集团科目表</td><td>FICO配置</td><td>Conformant</td><td>蓝图冻结</td><td>差异科目→王雪梅裁决</td></tr>\n<tr><td>应收账款信用管理功能已启用</td><td>SD信用配置</td><td>Conformant</td><td>SIT阶段</td><td>未启用→P1问题</td></tr>\n<tr><td>静态数据迁移准确率100%</td><td>迁移验证报告</td><td>Conformant</td><td>Go-Live前</td><td>&lt;100%→推迟上线</td></tr>\n<tr><td>系统可用性99.9%（上线后6个月）</td><td>PCE监控数据</td><td>Conformant</td><td>持续监控</td><td>低于99.9%→PCE SLA追责</td></tr>\n<tr><td>Fiori角色权限遵循职责分离原则</td><td>权限矩阵</td><td>Conformant</td><td>UAT阶段</td><td>冲突权限→周国强(纪委)会签</td></tr>\n<tr><td>数据迁移工具使用SAP标准LTMOM</td><td>迁移工具选型</td><td>Conformant</td><td>迁移启动前</td><td>自研工具→Board评审</td></tr>\n</table></div>\n<h3 id=\"G-3-偏差处理-Dispensation-真实场景\">G.3 偏差处理（Dispensation）真实场景</h3>\n<p><strong>案例1：海辉公司要求推迟迁移至S/4HANA（保留用友U8）</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>申请方</td><td>海辉公司（浙江海辉，船舶照明）</td></tr>\n<tr><td>偏差描述</td><td>海辉提出：船舶照明有项目型制造（按船号成本核算），S/4HANA PS模块配置复杂，要求保留用友U8至二期再迁移</td></tr>\n<tr><td>违反原则</td><td>BP-02（集团管控优于法人自治）；IS-01（数据权威单一来源）</td></tr>\n<tr><td>Board评估</td><td>海辉收入体量较小；PS模块复杂度确实高于标准模块；保留用友U8将影响合并报表质量（手工处理海辉数据）</td></tr>\n<tr><td>决议</td><td><strong>有条件批准Dispensation</strong>：海辉用友U8保留至第一期结束，但须提供月度数据接口（Excel上传至Group Reporting），并承诺在S/4HANA上线稳定6个月后启动海辉迁移项目</td></tr>\n<tr><td>记录</td><td>合规级别：Non-Conformant + 有效期Dispensation，限期二期完成</td></tr>\n</table></div>\n<p><strong>案例2：远景数字申请修改CPI集成方案（改用直连数据库）</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>申请方</td><td>远景数字实施团队</td></tr>\n<tr><td>偏差描述</td><td>WMS接口技术团队提出：WMS厂商不支持标准API，要求直连数据库（DB Link）方式替代CPI</td></tr>\n<tr><td>违反原则</td><td>IS-03（接口标准化：禁止点对点/直连数据库）</td></tr>\n<tr><td>Board评估</td><td>直连数据库违反PCE云架构安全要求（PCE不允许外部DB直连）；WMS厂商有REST API能力，只是需要额外开发</td></tr>\n<tr><td>决议</td><td><strong>拒绝Dispensation</strong>：要求WMS厂商在4周内开发REST API，远景数字在CPI上建立标准iFlow接口；增加WP7预算30万元用于WMS API开发</td></tr>\n<tr><td>结果</td><td>维护架构完整性，额外成本30万元纳入范围变更审批</td></tr>\n</table></div>\n<h3 id=\"G-4-月度架构质量评审-AQR-议程模板\">G.4 月度架构质量评审（AQR）议程模板</h3>\n<p><em>SAP AE 每月主持，时间1.5小时</em></p>\n<div class=\"tbl\"><table>\n<tr><th>议题</th><th>时间</th><th>内容</th></tr>\n<tr><td>1. 本月架构决策记录回顾</td><td>10分钟</td><td>上月所有架构决策是否记录在案（Decision Log）</td></tr>\n<tr><td>2. 工作包进度 vs 架构规格偏差</td><td>20分钟</td><td>各WP进度、发现的架构偏差、整改状态</td></tr>\n<tr><td>3. 数据迁移质量指标</td><td>15分钟</td><td>主数据清洗进度（物料/客户/供应商），质量指标（重复率/完整度）</td></tr>\n<tr><td>4. 待决设计问题（Open Issues）</td><td>20分钟</td><td>未解决的设计问题，需Board决策的事项</td></tr>\n<tr><td>5. 付款里程碑架构准备情况</td><td>10分钟</td><td>下个付款节点的架构交付物就绪程度</td></tr>\n<tr><td>6. 二期商机架构论证更新</td><td>10分钟</td><td>GTS/SAC/IBP的架构触发条件更新</td></tr>\n<tr><td>7. 下月关键里程碑</td><td>5分钟</td><td>确认下月需完成的架构评审和交付物</td></tr>\n</table></div>\n<h3 id=\"G-5-Phase-G-交付物清单\">G.5 Phase G 交付物清单</h3>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>付款关联</th><th>状态</th></tr>\n<tr><td>Architecture Compliance Reports（月度）</td><td>每月持续</td><td>进行中</td></tr>\n<tr><td>Architecture Contracts（类型1+类型2各1份）</td><td>项目启动时签署</td><td>✅ 已签署</td></tr>\n<tr><td>Dispensation Log（豁免记录）</td><td>持续更新</td><td>进行中</td></tr>\n<tr><td>AQR会议纪要（月度）</td><td>持续</td><td>进行中</td></tr>\n<tr><td>Implementation Governance Model</td><td>—</td><td>✅ 已批准</td></tr>\n</table></div>\n<hr>\n<h2 id=\"第十章-Phase-H-架构变更管理-Architecture-Change-Management-\">第十章：Phase H — 架构变更管理（Architecture Change Management）</h2>\n<h3 id=\"H-1-PESTLE-外部变化监控\">H.1 PESTLE 外部变化监控</h3>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>具体变化（华辉特有）</th><th>对架构影响</th><th>变更类型</th><th>紧迫程度</th></tr>\n<tr><td><strong>Legal（法律）</strong></td><td>中国金税四期全面推行（电子发票全面数字化）</td><td>DRC模块配置需跟进税务局升级节奏</td><td>类型2</td><td>高</td></tr>\n<tr><td><strong>Legal（法律）</strong></td><td><strong>欧盟CBAM碳边境税2026年正式落地</strong></td><td>德国FZ33需提交碳足迹数据（当前架构无此能力）</td><td><strong>类型3</strong></td><td><strong>极高</strong></td></tr>\n<tr><td><strong>Technology（技术）</strong></td><td>SAP S/4HANA PCE季度增强包强制推送</td><td>需建立季度回归测试流程，IT团队需适配新功能</td><td>类型1/2</td><td>中</td></tr>\n<tr><td><strong>Economic（经济）</strong></td><td>比亚迪要求供应商2027年完成数字化认证（车灯事业部）</td><td>QM模块需增加质量数字化报告输出能力</td><td>类型2</td><td>高</td></tr>\n<tr><td><strong>Legal（法律）</strong></td><td>泰国e-Tax Invoice系统升级（税务局API版本升级）</td><td>DRC泰国模块需跟进泰国税务局最新版本</td><td>类型1</td><td>中</td></tr>\n<tr><td><strong>Political（政治）</strong></td><td>控股集团整体数字化战略调整（可能变更共享系统要求）</td><td>FICO设计中控股方接口可能需要重设计</td><td>类型2</td><td>高</td></tr>\n<tr><td><strong>Technology（技术）</strong></td><td>SAP Joule AI助手集成S/4HANA（SAP官方发布）</td><td>可提升用户体验，可选择性引入（非强制）</td><td>类型1</td><td>低</td></tr>\n<tr><td><strong>Economic（经济）</strong></td><td>照明行业继续整合（潜在并购新法人）</td><td>需确保S/4HANA架构支持快速接入新法人</td><td>类型2</td><td>中</td></tr>\n</table></div>\n<h3 id=\"H-2-三类变更案例-华辉实际场景-\">H.2 三类变更案例（华辉实际场景）</h3>\n<p><strong>变更1（类型1—简化）：SAP PCE季度增强包 SP03 更新</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>SAP PCE推送2024.Q4增强包（SP03），修复Group Reporting合并报表的Bug</td></tr>\n<tr><td>分类</td><td>类型1：版本小更新，不改变架构方向，SAP标准维护</td></tr>\n<tr><td>处理流程</td><td>①刘建平审批→②DEV环境部署→③核心功能回归测试（2天）→④PRD环境推送</td></tr>\n<tr><td>用时</td><td>5个工作日（含测试）</td></tr>\n<tr><td>记录</td><td>更新Architecture Repository中的技术版本记录</td></tr>\n</table></div>\n<p><strong>变更2（类型2—增量）：比亚迪要求EDI直连（车灯事业部）</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>比亚迪2027年要求所有供应商开通EDI（850采购订单/856发货确认/810发票）；当前通过邮件和电话处理</td></tr>\n<tr><td>分类</td><td>类型2：在CPI架构框架内增加新集成能力，不改变整体架构方向</td></tr>\n<tr><td>处理流程</td><td>①启动简化ADM循环（Phase C应用架构更新）→②CPI增加EDI模块设计→③Board审批（涉及WP7增量工作）→④4周设计，12周实施</td></tr>\n<tr><td>架构更新</td><td>应用通信图增加EDI连接器；CPI接口清单新增INT-13</td></tr>\n<tr><td>成本</td><td>约50万元，纳入WP7变更申请</td></tr>\n</table></div>\n<p><strong>变更3（类型3—重新定义）：欧盟CBAM要求德国FZ33提交碳足迹报告</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>欧盟CBAM 2026年正式落地，德国FZ33出口产品需要2026年底前提交精确到产品级的碳排放数据；当前架构完全无此能力</td></tr>\n<tr><td>分类</td><td><strong>类型3</strong>：需新增业务流程（碳核算流程）+ 新增数据实体（碳排放数据模型）+ 新增应用组件（碳追踪模块）+ 新增技术采集（供应商碳排放数据传输）</td></tr>\n<tr><td>处理流程</td><td>①触发新ADM循环（范围限定&quot;碳合规能力架构&quot;）→②Phase A：碳合规架构愿景→③Phase C/D：碳数据模型+应用方案设计→④Phase E：工作包（WP-CBAM）→⑤Board审批+张建国批准（额外投资）→⑥预计12周架构设计，20周实施</td></tr>\n<tr><td>影响</td><td>数据架构新增5个碳相关数据实体；应用架构新增CBAM合规模块（DRC扩展）；需引入供应商碳排放API；估算成本约200万元</td></tr>\n</table></div>\n<h3 id=\"H-3-二期商机-SAP-AE视角-\">H.3 二期商机（SAP AE视角）</h3>\n<div class=\"tbl\"><table>\n<tr><th>产品</th><th>优先级</th><th>架构触发时机</th><th>论证依据</th></tr>\n<tr><td><strong>GTS 全球贸易服务</strong></td><td>🔴 高</td><td>Go-Live后3个月（泰国/德国稳定后）</td><td>德国CBAM+泰国关税申报，DRC不能覆盖GTS全套功能；19法人跨境贸易合规风险</td></tr>\n<tr><td><strong>SAC 分析云（管理驾驶舱）</strong></td><td>🔴 高</td><td>Go-Live后3个月（数据稳定后）</td><td>管理层需要L1-L3实时经营分析；Group Reporting提供合规报表，SAC提供管理视角；帆软BI老化</td></tr>\n<tr><td><strong>IBP 整合业务规划</strong></td><td>🟡 中</td><td>Go-Live后6个月（MRP运行稳定后）</td><td>库存周转目标75天后继续优化，MRP Live→IBP是下一级；销售预测准确率65%后向70%+冲刺</td></tr>\n<tr><td><strong>SuccessFactors HR</strong></td><td>🟡 中</td><td> >🔄 设计中</td></tr>\n<tr><td><strong>Phase F</strong></td><td>迁移计划·优先级矩阵·数据迁移策略·收益预测</td><td><strong>★6</strong></td><td>🔄 规划中</td></tr>\n<tr><td><strong>Phase G</strong></td><td>合规检查清单·Dispensation案例·月度AQR·架构合同</td><td>合同验收门槛</td><td>进行中</td></tr>\n<tr><td><strong>Phase H</strong></td><td>PESTLE监控·变更日志·二期商机论证</td><td>—</td><td>持续维护</td></tr>\n<tr><td><strong>RM</strong></td><td>需求目录（20条）·可追溯性矩阵</td><td><strong>★1（需求来源）</strong></td><td>持续维护</td></tr>\n</table></div>\n<h3 id=\"12-2-量化改善目标与现状对比\">12.2 量化改善目标与现状对比</h3>\n<div class=\"tbl\"><table>\n<tr><th>指标</th><th>AS-IS（2026年）</th><th>TO-BE目标</th><th>改善幅度</th><th>达成时间</th></tr>\n<tr><td>月结关账天数</td><td>7-8天</td><td><strong>≤3天</strong></td><td>-60%</td><td>Go-Live后第1月结</td></tr>\n<tr><td>应收账款周转天数</td><td>147天</td><td><strong>≤90天</strong></td><td>-39%</td><td>信用管理启用后6个月</td></tr>\n<tr><td>库存周转天数</td><td>99.6天</td><td><strong>≤75天</strong></td><td>-25%</td><td>MRP稳定运行后</td></tr>\n<tr><td>销售预测准确率</td><td>30-40%</td><td><strong>≥65%</strong></td><td>+25pp</td><td>Go-Live后12个月</td></tr>\n<tr><td>订单准时交付率</td><td>~60%</td><td><strong>≥85%</strong></td><td>+25pp</td><td>MRP+ATP稳定后</td></tr>\n<tr><td>数字化成熟度</td><td>L1.5/5</td><td><strong>L3.5/5</strong></td><td>+2级</td><td>2028年</td></tr>\n<tr><td>系统数量（ERP）</td><td>1（ECC）+ 18外围</td><td>1（S/4HANA）+ 12外围</td><td>减少6套</td><td>Go-Live</td></tr>\n<tr><td>集成接口</td><td>37个点对点</td><td>0个点对点，全部CPI</td><td>-100%</td><td>Go-Live</td></tr>\n<tr><td>泰国合规</td><td>无法记账</td><td>合规运营</td><td>从0到1</td><td>WP9完成</td></tr>\n</table></div>\n<h3 id=\"12-3-对-SAP-AE-的三大核心价值\">12.3 对 SAP AE 的三大核心价值</h3>\n<p><strong>价值1：TOGAF语言 → 评估远景数字交付质量</strong></p>\n<ul>\n<li>用&quot;四域架构视角&quot;检查每份交付物：业务架构是否有量化根因？数据架构是否覆盖MDG设计？技术架构是否说清楚PCE约束？</li>\n<li>用&quot;合规四级别&quot;标注每个架构决策：Conformant（完全符合）vs Compliant（轻微偏差）vs Non-Conformant（需要Dispensation）</li>\n</ul>\n<p><strong>价值2：付款里程碑 ↔ 架构质量门控</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>付款批次</th><th>金额</th><th>对应架构质量门控</th></tr>\n<tr><td>咨询期第1批（20%）</td><td>约约20%合同款</td><td>★1诊断报告+★3架构报告通过评审 = Phase B/C/D完成</td></tr>\n<tr><td>咨询期第2批（45%）</td><td>约约45%合同款</td><td>★6路线图最终验收 = Phase E/F完成</td></tr>\n<tr><td>实施期第1批（20%）</td><td>实施合同20%</td><td>蓝图评审签字 = Phase G架构合规门控</td></tr>\n<tr><td>实施期第2批（45%）</td><td>实施合同45%</td><td>项目验收（上线）= Go-Live通过所有合规检查</td></tr>\n<tr><td>尾款（咨询15%+实施15%）</td><td>总合同15%</td><td>上线稳定6个月 = Phase H持续监控达标</td></tr>\n</table></div>\n<p><strong>价值3：四个二期商机的架构触发条件</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>商机</th><th>触发时机</th><th>架构论证一句话</th></tr>\n<tr><td>GTS</td><td>Go-Live后3个月</td><td>DRC处理合规但GTS处理贸易合规（关税/出口管制），泰国+德国两个法人是明确需求</td></tr>\n<tr><td>SAC</td><td>Go-Live后3个月</td><td>Group Reporting提供合规视角，SAC提供管理视角，两者互补，当前帆软BI即将老化</td></tr>\n<tr><td>IBP</td><td>Go-Live后6个月</td><td>MRP达到65%准确率后，IBP的统计预测+约束优化可向75%+冲刺</td></tr>\n<tr><td>SuccessFactors</td><td>2028年</td><td>19法人HR数字化是应用架构最后一块缺口，人事管理系统到期是自然窗口</td></tr>\n</table></div>\n<h3 id=\"12-4-与华锐汽车案例横向对比\">12.4 与华锐汽车案例横向对比</h3>\n<div class=\"tbl\"><table>\n<tr><th>对比维度</th><th>华辉照明案例</th><th>华锐汽车案例（第9周）</th><th>关键启示</th></tr>\n<tr><td>行业</td><td>照明制造（LED/车灯/通用）</td><td>汽车零部件制造（Tier 1）</td><td>两者都是制造业，EA痛点高度相似</td></tr>\n<tr><td>项目预算</td><td><strong>约千万元级</strong>（含咨询+实施，偏紧）</td><td>8,500万元（纯实施，充裕）</td><td>华辉预算更紧，优先级排序更关键</td></tr>\n<tr><td>法人/基地数</td><td><strong>19家法人</strong>（含泰/德境外）</td><td>8个生产基地</td><td>华辉法人更多，治理复杂度更高</td></tr>\n<tr><td>ECC使用年限</td><td><strong>17年</strong>（2008上线）</td><td>11年</td><td>华辉Z程序积累更多，技术债更高</td></tr>\n<tr><td>核心痛点差异</td><td>主数据多头维护（7个写入点）</td><td>6套独立MES（无统一平台）</td><td>MDG都是第一优先级，但切入点不同</td></tr>\n<tr><td>海外合规</td><td>泰国（泰铢·税制）+ 德国（CBAM）</td><td>泰国+墨西哥（CBAM）</td><td>两个项目都面临CBAM挑战</td></tr>\n<tr><td>S/4HANA路径</td><td><strong>Greenfield全新实施</strong></td><td>Brownfield分阶段</td><td>华辉路径风险更高，数据迁移量更大</td></tr>\n<tr><td>架构治理</td><td>SI主导（远景数字）+ AE监督</td><td>CAE内部主导</td><td>AE需掌握TOGAF语言才能有效监督SI</td></tr>\n<tr><td>案例教学价值</td><td><strong>真实项目</strong>（访谈问卷/诊断报告为据）</td><td>综合案例（多文献改编）</td><td>华辉案例更贴近考试「真实企业场景题」</td></tr>\n</table></div>\n<hr>\n<p><em>文档版本：v1.0 | 更新日期：2026年6月 | 基于175条调研需求、18场访谈、7份管理层问卷及华辉诊断报告</em></p>\n<p><em>本案例是TOGAF Level 2 场景题的最佳练习材料：每个Phase都对应真实的企业决策场景</em></p>"}, "LA_11": {"type": "reading", "title": "📖 Phase H — PESTLE监控·三类变更·二期商机", "html": "<h3 id=\"H-1-PESTLE-外部变化监控\">H.1 PESTLE 外部变化监控</h3>\n<div class=\"tbl\"><table>\n<tr><th>维度</th><th>具体变化（华辉特有）</th><th>对架构影响</th><th>变更类型</th><th>紧迫程度</th></tr>\n<tr><td><strong>Legal（法律）</strong></td><td>中国金税四期全面推行（电子发票全面数字化）</td><td>DRC模块配置需跟进税务局升级节奏</td><td>类型2</td><td>高</td></tr>\n<tr><td><strong>Legal（法律）</strong></td><td><strong>欧盟CBAM碳边境税2026年正式落地</strong></td><td>德国FZ33需提交碳足迹数据（当前架构无此能力）</td><td><strong>类型3</strong></td><td><strong>极高</strong></td></tr>\n<tr><td><strong>Technology（技术）</strong></td><td>SAP S/4HANA PCE季度增强包强制推送</td><td>需建立季度回归测试流程，IT团队需适配新功能</td><td>类型1/2</td><td>中</td></tr>\n<tr><td><strong>Economic（经济）</strong></td><td>比亚迪要求供应商2027年完成数字化认证（车灯事业部）</td><td>QM模块需增加质量数字化报告输出能力</td><td>类型2</td><td>高</td></tr>\n<tr><td><strong>Legal（法律）</strong></td><td>泰国e-Tax Invoice系统升级（税务局API版本升级）</td><td>DRC泰国模块需跟进泰国税务局最新版本</td><td>类型1</td><td>中</td></tr>\n<tr><td><strong>Political（政治）</strong></td><td>控股集团整体数字化战略调整（可能变更共享系统要求）</td><td>FICO设计中控股方接口可能需要重设计</td><td>类型2</td><td>高</td></tr>\n<tr><td><strong>Technology（技术）</strong></td><td>SAP Joule AI助手集成S/4HANA（SAP官方发布）</td><td>可提升用户体验，可选择性引入（非强制）</td><td>类型1</td><td>低</td></tr>\n<tr><td><strong>Economic（经济）</strong></td><td>照明行业继续整合（潜在并购新法人）</td><td>需确保S/4HANA架构支持快速接入新法人</td><td>类型2</td><td>中</td></tr>\n</table></div>\n<h3 id=\"H-2-三类变更案例-华辉实际场景-\">H.2 三类变更案例（华辉实际场景）</h3>\n<p><strong>变更1（类型1—简化）：SAP PCE季度增强包 SP03 更新</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>SAP PCE推送2024.Q4增强包（SP03），修复Group Reporting合并报表的Bug</td></tr>\n<tr><td>分类</td><td>类型1：版本小更新，不改变架构方向，SAP标准维护</td></tr>\n<tr><td>处理流程</td><td>①刘建平审批→②DEV环境部署→③核心功能回归测试（2天）→④PRD环境推送</td></tr>\n<tr><td>用时</td><td>5个工作日（含测试）</td></tr>\n<tr><td>记录</td><td>更新Architecture Repository中的技术版本记录</td></tr>\n</table></div>\n<p><strong>变更2（类型2—增量）：比亚迪要求EDI直连（车灯事业部）</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>比亚迪2027年要求所有供应商开通EDI（850采购订单/856发货确认/810发票）；当前通过邮件和电话处理</td></tr>\n<tr><td>分类</td><td>类型2：在CPI架构框架内增加新集成能力，不改变整体架构方向</td></tr>\n<tr><td>处理流程</td><td>①启动简化ADM循环（Phase C应用架构更新）→②CPI增加EDI模块设计→③Board审批（涉及WP7增量工作）→④4周设计，12周实施</td></tr>\n<tr><td>架构更新</td><td>应用通信图增加EDI连接器；CPI接口清单新增INT-13</td></tr>\n<tr><td>成本</td><td>约50万元，纳入WP7变更申请</td></tr>\n</table></div>\n<p><strong>变更3（类型3—重新定义）：欧盟CBAM要求德国FZ33提交碳足迹报告</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>背景</td><td>欧盟CBAM 2026年正式落地，德国FZ33出口产品需要2026年底前提交精确到产品级的碳排放数据；当前架构完全无此能力</td></tr>\n<tr><td>分类</td><td><strong>类型3</strong>：需新增业务流程（碳核算流程）+ 新增数据实体（碳排放数据模型）+ 新增应用组件（碳追踪模块）+ 新增技术采集（供应商碳排放数据传输）</td></tr>\n<tr><td>处理流程</td><td>①触发新ADM循环（范围限定&quot;碳合规能力架构&quot;）→②Phase A：碳合规架构愿景→③Phase C/D：碳数据模型+应用方案设计→④Phase E：工作包（WP-CBAM）→⑤Board审批+张建国批准（额外投资）→⑥预计12周架构设计，20周实施</td></tr>\n<tr><td>影响</td><td>数据架构新增5个碳相关数据实体；应用架构新增CBAM合规模块（DRC扩展）；需引入供应商碳排放API；估算成本约200万元</td></tr>\n</table></div>\n<h3 id=\"H-3-二期商机-SAP-AE视角-\">H.3 二期商机（SAP AE视角）</h3>\n<div class=\"tbl\"><table>\n<tr><th>产品</th><th>优先级</th><th>架构触发时机</th><th>论证依据</th></tr>\n<tr><td><strong>GTS 全球贸易服务</strong></td><td>🔴 高</td><td>Go-Live后3个月（泰国/德国稳定后）</td><td>德国CBAM+泰国关税申报，DRC不能覆盖GTS全套功能；19法人跨境贸易合规风险</td></tr>\n<tr><td><strong>SAC 分析云（管理驾驶舱）</strong></td><td>🔴 高</td><td>Go-Live后3个月（数据稳定后）</td><td>管理层需要L1-L3实时经营分析；Group Reporting提供合规报表，SAC提供管理视角；帆软BI老化</td></tr>\n<tr><td><strong>IBP 整合业务规划</strong></td><td>🟡 中</td><td>Go-Live后6个月（MRP运行稳定后）</td><td>库存周转目标75天后继续优化，MRP Live→IBP是下一级；销售预测准确率65%后向70%+冲刺</td></tr>\n<tr><td><strong>SuccessFactors HR</strong></td><td>🟡 中</td><td>2028年（人事管理系统到期）</td><td>19法人HR数字化，海外（泰国/德国）员工合规；应用架构版图中HR是唯一未覆盖的核心域</td></tr>\n<tr><td><strong>GTS CBAM扩展</strong></td><td>🔴 高</td><td>2026年底前（强制截止）</td><td>欧盟CBAM是合规硬性要求，触发独立新ADM循环（WP-CBAM）</td></tr>\n</table></div>\n<h3 id=\"H-4-Phase-H-交付物清单\">H.4 Phase H 交付物清单</h3>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>状态</th></tr>\n<tr><td>Architecture Change Request Log（变更请求记录）</td><td>持续更新</td></tr>\n<tr><td>Architecture Updates（响应变更的架构文档更新）</td><td>持续更新</td></tr>\n<tr><td>PESTLE Analysis Report（季度更新）</td><td>季度发布</td></tr>\n<tr><td>Requirements Impact Assessment（类型2/3变更）</td><td>按需生成</td></tr>\n<tr><td>二期商机架构论证文档（GTS/SAC/IBP）</td><td>🔄 第一期结束时完成</td></tr>\n</table></div>\n<hr>\n<h2 id=\"第十一章-需求管理-Requirements-Management-\">第十一章：需求管理（Requirements Management）</h2>\n<h3 id=\"RM-1-需求目录-从175条精选20条核心需求-\">RM.1 需求目录（从175条精选20条核心需求）</h3>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>需求描述（华辉具体）</th><th>来源</th><th>类型</th><th>ADM Phase</th><th>优先级</th><th>状态</th></tr>\n<tr><td>REQ-001</td><td>月结关账从7-8天压缩至≤3天</td><td>王雪梅问卷A1</td><td>业务</td><td>Phase B/C/G</td><td>P1</td><td>✅架构设计完成</td></tr>\n<tr><td>REQ-002</td><td>物料主数据建立MDG单一写入点（消灭7个写入点）</td><td>175条调研-数据P1</td><td>数据</td><td>Phase C数据</td><td>P1</td><td>✅MDG方案确认</td></tr>\n<tr><td>REQ-003</td><td>泰国FZ40支持泰铢本位币和本地增值税7%</td><td>业务调研</td><td>合规</td><td>Phase C/D</td><td><strong>P1（最紧迫）</strong></td><td>🔄WP9规划中</td></tr>\n<tr><td>REQ-004</td><td>MRP正常运行，销售预测准确率≥65%</td><td>李明远问卷B1</td><td>业务</td><td>Phase B/C</td><td>P1</td><td>🔄WP5规划中</td></tr>\n<tr><td>REQ-005</td><td>信用管理启用，应收周转≤90天</td><td>王雪梅问卷C1</td><td>业务</td><td>Phase B/C</td><td>P1</td><td>🔄WP4规划中</td></tr>\n<tr><td>REQ-006</td><td>19法人集团合并报表自动化（Group Reporting）</td><td>王雪梅问卷D1</td><td>业务</td><td>Phase C应用</td><td>P1</td><td>🔄WP3规划中</td></tr>\n<tr><td>REQ-007</td><td>EBOM→MBOM通过PLM-CPI接口自动贯通（消除手工）</td><td>175条调研-流程P2</td><td>流程</td><td>Phase C应用</td><td>P1</td><td>🔄WP7规划中</td></tr>\n<tr><td>REQ-008</td><td>37个点对点接口全部迁至SAP CPI</td><td>IT架构原则IS-03</td><td>技术</td><td>Phase C/D</td><td>P1</td><td>🔄WP7规划中</td></tr>\n<tr><td>REQ-009</td><td>WMS库存实时同步（消除延迟，支持ATP）</td><td>175条调研-系统P2</td><td>技术</td><td>Phase C应用</td><td>P1</td><td>🔄WP7规划中</td></tr>\n<tr><td>REQ-010</td><td>利润中心启用，支撑事业部级P&amp;L /td><td>进行中</td></tr>\n<tr><td><strong>Phase H</strong></td><td>PESTLE监控·变更日志·二期商机论证</td><td>—</td><td>持续维护</td></tr>\n<tr><td><strong>RM</strong></td><td>需求目录（20条）·可追溯性矩阵</td><td><strong>★1（需求来源）</strong></td><td>持续维护</td></tr>\n</table></div>\n<h3 id=\"12-2-量化改善目标与现状对比\">12.2 量化改善目标与现状对比</h3>\n<div class=\"tbl\"><table>\n<tr><th>指标</th><th>AS-IS（2026年）</th><th>TO-BE目标</th><th>改善幅度</th><th>达成时间</th></tr>\n<tr><td>月结关账天数</td><td>7-8天</td><td><strong>≤3天</strong></td><td>-60%</td><td>Go-Live后第1月结</td></tr>\n<tr><td>应收账款周转天数</td><td>147天</td><td><strong>≤90天</strong></td><td>-39%</td><td>信用管理启用后6个月</td></tr>\n<tr><td>库存周转天数</td><td>99.6天</td><td><strong>≤75天</strong></td><td>-25%</td><td>MRP稳定运行后</td></tr>\n<tr><td>销售预测准确率</td><td>30-40%</td><td><strong>≥65%</strong></td><td>+25pp</td><td>Go-Live后12个月</td></tr>\n<tr><td>订单准时交付率</td><td>~60%</td><td><strong>≥85%</strong></td><td>+25pp</td><td>MRP+ATP稳定后</td></tr>\n<tr><td>数字化成熟度</td><td>L1.5/5</td><td><strong>L3.5/5</strong></td><td>+2级</td><td>2028年</td></tr>\n<tr><td>系统数量（ERP）</td><td>1（ECC）+ 18外围</td><td>1（S/4HANA）+ 12外围</td><td>减少6套</td><td>Go-Live</td></tr>\n<tr><td>集成接口</td><td>37个点对点</td><td>0个点对点，全部CPI</td><td>-100%</td><td>Go-Live</td></tr>\n<tr><td>泰国合规</td><td>无法记账</td><td>合规运营</td><td>从0到1</td><td>WP9完成</td></tr>\n</table></div>\n<h3 id=\"12-3-对-SAP-AE-的三大核心价值\">12.3 对 SAP AE 的三大核心价值</h3>\n<p><strong>价值1：TOGAF语言 → 评估远景数字交付质量</strong></p>\n<ul>\n<li>用&quot;四域架构视角&quot;检查每份交付物：业务架构是否有量化根因？数据架构是否覆盖MDG设计？技术架构是否说清楚PCE约束？</li>\n<li>用&quot;合规四级别&quot;标注每个架构决策：Conformant（完全符合）vs Compliant（轻微偏差）vs Non-Conformant（需要Dispensation）</li>\n</ul>\n<p><strong>价值2：付款里程碑 ↔ 架构质量门控</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>付款批次</th><th>金额</th><th>对应架构质量门控</th></tr>\n<tr><td>咨询期第1批（20%）</td><td>约约20%合同款</td><td>★1诊断报告+★3架构报告通过评审 = Phase B/C/D完成</td></tr>\n<tr><td>咨询期第2批（45%）</td><td>约约45%合同款</td><td>★6路线图最终验收 = Phase E/F完成</td></tr>\n<tr><td>实施期第1批（20%）</td><td>实施合同20%</td><td>蓝图评审签字 = Phase G架构合规门控</td></tr>\n<tr><td>实施期第2批（45%）</td><td>实施合同45%</td><td>项目验收（上线）= Go-Live通过所有合规检查</td></tr>\n<tr><td>尾款（咨询15%+实施15%）</td><td>总合同15%</td><td>上线稳定6个月 = Phase H持续监控达标</td></tr>\n</table></div>\n<p><strong>价值3：四个二期商机的架构触发条件</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>商机</th><th>触发时机</th><th>架构论证一句话</th></tr>\n<tr><td>GTS</td><td>Go-Live后3个月</td><td>DRC处理合规但GTS处理贸易合规（关税/出口管制），泰国+德国两个法人是明确需求</td></tr>\n<tr><td>SAC</td><td>Go-Live后3个月</td><td>Group Reporting提供合规视角，SAC提供管理视角，两者互补，当前帆软BI即将老化</td></tr>\n<tr><td>IBP</td><td>Go-Live后6个月</td><td>MRP达到65%准确率后，IBP的统计预测+约束优化可向75%+冲刺</td></tr>\n<tr><td>SuccessFactors</td><td>2028年</td><td>19法人HR数字化是应用架构最后一块缺口，人事管理系统到期是自然窗口</td></tr>\n</table></div>\n<h3 id=\"12-4-与华锐汽车案例横向对比\">12.4 与华锐汽车案例横向对比</h3>\n<div class=\"tbl\"><table>\n<tr><th>对比维度</th><th>华辉照明案例</th><th>华锐汽车案例（第9周）</th><th>关键启示</th></tr>\n<tr><td>行业</td><td>照明制造（LED/车灯/通用）</td><td>汽车零部件制造（Tier 1）</td><td>两者都是制造业，EA痛点高度相似</td></tr>\n<tr><td>项目预算</td><td><strong>约千万元级</strong>（含咨询+实施，偏紧）</td><td>8,500万元（纯实施，充裕）</td><td>华辉预算更紧，优先级排序更关键</td></tr>\n<tr><td>法人/基地数</td><td><strong>19家法人</strong>（含泰/德境外）</td><td>8个生产基地</td><td>华辉法人更多，治理复杂度更高</td></tr>\n<tr><td>ECC使用年限</td><td><strong>17年</strong>（2008上线）</td><td>11年</td><td>华辉Z程序积累更多，技术债更高</td></tr>\n<tr><td>核心痛点差异</td><td>主数据多头维护（7个写入点）</td><td>6套独立MES（无统一平台）</td><td>MDG都是第一优先级，但切入点不同</td></tr>\n<tr><td>海外合规</td><td>泰国（泰铢·税制）+ 德国（CBAM）</td><td>泰国+墨西哥（CBAM）</td><td>两个项目都面临CBAM挑战</td></tr>\n<tr><td>S/4HANA路径</td><td><strong>Greenfield全新实施</strong></td><td>Brownfield分阶段</td><td>华辉路径风险更高，数据迁移量更大</td></tr>\n<tr><td>架构治理</td><td>SI主导（远景数字）+ AE监督</td><td>CAE内部主导</td><td>AE需掌握TOGAF语言才能有效监督SI</td></tr>\n<tr><td>案例教学价值</td><td><strong>真实项目</strong>（访谈问卷/诊断报告为据）</td><td>综合案例（多文献改编）</td><td>华辉案例更贴近考试「真实企业场景题」</td></tr>\n</table></div>\n<hr>\n<p><em>文档版本：v1.0 | 更新日期：2026年6月 | 基于175条调研需求、18场访谈、7份管理层问卷及华辉诊断报告</em></p>\n<p><em>本案例是TOGAF Level 2 场景题的最佳练习材料：每个Phase都对应真实的企业决策场景</em></p>"}, "LA_12": {"type": "reading", "title": "📖 需求管理·量化成果·付款节点与架构质量对应", "html": "<h3 id=\"RM-1-需求目录-从175条精选20条核心需求-\">RM.1 需求目录（从175条精选20条核心需求）</h3>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>需求描述（华辉具体）</th><th>来源</th><th>类型</th><th>ADM Phase</th><th>优先级</th><th>状态</th></tr>\n<tr><td>REQ-001</td><td>月结关账从7-8天压缩至≤3天</td><td>王雪梅问卷A1</td><td>业务</td><td>Phase B/C/G</td><td>P1</td><td>✅架构设计完成</td></tr>\n<tr><td>REQ-002</td><td>物料主数据建立MDG单一写入点（消灭7个写入点）</td><td>175条调研-数据P1</td><td>数据</td><td>Phase C数据</td><td>P1</td><td>✅MDG方案确认</td></tr>\n<tr><td>REQ-003</td><td>泰国FZ40支持泰铢本位币和本地增值税7%</td><td>业务调研</td><td>合规</td><td>Phase C/D</td><td><strong>P1（最紧迫）</strong></td><td>🔄WP9规划中</td></tr>\n<tr><td>REQ-004</td><td>MRP正常运行，销售预测准确率≥65%</td><td>李明远问卷B1</td><td>业务</td><td>Phase B/C</td><td>P1</td><td>🔄WP5规划中</td></tr>\n<tr><td>REQ-005</td><td>信用管理启用，应收周转≤90天</td><td>王雪梅问卷C1</td><td>业务</td><td>Phase B/C</td><td>P1</td><td>🔄WP4规划中</td></tr>\n<tr><td>REQ-006</td><td>19法人集团合并报表自动化（Group Reporting）</td><td>王雪梅问卷D1</td><td>业务</td><td>Phase C应用</td><td>P1</td><td>🔄WP3规划中</td></tr>\n<tr><td>REQ-007</td><td>EBOM→MBOM通过PLM-CPI接口自动贯通（消除手工）</td><td>175条调研-流程P2</td><td>流程</td><td>Phase C应用</td><td>P1</td><td>🔄WP7规划中</td></tr>\n<tr><td>REQ-008</td><td>37个点对点接口全部迁至SAP CPI</td><td>IT架构原则IS-03</td><td>技术</td><td>Phase C/D</td><td>P1</td><td>🔄WP7规划中</td></tr>\n<tr><td>REQ-009</td><td>WMS库存实时同步（消除延迟，支持ATP）</td><td>175条调研-系统P2</td><td>技术</td><td>Phase C应用</td><td>P1</td><td>🔄WP7规划中</td></tr>\n<tr><td>REQ-010</td><td>利润中心启用，支撑事业部级P&amp;L分析</td><td>李明远问卷A3</td><td>业务</td><td>Phase B/C</td><td>P1</td><td>🔄WP3规划中</td></tr>\n<tr><td>REQ-011</td><td>成本核算精细化（Material Ledger实际成本）</td><td>王雪梅问卷B1</td><td>业务</td><td>Phase C数据</td><td>P2</td><td>🔄WP3规划中</td></tr>\n<tr><td>REQ-012</td><td>WM升级至EWM（批次追溯·移动端·先进先出）</td><td>175条调研-系统P2</td><td>业务</td><td>Phase C应用</td><td>P2</td><td>🔄WP6规划中</td></tr>\n<tr><td>REQ-013</td><td>DRC中国增值税电子发票全覆盖（金税四期）</td><td>175条调研-合规</td><td>合规</td><td>Phase C/D</td><td>P1</td><td>🔄WP8规划中</td></tr>\n<tr><td>REQ-014</td><td>系统可用性≥99.9%（8.7小时/年停机预算）</td><td>技术架构原则TP-02</td><td>技术</td><td>Phase D</td><td>P1</td><td>✅PCE SLA保障</td></tr>\n<tr><td>REQ-015</td><td>德国FZ33 CBAM碳报告能力（2026年底前）</td><td>法规变化</td><td>合规</td><td>Phase C/D（新ADM）</td><td><strong>P1（新增）</strong></td><td>🔄 新ADM循环</td></tr>\n<tr><td>REQ-016</td><td>库存周转天数从99.6天降至≤75天</td><td>李明远问卷B1</td><td>业务</td><td>Phase B/E</td><td>P1</td><td>🔄WP5/WP6</td></tr>\n<tr><td>REQ-017</td><td>SRM接口尾差消除，实现供应商正常清账</td><td>175条调研-系统P2</td><td>技术</td><td>Phase C应用</td><td>P2</td><td>🔄WP7规划中</td></tr>\n<tr><td>REQ-018</td><td>海辉公司从用友U8迁移至S/4HANA PS模块</td><td>业务调研</td><td>业务</td><td>Phase B/C</td><td>P2</td><td>🔄有条件Dispensation</td></tr>\n<tr><td>REQ-019</td><td>二期扩展：SAC管理驾驶舱（L1-L3三层）</td><td>孙志强/管理层</td><td>业务</td><td>Phase E→二期</td><td>P3</td><td>规划中（二期）</td></tr>\n<tr><td>REQ-020</td><td>二期扩展：GTS全球贸易服务（泰国/德国）</td><td>SAP AE商机</td><td>业务</td><td>二期</td><td>P3</td><td>商机论证中</td></tr>\n</table></div>"}};
const QUIZ    = [{"num": "Q1", "star": true, "q": "TOGAF 是由哪个组织发布和维护的？", "opts": {"A": "ISO（国际标准化组织）", "B": "The Open Group", "C": "ITIL Foundation", "D": "Gartner"}, "ans": "B", "exp": "TOGAF 由 The Open Group 发布，这是一个技术中立的行业联盟。The Open Group 同时负责 TOGAF 认证考试。ISO 是国际标准化组织（发布如 ISO 42010），ITIL 是服务管理框架，Gartner 是调研机构，均非 TOGAF 发布方。", "topic": "t1"}, {"num": "Q2", "star": true, "q": "TOGAF 的全称是什么？", "opts": {"A": "Technical Open Group Architecture Framework", "B": "The Open Group Architecture Framework", "C": "Technology Operations Governance and Architecture Framework", "D": "Total Organizational Goals and Architecture Framework"}, "ans": "B", "exp": "TOGAF = The Open Group Architecture Framework，这是考试必背的全称。选项A、C、D均为干扰项，请注意\"The\"是组织名称的一部分，不是冠词。", "topic": "t1"}, {"num": "Q3", "star": false, "q": "TOGAF Standard 10 相比 9.2 版本的最主要变化是什么？", "opts": {"A": "删除了 ADM，改用敏捷方法", "B": "将内容重组为 TOGAF Fundamental Content 和 TOGAF Series Guides", "C": "增加了 Phase I 和 Phase J 两个新阶段", "D": "将四大架构域减少为三大域"}, "ans": "B", "exp": "TOGAF 10 的核心变化是将内容重构为两大部分：TOGAF Fundamental Content（基础内容，包括ADM核心概念）和 TOGAF Series Guides（系列指南，包括安全架构、Agile适配等专题）。ADM 在 10 中依然完整保留，架构域仍为四大域。", "topic": "t1"}, {"num": "Q4", "star": true, "q": "企业架构（Enterprise Architecture）的主要目的是什么？", "opts": {"A": "专门管理 IT 基础设施的部署", "B": "帮助企业实现业务目标与 IT 能力的对齐", "C": "仅关注应用软件的开发流程", "D": "替代项目管理框架（如 PRINCE2）"}, "ans": "B", "exp": "EA 的核心价值是将业务战略与 IT 能力对齐（Business-IT Alignment）。EA 不仅限于 IT，也不替代 PM 方法论。TOGAF 明确指出 EA 需要业务架构、应用架构、数据架构、技术架构四域协同，目标是支撑业务目标实现。", "topic": "t1"}, {"num": "Q5", "star": false, "q": "TOGAF ADM 中，哪个说法最准确地描述了架构开发的性质？", "opts": {"A": "ADM 是线性的、一次性的过程，从 Phase A 执行到 Phase H 即完成", "B": "ADM 是迭代的、循环的方法，可以在阶段间和循环间反复进行", "C": "ADM 只能按照规定顺序执行，不允许跳过阶段", "D": "ADM 在每个项目中只能执行一次"}, "ans": "B", "exp": "ADM 的核心特性是迭代性（Iterative）和循环性（Cyclic）。TOGAF 明确说明 ADM 可以在阶段内、阶段间、以及整个 ADM 循环层面进行迭代。架构可以分层次（战略/段/能力/项目）进行，每层触发新的ADM循环。", "topic": "t1"}, {"num": "Q6", "star": true, "q": "下列哪四个域构成了 TOGAF 的企业架构描述？", "opts": {"A": "Strategy / Operations / Technology / Security", "B": "Business / Application / Data / Technology", "C": "People / Process / Technology / Governance", "D": "Finance / Marketing / IT / Operations"}, "ans": "B", "exp": "TOGAF 的四大架构域（BADT）：Business Architecture（业务架构）、Application Architecture（应用架构）、Data Architecture（数据架构）、Technology Architecture（技术架构）。记忆口诀：BDAT 或 BADT。注意 Application 和 Data 同属 Information Systems Architecture（信息系统架构）域。", "topic": "t1"}, {"num": "Q7", "star": false, "q": "TOGAF 适合以下哪类组织使用？", "opts": {"A": "只适用于大型跨国企业", "B": "只适用于 IT 公司", "C": "可被任何规模和行业的组织使用，但需要针对自身情况适配", "D": "只适用于政府机构和公共部门"}, "ans": "C", "exp": "TOGAF 是通用的企业架构框架，设计上就考虑了可适配性（Adaptability）。Preliminary Phase 的核心工作之一就是\"定制 ADM 以适应组织需要\"。小到 SME，大到跨国集团均可使用，但需要根据规模和行业特点进行合理裁剪。", "topic": "t1"}, {"num": "Q8", "star": false, "q": "TOGAF 的哪个组成部分提供了一个通用的技术标准参考模型？", "opts": {"A": "Architecture Vision", "B": "Architecture Repository", "C": "Technical Reference Model（TRM）", "D": "Architecture Roadmap"}, "ans": "C", "exp": "TRM（Technical Reference Model，技术参考模型）是 TOGAF Foundation Architecture 的一部分，提供了一个通用的技术标准分类体系，帮助组织选择符合标准的技术组件。另一个基础参考模型是 III-RM（Integrated Information Infrastructure Reference Model）。", "topic": "t1"}, {"num": "Q9", "star": true, "q": "TOGAF ADM 中，Preliminary Phase 的主要目的是什么？", "opts": {"A": "定义目标架构的愿景", "B": "建立架构能力（Architecture Capability），定制 ADM，制定架构原则", "C": "执行差距分析（Gap Analysis）", "D": "创建实施和迁移计划"}, "ans": "B", "exp": "Preliminary Phase 是在正式启动 ADM 之前的准备阶段。其核心工作是：建立架构团队和治理框架（Architecture Board）、定制 ADM 以适应组织、制定架构原则。Preliminary 不属于 A-H 任何一个字母阶段，它是所有 Phase 的\"地基\"。", "topic": "t2"}, {"num": "Q10", "star": true, "q": "在 ADM 的 Phase A（Architecture Vision）中，第一步通常是什么？", "opts": {"A": "开始开发目标架构", "B": "确认和扩充架构原则，建立架构项目", "C": "执行差距分析", "D": "制定迁移计划"}, "ans": "B", "exp": "Phase A 的第一步是\"确认架构项目的启动\"，包括：确认请求（Request for Architecture Work）的范围和约束、确认利益相关者、明确架构愿景的范围。差距分析在 Phase B/C/D 执行，迁移计划在 Phase F。", "topic": "t2"}, {"num": "Q11", "star": true, "q": "Architecture Vision（架构愿景文档）是哪个 Phase 的关键输出？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase F"}, "ans": "B", "exp": "Architecture Vision 是 Phase A 的核心交付物，包括：项目范围定义、利益相关者关切、高层架构描述、约束条件。它为后续所有 Phase 提供方向，是整个 ADM 循环的起点文件。", "topic": "t2"}, {"num": "Q12", "star": false, "q": "在 Phase B（Business Architecture）中，架构师需要开发什么？", "opts": {"A": "应用组合图", "B": "业务架构的当前状态（Baseline）和目标状态（Target）", "C": "技术组件清单", "D": "数据迁移方案"}, "ans": "B", "exp": "Phase B 关注业务架构，核心工作是：描述 Baseline Business Architecture（当前状态）和 Target Business Architecture（目标状态），并执行 Gap Analysis。业务架构包含：业务功能、业务流程、组织结构、业务角色和业务服务。", "topic": "t2"}, {"num": "Q13", "star": true, "q": "Phase C（信息系统架构）包含哪两个子域，且正确的开发顺序是什么？", "opts": {"A": "Application Architecture，然后 Data Architecture", "B": "Data Architecture，然后 Application Architecture", "C": "两个子域同时并行开发", "D": "Phase C 只包含 Application Architecture，Data Architecture 属于 Phase B"}, "ans": "B", "exp": "Phase C 包含 Data Architecture 和 Application Architecture 两个子域，TOGAF 推荐先开发 Data Architecture，再开发 Application Architecture。原因：应用程序是数据的载体和处理器，数据架构确定后才能明确应用需要处理什么数据，从而定义应用功能边界。这是 Level 1 高频陷阱题。", "topic": "t2"}, {"num": "Q14", "star": false, "q": "Phase D（Technology Architecture）的主要工作是什么？", "opts": {"A": "定义组织的业务流程", "B": "将逻辑应用组件映射到具体技术组件，定义技术标准", "C": "分析差距并制定过渡架构", "D": "管理架构变更请求"}, "ans": "B", "exp": "Phase D 是将前几个 Phase 定义的逻辑架构落地到技术层面的阶段。主要工作包括：识别技术平台候选方案、应用 TRM（技术参考模型）、定义技术标准和规范。Phase E 才是差距分析和过渡架构，Phase H 是变更管理。", "topic": "t2"}, {"num": "Q15", "star": true, "q": "Phase E（Opportunities and Solutions）的核心目标是什么？", "opts": {"A": "批准最终的目标架构", "B": "从目标架构推导出实施方案，定义工作包（Work Package）和过渡架构", "C": "完成技术架构的详细设计", "D": "监控已实施架构的合规性"}, "ans": "B", "exp": "Phase E 是从\"架构\"到\"实施\"的桥梁。在这里，架构师综合前面 Phase B/C/D 的差距分析结果，确定具体的工作包（Work Package）、定义过渡架构（Transition Architecture）、并评估初步的实施路径。", "topic": "t2"}, {"num": "Q16", "star": false, "q": "在 TOGAF ADM 中，Phase F（Migration Planning）主要关注什么？", "opts": {"A": "定义目标技术架构", "B": "制定详细的实施和迁移计划，对工作包进行优先级排序", "C": "建立架构治理委员会", "D": "识别新的业务机会"}, "ans": "B", "exp": "Phase F 将 Phase E 识别的工作包细化为具体的实施和迁移计划。关键工作：成本效益分析、风险评估、优先级排序、资源规划。Phase F 的产物是可执行的迁移计划。", "topic": "t2"}, {"num": "Q17", "star": true, "q": "Phase G（Implementation Governance）的主要职责是什么？", "opts": {"A": "开发应用架构", "B": "监督项目实施确保与架构规格一致，处理架构合规请求", "C": "制定架构路线图", "D": "执行差距分析"}, "ans": "B", "exp": "Phase G 是架构实施阶段的治理监督。架构团队在这个阶段：监督实施项目是否符合批准的架构、处理架构偏差（Architecture Dispensation）请求、进行架构合规评审（Architecture Compliance Review）。", "topic": "t2"}, {"num": "Q18", "star": false, "q": "下列哪项陈述最准确地描述了 Phase H（Architecture Change Management）的目的？", "opts": {"A": "创建新的目标架构", "B": "维护架构的生命力，管理对已批准架构的变更，确定何时需要启动新的 ADM 循环", "C": "开发迁移计划", "D": "执行技术架构审查"}, "ans": "B", "exp": "Phase H 是架构正式上线后的持续管理阶段。架构就像一个活的文档，需要响应外部环境变化（技术进步、业务战略调整、法规变化）。Phase H 负责评估这些变化、判断变更影响级别，并在必要时触发新一轮 ADM 循环。", "topic": "t2"}, {"num": "Q19", "star": true, "q": "关于\"需求管理\"（Requirements Management），下列哪项说法正确？", "opts": {"A": "需求管理是 ADM 中位于 Phase A 和 Phase B 之间的独立阶段", "B": "需求管理是一个持续进行的过程，贯穿所有 ADM Phase，不是独立的阶段", "C": "需求管理只在 Phase A 和 Phase F 中执行", "D": "需求管理由 Phase H 负责统一管理"}, "ans": "B", "exp": "这是 Level 1 高频陷阱！需求管理（Requirements Management）位于 ADM 图的中心圆圈，表示它持续贯穿所有 Phase，而不是一个独立的阶段（它没有字母编号）。它的职能是：存储需求、评估变更对当前 Phase 的影响、将需求传递给相关 Phase。", "topic": "t2"}, {"num": "Q20", "star": false, "q": "以下哪个是 Phase A 的关键输入？", "opts": {"A": "Baseline Business Architecture", "B": "Request for Architecture Work（架构工作请求）", "C": "Migration Plan", "D": "Technology Architecture"}, "ans": "B", "exp": "Request for Architecture Work 是触发整个 ADM 循环的关键文件，它由赞助组织（通常是管理层）发出，定义了架构项目的范围、约束和资源授权。它是 Phase A 的主要输入之一。Baseline Business Architecture 是 Phase B 的输入，Migration Plan 是 Phase F 的输出。", "topic": "t2"}, {"num": "Q21", "star": false, "q": "在 Phase B 中，\"业务架构\"的主要描述对象是什么？", "opts": {"A": "应用程序和数据库", "B": "服务器和网络设备", "C": "业务功能、业务流程、组织结构、业务角色", "D": "数据迁移方案"}, "ans": "C", "exp": "业务架构（Business Architecture）描述的是业务层面的能力和结构，包括：业务功能（Business Function）、业务流程（Business Process）、组织结构（Organization）、业务角色（Business Role）、业务服务（Business Service）。这与应用、数据、技术架构明确区分。", "topic": "t2"}, {"num": "Q22", "star": true, "q": "Statement of Architecture Work（架构工作说明书）是哪个阶段的关键交付物？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase G"}, "ans": "B", "exp": "Statement of Architecture Work 是 Phase A 的核心输出，它是正式的项目授权文件，定义了本次架构项目的范围、方法、资源、时间表，相当于架构团队的工作授权书。不要与 Architecture Vision 文档混淆：Architecture Vision 描述目标方向，Statement of Architecture Work 是工作授权。", "topic": "t2"}, {"num": "Q23", "star": false, "q": "在 Phase E 中，Work Package（工作包）包含哪些核心要素？", "opts": {"A": "只包含时间和成本", "B": "项目名称、项目描述、所包含的变更、所影响的 Building Block、依赖关系", "C": "只包含技术实施细节", "D": "业务需求文档"}, "ans": "B", "exp": "Work Package 是 Phase E 定义的可实施单元，包含：工作包名称和描述、所实现的目标架构要素、涉及的 Building Blocks、与其他工作包的依赖关系、优先级。多个工作包按依赖排序后形成 Architecture Roadmap。", "topic": "t2"}, {"num": "Q24", "star": false, "q": "Phase G 中，\"Architecture Dispensation\"（架构特许/豁免）是指什么？", "opts": {"A": "完全批准的架构变更", "B": "对特定项目或情况，暂时允许偏离已批准架构的正式授权", "C": "取消整个架构项目", "D": "新增架构原则"}, "ans": "B", "exp": "在实施过程中，有时项目因为现实约束（时间/成本/技术）无法完全符合批准的架构。Architecture Dispensation 是 Architecture Board 给予的正式豁免，允许特定范围内的偏差，但需要记录理由并设定恢复期限。", "topic": "t2"}, {"num": "Q25", "star": true, "q": "Phase H 中，变更的\"类型\"分类主要目的是什么？", "opts": {"A": "确定谁负责实施变更", "B": "判断变更的影响级别，以确定是否需要启动新的完整 ADM 循环", "C": "计算变更的成本", "D": "为变更撰写技术文档"}, "ans": "B", "exp": "TOGAF 将架构变更分为三类：类型1（简化/精化，不影响架构方向）→ 直接更新架构文档；类型2（增量/演进）→ 触发新的 ADM 循环（简化版）；类型3（重新定义/颠覆性变化）→ 触发全面的新 ADM 循环。判断变更类型是 Phase H 的核心工作。", "topic": "t2"}, {"num": "Q26", "star": false, "q": "下列哪项不是 Preliminary Phase 的典型输出？", "opts": {"A": "定制后的 ADM（Tailored ADM）", "B": "架构原则（Architecture Principles）", "C": "目标业务架构（Target Business Architecture）", "D": "架构治理框架（Architecture Governance Framework）"}, "ans": "C", "exp": "目标业务架构是 Phase B 的输出，不是 Preliminary Phase 的产物。Preliminary Phase 的输出包括：定制 ADM、架构原则、架构治理框架、架构工具设置、Architecture Repository 初始化。", "topic": "t2"}, {"num": "Q27", "star": false, "q": "在 ADM 循环中，哪个 Phase 最终产生\"架构定义文档\"（Architecture Definition Document）？", "opts": {"A": "Phase A", "B": "Preliminary Phase", "C": "Phase B/C/D 综合产生", "D": "Phase G"}, "ans": "C", "exp": "Architecture Definition Document（架构定义文档）是 Phase B、C、D 的综合交付物，包含业务架构、信息系统架构（数据+应用）、技术架构的当前状态和目标状态描述，以及差距分析结果。这个文档在 Phase E 作为关键输入使用。", "topic": "t2"}, {"num": "Q28", "star": false, "q": "Phase F 中，确定工作包优先级时应考虑哪些因素？", "opts": {"A": "只考虑成本高低", "B": "依赖关系、业务价值、风险、资源可用性、战略合规性等多维度因素", "C": "只考虑技术难度", "D": "只考虑领导层偏好"}, "ans": "B", "exp": "Phase F 的优先级排序是多维度的，TOGAF 建议考虑：工作包之间的依赖关系（先决条件）、对业务价值的贡献度、实施风险、资源可用性、与战略目标的对齐度。单一维度排序会导致高价值项目被低价值但低成本项目推后。", "topic": "t2"}, {"num": "Q29", "star": false, "q": "Architecture Roadmap（架构路线图）和 Migration Plan（迁移计划）有什么核心区别？", "opts": {"A": "两者完全相同，只是不同 Phase 的叫法", "B": "Architecture Roadmap 是高层次的时间线（展示从当前到目标的演进路径），Migration Plan 是可执行的详细实施计划", "C": "Migration Plan 是架构层级的，Architecture Roadmap 是项目层级的", "D": "Architecture Roadmap 只用于技术架构"}, "ans": "B", "exp": "Architecture Roadmap 在 Phase E 形成，展示工作包的高层次时间线，是战略性的；Migration Plan 在 Phase F 形成，包含详细的实施步骤、资源分配、时间节点，是可执行的。Roadmap 是蓝图，Migration Plan 是施工图。", "topic": "t2"}, {"num": "Q30", "star": false, "q": "完整的 ADM 循环包括多少个带字母编号的 Phase（不含 Preliminary 和需求管理）？", "opts": {"A": "6个", "B": "7个", "C": "8个", "D": "9个"}, "ans": "C", "exp": "ADM 有 8 个字母 Phase：A（Architecture Vision）、B（Business Architecture）、C（Information Systems Architecture）、D（Technology Architecture）、E（Opportunities & Solutions）、F（Migration Planning）、G（Implementation Governance）、H（Architecture Change Management）。加上 Preliminary Phase 和持续的 Requirements Management，共 10 个组成部分。", "topic": "t2"}, {"num": "Q31", "star": false, "q": "在 Phase A 中，完成利益相关者分析的主要目的是什么？", "opts": {"A": "确定项目预算", "B": "识别各方关切（Concern），确保目标架构能够回应所有关键利益相关者的关切", "C": "分配项目团队成员", "D": "确定技术平台选型"}, "ans": "B", "exp": "利益相关者分析是 Phase A 的关键活动，目的是：识别谁受到架构影响（利益相关者）、他们各自的关切（Concern）是什么、如何用架构视图（View）回应这些关切。这是构建 Architecture Vision 文档的基础。", "topic": "t2"}, {"num": "Q32", "star": false, "q": "关于 Phase C 中数据架构和应用架构的关系，以下哪个说法正确？", "opts": {"A": "两者完全独立，可以并行开发", "B": "数据架构的逻辑数据组件映射到应用架构的逻辑应用组件", "C": "应用架构决定数据架构", "D": "两者都由技术架构（Phase D）决定"}, "ans": "B", "exp": "在 Phase C 中，数据架构定义了需要管理的数据实体和关系（逻辑数据模型），这些数据组件随后在应用架构中被映射到负责处理/管理它们的应用组件上。应用程序\"服务于\"数据，而不是反过来，这就是为什么数据架构先于应用架构。", "topic": "t2"}, {"num": "Q33", "star": false, "q": "以下哪个活动属于 Phase B 但不属于 Phase D？", "opts": {"A": "差距分析（Gap Analysis）", "B": "利益相关者视图开发", "C": "业务流程建模", "D": "目标架构定义"}, "ans": "C", "exp": "业务流程建模（Business Process Modeling）是业务架构（Phase B）特有的活动，关注人、组织、流程的协作方式。Phase D（技术架构）关注的是技术平台和技术服务，不涉及业务流程。差距分析和目标架构定义在所有 Phase 中都有。", "topic": "t2"}, {"num": "Q34", "star": true, "q": "TOGAF 中，Artifact（制品）、Deliverable（交付物）、Building Block（构建块）的核心区别是什么？", "opts": {"A": "三者没有区别，只是翻译不同", "B": "Artifact 是架构工作产品；Deliverable 是正式提交审查/签字的文档；Building Block 是可重用的架构组件", "C": "Deliverable 是内部使用的，Artifact 是外部提交的", "D": "Building Block 只用于技术架构"}, "ans": "B", "exp": "三者区别是高频考点：Artifact（制品）是架构开发过程中产生的具体工作产品，如图表、目录、矩阵，可以是非正式的；Deliverable（交付物）是正式的、需要经过审批签字的文件，如 Architecture Vision 文档、Architecture Definition Document；Building Block（构建块）是可重用的架构组件，分为 ABB（Architecture Building Block，抽象）和 SBB（Solution Building Block，具体实现）。", "topic": "t3"}, {"num": "Q35", "star": true, "q": "TOGAF 的制品（Artifacts）分为哪三类？", "opts": {"A": "Policies / Procedures / Guidelines", "B": "Catalogs / Matrices / Diagrams", "C": "Models / Views / Viewpoints", "D": "Input / Output / Deliverable"}, "ans": "B", "exp": "TOGAF 制品三类型：Catalogs（目录，如应用目录、数据实体目录）、Matrices（矩阵，如应用/数据矩阵、业务交互矩阵）、Diagrams（图表，如业务流程图、应用通信图、技术架构图）。这三类制品覆盖了从\"列举\"到\"关系\"到\"可视化\"的不同需求。", "topic": "t3"}, {"num": "Q36", "star": false, "q": "ABB（Architecture Building Block）和 SBB（Solution Building Block）的核心区别是什么？", "opts": {"A": "ABB 用于技术架构，SBB 用于业务架构", "B": "ABB 是抽象的架构规格（描述需要什么），SBB 是具体的实现方案（描述如何实现）", "C": "ABB 在目标架构中使用，SBB 在当前架构中使用", "D": "两者完全相同，只是叫法不同"}, "ans": "B", "exp": "ABB（Architecture Building Block）是抽象的、技术无关的描述，定义架构\"应该能做什么\"（功能和接口规格）；SBB（Solution Building Block）是具体的实现，描述\"用什么来实现\"（具体产品、系统、服务）。例如：ABB = \"邮件服务\"，SBB = \"Microsoft Exchange Server 2019\"。", "topic": "t3"}, {"num": "Q37", "star": true, "q": "以下哪个是 Deliverable（交付物）而非 Artifact（制品）？", "opts": {"A": "Business Capability Map（业务能力图）", "B": "Application Communication Diagram（应用通信图）", "C": "Architecture Vision Document（架构愿景文档）", "D": "Data Entity/Data Component Catalog（数据实体目录）"}, "ans": "C", "exp": "Architecture Vision Document 是正式的交付物，需要经过审批和签字，是 Phase A 的核心输出，对外提交给赞助方。其余三个选项（业务能力图、应用通信图、数据实体目录）都是制品（Artifacts），是架构开发过程中的工作产品，不一定需要正式签字。", "topic": "t3"}, {"num": "Q38", "star": false, "q": "Architecture Repository（架构库）中存储哪些类型的内容？", "opts": {"A": "只存储已完成的架构文档", "B": "架构元模型、参考库、标准信息库、治理日志、架构景观、解决方案库", "C": "只存储 Building Blocks", "D": "只存储历史架构版本"}, "ans": "B", "exp": "TOGAF 定义 Architecture Repository 包含六类内容：① Architecture Metamodel（架构元模型）② Architecture Capability（架构能力）③ Architecture Landscape（架构景观，含当前/过渡/目标架构）④ Standards Information Base（标准信息库）⑤ Reference Library（参考库）⑥ Governance Log（治理日志）。", "topic": "t3"}, {"num": "Q39", "star": false, "q": "View（视图）和 Viewpoint（视点）的关系是什么？", "opts": {"A": "两者完全相同，都是利益相关者看到的内容", "B": "Viewpoint 是模板（定义如何描述），View 是基于 Viewpoint 针对特定系统生成的实例", "C": "View 是模板，Viewpoint 是实例", "D": "Viewpoint 只用于技术架构，View 用于所有架构域"}, "ans": "B", "exp": "Viewpoint（视点）是一种模板或规则，定义了特定关注点应该如何被描述（包含哪些元素、使用什么符号）；View（视图）是将这个模板应用到具体系统后生成的实际描述。比喻：Viewpoint = 相机型号和拍摄规则；View = 用这台相机拍出来的具体照片。", "topic": "t3"}, {"num": "Q40", "star": false, "q": "Architecture Landscape（架构景观）包含哪三个级别？", "opts": {"A": "Strategic / Tactical / Operational", "B": "Strategic / Segment / Capability", "C": "Foundation / Industry / Enterprise", "D": "Current / Transition / Target"}, "ans": "B", "exp": "Architecture Landscape 有三个级别：① Strategic Architecture（战略架构，整个企业的高层次视图）② Segment Architecture（段架构，业务线/部门级别的详细视图）③ Capability Architecture（能力架构，特定能力的专项架构）。这与 Architecture Continuum 的四层次不同，请注意区分。", "topic": "t3"}, {"num": "Q41", "star": false, "q": "下列哪项不属于 Architecture Content Framework 的范畴？", "opts": {"A": "制品（Artifacts）的分类", "B": "架构交付物（Deliverables）的定义", "C": "建筑构建块（Building Blocks）的描述", "D": "架构师的薪资标准"}, "ans": "D", "exp": "Architecture Content Framework 定义了架构工作产品的结构和分类，包括：制品（Artifacts，分为目录/矩阵/图表）、交付物（Deliverables）、构建块（Building Blocks，包括 ABB 和 SBB）。它是 TOGAF 关于\"架构产出物应该是什么\"的规范框架。薪资标准显然不在其范畴内。", "topic": "t3"}, {"num": "Q42", "star": true, "q": "Enterprise Continuum（企业连续体）从左到右的四个层次顺序是什么？", "opts": {"A": "Organization-Specific → Industry → Common Systems → Foundation", "B": "Foundation → Common Systems → Industry → Organization-Specific", "C": "Generic → Specific → Industry → Enterprise", "D": "Tactical → Strategic → Operational → Governance"}, "ans": "B", "exp": "Enterprise Continuum 从左到右，越来越具体（Generic → Specific）：Foundation Architecture（基础架构，最通用，如 TOGAF TRM）→ Common Systems Architecture（通用系统架构，跨行业通用，如安全架构模式）→ Industry Architecture（行业架构，如制造业参考架构）→ Organization-Specific Architecture（组织专有架构，最具体）。方向：从抽象到具体，从通用到专有。", "topic": "t4"}, {"num": "Q43", "star": false, "q": "TOGAF 中，TRM（Technical Reference Model）的主要用途是什么？", "opts": {"A": "定义业务流程的标准模板", "B": "提供技术服务和技术标准的通用分类框架，作为技术架构开发的参考", "C": "管理架构项目的时间线", "D": "定义应用系统之间的集成标准"}, "ans": "B", "exp": "TRM 是 TOGAF Foundation Architecture 的核心组成部分，提供了一个技术服务的分类体系（如数据管理服务、通信服务、安全服务等），帮助组织：标准化技术选型、与行业标准对齐、为 Phase D 提供参考基础。", "topic": "t4"}, {"num": "Q44", "star": false, "q": "III-RM（Integrated Information Infrastructure Reference Model）主要关注什么？", "opts": {"A": "网络基础设施", "B": "在企业范围内实现无缝信息流的应用程序间互操作性", "C": "数据库管理系统", "D": "安全架构"}, "ans": "B", "exp": "III-RM 是 TOGAF Foundation Architecture 的另一个参考模型，专门关注企业信息基础设施的集成，特别是应用程序之间如何实现信息互操作（Interoperability）。它提供了一个参考架构，帮助设计\"所有应用都能互通\"的信息基础设施。", "topic": "t4"}, {"num": "Q45", "star": false, "q": "Architecture Repository 中的 Standards Information Base（标准信息库）存储什么？", "opts": {"A": "架构原则", "B": "组织认可和批准使用的技术标准、产品和规范清单", "C": "历史架构决策记录", "D": "架构师的工作日志"}, "ans": "B", "exp": "Standards Information Base 是 Architecture Repository 的一个组成部分，存储组织批准使用的技术标准，包括：开放标准（ISO、IEEE等）、供应商标准（SAP ABAP、Java EE等）、内部制定的技术规范。Phase D 开发技术架构时参考这个库选择符合标准的技术组件。", "topic": "t4"}, {"num": "Q46", "star": false, "q": "Enterprise Continuum 中的 Architecture Continuum 和 Solutions Continuum 有什么关系？", "opts": {"A": "两者完全相同", "B": "Architecture Continuum 描述架构（抽象），Solutions Continuum 描述实现（具体），两者平行且相互对应", "C": "Solutions Continuum 包含 Architecture Continuum", "D": "Architecture Continuum 在 Solutions Continuum 之后发展"}, "ans": "B", "exp": "Enterprise Continuum = Architecture Continuum + Solutions Continuum。两者平行对应：Architecture Continuum 从基础架构到组织专有架构（抽象层）；Solutions Continuum 从通用产品/服务到组织特定解决方案（具体实现层）。ABB 属于 Architecture Continuum，SBB 属于 Solutions Continuum。", "topic": "t4"}, {"num": "Q47", "star": false, "q": "以下哪项最能描述 Architecture Governance（架构治理）的核心功能？", "opts": {"A": "替代项目管理功能", "B": "确保架构活动符合组织战略，管理架构完整性，处理架构偏差", "C": "负责技术基础设施的运营维护", "D": "只在 Phase G 中发挥作用"}, "ans": "B", "exp": "架构治理是一套持续的管理机制，核心功能：确保架构与战略对齐、维护架构的完整性和质量、审查架构合规性、处理变更请求和豁免申请。它不仅在 Phase G，而是贯穿整个 ADM 的治理保障机制。", "topic": "t4"}, {"num": "Q48", "star": true, "q": "Architecture Board（架构委员会）的主要职责是什么？", "opts": {"A": "负责编写架构文档", "B": "提供跨整个组织的架构合规监督，审查并批准架构工作，解决架构冲突", "C": "执行技术实施工作", "D": "管理 IT 基础设施的日常运营"}, "ans": "B", "exp": "Architecture Board 是架构治理的核心机构，职责包括：批准架构文档、确保架构合规、解决架构争议、管理架构原则、审查架构豁免请求。Architecture Board 通常由来自业务和 IT 的高层代表组成，具有正式授权。", "topic": "t5"}, {"num": "Q49", "star": true, "q": "Architecture Compliance（架构合规）的四个级别是什么？", "opts": {"A": "Excellent / Good / Fair / Poor", "B": "Conformant / Compliant / Non-Conformant / Irrelevant", "C": "Approved / Pending / Rejected / Waived", "D": "Full / Partial / Minimal / None"}, "ans": "B", "exp": "TOGAF 定义四个合规级别：Conformant（一致，完全符合架构要求）、Compliant（合规，实质性符合，有轻微偏差）、Non-Conformant（不合规，存在重大偏差，需要豁免或修正）、Irrelevant（不相关，该架构要求对此项目不适用）。这是 Level 1+2 双考点。", "topic": "t5"}, {"num": "Q50", "star": false, "q": "Architecture Contract（架构合同）的主要目的是什么？", "opts": {"A": "与外部供应商签订的采购合同", "B": "架构团队与开发/实施团队之间的正式协议，定义架构服务水平和合规要求", "C": "架构师的薪酬合同", "D": "技术许可协议"}, "ans": "B", "exp": "Architecture Contract 是架构团队与利益相关者（如开发团队、业务部门）之间的正式书面协议，内容包括：将要交付的架构工作产品、架构质量标准、合规要求、验收标准。它确保各方对架构目标和约束条件的共同理解和承诺。", "topic": "t5"}, {"num": "Q51", "star": false, "q": "架构原则（Architecture Principle）的 5 个组成要素是什么？", "opts": {"A": "Goal / Objective / Policy / Standard / Guideline", "B": "Name / Statement / Rationale / Implications / Metrics", "C": "Title / Description / Owner / Date / Version", "D": "Requirement / Constraint / Assumption / Risk / Issue"}, "ans": "B", "exp": "TOGAF 定义架构原则的 5 要素：Name（名称，简短易记）、Statement（声明，一句话表述原则内容）、Rationale（依据，说明为什么需要这条原则，即业务理由）、Implications（影响，说明遵循此原则的代价和要求）、Metrics（度量，如何衡量是否遵循了此原则）。其中 Rationale 是\"为什么\"，是高频考点。", "topic": "t5"}, {"num": "Q52", "star": false, "q": "在 Preliminary Phase 中，Architecture Principles 的主要来源是什么？", "opts": {"A": "随机制定，根据架构师个人经验", "B": "从组织业务原则、IT 战略、以及 TOGAF 原则示例中衍生", "C": "仅从行业标准中采用", "D": "由 Architecture Board 独立制定，无需参考现有文件"}, "ans": "B", "exp": "架构原则来源多元：业务原则（Business Principles，来自公司战略和业务规则）、TOGAF 参考原则（TOGAF 提供了一套示范原则供参考）、IT 战略文件、以及现有政策法规。制定原则是 Preliminary Phase 的核心工作之一，需要各层级利益相关者的输入。", "topic": "t5"}, {"num": "Q53", "star": false, "q": "Capability Architecture（能力架构）关注什么？", "opts": {"A": "整个企业的战略方向", "B": "业务线或部门级别的架构", "C": "特定业务能力（如采购能力、制造能力）的详细架构设计", "D": "技术基础设施的详细规格"}, "ans": "C", "exp": "Architecture Landscape 的三个级别：Strategic（战略，企业全局）、Segment（段，业务线/部门）、Capability（能力，具体业务能力的专项架构）。Capability Architecture 是最细粒度的，专注于支撑特定业务能力（如\"供应链能力\"或\"客户服务能力\"）所需的架构。", "topic": "t5"}, {"num": "Q54", "star": true, "q": "Stakeholder（利益相关者）在 TOGAF 中的定义是什么？", "opts": {"A": "项目的资金提供者", "B": "对系统有兴趣或关切的个人、团队或组织，包括项目内部和外部", "C": "只包括 C 级高管", "D": "只包括 IT 部门人员"}, "ans": "B", "exp": "TOGAF 对利益相关者的定义非常宽泛，涵盖：内部（管理层、业务用户、IT团队）和外部（客户、监管机构、供应商）对架构有利益关系的任何方。利益相关者分析是 Phase A 的关键活动，识别\"谁关心什么\"是构建架构愿景的基础。", "topic": "t6"}, {"num": "Q55", "star": true, "q": "Concern（关切）在 TOGAF 中是指什么？", "opts": {"A": "项目的风险清单", "B": "利益相关者关于系统某方面的兴趣、期望或担忧", "C": "合规性问题", "D": "预算超支问题"}, "ans": "B", "exp": "Concern 是特定利益相关者对系统的某个方面所持有的兴趣、期望或担忧。架构工作的核心价值之一就是识别并\"回应\"各利益相关者的 Concern。例如：CFO 的 Concern 是\"系统是否能降低财务报告成本\"；CIO 的 Concern 是\"新系统是否能与现有基础设施集成\"。", "topic": "t6"}, {"num": "Q56", "star": false, "q": "View（视图）在 TOGAF 中的定义是什么？", "opts": {"A": "系统的完整技术文档", "B": "从特定 Viewpoint 出发，对某个系统或部分系统的描述", "C": "利益相关者的个人意见", "D": "架构图表的集合"}, "ans": "B", "exp": "View 是根据特定 Viewpoint 规则，对系统特定方面的正式描述。View 专门用于回应特定利益相关者的 Concern。一个系统可以有多个 View（如业务视图、技术视图、安全视图），每个 View 针对不同受众的关切。", "topic": "t6"}, {"num": "Q57", "star": false, "q": "利益相关者管理矩阵（Power/Interest Grid）中，\"高权力/低兴趣\"的利益相关者应如何管理？", "opts": {"A": "密切沟通，频繁更新", "B": "保持满意（Keep Satisfied），定期简报但无需深度参与", "C": "最小程度关注", "D": "让其主导所有架构决策"}, "ans": "B", "exp": "Power/Interest Grid 四象限策略：高权力+低兴趣 → Keep Satisfied（满足他们，以防他们有负面反应）；高权力+高兴趣 → Manage Closely（密切管理）；低权力+高兴趣 → Keep Informed（保持告知）；低权力+低兴趣 → Monitor（最小关注）。", "topic": "t6"}, {"num": "Q58", "star": false, "q": "利益相关者矩阵（Stakeholder Map）的主要用途是什么？", "opts": {"A": "决定架构团队的人员招募", "B": "识别并记录所有利益相关者、其权力/兴趣级别、关切，以指导架构沟通策略", "C": "记录技术债务", "D": "管理项目预算分配"}, "ans": "B", "exp": "Stakeholder Map 是 Phase A 的关键工具，用于：系统性识别所有受影响方、评估其权力和关注度、了解其关切（Concern）、制定差异化的沟通和参与策略。它确保架构工作不会忽视关键利益相关者，从而提高架构的接受度。", "topic": "t6"}, {"num": "Q59", "star": false, "q": "当不同利益相关者的 Concern 相互冲突时，架构师应如何处理？", "opts": {"A": "优先满足最高层级管理者的 Concern，忽略其他", "B": "通过透明沟通、权衡分析，寻求经过正式治理机制批准的折中方案", "C": "采用投票机制决定", "D": "将冲突搁置，先完成其他工作"}, "ans": "B", "exp": "TOGAF 强调架构治理的重要性：冲突不应被忽视或简单专制解决。正确方式是：识别并记录冲突、分析各方 Concern 的优先级、提出折中方案、通过 Architecture Board 等正式治理机制做出裁决并记录决策依据。", "topic": "t6"}, {"num": "Q60", "star": true, "q": "Gap Analysis（差距分析）在 TOGAF ADM 中的主要目的是什么？", "opts": {"A": "确定项目预算缺口", "B": "识别当前架构（Baseline）和目标架构（Target）之间的差异，为迁移计划提供输入", "C": "评估团队技能水平", "D": "比较不同供应商产品"}, "ans": "B", "exp": "Gap Analysis 是 TOGAF 中将 Baseline（当前状态）与 Target（目标状态）进行比较的分析工具，产出四类差异：新增（Add，目标有但当前没有）、保留（Retain，当前有且目标也要保留）、去除（Eliminate，当前有但目标要去掉）、迁移（Migrate，当前有但需要改造才能满足目标）。这个结果直接驱动 Phase E 的工作包定义。", "topic": "t7"}];

// ── State ─────────────────────────────────────────────────────────────────────
let curLesson = null;
let quizState = {};   // lessonId -> { answered:{num->sel}, filter:'all' }
const done = JSON.parse(localStorage.getItem('crs_done') || '{}');

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = () => {
  renderSidebar();
  // restore or show first week overview
  const last = localStorage.getItem('crs_last');
  if (last && LESSONS[last]) openLesson(last);
  else showWeekOverview('w1');
  updateHeaderProgress();
  document.getElementById('search-inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch(e.target.value.trim());
  });
};

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  WEEKS.forEach(w => {
    const wDone = w.lessons.filter(([id]) => done[id]).length;
    const open = localStorage.getItem('crs_open_' + w.id) !== '0';
    const hdr = el('div', 'week-hdr' + (open ? ' open' : ''));
    hdr.innerHTML = `
      <div class="week-badge">${w.num}</div>
      <div class="week-info">
        <h3>第 ${w.num} 周：${esc(w.title)}</h3>
        <p>${esc(w.subtitle)}</p>
      </div>
      <span class="week-prog">${wDone}/${w.lessons.length}</span>
      <span class="week-chevron">▶</span>`;
    hdr.onclick = () => toggleWeek(w.id, hdr);

    const list = el('div', 'week-lessons');
    // overview item
    const ov = el('div', 'lesson-item' + (!curLesson && localStorage.getItem('crs_last') === null ? ' active' : ''));
    ov.dataset.wid = w.id;
    ov.innerHTML = `<span class="l-check"></span><span class="l-title">📋 本周概览</span>`;
    ov.onclick = () => showWeekOverview(w.id);
    list.appendChild(ov);

    w.lessons.forEach(([lid, ltype, ltitle]) => {
      const item = el('div', 'lesson-item' + (done[lid] ? ' done' : '') + (curLesson === lid ? ' active' : ''));
      item.dataset.lid = lid;
      const typeLabel = ltype === 'reading' ? '阅读' : ltype === 'quiz' ? '测验' : '练习';
      const typeCls   = ltype === 'reading' ? 'type-reading' : ltype === 'quiz' ? 'type-quiz' : 'type-practice';
      item.innerHTML = `
        <span class="l-check">${done[lid] ? '✓' : ''}</span>
        <span class="l-title">${esc(ltitle)}</span>
        <span class="l-type ${typeCls}">${typeLabel}</span>`;
      item.onclick = () => openLesson(lid);
      list.appendChild(item);
    });

    const block = el('div', 'week-block');
    block.appendChild(hdr);
    block.appendChild(list);
    if (open) list.style.display = 'block';
    else       list.style.display = 'none';
    sb.appendChild(block);
  });
}

function toggleWeek(wid, hdr) {
  const list = hdr.nextElementSibling;
  const isOpen = hdr.classList.contains('open');
  hdr.classList.toggle('open', !isOpen);
  list.style.display = isOpen ? 'none' : 'block';
  localStorage.setItem('crs_open_' + wid, isOpen ? '0' : '1');
}

// ── Week Overview ─────────────────────────────────────────────────────────────
function showWeekOverview(wid) {
  curLesson = null;
  localStorage.setItem('crs_last', '');
  const w = WEEKS.find(x => x.id === wid);
  if (!w) return;

  document.getElementById('lesson-bar-title').textContent = `第 ${w.num} 周：${w.title}`;
  document.getElementById('btn-complete').style.display = 'none';

  const doneCount = w.lessons.filter(([id]) => done[id]).length;
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="week-overview">
      <div class="wk-num">第 ${w.num} 周 / 共 8 周</div>
      <h1>${esc(w.title)}</h1>
      <p>${esc(w.subtitle)}</p>
      <div class="wk-meta">
        <span class="wk-tag">📚 ${w.lessons.length} 个课时</span>
        <span class="wk-tag">✅ 已完成 ${doneCount}/${w.lessons.length}</span>
      </div>
    </div>
    <div class="lesson-cards">
      ${w.lessons.map(([lid, ltype, ltitle]) => {
        const isDone = done[lid];
        const typeMap = {reading:'📖 阅读',quiz:'✏️ 随堂测验',practice:'🎯 练习'};
        return `<div class="lesson-card${isDone?' done':''}" onclick="openLesson('${lid}')">
          <div class="lc-icon">${ltitle.split(' ')[0]}</div>
          <div class="lc-info">
            <h4>${esc(ltitle.replace(/^[^\s]+ /,''))}</h4>
            <p>${typeMap[ltype]||ltype}</p>
          </div>
          ${isDone ? '<span class="lc-status">✓ 已完成</span>' : ''}
        </div>`;
      }).join('')}
    </div>`;
  highlightSidebarLesson(null, wid);
}

// ── Open Lesson ───────────────────────────────────────────────────────────────
function openLesson(lid) {
  curLesson = lid;
  localStorage.setItem('crs_last', lid);
  const lesson = LESSONS[lid];
  if (!lesson) return;

  document.getElementById('lesson-bar-title').textContent = lesson.title.replace(/^[^\s]+ /,'');
  const btnC = document.getElementById('btn-complete');
  btnC.style.display = '';
  btnC.textContent = done[lid] ? '✓ 已完成' : '标记完成';
  btnC.className = 'btn' + (done[lid] ? ' done' : ' primary');
  btnC.onclick = () => markDone(lid);

  // prev / next
  const flat = WEEKS.flatMap(w => w.lessons.map(([id]) => id));
  const idx  = flat.indexOf(lid);
  document.getElementById('btn-prev').onclick = idx > 0 ? () => openLesson(flat[idx-1]) : null;
  document.getElementById('btn-next').onclick = idx < flat.length-1 ? () => openLesson(flat[idx+1]) : null;
  document.getElementById('btn-prev').disabled = idx <= 0;
  document.getElementById('btn-next').disabled = idx >= flat.length-1;

  const content = document.getElementById('content');
  if (lesson.type === 'reading') {
    content.innerHTML = `<div class="reading-wrap">${lesson.html}</div>`;
  } else {
    renderQuizInContent(lid, lesson);
  }
  content.scrollTop = 0;
  highlightSidebarLesson(lid);
}

// ── Quiz Render ───────────────────────────────────────────────────────────────
function renderQuizInContent(lid, lesson) {
  if (!quizState[lid]) quizState[lid] = { answered:{}, filter:'all' };
  const st = quizState[lid];

  const allQs = lesson.questions;
  const qs = st.filter === 'star'  ? allQs.filter(q => q.star)
           : st.filter === 'wrong' ? allQs.filter(q => st.answered[q.num] && st.answered[q.num].res === 'wrong')
           : allQs;

  const total   = allQs.length;
  const doneN   = Object.keys(st.answered).length;
  const correctN= Object.values(st.answered).filter(a => a.res==='right').length;
  const pct     = doneN ? Math.round(correctN/doneN*100) : 0;
  const progW   = Math.round(doneN/total*100);

  let html = `<div class="quiz-wrap">
  <div class="quiz-hdr">
    <div class="quiz-hdr-top">
      <h3>${esc(lesson.title.replace(/^[^\s]+ /,''))}</h3>
      <div class="quiz-stats">
        <div class="stat-item"><span class="stat-val blue">${total}</span><span class="stat-lbl">总题数</span></div>
        <div class="stat-item"><span class="stat-val green">${correctN}</span><span class="stat-lbl">正确</span></div>
        <div class="stat-item"><span class="stat-val red">${doneN-correctN}</span><span class="stat-lbl">错误</span></div>
        <div class="stat-item"><span class="stat-val">${pct}%</span><span class="stat-lbl">正确率</span></div>
      </div>
    </div>
    <div class="qpbar"><div class="qpfill" style="width:${progW}%"></div></div>
    <div style="font-size:11px;color:var(--muted)">已作答 ${doneN}/${total}</div>
  </div>
  <div class="quiz-controls">
    <button class="q-filter ${st.filter==='all'?'on':''}" onclick="setQFilter('${lid}','all')">全部 ${total}</button>
    <button class="q-filter ${st.filter==='star'?'on':''}" onclick="setQFilter('${lid}','star')">⭐ 高频 ${allQs.filter(q=>q.star).length}</button>
    <button class="q-filter ${st.filter==='wrong'?'on':''}" onclick="setQFilter('${lid}','wrong')">错题 ${Object.values(st.answered).filter(a=>a.res==='wrong').length}</button>
    <button class="btn-reset" onclick="resetQuiz('${lid}')">重置</button>
  </div>`;

  qs.forEach(q => {
    const a = st.answered[q.num];
    const cardCls = !a?'': a.res==='right'?'ok': a.res==='revealed'?'revealed':'err';
    const icon    = !a?'':a.res==='right'?'✅':a.res==='revealed'?'💡':'❌';
    html += `<div class="q-card ${cardCls}" id="qc-${lid}-${q.num}">
      <div class="q-top">
        <span class="q-num">${q.num}</span>
        ${q.star?'<span class="q-star">⭐</span>':''}
        <span class="q-text">${esc(q.q)}</span>
        <span class="q-result-icon">${icon}</span>
      </div>
      <div class="q-opts">`;
    ['A','B','C','D'].forEach(k => {
      if (!q.opts[k]) return;
      let cls = 'q-opt';
      if (a) {
        cls += ' locked';
        if (k === q.ans) cls += ' cor';
        else if (a.sel === k) cls += ' wrg';
      }
      html += `<div class="${cls}" onclick="pickOpt('${lid}','${q.num}','${k}','${q.ans}')">
        <span class="opt-k">${k}.</span><span>${esc(q.opts[k])}</span></div>`;
    });
    html += `</div><div class="q-btns">
      <button class="btn-exp" onclick="toggleExp('${lid}','${q.num}')">查看解析</button>
      ${!a?`<button class="btn-show" onclick="showAns('${lid}','${q.num}','${q.ans}')">显示答案</button>`:''}
    </div>
    <div class="q-explanation" id="exp-${lid}-${q.num}">
      <strong>✓ 正确答案：${q.ans}</strong><br><br>${esc(q.exp)}
    </div></div>`;
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function pickOpt(lid, num, k, ans) {
  if (!quizState[lid]) quizState[lid] = {answered:{},filter:'all'};
  if (quizState[lid].answered[num]) return;
  quizState[lid].answered[num] = {sel:k, res: k===ans?'right':'wrong'};
  renderQuizInContent(lid, LESSONS[lid]);
  setTimeout(() => {
    const el = document.getElementById('qc-'+lid+'-'+num);
    if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 50);
  // auto-mark done when all answered
  const total = LESSONS[lid].questions.length;
  if (Object.keys(quizState[lid].answered).length >= total) markDone(lid);
}

function showAns(lid, num, ans) {
  if (!quizState[lid]) quizState[lid] = {answered:{},filter:'all'};
  quizState[lid].answered[num] = {sel:ans, res:'revealed'};
  const exp = document.getElementById('exp-'+lid+'-'+num);
  if (exp) exp.classList.add('show');
  renderQuizInContent(lid, LESSONS[lid]);
}

function toggleExp(lid, num) {
  const exp = document.getElementById('exp-'+lid+'-'+num);
  if (exp) exp.classList.toggle('show');
}

function setQFilter(lid, f) {
  if (!quizState[lid]) quizState[lid] = {answered:{},filter:'all'};
  quizState[lid].filter = f;
  renderQuizInContent(lid, LESSONS[lid]);
}

function resetQuiz(lid) {
  if (!confirm('重置该课时的答题记录？')) return;
  quizState[lid] = {answered:{}, filter:'all'};
  renderQuizInContent(lid, LESSONS[lid]);
}

// ── Mark Done ─────────────────────────────────────────────────────────────────
function markDone(lid) {
  done[lid] = true;
  localStorage.setItem('crs_done', JSON.stringify(done));
  const btnC = document.getElementById('btn-complete');
  btnC.textContent = '✓ 已完成'; btnC.className = 'btn done';
  renderSidebar();
  updateHeaderProgress();
  // auto-advance after 1.5s
  const flat = WEEKS.flatMap(w => w.lessons.map(([id]) => id));
  const idx  = flat.indexOf(lid);
  if (idx < flat.length-1) {
    setTimeout(() => {
      // show next button highlight hint — don't auto-navigate
    }, 400);
  }
}

// ── Progress ──────────────────────────────────────────────────────────────────
function updateHeaderProgress() {
  const total = WEEKS.reduce((s,w) => s+w.lessons.length, 0);
  const n     = Object.keys(done).length;
  document.getElementById('hdr-pfill').style.width = (n/total*100)+'%';
  document.getElementById('hdr-prog-txt').textContent = `${n}/${total}`;
}

// ── Search ────────────────────────────────────────────────────────────────────
function doSearch(q) {
  if (!q) { if(curLesson) openLesson(curLesson); else showWeekOverview('w1'); return; }
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  const hits = [];
  Object.keys(LESSONS).forEach(lid => {
    const L = LESSONS[lid];
    const text = L.type==='reading' ? (L.html||'').replace(/<[^>]+>/g,'') :
                 (L.questions||[]).map(q2=>q2.q+' '+Object.values(q2.opts).join(' ')+' '+q2.exp).join(' ');
    const m = text.match(re);
    if (m) {
      const snipStart = text.search(re);
      const snip = text.slice(Math.max(0,snipStart-40), snipStart+80);
      hits.push({lid, title:L.title, count:m.length, snip});
    }
  });
  const content = document.getElementById('content');
  if (!hits.length) { content.innerHTML = `<div class="empty-state"><div class="big">🔍</div><p>未找到「${esc(q)}」的相关内容</p></div>`; return; }
  const sorted = hits.sort((a,b)=>b.count-a.count);
  content.innerHTML = `<div class="search-results">
    <h2>搜索「${esc(q)}」— 共 ${sorted.length} 处</h2>
    ${sorted.map(h=>`<div class="search-hit" onclick="openLesson('${h.lid}')">
      <h4>${esc(h.title)}</h4>
      <p>${h.count} 处匹配 · ${esc(h.snip).replace(re,'<mark>$&</mark>')}...</p>
    </div>`).join('')}
  </div>`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function highlightSidebarLesson(lid, wid) {
  document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
  if (lid) {
    const el = document.querySelector(`.lesson-item[data-lid="${lid}"]`);
    if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  } else if (wid) {
    document.querySelectorAll('.lesson-item[data-wid]').forEach(el => {
      if (el.dataset.wid === wid) el.classList.add('active');
    });
  }
}
function el(tag, cls) { const e=document.createElement(tag); e.className=cls; return e; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
