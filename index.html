d></tr>\n<tr><td>用户验收测试完成（UAT Sign-off）</td><td>2027年5月</td><td>业务用户签字确认流程符合目标架构设计意图</td></tr>\n<tr><td>上线（Go-Live）</td><td>2027年6月</td><td>回滚方案是否就绪、切换清单是否完整</td></tr>\n<tr><td>上线后稳定（Hypercare结束）</td><td>2027年7-8月</td><td>目标架构KPI的首次度量（月结时间/主数据质量指标/报表准确率）</td></tr>\n</table></div>\n<hr>"}, "L8_7": {"type": "reading", "title": "📖 管理资讯服务（MIS）框架", "html": "<h2 id=\"第八章-管理资讯服务-MIS-框架\">第八章：管理资讯服务（MIS）框架</h2>\n<p>管理资讯服务（Management Information Service，MIS）是华辉项目中连接&quot;IT系统建设&quot;与&quot;管理决策支持&quot;的桥梁。在TOGAF框架下，MIS不是一个独立的系统，而是横跨四大架构域的能力集合。</p>\n<h3 id=\"8-1-Group-Reporting在目标架构中的位置\">8.1 Group Reporting在目标架构中的位置</h3>\n<p>Group Reporting是华辉目标架构中MIS能力的核心基础设施，它在架构层级上处于<strong>应用架构层</strong>，但其设计直接受制于<strong>业务架构（管控模式）</strong>和<strong>数据架构（主数据标准化）</strong>。</p>\n<p><strong>Group Reporting的架构角色：</strong></p>\n<ul>\n<li><strong>替代功能</strong>：替代现有的Excel合并报表流程，以及可能存在的BPC（Business Planning and Consolidation）旧系统</li>\n<li><strong>上游依赖</strong>：依赖各法人S/4HANA的FICO模块提供准确的本位币和集团货币余额，依赖MDG提供一致的科目表（Group Chart of Accounts）和利润中心层级（Segment）</li>\n<li><strong>下游支撑</strong>：为管理层决策提供集团层面的合并利润表/资产负债表/现金流量表，以及按业务线/地区/产品线的分部报表</li>\n</ul>\n<p><strong>Group Reporting的设计前提条件（架构约束）：</strong></p>\n<ol>\n<li>所有19家法人必须使用统一的集团科目表（Group COA），各法人本地科目表通过科目映射关联</li>\n<li>内部交易（Intercompany）的抵消消除规则必须在Group Reporting配置阶段完成，需要与各法人的SD/MM业务流程设计同步</li>\n<li>泰国（THB）和德国（EUR）的功能货币折算必须在FICO汇率配置中正确设置</li>\n</ol>\n<h3 id=\"8-2-管理驾驶舱设计原则\">8.2 管理驾驶舱设计原则</h3>\n<p>管理驾驶舱（Management Dashboard）是MIS框架的前端呈现层。在华辉的目标架构中，驾驶舱设计应遵循以下原则：</p>\n<p><strong>原则一：分层设计（Layered Design）</strong></p>\n<ul>\n<li>L1（董事会/总裁层）：集团层面的关键KPI——营收增长率、综合毛利率、净利率、EVA、集团净现金。每月更新，T+3可得</li>\n<li>L2（CFO/事业部总经理层）：按业务单元的P&amp;L分析、费用预算执行、应收/应付账期分析。每月更新，支持钻取</li>\n<li>L3（业务部门经理层）：实时运营数据——订单执行率、库存周转率、生产完工率、采购及时率。每日/每周更新</li>\n</ul>\n<p><strong>原则二：单一数据源（Single Source of Truth）</strong></p>\n<p>所有驾驶舱数据必须来源于S/4HANA（通过Group Reporting或SAC），禁止从Excel或其他系统导入数据。这是消除&quot;两套账&quot;问题的架构约束，也是MIS可信度的基础。</p>\n<p><strong>原则三：前瞻性指标（Forward-Looking Metrics）</strong></p>\n<p>MIS不应只是历史数据的汇总，还需要包含预测类指标——基于在手订单的收入预测、基于MRP的采购资金需求预测、基于合同条款的现金流预测。这部分能力在SAC与S/4HANA集成后可以实现。</p>\n<p><strong>原则四：例外管理（Management by Exception）</strong></p>\n<p>驾驶舱设计应内置预警阈值——当某法人毛利率低于集团平均15%、当应收账款超期率超过10%、当生产完工率低于95%时，自动触发告警并推送至责任人。</p>\n<h3 id=\"8-3-数据架构从ECC到S-4HANA的演进\">8.3 数据架构从ECC到S/4HANA的演进</h3>\n<p>MIS质量的根本决定因素是数据架构的成熟度。从ECC到S/4HANA，数据架构经历了以下关键演进：</p>\n<p><strong>会计凭证结构的演进</strong></p>\n<p>ECC的会计凭证（FI Document）和管理会计凭证（CO Document）是分离存储的，两者通过内部结算（PA Transfer）间接关联，导致FI/CO对账是月结的重要工作。S/4HANA的通用日记账（Universal Journal，表ACDOCA）将FI和CO的凭证合并为一张表，FI/CO实时一致，月结工作量大幅减少，这是MIS实时性的技术基础。</p>\n<p><strong>成本核算能力的演进</strong></p>\n<p>ECC的产品成本核算通常基于标准成本（Standard Cost），只能在月末做差异分析。S/4HANA的Material Ledger（物料账）支持实际成本核算（Actual Costing），可以实时计算每批次产品的实际制造成本。对于华辉这样净利率极低的企业，产品成本精确化是提升盈利能力的关键工具。</p>\n<p><strong>报表响应速度的演进</strong></p>\n<p>ECC时代的复杂报表（如跨工厂的库存分析、多法人的应收账款aging）通常需要在SAP BW或独立数据仓库中运行，有T+1的数据延迟。S/4HANA内嵌HANA实时计算能力，结合Embedded Analytics或SAC，使管理报表可以在秒级响应，无需独立BI系统。</p>\n<p><strong>从数据仓库到实时分析的架构转变</strong></p>\n<p>ECC时代的MIS架构通常是：ECC（OLTP）→ 每晚ETL → BW/数据仓库（OLAP）→ 报表工具。这种架构有12-24小时的数据延迟，且ETL过程中存在数据清洗规则的不一致。S/4HANA目标架构下，MIS架构简化为：S/4HANA（OLTP+OLAP合一）→ CDS Views（虚拟数据层）→ SAC/BW on HANA（分析层）。数据延迟从T+1降至实时，且分析层直接基于交易系统数据，消除了ETL引入的数据不一致。</p>\n<hr>"}, "L8_8": {"type": "quiz", "title": "🎯 考前冲刺 — 高频60题全练", "questions": [{"num": "Q1", "star": true, "q": "TOGAF 是由哪个组织发布和维护的？", "opts": {"A": "ISO（国际标准化组织）", "B": "The Open Group", "C": "ITIL Foundation", "D": "Gartner"}, "ans": "B", "exp": "TOGAF 由 The Open Group 发布，这是一个技术中立的行业联盟。The Open Group 同时负责 TOGAF 认证考试。ISO 是国际标准化组织（发布如 ISO 42010），ITIL 是服务管理框架，Gartner 是调研机构，均非 TOGAF 发布方。", "topic": "t1"}, {"num": "Q2", "star": true, "q": "TOGAF 的全称是什么？", "opts": {"A": "Technical Open Group Architecture Framework", "B": "The Open Group Architecture Framework", "C": "Technology Operations Governance and Architecture Framework", "D": "Total Organizational Goals and Architecture Framework"}, "ans": "B", "exp": "TOGAF = The Open Group Architecture Framework，这是考试必背的全称。选项A、C、D均为干扰项，请注意\"The\"是组织名称的一部分，不是冠词。", "topic": "t1"}, {"num": "Q3", "star": false, "q": "TOGAF Standard 10 相比 9.2 版本的最主要变化是什么？", "opts": {"A": "删除了 ADM，改用敏捷方法", "B": "将内容重组为 TOGAF Fundamental Content 和 TOGAF Series Guides", "C": "增加了 Phase I 和 Phase J 两个新阶段", "D": "将四大架构域减少为三大域"}, "ans": "B", "exp": "TOGAF 10 的核心变化是将内容重构为两大部分：TOGAF Fundamental Content（基础内容，包括ADM核心概念）和 TOGAF Series Guides（系列指南，包括安全架构、Agile适配等专题）。ADM 在 10 中依然完整保留，架构域仍为四大域。", "topic": "t1"}, {"num": "Q4", "star": true, "q": "企业架构（Enterprise Architecture）的主要目的是什么？", "opts": {"A": "专门管理 IT 基础设施的部署", "B": "帮助企业实现业务目标与 IT 能力的对齐", "C": "仅关注应用软件的开发流程", "D": "替代项目管理框架（如 PRINCE2）"}, "ans": "B", "exp": "EA 的核心价值是将业务战略与 IT 能力对齐（Business-IT Alignment）。EA 不仅限于 IT，也不替代 PM 方法论。TOGAF 明确指出 EA 需要业务架构、应用架构、数据架构、技术架构四域协同，目标是支撑业务目标实现。", "topic": "t1"}, {"num": "Q5", "star": false, "q": "TOGAF ADM 中，哪个说法最准确地描述了架构开发的性质？", "opts": {"A": "ADM 是线性的、一次性的过程，从 Phase A 执行到 Phase H 即完成", "B": "ADM 是迭代的、循环的方法，可以在阶段间和循环间反复进行", "C": "ADM 只能按照规定顺序执行，不允许跳过阶段", "D": "ADM 在每个项目中只能执行一次"}, "ans": "B", "exp": "ADM 的核心特性是迭代性（Iterative）和循环性（Cyclic）。TOGAF 明确说明 ADM 可以在阶段内、阶段间、以及整个 ADM 循环层面进行迭代。架构可以分层次（战略/段/能力/项目）进行，每层触发新的ADM循环。", "topic": "t1"}, {"num": "Q6", "star": true, "q": "下列哪四个域构成了 TOGAF 的企业架构描述？", "opts": {"A": "Strategy / Operations / Technology / Security", "B": "Business / Application / Data / Technology", "C": "People / Process / Technology / Governance", "D": "Finance / Marketing / IT / Operations"}, "ans": "B", "exp": "TOGAF 的四大架构域（BADT）：Business Architecture（业务架构）、Application Architecture（应用架构）、Data Architecture（数据架构）、Technology Architecture（技术架构）。记忆口诀：BDAT 或 BADT。注意 Application 和 Data 同属 Information Systems Architecture（信息系统架构）域。", "topic": "t1"}, {"num": "Q7", "star": false, "q": "TOGAF 适合以下哪类组织使用？", "opts": {"A": "只适用于大型跨国企业", "B": "只适用于 IT 公司", "C": "可被任何规模和行业的组织使用，但需要针对自身情况适配", "D": "只适用于政府机构和公共部门"}, "ans": "C", "exp": "TOGAF 是通用的企业架构框架，设计上就考虑了可适配性（Adaptability）。Preliminary Phase 的核心工作之一就是\"定制 ADM 以适应组织需要\"。小到 SME，大到跨国集团均可使用，但需要根据规模和行业特点进行合理裁剪。", "topic": "t1"}, {"num": "Q8", "star": false, "q": "TOGAF 的哪个组成部分提供了一个通用的技术标准参考模型？", "opts": {"A": "Architecture Vision", "B": "Architecture Repository", "C": "Technical Reference Model（TRM）", "D": "Architecture Roadmap"}, "ans": "C", "exp": "TRM（Technical Reference Model，技术参考模型）是 TOGAF Foundation Architecture 的一部分，提供了一个通用的技术标准分类体系，帮助组织选择符合标准的技术组件。另一个基础参考模型是 III-RM（Integrated Information Infrastructure Reference Model）。", "topic": "t1"}, {"num": "Q9", "star": true, "q": "TOGAF ADM 中，Preliminary Phase 的主要目的是什么？", "opts": {"A": "定义目标架构的愿景", "B": "建立架构能力（Architecture Capability），定制 ADM，制定架构原则", "C": "执行差距分析（Gap Analysis）", "D": "创建实施和迁移计划"}, "ans": "B", "exp": "Preliminary Phase 是在正式启动 ADM 之前的准备阶段。其核心工作是：建立架构团队和治理框架（Architecture Board）、定制 ADM 以适应组织、制定架构原则。Preliminary 不属于 A-H 任何一个字母阶段，它是所有 Phase 的\"地基\"。", "topic": "t2"}, {"num": "Q10", "star": true, "q": "在 ADM 的 Phase A（Architecture Vision）中，第一步通常是什么？", "opts": {"A": "开始开发目标架构", "B": "确认和扩充架构原则，建立架构项目", "C": "执行差距分析", "D": "制定迁移计划"}, "ans": "B", "exp": "Phase A 的第一步是\"确认架构项目的启动\"，包括：确认请求（Request for Architecture Work）的范围和约束、确认利益相关者、明确架构愿景的范围。差距分析在 Phase B/C/D 执行，迁移计划在 Phase F。", "topic": "t2"}, {"num": "Q11", "star": true, "q": "Architecture Vision（架构愿景文档）是哪个 Phase 的关键输出？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase F"}, "ans": "B", "exp": "Architecture Vision 是 Phase A 的核心交付物，包括：项目范围定义、利益相关者关切、高层架构描述、约束条件。它为后续所有 Phase 提供方向，是整个 ADM 循环的起点文件。", "topic": "t2"}, {"num": "Q12", "star": false, "q": "在 Phase B（Business Architecture）中，架构师需要开发什么？", "opts": {"A": "应用组合图", "B": "业务架构的当前状态（Baseline）和目标状态（Target）", "C": "技术组件清单", "D": "数据迁移方案"}, "ans": "B", "exp": "Phase B 关注业务架构，核心工作是：描述 Baseline Business Architecture（当前状态）和 Target Business Architecture（目标状态），并执行 Gap Analysis。业务架构包含：业务功能、业务流程、组织结构、业务角色和业务服务。", "topic": "t2"}, {"num": "Q13", "star": true, "q": "Phase C（信息系统架构）包含哪两个子域，且正确的开发顺序是什么？", "opts": {"A": "Application Architecture，然后 Data Architecture", "B": "Data Architecture，然后 Application Architecture", "C": "两个子域同时并行开发", "D": "Phase C 只包含 Application Architecture，Data Architecture 属于 Phase B"}, "ans": "B", "exp": "Phase C 包含 Data Architecture 和 Application Architecture 两个子域，TOGAF 推荐先开发 Data Architecture，再开发 Application Architecture。原因：应用程序是数据的载体和处理器，数据架构确定后才能明确应用需要处理什么数据，从而定义应用功能边界。这是 Level 1 高频陷阱题。", "topic": "t2"}, {"num": "Q14", "star": false, "q": "Phase D（Technology Architecture）的主要工作是什么？", "opts": {"A": "定义组织的业务流程", "B": "将逻辑应用组件映射到具体技术组件，定义技术标准", "C": "分析差距并制定过渡架构", "D": "管理架构变更请求"}, "ans": "B", "exp": "Phase D 是将前几个 Phase 定义的逻辑架构落地到技术层面的阶段。主要工作包括：识别技术平台候选方案、应用 TRM（技术参考模型）、定义技术标准和规范。Phase E 才是差距分析和过渡架构，Phase H 是变更管理。", "topic": "t2"}, {"num": "Q15", "star": true, "q": "Phase E（Opportunities and Solutions）的核心目标是什么？", "opts": {"A": "批准最终的目标架构", "B": "从目标架构推导出实施方案，定义工作包（Work Package）和过渡架构", "C": "完成技术架构的详细设计", "D": "监控已实施架构的合规性"}, "ans": "B", "exp": "Phase E 是从\"架构\"到\"实施\"的桥梁。在这里，架构师综合前面 Phase B/C/D 的差距分析结果，确定具体的工作包（Work Package）、定义过渡架构（Transition Architecture）、并评估初步的实施路径。", "topic": "t2"}, {"num": "Q16", "star": false, "q": "在 TOGAF ADM 中，Phase F（Migration Planning）主要关注什么？", "opts": {"A": "定义目标技术架构", "B": "制定详细的实施和迁移计划，对工作包进行优先级排序", "C": "建立架构治理委员会", "D": "识别新的业务机会"}, "ans": "B", "exp": "Phase F 将 Phase E 识别的工作包细化为具体的实施和迁移计划。关键工作：成本效益分析、风险评估、优先级排序、资源规划。Phase F 的产物是可执行的迁移计划。", "topic": "t2"}, {"num": "Q17", "star": true, "q": "Phase G（Implementation Governance）的主要职责是什么？", "opts": {"A": "开发应用架构", "B": "监督项目实施确保与架构规格一致，处理架构合规请求", "C": "制定架构路线图", "D": "执行差距分析"}, "ans": "B", "exp": "Phase G 是架构实施阶段的治理监督。架构团队在这个阶段：监督实施项目是否符合批准的架构、处理架构偏差（Architecture Dispensation）请求、进行架构合规评审（Architecture Compliance Review）。", "topic": "t2"}, {"num": "Q18", "star": false, "q": "下列哪项陈述最准确地描述了 Phase H（Architecture Change Management）的目的？", "opts": {"A": "创建新的目标架构", "B": "维护架构的生命力，管理对已批准架构的变更，确定何时需要启动新的 ADM 循环", "C": "开发迁移计划", "D": "执行技术架构审查"}, "ans": "B", "exp": "Phase H 是架构正式上线后的持续管理阶段。架构就像一个活的文档，需要响应外部环境变化（技术进步、业务战略调整、法规变化）。Phase H 负责评估这些变化、判断变更影响级别，并在必要时触发新一轮 ADM 循环。", "topic": "t2"}, {"num": "Q19", "star": true, "q": "关于\"需求管理\"（Requirements Management），下列哪项说法正确？", "opts": {"A": "需求管理是 ADM 中位于 Phase A 和 Phase B 之间的独立阶段", "B": "需求管理是一个持续进行的过程，贯穿所有 ADM Phase，不是独立的阶段", "C": "需求管理只在 Phase A 和 Phase F 中执行", "D": "需求管理由 Phase H 负责统一管理"}, "ans": "B", "exp": "这是 Level 1 高频陷阱！需求管理（Requirements Management）位于 ADM 图的中心圆圈，表示它持续贯穿所有 Phase，而不是一个独立的阶段（它没有字母编号）。它的职能是：存储需求、评估变更对当前 Phase 的影响、将需求传递给相关 Phase。", "topic": "t2"}, {"num": "Q20", "star": false, "q": "以下哪个是 Phase A 的关键输入？", "opts": {"A": "Baseline Business Architecture", "B": "Request for Architecture Work（架构工作请求）", "C": "Migration Plan", "D": "Technology Architecture"}, "ans": "B", "exp": "Request for Architecture Work 是触发整个 ADM 循环的关键文件，它由赞助组织（通常是管理层）发出，定义了架构项目的范围、约束和资源授权。它是 Phase A 的主要输入之一。Baseline Business Architecture 是 Phase B 的输入，Migration Plan 是 Phase F 的输出。", "topic": "t2"}, {"num": "Q21", "star": false, "q": "在 Phase B 中，\"业务架构\"的主要描述对象是什么？", "opts": {"A": "应用程序和数据库", "B": "服务器和网络设备", "C": "业务功能、业务流程、组织结构、业务角色", "D": "数据迁移方案"}, "ans": "C", "exp": "业务架构（Business Architecture）描述的是业务层面的能力和结构，包括：业务功能（Business Function）、业务流程（Business Process）、组织结构（Organization）、业务角色（Business Role）、业务服务（Business Service）。这与应用、数据、技术架构明确区分。", "topic": "t2"}, {"num": "Q22", "star": true, "q": "Statement of Architecture Work（架构工作说明书）是哪个阶段的关键交付物？", "opts": {"A": "Preliminary Phase", "B": "Phase A", "C": "Phase B", "D": "Phase G"}, "ans": "B", "exp": "Statement of Architecture Work 是 Phase A 的核心输出，它是正式的项目授权文件，定义了本次架构项目的范围、方法、资源、时间表，相当于架构团队的工作授权书。不要与 Architecture Vision 文档混淆：Architecture Vision 描述目标方向，Statement of Architecture Work 是工作授权。", "topic": "t2"}, {"num": "Q23", "star": false, "q": "在 Phase E 中，Work Package（工作包）包含哪些核心要素？", "opts": {"A": "只包含时间和成本", "B": "项目名称、项目描述、所包含的变更、所影响的 Building Block、依赖关系", "C": "只包含技术实施细节", "D": "业务需求文档"}, "ans": "B", "exp": "Work Package 是 Phase E 定义的可实施单元，包含：工作包名称和描述、所实现的目标架构要素、涉及的 Building Blocks、与其他工作包的依赖关系、优先级。多个工作包按依赖排序后形成 Architecture Roadmap。", "topic": "t2"}, {"num": "Q24", "star": false, "q": "Phase G 中，\"Architecture Dispensation\"（架构特许/豁免）是指什么？", "opts": {"A": "完全批准的架构变更", "B": "对特定项目或情况，暂时允许偏离已批准架构的正式授权", "C": "取消整个架构项目", "D": "新增架构原则"}, "ans": "B", "exp": "在实施过程中，有时项目因为现实约束（时间/成本/技术）无法完全符合批准的架构。Architecture Dispensation 是 Architecture Board 给予的正式豁免，允许特定范围内的偏差，但需要记录理由并设定恢复期限。", "topic": "t2"}, {"num": "Q25", "star": true, "q": "Phase H 中，变更的\"类型\"分类主要目的是什么？", "opts": {"A": "确定谁负责实施变更", "B": "判断变更的影响级别，以确定是否需要启动新的完整 ADM 循环", "C": "计算变更的成本", "D": "为变更撰写技术文档"}, "ans": "B", "exp": "TOGAF 将架构变更分为三类：类型1（简化/精化，不影响架构方向）→ 直接更新架构文档；类型2（增量/演进）→ 触发新的 ADM 循环（简化版）；类型3（重新定义/颠覆性变化）→ 触发全面的新 ADM 循环。判断变更类型是 Phase H 的核心工作。", "topic": "t2"}, {"num": "Q26", "star": false, "q": "下列哪项不是 Preliminary Phase 的典型输出？", "opts": {"A": "定制后的 ADM（Tailored ADM）", "B": "架构原则（Architecture Principles）", "C": "目标业务架构（Target Business Architecture）", "D": "架构治理框架（Architecture Governance Framework）"}, "ans": "C", "exp": "目标业务架构是 Phase B 的输出，不是 Preliminary Phase 的产物。Preliminary Phase 的输出包括：定制 ADM、架构原则、架构治理框架、架构工具设置、Architecture Repository 初始化。", "topic": "t2"}, {"num": "Q27", "star": false, "q": "在 ADM 循环中，哪个 Phase 最终产生\"架构定义文档\"（Architecture Definition Document）？", "opts": {"A": "Phase A", "B": "Preliminary Phase", "C": "Phase B/C/D 综合产生", "D": "Phase G"}, "ans": "C", "exp": "Architecture Definition Document（架构定义文档）是 Phase B、C、D 的综合交付物，包含业务架构、信息系统架构（数据+应用）、技术架构的当前状态和目标状态描述，以及差距分析结果。这个文档在 Phase E 作为关键输入使用。", "topic": "t2"}, {"num": "Q28", "star": false, "q": "Phase F 中，确定工作包优先级时应考虑哪些因素？", "opts": {"A": "只考虑成本高低", "B": "依赖关系、业务价值、风险、资源可用性、战略合规性等多维度因素", "C": "只考虑技术难度", "D": "只考虑领导层偏好"}, "ans": "B", "exp": "Phase F 的优先级排序是多维度的，TOGAF 建议考虑：工作包之间的依赖关系（先决条件）、对业务价值的贡献度、实施风险、资源可用性、与战略目标的对齐度。单一维度排序会导致高价值项目被低价值但低成本项目推后。", "topic": "t2"}, {"num": "Q29", "star": false, "q": "Architecture Roadmap（架构路线图）和 Migration Plan（迁移计划）有什么核心区别？", "opts": {"A": "两者完全相同，只是不同 Phase 的叫法", "B": "Architecture Roadmap 是高层次的时间线（展示从当前到目标的演进路径），Migration Plan 是可执行的详细实施计划", "C": "Migration Plan 是架构层级的，Architecture Roadmap 是项目层级的", "D": "Architecture Roadmap 只用于技术架构"}, "ans": "B", "exp": "Architecture Roadmap 在 Phase E 形成，展示工作包的高层次时间线，是战略性的；Migration Plan 在 Phase F 形成，包含详细的实施步骤、资源分配、时间节点，是可执行的。Roadmap 是蓝图，Migration Plan 是施工图。", "topic": "t2"}, {"num": "Q30", "star": false, "q": "完整的 ADM 循环包括多少个带字母编号的 Phase（不含 Preliminary 和需求管理）？", "opts": {"A": "6个", "B": "7个", "C": "8个", "D": "9个"}, "ans": "C", "exp": "ADM 有 8 个字母 Phase：A（Architecture Vision）、B（Business Architecture）、C（Information Systems Architecture）、D（Technology Architecture）、E（Opportunities & Solutions）、F（Migration Planning）、G（Implementation Governance）、H（Architecture Change Management）。加上 Preliminary Phase 和持续的 Requirements Management，共 10 个组成部分。", "topic": "t2"}, {"num": "Q31", "star": false, "q": "在 Phase A 中，完成利益相关者分析的主要目的是什么？", "opts": {"A": "确定项目预算", "B": "识别各方关切（Concern），确保目标架构能够回应所有关键利益相关者的关切", "C": "分配项目团队成员", "D": "确定技术平台选型"}, "ans": "B", "exp": "利益相关者分析是 Phase A 的关键活动，目的是：识别谁受到架构影响（利益相关者）、他们各自的关切（Concern）是什么、如何用架构视图（View）回应这些关切。这是构建 Architecture Vision 文档的基础。", "topic": "t2"}, {"num": "Q32", "star": false, "q": "关于 Phase C 中数据架构和应用架构的关系，以下哪个说法正确？", "opts": {"A": "两者完全独立，可以并行开发", "B": "数据架构的逻辑数据组件映射到应用架构的逻辑应用组件", "C": "应用架构决定数据架构", "D": "两者都由技术架构（Phase D）决定"}, "ans": "B", "exp": "在 Phase C 中，数据架构定义了需要管理的数据实体和关系（逻辑数据模型），这些数据组件随后在应用架构中被映射到负责处理/管理它们的应用组件上。应用程序\"服务于\"数据，而不是反过来，这就是为什么数据架构先于应用架构。", "topic": "t2"}, {"num": "Q33", "star": false, "q": "以下哪个活动属于 Phase B 但不属于 Phase D？", "opts": {"A": "差距分析（Gap Analysis）", "B": "利益相关者视图开发", "C": "业务流程建模", "D": "目标架构定义"}, "ans": "C", "exp": "业务流程建模（Business Process Modeling）是业务架构（Phase B）特有的活动，关注人、组织、流程的协作方式。Phase D（技术架构）关注的是技术平台和技术服务，不涉及业务流程。差距分析和目标架构定义在所有 Phase 中都有。", "topic": "t2"}, {"num": "Q34", "star": true, "q": "TOGAF 中，Artifact（制品）、Deliverable（交付物）、Building Block（构建块）的核心区别是什么？", "opts": {"A": "三者没有区别，只是翻译不同", "B": "Artifact 是架构工作产品；Deliverable 是正式提交审查/签字的文档；Building Block 是可重用的架构组件", "C": "Deliverable 是内部使用的，Artifact 是外部提交的", "D": "Building Block 只用于技术架构"}, "ans": "B", "exp": "三者区别是高频考点：Artifact（制品）是架构开发过程中产生的具体工作产品，如图表、目录、矩阵，可以是非正式的；Deliverable（交付物）是正式的、需要经过审批签字的文件，如 Architecture Vision 文档、Architecture Definition Document；Building Block（构建块）是可重用的架构组件，分为 ABB（Architecture Building Block，抽象）和 SBB（Solution Building Block，具体实现）。", "topic": "t3"}, {"num": "Q35", "star": true, "q": "TOGAF 的制品（Artifacts）分为哪三类？", "opts": {"A": "Policies / Procedures / Guidelines", "B": "Catalogs / Matrices / Diagrams", "C": "Models / Views / Viewpoints", "D": "Input / Output / Deliverable"}, "ans": "B", "exp": "TOGAF 制品三类型：Catalogs（目录，如应用目录、数据实体目录）、Matrices（矩阵，如应用/数据矩阵、业务交互矩阵）、Diagrams（图表，如业务流程图、应用通信图、技术架构图）。这三类制品覆盖了从\"列举\"到\"关系\"到\"可视化\"的不同需求。", "topic": "t3"}, {"num": "Q36", "star": false, "q": "ABB（Architecture Building Block）和 SBB（Solution Building Block）的核心区别是什么？", "opts": {"A": "ABB 用于技术架构，SBB 用于业务架构", "B": "ABB 是抽象的架构规格（描述需要什么），SBB 是具体的实现方案（描述如何实现）", "C": "ABB 在目标架构中使用，SBB 在当前架构中使用", "D": "两者完全相同，只是叫法不同"}, "ans": "B", "exp": "ABB（Architecture Building Block）是抽象的、技术无关的描述，定义架构\"应该能做什么\"（功能和接口规格）；SBB（Solution Building Block）是具体的实现，描述\"用什么来实现\"（具体产品、系统、服务）。例如：ABB = \"邮件服务\"，SBB = \"Microsoft Exchange Server 2019\"。", "topic": "t3"}, {"num": "Q37", "star": true, "q": "以下哪个是 Deliverable（交付物）而非 Artifact（制品）？", "opts": {"A": "Business Capability Map（业务能力图）", "B": "Application Communication Diagram（应用通信图）", "C": "Architecture Vision Document（架构愿景文档）", "D": "Data Entity/Data Component Catalog（数据实体目录）"}, "ans": "C", "exp": "Architecture Vision Document 是正式的交付物，需要经过审批和签字，是 Phase A 的核心输出，对外提交给赞助方。其余三个选项（业务能力图、应用通信图、数据实体目录）都是制品（Artifacts），是架构开发过程中的工作产品，不一定需要正式签字。", "topic": "t3"}, {"num": "Q38", "star": false, "q": "Architecture Repository（架构库）中存储哪些类型的内容？", "opts": {"A": "只存储已完成的架构文档", "B": "架构元模型、参考库、标准信息库、治理日志、架构景观、解决方案库", "C": "只存储 Building Blocks", "D": "只存储历史架构版本"}, "ans": "B", "exp": "TOGAF 定义 Architecture Repository 包含六类内容：① Architecture Metamodel（架构元模型）② Architecture Capability（架构能力）③ Architecture Landscape（架构景观，含当前/过渡/目标架构）④ Standards Information Base（标准信息库）⑤ Reference Library（参考库）⑥ Governance Log（治理日志）。", "topic": "t3"}, {"num": "Q39", "star": false, "q": "View（视图）和 Viewpoint（视点）的关系是什么？", "opts": {"A": "两者完全相同，都是利益相关者看到的内容", "B": "Viewpoint 是模板（定义如何描述），View 是基于 Viewpoint 针对特定系统生成的实例", "C": "View 是模板，Viewpoint 是实例", "D": "Viewpoint 只用于技术架构，View 用于所有架构域"}, "ans": "B", "exp": "Viewpoint（视点）是一种模板或规则，定义了特定关注点应该如何被描述（包含哪些元素、使用什么符号）；View（视图）是将这个模板应用到具体系统后生成的实际描述。比喻：Viewpoint = 相机型号和拍摄规则；View = 用这台相机拍出来的具体照片。", "topic": "t3"}, {"num": "Q40", "star": false, "q": "Architecture Landscape（架构景观）包含哪三个级别？", "opts": {"A": "Strategic / Tactical / Operational", "B": "Strategic / Segment / Capability", "C": "Foundation / Industry / Enterprise", "D": "Current / Transition / Target"}, "ans": "B", "exp": "Architecture Landscape 有三个级别：① Strategic Architecture（战略架构，整个企业的高层次视图）② Segment Architecture（段架构，业务线/部门级别的详细视图）③ Capability Architecture（能力架构，特定能力的专项架构）。这与 Architecture Continuum 的四层次不同，请注意区分。", "topic": "t3"}, {"num": "Q41", "star": false, "q": "下列哪项不属于 Architecture Content Framework 的范畴？", "opts": {"A": "制品（Artifacts）的分类", "B": "架构交付物（Deliverables）的定义", "C": "建筑构建块（Building Blocks）的描述", "D": "架构师的薪资标准"}, "ans": "D", "exp": "Architecture Content Framework 定义了架构工作产品的结构和分类，包括：制品（Artifacts，分为目录/矩阵/图表）、交付物（Deliverables）、构建块（Building Blocks，包括 ABB 和 SBB）。它是 TOGAF 关于\"架构产出物应该是什么\"的规范框架。薪资标准显然不在其范畴内。", "topic": "t3"}, {"num": "Q42", "star": true, "q": "Enterprise Continuum（企业连续体）从左到右的四个层次顺序是什么？", "opts": {"A": "Organization-Specific → Industry → Common Systems → Foundation", "B": "Foundation → Common Systems → Industry → Organization-Specific", "C": "Generic → Specific → Industry → Enterprise", "D": "Tactical → Strategic → Operational → Governance"}, "ans": "B", "exp": "Enterprise Continuum 从左到右，越来越具体（Generic → Specific）：Foundation Architecture（基础架构，最通用，如 TOGAF TRM）→ Common Systems Architecture（通用系统架构，跨行业通用，如安全架构模式）→ Industry Architecture（行业架构，如制造业参考架构）→ Organization-Specific Architecture（组织专有架构，最具体）。方向：从抽象到具体，从通用到专有。", "topic": "t4"}, {"num": "Q43", "star": false, "q": "TOGAF 中，TRM（Technical Reference Model）的主要用途是什么？", "opts": {"A": "定义业务流程的标准模板", "B": "提供技术服务和技术标准的通用分类框架，作为技术架构开发的参考", "C": "管理架构项目的时间线", "D": "定义应用系统之间的集成标准"}, "ans": "B", "exp": "TRM 是 TOGAF Foundation Architecture 的核心组成部分，提供了一个技术服务的分类体系（如数据管理服务、通信服务、安全服务等），帮助组织：标准化技术选型、与行业标准对齐、为 Phase D 提供参考基础。", "topic": "t4"}, {"num": "Q44", "star": false, "q": "III-RM（Integrated Information Infrastructure Reference Model）主要关注什么？", "opts": {"A": "网络基础设施", "B": "在企业范围内实现无缝信息流的应用程序间互操作性", "C": "数据库管理系统", "D": "安全架构"}, "ans": "B", "exp": "III-RM 是 TOGAF Foundation Architecture 的另一个参考模型，专门关注企业信息基础设施的集成，特别是应用程序之间如何实现信息互操作（Interoperability）。它提供了一个参考架构，帮助设计\"所有应用都能互通\"的信息基础设施。", "topic": "t4"}, {"num": "Q45", "star": false, "q": "Architecture Repository 中的 Standards Information Base（标准信息库）存储什么？", "opts": {"A": "架构原则", "B": "组织认可和批准使用的技术标准、产品和规范清单", "C": "历史架构决策记录", "D": "架构师的工作日志"}, "ans": "B", "exp": "Standards Information Base 是 Architecture Repository 的一个组成部分，存储组织批准使用的技术标准，包括：开放标准（ISO、IEEE等）、供应商标准（SAP ABAP、Java EE等）、内部制定的技术规范。Phase D 开发技术架构时参考这个库选择符合标准的技术组件。", "topic": "t4"}, {"num": "Q46", "star": false, "q": "Enterprise Continuum 中的 Architecture Continuum 和 Solutions Continuum 有什么关系？", "opts": {"A": "两者完全相同", "B": "Architecture Continuum 描述架构（抽象），Solutions Continuum 描述实现（具体），两者平行且相互对应", "C": "Solutions Continuum 包含 Architecture Continuum", "D": "Architecture Continuum 在 Solutions Continuum 之后发展"}, "ans": "B", "exp": "Enterprise Continuum = Architecture Continuum + Solutions Continuum。两者平行对应：Architecture Continuum 从基础架构到组织专有架构（抽象层）；Solutions Continuum 从通用产品/服务到组织特定解决方案（具体实现层）。ABB 属于 Architecture Continuum，SBB 属于 Solutions Continuum。", "topic": "t4"}, {"num": "Q47", "star": false, "q": "以下哪项最能描述 Architecture Governance（架构治理）的核心功能？", "opts": {"A": "替代项目管理功能", "B": "确保架构活动符合组织战略，管理架构完整性，处理架构偏差", "C": "负责技术基础设施的运营维护", "D": "只在 Phase G 中发挥作用"}, "ans": "B", "exp": "架构治理是一套持续的管理机制，核心功能：确保架构与战略对齐、维护架构的完整性和质量、审查架构合规性、处理变更请求和豁免申请。它不仅在 Phase G，而是贯穿整个 ADM 的治理保障机制。", "topic": "t4"}, {"num": "Q48", "star": true, "q": "Architecture Board（架构委员会）的主要职责是什么？", "opts": {"A": "负责编写架构文档", "B": "提供跨整个组织的架构合规监督，审查并批准架构工作，解决架构冲突", "C": "执行技术实施工作", "D": "管理 IT 基础设施的日常运营"}, "ans": "B", "exp": "Architecture Board 是架构治理的核心机构，职责包括：批准架构文档、确保架构合规、解决架构争议、管理架构原则、审查架构豁免请求。Architecture Board 通常由来自业务和 IT 的高层代表组成，具有正式授权。", "topic": "t5"}, {"num": "Q49", "star": true, "q": "Architecture Compliance（架构合规）的四个级别是什么？", "opts": {"A": "Excellent / Good / Fair / Poor", "B": "Conformant / Compliant / Non-Conformant / Irrelevant", "C": "Approved / Pending / Rejected / Waived", "D": "Full / Partial / Minimal / None"}, "ans": "B", "exp": "TOGAF 定义四个合规级别：Conformant（一致，完全符合架构要求）、Compliant（合规，实质性符合，有轻微偏差）、Non-Conformant（不合规，存在重大偏差，需要豁免或修正）、Irrelevant（不相关，该架构要求对此项目不适用）。这是 Level 1+2 双考点。", "topic": "t5"}, {"num": "Q50", "star": false, "q": "Architecture Contract（架构合同）的主要目的是什么？", "opts": {"A": "与外部供应商签订的采购合同", "B": "架构团队与开发/实施团队之间的正式协议，定义架构服务水平和合规要求", "C": "架构师的薪酬合同", "D": "技术许可协议"}, "ans": "B", "exp": "Architecture Contract 是架构团队与利益相关者（如开发团队、业务部门）之间的正式书面协议，内容包括：将要交付的架构工作产品、架构质量标准、合规要求、验收标准。它确保各方对架构目标和约束条件的共同理解和承诺。", "topic": "t5"}, {"num": "Q51", "star": false, "q": "架构原则（Architecture Principle）的 5 个组成要素是什么？", "opts": {"A": "Goal / Objective / Policy / Standard / Guideline", "B": "Name / Statement / Rationale / Implications / Metrics", "C": "Title / Description / Owner / Date / Version", "D": "Requirement / Constraint / Assumption / Risk / Issue"}, "ans": "B", "exp": "TOGAF 定义架构原则的 5 要素：Name（名称，简短易记）、Statement（声明，一句话表述原则内容）、Rationale（依据，说明为什么需要这条原则，即业务理由）、Implications（影响，说明遵循此原则的代价和要求）、Metrics（度量，如何衡量是否遵循了此原则）。其中 Rationale 是\"为什么\"，是高频考点。", "topic": "t5"}, {"num": "Q52", "star": false, "q": "在 Preliminary Phase 中，Architecture Principles 的主要来源是什么？", "opts": {"A": "随机制定，根据架构师个人经验", "B": "从组织业务原则、IT 战略、以及 TOGAF 原则示例中衍生", "C": "仅从行业标准中采用", "D": "由 Architecture Board 独立制定，无需参考现有文件"}, "ans": "B", "exp": "架构原则来源多元：业务原则（Business Principles，来自公司战略和业务规则）、TOGAF 参考原则（TOGAF 提供了一套示范原则供参考）、IT 战略文件、以及现有政策法规。制定原则是 Preliminary Phase 的核心工作之一，需要各层级利益相关者的输入。", "topic": "t5"}, {"num": "Q53", "star": false, "q": "Capability Architecture（能力架构）关注什么？", "opts": {"A": "整个企业的战略方向", "B": "业务线或部门级别的架构", "C": "特定业务能力（如采购能力、制造能力）的详细架构设计", "D": "技术基础设施的详细规格"}, "ans": "C", "exp": "Architecture Landscape 的三个级别：Strategic（战略，企业全局）、Segment（段，业务线/部门）、Capability（能力，具体业务能力的专项架构）。Capability Architecture 是最细粒度的，专注于支撑特定业务能力（如\"供应链能力\"或\"客户服务能力\"）所需的架构。", "topic": "t5"}, {"num": "Q54", "star": true, "q": "Stakeholder（利益相关者）在 TOGAF 中的定义是什么？", "opts": {"A": "项目的资金提供者", "B": "对系统有兴趣或关切的个人、团队或组织，包括项目内部和外部", "C": "只包括 C 级高管", "D": "只包括 IT 部门人员"}, "ans": "B", "exp": "TOGAF 对利益相关者的定义非常宽泛，涵盖：内部（管理层、业务用户、IT团队）和外部（客户、监管机构、供应商）对架构有利益关系的任何方。利益相关者分析是 Phase A 的关键活动，识别\"谁关心什么\"是构建架构愿景的基础。", "topic": "t6"}, {"num": "Q55", "star": true, "q": "Concern（关切）在 TOGAF 中是指什么？", "opts": {"A": "项目的风险清单", "B": "利益相关者关于系统某方面的兴趣、期望或担忧", "C": "合规性问题", "D": "预算超支问题"}, "ans": "B", "exp": "Concern 是特定利益相关者对系统的某个方面所持有的兴趣、期望或担忧。架构工作的核心价值之一就是识别并\"回应\"各利益相关者的 Concern。例如：CFO 的 Concern 是\"系统是否能降低财务报告成本\"；CIO 的 Concern 是\"新系统是否能与现有基础设施集成\"。", "topic": "t6"}, {"num": "Q56", "star": false, "q": "View（视图）在 TOGAF 中的定义是什么？", "opts": {"A": "系统的完整技术文档", "B": "从特定 Viewpoint 出发，对某个系统或部分系统的描述", "C": "利益相关者的个人意见", "D": "架构图表的集合"}, "ans": "B", "exp": "View 是根据特定 Viewpoint 规则，对系统特定方面的正式描述。View 专门用于回应特定利益相关者的 Concern。一个系统可以有多个 View（如业务视图、技术视图、安全视图），每个 View 针对不同受众的关切。", "topic": "t6"}, {"num": "Q57", "star": false, "q": "利益相关者管理矩阵（Power/Interest Grid）中，\"高权力/低兴趣\"的利益相关者应如何管理？", "opts": {"A": "密切沟通，频繁更新", "B": "保持满意（Keep Satisfied），定期简报但无需深度参与", "C": "最小程度关注", "D": "让其主导所有架构决策"}, "ans": "B", "exp": "Power/Interest Grid 四象限策略：高权力+低兴趣 → Keep Satisfied（满足他们，以防他们有负面反应）；高权力+高兴趣 → Manage Closely（密切管理）；低权力+高兴趣 → Keep Informed（保持告知）；低权力+低兴趣 → Monitor（最小关注）。", "topic": "t6"}, {"num": "Q58", "star": false, "q": "利益相关者矩阵（Stakeholder Map）的主要用途是什么？", "opts": {"A": "决定架构团队的人员招募", "B": "识别并记录所有利益相关者、其权力/兴趣级别、关切，以指导架构沟通策略", "C": "记录技术债务", "D": "管理项目预算分配"}, "ans": "B", "exp": "Stakeholder Map 是 Phase A 的关键工具，用于：系统性识别所有受影响方、评估其权力和关注度、了解其关切（Concern）、制定差异化的沟通和参与策略。它确保架构工作不会忽视关键利益相关者，从而提高架构的接受度。", "topic": "t6"}, {"num": "Q59", "star": false, "q": "当不同利益相关者的 Concern 相互冲突时，架构师应如何处理？", "opts": {"A": "优先满足最高层级管理者的 Concern，忽略其他", "B": "通过透明沟通、权衡分析，寻求经过正式治理机制批准的折中方案", "C": "采用投票机制决定", "D": "将冲突搁置，先完成其他工作"}, "ans": "B", "exp": "TOGAF 强调架构治理的重要性：冲突不应被忽视或简单专制解决。正确方式是：识别并记录冲突、分析各方 Concern 的优先级、提出折中方案、通过 Architecture Board 等正式治理机制做出裁决并记录决策依据。", "topic": "t6"}, {"num": "Q60", "star": true, "q": "Gap Analysis（差距分析）在 TOGAF ADM 中的主要目的是什么？", "opts": {"A": "确定项目预算缺口", "B": "识别当前架构（Baseline）和目标架构（Target）之间的差异，为迁移计划提供输入", "C": "评估团队技能水平", "D": "比较不同供应商产品"}, "ans": "B", "exp": "Gap Analysis 是 TOGAF 中将 Baseline（当前状态）与 Target（目标状态）进行比较的分析工具，产出四类差异：新增（Add，目标有但当前没有）、保留（Retain，当前有且目标也要保留）、去除（Eliminate，当前有但目标要去掉）、迁移（Migrate，当前有但需要改造才能满足目标）。这个结果直接驱动 Phase E 的工作包定义。", "topic": "t7"}]}, "L9_1": {"type": "reading", "title": "📖 案例背景：公司简介 & 战略挑战", "html": "<h2 id=\"第一章-公司背景与战略挑战\">第一章：公司背景与战略挑战</h2>\n<h3 id=\"1-1-华锐汽车零部件集团简介\">1.1 华锐汽车零部件集团简介</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>公司名称</td><td>华锐汽车零部件集团（Huarui Auto Components Group）</td></tr>\n<tr><td>行业</td><td>汽车零部件制造（Tier 1供应商）</td></tr>\n<tr><td>生产基地</td><td>8个（山东总部×1、上海×2、武汉×1、重庆×1、成都×1、泰国曼谷×1、墨西哥蒙特雷×1）</td></tr>\n<tr><td>员工规模</td><td>12,000人</td></tr>\n<tr><td>营收规模</td><td>约65亿元人民币（2025年）</td></tr>\n<tr><td>主要客户</td><td>一汽集团、东风汽车、比亚迪、上汽通用五菱、泰国Toyota</td></tr>\n<tr><td>主要产品</td><td>发动机零部件、新能源汽车电驱系统、底盘件、车身结构件</td></tr>\n<tr><td>信息化现状</td><td>SAP ECC 6.0（已运行11年）+ 6套独立MES + 独立CRM + Excel财务报表</td></tr>\n<tr><td>SAP模块</td><td>FICO、SD、MM、PP、QM、PM</td></tr>\n</table></div>\n<h3 id=\"1-2-战略背景与触发因素\">1.2 战略背景与触发因素</h3>\n<p><strong>外部压力：</strong></p>\n<ul>\n<li>新能源转型：比亚迪要求所有Tier 1供应商2027年前完成数字化能力认证（IATF 16949数字化版）</li>\n<li>碳合规：欧盟CBAM碳边境调节机制2026年正式落地，墨西哥工厂出口零部件需提交碳足迹报告</li>\n<li>竞争压力：同类供应商如万丰奥威已完成S/4HANA升级，月结报告T+3 vs 华锐T+15</li>\n</ul>\n<p><strong>内部痛点：</strong></p>\n<ul>\n<li>集团管控薄弱：8个生产基地各自维护独立系统，月度合并报表需手工汇总，耗时15天</li>\n<li>数据孤岛：6套不同品牌MES系统，物料编码有7个写入点，同一零件在不同系统有不同编码</li>\n<li>库存效率低：库存周转率7.2次/年，低于行业均值9.5次（差距30%），资金占用约4.2亿元</li>\n<li>生产计划精度差：排产计划依赖Excel，频繁缺料停线，年停线损失约1.2亿元</li>\n</ul>\n<p><strong>战略决策：</strong></p>\n<p>董事会2026年1月批准&quot;华锐数字化转型2026-2028三年规划&quot;，正式引入TOGAF方法论驱动企业架构重构。</p>\n<hr>\n<h2 id=\"第二章-Preliminary-Phase-架构能力建设\">第二章：Preliminary Phase — 架构能力建设</h2>\n<h3 id=\"2-1-架构团队与Architecture-Board\">2.1 架构团队与Architecture Board</h3>\n<p><strong>架构团队（Enterprise Architecture Team）：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>角色</th><th>人员</th><th>背景</th></tr>\n<tr><td>首席架构师（CAE）</td><td>张明宇（外聘顾问）</td><td>TOGAF 10认证，前SAP顾问15年</td></tr>\n<tr><td>业务架构师</td><td>李华（内部，供应链VP兼任）</td><td>MBA + 制造业20年</td></tr>\n<tr><td>应用架构师</td><td>王建国（内部，IT总监）</td><td>信息系统硕士，SAP认证顾问</td></tr>\n<tr><td>数据架构师</td><td>陈婷（内部，数据中台负责人）</td><td>数据工程10年</td></tr>\n<tr><td>技术架构师</td><td>刘强（外聘）</td><td>云计算架构师，AWS/Azure认证</td></tr>\n<tr><td>SAP解决方案架构师</td><td>赵磊（SAP委派）</td><td>S/4HANA实施专家</td></tr>\n</table></div>\n<p><strong>Architecture Board（架构委员会）：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>成员</th><th>角色</th><th>职权</th></tr>\n<tr><td>王大明（董事长）</td><td>赞助人</td><td>最终批准</td></tr>\n<tr><td>黄晓峰（CFO）</td><td>财务代表</td><td>批准预算相关架构决策</td></tr>\n<tr><td>李华（供应链VP）</td><td>业务代表</td><td>批准供应链/制造相关架构</td></tr>\n<tr><td>王建国（IT总监）</td><td>IT代表</td><td>批准技术选型</td></tr>\n<tr><td>张明宇（CAE）</td><td>秘书长</td><td>架构评审执行</td></tr>\n<tr><td>吴俊（泰国工厂GM）</td><td>海外代表</td><td>海外架构合规</td></tr>\n</table></div>\n<p>Board会议频率：每月一次常规会议 + 关键里程碑特别会议</p>\n<h3 id=\"2-2-架构原则目录-Architecture-Principles-Catalog-\">2.2 架构原则目录（Architecture Principles Catalog）</h3>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>原则名称</th><th>类别</th><th>Statement（陈述）</th><th>Rationale（理由）</th><th>Implications（影响）</th></tr>\n<tr><td>BP-01</td><td>业务驱动</td><td>业务原则</td><td>所有IT投资决策必须有明确的业务价值和业务需求作为依据</td><td>确保IT投资与数字化转型战略目标一致，避免技术导向的&quot;建了没用&quot;</td><td>需要业务部门主导需求提出，IT部门配合实现</td></tr>\n<tr><td>BP-02</td><td>客户优先</td><td>业务原则</td><td>架构设计应优先支持提升对主机厂客户的响应速度和交付质量</td><td>一汽/比亚迪等客户的认证要求是华锐生存的核心依赖</td><td>供应链协同架构必须支持与客户系统的实时数据交换</td></tr>\n<tr><td>BP-03</td><td>合规内嵌</td><td>业务原则</td><td>碳排放追踪、IATF认证、海外法规合规能力必须内嵌到架构设计中，不得事后补丁</td><td>CBAM合规截止日期2026年，事后改造成本是设计阶段的5-8倍</td><td>数据架构必须从一开始包含碳足迹数据模型</td></tr>\n<tr><td>IS-01</td><td>数据统一</td><td>信息系统原则</td><td>每个数据实体有且仅有一个权威数据源（Single Source of Truth），其他系统只读取不写入</td><td>当前6套MES各自维护物料数据导致的错误是停线损失的主因</td><td>必须实施MDG主数据治理，各系统写入权限需重新设计</td></tr>\n<tr><td>IS-02</td><td>接口标准化</td><td>信息系统原则</td><td>所有系统间集成必须通过SAP CPI或批准的API网关，禁止点对点数据库直连</td><td>点对点连接导致当前系统难以维护和升级，任何一个系统变更都影响多个系统</td><td>现有点对点接口需要在实施过程中逐步改造</td></tr>\n<tr><td>IS-03</td><td>实时可见</td><td>信息系统原则</td><td>核心业务数据（库存、生产进度、质量数据）应支持实时或近实时查询</td><td>管理层目前依赖T+1的批处理报表，无法支撑快速决策</td><td>技术架构需要支持SAP HANA的实时分析能力</td></tr>\n<tr><td>IS-04</td><td>数据安全</td><td>信息系统原则</td><td>客户技术数据、BOM数据、定价数据必须按照最高级别加密存储和传输</td><td>主机厂技术数据泄露将导致合同终止，华锐存在法律和商业双重风险</td><td>所有系统需接入统一IAM（身份访问管理）平台</td></tr>\n<tr><td>IS-05</td><td>移动优先</td><td>信息系统原则</td><td>关键业务操作（生产指令、质量检验、设备报修）必须支持移动端</td><td>12,000名员工中8,000名为一线工人，PC访问受限</td><td>前端应用开发需采用响应式或移动优先设计</td></tr>\n<tr><td>TP-01</td><td>云优先</td><td>技术原则</td><td>新建应用和系统优先采用云原生或云托管方式，本地部署需书面说明理由</td><td>降低IT基础设施建设和运维成本，支持全球8个基地的统一接入</td><td>需要建立云安全框架和数据主权合规方案（泰国/墨西哥）</td></tr>\n<tr><td>TP-02</td><td>标准优于定制</td><td>技术原则</td><td>优先采用SAP标准功能，定制开发（ABAP）需经Architecture Board批准</td><td>S/4HANA升级路径中，自定义代码是最大的迁移风险，当前ECC中Z程序超过1,800个</td><td>业务流程需要适配SAP标准，而非反过来改造SAP</td></tr>\n<tr><td>TP-03</td><td>高可用设计</td><td>技术原则</td><td>核心生产系统（ERP/MES）可用性目标99.9%，计划外停机不超过8.7小时/年</td><td>任何一个工厂的系统停机将直接导致停线，日损失约350万元</td><td>需要灾备架构、自动故障切换，以及详细的RTO/RPO计划</td></tr>\n</table></div>\n<h3 id=\"2-3-ADM定制-Tailored-ADM-\">2.3 ADM定制（Tailored ADM）</h3>\n<p>华锐将标准TOGAF ADM裁剪如下：</p>\n<div class=\"tbl\"><table>\n<tr><th>定制项</th><th>标准ADM</th><th>华锐定制版</th><th>理由</th></tr>\n<tr><td>迭代层次</td><td>单一ADM循环</td><td>两个并行循环：战略架构（18个月）+ 制造能力架构（9个月先行）</td><td>生产业务不能等待18个月总体架构完成</td></tr>\n<tr><td>Phase C顺序</td><td>先数据后应用</td><td>保持TOGAF标准顺序</td><td>数据统一是最核心问题，维持原顺序</td></tr>\n<tr><td>Phase G粒度</td><td>项目级监督</td><td>增加工厂级合规检查（每个工厂独立检查点）</td><td>8个工厂实施进度不同，需要分开监督</td></tr>\n<tr><td>Phase H触发机制</td><td>人工提交变更请求</td><td>增加自动监控触发（关键指标偏离预设阈值自动触发评估）</td><td>规模大，人工提交不及时</td></tr>\n<tr><td>需求管理工具</td><td>文档化</td><td>使用SAP Solution Manager + Azure DevOps双轨管理</td><td>与实施工具对接</td></tr>\n</table></div>\n<h3 id=\"2-4-Preliminary-Phase-交付物清单\">2.4 Preliminary Phase 交付物清单</h3>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>描述</th><th>责任人</th><th>状态</th></tr>\n<tr><td>Architecture Principles Catalog</td><td>11条架构原则，含5要素</td><td>CAE张明宇</td><td>已批准</td></tr>\n<tr><td>Architecture Board Charter</td><td>委员会章程，含权限范围和运作规则</td><td>CAE + CFO</td><td>已批准</td></tr>\n<tr><td>Tailored ADM Documentation</td><td>定制ADM流程说明</td><td>CAE</td><td>已批准</td></tr>\n<tr><td>Architecture Repository初始设置</td><td>工具选型（SAP LeanIX）+ 初始结构</td><td>IT总监</td><td>已完成</td></tr>\n<tr><td>Architecture Governance Framework</td><td>治理流程、审批权限矩阵</td><td>CAE</td><td>已批准</td></tr>\n<tr><td>RACI Matrix for Architecture Work</td><td>架构工作的角色责任矩阵</td><td>CAE</td><td>已批准</td></tr>\n</table></div>\n<hr>\n<h2 id=\"第三章-Phase-A-架构愿景-Architecture-Vision-\">第三章：Phase A — 架构愿景（Architecture Vision）</h2>\n<h3 id=\"3-1-利益相关者分析矩阵\">3.1 利益相关者分析矩阵</h3>\n<div class=\"tbl\"><table>\n<tr><th>利益相关者</th><th>角色</th><th>权力(H/M/L)</th><th>兴趣(H/M/L)</th><th>管理策略</th><th>主要关切（Concern）</th></tr>\n<tr><td>王大明（董事长）</td><td>项目赞助人</td><td>H</td><td>M</td><td>Keep Satisfied</td><td>投资回报、战略目标达成、董事会汇报</td></tr>\n<tr><td>黄晓峰（CFO）</td><td>财务决策者</td><td>H</td><td>H</td><td>Manage Closely</td><td>月结效率、集团合并报表、财务合规、预算控制</td></tr>\n<tr><td>李华（供应链VP）</td><td>业务主导</td><td>H</td><td>H</td><td>Manage Closely</td><td>库存周转率、停线频率、与客户系统的数据交换</td></tr>\n<tr><td>王建国（IT总监）</td><td>IT决策者</td><td>M</td><td>H</td><td>Manage Closely</td><td>系统稳定性、技术债务清除、团队能力建设</td></tr>\n<tr><td>吴俊（泰国工厂GM）</td><td>海外代表</td><td>M</td><td>H</td><td>Keep Informed</td><td>CBAM合规、泰国本地法规、系统切换期业务连续性</td></tr>\n<tr><td>陈磊（生产总监）</td><td>制造代表</td><td>M</td><td>H</td><td>Keep Informed</td><td>生产排产准确率、MES统一化、停线风险</td></tr>\n<tr><td>比亚迪采购代表</td><td>关键客户</td><td>M</td><td>M</td><td>Keep Satisfied</td><td>供应商数字化认证、实时交货状态查询</td></tr>\n<tr><td>一线工人代表</td><td>最终用户</td><td>L</td><td>H</td><td>Keep Informed</td><td>系统易用性、移动端支持、培训充分性</td></tr>\n<tr><td>SAP顾问团队</td><td>实施合作伙伴</td><td>L</td><td>H</td><td>Keep Informed</td><td>项目范围清晰、决策响应速度、技术规格确认</td></tr>\n<tr><td>泰国/墨西哥合规顾问</td><td>外部专家</td><td>L</td><td>M</td><td>Monitor</td><td>CBAM、海外税法要求的系统支持</td></tr>\n</table></div>\n<h3 id=\"3-2-架构愿景声明\">3.2 架构愿景声明</h3>\n<p><strong>一句话愿景：</strong></p>\n<blockquote><p>&quot;通过统一的企业架构平台，将华锐从依赖孤立系统的传统制造商转型为数据驱动的智能制造服务商，支撑8个全球基地的实时协同，实现月结T+3、库存周转率提升至10次/年、碳足迹全链路追踪。&quot;</p></blockquote>\n<p><strong>高层架构愿景图（概念示意）：</strong></p>\n<pre><code>┌─────────────────────────────────────────────────────────────┐\n│              华锐数字化转型目标架构（TO-BE 2028）              │\n├─────────────────────────────────────────────────────────────┤\n│  客户门户层  │ 比亚迪/一汽/Toyota 客户系统实时数据交换接口     │\n├─────────────────────────────────────────────────────────────┤\n│  应用层      │ SAP S/4HANA PCE（核心ERP）                    │\n│              │ 统一MES平台（替代6套独立系统）                 │\n│              │ SAC（管理分析）  │ MDG（主数据治理）           │\n├─────────────────────────────────────────────────────────────┤\n│  集成层      │ SAP CPI（统一集成总线）                        │\n│              │ API Gateway（外部接口管理）                    │\n├─────────────────────────────────────────────────────────────┤\n│  数据层      │ SAP HANA（实时数据库）                         │\n│              │ 数据湖（IoT/MES历史数据）                      │\n│              │ 碳足迹数据仓库                                 │\n├─────────────────────────────────────────────────────────────┤\n│  基础设施层  │ SAP PCE（私有云，德国Frankfurt数据中心）        │\n│              │ 各工厂本地网络优化 + 海外工厂VPN               │\n└─────────────────────────────────────────────────────────────┘</code></pre>\n<h3 id=\"3-3-价值链图-Value-Chain-Diagram-\">3.3 价值链图（Value Chain Diagram）</h3>\n<p><strong>主要活动（Primary Activities）：</strong></p>\n<pre><code>原材料采购 → 入库与库存管理 → 生产制造 → 质量检验 → 出库配送 → 客户服务\n(MM/SRM)    (MM/EWM)         (PP/MES)   (QM)       (SD/EWM)   (CRM/SD)\n    ↑               ↑               ↑           ↑          ↑          ↑\n                        支持活动（Support Activities）\n├── 集团财务管控（FICO/Group Reporting）—— 横贯所有主要活动\n├── 人力资源管理（SuccessFactors规划）—— 横贯所有主要活动\n├── 技术研发（PLM集成）—— 支持产品开发和生产工艺\n├── 数据与IT基础设施（SAP PCE + 统一MES + CPI）—— 横贯所有主要活动\n└── 合规管理（碳排放/IATF/海外法规）—— 横贯所有主要活动</code></pre>\n<p><strong>价值链分析结论：</strong> 华锐当前最大的价值链断裂点在&quot;生产制造→质量检验→出库配送&quot;的数据流转环节，6套MES造成的数据孤岛直接影响下游环节的响应速度和准确性。</p>\n<h3 id=\"3-4-Statement-of-Architecture-Work-架构工作说明书-摘要\">3.4 Statement of Architecture Work（架构工作说明书）摘要</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>项目名称</td><td>华锐汽车零部件集团企业架构重构项目</td></tr>\n<tr><td>版本</td><td>v1.0</td></tr>\n<tr><td>批准日期</td><td>2026年2月15日</td></tr>\n<tr><td>批准人</td><td>董事长王大明（赞助人）</td></tr>\n</table></div>\n<p><strong>范围定义：</strong></p>\n<ul>\n<li><strong>组织范围：</strong> 集团总部 + 6个国内生产基地（全覆盖）+ 泰国工厂（Phase 1）+ 墨西哥工厂（Phase 2）</li>\n<li><strong>架构域范围：</strong> 全四域（Business / Application / Data / Technology）</li>\n<li><strong>时间范围：</strong> 2026年2月 — 2027年7月（18个月）</li>\n<li><strong>不在范围内：</strong> SuccessFactors HR系统（下一个ADM循环）、PLM深度集成（单独项目）</li>\n</ul>\n<p><strong>主要约束（Constraints）：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>约束编号</th><th>约束描述</th><th>来源</th></tr>\n<tr><td>C-01</td><td>项目总预算不超过8,500万元</td><td>董事会决议</td></tr>\n<tr><td>C-02</td><td>ECC系统必须在EOS（End of Maintenance，2027年12月）前完成迁移</td><td>SAP政策</td></tr>\n<tr><td>C-03</td><td>生产系统切换窗口仅限春节、国庆（工厂停产期）</td><td>生产要求</td></tr>\n<tr><td>C-04</td><td>泰国工厂数据不得存储于中国大陆服务器</td><td>泰国数据主权法</td></tr>\n<tr><td>C-05</td><td>碳排放数据架构必须支持CBAM报告格式（2026年底前）</td><td>欧盟法规</td></tr>\n</table></div>\n<p><strong>Phase A 交付物清单：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>状态</th></tr>\n<tr><td>Architecture Vision Document</td><td>已批准</td></tr>\n<tr><td>Statement of Architecture Work</td><td>已批准</td></tr>\n<tr><td>Stakeholder Map（利益相关者图谱）</td><td>已完成</td></tr>\n<tr><td>Value Chain Diagram（价值链图）</td><td>已完成</td></tr>\n<tr><td>Solution Concept Diagram（高层技术愿景图）</td><td>已完成</td></tr>\n<tr><td>Initial Architecture Requirements Specification</td><td>框架已完成</td></tr>\n<tr><td>Communication Plan（利益相关者沟通计划）</td><td>已批准</td></tr>\n</table></div>"}, "L9_2": {"type": "reading", "title": "📖 Preliminary — 架构能力建设 & 原则目录", "html": "<h2 id=\"第二章-Preliminary-Phase-架构能力建设\">第二章：Preliminary Phase — 架构能力建设</h2>\n<h3 id=\"2-1-架构团队与Architecture-Board\">2.1 架构团队与Architecture Board</h3>\n<p><strong>架构团队（Enterprise Architecture Team）：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>角色</th><th>人员</th><th>背景</th></tr>\n<tr><td>首席架构师（CAE）</td><td>张明宇（外聘顾问）</td><td>TOGAF 10认证，前SAP顾问15年</td></tr>\n<tr><td>业务架构师</td><td>李华（内部，供应链VP兼任）</td><td>MBA + 制造业20年</td></tr>\n<tr><td>应用架构师</td><td>王建国（内部，IT总监）</td><td>信息系统硕士，SAP认证顾问</td></tr>\n<tr><td>数据架构师</td><td>陈婷（内部，数据中台负责人）</td><td>数据工程10年</td></tr>\n<tr><td>技术架构师</td><td>刘强（外聘）</td><td>云计算架构师，AWS/Azure认证</td></tr>\n<tr><td>SAP解决方案架构师</td><td>赵磊（SAP委派）</td><td>S/4HANA实施专家</td></tr>\n</table></div>\n<p><strong>Architecture Board（架构委员会）：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>成员</th><th>角色</th><th>职权</th></tr>\n<tr><td>王大明（董事长）</td><td>赞助人</td><td>最终批准</td></tr>\n<tr><td>黄晓峰（CFO）</td><td>财务代表</td><td>批准预算相关架构决策</td></tr>\n<tr><td>李华（供应链VP）</td><td>业务代表</td><td>批准供应链/制造相关架构</td></tr>\n<tr><td>王建国（IT总监）</td><td>IT代表</td><td>批准技术选型</td></tr>\n<tr><td>张明宇（CAE）</td><td>秘书长</td><td>架构评审执行</td></tr>\n<tr><td>吴俊（泰国工厂GM）</td><td>海外代表</td><td>海外架构合规</td></tr>\n</table></div>\n<p>Board会议频率：每月一次常规会议 + 关键里程碑特别会议</p>\n<h3 id=\"2-2-架构原则目录-Architecture-Principles-Catalog-\">2.2 架构原则目录（Architecture Principles Catalog）</h3>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>原则名称</th><th>类别</th><th>Statement（陈述）</th><th>Rationale（理由）</th><th>Implications（影响）</th></tr>\n<tr><td>BP-01</td><td>业务驱动</td><td>业务原则</td><td>所有IT投资决策必须有明确的业务价值和业务需求作为依据</td><td>确保IT投资与数字化转型战略目标一致，避免技术导向的&quot;建了没用&quot;</td><td>需要业务部门主导需求提出，IT部门配合实现</td></tr>\n<tr><td>BP-02</td><td>客户优先</td><td>业务原则</td><td>架构设计应优先支持提升对主机厂客户的响应速度和交付质量</td><td>一汽/比亚迪等客户的认证要求是华锐生存的核心依赖</td><td>供应链协同架构必须支持与客户系统的实时数据交换</td></tr>\n<tr><td>BP-03</td><td>合规内嵌</td><td>业务原则</td><td>碳排放追踪、IATF认证、海外法规合规能力必须内嵌到架构设计中，不得事后补丁</td><td>CBAM合规截止日期2026年，事后改造成本是设计阶段的5-8倍</td><td>数据架构必须从一开始包含碳足迹数据模型</td></tr>\n<tr><td>IS-01</td><td>数据统一</td><td>信息系统原则</td><td>每个数据实体有且仅有一个权威数据源（Single Source of Truth），其他系统只读取不写入</td><td>当前6套MES各自维护物料数据导致的错误是停线损失的主因</td><td>必须实施MDG主数据治理，各系统写入权限需重新设计</td></tr>\n<tr><td>IS-02</td><td>接口标准化</td><td>信息系统原则</td><td>所有系统间集成必须通过SAP CPI或批准的API网关，禁止点对点数据库直连</td><td>点对点连接导致当前系统难以维护和升级，任何一个系统变更都影响多个系统</td><td>现有点对点接口需要在实施过程中逐步改造</td></tr>\n<tr><td>IS-03</td><td>实时可见</td><td>信息系统原则</td><td>核心业务数据（库存、生产进度、质量数据）应支持实时或近实时查询</td><td>管理层目前依赖T+1的批处理报表，无法支撑快速决策</td><td>技术架构需要支持SAP HANA的实时分析能力</td></tr>\n<tr><td>IS-04</td><td>数据安全</td><td>信息系统原则</td><td>客户技术数据、BOM数据、定价数据必须按照最高级别加密存储和传输</td><td>主机厂技术数据泄露将导致合同终止，华锐存在法律和商业双重风险</td><td>所有系统需接入统一IAM（身份访问管理）平台</td></tr>\n<tr><td>IS-05</td><td>移动优先</td><td>信息系统原则</td><td>关键业务操作（生产指令、质量检验、设备报修）必须支持移动端</td><td>12,000名员工中8,000名为一线工人，PC访问受限</td><td>前端应用开发需采用响应式或移动优先设计</td></tr>\n<tr><td>TP-01</td><td>云优先</td><td>技术原则</td><td>新建应用和系统优先采用云原生或云托管方式，本地部署需书面说明理由</td><td>降低IT基础设施建设和运维成本，支持全球8个基地的统一接入</td><td>需要建立云安全框架和数据主权合规方案（泰国/墨西哥）</td></tr>\n<tr><td>TP-02</td><td>标准优于定制</td><td>技术原则</td><td>优先采用SAP标准功能，定制开发（ABAP）需经Architecture Board批准</td><td>S/4HANA升级路径中，自定义代码是最大的迁移风险，当前ECC中Z程序超过1,800个</td><td>业务流程需要适配SAP标准，而非反过来改造SAP</td></tr>\n<tr><td>TP-03</td><td>高可用设计</td><td>技术原则</td><td>核心生产系统（ERP/MES）可用性目标99.9%，计划外停机不超过8.7小时/年</td><td>任何一个工厂的系统停机将直接导致停线，日损失约350万元</td><td>需要灾备架构、自动故障切换，以及详细的RTO/RPO计划</td></tr>\n</table></div>\n<h3 id=\"2-3-ADM定制-Tailored-ADM-\">2.3 ADM定制（Tailored ADM）</h3>\n<p>华锐将标准TOGAF ADM裁剪如下：</p>\n<div class=\"tbl\"><table>\n<tr><th>定制项</th><th>标准ADM</th><th>华锐定制版</th><th>理由</th></tr>\n<tr><td>迭代层次</td><td>单一ADM循环</td><td>两个并行循环：战略架构（18个月）+ 制造能力架构（9个月先行）</td><td>生产业务不能等待18个月总体架构完成</td></tr>\n<tr><td>Phase C顺序</td><td>先数据后应用</td><td>保持TOGAF标准顺序</td><td>数据统一是最核心问题，维持原顺序</td></tr>\n<tr><td>Phase G粒度</td><td>项目级监督</td><td>增加工厂级合规检查（每个工厂独立检查点）</td><td>8个工厂实施进度不同，需要分开监督</td></tr>\n<tr><td>Phase H触发机制</td><td>人工提交变更请求</td><td>增加自动监控触发（关键指标偏离预设阈值自动触发评估）</td><td>规模大，人工提交不及时</td></tr>\n<tr><td>需求管理工具</td><td>文档化</td><td>使用SAP Solution Manager + Azure DevOps双轨管理</td><td>与实施工具对接</td></tr>\n</table></div>\n<h3 id=\"2-4-Preliminary-Phase-交付物清单\">2.4 Preliminary Phase 交付物清单</h3>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>描述</th><th>责任人</th><th>状态</th></tr>\n<tr><td>Architecture Principles Catalog</td><td>11条架构原则，含5要素</td><td>CAE张明宇</td><td>已批准</td></tr>\n<tr><td>Architecture Board Charter</td><td>委员会章程，含权限范围和运作规则</td><td>CAE + CFO</td><td>已批准</td></tr>\n<tr><td>Tailored ADM Documentation</td><td>定制ADM流程说明</td><td>CAE</td><td>已批准</td></tr>\n<tr><td>Architecture Repository初始设置</td><td>工具选型（SAP LeanIX）+ 初始结构</td><td>IT总监</td><td>已完成</td></tr>\n<tr><td>Architecture Governance Framework</td><td>治理流程、审批权限矩阵</td><td>CAE</td><td>已批准</td></tr>\n<tr><td>RACI Matrix for Architecture Work</td><td>架构工作的角色责任矩阵</td><td>CAE</td><td>已批准</td></tr>\n</table></div>\n<hr>"}, "L9_3": {"type": "reading", "title": "📖 Phase A — 架构愿景 & 利益相关者分析", "html": "<h2 id=\"第三章-Phase-A-架构愿景-Architecture-Vision-\">第三章：Phase A — 架构愿景（Architecture Vision）</h2>\n<h3 id=\"3-1-利益相关者分析矩阵\">3.1 利益相关者分析矩阵</h3>\n<div class=\"tbl\"><table>\n<tr><th>利益相关者</th><th>角色</th><th>权力(H/M/L)</th><th>兴趣(H/M/L)</th><th>管理策略</th><th>主要关切（Concern）</th></tr>\n<tr><td>王大明（董事长）</td><td>项目赞助人</td><td>H</td><td>M</td><td>Keep Satisfied</td><td>投资回报、战略目标达成、董事会汇报</td></tr>\n<tr><td>黄晓峰（CFO）</td><td>财务决策者</td><td>H</td><td>H</td><td>Manage Closely</td><td>月结效率、集团合并报表、财务合规、预算控制</td></tr>\n<tr><td>李华（供应链VP）</td><td>业务主导</td><td>H</td><td>H</td><td>Manage Closely</td><td>库存周转率、停线频率、与客户系统的数据交换</td></tr>\n<tr><td>王建国（IT总监）</td><td>IT决策者</td><td>M</td><td>H</td><td>Manage Closely</td><td>系统稳定性、技术债务清除、团队能力建设</td></tr>\n<tr><td>吴俊（泰国工厂GM）</td><td>海外代表</td><td>M</td><td>H</td><td>Keep Informed</td><td>CBAM合规、泰国本地法规、系统切换期业务连续性</td></tr>\n<tr><td>陈磊（生产总监）</td><td>制造代表</td><td>M</td><td>H</td><td>Keep Informed</td><td>生产排产准确率、MES统一化、停线风险</td></tr>\n<tr><td>比亚迪采购代表</td><td>关键客户</td><td>M</td><td>M</td><td>Keep Satisfied</td><td>供应商数字化认证、实时交货状态查询</td></tr>\n<tr><td>一线工人代表</td><td>最终用户</td><td>L</td><td>H</td><td>Keep Informed</td><td>系统易用性、移动端支持、培训充分性</td></tr>\n<tr><td>SAP顾问团队</td><td>实施合作伙伴</td><td>L</td><td>H</td><td>Keep Informed</td><td>项目范围清晰、决策响应速度、技术规格确认</td></tr>\n<tr><td>泰国/墨西哥合规顾问</td><td>外部专家</td><td>L</td><td>M</td><td>Monitor</td><td>CBAM、海外税法要求的系统支持</td></tr>\n</table></div>\n<h3 id=\"3-2-架构愿景声明\">3.2 架构愿景声明</h3>\n<p><strong>一句话愿景：</strong></p>\n<blockquote><p>&quot;通过统一的企业架构平台，将华锐从依赖孤立系统的传统制造商转型为数据驱动的智能制造服务商，支撑8个全球基地的实时协同，实现月结T+3、库存周转率提升至10次/年、碳足迹全链路追踪。&quot;</p></blockquote>\n<p><strong>高层架构愿景图（概念示意）：</strong></p>\n<pre><code>┌─────────────────────────────────────────────────────────────┐\n│              华锐数字化转型目标架构（TO-BE 2028）              │\n├─────────────────────────────────────────────────────────────┤\n│  客户门户层  │ 比亚迪/一汽/Toyota 客户系统实时数据交换接口     │\n├─────────────────────────────────────────────────────────────┤\n│  应用层      │ SAP S/4HANA PCE（核心ERP）                    │\n│              │ 统一MES平台（替代6套独立系统）                 │\n│              │ SAC（管理分析）  │ MDG（主数据治理）           │\n├─────────────────────────────────────────────────────────────┤\n│  集成层      │ SAP CPI（统一集成总线）                        │\n│              │ API Gateway（外部接口管理）                    │\n├─────────────────────────────────────────────────────────────┤\n│  数据层      │ SAP HANA（实时数据库）                         │\n│              │ 数据湖（IoT/MES历史数据）                      │\n│              │ 碳足迹数据仓库                                 │\n├─────────────────────────────────────────────────────────────┤\n│  基础设施层  │ SAP PCE（私有云，德国Frankfurt数据中心）        │\n│              │ 各工厂本地网络优化 + 海外工厂VPN               │\n└─────────────────────────────────────────────────────────────┘</code></pre>\n<h3 id=\"3-3-价值链图-Value-Chain-Diagram-\">3.3 价值链图（Value Chain Diagram）</h3>\n<p><strong>主要活动（Primary Activities）：</strong></p>\n<pre><code>原材料采购 → 入库与库存管理 → 生产制造 → 质量检验 → 出库配送 → 客户服务\n(MM/SRM)    (MM/EWM)         (PP/MES)   (QM)       (SD/EWM)   (CRM/SD)\n    ↑               ↑               ↑           ↑          ↑          ↑\n                        支持活动（Support Activities）\n├── 集团财务管控（FICO/Group Reporting）—— 横贯所有主要活动\n├── 人力资源管理（SuccessFactors规划）—— 横贯所有主要活动\n├── 技术研发（PLM集成）—— 支持产品开发和生产工艺\n├── 数据与IT基础设施（SAP PCE + 统一MES + CPI）—— 横贯所有主要活动\n└── 合规管理（碳排放/IATF/海外法规）—— 横贯所有主要活动</code></pre>\n<p><strong>价值链分析结论：</strong> 华锐当前最大的价值链断裂点在&quot;生产制造→质量检验→出库配送&quot;的数据流转环节，6套MES造成的数据孤岛直接影响下游环节的响应速度和准确性。</p>\n<h3 id=\"3-4-Statement-of-Architecture-Work-架构工作说明书-摘要\">3.4 Statement of Architecture Work（架构工作说明书）摘要</h3>\n<div class=\"tbl\"><table>\n<tr><th>项目</th><th>内容</th></tr>\n<tr><td>项目名称</td><td>华锐汽车零部件集团企业架构重构项目</td></tr>\n<tr><td>版本</td><td>v1.0</td></tr>\n<tr><td>批准日期</td><td>2026年2月15日</td></tr>\n<tr><td>批准人</td><td>董事长王大明（赞助人）</td></tr>\n</table></div>\n<p><strong>范围定义：</strong></p>\n<ul>\n<li><strong>组织范围：</strong> 集团总部 + 6个国内生产基地（全覆盖）+ 泰国工厂（Phase 1）+ 墨西哥工厂（Phase 2）</li>\n<li><strong>架构域范围：</strong> 全四域（Business / Application / Data / Technology）</li>\n<li><strong>时间范围：</strong> 2026年2月 — 2027年7月（18个月）</li>\n<li><strong>不在范围内：</strong> SuccessFactors HR系统（下一个ADM循环）、PLM深度集成（单独项目）</li>\n</ul>\n<p><strong>主要约束（Constraints）：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>约束编号</th><th>约束描述</th><th>来源</th></tr>\n<tr><td>C-01</td><td>项目总预算不超过8,500万元</td><td>董事会决议</td></tr>\n<tr><td>C-02</td><td>ECC系统必须在EOS（End of Maintenance，2027年12月）前完成迁移</td><td>SAP政策</td></tr>\n<tr><td>C-03</td><td>生产系统切换窗口仅限春节、国庆（工厂停产期）</td><td>生产要求</td></tr>\n<tr><td>C-04</td><td>泰国工厂数据不得存储于中国大陆服务器</td><td>泰国数据主权法</td></tr>\n<tr><td>C-05</td><td>碳排放数据架构必须支持CBAM报告格式（2026年底前）</td><td>欧盟法规</td></tr>\n</table></div>\n<p><strong>Phase A 交付物清单：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>状态</th></tr>\n<tr><td>Architecture Vision Document</td><td>已批准</td></tr>\n<tr><td>Statement of Architecture Work</td><td>已批准</td></tr>\n<tr><td>Stakeholder Map（利益相关者图谱）</td><td>已完成</td></tr>\n<tr><td>Value Chain Diagram（价值链图）</td><td>已完成</td></tr>\n<tr><td>Solution Concept Diagram（高层技术愿景图）</td><td>已完成</td></tr>\n<tr><td>Initial Architecture Requirements Specification</td><td>框架已完成</td></tr>\n<tr><td>Communication Plan（利益相关者沟通计划）</td><td>已批准</td></tr>\n</table></div>"}, "L9_4": {"type": "reading", "title": "📖 Phase B — 业务架构（能力图/差距分析）", "html": "<h2 id=\"B-1-基线业务架构-Baseline-Business-Architecture-\">B.1 基线业务架构（Baseline Business Architecture）</h2>\n<h3 id=\"B-1-1-业务能力地图-Business-Capability-Map-\">B.1.1 业务能力地图（Business Capability Map）</h3>\n<p>参照 APQC（美国生产力与质量中心）流程分类框架，华锐当前的三级业务能力地图如下：</p>\n<div class=\"tbl\"><table>\n<tr><th>一级能力</th><th>二级能力</th><th>三级能力</th><th>当前成熟度（1-5）</th></tr>\n<tr><td><strong>1. 战略管理</strong></td><td>1.1 集团战略规划</td><td>年度战略制定、竞争分析</td><td>3</td></tr>\n<tr><td></td><td>1.2 绩效管理</td><td>KPI设定、月度绩效回顾</td><td>2</td></tr>\n<tr><td></td><td>1.3 投资决策</td><td>资本投入审批、ROI评估</td><td>2</td></tr>\n<tr><td><strong>2. 客户管理</strong></td><td>2.1 客户获取</td><td>市场推广、客户开发</td><td>2</td></tr>\n<tr><td></td><td>2.2 订单管理</td><td>报价、合同评审、订单接收</td><td>3</td></tr>\n<tr><td></td><td>2.3 客户服务</td><td>投诉处理、质量索赔管理</td><td>2</td></tr>\n<tr><td></td><td>2.4 客户洞察</td><td>客户满意度、需求预测</td><td>1</td></tr>\n<tr><td><strong>3. 供应链管理</strong></td><td>3.1 供应商管理</td><td>供应商认证、绩效评估</td><td>3</td></tr>\n<tr><td></td><td>3.2 采购管理</td><td>需求计划、寻源、采购执行</td><td>3</td></tr>\n<tr><td></td><td>3.3 库存管理</td><td>库存优化、呆滞分析</td><td>2</td></tr>\n<tr><td></td><td>3.4 物流管理</td><td>运输计划、配送执行</td><td>2</td></tr>\n<tr><td><strong>4. 生产运营</strong></td><td>4.1 生产计划</td><td>主生产计划（MPS）、MRP运算</td><td>3</td></tr>\n<tr><td></td><td>4.2 生产执行</td><td>工单管理、工序调度</td><td>3</td></tr>\n<tr><td></td><td>4.3 设备管理</td><td>预防性维护、故障处理</td><td>2</td></tr>\n<tr><td></td><td>4.4 工艺管理</td><td>工艺路线维护、工时标准</td><td>3</td></tr>\n<tr><td><strong>5. 质量管理</strong></td><td>5.1 质量计划</td><td>控制计划、FMEA管理</td><td>3</td></tr>\n<tr><td></td><td>5.2 进料检验</td><td>IQC执行、供应商质量报告</td><td>3</td></tr>\n<tr><td></td><td>5.3 过程质量</td><td>首件检验、工序巡检</td><td>3</td></tr>\n<tr><td></td><td>5.4 出货检验</td><td>FQC、OQC执行</td><td>3</td></tr>\n<tr><td></td><td>5.5 质量分析</td><td>不良分析、8D报告、PPAP</td><td>2</td></tr>\n<tr><td><strong>6. 财务管控</strong></td><td>6.1 财务会计</td><td>总账、应收、应付</td><td>4</td></tr>\n<tr><td></td><td>6.2 管理会计</td><td>成本核算、利润中心</td><td>3</td></tr>\n<tr><td></td><td>6.3 资金管理</td><td>资金计划、银行结算</td><td>3</td></tr>\n<tr><td></td><td>6.4 税务管理</td><td>增值税申报、转让定价</td><td>3</td></tr>\n<tr><td></td><td>6.5 集团合并</td><td>多币种合并、内部对消</td><td>2</td></tr>\n<tr><td><strong>7. 研发与创新</strong></td><td>7.1 产品开发</td><td>新产品立项、PDM管理</td><td>2</td></tr>\n<tr><td></td><td>7.2 工程变更</td><td>ECO流程、BOM版本管理</td><td>2</td></tr>\n<tr><td></td><td>7.3 知识管理</td><td>技术积累、专利管理</td><td>1</td></tr>\n<tr><td><strong>8. 人力资源</strong></td><td>8.1 人才招募</td><td>招聘计划、面试管理</td><td>3</td></tr>\n<tr><td></td><td>8.2 培训发展</td><td>培训体系、技能认证</td><td>2</td></tr>\n<tr><td></td><td>8.3 薪酬福利</td><td>薪资核算、考勤管理</td><td>3</td></tr>\n<tr><td><strong>9. 可持续发展</strong></td><td>9.1 环境管理</td><td>三废处理、环保合规</td><td>2</td></tr>\n<tr><td></td><td>9.2 碳排放管理</td><td>碳足迹核算、碳减排目标</td><td>1</td></tr>\n<tr><td></td><td>9.3 安全管理</td><td>安全培训、事故管理</td><td>3</td></tr>\n</table></div>\n<blockquote><p><strong>成熟度说明</strong>：1=初始级（依赖个人经验）；2=受管理级（有部分流程）；3=已定义级（有标准流程）；4=量化管理级（有数据支撑）；5=优化级（持续改进）</p></blockquote>\n<hr>\n<h3 id=\"B-1-2-组织架构\">B.1.2 组织架构</h3>\n<pre><code>华锐汽车零部件集团（HACG）集团总部\n├── 集团战略发展部\n├── 集团财务中心\n│   ├── 财务会计部\n│   ├── 管理会计部\n│   └── 资金部\n├── 集团供应链中心\n│   ├── 采购管理部\n│   └── 物流运营部\n├── 集团技术中心\n│   ├── 产品研发部\n│   └── 工艺工程部\n├── 集团质量中心\n├── 集团人力资源部\n├── 集团IT部（12人）\n│\n├── 生产基地1 — 上海浦东（传动系统）\n├── 生产基地2 — 上海金山（底盘部件）\n├── 生产基地3 — 武汉（发动机配件）\n├── 生产基地4 — 武汉（电子控制单元）\n├── 生产基地5 — 重庆（车身冲压件）\n├── 生产基地6 — 重庆（内饰系统）\n├── 生产基地7 — 成都（新能源配件）\n└── 生产基地8 — 广州（出口专供件）</code></pre>\n<p>每个生产基地独立设有：厂长、生产部、质量部、工程部、采购（受集团集采指导）、财务（受集团财务管控）。</p>\n<hr>\n<h3 id=\"B-1-3-核心业务流程-三个域-\">B.1.3 核心业务流程（三个域）</h3>\n<p>参考 Sinkron 2024 汽车制造业 TOGAF 建模中的三域划分：</p>\n<p><strong>域1：业务规划域（Business Planning Domain）</strong></p>\n<ul>\n<li>年度经营计划 → 销售预测 → 产能规划 → 主生产计划（MPS）</li>\n<li>当前问题：销售预测基于经验，缺乏数据模型；各基地产能数据手工汇总</li>\n</ul>\n<p><strong>域2：制造执行域（Manufacturing Execution Domain）</strong></p>\n<ul>\n<li>客户订单 → MRP运算 → 生产工单下达 → MES执行 → 完工汇报 → 入库</li>\n<li>当前问题：6套MES系统接口不一致，ECC与MES数据对账每周需3天人工</li>\n</ul>\n<p><strong>域3：流程控制域（Process Control Domain）</strong></p>\n<ul>\n<li>设备联网采集 → 工艺参数监控 → 质量数据采集 → SPC分析 → 不合格处理</li>\n<li>当前问题：设备联网率仅35%，质量数据大量依赖手工录入Excel</li>\n</ul>\n<hr>"}, "L9_5": {"type": "reading", "title": "📖 Phase C — 数据架构（CRUD矩阵/数据流）", "html": "<h2 id=\"C-1-数据架构-Data-Architecture-\">C.1 数据架构（Data Architecture）</h2>\n<h3 id=\"C-1-1-基线数据架构-主数据问题清单\">C.1.1 基线数据架构 — 主数据问题清单</h3>\n<p>华锐当前数据环境存在以下六大核心问题：</p>\n<div class=\"tbl\"><table>\n<tr><th>问题编号</th><th>问题描述</th><th>影响范围</th><th>业务影响</th></tr>\n<tr><td>MDM-01</td><td><strong>物料编码不统一</strong>：6套MES各自维护物料编码体系，同一物料在不同基地编码不同（如传动轴在上海基地代码&quot;TZ-001&quot;，在武汉基地为&quot;DRV-A01&quot;）</td><td>全集团</td><td>跨基地调拨、集团采购汇总失真</td></tr>\n<tr><td>MDM-02</td><td><strong>客户主数据分裂</strong>：ECC中客户主数据与独立CRM中的客户数据双轨运行，同一客户存在3-5个重复记录</td><td>销售、财务</td><td>应收账款对账困难，客户分析数据失真</td></tr>\n<tr><td>MDM-03</td><td><strong>供应商评级数据孤岛</strong>：采购系统、质量系统、MES分别维护供应商信息，无统一评级</td><td>采购、质量</td><td>无法实现供应商综合绩效管理</td></tr>\n<tr><td>MDM-04</td><td><strong>BOM版本混乱</strong>：PDM系统BOM与ECC生产BOM未实现自动同步，工程变更平均滞后7天才更新生产系统</td><td>生产、研发</td><td>工程变更执行不及时，产生物料浪费</td></tr>\n<tr><td>MDM-05</td><td><strong>成本中心/利润中心分类不一致</strong>：各基地财务核算口径不统一，集团合并报表需大量手工调整</td><td>财务</td><td>集团合并报表耗时3-5天，准确性存疑</td></tr>\n<tr><td>MDM-06</td><td><strong>质量标准数据分散</strong>：8个生产基地各自维护质量控制计划，相同产品线质检标准存在差异</td><td>质量</td><td>客户投诉无法快速追溯，审计风险高</td></tr>\n<tr><td>MDM-07</td><td><strong>设备数据无统一台账</strong>：设备维护记录在Excel中，MES中无完整设备模型</td><td>设备、生产</td><td>预防性维护计划无数据支撑</td></tr>\n</table></div>\n<hr>\n<h3 id=\"C-1-2-当前数据实体目录-Data-Entity-Catalog-\">C.1.2 当前数据实体目录（Data Entity Catalog）</h3>\n<div class=\"tbl\"><table>\n<tr><th>实体编号</th><th>数据实体名称</th><th>英文名</th><th>所属业务域</th><th>当前存储系统</th><th>记录量级</th></tr>\n<tr><td>DE-01</td><td>客户主数据</td><td>Customer Master</td><td>销售</td><td>ECC + CRM（冗余）</td><td>~5,000</td></tr>\n<tr><td>DE-02</td><td>供应商主数据</td><td>Vendor Master</td><td>采购</td><td>ECC</td><td>~2,800</td></tr>\n<tr><td>DE-03</td><td>物料主数据</td><td>Material Master</td><td>生产/采购</td><td>ECC + 各MES（冗余）</td><td>~45,000</td></tr>\n<tr><td>DE-04</td><td>产品BOM</td><td>Bill of Materials</td><td>研发/生产</td><td>ECC + PDM（不同步）</td><td>~8,000套</td></tr>\n<tr><td>DE-05</td><td>工艺路线</td><td>Routing</td><td>生产</td><td>ECC</td><td>~6,500套</td></tr>\n<tr><td>DE-06</td><td>销售订单</td><td>Sales Order</td><td>销售</td><td>ECC</td><td>~180,000/年</td></tr>\n<tr><td>DE-07</td><td>采购订单</td><td>Purchase Order</td><td>采购</td><td>ECC</td><td>~95,000/年</td></tr>\n<tr><td>DE-08</td><td>生产工单</td><td>Production Order</td><td>生产</td><td>ECC + MES</td><td>~320,000/年</td></tr>\n<tr><td>DE-09</td><td>质量检验批</td><td>Inspection Lot</td><td>质量</td><td>ECC（QM模块）</td><td>~220,000/年</td></tr>\n<tr><td>DE-10</td><td>库存记录</td><td>Inventory Record</td><td>仓储</td><td>ECC（WM/IM）</td><td>实时</td></tr>\n<tr><td>DE-11</td><td>财务凭证</td><td>Financial Document</td><td>财务</td><td>ECC（FICO）</td><td>~1,200,000/年</td></tr>\n<tr><td>DE-12</td><td>成本中心</td><td>Cost Center</td><td>财务</td><td>ECC</td><td>~380</td></tr>\n<tr><td>DE-13</td><td>设备台账</td><td>Equipment Master</td><td>设备</td><td>ECC（PM）+ Excel</td><td>~3,200台</td></tr>\n<tr><td>DE-14</td><td>员工档案</td><td>Employee Record</td><td>人力</td><td>独立HR系统</td><td>~12,000</td></tr>\n<tr><td>DE-15</td><td>客户投诉记录</td><td>Customer Complaint</td><td>质量/服务</td><td>CRM + Excel</td><td>~2,400/年</td></tr>\n<tr><td>DE-16</td><td>供应商评级</td><td>Vendor Rating</td><td>采购/质量</td><td>Excel</td><td>~2,800</td></tr>\n<tr><td>DE-17</td><td>设备运行数据</td><td>Equipment Telemetry</td><td>设备</td><td>各基地独立（35%覆盖）</td><td>实时</td></tr>\n<tr><td>DE-18</td><td>碳排放数据</td><td>Carbon Emission Data</td><td>可持续</td><td>无系统（人工估算）</td><td>年度</td></tr>\n</table></div>\n<hr>\n<h3 id=\"C-1-3-数据实体-业务系统-CRUD-矩阵\">C.1.3 数据实体/业务系统 CRUD 矩阵</h3>\n<blockquote><p><strong>图例</strong>：C=创建，R=读取，U=更新，D=删除，-=不涉及</p></blockquote>\n<div class=\"tbl\"><table>\n<tr><th>数据实体</th><th>ECC 6.0（FICO/SD/MM/PP）</th><th>独立MES（×6）</th><th>独立CRM</th><th>PDM系统</th><th>Excel报表</th><th>HR系统</th></tr>\n<tr><td>客户主数据</td><td>C R U D</td><td>-</td><td>C R U</td><td>-</td><td>R</td><td>-</td></tr>\n<tr><td>供应商主数据</td><td>C R U D</td><td>-</td><td>-</td><td>-</td><td>R</td><td>-</td></tr>\n<tr><td>物料主数据</td><td>C R U D</td><td>C R U（各自）</td><td>-</td><td>R</td><td>R</td><td>-</td></tr>\n<tr><td>产品BOM</td><td>R U</td><td>R</td><td>-</td><td>C R U D</td><td>R</td><td>-</td></tr>\n<tr><td>工艺路线</td><td>C R U D</td><td>R</td><td>-</td><td>R</td><td>-</td><td>-</td></tr>\n<tr><td>销售订单</td><td>C R U D</td><td>R</td><td>C R</td><td>-</td><td>R</td><td>-</td></tr>\n<tr><td>采购订单</td><td>C R U D</td><td>-</td><td>-</td><td>-</td><td>R</td><td>-</td></tr>\n<tr><td>生产工单</td><td>C R U</td><td>C R U D</td><td>-</td><td>-</td><td>R</td><td>-</td></tr>\n<tr><td>质量检验批</td><td>C R U D</td><td>C R（部分）</td><td>-</td><td>-</td><td>R</td><td>-</td></tr>\n<tr><td>库存记录</td><td>C R U D</td><td>R U</td><td>-</td><td>-</td><td>R</td><td>-</td></tr>\n<tr><td>财务凭证</td><td>C R U D</td><td>-</td><td>-</td><td>-</td><td>R</td><td>-</td></tr>\n<tr><td>设备台账</td><td>C R U D（PM）</td><td>R</td><td>-</td><td>-</td><td>C R U D</td><td>-</td></tr>\n<tr><td>员工档案</td><td>R</td><td>-</td><td>-</td><td>-</td><td>R</td><td>C R U D</td></tr>\n<tr><td>客户投诉</td><td>R</td><td>-</td><td>C R U D</td><td>-</td><td>C R U</td><td>-</td></tr>\n<tr><td>碳排放数据</td><td>-</td><td>-</td><td>-</td><td>-</td><td>C R U D</td><td>-</td></tr>\n</table></div>\n<p><strong>矩阵关键发现</strong>：</p>\n<ol>\n<li>物料主数据存在<strong>7个写入点</strong>（ECC + 6套MES），是主数据质量最大风险源</li>\n<li>客户数据在ECC和CRM<strong>双向写入</strong>，缺乏主记录系统（System of Record）定义</li>\n<li>碳排放数据<strong>仅存在于Excel</strong>，无系统支撑</li>\n</ol>\n<hr>\n<h3 id=\"C-1-4-数据分发图-Data-Dissemination-Diagram-\">C.1.4 数据分发图（Data Dissemination Diagram）</h3>\n<pre><code>                    ┌─────────────────────────────────┐\n                    │      MDG（主数据治理平台）[TO-BE] │\n                    │  物料/客户/供应商/成本中心统一管理  │\n                    └──────────────┬──────────────────┘\n                                   │ 主数据下发（单向权威）\n           ┌───────────────────────┼───────────────────────┐\n           │                       │                       │\n    ┌──────▼──────┐        ┌───────▼──────┐        ┌──────▼──────┐\n    │  S/4HANA    │        │ 统一MES平台   │        │  供应商门户 │\n    │（核心ERP）  │◄──────►│（8基地统一）  │        │  客户门户  │\n    └──────┬──────┘        └───────┬──────┘        └─────────────┘\n           │                       │\n    ┌──────▼──────┐        ┌───────▼──────┐\n    │  Group      │        │  IoT平台     │\n    │  Reporting  │        │  设备数据    │\n    └──────┬──────┘        └───────┬──────┘\n           │                       │\n    ┌──────▼───────────────────────▼──────┐\n    │           SAC（分析云）             │\n    │    实时报表 / 驾驶舱 / AI预测        │\n    └─────────────────────────────────────┘\n                    │\n    ┌───────────────▼─────────────────────┐\n    │   Sustainability Control Tower      │\n    │        碳排放追踪 / ESG报告          │\n    └─────────────────────────────────────┘\n\n当前数据流（AS-IS 问题）：\nECC ──手工导出──► Excel ──手工整理──► 管理报表（月度，延迟5天）\nMES1-6 ──独立接口──► ECC（每周数据对账，耗时3天）</code></pre>\n<hr>\n<h3 id=\"C-1-5-数据架构差距分析\">C.1.5 数据架构差距分析</h3>\n<div class=\"tbl\"><table>\n<tr><th>数据能力</th><th>AS-IS（当前）</th><th>TO-BE（目标）</th><th>差距类型</th><th>优先级</th></tr>\n<tr><td>主数据治理</td><td>无统一MDM，多点维护</td><td>SAP MDG统一主数据治理</td><td>新增</td><td>高</td></tr>\n<tr><td>数据集成</td><td>点对点接口，6套MES各自</td><td>SAP Integration Suite统一集成层</td><td>新增</td><td>高</td></tr>\n<tr><td>实时数据</td><td>月度批量，延迟分析</td><td>近实时数据流，支持业务决策</td><td>增强</td><td>高</td></tr>\n<tr><td>数据质量</td><td>无系统性DQ管控</td><td>数据质量规则引擎，DQ监控看板</td><td>新增</td><td>中</td></tr>\n<tr><td>碳排放数据</td><td>仅Excel估算</td><td>自动化碳足迹核算，与ERP打通</td><td>新增</td><td>中</td></tr>\n<tr><td>数据安全</td><td>基础权限控制</td><td>数据分级分类，动态权限管控</td><td>增强</td><td>中</td></tr>\n</table></div>\n<hr>"}, "L9_6": {"type": "reading", "title": "📖 Phase C — 应用架构（14应用/通信图）", "html": "<h2 id=\"C-2-应用架构-Application-Architecture-\">C.2 应用架构（Application Architecture）</h2>\n<h3 id=\"C-2-1-基线应用组合-Application-Portfolio-\">C.2.1 基线应用组合（Application Portfolio）</h3>\n<div class=\"tbl\"><table>\n<tr><th>应用名</th><th>类别</th><th>使用部门</th><th>技术状态</th><th>业务价值</th><th>备注</th></tr>\n<tr><td>SAP ECC 6.0</td><td>核心ERP</td><td>全集团财务/供应链/生产</td><td><strong>老旧</strong>（2027年末维护截止）</td><td>高</td><td>核心系统，急需升级</td></tr>\n<tr><td>MES-上海浦东</td><td>制造执行</td><td>上海浦东基地</td><td><strong>老旧</strong>（自研，2016年）</td><td>中</td><td>难以扩展，接口复杂</td></tr>\n<tr><td>MES-上海金山</td><td>制造执行</td><td>上海金山基地</td><td><strong>老旧</strong>（商业软件，2015年）</td><td>中</td><td>版本落后，厂商支持弱</td></tr>\n<tr><td>MES-武汉（×2）</td><td>制造执行</td><td>武汉两个基地</td><td><strong>稳定</strong>（商业软件，2019年）</td><td>中</td><td>有升级空间</td></tr>\n<tr><td>MES-重庆（×2）</td><td>制造执行</td><td>重庆两个基地</td><td><strong>稳定</strong>（2020年）</td><td>中</td><td>相对较新</td></tr>\n<tr><td>独立CRM系统</td><td>客户关系管理</td><td>销售部</td><td><strong>老旧</strong>（2013年，本地部署）</td><td>低</td><td>功能落后，与ECC割裂</td></tr>\n<tr><td>PDM系统</td><td>产品数据管理</td><td>技术中心</td><td><strong>稳定</strong>（2018年）</td><td>中</td><td>BOM同步问题突出</td></tr>\n<tr><td>独立HR系统</td><td>人力资源</td><td>人力资源部</td><td><strong>稳定</strong>（云端）</td><td>中</td><td>独立运营，与ECC有基础集成</td></tr>\n<tr><td>财务报表工具</td><td>BI/报表</td><td>集团财务</td><td><strong>老旧</strong>（Excel+VBA）</td><td>低</td><td>手工、易出错、不可追溯</td></tr>\n<tr><td>SCADA系统（部分）</td><td>设备监控</td><td>部分生产基地</td><td><strong>稳定</strong></td><td>中</td><td>覆盖率仅35%</td></tr>\n<tr><td>邮件/OA系统</td><td>协同办公</td><td>全集团</td><td>稳定</td><td>低</td><td>基础协同能力</td></tr>\n<tr><td>独立报关系统</td><td>海关/出口</td><td>广州基地</td><td>稳定</td><td>中</td><td>出口业务必需</td></tr>\n</table></div>\n<hr>\n<h3 id=\"C-2-2-目标应用架构-四组分类-\">C.2.2 目标应用架构（四组分类）</h3>\n<p>参照汽车制造业TOGAF应用架构分类（Sinkron 2024）：</p>\n<p><strong>A系列 — 对外门户组（External Interaction Layer）</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>应用编号</th><th>应用名称</th><th>功能说明</th><th>技术选型</th></tr>\n<tr><td>A01</td><td>集团公司门户</td><td>企业对外品牌展示、公告发布</td><td>SAP Build Work Zone</td></tr>\n<tr><td>A02</td><td>客户服务门户</td><td>订单跟踪、投诉提交、质量文件下载</td><td>SAP Build Work Zone + CX</td></tr>\n<tr><td>A03</td><td>供应商协同门户</td><td>采购协同、交货确认、对账</td><td>SAP Business Network</td></tr>\n<tr><td>A04</td><td>经销商门户</td><td>配件订单、技术支持文件</td><td>SAP Build Work Zone</td></tr>\n</table></div>\n<p><strong>B系列 — 生产管理组（Manufacturing Operations Layer）</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>应用编号</th><th>应用名称</th><th>功能说明</th><th>技术选型</th></tr>\n<tr><td>B01</td><td>统一MES平台</td><td>覆盖8基地的统一制造执行</td><td>SAP ME / 主流工业MES</td></tr>\n<tr><td>B02</td><td>高级生产计划</td><td>有限产能排程（APS）</td><td>SAP PP/DS（集成S/4HANA）</td></tr>\n<tr><td>B03</td><td>质量管理系统</td><td>统一质检、SPC、追溯</td><td>SAP QM（S/4HANA）</td></tr>\n<tr><td>B04</td><td>设备管理（EAM）</td><td>预防性+预测性维护</td><td>SAP PM（S/4HANA）+ IoT</td></tr>\n<tr><td>B05</td><td>仓储管理</td><td>统一仓储执行、拣配</td><td>SAP EWM（S/4HANA）</td></tr>\n<tr><td>B06</td><td>IoT平台</td><td>设备数据采集、边缘计算</td><td>SAP IoT / BTP</td></tr>\n</table></div>\n<p><strong>C系列 — 核心ERP组（Core ERP Layer）</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>应用编号</th><th>应用名称</th><th>功能说明</th><th>技术选型</th></tr>\n<tr><td>C01</td><td>S/4HANA PCE（私有云）</td><td>核心业务运营平台</td><td>SAP S/4HANA 2023</td></tr>\n<tr><td>C02</td><td>主数据治理（MDG）</td><td>统一主数据管理</td><td>SAP MDG（内嵌S/4HANA）</td></tr>\n<tr><td>C03</td><td>集团财务合并（GR）</td><td>多实体合并报告</td><td>SAP Group Reporting</td></tr>\n<tr><td>C04</td><td>集成平台</td><td>应用间集成总线</td><td>SAP Integration Suite（BTP）</td></tr>\n<tr><td>C05</td><td>流程自动化</td><td>财务、采购审批自动化</td><td>SAP Build Process Automation</td></tr>\n</table></div>\n<p><strong>D系列 — 数据分析组（Analytics &amp; Sustainability Layer）</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>应用编号</th><th>应用名称</th><th>功能说明</th><th>技术选型</th></tr>\n<tr><td>D01</td><td>分析云（SAC）</td><td>统一BI平台、实时驾驶舱</td><td>SAP Analytics Cloud</td></tr>\n<tr><td>D02</td><td>数据仓库/数据湖</td><td>历史数据分析基础</td><td>SAP Datasphere</td></tr>\n<tr><td>D03</td><td>AI/ML平台</td><td>需求预测、异常检测</td><td>SAP BTP AI Core</td></tr>\n<tr><td>D04</td><td>碳管理平台</td><td>碳足迹核算、减排追踪</td><td>SAP Sustainability CT</td></tr>\n</table></div>\n<hr>\n<h3 id=\"C-2-3-应用通信图-Application-Communication-Diagram-\">C.2.3 应用通信图（Application Communication Diagram）</h3>\n<pre><code>外部实体                门户层（A系列）              核心运营层\n┌─────────┐    ┌──────────────────────────┐\n│ 主机厂   │◄──►│ A02客户门户               │\n│ 4S店    │    └──────────┬───────────────┘\n└─────────┘               │ REST API\n┌─────────┐    ┌──────────▼───────────────┐    ┌──────────────────────┐\n│ 供应商  │◄──►│ A03供应商门户             │    │  C04 集成平台         │\n└─────────┘    └──────────┬───────────────┘    │  (Integration Suite)  │\n                           │               ◄────►│                      │\n                    ┌──────▼──────────────────►  └──────┬───────────────┘\n                    │                                    │\n         ┌──────────▼──────────┐              ┌────────▼────────────────┐\n         │ B01 统一MES平台      │◄────────────►│ C01 S/4HANA PCE         │\n         │ (8基地统一执行)      │              │ (FICO/SD/MM/PP/QM/PM/EWM)│\n         └──────────┬──────────┘              └────────┬────────────────┘\n                    │ 工厂数据                          │ 主数据/财务数据\n         ┌──────────▼──────────┐              ┌────────▼────────────────┐\n         │ B06 IoT平台          │              │ C02 MDG主数据治理        │\n         │ (设备遥测数据)       │              │ C03 Group Reporting     │\n         └──────────┬──────────┘              └────────┬────────────────┘\n                    │                                    │\n         ┌──────────▼────────────────────────▼──────────┐\n         │              D02 Datasphere（数据湖）          │\n         └──────────────────────┬────────────────────────┘\n                                │\n                    ┌───────────▼──────────────┐\n                    │  D01 SAC 分析云           │\n                    │  D03 AI/ML平台            │\n                    │  D04 碳管理平台           │\n                    └──────────────────────────┘</code></pre>\n<hr>\n<h3 id=\"C-2-4-应用架构差距分析-Gap-Analysis-\">C.2.4 应用架构差距分析（Gap Analysis）</h3>\n<div class=\"tbl\"><table>\n<tr><th>当前应用</th><th>处置方式</th><th>目标应用</th><th>理由</th></tr>\n<tr><td>SAP ECC 6.0（FICO）</td><td><strong>替换</strong></td><td>S/4HANA FICO</td><td>2027年末ECC停止主流维护，技术债务高</td></tr>\n<tr><td>SAP ECC 6.0（SD/MM）</td><td><strong>替换</strong></td><td>S/4HANA SD/MM</td><td>同上</td></tr>\n<tr><td>SAP ECC 6.0（PP/QM/WM）</td><td><strong>替换</strong></td><td>S/4HANA PP/QM/EWM</td><td>同上，功能也有显著增强</td></tr>\n<tr><td>MES-上海浦东（自研2016）</td><td><strong>退役</strong></td><td>统一MES平台（B01）</td><td>自研维护成本高，无法扩展</td></tr>\n<tr><td>MES-上海金山（2015）</td><td><strong>退役</strong></td><td>统一MES平台（B01）</td><td>厂商支持弱，升级不经济</td></tr>\n<tr><td>MES-武汉×2（2019）</td><td><strong>替换</strong></td><td>统一MES平台（B01）</td><td>迁移至统一平台，降低复杂度</td></tr>\n<tr><td>MES-重庆×2（2020）</td><td><strong>替换</strong></td><td>统一MES平台（B01）</td><td>同上，时序上优先级较低</td></tr>\n<tr><td>独立CRM（2013）</td><td><strong>退役</strong></td><td>S/4HANA CX / SAP Sales Cloud</td><td>功能落后，与ERP割裂</td></tr>\n<tr><td>PDM系统（2018）</td><td><strong>保留/集成</strong></td><td>PDM + S/4HANA集成优化</td><td>系统本身可用，优先解决BOM同步问题</td></tr>\n<tr><td>Excel报表（财务）</td><td><strong>退役</strong></td><td>SAC + Group Reporting</td><td>用BI平台替代，提升准确性和时效性</td></tr>\n<tr><td>独立HR系统（云端）</td><td><strong>保留</strong></td><td>现有HR系统（加强集成）</td><td>功能满足需求，集成SAP SuccessFactors接口</td></tr>\n<tr><td>独立报关系统</td><td><strong>保留</strong></td><td>现有系统（加强集成）</td><td>专业性强，与S/4HANA接口集成</td></tr>\n<tr><td>无（新增）</td><td><strong>新增</strong></td><td>SAP MDG</td><td>解决主数据混乱问题</td></tr>\n<tr><td>无（新增）</td><td><strong>新增</strong></td><td>SAP Integration Suite</td><td>统一集成架构</td></tr>\n<tr><td>无（新增）</td><td><strong>新增</strong></td><td>SAP IoT平台</td><td>支持设备联网和预测性维护</td></tr>\n<tr><td>无（新增）</td><td><strong>新增</strong></td><td>SAP Sustainability CT</td><td>支持碳管理和ESG报告</td></tr>\n</table></div>\n<hr>"}, "L9_7": {"type": "reading", "title": "📖 Phase D — 技术架构（平台分解/技术标准）", "html": "<h2 id=\"D-1-基线技术架构\">D.1 基线技术架构</h2>\n<h3 id=\"D-1-1-现有技术组合目录-Technology-Portfolio-Catalog-\">D.1.1 现有技术组合目录（Technology Portfolio Catalog）</h3>\n<div class=\"tbl\"><table>\n<tr><th>类别</th><th>组件名称</th><th>规格/版本</th><th>数量</th><th>状态</th><th>所在位置</th></tr>\n<tr><td><strong>服务器</strong></td><td>SAP应用服务器</td><td>IBM Power9，AIX 7.2</td><td>4台（双机热备）</td><td>老旧</td><td>上海数据中心</td></tr>\n<tr><td><strong>服务器</strong></td><td>SAP数据库服务器</td><td>IBM Power9，MaxDB</td><td>2台</td><td>老旧</td><td>上海数据中心</td></tr>\n<tr><td><strong>服务器</strong></td><td>MES应用服务器</td><td>x86，Windows Server 2016</td><td>12台（各基地2台）</td><td>混杂</td><td>各生产基地</td></tr>\n<tr><td><strong>数据库</strong></td><td>SAP主数据库</td><td>MaxDB（ECC内置）</td><td>—</td><td>老旧</td><td>上海数据中心</td></tr>\n<tr><td><strong>数据库</strong></td><td>MES数据库</td><td>SQL Server 2014/2016</td><td>6套</td><td>老旧</td><td>各基地</td></tr>\n<tr><td><strong>数据库</strong></td><td>CRM数据库</td><td>Oracle 11g</td><td>1套</td><td>老旧</td><td>上海数据中心</td></tr>\n<tr><td><strong>中间件</strong></td><td>SAP消息服务器</td><td>—</td><td>—</td><td>老旧</td><td>集成于ECC</td></tr>\n<tr><td><strong>中间件</strong></td><td>点对点集成接口</td><td>RFC/BAPI/自定义</td><td>~40个接口</td><td>老旧</td><td>分散</td></tr>\n<tr><td><strong>网络</strong></td><td>集团总部核心交换</td><td>Cisco Catalyst 6500</td><td>2台</td><td>老旧</td><td>上海</td></tr>\n<tr><td><strong>网络</strong></td><td>各基地接入交换</td><td>混杂品牌</td><td>8套</td><td>混杂</td><td>各基地</td></tr>\n<tr><td><strong>网络</strong></td><td>专线（MPLS）</td><td>10Mbps-50Mbps</td><td>8条</td><td>稳定</td><td>总部-基地</td></tr>\n<tr><td><strong>安全</strong></td><td>防火墙</td><td>FortiGate（部分）</td><td>—</td><td>稳定</td><td>总部+部分基地</td></tr>\n<tr><td><strong>存储</strong></td><td>SAN存储</td><td>IBM DS8000</td><td>1套</td><td>老旧</td><td>上海数据中心</td></tr>\n</table></div>\n<h3 id=\"D-1-2-现有网络拓扑描述\">D.1.2 现有网络拓扑描述</h3>\n<pre><code>                    ┌──────────────────────────────┐\n                    │   上海集团总部数据中心         │\n                    │   SAP ECC 6.0                │\n                    │   CRM / PDM                  │\n                    │   核心交换（Cisco 6500）       │\n                    └──────────────┬───────────────┘\n                                   │ 互联网出口（1Gbps）\n                    ┌──────────────▼───────────────┐\n                    │          MPLS专线骨干          │\n                    └──┬────┬────┬────┬────┬──┬───┘\n                       │    │    │    │    │  │\n                    浦东  金山  武汉1 武汉2 重庆1 重庆2\n                   (50M)(30M)(30M)(30M)(20M)(20M)\n                   MES  MES  MES  MES  MES  MES\n                                              │\n                                          成都(20M) 广州(30M)\n                                          MES-7   MES无（Excel）\n\n问题：\n1. 武汉/重庆/成都带宽仅20-30Mbps，集中式部署面临延迟风险\n2. 各基地无独立DR能力，依赖总部单点\n3. 设备网络（OT网络）与办公网络未隔离（安全风险）</code></pre>\n<h3 id=\"D-1-3-技术债务清单\">D.1.3 技术债务清单</h3>\n<div class=\"tbl\"><table>\n<tr><th>编号</th><th>技术债务描述</th><th>风险等级</th><th>到期/影响时间</th></tr>\n<tr><td>TD-01</td><td>SAP ECC 6.0主流维护2027年12月结束，续维护成本高昂</td><td><strong>高</strong></td><td>2027年12月</td></tr>\n<tr><td>TD-02</td><td>MaxDB数据库不支持SAP HANA的内存计算能力，无法原地升级</td><td><strong>高</strong></td><td>升级S/4HANA时</td></tr>\n<tr><td>TD-03</td><td>IBM Power/AIX架构与主流云厂商不兼容，迁移成本高</td><td><strong>高</strong></td><td>持续</td></tr>\n<tr><td>TD-04</td><td>6套MES基于Windows Server 2016，部分已停止安全更新</td><td><strong>中</strong></td><td>已到期</td></tr>\n<tr><td>TD-05</td><td>CRM系统Oracle 11g数据库，2019年已终止官方支持</td><td><strong>高</strong></td><td>已到期</td></tr>\n<tr><td>TD-06</td><td>~40个点对点接口缺乏文档，维护高度依赖个人经验</td><td><strong>中</strong></td><td>持续</td></tr>\n<tr><td>TD-07</td><td>OT/IT网络未分离，工业控制系统暴露安全风险</td><td><strong>高</strong></td><td>合规要求</td></tr>\n</table></div>\n<hr>"}, "L9_8": {"type": "reading", "title": "📖 Phase E — 工作包定义 & 架构路线图", "html": "<h2 id=\"E-1-综合差距-解决方案-依赖关系矩阵\">E.1 综合差距-解决方案-依赖关系矩阵</h2>\n<p>（Consolidated Gaps, Solutions and Dependencies Matrix）</p>\n<p>参考 Global Manufacturing Inc.（Visual Paradigm 2025）案例的矩阵格式：</p>\n<div class=\"tbl\"><table>\n<tr><th>架构域</th><th>差距编号</th><th>差距描述</th><th>解决方案</th><th>依赖的其他解决方案</th><th>优先级</th></tr>\n<tr><td>业务</td><td>GAP-B01</td><td>无统一生产计划协同能力，各基地孤立排产</td><td>建立集团统一计划中台（S/4HANA PP/DS）</td><td>GAP-C04（主数据统一）</td><td>高</td></tr>\n<tr><td>业务</td><td>GAP-B02</td><td>客户服务响应慢（平均7天），无实时状态可视</td><td>部署客户服务门户（SAP CX + A02）</td><td>GAP-C08（ECC数据迁移）</td><td>中</td></tr>\n<tr><td>业务</td><td>GAP-B03</td><td>碳排放无系统化管理，无法应对主机厂ESG审查</td><td>部署可持续发展管理平台（D04）</td><td>GAP-C01（数据集成）</td><td>中</td></tr>\n<tr><td>数据</td><td>GAP-C01</td><td>主数据多点维护，物料编码混乱</td><td>部署SAP MDG，建立单一主数据源</td><td>无（先决条件）</td><td><strong>最高</strong></td></tr>\n<tr><td>数据</td><td>GAP-C02</td><td>ECC与MES数据对账每周耗时3天</td><td>SAP Integration Suite统一集成层</td><td>GAP-C01（主数据统一后）</td><td>高</td></tr>\n<tr><td>数据</td><td>GAP-C03</td><td>无实时分析能力，报表滞后月度</td><td>部署SAP Datasphere + SAC</td><td>GAP-C02（集成层建立后）</td><td>中</td></tr>\n<tr><td>应用</td><td>GAP-C04</td><td>ECC 6.0即将停止维护（2027年）</td><td>升级至S/4HANA PCE</td><td>GAP-D01（基础设施升级）</td><td><strong>最高</strong></td></tr>\n<tr><td>应用</td><td>GAP-C05</td><td>6套异构MES造成制造执行数据碎片化</td><td>统一MES平台替换（分批迁移）</td><td>GAP-C04（S/4HANA上线后）</td><td>高</td></tr>\n<tr><td>应用</td><td>GAP-C06</td><td>独立CRM与ECC数据割裂</td><td>退役CRM，迁移至SAP Sales Cloud</td><td>GAP-C04（S/4HANA上线后）</td><td>中</td></tr>\n<tr><td>技术</td><td>GAP-D01</td><td>IBM Power/AIX基础设施老旧，无法支撑云化</td><td>基础设施现代化（x86+Linux+虚拟化）</td><td>无（基础能力）</td><td><strong>最高</strong></td></tr>\n<tr><td>技术</td><td>GAP-D02</td><td>各基地网络带宽不足（10-30Mbps）</td><td>SD-WAN网络升级（100Mbps+）</td><td>无（可并行）</td><td>高</td></tr>\n<tr><td>技术</td><td>GAP-D03</td><td>OT/IT网络未隔离，工业安全风险</td><td>部署工业防火墙，建立OT DMZ</td><td>无（独立可行）</td><td>高</td></tr>\n<tr><td>技术</td><td>GAP-D04</td><td>无灾备能力，单点故障风险</td><td>建立武汉DR数据中心</td><td>GAP-D01（完成后）</td><td>中</td></tr>\n<tr><td>技术</td><td>GAP-D05</td><td>设备联网率仅35%，无法支撑智能制造</td><td>IoT平台部署 + 设备联网改造</td><td>GAP-D02（网络升级后）</td><td>中</td></tr>\n</table></div>\n<hr>"}, "L9_9": {"type": "reading", "title": "📖 Phase F — 迁移规划 & 业务价值评估", "html": "<h2 id=\"F-1-工作包优先级排序\">F.1 工作包优先级排序</h2>\n<p>五个评估维度：业务价值、技术风险、战略依赖、合规紧迫性、快速见效潜力</p>\n<div class=\"tbl\"><table>\n<tr><th>工作包</th><th>业务价值(1-5)</th><th>技术风险(1-5)</th><th>依赖数</th><th>合规紧迫</th><th>快速见效</th><th>综合分</th><th>实施顺序</th></tr>\n<tr><td>WP1 主数据治理</td><td>5</td><td>3</td><td>7</td><td>3</td><td>2</td><td>4.2</td><td>第1批（Q1 2026）</td></tr>\n<tr><td>WP6 碳排放管理</td><td>3</td><td>4</td><td>2</td><td>5</td><td>3</td><td>4.0</td><td>第1批（Q1 2026 并行）</td></tr>\n<tr><td>WP2 S/4HANA实施</td><td>5</td><td>5</td><td>5</td><td>4</td><td>2</td><td>4.2</td><td>第2批（Q2 2026开始）</td></tr>\n<tr><td>WP4 集成架构CPI</td><td>4</td><td>3</td><td>6</td><td>3</td><td>3</td><td>3.8</td><td>第2批（与WP2并行）</td></tr>\n<tr><td>WP3 统一MES平台</td><td>4</td><td>4</td><td>3</td><td>2</td><td>3</td><td>3.2</td><td>第3批（Q3 2026）</td></tr>\n<tr><td>WP5 数据分析SAC</td><td>3</td><td>2</td><td>3</td><td>1</td><td>4</td><td>2.8</td><td>第4批（Q4 2026）</td></tr>\n<tr><td>WP7 海外工厂扩展</td><td>3</td><td>3</td><td>4</td><td>4</td><td>2</td><td>3.2</td><td>第4批（Q4 2026 并行）</td></tr>\n<tr><td>WP8 培训与变革</td><td>4</td><td>1</td><td>8</td><td>2</td><td>5</td><td>3.2</td><td>贯穿全程</td></tr>\n</table></div>\n<p><strong>排序理由（关键依赖分析）：</strong></p>\n<ul>\n<li>WP1（主数据治理）必须先于WP2（S/4HANA），因为S/4HANA上线后无法容忍脏数据</li>\n<li>WP6（碳排放）独立于主ERP流程，可以并行推进</li>\n<li>WP4（CPI集成）必须在WP2之前完成接口设计</li>\n</ul>\n<h2 id=\"F-2-实施与迁移计划-按季度-\">F.2 实施与迁移计划（按季度）</h2>\n<div class=\"tbl\"><table>\n<tr><th>季度</th><th>主要里程碑</th><th>活动工作包</th><th>过渡状态</th><th>关键验收标准</th></tr>\n<tr><td>Q1 2026（1-3月）</td><td>架构蓝图批准；主数据项目启动；碳排放数据模型设计完成</td><td>WP1、WP6启动</td><td>预备期</td><td>Architecture Board批准四域目标架构；主数据清洗方案获批</td></tr>\n<tr><td>Q2 2026（4-6月）</td><td>S/4HANA系统环境就绪；CPI接口架构设计冻结；主数据第一批清洗完成（客户+供应商）</td><td>WP1持续、WP2启动、WP4启动</td><td>TA1开始</td><td>开发/测试/生产三套环境就绪；接口清单100%识别；客户主数据准确率≥98%</td></tr>\n<tr><td>Q3 2026（7-9月）</td><td>S/4HANA FICO/MM/SD蓝图完成；MES统一平台POC验证完成；碳排放系统上线（泰国+墨西哥）</td><td>WP2（蓝图阶段）、WP3启动、WP6深化</td><td>TA1完成</td><td>蓝图获得业务部门书面确认；CBAM报告可按欧盟格式导出</td></tr>\n<tr><td>Q4 2026（10-12月）</td><td>S/4HANA PP/QM/PM蓝图完成；第一批工厂MES切换（山东总部）；数据分析平台上线</td><td>WP2（持续）、WP3（山东）、WP5启动</td><td>TA2开始</td><td>山东工厂MES稳定运行30天；SAC管理驾驶舱L1指标可用</td></tr>\n<tr><td>Q1 2027（1-3月）</td><td>S/4HANA SIT/UAT（春节窗口Go-Live准备）；其余5个国内工厂MES切换</td><td>WP2（测试）、WP3（5工厂）、WP7泰国启动</td><td>TA2完成</td><td>SIT缺陷清零；UAT业务用户签字；5工厂MES切换完成</td></tr>\n<tr><td>Q2 2027（4-6月）</td><td>S/4HANA国内Go-Live（五一窗口）；泰国工厂上线；项目验收</td><td>WP2（上线）、WP7完成、WP8扫尾</td><td>TO-BE</td><td>月结T+3达成；库存周转率≥9.5次/年；系统可用性≥99.9%</td></tr>\n</table></div>\n<h2 id=\"F-3-过渡架构状态演变表-TRM视角-\">F.3 过渡架构状态演变表（TRM视角）</h2>\n<div class=\"tbl\"><table>\n<tr><th>TRM技术服务类别</th><th>AS-IS（当前）</th><th>TA1（Q3 2026）</th><th>TA2（Q1 2027）</th><th>TO-BE（Q2 2027）</th></tr>\n<tr><td>ERP/核心业务系统</td><td>SAP ECC 6.0 On-Premise</td><td>ECC继续运行 + S/4HANA并行测试</td><td>S/4HANA国内主力，ECC只读</td><td>S/4HANA PCE全覆盖，ECC退役</td></tr>\n<tr><td>制造执行系统</td><td>6套独立MES（不同品牌）</td><td>山东工厂切换统一MES</td><td>6个国内工厂全部统一MES</td><td>8个工厂（含泰国）统一MES平台</td></tr>\n<tr><td>集成中间件</td><td>点对点接口（37个）</td><td>架构设计冻结，部分接口迁移至CPI</td><td>主要接口迁至CPI（≥60%）</td><td>所有接口通过CPI，点对点清零</td></tr>\n<tr><td>主数据管理</td><td>ECC分散维护，7个写入点</td><td>MDG系统上线，客户+供应商域</td><td>MDG覆盖物料+财务科目</td><td>MDG全覆盖，单一写入点</td></tr>\n<tr><td>数据分析</td><td>Excel手工报表，T+15</td><td>SAC基础模板上线</td><td>SAC集团报表T+3</td><td>实时管理驾驶舱，T+0</td></tr>\n<tr><td>碳排放管理</td><td>无</td><td>碳排放数据模型上线</td><td>海外工厂CBAM报告可用</td><td>全链路碳足迹实时追踪</td></tr>\n<tr><td>基础设施</td><td>自有机房，分散</td><td>SAP PCE合同签订</td><td>国内数据迁移至PCE</td><td>全球8工厂统一接入PCE</td></tr>\n</table></div>\n<h2 id=\"F-4-业务价值评估-Business-Value-Assessment-\">F.4 业务价值评估（Business Value Assessment）</h2>\n<div class=\"tbl\"><table>\n<tr><th>工作包</th><th>年化收益预估</th><th>一次性成本</th><th>回收期</th></tr>\n<tr><td>WP1 主数据治理</td><td>停线减少：8,000万/年；数据重复录入节省：500万/年</td><td>800万</td><td>3.8个月</td></tr>\n<tr><td>WP2 S/4HANA实施</td><td>月结效率（省200人工日/月）：480万/年；合规罚款风险降低：1,000万/年</td><td>3,500万</td><td>2.8年</td></tr>\n<tr><td>WP3 统一MES</td><td>生产效率提升3%：1,950万/年；库存减少（4.2亿→3.5亿，资金利率4%）：280万/年</td><td>1,200万</td><td>5.3个月</td></tr>\n<tr><td>WP6 碳排放管理</td><td>规避CBAM罚款：500万/年；客户认证价值：1,500万/年（合同续签）</td><td>300万</td><td>1.8个月</td></tr>\n<tr><td><strong>合计</strong></td><td><strong>约1.42亿/年</strong></td><td><strong>约5,800万</strong></td><td><strong>约5个月</strong></td></tr>\n</table></div>\n<h2 id=\"F-5-Phase-F-交付物清单\">F.5 Phase F 交付物清单</h2>\n<div class=\"tbl\"><table>\n<tr><th>交付物</th><th>状态</th></tr>\n<tr><td>Implementation and Migration Plan（18个月详细计划）</td><td>已批准</td></tr>\n<tr><td>Work Package Priority Matrix（工作包优先级矩阵）</td><td>已批准</td></tr>\n<tr><td>Architecture Definition Increments Table（增量表）</td><td>已完成</td></tr>\n<tr><td>Transition Architecture State Evolution Table</td><td>已完成</td></tr>\n<tr><td>Business Value Assessment Matrix</td><td>已完成</td></tr>\n<tr><td>Risk Register（风险登记册）</td><td>已批准</td></tr>\n<tr><td>Implementation Factor Catalog</td><td>已完成</td></tr>\n</table></div>\n<hr>\n<h1 id=\"Phase-G-实施治理-Implementation-Governance-\">Phase G — 实施治理（Implementation Governance）</h1>\n<h2 id=\"G-1-Architecture-Board-治理机制\">G.1 Architecture Board 治理机制</h2>\n<p><strong>会议安排：</strong></p>\n<div class=\"tbl\"><table>\n<tr><th>会议类型</th><th>频率/触发条件</th><th>主要议题</th></tr>\n<tr><td>月度常规会议</td><td>每月第三个星期二</td><td>审查月度合规报告、处理待审变更请求</td></tr>\n<tr><td>里程碑特别会议</td><td>每个Phase E工作包完成前</td><td>正式架构合规评审</td></tr>\n<tr><td>紧急会议</td><td>重大偏差触发，48小时内召开</td><td>重大架构偏差处理</td></tr>\n</table></
